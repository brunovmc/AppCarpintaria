<script>
  window.ComprasUI = (() => {
    let detalhesModalAbertoId = '';
    let delegationInit = false;
    let categoriasBaseValidacao = [];
    let categoriasPorTipoValidacao = {};
    let coresPorTipoValidacao = {};
    let listaFiltradaAtual = [];
    let listaFiltradaCompletaAtual = [];
    let itensPorId = {};
    let qtdRenderizada = 0;
    let carregandoMais = false;
    let indiceSeparadorAdicionadas = -1;
    let qtdAdicionadasFiltradas = 0;
    let separadorAdicionadasRenderizado = false;
    let mostrarAdicionadasAoEstoque = false;
    let renderJobSeq = 0;

    const PAGE_SIZE = 24;
    const RENDER_CHUNK_SIZE = 4;

    /* =========================
       HELPERS
    ========================== */
    function el() {
      return {
        formulario: document.getElementById('formularioCompra'),
        lista: document.getElementById('listaCompras'),
        listaControles: document.getElementById('listaControlesCompras'),
        modalDetalhes: document.getElementById('modalDetalhesCompras'),
        modalDetalhesConteudo: document.getElementById('modalDetalhesComprasConteudo'),
        modalDetalhesTitulo: document.getElementById('modalDetalhesComprasTitulo'),

        // Form
        tipo: document.getElementById('compraTipo'),
        item: document.getElementById('compraItem'),
        quantidade: document.getElementById('compraQuantidade'),
        unidade: document.getElementById('compraUnidade'),
        categoria: document.getElementById('compraCategoria'),
        fornecedor: document.getElementById('compraFornecedor'),
        pago_por: document.getElementById('compraPagoPor'),
        valor_total_item: document.getElementById('compraValorTotalItem'),
        valor_unit: document.getElementById('compraValorUnit'),
        observacao: document.getElementById('compraObservacao'),

        comprimento_cm: document.getElementById('compraComprimentoCm'),
        largura_cm: document.getElementById('compraLarguraCm'),
        espessura_cm: document.getElementById('compraEspessuraCm'),

        potencia: document.getElementById('compraPotencia'),
        voltagem: document.getElementById('compraVoltagem'),
        comprado_em: document.getElementById('compraCompradoEm'),
        data_pagamento: document.getElementById('compraDataPagamento'),
        data_vencimento: document.getElementById('compraDataVencimento'),
        forma_pagamento: document.getElementById('compraFormaPagamento'),
        parcelas_wrap: document.getElementById('compraParcelasWrap'),
        parcelas: document.getElementById('compraParcelas'),
        parcelas_detalhe_wrap: document.getElementById('compraParcelasDetalheWrap'),
        parcelas_detalhe_lista: document.getElementById('compraParcelasDetalheLista'),
        vida_util_mes: document.getElementById('compraVidaUtilMes'),

        equipamentoFields: document.getElementById('compraEquipamentoFields'),
        madeiraFields: document.getElementById('compraMadeiraFields'),
        formTitulo: document.getElementById('compraFormTitulo'),

        pagamentoModal: document.getElementById('modalPagamentoCompra'),
        pagamentoTitulo: document.getElementById('pagamentoCompraTitulo'),
        pagamentoData: document.getElementById('pagamentoCompraData'),
        pagamentoValor: document.getElementById('pagamentoCompraValor'),
        pagamentoParcelaWrap: document.getElementById('pagamentoCompraParcelaWrap'),
        pagamentoParcela: document.getElementById('pagamentoCompraParcela'),
        pagamentoForma: document.getElementById('pagamentoCompraForma'),
        pagamentoObservacao: document.getElementById('pagamentoCompraObservacao'),
        pagamentoConfirmar: document.getElementById('btnConfirmarPagamentoCompra'),

        // Painel de filtro (inline)
        filtroTipo: document.getElementById('filtroTipoCompras'),
        filtroTipoRapido: document.getElementById('filtroTipoRapidoCompras')
      };
    }

    function limparVazios(lista) {
      return (Array.isArray(lista) ? lista : [])
        .map(v => (v ?? '').toString().trim())
        .filter(v => v !== '');
    }

    function normalizarTipoKey(valor) {
      return String(valor || '').trim().toUpperCase();
    }

    function normalizarCorCss(valor) {
      const raw = String(valor || '').trim();
      if (!raw) return '';
      const hexMatch = raw.match(/^#?([0-9A-Fa-f]{3}|[0-9A-Fa-f]{6}|[0-9A-Fa-f]{8})$/);
      if (hexMatch) return `#${hexMatch[1]}`;
      return raw;
    }

    function normalizarMapaCoresPorTipo(rawMap) {
      const mapa = {};
      if (!rawMap || typeof rawMap !== 'object') return mapa;
      Object.keys(rawMap).forEach(k => {
        const tipo = normalizarTipoKey(k);
        const cor = normalizarCorCss(rawMap[k]);
        if (!tipo || !cor) return;
        mapa[tipo] = cor;
      });
      return mapa;
    }

    function setCoresPorTipo(mapa) {
      coresPorTipoValidacao = normalizarMapaCoresPorTipo(mapa);
    }

    function parseNumeroInput(valor) {
      const s = String(valor ?? '').trim();
      if (s === '') return 0;

      const limpo = s.replace(/\s+/g, '').replace(/[^\d,.\-]/g, '');
      if (!limpo || limpo === '-') return 0;

      const negativo = limpo.startsWith('-');
      const semSinal = limpo.replace(/-/g, '');
      const temVirgula = semSinal.includes(',');
      const temPonto = semSinal.includes('.');
      let normalizado = semSinal;

      if (temVirgula && temPonto) {
        if (semSinal.lastIndexOf(',') > semSinal.lastIndexOf('.')) {
          normalizado = semSinal.replace(/\./g, '').replace(',', '.');
        } else {
          normalizado = semSinal.replace(/,/g, '');
        }
      } else if (temVirgula) {
        const partes = semSinal.split(',');
        normalizado = partes.length > 2
          ? partes.join('')
          : `${partes[0] || '0'}.${partes[1] || '0'}`;
      } else if (temPonto) {
        const partes = semSinal.split('.');
        normalizado = partes.length > 2
          ? partes.join('')
          : semSinal;
      }

      const n = Number(`${negativo ? '-' : ''}${normalizado}`);
      return isNaN(n) ? 0 : n;
    }

    function proximoFrame(fn) {
      let executado = false;
      const run = () => {
        if (executado) return;
        executado = true;
        fn();
      };
      if (typeof window !== 'undefined' && typeof window.requestAnimationFrame === 'function') {
        window.requestAnimationFrame(run);
      }
      setTimeout(run, 80);
    }

    function formatarMoeda(valor) {
      const n = Number(valor || 0);
      const seguro = isNaN(n) ? 0 : n;
      return `R$ ${seguro.toFixed(2)}`;
    }

    function escapeHtml(valor) {
      return String(valor ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function validarCorCss(valor) {
      const cor = normalizarCorCss(valor);
      if (!cor) return false;
      if (window.CSS && typeof window.CSS.supports === 'function') {
        return window.CSS.supports('color', cor);
      }
      return /^#(?:[0-9A-Fa-f]{3}|[0-9A-Fa-f]{6}|[0-9A-Fa-f]{8})$/.test(cor) || /^[a-zA-Z]+$/.test(cor);
    }

    function obterCorTipo(tipo) {
      const key = normalizarTipoKey(tipo);
      if (!key) return '';
      const mapaGlobal = normalizarMapaCoresPorTipo(window.AppValidacoesCache?.coresPorTipo);
      const cor = normalizarCorCss(coresPorTipoValidacao[key] || mapaGlobal[key] || '');
      return validarCorCss(cor) ? cor : '';
    }

    function montarTipoTag(tipo) {
      const tipoTexto = String(tipo || '').trim();
      const tipoLabel = escapeHtml(tipoTexto || '-');
      const cor = obterCorTipo(tipoTexto);
      if (!cor) {
        return `<span class="tipo-tag-card">${tipoLabel}</span>`;
      }
      return `<span class="tipo-tag-card tipo-tag-card-colorida" style="--tipo-tag-bg:${escapeHtml(cor)}">${tipoLabel}</span>`;
    }

    function escapeAttr(valor) {
      return escapeHtml(valor);
    }

    function getHojeISO() {
      const d = new Date();
      const yyyy = d.getFullYear();
      const mm = String(d.getMonth() + 1).padStart(2, '0');
      const dd = String(d.getDate()).padStart(2, '0');
      return `${yyyy}-${mm}-${dd}`;
    }

    function getDataBaseParcelasCompra() {
      const { data_pagamento, comprado_em } = el();
      return String(data_pagamento?.value || comprado_em?.value || getHojeISO()).trim();
    }

    function getValorTotalCompraFormulario() {
      const f = el();
      const valorTotalInformadoBruto = String(f.valor_total_item?.value || '').trim();
      const valorTotalInformado = parseNumeroInput(valorTotalInformadoBruto);
      if (valorTotalInformadoBruto !== '' && valorTotalInformado >= 0) {
        return Number(valorTotalInformado.toFixed(2));
      }

      const quantidade = parseNumeroInput(f.quantidade?.value || 0);
      const valorUnit = parseNumeroInput(f.valor_unit?.value || 0);
      return Number((quantidade * valorUnit).toFixed(2));
    }

    function sincronizarValorCompra(origem) {
      const f = el();
      if (!f.quantidade || !f.valor_unit || !f.valor_total_item) return;

      const qtd = parseNumeroInput(f.quantidade.value || 0);
      const valorUnit = parseNumeroInput(f.valor_unit.value || 0);
      const valorTotal = parseNumeroInput(f.valor_total_item.value || 0);
      const valorUnitRaw = String(f.valor_unit.value || '').trim();
      const valorTotalRaw = String(f.valor_total_item.value || '').trim();

      if (origem === 'total') {
        if (!valorTotalRaw) {
          if (qtd > 0 && valorUnitRaw !== '') {
            f.valor_total_item.value = Number((qtd * valorUnit).toFixed(2));
          }
          handleParcelasConfigChange();
          return;
        }

        if (qtd > 0) {
          const novoUnit = valorTotal / qtd;
          f.valor_unit.value = Number(novoUnit.toFixed(6));
        } else {
          f.valor_unit.value = '';
        }
        handleParcelasConfigChange();
        return;
      }

      if (origem === 'unit') {
        if (!valorUnitRaw) {
          f.valor_total_item.value = '';
          handleParcelasConfigChange();
          return;
        }
        if (qtd > 0) {
          f.valor_total_item.value = Number((qtd * valorUnit).toFixed(2));
        }
        handleParcelasConfigChange();
        return;
      }

      if (origem === 'quantidade') {
        if (valorTotalRaw && qtd > 0) {
          const novoUnit = valorTotal / qtd;
          f.valor_unit.value = Number(novoUnit.toFixed(6));
        } else if (valorUnitRaw && qtd > 0) {
          f.valor_total_item.value = Number((qtd * valorUnit).toFixed(2));
        } else if (qtd <= 0 && !valorTotalRaw) {
          f.valor_total_item.value = '';
        }
        handleParcelasConfigChange();
      }
    }

    function handleQuantidadeInput() {
      sincronizarValorCompra('quantidade');
    }

    function handleValorUnitInput() {
      sincronizarValorCompra('unit');
    }

    function handleValorTotalInput() {
      sincronizarValorCompra('total');
    }

    function gerarParcelasPadrao(valorTotal, parcelas, dataBase) {
      const total = Number(valorTotal || 0);
      const qtd = Math.max(1, Math.floor(Number(parcelas || 1)));
      const inicioRaw = String(dataBase || getHojeISO()).trim();
      const inicio = /^\d{4}-\d{2}-\d{2}$/.test(inicioRaw) ? new Date(`${inicioRaw}T00:00:00`) : new Date();
      const base = qtd > 0 ? Number((total / qtd).toFixed(2)) : 0;
      const lista = [];
      for (let i = 0; i < qtd; i++) {
        const d = new Date(inicio);
        d.setMonth(d.getMonth() + i);
        const yyyy = d.getFullYear();
        const mm = String(d.getMonth() + 1).padStart(2, '0');
        const dd = String(d.getDate()).padStart(2, '0');
        const valor = i === qtd - 1
          ? Number((total - (base * (qtd - 1))).toFixed(2))
          : base;
        lista.push({
          numero: i + 1,
          data: `${yyyy}-${mm}-${dd}`,
          valor: Number(valor.toFixed(2))
        });
      }
      return lista;
    }

    function lerParcelasDetalheCompra() {
      const { parcelas_detalhe_lista } = el();
      if (!parcelas_detalhe_lista) return [];
      const linhas = [...parcelas_detalhe_lista.querySelectorAll('.parcela-detalhe-linha')];
      return linhas.map((linha, idx) => ({
        numero: idx + 1,
        data: String(linha.querySelector('input[data-campo="data"]')?.value || '').trim(),
        valor: parseNumeroInput(linha.querySelector('input[data-campo="valor"]')?.value || '')
      }));
    }

    function renderParcelasDetalheCompra(listaForcada) {
      const f = el();
      if (!f.parcelas_detalhe_wrap || !f.parcelas_detalhe_lista) return;
      const exibir = formaExigeParcelas(f.forma_pagamento?.value || '');
      if (!exibir) {
        f.parcelas_detalhe_wrap.classList.add('hidden');
        f.parcelas_detalhe_lista.innerHTML = '';
        return;
      }

      const parcelas = Math.max(1, Math.floor(parseNumeroInput(f.parcelas?.value || 1) || 1));
      const valorTotal = getValorTotalCompraFormulario();
      const dataBase = getDataBaseParcelasCompra();
      const atuais = Array.isArray(listaForcada) ? listaForcada : lerParcelasDetalheCompra();
      const usarAtuais = atuais.length === parcelas && atuais.every(p => String(p.data || '').trim() !== '');
      const lista = usarAtuais ? atuais : gerarParcelasPadrao(valorTotal, parcelas, dataBase);

      f.parcelas_detalhe_lista.innerHTML = lista.map((p, idx) => `
        <div class="parcela-detalhe-linha">
          <span class="parcela-detalhe-num">#${idx + 1}</span>
          <input type="date" data-campo="data" value="${escapeAttr(String(p.data || ''))}">
          <input type="number" data-campo="valor" min="0" step="0.01" value="${Number(p.valor || 0).toFixed(2)}">
        </div>
      `).join('');
      f.parcelas_detalhe_wrap.classList.remove('hidden');
    }

    function normalizarFormaPagamento(valor) {
      return String(valor || '')
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .trim()
        .toUpperCase();
    }

    function formaExigeParcelas(valor) {
      const forma = normalizarFormaPagamento(valor);
      return forma === 'CREDITO' || forma === 'PIX PARCELADO' || forma === 'DINHEIRO';
    }

    function compraJaAdicionadaAoEstoque(item) {
      return String(item?.adicionado_estoque ?? '').trim().toLowerCase() === 'true';
    }

    function separarComprasPorStatus(lista) {
      const arr = Array.isArray(lista) ? lista : [];
      const pendentes = [];
      const adicionadas = [];

      arr.forEach(item => {
        if (compraJaAdicionadaAoEstoque(item)) {
          adicionadas.push(item);
          return;
        }
        pendentes.push(item);
      });

      return { pendentes, adicionadas };
    }

    function obterListaVisivelCompras(lista) {
      const grupos = separarComprasPorStatus(lista);
      return {
        ...grupos,
        visivel: mostrarAdicionadasAoEstoque
          ? [...grupos.pendentes, ...grupos.adicionadas]
          : grupos.pendentes
      };
    }

    function toggleAdicionadasAoEstoque() {
      if (window.AppComprasUiGuard?.tryEnter && !window.AppComprasUiGuard.tryEnter('adicionadas_toggle')) {
        return;
      }
      if (carregandoMais) {
        window.AppDiag?.mark?.('compras.adicionadas.toggle.blocked_loading', {
          show_added: !!mostrarAdicionadasAoEstoque,
          rendered: Number(qtdRenderizada || 0),
          total: Number(listaFiltradaAtual.length || 0)
        });
        return;
      }
      if (typeof window.fecharPainelFiltroCompras === 'function') {
        window.fecharPainelFiltroCompras();
      }
      mostrarAdicionadasAoEstoque = !mostrarAdicionadasAoEstoque;
      window.AppDiag?.mark?.('compras.adicionadas.toggle', {
        show_added: !!mostrarAdicionadasAoEstoque,
        total_source: Number(listaFiltradaCompletaAtual.length || 0)
      });
      proximoFrame(() => renderLista(listaFiltradaCompletaAtual));
    }

    function calcularIndiceSeparadorAdicionadas(quantidadePendentes, quantidadeAdicionadas) {
      if (quantidadeAdicionadas <= 0) return -1;
      return Math.max(0, Number(quantidadePendentes || 0));
    }

    function criarSeparadorAdicionadas() {
      const div = document.createElement('div');
      div.className = 'compras-separador-grupo';

      const label = document.createElement('span');
      label.className = 'compras-separador-label';
      label.textContent = 'Ja adicionadas ao estoque';

      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'compras-separador-acao';
      btn.textContent = mostrarAdicionadasAoEstoque
        ? `Ocultar (${qtdAdicionadasFiltradas})`
        : `Ver adicionadas (${qtdAdicionadasFiltradas})`;
      btn.onclick = () => toggleAdicionadasAoEstoque();

      div.appendChild(label);
      div.appendChild(btn);
      return div;
    }

    function normalizarMapaCategoriasPorTipo(mapa) {
      const out = {};
      if (!mapa || typeof mapa !== 'object') return out;

      Object.keys(mapa).forEach(tipo => {
        const chave = String(tipo || '').trim().toUpperCase();
        if (!chave) return;
        const lista = Array.isArray(mapa[tipo]) ? mapa[tipo] : [];
        const unicos = [];
        lista.forEach(cat => {
          const label = String(cat || '').trim();
          if (!label) return;
          if (!unicos.some(v => v.toUpperCase() === label.toUpperCase())) {
            unicos.push(label);
          }
        });
        out[chave] = unicos;
      });

      return out;
    }

    function getCategoriasParaTipo(tipo) {
      const t = String(tipo || '').trim().toUpperCase();
      const categoriasTipo = Array.isArray(categoriasPorTipoValidacao[t])
        ? categoriasPorTipoValidacao[t]
        : [];
      return categoriasTipo.length > 0 ? categoriasTipo : categoriasBaseValidacao;
    }

    function preencherSelectCategoria(categorias, selecionado = '') {
      const { categoria } = el();
      if (!categoria || categoria.tagName !== 'SELECT') return;

      const alvo = String(selecionado || '').trim().toUpperCase();
      categoria.innerHTML = '<option value="">Selecione</option>';

      (Array.isArray(categorias) ? categorias : []).forEach(v => {
        const label = String(v || '').trim();
        if (!label) return;
        const o = document.createElement('option');
        o.value = label;
        o.textContent = label;
        categoria.appendChild(o);
      });

      const match = [...categoria.options].find(o => String(o.value || '').trim().toUpperCase() === alvo);
      categoria.value = match ? match.value : '';
    }

    function renderCategoriasDoTipo(tipo, categoriaSelecionada = '') {
      preencherSelectCategoria(getCategoriasParaTipo(tipo), categoriaSelecionada);
    }

    function atualizarQuantidadeMadeira() {
      const f = el();
      if (!f.tipo || f.tipo.value !== 'MADEIRA') return;
      if (!f.quantidade) return;

      const comp = parseNumeroInput(f.comprimento_cm?.value);
      const larg = parseNumeroInput(f.largura_cm?.value);
      const espes = parseNumeroInput(f.espessura_cm?.value);

      if (!comp || !larg || !espes) {
        f.quantidade.value = '';
        return;
      }

      const m3 = (comp * larg * espes) / 1000000;
      f.quantidade.value = m3.toFixed(6);
      sincronizarValorCompra('quantidade');
    }

    /* =========================
       FORMULARIO
    ========================== */
    function abrirFormularioNovo() {
      if (window.ComprasController?.limparEdicao) {
        ComprasController.limparEdicao();
      }
      resetFormulario();
      mostrarFormulario();
    }

    function mostrarFormulario() {
      const { formulario } = el();
      if (!formulario) return;
      formulario.classList.remove('hidden');
    }

    function fecharFormulario() {
      const { formulario } = el();
      if (!formulario) return;
      formulario.classList.add('hidden');
      resetFormulario();

      if (window.ComprasController) {
        ComprasController.limparEdicao();
      }
    }

    function definirTituloFormulario(titulo) {
      const { formTitulo } = el();
      if (!formTitulo) return;
      formTitulo.innerText = String(titulo || 'Nova Compra');
    }

    function preencherFormulario(data) {
      const f = el();

      if (f.tipo) f.tipo.value = data.tipo || '';
      if (f.unidade) f.unidade.value = data.unidade || '';

      if (f.item) f.item.value = data.item || '';
      if (f.quantidade) f.quantidade.value = data.quantidade || '';

      if (f.categoria) f.categoria.value = data.categoria || '';
      if (f.fornecedor) f.fornecedor.value = data.fornecedor || '';
      if (f.pago_por) f.pago_por.value = data.pago_por || '';

      if (f.valor_unit) f.valor_unit.value = data.valor_unit || '';
      if (f.valor_total_item) {
        const qtd = parseNumeroInput(data.quantidade || 0);
        const unit = parseNumeroInput(data.valor_unit || 0);
        f.valor_total_item.value = (qtd > 0 && unit >= 0) ? Number((qtd * unit).toFixed(2)) : '';
      }
      if (f.observacao) f.observacao.value = data.observacao || '';

      if (f.comprimento_cm) f.comprimento_cm.value = data.comprimento_cm || '';
      if (f.largura_cm) f.largura_cm.value = data.largura_cm || '';
      if (f.espessura_cm) f.espessura_cm.value = data.espessura_cm || '';

      if (f.potencia) f.potencia.value = data.potencia || '';
      if (f.voltagem) f.voltagem.value = data.voltagem || '';
      if (f.comprado_em) f.comprado_em.value = data.comprado_em || '';
      if (f.data_pagamento) f.data_pagamento.value = data.data_pagamento || '';
      if (f.data_vencimento) f.data_vencimento.value = data.data_vencimento || '';
      if (f.forma_pagamento) f.forma_pagamento.value = data.forma_pagamento || data.forma_pagamento_padrao || '';
      if (f.parcelas) f.parcelas.value = data.parcelas || '1';
      if (f.vida_util_mes) f.vida_util_mes.value = data.vida_util_mes || '';

      definirTituloFormulario('Editar Compra');
      handleTipoChange();
      handleFormaPagamentoChange();
      renderParcelasDetalheCompra(
        Array.isArray(data.parcelas_detalhe)
          ? data.parcelas_detalhe.map((p, idx) => ({
            numero: idx + 1,
            data: String(p.data_prevista || p.data || '').trim(),
            valor: Number(p.valor_previsto ?? p.valor ?? 0)
          }))
          : []
      );
    }

    function resetFormulario() {
      const f = el();

      [
        f.tipo,
        f.item,
        f.quantidade,
        f.unidade,
        f.categoria,
        f.fornecedor,
        f.pago_por,
        f.valor_total_item,
        f.valor_unit,
        f.observacao,
        f.comprimento_cm,
        f.largura_cm,
        f.espessura_cm,
        f.potencia,
        f.voltagem,
        f.comprado_em,
        f.data_pagamento,
        f.data_vencimento,
        f.forma_pagamento,
        f.parcelas,
        f.vida_util_mes
      ].forEach(i => i && (i.value = ''));

      if (f.equipamentoFields) f.equipamentoFields.classList.add('hidden');
      if (f.madeiraFields) f.madeiraFields.classList.add('hidden');
      if (f.quantidade) f.quantidade.readOnly = false;
      if (f.parcelas_detalhe_lista) f.parcelas_detalhe_lista.innerHTML = '';
      if (f.parcelas_detalhe_wrap) f.parcelas_detalhe_wrap.classList.add('hidden');
      renderCategoriasDoTipo('', '');
      handleFormaPagamentoChange();
      sincronizarValorCompra('quantidade');
      definirTituloFormulario('Nova Compra');
    }

    function handleTipoChange() {
      const { tipo, categoria, equipamentoFields, madeiraFields, quantidade, unidade } = el();
      if (!tipo) return;

      const isEquip = tipo.value === 'EQUIPAMENTO';
      const isMadeira = tipo.value === 'MADEIRA';

      if (equipamentoFields) {
        equipamentoFields.classList.toggle('hidden', !isEquip);
      }

      if (madeiraFields) {
        madeiraFields.classList.toggle('hidden', !isMadeira);
      }

      if (quantidade) {
        quantidade.readOnly = isMadeira;
      }

      renderCategoriasDoTipo(tipo.value, categoria ? categoria.value : '');

      if (isMadeira && unidade) {
        const optM3 = [...unidade.options].find(o =>
          String(o.value || '').trim().toUpperCase() === 'M3'
        );
        unidade.value = optM3 ? optM3.value : '';
        if (!optM3 && typeof mostrarToast === 'function') {
          mostrarToast('Configure M3 na aba VALIDACAO para itens MADEIRA', 'erro');
        }
        atualizarQuantidadeMadeira();
      }

      if (!isMadeira && madeiraFields) {
        const inputs = madeiraFields.querySelectorAll('input');
        inputs.forEach(i => (i.value = ''));
      }
      sincronizarValorCompra('quantidade');
    }

    function handleFormaPagamentoChange() {
      const { forma_pagamento, parcelas_wrap, parcelas } = el();
      if (!forma_pagamento || !parcelas_wrap || !parcelas) return;
      const exibirParcelas = formaExigeParcelas(forma_pagamento.value);
      parcelas_wrap.classList.toggle('hidden', !exibirParcelas);
      if (!exibirParcelas) {
        parcelas.value = '1';
      } else if (!String(parcelas.value || '').trim() || Number(parcelas.value) < 1) {
        parcelas.value = '1';
      }
      renderParcelasDetalheCompra();
    }

    function handleParcelasConfigChange() {
      renderParcelasDetalheCompra();
    }

      if (!f.modalDetalhes) return;
      f.modalDetalhes.classList.add('hidden');
      if (f.modalDetalhesConteudo) f.modalDetalhesConteudo.innerHTML = '';

      if (!detalhesModalAbertoId) return;
      const item = itensPorId[detalhesModalAbertoId];

    function renderControlesLista() {
      const { listaControles } = el();
      if (!listaControles) return;

      listaControles.innerHTML = '';
      const restante = listaFiltradaAtual.length - qtdRenderizada;
      if (restante <= 0) return;

      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'btn-carregar-mais';
      const labelIdle = `Carregar mais (${restante})`;
      if (window.AppLoading?.setButtonLoading) {
        window.AppLoading.setButtonLoading(btn, carregandoMais, labelIdle, 'Carregando');
      } else {
        btn.textContent = carregandoMais ? 'Carregando...' : labelIdle;
      }
      btn.disabled = carregandoMais;
      btn.addEventListener('click', () => {
        renderMaisItens();
      });

      listaControles.appendChild(btn);
    }

    function renderMaisItens(onDone) {
      const { lista } = el();
      if (!lista || carregandoMais) return;
      if (qtdRenderizada >= listaFiltradaAtual.length) {
        renderControlesLista();
        if (typeof onDone === 'function') onDone();
        return;
      }

      carregandoMais = true;
      renderControlesLista();

      const inicio = qtdRenderizada;
      const fim = Math.min(inicio + PAGE_SIZE, listaFiltradaAtual.length);
      const jobId = ++renderJobSeq;
      const tsInicio = performance.now();
      const perf = window.AppPerf?.start('ui.compras.renderMais', {
        inicio,
        fim,
        total: listaFiltradaAtual.length
      });
      window.AppDiag?.mark?.('compras.render_mais.start', {
        inicio: Number(inicio || 0),
        fim: Number(fim || 0),
        total: Number(listaFiltradaAtual.length || 0),
        chunk: RENDER_CHUNK_SIZE,
        page_size: PAGE_SIZE
      });
      let idx = inicio;

      const processarChunk = () => {
        if (jobId !== renderJobSeq) {
          window.AppDiag?.mark?.('compras.render_mais.aborted', {
            job_id: Number(jobId || 0),
            render_job_seq: Number(renderJobSeq || 0)
          });
          return;
        }

        const limite = Math.min(idx + RENDER_CHUNK_SIZE, fim);
        const fragment = document.createDocumentFragment();

        for (; idx < limite; idx++) {
          if (!separadorAdicionadasRenderizado && idx === indiceSeparadorAdicionadas) {
            fragment.appendChild(criarSeparadorAdicionadas());
            separadorAdicionadasRenderizado = true;
          }
          fragment.appendChild(montarCardResumo(listaFiltradaAtual[idx]));
        }

        lista.appendChild(fragment);

        if (idx < fim) {
          proximoFrame(processarChunk);
          return;
        }

        if (!separadorAdicionadasRenderizado && indiceSeparadorAdicionadas === fim && qtdAdicionadasFiltradas > 0) {
          lista.appendChild(criarSeparadorAdicionadas());
          separadorAdicionadasRenderizado = true;
        }

        qtdRenderizada = fim;
        carregandoMais = false;
        renderControlesLista();
        initDelegation();
        window.AppPerf?.end(perf, {
          renderizados: fim - inicio,
          renderizados_total: qtdRenderizada
        });
        window.AppDiag?.mark?.('compras.render_mais.end', {
          renderizados: Number(fim - inicio || 0),
          renderizados_total: Number(qtdRenderizada || 0),
          elapsed_ms: Number((performance.now() - tsInicio).toFixed(1))
        });
        if (typeof onDone === 'function') onDone();
      };

      proximoFrame(processarChunk);
    }

    function normalizarTipos(lista) {
      const unicos = [];
      limparVazios(lista).forEach(v => {
        if (!unicos.some(x => x.toUpperCase() === v.toUpperCase())) {
          unicos.push(v);
        }
      });
      return unicos.sort((a, b) => a.localeCompare(b));
    }

    function marcarTipoRapidoAtivo(tipoAtual) {
      const { filtroTipoRapido } = el();
      if (!filtroTipoRapido) return;
      const alvo = String(tipoAtual || '').trim().toUpperCase();
      filtroTipoRapido.querySelectorAll('button[data-tipo]').forEach(btn => {
        const tipoBtn = String(btn.dataset.tipo || '').trim().toUpperCase();
        btn.classList.toggle('ativo', tipoBtn === alvo);
      });
    }

    function renderFiltroRapidoTipos(lista) {
      const { filtroTipoRapido, filtroTipo } = el();
      if (!filtroTipoRapido) return;

      const tipos = normalizarTipos(lista)
        .filter(t => String(t || '').trim().toUpperCase() !== 'PRODUTO');
      filtroTipoRapido.innerHTML = '';

      const criarBotao = (label, tipo) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.textContent = label;
        btn.dataset.tipo = tipo;
        btn.addEventListener('click', () => {
          if (typeof window.setFiltroTipoRapidoCompras === 'function') {
            window.setFiltroTipoRapidoCompras(tipo);
            return;
          }
          if (filtroTipo) filtroTipo.value = tipo;
        });
        return btn;
      };

      filtroTipoRapido.appendChild(criarBotao('Todos', ''));
      tipos.forEach(tipo => filtroTipoRapido.appendChild(criarBotao(tipo, tipo)));
      marcarTipoRapidoAtivo(filtroTipo ? filtroTipo.value : '');
    }

    /* =========================
       LISTA + CARDS
    ========================== */
    function renderLista(itens) {
      const { lista, listaControles } = el();
      if (!lista) return;
      const tsInicio = performance.now();

      const perf = window.AppPerf?.start('ui.compras.renderLista', {
        total: Array.isArray(itens) ? itens.length : 0
      });
      window.AppDiag?.mark?.('compras.render_lista.start', {
        total_source: Array.isArray(itens) ? itens.length : 0,
        show_added: !!mostrarAdicionadasAoEstoque
      });
      renderJobSeq += 1;
      lista.innerHTML = '';
      if (listaControles) listaControles.innerHTML = '';

      listaFiltradaCompletaAtual = Array.isArray(itens) ? itens : [];
      const visao = obterListaVisivelCompras(listaFiltradaCompletaAtual);
      listaFiltradaAtual = visao.visivel;
      qtdAdicionadasFiltradas = visao.adicionadas.length;
      if (qtdAdicionadasFiltradas === 0) {
        mostrarAdicionadasAoEstoque = false;
      }
      construirIndiceItens(listaFiltradaAtual);
      qtdRenderizada = 0;
      carregandoMais = false;
      separadorAdicionadasRenderizado = false;
      indiceSeparadorAdicionadas = calcularIndiceSeparadorAdicionadas(
        visao.pendentes.length,
        visao.adicionadas.length
      );

      if (listaFiltradaAtual.length === 0) {
        if (detalhesModalAbertoId) {
          fecharModalDetalhes();
        }
        const semPendentesComOcultas = !mostrarAdicionadasAoEstoque && visao.adicionadas.length > 0;
        if (semPendentesComOcultas) {
          lista.appendChild(criarSeparadorAdicionadas());
        } else {
          lista.innerHTML = '<p>Nenhum item em compras.</p>';
        }
        window.AppPerf?.end(perf, { vazio: true });
        window.AppDiag?.mark?.('compras.render_lista.end', {
          vazio: true,
          elapsed_ms: Number((performance.now() - tsInicio).toFixed(1)),
          total_visivel: 0
        });
        return;
      }

      renderMaisItens(() => {
        window.AppPerf?.end(perf, {
          renderizados_iniciais: qtdRenderizada,
          total: listaFiltradaAtual.length
        });
        window.AppDiag?.mark?.('compras.render_lista.end', {
          vazio: false,
          elapsed_ms: Number((performance.now() - tsInicio).toFixed(1)),
          total_visivel: Number(listaFiltradaAtual.length || 0),
          renderizados_iniciais: Number(qtdRenderizada || 0)
        });
        atualizarModalDetalhesSeAberto();
      });
    }

    /* =========================
       EVENT DELEGATION
    ========================== */
    function initDelegation() {
      if (delegationInit) return;
      delegationInit = true;

      document.addEventListener('click', e => {
        const card = e.target.closest('.card');
        const lista = document.getElementById('listaCompras');

        if (card && lista && !lista.contains(card)) return;

        if (e.target.classList.contains('ver-mais')) {
          e.stopPropagation();
          if (!card) return;
          abrirModalDetalhes(card.dataset.id || '');
          return;
        }
      });
    }

    function abrirModalPagamentoCompra(item) {
      const f = el();
      if (!f.pagamentoModal) return false;

      if (f.pagamentoTitulo) {
        const nome = String(item?.item || '').trim();
        f.pagamentoTitulo.textContent = nome
          ? `Registrar pagamento: ${nome}`
          : 'Registrar pagamento';
      }

      if (f.pagamentoData) f.pagamentoData.value = getHojeISO();
      const parcelas = Array.isArray(item?.parcelas_detalhe) ? item.parcelas_detalhe : [];
      const totalParcelas = Math.max(1, Math.floor(parseNumeroInput(item?.parcelas || 1) || 1));
      const parcelado = totalParcelas > 1;
      const proximaParcela = parcelas.find(p => Number(p?.valor_pendente || 0) > 0.009) || null;

      if (f.pagamentoParcelaWrap && f.pagamentoParcela) {
        if (parcelado) {
          if (!proximaParcela?.ID) {
            if (typeof mostrarToast === 'function') {
              mostrarToast('Nao ha parcela pendente para esta compra', 'erro');
            }
            return false;
          }
          const numero = Number(proximaParcela.parcela_numero || 0);
          const total = Number(proximaParcela.parcelas_total || 0);
          const data = String(proximaParcela.data_prevista || '-').trim() || '-';
          const valorPend = Number(proximaParcela.valor_pendente || 0);

          f.pagamentoParcela.innerHTML = '';
          const op = document.createElement('option');
          op.value = String(proximaParcela.ID || '').trim();
          op.textContent = `Parcela ${numero}/${total} - ${data} - ${formatarMoeda(valorPend)}`;
          f.pagamentoParcela.appendChild(op);
          f.pagamentoParcela.value = op.value;
          f.pagamentoParcelaWrap.classList.remove('hidden');

          if (f.pagamentoValor) {
            f.pagamentoValor.value = valorPend > 0 ? valorPend.toFixed(2) : '';
            f.pagamentoValor.readOnly = true;
          }
        } else {
          f.pagamentoParcela.innerHTML = '<option value="">Parcela unica</option>';
          f.pagamentoParcela.value = '';
          f.pagamentoParcelaWrap.classList.add('hidden');
          if (f.pagamentoValor) {
            const pendente = Number(item?.total_pendente || 0);
            f.pagamentoValor.value = pendente > 0 ? pendente.toFixed(2) : '';
            f.pagamentoValor.readOnly = false;
          }
        }
      } else if (f.pagamentoValor) {
        const pendente = Number(item?.total_pendente || 0);
        f.pagamentoValor.value = pendente > 0 ? pendente.toFixed(2) : '';
      }

      if (f.pagamentoForma) f.pagamentoForma.value = item?.forma_pagamento || item?.forma_pagamento_padrao || '';
      if (f.pagamentoObservacao) f.pagamentoObservacao.value = '';
      f.pagamentoModal.dataset.parcelado = parcelado ? 'true' : 'false';

      f.pagamentoModal.classList.remove('hidden');
      return true;
    }

    function setModalPagamentoCompraProcessando(processando) {
      const f = el();
      const on = !!processando;
      [f.pagamentoData, f.pagamentoValor, f.pagamentoParcela, f.pagamentoForma, f.pagamentoObservacao, f.pagamentoConfirmar]
        .forEach(input => {
          if (input) input.disabled = on;
        });
      if (f.pagamentoConfirmar) {
        if (window.AppLoading?.setButtonLoading) {
          window.AppLoading.setButtonLoading(
            f.pagamentoConfirmar,
            on,
            'Confirmar pagamento',
            'Salvando'
          );
        } else {
          f.pagamentoConfirmar.textContent = on ? 'Salvando...' : 'Confirmar pagamento';
        }
      }
    }

    function fecharModalPagamentoCompra() {
      const f = el();
      if (!f.pagamentoModal) return;
      f.pagamentoModal.classList.add('hidden');
      if (f.pagamentoValor) f.pagamentoValor.readOnly = false;
      if (f.pagamentoParcelaWrap) f.pagamentoParcelaWrap.classList.add('hidden');
      if (f.pagamentoParcela) f.pagamentoParcela.innerHTML = '<option value="">Selecione</option>';
      f.pagamentoModal.dataset.parcelado = 'false';
      setModalPagamentoCompraProcessando(false);
    }

    function lerModalPagamentoCompra() {
      const f = el();
      const parcelado = String(f.pagamentoModal?.dataset?.parcelado || '').toLowerCase() === 'true';
      return {
        data_pagamento: String(f.pagamentoData?.value || '').trim(),
        valor_pago: String(f.pagamentoValor?.value || '').trim(),
        parcela_alvo_id: parcelado ? String(f.pagamentoParcela?.value || '').trim() : '',
        parcelado,
        forma_pagamento: String(f.pagamentoForma?.value || '').trim(),
        observacao: String(f.pagamentoObservacao?.value || '').trim()
      };
    }

    function preencherModalPagamentoCompra(dados = {}) {
      const f = el();
      const payload = dados || {};
      const dataPagamento = String(payload.data_pagamento || '').trim();
      const valorPago = String(payload.valor_pago ?? '').trim();
      const parcelaAlvoId = String(payload.parcela_alvo_id || '').trim();
      const formaPagamento = String(payload.forma_pagamento || '').trim();
      const observacao = String(payload.observacao || '').trim();

      if (f.pagamentoData && dataPagamento) f.pagamentoData.value = dataPagamento;
      if (f.pagamentoValor && valorPago !== '') f.pagamentoValor.value = valorPago;
      if (f.pagamentoForma && formaPagamento) f.pagamentoForma.value = formaPagamento;
      if (f.pagamentoObservacao) f.pagamentoObservacao.value = observacao;

      if (f.pagamentoParcela && parcelaAlvoId) {
        const possuiOpcao = [...f.pagamentoParcela.options]
          .some(op => String(op.value || '').trim() === parcelaAlvoId);
        if (possuiOpcao) {
          f.pagamentoParcela.value = parcelaAlvoId;
        }
      }
    }

    /* =========================
       API PUBLICA
    ========================== */
    return {
      abrirFormularioNovo,
      mostrarFormulario,
      fecharFormulario,
      preencherFormulario,
      resetFormulario,
      handleTipoChange,
      handleQuantidadeInput,
      handleValorUnitInput,
      handleValorTotalInput,
      handleFormaPagamentoChange,
      handleParcelasConfigChange,
      renderLista,

      renderTipos,
      renderUnidades,
      renderCategorias,
      renderFornecedores,
      renderPagosPor,
      renderFormasPagamento,
      setCoresPorTipo,
      renderFiltroRapidoTipos,
      marcarTipoRapidoAtivo,
      toggleAdicionadasAoEstoque,
      atualizarQuantidadeMadeira,
      definirTituloFormulario,
      fecharModalDetalhes,
      abrirModalPagamentoCompra,
      fecharModalPagamentoCompra,
      lerParcelasDetalheCompra,
      lerModalPagamentoCompra,
      preencherModalPagamentoCompra,
      setModalPagamentoCompraProcessando
    };

  })();
</script>
