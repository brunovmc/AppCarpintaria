<script>
  window.ComprasController = (() => {

    let editandoId = null;
    let origemRefazerId = null;
    let iniciado = false;
    let salvando = false;
    let mutationLockToken = null;
    let mutationLockTokenPagamento = null;
    let pagamentoCompraId = null;
    let salvandoPagamento = false;
    let listenerMutacoesRegistrado = false;
    const adicionandoAoEstoque = new Set();

    let validacoes = null;

    function perfStart(label, meta) {
      return window.AppPerf?.start(label, meta);
    }

    function perfEnd(token, extra) {
      window.AppPerf?.end(token, extra);
    }

    function invalidarCacheDashboardPorImpacto() {
      if (window.AppTabRefresh?.markDirty) {
        window.AppTabRefresh.markDirty('dashboard');
      }
      const dash = window.DashboardController;
      if (!dash?.invalidarCacheMeses) return;
      const refs = dash.coletarMesesImpactados ? dash.coletarMesesImpactados(...arguments) : [];
      dash.invalidarCacheMeses(refs);
      if (window.AppTabRefresh?.requestSync) {
        window.AppTabRefresh.requestSync('dashboard', {
          delayMs: 420,
          prefetch: true
        });
      }
    }

    function podeAlterarDados(contexto = 'Operacao') {
      if (window.AppDomainUtils?.ensureWritable) {
        return window.AppDomainUtils.ensureWritable(contexto);
      }
      return !!window.AppRuntime?.ensureWritable
        ? window.AppRuntime.ensureWritable(contexto)
        : true;
    }

    function getDataHojeISO() {
      if (window.AppDomainUtils?.getHojeISO) {
        return window.AppDomainUtils.getHojeISO();
      }
      const agora = new Date();
      const yyyy = agora.getFullYear();
      const mm = String(agora.getMonth() + 1).padStart(2, '0');
      const dd = String(agora.getDate()).padStart(2, '0');
      return `${yyyy}-${mm}-${dd}`;
    }

    function formaExigeParcelas(formaPagamento) {
      if (window.AppDomainUtils?.formaExigeParcelas) {
        return window.AppDomainUtils.formaExigeParcelas(formaPagamento);
      }
      return false;
    }

    function setSalvando(ativo) {
      salvando = !!ativo;
      if (window.AppMutationUI?.lock && window.AppMutationUI?.unlock) {
        if (salvando) {
          if (!mutationLockToken) {
            mutationLockToken = window.AppMutationUI.lock();
          }
        } else if (mutationLockToken) {
          window.AppMutationUI.unlock(mutationLockToken);
          mutationLockToken = null;
        }
      }
      const btn = document.getElementById('btnSalvarCompra');
      if (!btn) return;
      btn.disabled = salvando;
      if (window.AppLoading?.setButtonLoading) {
        window.AppLoading.setButtonLoading(btn, salvando, 'Salvar', 'Salvando');
      } else {
        btn.textContent = salvando ? 'Salvando...' : 'Salvar';
      }
    }

    function setBloqueioMutacaoPagamento(ativo) {
      if (!window.AppMutationUI?.lock || !window.AppMutationUI?.unlock) return;
      if (ativo) {
        if (!mutationLockTokenPagamento) {
          mutationLockTokenPagamento = window.AppMutationUI.lock();
        }
        return;
      }
      if (!mutationLockTokenPagamento) return;
      window.AppMutationUI.unlock(mutationLockTokenPagamento);
      mutationLockTokenPagamento = null;
    }

    function reabrirFormularioAposErro(dados, opcoes = {}) {
      const payload = dados ? { ...dados } : {};
      const editando = !!opcoes.editando;
      const id = String(opcoes.id || '').trim();
      const origem = String(opcoes.origemRefazerId || '').trim();

      editandoId = editando ? id : null;
      origemRefazerId = editando ? null : (origem || null);

      ComprasUI.preencherFormulario(payload);
      if (editando) {
        ComprasUI.definirTituloFormulario?.('Editar Compra');
      } else if (origemRefazerId) {
        ComprasUI.definirTituloFormulario?.('Revise a nova compra');
      } else {
        ComprasUI.definirTituloFormulario?.('Nova Compra');
      }
      ComprasUI.mostrarFormulario();
    }

    function getCompraUiState(item) {
      if (!window.AppEntityMutations?.getUiState) {
        return {
          status: '',
          action: '',
          label: '',
          message: '',
          canRetry: false,
          blockActions: false
        };
      }
      return window.AppEntityMutations.getUiState(item, {
        pendingLabels: {
          delete: 'Exclusao pendente',
          payment: 'Pagamento pendente',
          add_stock: 'Adicao ao estoque pendente'
        },
        errorLabels: {
          delete: 'Falha ao excluir',
          payment: 'Falha no pagamento',
          add_stock: 'Falha ao adicionar ao estoque'
        }
      });
    }

    function limparCompraMeta(item) {
      return window.AppEntityMutations?.limparMeta
        ? window.AppEntityMutations.limparMeta(item)
        : { ...(item || {}) };
    }

    function buildCompraOptimistic(payload, options = {}) {
      const base = limparCompraMeta(options.baseItem);
      const id = String(options.id || base.ID || '').trim() || `tmp_${Date.now()}`;
      const quantidade = Number((payload?.quantidade ?? base.quantidade) || 0);
      const valorUnit = Number((payload?.valor_unit ?? base.valor_unit) || 0);
      const valorTotalInformado = payload?.valor_total_item;
      const totalCalculado = valorTotalInformado === '' || valorTotalInformado == null
        ? Number((quantidade * valorUnit).toFixed(2))
        : Number(valorTotalInformado);

      if (window.AppDespesaMutations?.buildFromPayload) {
        const financeiro = window.AppDespesaMutations.buildFromPayload({
          ...payload,
          ID: id,
          valor_total: totalCalculado
        }, {
          baseItem: {
            ...base,
            ID: id,
            valor_total: Number((base?.total_previsto ?? base?.valor_total_item ?? (Number(base?.quantidade || 0) * Number(base?.valor_unit || 0))) || 0)
          },
          id
        });

        return {
          ...base,
          ...payload,
          ID: id,
          valor_total_item: valorTotalInformado === '' || valorTotalInformado == null ? '' : Number(valorTotalInformado),
          total_previsto: financeiro.total_previsto,
          total_pago: financeiro.total_pago,
          total_pendente: financeiro.total_pendente,
          status_pagamento: financeiro.status_pagamento,
          parcelas: financeiro.parcelas,
          parcelas_detalhe: financeiro.parcelas_detalhe,
          data_pagamento: financeiro.data_pagamento,
          forma_pagamento: financeiro.forma_pagamento,
          forma_pagamento_padrao: financeiro.forma_pagamento_padrao,
          quantidade_pagamentos: financeiro.quantidade_pagamentos,
          data_ultimo_pagamento: financeiro.data_ultimo_pagamento,
          forma_ultimo_pagamento: financeiro.forma_ultimo_pagamento,
          adicionado_estoque: payload?.adicionado_estoque ?? base?.adicionado_estoque ?? false,
          estoque_id: payload?.estoque_id ?? base?.estoque_id ?? ''
        };
      }

      const totalPrevisto = Number.isFinite(totalCalculado) ? totalCalculado : 0;
      const totalPago = Number(base?.total_pago || 0);
      return {
        ...base,
        ...payload,
        ID: id,
        valor_total_item: valorTotalInformado === '' || valorTotalInformado == null ? '' : Number(valorTotalInformado),
        total_previsto: totalPrevisto,
        total_pago: totalPago,
        total_pendente: Math.max(0, totalPrevisto - totalPago),
        status_pagamento: totalPago > 0 ? 'PARCIAL' : 'PENDENTE',
        adicionado_estoque: payload?.adicionado_estoque ?? base?.adicionado_estoque ?? false,
        estoque_id: payload?.estoque_id ?? base?.estoque_id ?? ''
      };
    }

    function applyPagamentoCompra(item, payload) {
      const base = limparCompraMeta(item);
      if (window.AppDespesaMutations?.applyPayment) {
        const atualizado = window.AppDespesaMutations.applyPayment({
          ...base,
          valor_total: Number((base?.total_previsto ?? base?.valor_total_item ?? (Number(base?.quantidade || 0) * Number(base?.valor_unit || 0))) || 0)
        }, payload);
        return {
          ...base,
          data_pagamento: atualizado.data_pagamento,
          forma_pagamento: atualizado.forma_pagamento,
          forma_pagamento_padrao: atualizado.forma_pagamento_padrao,
          total_previsto: atualizado.total_previsto,
          total_pago: atualizado.total_pago,
          total_pendente: atualizado.total_pendente,
          status_pagamento: atualizado.status_pagamento,
          quantidade_pagamentos: atualizado.quantidade_pagamentos,
          data_ultimo_pagamento: atualizado.data_ultimo_pagamento,
          forma_ultimo_pagamento: atualizado.forma_ultimo_pagamento,
          parcelas_detalhe: atualizado.parcelas_detalhe
        };
      }

      const totalPrevisto = Number(base?.total_previsto || 0);
      const totalPago = Math.min(totalPrevisto, Number(base?.total_pago || 0) + Number(payload?.valor_pago || 0));
      return {
        ...base,
        total_pago: totalPago,
        total_pendente: Math.max(0, totalPrevisto - totalPago),
        status_pagamento: totalPago >= totalPrevisto ? 'PAGO' : 'PARCIAL',
        data_pagamento: String(payload?.data_pagamento || '').trim() || base?.data_pagamento || '',
        forma_pagamento: String(payload?.forma_pagamento || '').trim() || base?.forma_pagamento || ''
      };
    }

    function applyAdicionarAoEstoqueCompra(item) {
      const base = limparCompraMeta(item);
      return {
        ...base,
        adicionado_estoque: true,
        estoque_id: String(base?.estoque_id || '').trim()
      };
    }

    function resolveCompraSuccessItem(entry, detail, helpers = {}) {
      const limparMeta = helpers?.limparMeta || (valor => valor);
      const meta = entry?.meta || {};
      const result = detail?.result || {};
      const optimisticItem = limparMeta(meta.optimistic_item);
      const beforeItem = limparMeta(meta.before_item);
      const action = String(meta.action || '').trim().toLowerCase();

      if (action === 'payment' && result?.compraAtualizada?.ID) {
        return limparMeta(result.compraAtualizada);
      }
      if (action === 'add_stock') {
        if (result?.compraAtualizada?.ID) {
          return limparMeta(result.compraAtualizada);
        }
        if (result?.itemEstoqueCriado?.ID) {
          return {
            ...optimisticItem,
            estoque_id: String(result.itemEstoqueCriado.ID || '').trim() || optimisticItem?.estoque_id || ''
          };
        }
      }
      if (result?.ID) {
        return limparMeta(result);
      }
      return optimisticItem || beforeItem;
    }

    function listarMutacoesCompraAtivas() {
      if (!window.AppOptimistic?.list) return [];
      return window.AppOptimistic.list({
        scope: 'compra',
        domain: 'compra'
      });
    }

    function reconciliarListaComprasComMutacoes(listaBase) {
      if (!window.AppEntityMutations?.mergeFetchedList) {
        return Array.isArray(listaBase) ? [...listaBase] : [];
      }
      return window.AppEntityMutations.mergeFetchedList(listaBase, listarMutacoesCompraAtivas(), {
        domain: 'compra',
        idKey: 'ID',
        resolveSuccessItem: resolveCompraSuccessItem
      });
    }

    function persistirEReRenderizarCompras(lista) {
      if (Array.isArray(lista)) {
        ComprasStore.set(lista);
      }
      renderListaAtual();
      if (typeof popularFiltrosDoPainelCompras === 'function') {
        popularFiltrosDoPainelCompras();
      }
    }

    function agendarSyncSilenciosoCompras(detail) {
      const action = String(detail?.entry?.meta?.action || '').trim().toLowerCase();
      if (window.AppTabRefresh?.requestSync) {
        window.AppTabRefresh.requestSync('compras', {
          delayMs: 900,
          prefetch: true
        });
        if (action === 'add_stock') {
          window.AppTabRefresh.requestSync('estoque', {
            delayMs: 980,
            prefetch: true
          });
        }
        return;
      }
      setTimeout(() => carregarCompras(true), 900);
      if (action === 'add_stock' && window.EstoqueController?.syncFromBackend) {
        setTimeout(() => {
          window.EstoqueController.syncFromBackend();
        }, 980);
      }
    }

    function tratarEventoMutacaoCompra(detail) {
      const entry = detail?.entry;
      if (!entry || String(entry.scope || '').trim() !== 'compra') return;
      if (String(entry?.meta?.domain || '').trim() !== 'compra') return;
      if (!window.AppEntityMutations?.applyEntryToList) return;

      const atualizada = window.AppEntityMutations.applyEntryToList(ComprasStore.get(), detail, {
        domain: 'compra',
        idKey: 'ID',
        resolveSuccessItem: resolveCompraSuccessItem
      });
      persistirEReRenderizarCompras(atualizada);

      if (String(detail?.type || '').trim().toLowerCase() === 'success') {
        const result = detail?.result || {};
        const action = String(entry?.meta?.action || '').trim().toLowerCase();

        if (action === 'add_stock' && result?.itemEstoqueCriado && window.EstoqueStore) {
          const itemEstoque = result.itemEstoqueCriado;
          const estoqueAtual = window.EstoqueStore.getById?.(itemEstoque.ID);
          if (estoqueAtual) {
            window.EstoqueStore.update(itemEstoque.ID, itemEstoque);
          } else {
            window.EstoqueStore.add(itemEstoque);
          }
          if (typeof window.aplicarBuscaEstoque === 'function') {
            window.aplicarBuscaEstoque();
          } else if (window.EstoqueUI?.renderLista) {
            window.EstoqueUI.renderLista(window.EstoqueStore.get());
          }
        }

        invalidarCacheDashboardPorImpacto(entry?.meta?.before_item, entry?.payload, result?.compraAtualizada || result);
        agendarSyncSilenciosoCompras(detail);
        return;
      }

      if (String(detail?.type || '').trim().toLowerCase() === 'error'
        && String(entry?.meta?.source || '').trim() === 'compras') {
        mostrarToast(`${detail?.errorMessage || 'Falha ao sincronizar compra'}. Use "Tentar novamente".`, 'erro');
      }
    }

    function registrarListenerMutacoesSeNecessario() {
      if (listenerMutacoesRegistrado) return;
      if (typeof window === 'undefined' || typeof window.addEventListener !== 'function') return;
      window.addEventListener('app:optimistic-mutation', evento => {
        tratarEventoMutacaoCompra(evento?.detail || {});
      });
      listenerMutacoesRegistrado = true;
    }

    function retryCompraMutation(id) {
      const item = ComprasStore.getById(String(id || '').trim());
      const mutationId = String(item?._localMutationId || '').trim();
      if (!mutationId || !window.AppOptimistic?.retry) {
        mostrarToast('Nao ha sincronizacao pendente para reenviar', 'erro');
        return;
      }
      window.AppOptimistic.retry(mutationId);
      mostrarToast('Tentando sincronizar novamente...');
    }

    function init() {
      if (iniciado) return;

      registrarListenerMutacoesSeNecessario();
      window.AppOptimistic?.process?.();
      carregarValidacoes();
      carregarCompras();

      iniciado = true;
    }

    function carregarValidacoes() {
      const perf = perfStart('rpc.compras.obterValidacoes');
      const loader = window.AppValidacoes?.get
        ? window.AppValidacoes.get({ maxAgeMs: 1000 * 60 * 60 * 12 })
        : Promise.reject(new Error('cache de validacoes indisponivel'));

      loader
        .then(({ data }) => {
          perfEnd(perf, { ok: true });
          validacoes = data || {};

          validacoes.tipos ||= [];
          validacoes.coresPorTipo ||= {};
          validacoes.unidades ||= [];
          validacoes.categorias ||= [];
          validacoes.categoriasPorTipo ||= {};
          validacoes.fornecedores ||= [];
          validacoes.pagosPor ||= [];
          validacoes.formasPagamento ||= [];

          ComprasUI.setCoresPorTipo?.(validacoes.coresPorTipo);
          ComprasUI.renderTipos?.(validacoes.tipos);
          ComprasUI.renderUnidades?.(validacoes.unidades);
          ComprasUI.renderCategorias?.(validacoes.categorias, validacoes.categoriasPorTipo);
          ComprasUI.renderFornecedores?.(validacoes.fornecedores);
          ComprasUI.renderPagosPor?.(validacoes.pagosPor);
          ComprasUI.renderFormasPagamento?.(validacoes.formasPagamento);
          ComprasUI.renderFiltroRapidoTipos?.(validacoes.tipos);
          if (typeof popularFiltrosDoPainelCompras === 'function') {
            popularFiltrosDoPainelCompras();
          }
          if (typeof aplicarFiltroTipoRapidoPersistidoCompras === 'function') {
            aplicarFiltroTipoRapidoPersistidoCompras();
          }

          const listaAtual = ComprasStore.get();
          if (Array.isArray(listaAtual) && listaAtual.length > 0) {
            renderListaAtual();
          }
        })
        .catch(() => {
          perfEnd(perf, { ok: false });
          ComprasUI.renderFiltroRapidoTipos?.([]);
          mostrarToast('Falha ao carregar validacoes', 'erro');
        });
    }

    function categoriaValidaParaTipo(tipo, categoria) {
      const t = String(tipo || '').trim().toUpperCase();
      const c = String(categoria || '').trim().toUpperCase();
      if (!t || !c) return false;

      const mapa = validacoes?.categoriasPorTipo || {};
      const categoriasTipo = Array.isArray(mapa[t]) ? mapa[t] : [];
      if (categoriasTipo.length > 0) {
        return categoriasTipo.some(v => String(v || '').trim().toUpperCase() === c);
      }

      return (Array.isArray(validacoes?.categorias) ? validacoes.categorias : [])
        .some(v => String(v || '').trim().toUpperCase() === c);
    }

    function renderListaAtual() {
      if (window.aplicarBuscaCompras) {
        aplicarBuscaCompras();
        return;
      }
      ComprasUI.renderLista(ComprasStore.get());
    }

    function hidratarComprasDoCache() {
      const listaCache = window.AppTabCache?.ler?.('compras');
      if (!Array.isArray(listaCache)) return false;
      persistirEReRenderizarCompras(reconciliarListaComprasComMutacoes(listaCache));
      return true;
    }

    function carregarCompras(forcarRecarregar = false, onDone) {
      const exibindoCache = !forcarRecarregar && hidratarComprasDoCache();
      const perf = perfStart('rpc.compras.listarCompras');
      window.AppRequest.runner()
        .withSuccessHandler(lista => {
          if (window.AppRuntime?.setReadOnly) {
            window.AppRuntime.setReadOnly(false);
          }
          perfEnd(perf, { ok: true, total: Array.isArray(lista) ? lista.length : 0 });
          persistirEReRenderizarCompras(reconciliarListaComprasComMutacoes(lista));
          if (typeof onDone === 'function') onDone();
        })
        .withFailureHandler(() => {
          perfEnd(perf, { ok: false });
          if (exibindoCache) {
            if (window.AppRuntime?.setReadOnly) {
              window.AppRuntime.setReadOnly(true, 'Sem conexao com backend - exibindo cache local');
            }
            mostrarToast('Exibindo ultimo snapshot em cache', 'erro');
            if (typeof onDone === 'function') onDone();
            return;
          }
          mostrarToast('Erro ao carregar compras', 'erro');
          if (typeof onDone === 'function') onDone();
        })
        .listarCompras(!!forcarRecarregar);
    }

    function syncFromBackend(onDone) {
      carregarCompras(true, onDone);
    }

    function salvar() {
      if (!podeAlterarDados('Salvamento bloqueado em modo somente leitura')) return;
      if (salvando) return;

      const get = id => document.getElementById(id)?.value || '';
      const parseNumeroInput = valor => (
        window.AppDomainUtils?.parseNumeroOptional
          ? window.AppDomainUtils.parseNumeroOptional(valor)
          : ''
      );

      const tipo = get('compraTipo');
      if (String(tipo || '').trim().toUpperCase() === 'PRODUTO') {
        mostrarToast('Tipo PRODUTO nao e permitido em compras. Use a aba Estoque ou Producao.', 'erro');
        return;
      }
      const compradoEm = String(get('compraCompradoEm') || '').trim();
      const categoria = get('compraCategoria');
      const dataPagamento = String(get('compraDataPagamento') || '').trim();
      const dataVencimento = String(get('compraDataVencimento') || '').trim();
      const formaPagamento = String(get('compraFormaPagamento') || '').trim();
      const parcelasBruto = parseNumeroInput(get('compraParcelas'));
      const parcelas = formaExigeParcelas(formaPagamento)
        ? Math.floor(Number(parcelasBruto || 0))
        : 1;

      if (!compradoEm) {
        mostrarToast('Campo "Comprado em" e obrigatorio', 'erro');
        return;
      }
      if (!categoriaValidaParaTipo(tipo, categoria)) {
        mostrarToast('Categoria invalida para o tipo selecionado', 'erro');
        return;
      }

      const comprimentoInput = tipo === 'MADEIRA' ? parseNumeroInput(get('compraComprimentoCm')) : '';
      const larguraInput = tipo === 'MADEIRA' ? parseNumeroInput(get('compraLarguraCm')) : '';
      const espessuraInput = tipo === 'MADEIRA' ? parseNumeroInput(get('compraEspessuraCm')) : '';

      const comprimento_cm = tipo === 'MADEIRA' ? Number(comprimentoInput || 0) : '';
      const largura_cm = tipo === 'MADEIRA' ? Number(larguraInput || 0) : '';
      const espessura_cm = tipo === 'MADEIRA' ? Number(espessuraInput || 0) : '';

      if (tipo === 'MADEIRA' && (comprimento_cm <= 0 || largura_cm <= 0 || espessura_cm <= 0)) {
        mostrarToast('Para MADEIRA, informe comprimento, largura e espessura validos', 'erro');
        return;
      }

      const qtdMadeira = tipo === 'MADEIRA'
        ? Number(((comprimento_cm * largura_cm * espessura_cm) / 1000000).toFixed(6))
        : '';
      const qtdNaoMadeira = tipo !== 'MADEIRA'
        ? (parseNumeroInput(get('compraQuantidade')) || 0)
        : 0;
      const quantidadeFinal = tipo === 'MADEIRA' ? qtdMadeira : qtdNaoMadeira;

      if (tipo !== 'MADEIRA' && qtdNaoMadeira <= 0) {
        mostrarToast('Quantidade deve ser maior que zero', 'erro');
        return;
      }
      if (tipo === 'MADEIRA' && quantidadeFinal <= 0) {
        mostrarToast('Volume de madeira invalido', 'erro');
        return;
      }
      if (formaExigeParcelas(formaPagamento) && (!isFinite(parcelas) || parcelas < 1)) {
        mostrarToast('Parcelas deve ser um numero inteiro maior ou igual a 1', 'erro');
        return;
      }
      const parcelasDetalhe = formaExigeParcelas(formaPagamento)
        ? (ComprasUI.lerParcelasDetalheCompra ? ComprasUI.lerParcelasDetalheCompra() : [])
        : [];
      if (formaExigeParcelas(formaPagamento)) {
        if (!Array.isArray(parcelasDetalhe) || parcelasDetalhe.length !== parcelas) {
          mostrarToast('Revise as parcelas detalhadas', 'erro');
          return;
        }
        if (parcelasDetalhe.some(p => !String(p.data || '').trim())) {
          mostrarToast('Preencha a data de todas as parcelas', 'erro');
          return;
        }
        if (parcelasDetalhe.some(p => Number(p.valor || 0) <= 0)) {
          mostrarToast('Valor de parcela deve ser maior que zero', 'erro');
          return;
        }
      }

      const valorUnitInformado = parseNumeroInput(get('compraValorUnit'));
      const valorTotalInformado = parseNumeroInput(get('compraValorTotalItem'));
      let valorUnitFinal = valorUnitInformado === '' ? 0 : Number(valorUnitInformado);
      if (valorTotalInformado !== '' && Number(valorTotalInformado) >= 0) {
        if (!quantidadeFinal || quantidadeFinal <= 0) {
          mostrarToast('Quantidade invalida para calcular valor unitario', 'erro');
          return;
        }
        valorUnitFinal = Number((Number(valorTotalInformado) / Number(quantidadeFinal)).toFixed(6));
      }
      if (!isFinite(valorUnitFinal) || valorUnitFinal <= 0) {
        mostrarToast('Informe valor unitario ou valor total valido', 'erro');
        return;
      }

      const dados = {
        tipo,
        item: get('compraItem'),
        quantidade: quantidadeFinal,
        unidade: tipo === 'MADEIRA' ? 'M3' : get('compraUnidade'),
        categoria,
        fornecedor: get('compraFornecedor'),
        pago_por: get('compraPagoPor'),
        valor_unit: valorUnitFinal,
        valor_total_item: valorTotalInformado === '' ? '' : Number(valorTotalInformado),
        observacao: get('compraObservacao'),
        comprimento_cm,
        largura_cm,
        espessura_cm,
        potencia: get('compraPotencia'),
        voltagem: get('compraVoltagem'),
        comprado_em: compradoEm,
        data_pagamento: dataPagamento,
        data_vencimento: dataVencimento,
        forma_pagamento: formaPagamento,
        parcelas,
        parcelas_detalhe: parcelasDetalhe,
        vida_util_mes: parseNumeroInput(get('compraVidaUtilMes')) || ''
      };
      const dadosFormulario = { ...dados };
      const origemRefAtual = String(origemRefazerId || '').trim();

      if (!editandoId && origemRefazerId) {
        dados.origem_compra_id = origemRefazerId;
      }

      setSalvando(true);
      const eraEdicao = !!editandoId;
      const idAtual = String(editandoId || '').trim();
      const snapshot = eraEdicao ? ComprasStore.getById(idAtual) : null;
      const optimisticId = eraEdicao
        ? idAtual
        : (window.AppEntityMutations?.tempId?.('CMP_TMP') || `CMP_TMP_${Date.now()}`);
      const optimisticItem = buildCompraOptimistic(dados, {
        baseItem: snapshot,
        id: optimisticId
      });

      try {
        if (!window.AppOptimistic?.enqueue) {
          throw new Error('Fila de sincronizacao indisponivel');
        }
        window.AppOptimistic.enqueue({
          scope: 'compra',
          handler: eraEdicao ? 'compra.update' : 'compra.create',
          entityKey: `compra:${optimisticId}`,
          payload: dados,
          meta: {
            domain: 'compra',
            action: eraEdicao ? 'update' : 'create',
            source: 'compras',
            target_id: eraEdicao ? idAtual : '',
            temp_id: eraEdicao ? '' : optimisticId,
            before_item: snapshot ? limparCompraMeta(snapshot) : null,
            optimistic_item: limparCompraMeta(optimisticItem)
          }
        });
        setSalvando(false);
        editandoId = null;
        origemRefazerId = null;
        finalizarUX();
        window.AppModalUI?.closeAll?.();
        mostrarToast(eraEdicao
          ? 'Alteracao aplicada localmente. Sincronizando...'
          : 'Compra criada localmente. Sincronizando...');
      } catch (error) {
        setSalvando(false);
        mostrarToast(error?.message || 'Erro ao enfileirar compra', 'erro');
        reabrirFormularioAposErro(dadosFormulario, {
          editando: eraEdicao,
          id: idAtual,
          origemRefazerId: eraEdicao ? '' : origemRefAtual
        });
      }
    }

    function finalizarUX() {
      ComprasUI.fecharFormulario();
    }

    function editar(id) {
      if (!podeAlterarDados('Edicao bloqueada em modo somente leitura')) return;
      const item = ComprasStore.getById(id);

      if (!item) {
        mostrarToast('Item nao encontrado', 'erro');
        return;
      }
      if (getCompraUiState(item).blockActions) {
        mostrarToast('Esta compra possui uma sincronizacao pendente.', 'erro');
        return;
      }

      editandoId = id;
      origemRefazerId = null;
      ComprasUI.preencherFormulario(item);
      ComprasUI.mostrarFormulario();
    }

    function refazer(id) {
      if (!podeAlterarDados('Adicao bloqueada em modo somente leitura')) return;
      const item = ComprasStore.getById(id);

      if (!item) {
        mostrarToast('Compra nao encontrada', 'erro');
        return;
      }
      if (getCompraUiState(item).blockActions) {
        mostrarToast('Esta compra possui uma sincronizacao pendente.', 'erro');
        return;
      }

      const clone = {
        ...item,
        comprado_em: getDataHojeISO(),
        adicionado_estoque: false,
        estoque_id: '',
        origem_compra_id: ''
      };

      delete clone.ID;
      delete clone.criado_em;

      editandoId = null;
      origemRefazerId = id;
      ComprasUI.preencherFormulario(clone);
      ComprasUI.definirTituloFormulario('Revise a nova compra');
      ComprasUI.mostrarFormulario();
    }

    function excluir(id) {
      if (!podeAlterarDados('Exclusao bloqueada em modo somente leitura')) return;
      if (!confirm('Deseja remover esta compra?')) return;

      const snapshot = ComprasStore.getById(id);
      if (!snapshot) {
        mostrarToast('Compra nao encontrada', 'erro');
        return;
      }
      if (getCompraUiState(snapshot).blockActions) {
        mostrarToast('Esta compra ja possui uma sincronizacao pendente.', 'erro');
        return;
      }

      try {
        if (!window.AppOptimistic?.enqueue) {
          throw new Error('Fila de sincronizacao indisponivel');
        }
        window.AppOptimistic.enqueue({
          scope: 'compra',
          handler: 'compra.delete',
          entityKey: `compra:${String(id || '').trim()}`,
          payload: {
            id: String(id || '').trim()
          },
          meta: {
            domain: 'compra',
            action: 'delete',
            source: 'compras',
            target_id: String(id || '').trim(),
            before_item: limparCompraMeta(snapshot),
            optimistic_item: limparCompraMeta(snapshot)
          }
        });
        mostrarToast('Exclusao aplicada localmente. Sincronizando...');
      } catch (error) {
        mostrarToast(error?.message || 'Erro ao enfileirar exclusao da compra', 'erro');
      }
    }

    function adicionarAoEstoque(id) {
      if (!podeAlterarDados('Atualizacao bloqueada em modo somente leitura')) return;
      if (adicionandoAoEstoque.has(id)) return;
      if (!confirm('Adicionar esta compra ao estoque?')) return;

      const snapshot = ComprasStore.getById(id);
      if (!snapshot) {
        mostrarToast('Compra nao encontrada', 'erro');
        return;
      }
      if (getCompraUiState(snapshot).blockActions) {
        mostrarToast('Esta compra ja possui uma sincronizacao pendente.', 'erro');
        return;
      }

      const jaAdicionada = String(snapshot.adicionado_estoque).toLowerCase() === 'true';
      if (jaAdicionada) {
        mostrarToast('Compra ja adicionada ao estoque', 'erro');
        return;
      }

      adicionandoAoEstoque.add(id);
      try {
        if (!window.AppOptimistic?.enqueue) {
          throw new Error('Fila de sincronizacao indisponivel');
        }
        window.AppOptimistic.enqueue({
          scope: 'compra',
          handler: 'compra.add_stock',
          entityKey: `compra:${String(id || '').trim()}`,
          payload: {
            id: String(id || '').trim()
          },
          meta: {
            domain: 'compra',
            action: 'add_stock',
            source: 'compras',
            target_id: String(id || '').trim(),
            before_item: limparCompraMeta(snapshot),
            optimistic_item: limparCompraMeta(applyAdicionarAoEstoqueCompra(snapshot))
          }
        });
        mostrarToast('Adicao ao estoque aplicada localmente. Sincronizando...');
      } catch (error) {
        mostrarToast(error?.message || 'Erro ao enfileirar adicao ao estoque', 'erro');
      } finally {
        adicionandoAoEstoque.delete(id);
      }
    }

    function limparEdicao() {
      editandoId = null;
      origemRefazerId = null;
    }

    function registrarPagamento(id) {
      if (!podeAlterarDados('Pagamento bloqueado em modo somente leitura')) return;
      if (salvandoPagamento) return;

      const item = ComprasStore.getById(id);
      if (!item) {
        mostrarToast('Compra nao encontrada', 'erro');
        return;
      }
      if (getCompraUiState(item).blockActions) {
        mostrarToast('Esta compra ja possui uma sincronizacao pendente.', 'erro');
        return;
      }

      const pendente = Number(item.total_pendente || 0);
      if (pendente <= 0.009) {
        mostrarToast('Compra ja esta paga');
        return;
      }

      const formas = Array.isArray(validacoes?.formasPagamento) ? validacoes.formasPagamento : [];
      if (formas.length === 0) {
        mostrarToast('Cadastre FORMA_PAGAMENTO na aba VALIDACAO', 'erro');
        return;
      }

      pagamentoCompraId = id;
      const abriu = ComprasUI.abrirModalPagamentoCompra(item);
      if (!abriu) {
        pagamentoCompraId = null;
      }
    }

    function reabrirModalPagamentoCompraAposErro(compraId, dados) {
      const id = String(compraId || '').trim();
      if (!id) return;
      const item = ComprasStore.getById(id);
      if (!item) return;
      const abriu = ComprasUI.abrirModalPagamentoCompra(item);
      if (!abriu) return;
      ComprasUI.preencherModalPagamentoCompra?.(dados || {});
      pagamentoCompraId = id;
    }

    function confirmarPagamentoCompra() {
      if (!podeAlterarDados('Pagamento bloqueado em modo somente leitura')) return;
      if (salvandoPagamento) return;
      if (!pagamentoCompraId) {
        mostrarToast('Compra nao selecionada para pagamento', 'erro');
        return;
      }

      const dados = ComprasUI.lerModalPagamentoCompra();
      const valorPago = Number(String(dados.valor_pago || '').replace(',', '.'));
      if (!dados.data_pagamento) {
        mostrarToast('Data de pagamento e obrigatoria', 'erro');
        return;
      }
      if (!dados.forma_pagamento) {
        mostrarToast('Forma de pagamento e obrigatoria', 'erro');
        return;
      }
      if (dados.parcelado && !dados.parcela_alvo_id) {
        mostrarToast('Selecione a parcela pendente', 'erro');
        return;
      }
      if (!isFinite(valorPago) || valorPago <= 0) {
        mostrarToast('Valor pago invalido', 'erro');
        return;
      }
      const compraId = pagamentoCompraId;
      const dadosFormulario = { ...dados };
      const itemAntes = ComprasStore.getById(compraId);
      if (!itemAntes) {
        mostrarToast('Compra nao encontrada', 'erro');
        return;
      }
      const optimisticItem = applyPagamentoCompra(itemAntes, {
        data_pagamento: dados.data_pagamento,
        valor_pago: valorPago,
        parcela_alvo_id: dados.parcela_alvo_id,
        forma_pagamento: dados.forma_pagamento,
        observacao: dados.observacao
      });

      salvandoPagamento = true;
      setBloqueioMutacaoPagamento(true);
      ComprasUI.fecharModalPagamentoCompra();
      pagamentoCompraId = null;
      try {
        if (!window.AppOptimistic?.enqueue) {
          throw new Error('Fila de sincronizacao indisponivel');
        }
        window.AppOptimistic.enqueue({
          scope: 'compra',
          handler: 'compra.payment',
          entityKey: `compra:${String(compraId || '').trim()}`,
          payload: {
            data_pagamento: dados.data_pagamento,
            valor_pago: valorPago,
            parcela_alvo_id: dados.parcela_alvo_id,
            forma_pagamento: dados.forma_pagamento,
            observacao: dados.observacao
          },
          meta: {
            domain: 'compra',
            action: 'payment',
            source: 'compras',
            target_id: String(compraId || '').trim(),
            before_item: limparCompraMeta(itemAntes),
            optimistic_item: limparCompraMeta(optimisticItem)
          }
        });
        salvandoPagamento = false;
        setBloqueioMutacaoPagamento(false);
        window.AppModalUI?.closeAll?.();
        mostrarToast('Pagamento aplicado localmente. Sincronizando...');
      } catch (error) {
        salvandoPagamento = false;
        setBloqueioMutacaoPagamento(false);
        mostrarToast(error?.message || 'Erro ao enfileirar pagamento', 'erro');
        reabrirModalPagamentoCompraAposErro(compraId, dadosFormulario);
      }
    }

    function cancelarPagamentoCompra() {
      pagamentoCompraId = null;
      salvandoPagamento = false;
      setBloqueioMutacaoPagamento(false);
      ComprasUI.fecharModalPagamentoCompra();
    }

    return {
      init,
      syncFromBackend,
      salvar,
      editar,
      refazer,
      registrarPagamento,
      confirmarPagamentoCompra,
      cancelarPagamentoCompra,
      retryCompraMutation,
      excluir,
      adicionarAoEstoque,
      limparEdicao
    };

  })();
</script>
