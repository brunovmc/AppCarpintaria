<script>
  window.ComprasController = (() => {

    let editandoId = null;
    let origemRefazerId = null;
    let iniciado = false;
    let salvando = false;
    const adicionandoAoEstoque = new Set();

    let validacoes = null;

    function getDataHojeISO() {
      const agora = new Date();
      const yyyy = agora.getFullYear();
      const mm = String(agora.getMonth() + 1).padStart(2, '0');
      const dd = String(agora.getDate()).padStart(2, '0');
      return `${yyyy}-${mm}-${dd}`;
    }

    function setSalvando(ativo) {
      salvando = !!ativo;
      const btn = document.getElementById('btnSalvarCompra');
      if (!btn) return;
      btn.disabled = salvando;
      btn.textContent = salvando ? 'Salvando...' : 'Salvar';
    }

    function init() {
      if (iniciado) return;

      carregarValidacoes();
      carregarCompras();

      iniciado = true;
    }

    function carregarValidacoes() {
      google.script.run
        .withSuccessHandler(data => {
          validacoes = data || {};

          validacoes.tipos ||= [];
          validacoes.unidades ||= [];
          validacoes.categorias ||= [];
          validacoes.categoriasPorTipo ||= {};
          validacoes.fornecedores ||= [];

          if (typeof window !== 'undefined') {
            window.AppValidacoesCache = {
              ...(window.AppValidacoesCache || {}),
              tipos: validacoes.tipos,
              categorias: validacoes.categorias,
              categoriasPorTipo: validacoes.categoriasPorTipo
            };
          }

          ComprasUI.renderTipos?.(validacoes.tipos);
          ComprasUI.renderUnidades?.(validacoes.unidades);
          ComprasUI.renderCategorias?.(validacoes.categorias, validacoes.categoriasPorTipo);
          ComprasUI.renderFornecedores?.(validacoes.fornecedores);
          ComprasUI.renderFiltroRapidoTipos?.(validacoes.tipos);
          if (typeof popularFiltrosDoPainelCompras === 'function') {
            popularFiltrosDoPainelCompras();
          }
        })
        .obterValidacoes();
    }

    function categoriaValidaParaTipo(tipo, categoria) {
      const t = String(tipo || '').trim().toUpperCase();
      const c = String(categoria || '').trim().toUpperCase();
      if (!t || !c) return false;

      const mapa = validacoes?.categoriasPorTipo || {};
      const categoriasTipo = Array.isArray(mapa[t]) ? mapa[t] : [];
      if (categoriasTipo.length > 0) {
        return categoriasTipo.some(v => String(v || '').trim().toUpperCase() === c);
      }

      return (Array.isArray(validacoes?.categorias) ? validacoes.categorias : [])
        .some(v => String(v || '').trim().toUpperCase() === c);
    }

    function renderListaAtual() {
      if (window.aplicarBuscaCompras) {
        aplicarBuscaCompras();
        return;
      }
      ComprasUI.renderLista(ComprasStore.get());
    }

    function carregarCompras() {
      google.script.run
        .withSuccessHandler(lista => {
          ComprasStore.set(lista);
          renderListaAtual();
        })
        .listarCompras();
    }

    function salvar() {
      if (salvando) return;

      const get = id => document.getElementById(id)?.value || '';
      const parseNumeroInput = valor => {
        const s = String(valor ?? '').trim();
        if (s === '') return '';
        const n = Number(s.replace(',', '.'));
        return isNaN(n) ? '' : n;
      };

      const tipo = get('compraTipo');
      const compradoEm = String(get('compraCompradoEm') || '').trim();
      const categoria = get('compraCategoria');

      if (!compradoEm) {
        mostrarToast('Campo "Comprado em" e obrigatorio', 'erro');
        return;
      }
      if (!categoriaValidaParaTipo(tipo, categoria)) {
        mostrarToast('Categoria invalida para o tipo selecionado', 'erro');
        return;
      }

      const comprimentoInput = tipo === 'MADEIRA' ? parseNumeroInput(get('compraComprimentoCm')) : '';
      const larguraInput = tipo === 'MADEIRA' ? parseNumeroInput(get('compraLarguraCm')) : '';
      const espessuraInput = tipo === 'MADEIRA' ? parseNumeroInput(get('compraEspessuraCm')) : '';

      const comprimento_cm = tipo === 'MADEIRA' ? Number(comprimentoInput || 0) : '';
      const largura_cm = tipo === 'MADEIRA' ? Number(larguraInput || 0) : '';
      const espessura_cm = tipo === 'MADEIRA' ? Number(espessuraInput || 0) : '';

      if (tipo === 'MADEIRA' && (comprimento_cm <= 0 || largura_cm <= 0 || espessura_cm <= 0)) {
        mostrarToast('Para MADEIRA, informe comprimento, largura e espessura validos', 'erro');
        return;
      }

      const qtdMadeira = tipo === 'MADEIRA'
        ? Number(((comprimento_cm * largura_cm * espessura_cm) / 1000000).toFixed(2))
        : '';

      const dados = {
        tipo,
        item: get('compraItem'),
        quantidade: tipo === 'MADEIRA' ? qtdMadeira : parseNumeroInput(get('compraQuantidade')) || 0,
        unidade: tipo === 'MADEIRA' ? 'M3' : get('compraUnidade'),
        categoria,
        fornecedor: get('compraFornecedor'),
        valor_unit: parseNumeroInput(get('compraValorUnit')) || 0,
        observacao: get('compraObservacao'),
        comprimento_cm,
        largura_cm,
        espessura_cm,
        potencia: get('compraPotencia'),
        voltagem: get('compraVoltagem'),
        comprado_em: compradoEm,
        vida_util_mes: parseNumeroInput(get('compraVidaUtilMes')) || ''
      };

      if (!editandoId && origemRefazerId) {
        dados.origem_compra_id = origemRefazerId;
      }

      setSalvando(true);

      if (editandoId) {
        const idAtual = editandoId;
        const snapshot = { ...ComprasStore.getById(idAtual) };

        ComprasStore.update(idAtual, dados);
        renderListaAtual();
        finalizarUX();

        google.script.run
          .withFailureHandler(() => {
            ComprasStore.update(idAtual, snapshot);
            renderListaAtual();
            mostrarToast('Erro ao salvar edicao', 'erro');
            setSalvando(false);
          })
          .withSuccessHandler(() => {
            mostrarToast('Salvo com sucesso');
            setSalvando(false);
          })
          .atualizarItemCompra(idAtual, dados);

        editandoId = null;
        origemRefazerId = null;
        return;
      }

      const tempId = `tmp_${Date.now()}`;
      const itemTemp = {
        ID: tempId,
        ...dados
      };

      ComprasStore.add(itemTemp);
      renderListaAtual();
      finalizarUX();
      mostrarToast('Salvando...');

      google.script.run
        .withFailureHandler(() => {
          ComprasStore.remove(tempId);
          renderListaAtual();
          mostrarToast('Erro ao salvar compra', 'erro');
          setSalvando(false);
        })
        .withSuccessHandler(itemSalvo => {
          ComprasStore.remove(tempId);

          if (!itemSalvo || !itemSalvo.ID) {
            mostrarToast('Salvo. Atualizando lista...');
            carregarCompras();
            setSalvando(false);
            return;
          }

          ComprasStore.add(itemSalvo);
          renderListaAtual();
          mostrarToast('Salvo com sucesso');
          setSalvando(false);
        })
        .criarItemCompra(dados);
    }

    function finalizarUX() {
      ComprasUI.fecharFormulario();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function editar(id) {
      const item = ComprasStore.getById(id);

      if (!item) {
        mostrarToast('Item nao encontrado', 'erro');
        return;
      }

      editandoId = id;
      origemRefazerId = null;
      ComprasUI.preencherFormulario(item);
      ComprasUI.mostrarFormulario();
    }

    function refazer(id) {
      const item = ComprasStore.getById(id);

      if (!item) {
        mostrarToast('Compra nao encontrada', 'erro');
        return;
      }

      const clone = {
        ...item,
        comprado_em: getDataHojeISO(),
        adicionado_estoque: false,
        estoque_id: '',
        origem_compra_id: ''
      };

      delete clone.ID;
      delete clone.criado_em;

      editandoId = null;
      origemRefazerId = id;
      ComprasUI.preencherFormulario(clone);
      ComprasUI.definirTituloFormulario('Revise a nova compra');
      ComprasUI.mostrarFormulario();
    }

    function excluir(id) {
      if (!confirm('Deseja remover esta compra?')) return;

      const snapshot = ComprasStore.getById(id);

      ComprasStore.remove(id);
      renderListaAtual();
      mostrarToast('Compra removida');

      google.script.run
        .withFailureHandler(() => {
          ComprasStore.add(snapshot);
          renderListaAtual();
          mostrarToast('Erro ao remover', 'erro');
        })
        .deletarItemCompra(id);
    }

    function adicionarAoEstoque(id) {
      if (adicionandoAoEstoque.has(id)) return;
      if (!confirm('Adicionar esta compra ao estoque?')) return;

      const snapshot = ComprasStore.getById(id);
      if (!snapshot) {
        mostrarToast('Compra nao encontrada', 'erro');
        return;
      }

      const jaAdicionada = String(snapshot.adicionado_estoque).toLowerCase() === 'true';
      if (jaAdicionada) {
        mostrarToast('Compra ja adicionada ao estoque', 'erro');
        return;
      }

      adicionandoAoEstoque.add(id);
      mostrarToast('Adicionando ao estoque...');

      google.script.run
        .withFailureHandler(() => {
          adicionandoAoEstoque.delete(id);
          mostrarToast('Erro ao adicionar ao estoque', 'erro');
        })
        .withSuccessHandler(resp => {
          adicionandoAoEstoque.delete(id);
          ComprasStore.update(id, {
            adicionado_estoque: true,
            estoque_id: resp?.compraAtualizada?.estoque_id || resp?.itemEstoqueCriado?.ID || ''
          });
          renderListaAtual();
          if (resp?.itemEstoqueCriado && window.EstoqueStore) {
            // Se o estoque ainda nao foi carregado, add nao liga o flag isLoaded.
            const atual = EstoqueStore.isLoaded() ? EstoqueStore.get() : [];
            EstoqueStore.set([resp.itemEstoqueCriado, ...atual]);
            if (typeof aplicarBuscaEstoque === 'function') {
              aplicarBuscaEstoque();
            } else if (window.EstoqueUI?.renderLista) {
              EstoqueUI.renderLista(EstoqueStore.get());
            }
          }
          if (window.EstoqueController?.syncFromBackend) {
            EstoqueController.syncFromBackend();
          }
          mostrarToast('Adicionado ao estoque');
        })
        .adicionarCompraAoEstoque(id);
    }

    function limparEdicao() {
      editandoId = null;
      origemRefazerId = null;
    }

    return {
      init,
      salvar,
      editar,
      refazer,
      excluir,
      adicionarAoEstoque,
      limparEdicao
    };

  })();
</script>
