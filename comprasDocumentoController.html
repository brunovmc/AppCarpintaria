<script>
  window.ComprasDocumentoController = (() => {
    const MAX_FILES = 5;
    const MAX_IMAGE_DIMENSION = 2200;
    const JPEG_QUALITY = 0.86;
    let iniciado = false;
    let expandido = false;
    let carregando = false;
    let documentos = [];
    let validacoes = {};
    let estoque = [];
    const busyIds = new Set();

    const byId = id => document.getElementById(id);
    const escapeHtml = valor => String(valor ?? '')
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#039;');
    const numero = valor => {
      if (window.AppDomainUtils?.parseNumeroOptional) {
        const parsed = window.AppDomainUtils.parseNumeroOptional(valor);
        return parsed === '' ? 0 : Number(parsed);
      }
      return Number(String(valor || '0').replace(',', '.')) || 0;
    };
    const moeda = valor => Number(valor || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

    function encontrarCard(id) {
      return [...(byId('listaDocumentosCompra')?.querySelectorAll('[data-doc-id]') || [])]
        .find(card => String(card.dataset.docId || '') === String(id || '')) || null;
    }

    function encontrarLinhaItem(id) {
      return [...(byId('listaDocumentosCompra')?.querySelectorAll('[data-item-id]') || [])]
        .find(row => String(row.dataset.itemId || '') === String(id || '')) || null;
    }

    function ambiente() {
      const ctx = window.AppDbEnv?.getContext?.() || {};
      return String(ctx.effective_env || ctx.selected_env || '').trim().toLowerCase();
    }

    function init() {
      if (!iniciado) {
        bind();
        iniciado = true;
      }
      carregar(false);
    }

    function bind() {
      byId('btnUploadDocumentoCompra')?.addEventListener('click', () => byId('inputDocumentoCompra')?.click());
      byId('inputDocumentoCompra')?.addEventListener('change', evento => processarArquivos(evento.target.files));
      byId('btnToggleDocumentosCompra')?.addEventListener('click', () => setExpandido(!expandido));
      byId('btnAtualizarDocumentosCompra')?.addEventListener('click', () => carregar(true));
      byId('btnBuscarDocumentosCompraDrive')?.addEventListener('click', importarDrive);
      byId('listaDocumentosCompra')?.addEventListener('input', tratarInputLista);
      byId('listaDocumentosCompra')?.addEventListener('change', tratarChangeLista);
    }

    function setExpandido(ativo) {
      expandido = !!ativo;
      byId('comprasDocumentosInboxConteudo')?.classList.toggle('hidden', !expandido);
      const btn = byId('btnToggleDocumentosCompra');
      if (btn) {
        btn.setAttribute('aria-expanded', expandido ? 'true' : 'false');
        btn.textContent = expandido ? 'Recolher' : 'Ver pendencias';
      }
    }

    function setCarregando(ativo, texto) {
      carregando = !!ativo;
      ['btnUploadDocumentoCompra', 'btnAtualizarDocumentosCompra', 'btnBuscarDocumentosCompraDrive'].forEach(id => {
        const el = byId(id);
        if (el) el.disabled = carregando;
      });
      mostrarStatus(carregando ? (texto || 'Carregando documentos...') : '', false);
    }

    function mostrarStatus(texto, erro) {
      const el = byId('comprasDocumentosStatus');
      if (!el) return;
      el.textContent = String(texto || '');
      el.classList.toggle('hidden', !texto);
      el.classList.toggle('despesas-inbox-status-erro', !!erro);
      el.classList.toggle('despesas-inbox-status-info', !erro);
    }

    function carregar(forcar) {
      if (carregando && !forcar) return;
      setCarregando(true, 'Carregando documentos de compra...');
      window.AppRequest.call('obterContextoInboxDocumentosCompra', [ambiente()], {
        context: 'compras.documentos.contexto',
        errorMessage: 'Erro ao carregar documentos de compra'
      }).then(contexto => {
        documentos = Array.isArray(contexto?.documentos) ? contexto.documentos : [];
        validacoes = contexto?.validacoes || {};
        estoque = Array.isArray(contexto?.estoque) ? contexto.estoque : [];
        renderDrive(contexto?.drive || {});
        render();
        if (documentos.length > 0) setExpandido(true);
        setCarregando(false);
      }).catch(error => {
        setCarregando(false);
        mostrarStatus(error?.message || 'Erro ao carregar documentos de compra.', true);
      });
    }

    function renderDrive(drive) {
      const el = byId('comprasDocumentosDriveStatus');
      if (!el) return;
      const entrada = drive?.pastas?.entrada;
      if (!drive?.configurado || !entrada?.url) {
        el.classList.add('hidden');
        el.innerHTML = '';
        return;
      }
      el.classList.remove('hidden');
      el.classList.add('despesas-inbox-status-info');
      const env = ambiente();
      const automacao = drive.gatilho_instalado
        ? ' · busca automatica de PROD ativa'
        : (env === 'prod'
          ? ' · <button type="button" onclick="ComprasDocumentoController.ativarBuscaAutomatica()">Ativar busca a cada 5 min</button>'
          : ' · em DEV, use Buscar no Drive');
      el.innerHTML = `Pasta de entrada ${escapeHtml((drive.ambiente || env || 'prod').toUpperCase())}: <a href="${escapeHtml(entrada.url)}" target="_blank" rel="noopener">${escapeHtml(entrada.nome || 'Entrada')}</a>${automacao}`;
    }

    function render() {
      const resumo = byId('comprasDocumentosResumo');
      if (resumo) resumo.textContent = documentos.length === 1
        ? '1 documento aguardando revisao.'
        : `${documentos.length} documentos aguardando revisao.`;
      const lista = byId('listaDocumentosCompra');
      if (!lista) return;
      if (documentos.length === 0) {
        lista.innerHTML = '<div class="empty-state">Nenhum documento aguardando revisao.</div>';
        return;
      }
      lista.innerHTML = documentos.map(renderDocumento).join('');
      documentos.forEach(doc => atualizarVisibilidadePagamento(doc.ID));
    }

    function renderDocumento(doc) {
      const id = escapeHtml(doc.ID);
      const busy = busyIds.has(String(doc.ID));
      const arquivos = (doc.arquivos_nomes || []).map((nome, index) => {
        const url = doc.arquivos_urls?.[index];
        return url
          ? `<a href="${escapeHtml(url)}" target="_blank" rel="noopener">${escapeHtml(nome)}</a>`
          : `<span>${escapeHtml(nome)}</span>`;
      }).join(' · ');
      if (doc.status === 'ERRO' && (!doc.itens || doc.itens.length === 0)) {
        return `<article class="despesa-inbox-item despesa-inbox-item-erro" data-doc-id="${id}">
          <div class="despesa-inbox-item-topo"><strong>${arquivos || 'Documento sem nome'}</strong><span class="despesa-inbox-badge">ERRO</span></div>
          <p class="despesa-inbox-meta">${escapeHtml(doc.erro || 'Nao foi possivel ler este documento.')}</p>
          <div class="despesas-inbox-card-acoes"><button type="button" onclick="ComprasDocumentoController.descartar('${id}')" ${busy ? 'disabled' : ''}>Descartar</button></div>
        </article>`;
      }
      const alertas = [...(doc.alertas || []), ...(doc.erro ? [doc.erro] : [])];
      const pagamentoIntegrado = !!doc.pagamento_id_confirmado;
      const possuiIntegracao = !!doc.compra_id_financeira || !!doc.pagamento_id_confirmado || (doc.itens || []).some(item => !!item.estoque_id_resultante);
      return `<article class="despesa-inbox-item compra-documento-card" data-doc-id="${id}">
        <div class="despesa-inbox-item-topo">
          <strong>${escapeHtml(doc.fornecedor || doc.numero_pedido || doc.numero_documento || 'Documento de compra')}</strong>
          <span class="despesa-inbox-badge">${escapeHtml(doc.status || 'REVISAR')}</span>
        </div>
        <div class="despesa-inbox-meta">${arquivos || 'Arquivo original indisponivel'} · confianca ${Math.round(Number(doc.confianca || 0) * 100)}%</div>
        ${alertas.length ? `<div class="despesas-inbox-alertas">${alertas.map(a => `<span>${escapeHtml(a)}</span>`).join('')}</div>` : ''}
        <div class="compra-documento-grid">
          ${campo(id, 'fornecedor', 'Fornecedor', doc.fornecedor)}
          ${campo(id, 'numero_documento', 'Numero da nota/recibo', doc.numero_documento)}
          ${campo(id, 'numero_pedido', 'Numero do pedido', doc.numero_pedido)}
          ${campo(id, 'tipo_documento', 'Tipo de documento', doc.tipo_documento)}
          ${campo(id, 'data_compra', 'Data da compra', doc.data_compra, 'date')}
          ${campo(id, 'data_vencimento', 'Primeiro vencimento', doc.data_vencimento, 'date', pagamentoIntegrado ? 'disabled' : '')}
          ${selectCampo(id, 'pago_por', 'Pago por', doc.pago_por, validacoes.pagosPor || [], 'Selecione')}
          ${selectCampo(id, 'forma_pagamento', 'Forma de pagamento', doc.forma_pagamento, validacoes.formasPagamento || [], 'Nao identificada', pagamentoIntegrado ? 'disabled' : '')}
          ${campo(id, 'parcelas', 'Parcelas', doc.parcelas || 1, 'number', `min="1" step="1" ${pagamentoIntegrado ? 'disabled' : ''}`)}
          ${campo(id, 'frete', 'Frete (R$)', doc.frete, 'number', 'min="0" step="0.01"')}
          ${campo(id, 'desconto', 'Desconto (R$)', doc.desconto, 'number', 'min="0" step="0.01"')}
          ${campo(id, 'subtotal', 'Subtotal dos itens', doc.subtotal, 'number', 'readonly step="0.01"')}
          ${campo(id, 'valor_total', 'Total do documento', doc.valor_total, 'number', 'readonly step="0.01"')}
        </div>
        <div class="compra-documento-checks">
          <label><input type="checkbox" data-doc-field="recebido" ${doc.recebido ? 'checked' : ''}> Marcar todos os itens como recebidos</label>
          <label><input type="checkbox" data-doc-field="pagamento_confirmado" ${doc.pagamento_confirmado ? 'checked' : ''} ${doc.pagamento_id_confirmado ? 'disabled' : ''}> ${doc.pagamento_id_confirmado ? 'Pagamento ja registrado' : `Registrar pagamento agora${doc.pagamento_detectado ? ' (pagamento detectado)' : ''}`}</label>
        </div>
        <div class="compra-documento-pagamento" data-payment-panel="${id}">
          ${campo(id, 'data_pagamento', 'Data do pagamento', doc.data_pagamento, 'date', pagamentoIntegrado ? 'disabled' : '')}
          ${campo(id, 'valor_pago_confirmado', 'Valor pago agora', doc.valor_pago_confirmado || 0, 'number', `min="0" step="0.01" ${pagamentoIntegrado ? 'disabled' : ''}`)}
        </div>
        <div class="compra-documento-itens-head">
          <div><strong>Itens do documento</strong><span data-item-count> · ${(doc.itens || []).length} linha(s)</span></div>
          <button type="button" onclick="ComprasDocumentoController.adicionarItem('${id}')">Adicionar item</button>
        </div>
        <div class="compra-documento-itens">${(doc.itens || []).map(item => renderItem(doc, item)).join('')}</div>
        <div class="campo-ajuda-wrap compras-documento-observacao"><span class="campo-ajuda-tag">Observacao</span><textarea data-doc-field="observacao">${escapeHtml(doc.observacao || '')}</textarea></div>
        <div class="despesas-inbox-card-acoes">
          <button type="button" onclick="ComprasDocumentoController.confirmar('${id}')" ${busy ? 'disabled' : ''}>${busy ? 'Confirmando...' : 'Confirmar documento'}</button>
          ${possuiIntegracao ? '' : `<button type="button" onclick="ComprasDocumentoController.descartar('${id}')" ${busy ? 'disabled' : ''}>Descartar</button>`}
        </div>
      </article>`;
    }

    function campo(id, field, label, value, type = 'text', attrs = '') {
      return `<div class="campo-ajuda-wrap"><span class="campo-ajuda-tag">${escapeHtml(label)}</span><input data-doc-field="${escapeHtml(field)}" type="${type}" value="${escapeHtml(value ?? '')}" ${attrs}></div>`;
    }

    function selectCampo(id, field, label, value, options, vazio, attrs = '') {
      return `<div class="campo-ajuda-wrap"><span class="campo-ajuda-tag">${escapeHtml(label)}</span><select data-doc-field="${escapeHtml(field)}" ${attrs}>${optionsHtml(options, value, vazio)}</select></div>`;
    }

    function optionsHtml(options, atual, vazio) {
      const atualNorm = String(atual || '');
      const lista = [...new Set((Array.isArray(options) ? options : []).map(String).filter(Boolean))];
      if (atualNorm && !lista.includes(atualNorm)) lista.unshift(atualNorm);
      return `<option value="">${escapeHtml(vazio || 'Selecione')}</option>` + lista.map(item =>
        `<option value="${escapeHtml(item)}" ${item === atualNorm ? 'selected' : ''}>${escapeHtml(item)}</option>`
      ).join('');
    }

    function renderItem(doc, item) {
      const id = escapeHtml(item.ID);
      const entradaIniciada = !!item.movimento_id || !!item.estoque_id_resultante;
      const bloqueado = entradaIniciada ? 'disabled' : '';
      const estoqueOptions = estoque
        .filter(est => !item.tipo || String(est.tipo).toUpperCase() === String(item.tipo).toUpperCase())
        .map(est => ({ value: est.ID, label: `${est.item} · ${est.quantidade} ${est.unidade}` }));
      const categorias = categoriasParaTipo(item.tipo);
      return `<div class="compra-documento-item" data-item-id="${id}">
        <div class="compra-documento-item-origem"><strong>${escapeHtml(item.descricao_original || item.item_nome || `Item ${item.ordem}`)}</strong>${item.sku ? `<span>SKU ${escapeHtml(item.sku)}</span>` : ''}${entradaIniciada ? `<span>Entrada de estoque ${escapeHtml(item.movimento_status || 'INICIADA')}</span>` : ''}${entradaIniciada ? '' : `<button type="button" onclick="ComprasDocumentoController.removerItem('${id}')">Remover</button>`}</div>
        <div class="compra-documento-item-grid">
          ${itemCampo('item_nome', 'Nome no estoque', item.item_nome, 'text', bloqueado)}
          ${itemSelect('destino', 'Destino', item.destino, [
            { value: 'ESTOQUE', label: 'Estoque' }, { value: 'CONSUMO', label: 'Consumo imediato' },
            { value: 'EQUIPAMENTO', label: 'Equipamento' }, { value: 'IGNORAR', label: 'Ignorar' }
          ], 'Selecione', entradaIniciada)}
          ${itemSelectSimples('tipo', 'Tipo', item.tipo, validacoes.tipos || [], 'Selecione', entradaIniciada)}
          ${itemSelectSimples('categoria', 'Categoria', item.categoria, categorias, 'Selecione', entradaIniciada)}
          ${itemSelectSimples('unidade', 'Unidade da compra', item.unidade, validacoes.unidades || [], 'Selecione', entradaIniciada)}
          ${itemCampo('quantidade', 'Quantidade', item.quantidade, 'number', `min="0" step="0.000001" ${bloqueado}`)}
          ${itemCampo('valor_unitario', 'Valor unitario', item.valor_unitario, 'number', `min="0" step="0.01" ${bloqueado}`)}
          ${itemCampo('valor_total', 'Total da linha', item.valor_total, 'number', `min="0" step="0.01" ${bloqueado}`)}
          ${itemCampo('comprimento_cm', 'Comprimento (cm)', item.comprimento_cm || '', 'number', `min="0" step="0.01" ${bloqueado}`)}
          ${itemCampo('largura_cm', 'Largura (cm)', item.largura_cm || '', 'number', `min="0" step="0.01" ${bloqueado}`)}
          ${itemCampo('espessura_cm', 'Espessura (cm)', item.espessura_cm || '', 'number', `min="0" step="0.01" ${bloqueado}`)}
          ${itemSelect('estoque_id_alvo', 'Somar em item existente', item.estoque_id_alvo, estoqueOptions, 'Criar novo item/lote', entradaIniciada)}
        </div>
        <label class="compra-documento-item-recebido"><input type="checkbox" data-item-field="recebido" ${item.recebido ? 'checked' : ''} ${bloqueado}> ${entradaIniciada ? 'Entrada deste item ja processada' : 'Item recebido e pronto para entrar no estoque'}</label>
      </div>`;
    }

    function itemCampo(field, label, value, type = 'text', attrs = '') {
      return `<div class="campo-ajuda-wrap"><span class="campo-ajuda-tag">${escapeHtml(label)}</span><input data-item-field="${field}" type="${type}" value="${escapeHtml(value ?? '')}" ${attrs}></div>`;
    }

    function itemSelect(field, label, atual, options, vazio = 'Selecione', disabled = false) {
      const opts = (options || []).map(opt => typeof opt === 'string' ? { value: opt, label: opt } : opt);
      return `<div class="campo-ajuda-wrap"><span class="campo-ajuda-tag">${escapeHtml(label)}</span><select data-item-field="${field}" ${disabled ? 'disabled' : ''}><option value="">${escapeHtml(vazio)}</option>${opts.map(opt => `<option value="${escapeHtml(opt.value)}" ${String(opt.value) === String(atual || '') ? 'selected' : ''}>${escapeHtml(opt.label)}</option>`).join('')}</select></div>`;
    }

    function itemSelectSimples(field, label, atual, options, vazio, disabled = false) {
      return `<div class="campo-ajuda-wrap"><span class="campo-ajuda-tag">${escapeHtml(label)}</span><select data-item-field="${field}" ${disabled ? 'disabled' : ''}>${optionsHtml(options, atual, vazio)}</select></div>`;
    }

    function categoriasParaTipo(tipo) {
      return validacoes?.categoriasPorTipo?.[String(tipo || '').toUpperCase()] || validacoes.categorias || [];
    }

    function tratarInputLista(evento) {
      const alvo = evento.target;
      const card = alvo.closest?.('[data-doc-id]');
      if (!card) return;
      if (alvo.matches('[data-item-field="quantidade"], [data-item-field="valor_unitario"]')) {
        const row = alvo.closest('[data-item-id]');
        const qtd = numero(row?.querySelector('[data-item-field="quantidade"]')?.value);
        const unit = numero(row?.querySelector('[data-item-field="valor_unitario"]')?.value);
        const total = row?.querySelector('[data-item-field="valor_total"]');
        if (total && qtd > 0 && unit > 0) total.value = (qtd * unit).toFixed(2);
      } else if (alvo.matches('[data-item-field="valor_total"]')) {
        const row = alvo.closest('[data-item-id]');
        const qtd = numero(row?.querySelector('[data-item-field="quantidade"]')?.value);
        const total = numero(alvo.value);
        const unit = row?.querySelector('[data-item-field="valor_unitario"]');
        if (unit && qtd > 0 && total > 0) unit.value = (total / qtd).toFixed(2);
      }
      if (alvo.matches('[data-item-field="quantidade"], [data-item-field="valor_unitario"], [data-item-field="valor_total"], [data-doc-field="frete"], [data-doc-field="desconto"]')) {
        recalcularTotaisCard(card);
      }
    }

    function tratarChangeLista(evento) {
      const alvo = evento.target;
      const card = alvo.closest?.('[data-doc-id]');
      if (!card) return;
      if (alvo.matches('[data-doc-field="recebido"]')) {
        card.querySelectorAll('[data-item-field="recebido"]').forEach(input => { input.checked = alvo.checked; });
      }
      if (alvo.matches('[data-doc-field="pagamento_confirmado"]')) {
        atualizarVisibilidadePagamento(card.dataset.docId);
        const valor = card.querySelector('[data-doc-field="valor_pago_confirmado"]');
        if (alvo.checked && valor && numero(valor.value) <= 0) {
          const total = numero(card.querySelector('[data-doc-field="valor_total"]')?.value);
          const parcelas = Math.max(1, Math.floor(numero(card.querySelector('[data-doc-field="parcelas"]')?.value) || 1));
          valor.value = (total / parcelas).toFixed(2);
        }
      }
      if (alvo.matches('[data-item-field="tipo"]')) {
        const row = alvo.closest('[data-item-id]');
        const select = row?.querySelector('[data-item-field="categoria"]');
        if (select) select.innerHTML = optionsHtml(categoriasParaTipo(alvo.value), '', 'Selecione');
      }
    }

    function recalcularTotaisCard(card) {
      const soma = [...card.querySelectorAll('[data-item-field="valor_total"]')].reduce((acc, input) => acc + numero(input.value), 0);
      const frete = numero(card.querySelector('[data-doc-field="frete"]')?.value);
      const desconto = numero(card.querySelector('[data-doc-field="desconto"]')?.value);
      const subtotal = card.querySelector('[data-doc-field="subtotal"]');
      const total = card.querySelector('[data-doc-field="valor_total"]');
      if (subtotal) subtotal.value = soma.toFixed(2);
      if (total) total.value = (soma + frete - desconto).toFixed(2);
    }

    function atualizarVisibilidadePagamento(id) {
      const card = encontrarCard(id);
      const marcado = card?.querySelector('[data-doc-field="pagamento_confirmado"]')?.checked;
      card?.querySelector('[data-payment-panel]')?.classList.toggle('hidden', !marcado);
    }

    function atualizarContagemItens(card) {
      const total = card?.querySelectorAll('[data-item-id]')?.length || 0;
      const label = card?.querySelector('[data-item-count]');
      if (label) label.textContent = ` · ${total} linha(s)`;
    }

    function adicionarItem(documentoId) {
      const card = encontrarCard(documentoId);
      const container = card?.querySelector('.compra-documento-itens');
      if (!card || !container) return;
      const documento = documentos.find(item => String(item.ID) === String(documentoId)) || {};
      const item = {
        ID: `NOVO_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`,
        ordem: container.querySelectorAll('[data-item-id]').length + 1,
        descricao_original: 'Item adicionado manualmente',
        item_nome: '', tipo: '', categoria: '', unidade: '', quantidade: 1,
        comprimento_cm: '', largura_cm: '', espessura_cm: '', valor_unitario: 0,
        valor_total: 0, destino: 'ESTOQUE', estoque_id_alvo: '', recebido: false
      };
      container.insertAdjacentHTML('beforeend', renderItem(documento, item));
      atualizarContagemItens(card);
      container.lastElementChild?.scrollIntoView?.({ behavior: 'smooth', block: 'nearest' });
    }

    function removerItem(itemId) {
      const row = encontrarLinhaItem(itemId);
      const card = row?.closest?.('[data-doc-id]');
      if (!row || !card) return;
      if (card.querySelectorAll('[data-item-id]').length <= 1) {
        mostrarToast('O documento precisa manter ao menos um item.', 'erro');
        return;
      }
      if (!confirm('Remover esta linha do documento? A alteracao sera salva ao confirmar.')) return;
      row.remove();
      recalcularTotaisCard(card);
      atualizarContagemItens(card);
    }

    function lerPayload(id) {
      const card = encontrarCard(id);
      if (!card) throw new Error('Documento nao encontrado na tela.');
      const get = field => card.querySelector(`[data-doc-field="${field}"]`);
      const payload = {
        _db_env: ambiente(),
        fornecedor: get('fornecedor')?.value || '', numero_documento: get('numero_documento')?.value || '',
        numero_pedido: get('numero_pedido')?.value || '', tipo_documento: get('tipo_documento')?.value || '',
        data_compra: get('data_compra')?.value || '', data_vencimento: get('data_vencimento')?.value || '',
        pago_por: get('pago_por')?.value || '', forma_pagamento: get('forma_pagamento')?.value || '',
        parcelas: Math.max(1, Math.floor(numero(get('parcelas')?.value) || 1)),
        frete: numero(get('frete')?.value), desconto: numero(get('desconto')?.value),
        subtotal: numero(get('subtotal')?.value), valor_total: numero(get('valor_total')?.value),
        recebido: !!get('recebido')?.checked, pagamento_confirmado: !!get('pagamento_confirmado')?.checked,
        data_pagamento: get('data_pagamento')?.value || '', valor_pago_confirmado: numero(get('valor_pago_confirmado')?.value),
        observacao: get('observacao')?.value || '',
        itens: [...card.querySelectorAll('[data-item-id]')].map(row => {
          const itemGet = field => row.querySelector(`[data-item-field="${field}"]`);
          return {
            ID: row.dataset.itemId, item_nome: itemGet('item_nome')?.value || '', destino: itemGet('destino')?.value || '',
            tipo: itemGet('tipo')?.value || '', categoria: itemGet('categoria')?.value || '', unidade: itemGet('unidade')?.value || '',
            quantidade: numero(itemGet('quantidade')?.value), valor_unitario: numero(itemGet('valor_unitario')?.value),
            valor_total: numero(itemGet('valor_total')?.value), comprimento_cm: numero(itemGet('comprimento_cm')?.value),
            largura_cm: numero(itemGet('largura_cm')?.value), espessura_cm: numero(itemGet('espessura_cm')?.value),
            estoque_id_alvo: itemGet('estoque_id_alvo')?.value || '', recebido: !!itemGet('recebido')?.checked
          };
        })
      };
      return payload;
    }

    function confirmar(id) {
      if (busyIds.has(String(id))) return;
      let payload;
      try { payload = lerPayload(id); } catch (error) { mostrarToast(error.message, 'erro'); return; }
      busyIds.add(String(id)); render();
      window.AppRequest.call('confirmarDocumentoCompra', [id, payload], {
        context: 'compras.documentos.confirmar', errorMessage: 'Erro ao confirmar documento de compra'
      }).then(() => {
        mostrarToast('Documento confirmado e dados integrados.');
        window.AppTabRefresh?.markDirty?.('dashboard');
        window.AppTabRefresh?.markDirty?.('estoque');
        window.AppTabRefresh?.markDirty?.('compras');
        window.ComprasController?.syncFromBackend?.();
      }).catch(error => {
        mostrarToast(error?.message || 'Erro ao confirmar documento.', 'erro');
        carregar(true);
      }).finally(() => { busyIds.delete(String(id)); });
    }

    function descartar(id) {
      if (busyIds.has(String(id)) || !confirm('Descartar este documento de compra?')) return;
      busyIds.add(String(id)); render();
      window.AppRequest.call('descartarDocumentoCompra', [id, ambiente()], {
        context: 'compras.documentos.descartar', errorMessage: 'Erro ao descartar documento'
      }).then(() => {
        documentos = documentos.filter(doc => String(doc.ID) !== String(id));
        render(); mostrarToast('Documento descartado.');
      }).catch(error => mostrarToast(error?.message || 'Erro ao descartar documento.', 'erro'))
        .finally(() => { busyIds.delete(String(id)); });
    }

    function importarDrive() {
      if (carregando) return;
      setCarregando(true, 'Buscando documentos na pasta do Drive...');
      window.AppRequest.call('importarDocumentosCompraDriveParaInbox', [5, ambiente()], {
        context: 'compras.documentos.drive', errorMessage: 'Erro ao importar documentos do Drive'
      }).then(resultado => {
        mostrarToast(`${resultado?.adicionados || 0} documento(s) adicionado(s) para revisao.`);
        setCarregando(false); carregar(true);
      }).catch(error => { setCarregando(false); mostrarStatus(error?.message || 'Erro ao importar do Drive.', true); });
    }

    function ativarBuscaAutomatica() {
      window.AppRequest.call('instalarTriggerImportacaoDocumentosCompraDrive', [5, ambiente()], {
        context: 'compras.documentos.drive.trigger', errorMessage: 'Erro ao ativar busca automatica'
      }).then(() => {
        mostrarToast('Busca automatica de documentos ativada a cada 5 minutos.');
        carregar(true);
      }).catch(error => mostrarToast(error?.message || 'Erro ao ativar busca automatica.', 'erro'));
    }

    async function processarArquivos(fileList) {
      const input = byId('inputDocumentoCompra');
      const files = [...(fileList || [])];
      if (input) input.value = '';
      if (files.length === 0) return;
      if (files.length > MAX_FILES) { mostrarToast(`Selecione no maximo ${MAX_FILES} arquivos.`, 'erro'); return; }
      setCarregando(true, 'Preparando e lendo o documento...');
      try {
        const arquivos = await Promise.all(files.map(prepararArquivo));
        const resultado = await window.AppRequest.call('processarDocumentoCompraUpload', [{ arquivos, _db_env: ambiente() }], {
          context: 'compras.documentos.upload', errorMessage: 'Erro ao processar documento de compra'
        });
        if (resultado?.duplicado) mostrarToast('Este documento ja estava na Inbox.');
        else if (resultado?.status === 'ERRO') mostrarToast(resultado.erro || 'O documento nao pode ser lido.', 'erro');
        else mostrarToast('Documento lido. Revise os itens antes de confirmar.');
        setCarregando(false); carregar(true); setExpandido(true);
      } catch (error) {
        setCarregando(false); mostrarStatus(error?.message || 'Erro ao preparar documento.', true);
      }
    }

    function lerDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ''));
        reader.onerror = () => reject(new Error(`Nao foi possivel ler ${file.name}.`));
        reader.readAsDataURL(file);
      });
    }

    async function prepararArquivo(file) {
      const dataUrl = await lerDataUrl(file);
      if (file.type === 'application/pdf' || !String(file.type || '').startsWith('image/')) {
        return { nome: file.name, mime_type: file.type, data_url: dataUrl };
      }
      return compactarImagem(file, dataUrl);
    }

    function compactarImagem(file, dataUrl) {
      return new Promise(resolve => {
        const img = new Image();
        img.onload = () => {
          try {
            const escala = Math.min(1, MAX_IMAGE_DIMENSION / Math.max(img.naturalWidth, img.naturalHeight));
            const canvas = document.createElement('canvas');
            canvas.width = Math.max(1, Math.round(img.naturalWidth * escala));
            canvas.height = Math.max(1, Math.round(img.naturalHeight * escala));
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, canvas.width, canvas.height); ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            const compactada = canvas.toDataURL('image/jpeg', JPEG_QUALITY);
            const nome = file.name.replace(/\.[^.]+$/, '') + '.jpg';
            resolve({ nome, mime_type: 'image/jpeg', data_url: compactada });
          } catch (error) {
            resolve({ nome: file.name, mime_type: file.type, data_url: dataUrl });
          }
        };
        img.onerror = () => resolve({ nome: file.name, mime_type: file.type, data_url: dataUrl });
        img.src = dataUrl;
      });
    }

    return { init, carregar, confirmar, descartar, ativarBuscaAutomatica, adicionarItem, removerItem };
  })();
</script>
