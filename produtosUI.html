<script>
  window.ProdutosUI = (() => {
    let cardAberto = null;
    let delegationInit = false;
    let listaFiltradaAtual = [];
    let qtdRenderizada = 0;
    let renderJobSeq = 0;

    let opcoesEstoque = [];
    let opcoesProdutos = [];
    let receitasPorProduto = {};
    let tiposEntradaValidacao = [];
    let unidadesValidacao = [];
    let categoriasValidacao = [];
    let categoriasPorTipoValidacao = {};

    const RENDER_CHUNK_SIZE = 10;

    /* =========================
       HELPERS
    ========================== */
    function el() {
      return {
        formulario: document.getElementById('formularioProduto'),
        lista: document.getElementById('listaProdutos'),

        nome: document.getElementById('produtoNome'),
        modeloCard: document.getElementById('produtoModeloCard'),
        modeloNome: document.getElementById('produtoModeloNome'),
        modeloDescricao: document.getElementById('produtoModeloDescricao'),
        modeloEntradas: document.getElementById('produtoModeloEntradas'),
        modeloSaidas: document.getElementById('produtoModeloSaidas'),
        modeloEtapas: document.getElementById('produtoModeloEtapas'),
        modeloDatalists: document.getElementById('produtoModeloDatalists'),
        formTitulo: document.getElementById('produtoFormTitulo')
      };
    }

    function normalizarListaValidacao(lista) {
      const map = new Map();
      (Array.isArray(lista) ? lista : []).forEach(v => {
        const label = String(v || '').trim();
        if (!label) return;
        const chave = label.toUpperCase();
        if (!map.has(chave)) {
          map.set(chave, label);
        }
      });
      return [...map.values()];
    }

    function normalizarMapaCategoriasPorTipo(mapa) {
      const out = {};
      if (!mapa || typeof mapa !== 'object') return out;

      Object.keys(mapa).forEach(tipo => {
        const chave = String(tipo || '').trim().toUpperCase();
        if (!chave) return;
        out[chave] = normalizarListaValidacao(mapa[tipo] || []);
      });

      return out;
    }

    function setOpcoesReceitas({ estoque, produtos, tipos, unidades, categorias, categoriasPorTipo } = {}) {
      opcoesEstoque = Array.isArray(estoque) ? estoque : [];
      opcoesProdutos = Array.isArray(produtos) ? produtos : [];
      tiposEntradaValidacao = normalizarListaValidacao(tipos)
        .map(t => t.toUpperCase());
      unidadesValidacao = normalizarListaValidacao(unidades);
      categoriasValidacao = normalizarListaValidacao(categorias);
      categoriasPorTipoValidacao = normalizarMapaCategoriasPorTipo(categoriasPorTipo);
      renderDatalistsFormulario();

      document.querySelectorAll('.linha-receita-entrada').forEach(row => {
        const tipo = String(row.querySelector('.entrada-tipo')?.value || '').toUpperCase();
        const categoriaSel = row.querySelector('.entrada-categoria');
        const categoriaAtual = categoriaSel ? categoriaSel.value : '';
        if (categoriaSel) {
          categoriaSel.innerHTML = renderOpcoesCategoria(categoriaAtual, tipo);
        }
        sincronizarLinhaEntradaMadeira(row);
      });
    }

    function parseNumero(valor) {
      const s = String(valor ?? '').trim();
      if (s === '') return 0;
      const n = Number(s.replace(',', '.'));
      return isNaN(n) ? 0 : n;
    }

    function formatNumero(valor, casas = 2) {
      const n = Number(valor || 0);
      if (isNaN(n)) return '-';
      return n.toFixed(casas);
    }

    function formatarNumeroInput(valor, casas = 6) {
      const n = Number(valor || 0);
      if (!isFinite(n) || n <= 0) return '';
      return n.toFixed(casas).replace(/\.?0+$/, '');
    }

    function calcularVolumeM3(comp, larg, esp) {
      const c = parseNumero(comp);
      const l = parseNumero(larg);
      const e = parseNumero(esp);
      if (!c || !l || !e) return 0;
      return (c * l * e) / 1000000;
    }

    function sincronizarLinhaEntradaMadeira(row) {
      if (!row) return;
      const tipo = String(row.querySelector('.entrada-tipo')?.value || '').toUpperCase();
      const isMadeira = tipo === 'MADEIRA';

      const unidadeInput = row.querySelector('.entrada-unidade');
      const compInput = row.querySelector('.entrada-comp');
      const largInput = row.querySelector('.entrada-larg');
      const espInput = row.querySelector('.entrada-esp');
      const qtdInput = row.querySelector('.entrada-qtd');

      if (compInput) compInput.classList.toggle('hidden', !isMadeira);
      if (largInput) largInput.classList.toggle('hidden', !isMadeira);
      if (espInput) espInput.classList.toggle('hidden', !isMadeira);

      if (qtdInput) {
        const eraAutoMadeira = qtdInput.dataset.autoMadeira === '1';
        qtdInput.dataset.autoMadeira = isMadeira ? '1' : '0';
        qtdInput.readOnly = isMadeira;
        qtdInput.step = isMadeira ? '0.000001' : '0.01';
        qtdInput.placeholder = isMadeira ? 'Quantidade (m3)' : 'Quantidade';
        if (!isMadeira && eraAutoMadeira) {
          qtdInput.value = '';
        }
      }

      if (unidadeInput) {
        unidadeInput.disabled = isMadeira;
        if (isMadeira) {
          setSelectByValidation(unidadeInput, 'M3');
        }
      }

      if (!isMadeira || !qtdInput) return;
      const volumeM3 = calcularVolumeM3(
        compInput?.value || '',
        largInput?.value || '',
        espInput?.value || ''
      );
      qtdInput.value = volumeM3 > 0 ? formatarNumeroInput(volumeM3, 6) : '';
    }

    function proximoFrame(fn) {
      let executado = false;
      const run = () => {
        if (executado) return;
        executado = true;
        fn();
      };
      if (typeof window !== 'undefined' && typeof window.requestAnimationFrame === 'function') {
        window.requestAnimationFrame(run);
      }
      setTimeout(run, 80);
    }

    function getTiposEstoque() {
      const tipos = new Set();
      (opcoesEstoque || []).forEach(item => {
        if (item && item.tipo) {
          tipos.add(String(item.tipo || '').toUpperCase());
        }
      });
      return [...tipos];
    }

    function getTiposEntrada() {
      return [...tiposEntradaValidacao].sort((a, b) => a.localeCompare(b));
    }

    function getUnidadesValidacao() {
      return [...unidadesValidacao].sort((a, b) => a.localeCompare(b));
    }

    function getCategoriasValidacao() {
      return [...categoriasValidacao].sort((a, b) => a.localeCompare(b));
    }

    function getCategoriasParaTipo(tipo) {
      const t = String(tipo || '').trim().toUpperCase();
      const categoriasTipo = Array.isArray(categoriasPorTipoValidacao[t])
        ? categoriasPorTipoValidacao[t]
        : [];
      return categoriasTipo.length > 0 ? categoriasTipo : getCategoriasValidacao();
    }

    function setSelectByValidation(select, valor) {
      if (!select) return;
      const alvo = String(valor || '').trim().toUpperCase();
      if (!alvo) {
        select.value = '';
        return;
      }
      const opt = [...select.options].find(o =>
        String(o.value || '').trim().toUpperCase() === alvo
      );
      select.value = opt ? opt.value : '';
    }

    function isTipoEstoque(tipo) {
      const t = String(tipo || '').toUpperCase();
      return getTiposEstoque().includes(t);
    }

    function getEstoquePorId(id) {
      if (!id) return null;
      return opcoesEstoque.find(i => i.ID === id) || null;
    }

    function getEstoquePorNome(tipo, nome) {
      const n = String(nome || '').trim();
      if (!n) return null;
      const byId = opcoesEstoque.find(i => i.ID === n);
      if (byId) return byId;
      return opcoesEstoque.find(i =>
        String(i.tipo || '').toUpperCase() === String(tipo || '').toUpperCase() &&
        (i.item || '') === n
      ) || null;
    }

    function getEstoqueNome(id) {
      const item = getEstoquePorId(id);
      return item ? (item.item || id) : id;
    }

    function getEstoqueUnidade(id) {
      const item = getEstoquePorId(id);
      return item ? (item.unidade || '') : '';
    }

    function getEstoqueCategoria(id) {
      const item = getEstoquePorId(id);
      return item ? (item.categoria || '') : '';
    }

    function getProdutoCategoria(id) {
      const item = opcoesProdutos.find(i => i.produto_id === id);
      return item ? (item.categoria || '') : '';
    }

    function getProdutoUnidade(id) {
      const item = opcoesProdutos.find(i => i.produto_id === id);
      return item ? (item.unidade_produto || 'UN') : 'UN';
    }

    function renderDatalistsFormulario() {
      const { modeloDatalists } = el();
      if (!modeloDatalists) return;
      modeloDatalists.innerHTML = renderProdutosDatalist('FORM') + renderEstoqueDatalists('FORM');
    }

    function contarCompativeis(entrada) {
      if (String(entrada.tipo_item || '').toUpperCase() !== 'MADEIRA') return 0;

      const comp = parseNumero(entrada.comprimento_cm);
      const larg = parseNumero(entrada.largura_cm);
      const esp = parseNumero(entrada.espessura_cm);

      if (!comp || !larg || !esp) return 0;

      return (opcoesEstoque || [])
        .filter(i => String(i.tipo || '').toUpperCase() === 'MADEIRA')
        .filter(i => {
          const c = parseNumero(i.comprimento_cm);
          const l = parseNumero(i.largura_cm);
          const e = parseNumero(i.espessura_cm);
          return c >= comp && l >= larg && e >= esp;
        }).length;
    }

    function getProdutoPorNome(nome) {
      const n = String(nome || '').trim();
      if (!n) return null;
      const byId = opcoesProdutos.find(p => p.produto_id === n);
      if (byId) return byId;
      return opcoesProdutos.find(p => (p.nome_produto || '') === n) || null;
    }

    function getProdutoNome(produtoId) {
      if (!produtoId) return '';
      const p = opcoesProdutos.find(i => i.produto_id === produtoId);
      return p ? (p.nome_produto || produtoId) : produtoId;
    }

    function getReceitasProduto(produtoId) {
      return Array.isArray(receitasPorProduto[produtoId]) ? receitasPorProduto[produtoId] : [];
    }

    function getReceitaPorNome(produtoId, nome) {
      const n = String(nome || '').trim();
      if (!n) return null;
      const lista = getReceitasProduto(produtoId);
      const byId = lista.find(r => r.receita_id === n);
      if (byId) return byId;
      return lista.find(r => (r.nome_receita || '') === n) || null;
    }

    function getReceitaNome(produtoId, receitaId) {
      if (!produtoId || !receitaId) return '';
      const r = getReceitasProduto(produtoId).find(i => i.receita_id === receitaId);
      return r ? (r.nome_receita || receitaId) : receitaId;
    }

    function ensureReceitasDatalist(produtoId) {
      const id = `receitasAutocomplete_${produtoId}`;
      let list = document.getElementById(id);
      if (!list) {
        list = document.createElement('datalist');
        list.id = id;
        document.body.appendChild(list);
      }
      return list;
    }

    function atualizarReceitasDatalist(produtoId) {
      if (!produtoId) return;
      const list = ensureReceitasDatalist(produtoId);
      const opts = getReceitasProduto(produtoId)
        .map(r => {
          const label = r.nome_receita || r.receita_id;
          return `<option value="${label}"></option>`;
        }).join('');
      list.innerHTML = opts;
    }

    function atualizarInputsReceita(produtoId) {
      const inputs = document.querySelectorAll(`.entrada-receita[data-produto-id="${produtoId}"]`);
      inputs.forEach(input => {
        const receitaId = input.dataset.receitaId || '';
        const nome = getReceitaNome(produtoId, receitaId);
        if (nome && input.value !== nome) {
          input.value = nome;
        }
      });
    }

    function atualizarEntradaProduto(input) {
      const row = input.closest('.linha-receita-entrada');
      if (!row) return;
      const produto = getProdutoPorNome(input.value || '');
      const produtoId = produto ? produto.produto_id : '';

      const prodIdInput = row.querySelector('.entrada-produto-id');
      const receitaInput = row.querySelector('.entrada-receita');
      const recIdInput = row.querySelector('.entrada-receita-id');
      const unidadeInput = row.querySelector('.entrada-unidade');
      const categoriaInput = row.querySelector('.entrada-categoria');

      if (prodIdInput) prodIdInput.value = produtoId;
      input.dataset.produtoId = produtoId;

      if (receitaInput) {
        receitaInput.value = '';
        receitaInput.dataset.receitaId = '';
        receitaInput.dataset.produtoId = produtoId;
        if (produtoId) {
          receitaInput.setAttribute('list', `receitasAutocomplete_${produtoId}`);
          if (window.ProdutosController?.carregarReceitasProdutoEntrada) {
            ProdutosController.carregarReceitasProdutoEntrada(produtoId);
          }
        } else {
          receitaInput.removeAttribute('list');
        }
      }

      if (recIdInput) recIdInput.value = '';

      setSelectByValidation(unidadeInput, produtoId ? getProdutoUnidade(produtoId) : '');
      setSelectByValidation(categoriaInput, produtoId ? getProdutoCategoria(produtoId) : '');
    }

    function atualizarEntradaReceita(input) {
      const row = input.closest('.linha-receita-entrada');
      if (!row) return;
      const produtoId = row.querySelector('.entrada-produto-id')?.value || '';
      if (!produtoId) return;
      const receita = getReceitaPorNome(produtoId, input.value || '');
      const receitaId = receita ? receita.receita_id : '';
      const recIdInput = row.querySelector('.entrada-receita-id');
      if (recIdInput) recIdInput.value = receitaId;
      input.dataset.receitaId = receitaId;
    }

    function atualizarEntradaEstoque(input) {
      const row = input.closest('.linha-receita-entrada');
      if (!row) return;
      const tipo = row.querySelector('.entrada-tipo')?.value || '';
      const item = getEstoquePorNome(tipo, input.value || '');
      const estoqueId = item ? item.ID : '';

      const estoqueIdInput = row.querySelector('.entrada-estoque-id');
      const unidadeInput = row.querySelector('.entrada-unidade');
      const categoriaInput = row.querySelector('.entrada-categoria');

      if (estoqueIdInput) estoqueIdInput.value = estoqueId;
      input.dataset.estoqueId = estoqueId;

      setSelectByValidation(unidadeInput, estoqueId ? (item.unidade || '') : '');
      setSelectByValidation(categoriaInput, estoqueId ? (item.categoria || '') : '');
    }

    function calcularCustoReceita(receita) {
      const entradas = Array.isArray(receita?.entradas) ? receita.entradas : [];
      const saidas = Array.isArray(receita?.saidas) ? receita.saidas : [];

      const totalEntradas = entradas.reduce((acc, e) => {
        const qtd = parseNumero(e.qtd_pecas);
        const custo = parseNumero(e.custo_manual);
        return acc + (qtd * custo);
      }, 0);

      const totalSaidas = saidas.reduce((acc, s) => {
        return acc + parseNumero(s.quantidade);
      }, 0);

      const custoUnit = totalSaidas > 0 ? (totalEntradas / totalSaidas) : 0;
      return { totalEntradas, totalSaidas, custoUnit };
    }

    function renderOpcoesTipoEntrada(selecionado) {
      const tipos = getTiposEntrada();
      const opts = tipos.map(t => {
        const sel = t === selecionado ? 'selected' : '';
        return `<option value="${t}" ${sel}>${t}</option>`;
      }).join('');
      return '<option value="">Tipo</option>' + opts;
    }

    function renderOpcoesSelect(lista, selecionado, placeholder) {
      const selecionadoUpper = String(selecionado || '').trim().toUpperCase();
      const opts = (Array.isArray(lista) ? lista : []).map(v => {
        const val = String(v || '').trim();
        if (!val) return '';
        const sel = val.toUpperCase() === selecionadoUpper ? 'selected' : '';
        return `<option value="${val}" ${sel}>${val}</option>`;
      }).join('');
      return `<option value="">${placeholder}</option>` + opts;
    }

    function renderOpcoesCategoria(selecionado, tipo = '') {
      return renderOpcoesSelect(getCategoriasParaTipo(tipo), selecionado, 'Categoria');
    }

    function renderOpcoesUnidade(selecionado) {
      return renderOpcoesSelect(getUnidadesValidacao(), selecionado, 'Unidade');
    }

    function renderEntradaEditRow(entrada = {}) {
      const tipo = String(entrada.tipo_item || '').toUpperCase();
      const isMadeira = tipo === 'MADEIRA';
      const dimsHidden = isMadeira ? '' : 'hidden';
      const qtdPlaceholder = isMadeira ? 'Quantidade (m3)' : 'Quantidade';
      const qtdStep = isMadeira ? '0.000001' : '0.01';
      const qtdReadonly = isMadeira ? 'readonly' : '';
      const qtdAutoData = isMadeira ? '1' : '0';
      const unidadeDisabled = isMadeira ? 'disabled' : '';

      return `
        <div class="linha-receita-entrada">
          <select class="entrada-tipo">
            ${renderOpcoesTipoEntrada(tipo)}
          </select>
          <input class="entrada-nome-item" placeholder="Nome do item" value="${entrada.nome_item || ''}">
          <select class="entrada-categoria">
            ${renderOpcoesCategoria(entrada.categoria || '', tipo)}
          </select>
          <select class="entrada-unidade" ${unidadeDisabled}>
            ${renderOpcoesUnidade(entrada.unidade || '')}
          </select>
          <input class="entrada-qtd" type="number" step="${qtdStep}" min="0" placeholder="${qtdPlaceholder}" value="${entrada.qtd_pecas ?? ''}" ${qtdReadonly} data-auto-madeira="${qtdAutoData}">
          <input class="entrada-comp ${dimsHidden}" type="number" step="0.01" min="0" placeholder="Comp (cm)" value="${entrada.comprimento_cm ?? ''}">
          <input class="entrada-larg ${dimsHidden}" type="number" step="0.01" min="0" placeholder="Larg (cm)" value="${entrada.largura_cm ?? ''}">
          <input class="entrada-esp ${dimsHidden}" type="number" step="0.01" min="0" placeholder="Esp (cm)" value="${entrada.espessura_cm ?? ''}">
          <input class="entrada-custo" type="number" step="0.01" min="0" placeholder="Custo unit" value="${entrada.custo_manual ?? ''}">
          <button class="btn-receita-remover-entrada">Remover</button>
        </div>
      `;
    }

    function renderSaidaEditRow(saida = {}) {
      return `
        <div class="linha-receita-saida">
          <input class="saida-nome" placeholder="Nome" value="${saida.nome_saida || ''}">
          <select class="saida-unidade">
            ${renderOpcoesUnidade(saida.unidade || '')}
          </select>
          <input class="saida-qtd" type="number" step="0.01" min="0" placeholder="Quantidade" value="${saida.quantidade ?? ''}">
          <button class="btn-receita-remover-saida">Remover</button>
        </div>
      `;
    }

    /* =========================
       FORMULARIO
    ========================== */
    function abrirFormularioNovo() {
      resetFormulario();
      mostrarFormulario();
    }

    function mostrarFormulario() {
      const { formulario } = el();
      if (!formulario) return;
      formulario.classList.remove('hidden');
    }

    function fecharFormulario() {
      const { formulario } = el();
      if (!formulario) return;
      formulario.classList.add('hidden');
      resetFormulario();

      if (window.ProdutosController) {
        ProdutosController.limparEdicao();
      }
    }

    function preencherFormulario(data) {
      const f = el();

      if (f.nome) f.nome.value = data.nome_produto || '';

      if (f.formTitulo) f.formTitulo.innerText = 'Editar Produto';
    }

    function renderLinhaEtapaModelo(etapa = {}) {
      return `
        <div class="linha-etapa">
          <input class="input-etapa-edit etapa-nome" value="${etapa.nome_etapa || ''}">
          <input class="etapa-ordem" type="number" step="1" min="1" value="${etapa.ordem ?? ''}">
          <button type="button" class="btn-modelo-remover-etapa">Remover</button>
        </div>
      `;
    }

    function adicionarEntradaModeloForm(entrada = {}) {
      const { modeloEntradas } = el();
      if (!modeloEntradas) return;
      modeloEntradas.insertAdjacentHTML('beforeend', renderEntradaEditRow(entrada, 'FORM'));
      const row = modeloEntradas.querySelector('.linha-receita-entrada:last-child');
      sincronizarLinhaEntradaMadeira(row);
    }

    function adicionarSaidaModeloForm(saida = {}) {
      const { modeloSaidas } = el();
      if (!modeloSaidas) return;
      modeloSaidas.insertAdjacentHTML('beforeend', renderSaidaEditRow(saida));
    }

    function adicionarEtapaModeloForm(etapa = {}) {
      const { modeloEtapas } = el();
      if (!modeloEtapas) return;
      modeloEtapas.insertAdjacentHTML('beforeend', renderLinhaEtapaModelo(etapa));
    }

    function preencherModeloFormulario(modelo = {}) {
      const f = el();
      if (!f.modeloCard) return;

      const dados = modelo?.dados || {};
      const entradas = Array.isArray(modelo?.entradas) ? modelo.entradas : [];
      const saidas = Array.isArray(modelo?.saidas) ? modelo.saidas : [];
      const etapas = Array.isArray(modelo?.etapas) ? modelo.etapas : [];

      if (f.modeloNome) f.modeloNome.value = dados.nome_receita || 'Modelo principal';
      if (f.modeloDescricao) f.modeloDescricao.value = dados.descricao || '';

      if (f.modeloEntradas) f.modeloEntradas.innerHTML = '';
      if (f.modeloSaidas) f.modeloSaidas.innerHTML = '';
      if (f.modeloEtapas) f.modeloEtapas.innerHTML = '';

      if (entradas.length > 0) {
        entradas.forEach(e => adicionarEntradaModeloForm(e));
      } else {
        adicionarEntradaModeloForm();
      }

      if (saidas.length > 0) {
        saidas.forEach(s => adicionarSaidaModeloForm(s));
      } else {
        adicionarSaidaModeloForm();
      }

      if (etapas.length > 0) {
        etapas.forEach(et => adicionarEtapaModeloForm(et));
      }

      renderDatalistsFormulario();
    }

    function resetModeloFormulario() {
      preencherModeloFormulario({
        dados: { nome_receita: 'Modelo principal', descricao: '' },
        entradas: [],
        saidas: [],
        etapas: []
      });
    }

    function obterModeloFormularioPayload() {
      const card = document.getElementById('produtoModeloCard');
      if (!card) {
        return {
          dados: { nome_receita: 'Modelo principal', descricao: '' },
          entradas: [],
          saidas: [],
          etapas: []
        };
      }

      const payloadReceita = coletarDadosReceita(card);
      const etapas = [...document.querySelectorAll('#produtoModeloEtapas .linha-etapa')]
        .map((row, idx) => ({
          nome_etapa: row.querySelector('.etapa-nome')?.value || '',
          ordem: row.querySelector('.etapa-ordem')?.value || (idx + 1)
        }))
        .filter(et => String(et.nome_etapa || '').trim() !== '');

      const nomeReceita = String(payloadReceita?.dados?.nome_receita || '').trim() || 'Modelo principal';

      return {
        dados: {
          nome_receita: nomeReceita,
          descricao: payloadReceita?.dados?.descricao || ''
        },
        entradas: payloadReceita?.entradas || [],
        saidas: payloadReceita?.saidas || [],
        etapas
      };
    }

    function resetFormulario() {
      const f = el();

      [f.nome].forEach(i => i && (i.value = ''));

      resetModeloFormulario();

      if (f.formTitulo) f.formTitulo.innerText = 'Novo Produto';
    }

    /* =========================
       RECEITAS
    ========================== */
    function renderEntradasResumo(entradas) {
      if (!Array.isArray(entradas) || entradas.length === 0) {
        return '<p>Nenhuma entrada.</p>';
      }

      return entradas.map(e => {
        const dims = `${e.comprimento_cm || '-'} x ${e.largura_cm || '-'} x ${e.espessura_cm || '-'} cm`;
        const qtd = e.qtd_pecas ?? '-';
        const tipo = String(e.tipo_item || '').toUpperCase() || '-';
        const qtdLabel = tipo === 'MADEIRA' ? 'Volume (m3)' : 'Quantidade';
        const custo = parseNumero(e.custo_manual) > 0
          ? `Custo unit: R$ ${formatNumero(e.custo_manual)}`
          : 'Custo unit: -';
        const titulo = e.nome_item || '-';

        return `
          <div class="linha-receita">
            <div><strong>${titulo}</strong></div>
            <div class="comp-meta">Tipo: ${tipo} | ${qtdLabel}: ${qtd}</div>
            <div class="comp-meta">Categoria: ${e.categoria || '-'}</div>
            <div class="comp-meta">Unidade: ${e.unidade || '-'}</div>
            ${tipo === 'MADEIRA' ? `<div class="comp-meta">Dimensoes: ${dims}</div>` : ''}
            <div class="comp-meta">${custo}</div>
          </div>
        `;
      }).join('');
    }

    function renderSaidasResumo(saidas, custoUnit) {
      if (!Array.isArray(saidas) || saidas.length === 0) {
        return '<p>Nenhuma saida.</p>';
      }

      const custoTexto = custoUnit > 0 ? `R$ ${formatNumero(custoUnit)}` : '-';

      return saidas.map(s => `
        <div class="linha-receita">
          <div><strong>${s.nome_saida || '-'}</strong></div>
          <div class="comp-meta">${s.quantidade || '-'} ${s.unidade || ''}</div>
          <div class="comp-meta">Custo unit: ${custoTexto}</div>
        </div>
      `).join('');
    }

    function renderReceita(receita, produtoId) {
      const entradas = Array.isArray(receita.entradas) ? receita.entradas : [];
      const saidas = Array.isArray(receita.saidas) ? receita.saidas : [];

      if (receita._editing) {
        return `
          <div class="receita-card editing" data-produto-id="${produtoId}" data-receita-id="${receita.receita_id}">
            <div class="receita-header">
              <input class="receita-nome" placeholder="Nome da receita" value="${receita.nome_receita || ''}">
            </div>
            <textarea class="receita-desc" placeholder="Descricao">${receita.descricao || ''}</textarea>

            <div class="bloco">
              <p><b>Entradas</b></p>
              <div class="receita-entradas">
                ${entradas.map(e => renderEntradaEditRow(e)).join('')}
              </div>
              <button class="btn-receita-add-entrada" data-produto-id="${produtoId}" data-receita-id="${receita.receita_id}">Adicionar entrada</button>
            </div>

            <div class="bloco">
              <p><b>Saidas</b></p>
              <div class="receita-saidas">
                ${saidas.map(renderSaidaEditRow).join('')}
              </div>
              <button class="btn-receita-add-saida" data-produto-id="${produtoId}" data-receita-id="${receita.receita_id}">Adicionar saida</button>
            </div>

            <div class="comp-acoes">
              <button class="btn-receita-salvar" data-produto-id="${produtoId}" data-receita-id="${receita.receita_id}">Salvar</button>
              <button class="btn-receita-cancelar" data-produto-id="${produtoId}" data-receita-id="${receita.receita_id}">Cancelar</button>
            </div>
          </div>
        `;
      }

      const custos = calcularCustoReceita(receita);
      const custoTotal = custos.totalEntradas > 0 ? `R$ ${formatNumero(custos.totalEntradas)}` : '-';
      const custoUnit = custos.custoUnit;

      return `
        <div class="receita-card" data-produto-id="${produtoId}" data-receita-id="${receita.receita_id}">
          <div class="receita-header">
            <strong>${receita.nome_receita || 'Receita'}</strong>
            <span class="receita-tag">Modelo</span>
          </div>
          ${receita.descricao ? `<div class="comp-meta">${receita.descricao}</div>` : ''}
          <div class="comp-meta">Custo total: ${custoTotal}</div>

          <div class="bloco">
            <p><b>Entradas</b></p>
            ${renderEntradasResumo(entradas)}
          </div>

          <div class="bloco">
            <p><b>Saidas</b></p>
            ${renderSaidasResumo(saidas, custoUnit)}
          </div>

          <div class="comp-acoes">
            <button class="btn-receita-editar" data-produto-id="${produtoId}" data-receita-id="${receita.receita_id}">Editar</button>
          </div>
        </div>
      `;
    }

    function renderReceitas(receitas, carregada, produtoId) {
      if (!carregada) {
        return `
          <p>Receitas nao carregadas.</p>
          <button class="btn-receita-carregar" data-produto-id="${produtoId}">Carregar receitas</button>
        `;
      }

      const lista = Array.isArray(receitas) ? receitas : [];
      const conteudo = lista.length === 0
        ? '<p>Nenhuma receita cadastrada.</p>'
        : lista.map(r => renderReceita(r, produtoId)).join('');

      return conteudo;
    }

    function renderProdutosDatalist(produtoId) {
      if (!produtoId) return '';
      const opts = (opcoesProdutos || [])
        .filter(p => p && p.produto_id)
        .map(p => {
          const label = p.nome_produto || p.produto_id;
          return `<option value="${label}"></option>`;
        }).join('');
      return `<datalist id="produtosAutocomplete_${produtoId}">${opts}</datalist>`;
    }

    function renderEstoqueDatalists(produtoId) {
      if (!produtoId) return '';
      const tiposSet = new Set();
      getTiposEstoque().forEach(t => tiposSet.add(String(t || '').toUpperCase()));
      getTiposEntrada()
        .filter(t => String(t || '').toUpperCase() !== 'PRODUTO')
        .forEach(t => tiposSet.add(String(t || '').toUpperCase()));

      const tipos = [...tiposSet];
      return tipos.map(tipo => {
        const tipoKey = String(tipo || '').replace(/[^a-zA-Z0-9]/g, '');
        const opts = (opcoesEstoque || [])
          .filter(i => String(i.tipo || '').toUpperCase() === String(tipo || '').toUpperCase())
          .map(i => {
            const label = i.item || i.ID;
            return `<option value="${label}"></option>`;
          }).join('');
        return `<datalist id="estoqueAutocomplete_${produtoId}_${tipoKey}">${opts}</datalist>`;
      }).join('');
    }

    function setReceitasProduto(produtoId, receitas) {
      if (!produtoId) return;
      receitasPorProduto[produtoId] = Array.isArray(receitas) ? receitas : [];
      atualizarReceitasDatalist(produtoId);
      atualizarInputsReceita(produtoId);
    }

    function coletarDadosReceita(card) {
      const nome = card.querySelector('.receita-nome')?.value || '';
      const descricao = card.querySelector('.receita-desc')?.value || '';

      const entradas = [...card.querySelectorAll('.linha-receita-entrada')].map(row => {
        const tipo = String(row.querySelector('.entrada-tipo')?.value || '').toUpperCase();
        const nomeItem = row.querySelector('.entrada-nome-item')?.value || '';

        return {
          tipo_item: tipo,
          nome_item: nomeItem,
          estoque_ref_id: '',
          produto_ref_id: '',
          receita_ref_id: '',
          categoria: row.querySelector('.entrada-categoria')?.value || '',
          unidade: row.querySelector('.entrada-unidade')?.value || '',
          qtd_pecas: row.querySelector('.entrada-qtd')?.value || '',
          comprimento_cm: row.querySelector('.entrada-comp')?.value || '',
          largura_cm: row.querySelector('.entrada-larg')?.value || '',
          espessura_cm: row.querySelector('.entrada-esp')?.value || '',
          custo_manual: row.querySelector('.entrada-custo')?.value || '',
          observacao: ''
        };
      });

      const saidas = [...card.querySelectorAll('.linha-receita-saida')].map(row => ({
        nome_saida: row.querySelector('.saida-nome')?.value || '',
        unidade: row.querySelector('.saida-unidade')?.value || '',
        quantidade: row.querySelector('.saida-qtd')?.value || ''
      }));

      return {
        dados: {
          nome_receita: nome,
          descricao
        },
        entradas,
        saidas
      };
    }

    /* =========================
       LISTA + CARDS
    ========================== */
    function montarCardProduto(i) {
      const div = document.createElement('div');
      div.className = 'card';
      div.dataset.id = i.produto_id;

      const receitas = Array.isArray(i.receitas) ? i.receitas : [];
      const receitasCarregadas = !!i.receitasCarregadas;
      const entradasDoCache = receitasCarregadas && receitas[0] && Array.isArray(receitas[0].entradas)
        ? receitas[0].entradas.length
        : 0;
      const saidasDoCache = receitasCarregadas && receitas[0] && Array.isArray(receitas[0].saidas)
        ? receitas[0].saidas.length
        : 0;

      const entradasTotal = Number(i.modelo_entradas_total || entradasDoCache || 0);
      const saidasTotal = Number(i.modelo_saidas_total || saidasDoCache || 0);
      const etapasTotal = Number(i.modelo_etapas_total || 0);
      const resumoModelo = (entradasTotal + saidasTotal + etapasTotal) > 0
        ? `Modelo: ${entradasTotal} entradas, ${saidasTotal} saidas, ${etapasTotal} etapas`
        : 'Modelo: nao configurado';

      div.innerHTML = `
        <div class="card-resumo">
          <strong>${i.nome_produto || i.produto_id}</strong><br>
          ${resumoModelo}
        </div>

        <button class="ver-mais">Ver mais</button>

        <div class="card-detalhes">
          <button class="fechar-card">X</button>

          <div class="bloco">
            <p><b>Receitas</b></p>
            ${renderReceitas(receitas, receitasCarregadas, i.produto_id)}
          </div>

          <div class="acoes">
            <button onclick="ProdutosController.enviarParaProducao('${i.produto_id}')">Criar OP</button>
            <button onclick="ProdutosController.editar('${i.produto_id}')">Editar</button>
            <button onclick="ProdutosController.excluir('${i.produto_id}')">Excluir</button>
          </div>
        </div>
      `;

      return div;
    }

    function renderLista(itens) {
      const { lista } = el();
      if (!lista) return;

      const abertoId = cardAberto ? cardAberto.dataset.id : null;
      cardAberto = null;
      renderJobSeq += 1;
      const jobId = renderJobSeq;
      lista.innerHTML = '';

      listaFiltradaAtual = Array.isArray(itens) ? itens : [];
      qtdRenderizada = 0;
      initDelegation();

      if (listaFiltradaAtual.length === 0) {
        lista.innerHTML = '<p>Nenhum produto cadastrado.</p>';
        return;
      }

      let idx = 0;
      const processarChunk = () => {
        if (jobId !== renderJobSeq) return;
        const limite = Math.min(idx + RENDER_CHUNK_SIZE, listaFiltradaAtual.length);
        const fragment = document.createDocumentFragment();
        for (; idx < limite; idx++) {
          fragment.appendChild(montarCardProduto(listaFiltradaAtual[idx]));
        }
        lista.appendChild(fragment);
        qtdRenderizada = idx;

        if (idx < listaFiltradaAtual.length) {
          proximoFrame(processarChunk);
          return;
        }

        document.querySelectorAll('.linha-receita-entrada').forEach(sincronizarLinhaEntradaMadeira);
        if (abertoId) {
          const alvo = lista.querySelector(`.card[data-id="${abertoId}"]`);
          if (alvo) {
            abrirCard(alvo);
          }
        }
      };

      proximoFrame(processarChunk);
    }

    /* =========================
       EVENT DELEGATION
    ========================== */
    function initDelegation() {
      if (delegationInit) return;
      delegationInit = true;

      document.addEventListener('click', e => {
        const card = e.target.closest('.card');
        const lista = document.getElementById('listaProdutos');

        if (card && lista && !lista.contains(card)) return;

        if (e.target.classList.contains('ver-mais')) {
          e.stopPropagation();
          abrirCard(card);
          if (card && window.ProdutosController) {
            ProdutosController.carregarReceitas(card.dataset.id);
          }
          return;
        }

        if (e.target.classList.contains('fechar-card')) {
          e.stopPropagation();
          fecharCard();
          return;
        }

        if (e.target.classList.contains('btn-receita-carregar')) {
          const produtoId = e.target.dataset.produtoId;
          if (window.ProdutosController) {
            ProdutosController.carregarReceitas(produtoId, true);
          }
          return;
        }

        if (e.target.classList.contains('btn-receita-editar')) {
          const produtoId = e.target.dataset.produtoId;
          const receitaId = e.target.dataset.receitaId;
          if (window.ProdutosController) {
            ProdutosController.iniciarEdicaoReceita(produtoId, receitaId);
          }
          return;
        }

        if (e.target.classList.contains('btn-receita-cancelar')) {
          const produtoId = e.target.dataset.produtoId;
          const receitaId = e.target.dataset.receitaId;
          if (window.ProdutosController) {
            ProdutosController.cancelarEdicaoReceita(produtoId, receitaId);
          }
          return;
        }

        if (e.target.classList.contains('btn-receita-salvar')) {
          const produtoId = e.target.dataset.produtoId;
          const receitaId = e.target.dataset.receitaId;
          const cardReceita = e.target.closest('.receita-card');
          if (cardReceita && window.ProdutosController) {
            const payload = coletarDadosReceita(cardReceita);
            ProdutosController.salvarReceita(produtoId, receitaId, payload.dados, payload.entradas, payload.saidas);
          }
          return;
        }

        if (e.target.classList.contains('btn-receita-add-entrada')) {
          const cardReceita = e.target.closest('.receita-card');
          const container = cardReceita?.querySelector('.receita-entradas');
          if (container) {
            container.insertAdjacentHTML('beforeend', renderEntradaEditRow({}));
            const row = container.querySelector('.linha-receita-entrada:last-child');
            sincronizarLinhaEntradaMadeira(row);
          }
          return;
        }

        if (e.target.classList.contains('btn-receita-add-saida')) {
          const cardReceita = e.target.closest('.receita-card');
          const container = cardReceita?.querySelector('.receita-saidas');
          if (container) {
            container.insertAdjacentHTML('beforeend', renderSaidaEditRow());
          }
          return;
        }

        if (e.target.classList.contains('btn-receita-remover-entrada')) {
          const linha = e.target.closest('.linha-receita-entrada');
          if (linha) linha.remove();
          return;
        }

        if (e.target.classList.contains('btn-receita-remover-saida')) {
          const linha = e.target.closest('.linha-receita-saida');
          if (linha) linha.remove();
          return;
        }

        if (e.target.classList.contains('btn-modelo-remover-etapa')) {
          const linha = e.target.closest('.linha-etapa');
          if (linha) linha.remove();
          return;
        }

        if (cardAberto && !cardAberto.contains(e.target)) {
          fecharCard();
        }
      });

      document.addEventListener('change', e => {
        if (e.target.classList.contains('entrada-tipo')) {
          const row = e.target.closest('.linha-receita-entrada');
          if (!row) return;
          const tipo = String(e.target.value || '').toUpperCase();
          const isMadeira = tipo === 'MADEIRA';
          const unidadeInput = row.querySelector('.entrada-unidade');
          const categoriaInput = row.querySelector('.entrada-categoria');
          const compInput = row.querySelector('.entrada-comp');
          const largInput = row.querySelector('.entrada-larg');
          const espInput = row.querySelector('.entrada-esp');

          if (!isMadeira) {
            if (compInput) compInput.value = '';
            if (largInput) largInput.value = '';
            if (espInput) espInput.value = '';
          }

          if (categoriaInput) {
            categoriaInput.innerHTML = renderOpcoesCategoria('', tipo);
          }
          if (unidadeInput) unidadeInput.value = '';
          if (categoriaInput) categoriaInput.value = '';
          sincronizarLinhaEntradaMadeira(row);

          return;
        }
      });

      document.addEventListener('input', e => {
        if (
          e.target.classList.contains('entrada-comp') ||
          e.target.classList.contains('entrada-larg') ||
          e.target.classList.contains('entrada-esp')
        ) {
          const row = e.target.closest('.linha-receita-entrada');
          sincronizarLinhaEntradaMadeira(row);
        }
      });

    }

    function abrirCard(card) {
      if (!card) return;

      if (cardAberto && cardAberto !== card) {
        fecharCard();
      }
      card.classList.add('aberto');
      cardAberto = card;
    }

    function fecharCard() {
      if (!cardAberto) return;
      cardAberto.classList.remove('aberto');
      cardAberto = null;
    }

    /* =========================
       API PUBLICA
    ========================== */
    return {
      abrirFormularioNovo,
      mostrarFormulario,
      fecharFormulario,
      preencherFormulario,
      resetFormulario,
      preencherModeloFormulario,
      resetModeloFormulario,
      obterModeloFormularioPayload,
      adicionarEntradaModeloForm,
      adicionarSaidaModeloForm,
      adicionarEtapaModeloForm,
      renderLista,
      setOpcoesReceitas,
      setReceitasProduto
    };

  })();
</script>
