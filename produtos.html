<div id="ordenacaoProdutos" class="lista-ordenacao-slot"></div>
<div id="listaProdutos"></div>

<div
  id="modalDetalhesProdutos"
  class="modal detail-workspace-modal hidden"
  role="dialog"
  aria-modal="true"
  aria-labelledby="modalDetalhesProdutosTitulo"
>
  <div class="modal-content detail-workspace">
    <header class="detail-workspace-header">
      <div class="detail-workspace-heading">
        <span class="detail-workspace-eyebrow">Produto</span>
        <h3 id="modalDetalhesProdutosTitulo" class="detail-workspace-title">Detalhes do produto</h3>
      </div>
      <button class="modal-close-square detail-workspace-close" onclick="ProdutosUI.fecharModalDetalhes()" aria-label="Fechar">X</button>
    </header>
    <div id="modalDetalhesProdutosConteudo" class="detail-workspace-body"></div>
  </div>
</div>

<div id="formularioProduto" class="modal hidden">
  <div class="modal-content form-modal-content">
  <button class="modal-close-square" onclick="ProdutosUI.fecharFormulario()" aria-label="Fechar">X</button>
  <h2 id="produtoFormTitulo">Novo Produto</h2>

  <div class="campo-ajuda-wrap">
    <span class="campo-ajuda-tag">Nome</span>
    <input id="produtoNome">
  </div>

  <div class="campo-ajuda-wrap">
    <span class="campo-ajuda-tag">Preco de venda (opcional)</span>
    <input id="produtoPrecoVenda" type="number" min="0" step="0.01" placeholder="Ex.: 199.90">
  </div>

  <div class="bloco">
    <p><b>Modelo do produto</b></p>

    <div id="produtoModeloCard" class="receita-card editing" data-produto-id="FORM" data-receita-id="">
      <div class="receita-header">
        <input id="produtoModeloNome" class="receita-nome" value="Modelo principal">
      </div>
      <textarea id="produtoModeloDescricao" class="receita-desc"></textarea>

      <div class="bloco">
        <p><b>Entradas</b></p>
        <div id="produtoModeloEntradas" class="receita-entradas"></div>
        <button type="button" onclick="ProdutosUI.adicionarEntradaModeloForm()">Adicionar entrada</button>
      </div>

      <div class="bloco">
        <p><b>Saidas</b></p>
        <div id="produtoModeloSaidas" class="receita-saidas"></div>
        <button type="button" onclick="ProdutosUI.adicionarSaidaModeloForm()">Adicionar saida</button>
      </div>
    </div>

    <div class="bloco">
      <p><b>Etapas (opcional)</b></p>
      <div id="produtoModeloEtapas"></div>
      <button type="button" onclick="ProdutosUI.adicionarEtapaModeloForm()">Adicionar etapa</button>
    </div>

    <div id="produtoModeloDatalists" class="hidden"></div>
  </div>

  <button id="btnSalvarProduto" onclick="ProdutosController.salvar()">Salvar</button>
  <button onclick="ProdutosUI.fecharFormulario()">Cancelar</button>
  </div>
</div>
