<div id="filtroTipoRapidoCompras" class="tipo-filtro-linha"></div>

<div id="listaCompras"></div>
<div id="listaControlesCompras" class="lista-controles"></div>

<div id="formularioCompra" class="form-modal" style="display:none; margin-top:32px;">
  <h2 id="compraFormTitulo">Nova Compra</h2>

  <div class="campo-ajuda-wrap">
    <span class="campo-ajuda-tag">Tipo</span>
    <select id="compraTipo" onchange="ComprasUI.handleTipoChange()"></select>
  </div>

  <div class="campo-ajuda-wrap">
    <span class="campo-ajuda-tag">Item</span>
    <input id="compraItem">
  </div>

  <div class="campo-ajuda-wrap">
    <span class="campo-ajuda-tag">Quantidade</span>
    <input id="compraQuantidade" type="number">
  </div>

  <div class="campo-ajuda-wrap">
    <span class="campo-ajuda-tag">Unidade</span>
    <select id="compraUnidade"></select>
  </div>

  <div id="compraMadeiraFields" class="hidden">
    <div class="campo-ajuda-wrap">
      <span class="campo-ajuda-tag">Comprimento (cm)</span>
      <input id="compraComprimentoCm" type="number" step="0.01" oninput="ComprasUI.atualizarQuantidadeMadeira()">
    </div>
    <div class="campo-ajuda-wrap">
      <span class="campo-ajuda-tag">Largura (cm)</span>
      <input id="compraLarguraCm" type="number" step="0.01" oninput="ComprasUI.atualizarQuantidadeMadeira()">
    </div>
    <div class="campo-ajuda-wrap">
      <span class="campo-ajuda-tag">Espessura (cm)</span>
      <input id="compraEspessuraCm" type="number" step="0.01" oninput="ComprasUI.atualizarQuantidadeMadeira()">
    </div>
  </div>

  <div class="campo-ajuda-wrap">
    <span class="campo-ajuda-tag">Categoria</span>
    <select id="compraCategoria"></select>
  </div>

  <div class="campo-ajuda-wrap">
    <span class="campo-ajuda-tag">Fornecedor</span>
    <input id="compraFornecedor">
  </div>

  <div class="campo-ajuda-wrap">
    <span class="campo-ajuda-tag">Valor unitario (R$)</span>
    <input id="compraValorUnit" type="number">
  </div>

  <div class="campo-ajuda-wrap">
    <span class="campo-ajuda-tag">Observacao</span>
    <textarea id="compraObservacao"></textarea>
  </div>

  <div class="campo-ajuda-wrap">
    <span class="campo-ajuda-tag">Comprado em</span>
    <input id="compraCompradoEm" type="date" required>
  </div>

  <div id="compraEquipamentoFields" class="hidden">
    <div class="campo-ajuda-wrap">
      <span class="campo-ajuda-tag">Potencia</span>
      <input id="compraPotencia">
    </div>
    <div class="campo-ajuda-wrap">
      <span class="campo-ajuda-tag">Voltagem</span>
      <input id="compraVoltagem">
    </div>
    <div class="campo-ajuda-wrap">
      <span class="campo-ajuda-tag">Vida util (meses)</span>
      <input id="compraVidaUtilMes" type="number">
    </div>
  </div>

  <button id="btnSalvarCompra" onclick="ComprasController.salvar()">Salvar</button>
  <button onclick="ComprasUI.fecharFormulario()">Cancelar</button>
</div>
