<script>
  function createLoadingHelper() {
    function escapeHtml(valor) {
      return String(valor ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function criarInlineNode(label) {
      const wrap = document.createElement('span');
      wrap.className = 'loading-inline';

      const text = document.createElement('span');
      text.className = 'loading-label';
      text.textContent = String(label || 'Carregando');
      wrap.appendChild(text);

      const dots = document.createElement('span');
      dots.className = 'loading-dots';
      dots.setAttribute('aria-hidden', 'true');
      for (let i = 0; i < 3; i++) {
        const dot = document.createElement('span');
        dot.textContent = '.';
        dots.appendChild(dot);
      }
      wrap.appendChild(dots);
      return wrap;
    }

    function inlineHtml(label) {
      const texto = escapeHtml(String(label || 'Carregando'));
      return `<span class="loading-inline"><span class="loading-label">${texto}</span><span class="loading-dots" aria-hidden="true"><span>.</span><span>.</span><span>.</span></span></span>`;
    }

    function setButtonLoading(button, ativo, labelIdle, labelLoading = 'Carregando') {
      const btn = button || null;
      if (!btn) return;
      if (ativo) {
        btn.innerHTML = '';
        btn.appendChild(criarInlineNode(labelLoading));
      } else {
        btn.textContent = String(labelIdle || '');
      }
    }

    function setContainerLoading(el, label = 'Carregando') {
      if (!el) return;
      el.innerHTML = inlineHtml(label);
    }

    return {
      criarInlineNode,
      inlineHtml,
      setButtonLoading,
      setContainerLoading
    };
  }

  function createRuntimeState() {
    let offlineReadOnly = false;
    let offlineReason = '';
    let accessReadOnly = false;
    let accessReason = '';

    function estadoAtual() {
      const readOnly = !!(offlineReadOnly || accessReadOnly);
      const reason = String(accessReason || offlineReason || '').trim();
      return {
        readOnly,
        reason,
        offlineReadOnly,
        accessReadOnly,
        offlineReason,
        accessReason
      };
    }

    function emitirMudanca() {
      if (typeof window === 'undefined') return;
      const atual = estadoAtual();
      try {
        window.dispatchEvent(new CustomEvent('app:runtime:readonly-changed', {
          detail: {
            readOnly: atual.readOnly,
            reason: atual.reason,
            offlineReadOnly: atual.offlineReadOnly,
            accessReadOnly: atual.accessReadOnly,
            offlineReason: atual.offlineReason,
            accessReason: atual.accessReason
          }
        }));
      } catch (error) {
        // sem acao
      }
    }

    function setReadOnly(ativo, motivo = '') {
      const novoAtivo = !!ativo;
      const novoMotivo = String(motivo || '').trim();
      if (offlineReadOnly === novoAtivo && offlineReason === novoMotivo) return;
      offlineReadOnly = novoAtivo;
      offlineReason = novoMotivo;
      emitirMudanca();
    }

    function setAccessReadOnly(ativo, motivo = '') {
      const novoAtivo = !!ativo;
      const novoMotivo = String(motivo || '').trim();
      if (accessReadOnly === novoAtivo && accessReason === novoMotivo) return;
      accessReadOnly = novoAtivo;
      accessReason = novoMotivo;
      emitirMudanca();
    }

    function isReadOnly() {
      return estadoAtual().readOnly;
    }

    function getReason() {
      return estadoAtual().reason;
    }

    function ensureWritable(contexto = 'Operacao bloqueada') {
      if (!isReadOnly()) return true;
      if (typeof mostrarToast === 'function') {
        const msg = getReason() || `${String(contexto || '').trim() || 'Operacao'} indisponivel em modo somente leitura`;
        mostrarToast(msg, 'erro');
      }
      return false;
    }

    return {
      setReadOnly,
      setAccessReadOnly,
      isReadOnly,
      getReason,
      ensureWritable,
      getState: estadoAtual
    };
  }

  function createRequestHelper() {
    function normalizeError(raw, fallback = '') {
      if (raw instanceof Error) return raw;
      const mensagem = String(raw?.message || raw || '').trim()
        || String(fallback || '').trim()
        || 'Falha na comunicacao com o servidor';
      const erro = new Error(mensagem);
      if (raw && typeof raw === 'object') {
        erro.raw = raw;
      }
      return erro;
    }

    function disponivel() {
      return !!window.google?.script?.run;
    }

    function call(method, args = [], options = {}) {
      const metodo = String(method || '').trim();
      if (!metodo) {
        return Promise.reject(new Error('Metodo RPC invalido'));
      }
      if (!disponivel()) {
        return Promise.reject(new Error('google.script.run indisponivel'));
      }

      const argumentos = Array.isArray(args) ? args : [args];
      const contexto = String(options.context || metodo).trim() || metodo;
      const perf = window.AppPerf?.start?.(`rpc.${contexto}`, {
        method: metodo
      });
      window.AppDiag?.mark?.('rpc.call', {
        context: contexto,
        method: metodo
      });

      return new Promise((resolve, reject) => {
        let runner = window.google.script.run
          .withSuccessHandler(payload => {
            window.AppPerf?.end?.(perf, { ok: true });
            resolve(payload);
          })
          .withFailureHandler(err => {
            window.AppPerf?.end?.(perf, { ok: false });
            const erro = normalizeError(err, options.errorMessage);
            window.AppDiag?.mark?.('rpc.fail', {
              context: contexto,
              method: metodo,
              message: String(erro?.message || '').trim()
            });
            reject(erro);
          });

        try {
          runner[metodo](...argumentos);
        } catch (error) {
          window.AppPerf?.end?.(perf, { ok: false, exception: true });
          reject(normalizeError(error, options.errorMessage));
        }
      });
    }

    function runner(options = {}) {
      let successHandler = null;
      let failureHandler = null;

      const base = {
        withSuccessHandler(fn) {
          successHandler = typeof fn === 'function' ? fn : null;
          return proxy;
        },
        withFailureHandler(fn) {
          failureHandler = typeof fn === 'function' ? fn : null;
          return proxy;
        }
      };

      const proxy = new Proxy(base, {
        get(target, prop) {
          if (prop in target) return target[prop];
          if (typeof prop !== 'string') return undefined;
          if (!prop || prop === 'then' || prop === 'catch' || prop === 'finally') return undefined;

          return (...args) => {
            call(prop, args, options)
              .then(payload => {
                if (typeof successHandler === 'function') {
                  successHandler(payload);
                }
              })
              .catch(err => {
                if (typeof failureHandler === 'function') {
                  failureHandler(err);
                  return;
                }
                if (typeof console !== 'undefined' && console.error) {
                  console.error(`[rpc] ${prop}`, err);
                }
              });
          };
        }
      });

      return proxy;
    }

    return {
      call,
      runner,
      normalizeError,
      isAvailable: disponivel
    };
  }

  function createSearchHelper() {
    function normalizeText(valor) {
      const bruto = String(valor ?? '');
      const semAcento = (typeof bruto.normalize === 'function')
        ? bruto.normalize('NFD').replace(/[\u0300-\u036f]/g, '')
        : bruto;
      return semAcento.toLowerCase().trim();
    }

    function includesText(base, termo) {
      const needle = normalizeText(termo);
      if (!needle) return true;
      return normalizeText(base).includes(needle);
    }

    return {
      normalizeText,
      includesText
    };
  }

  window.AppLoading = window.AppLoading || createLoadingHelper();
  window.AppRuntime = window.AppRuntime || createRuntimeState();
  window.AppRequest = window.AppRequest || createRequestHelper();
  window.AppSearch = window.AppSearch || createSearchHelper();
</script>
