<script>
  window.VendasUI = (() => {
    let detalhesModalAbertoId = '';
    let delegationInit = false;
    let estoqueVendavel = [];
    let listaFiltradaAtual = [];
    let qtdRenderizada = 0;
    let renderJobSeq = 0;
    let renderizandoLista = false;

    const RENDER_CHUNK_SIZE = 12;

    function el() {
      return {
        formulario: document.getElementById('formularioVenda'),
        lista: document.getElementById('listaVendas'),
        listaControles: document.getElementById('listaControlesVendas'),
        modalDetalhes: document.getElementById('modalDetalhesVendas'),
        modalDetalhesConteudo: document.getElementById('modalDetalhesVendasConteudo'),
        modalDetalhesTitulo: document.getElementById('modalDetalhesVendasTitulo'),

        estoqueItem: document.getElementById('vendaEstoqueItem'),
        quantidade: document.getElementById('vendaQuantidade'),
        valorTotal: document.getElementById('vendaValorTotal'),
        valorUnit: document.getElementById('vendaValorUnit'),
        recebidoPor: document.getElementById('vendaRecebidoPor'),
        dataVenda: document.getElementById('vendaData'),
        formaPagamento: document.getElementById('vendaFormaPagamento'),
        parcelasWrap: document.getElementById('vendaParcelasWrap'),
        parcelas: document.getElementById('vendaParcelas'),
        parcelasDetalheWrap: document.getElementById('vendaParcelasDetalheWrap'),
        parcelasDetalheLista: document.getElementById('vendaParcelasDetalheLista'),
        observacao: document.getElementById('vendaObservacao'),
        formTitulo: document.getElementById('vendaFormTitulo'),

        modalRecebimento: document.getElementById('modalRecebimentoVenda'),
        recebimentoTitulo: document.getElementById('recebimentoVendaTitulo'),
        recebimentoData: document.getElementById('recebimentoVendaData'),
        recebimentoValor: document.getElementById('recebimentoVendaValor'),
        recebimentoParcelaWrap: document.getElementById('recebimentoVendaParcelaWrap'),
        recebimentoParcela: document.getElementById('recebimentoVendaParcela'),
        recebimentoForma: document.getElementById('recebimentoVendaForma'),
        recebimentoObs: document.getElementById('recebimentoVendaObservacao'),
        btnConfirmarRecebimento: document.getElementById('btnConfirmarRecebimentoVenda')
      };
    }

    function getHojeISO() {
      const d = new Date();
      const yyyy = d.getFullYear();
      const mm = String(d.getMonth() + 1).padStart(2, '0');
      const dd = String(d.getDate()).padStart(2, '0');
      return `${yyyy}-${mm}-${dd}`;
    }

    function limparVazios(lista) {
      return (Array.isArray(lista) ? lista : [])
        .map(v => String(v ?? '').trim())
        .filter(v => v !== '');
    }

    function parseNumeroInput(valor) {
      const s = String(valor ?? '').trim();
      if (!s) return 0;
      const n = Number(s.replace(',', '.'));
      return isNaN(n) ? 0 : n;
    }

    function proximoFrame(fn) {
      let executado = false;
      const run = () => {
        if (executado) return;
        executado = true;
        fn();
      };
      if (typeof window !== 'undefined' && typeof window.requestAnimationFrame === 'function') {
        window.requestAnimationFrame(run);
      }
      setTimeout(run, 80);
    }

    function getDataBaseParcelasVenda() {
      const { dataVenda } = el();
      return String(dataVenda?.value || getHojeISO()).trim();
    }

    function gerarParcelasPadrao(valorTotal, parcelas, dataBase) {
      const total = Number(valorTotal || 0);
      const qtd = Math.max(1, Math.floor(Number(parcelas || 1)));
      const inicioRaw = String(dataBase || getHojeISO()).trim();
      const inicio = /^\d{4}-\d{2}-\d{2}$/.test(inicioRaw) ? new Date(`${inicioRaw}T00:00:00`) : new Date();
      const base = qtd > 0 ? Number((total / qtd).toFixed(2)) : 0;
      const lista = [];
      for (let i = 0; i < qtd; i++) {
        const d = new Date(inicio);
        d.setMonth(d.getMonth() + i);
        const yyyy = d.getFullYear();
        const mm = String(d.getMonth() + 1).padStart(2, '0');
        const dd = String(d.getDate()).padStart(2, '0');
        const valor = i === qtd - 1
          ? Number((total - (base * (qtd - 1))).toFixed(2))
          : base;
        lista.push({
          numero: i + 1,
          data: `${yyyy}-${mm}-${dd}`,
          valor: Number(valor.toFixed(2))
        });
      }
      return lista;
    }

    function lerParcelasDetalheVenda() {
      const { parcelasDetalheLista } = el();
      if (!parcelasDetalheLista) return [];
      const linhas = [...parcelasDetalheLista.querySelectorAll('.parcela-detalhe-linha')];
      return linhas.map((linha, idx) => ({
        numero: idx + 1,
        data: String(linha.querySelector('input[data-campo="data"]')?.value || '').trim(),
        valor: parseNumeroInput(linha.querySelector('input[data-campo="valor"]')?.value || '')
      }));
    }

    function renderParcelasDetalheVenda(listaForcada) {
      const f = el();
      if (!f.parcelasDetalheWrap || !f.parcelasDetalheLista) return;
      const exibir = formaExigeParcelas(f.formaPagamento?.value || '');
      if (!exibir) {
        f.parcelasDetalheWrap.classList.add('hidden');
        f.parcelasDetalheLista.innerHTML = '';
        return;
      }

      const parcelas = Math.max(1, Math.floor(parseNumeroInput(f.parcelas?.value || 1) || 1));
      const valorTotal = parseNumeroInput(f.valorTotal?.value || 0);
      const dataBase = getDataBaseParcelasVenda();
      const atuais = Array.isArray(listaForcada) ? listaForcada : lerParcelasDetalheVenda();
      const usarAtuais = atuais.length === parcelas && atuais.every(p => String(p.data || '').trim() !== '');
      const lista = usarAtuais ? atuais : gerarParcelasPadrao(valorTotal, parcelas, dataBase);

      f.parcelasDetalheLista.innerHTML = lista.map((p, idx) => `
        <div class="parcela-detalhe-linha">
          <span class="parcela-detalhe-num">#${idx + 1}</span>
          <input type="date" data-campo="data" value="${String(p.data || '')}">
          <input type="number" data-campo="valor" min="0" step="0.01" value="${Number(p.valor || 0).toFixed(2)}">
        </div>
      `).join('');
      f.parcelasDetalheWrap.classList.remove('hidden');
    }

    function formatarMoeda(valor) {
      const n = Number(valor || 0);
      return `R$ ${isNaN(n) ? '0.00' : n.toFixed(2)}`;
    }

    function normalizarFormaPagamento(valor) {
      return String(valor || '')
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .trim()
        .toUpperCase();
    }

    function formaExigeParcelas(valor) {
      const forma = normalizarFormaPagamento(valor);
      return forma === 'CREDITO' || forma === 'PIX PARCELADO' || forma === 'DINHEIRO';
    }

    function getEstoqueVendavelItem(estoqueId) {
      const id = String(estoqueId || '').trim();
      return (estoqueVendavel || []).find(i => String(i.ID || '').trim() === id) || null;
    }

    function renderEstoqueVendavel(lista) {
      estoqueVendavel = Array.isArray(lista) ? lista : [];
      const f = el();
      if (!f.estoqueItem || f.estoqueItem.tagName !== 'SELECT') return;

      const atual = String(f.estoqueItem.value || '').trim();
      f.estoqueItem.innerHTML = '<option value="">Selecione</option>';

      estoqueVendavel.forEach(i => {
        const o = document.createElement('option');
        o.value = i.ID;
        o.textContent = `${i.item} | Saldo ${Number(i.quantidade || 0).toFixed(2)} ${i.unidade || ''}`;
        f.estoqueItem.appendChild(o);
      });

      const existe = [...f.estoqueItem.options].some(o => String(o.value || '').trim() === atual);
      f.estoqueItem.value = existe ? atual : '';
    }

    function renderRecebidosPor(lista) {
      const f = el();
      if (!f.recebidoPor || f.recebidoPor.tagName !== 'SELECT') return;
      const clean = limparVazios(lista);
      const atual = String(f.recebidoPor.value || '').trim().toUpperCase();
      f.recebidoPor.innerHTML = '<option value="">Selecione</option>';
      clean.forEach(v => {
        const o = document.createElement('option');
        o.value = v;
        o.textContent = v;
        f.recebidoPor.appendChild(o);
      });
      const match = [...f.recebidoPor.options].find(o => String(o.value || '').trim().toUpperCase() === atual);
      f.recebidoPor.value = match ? match.value : '';
    }

    function renderFormasPagamento(lista) {
      const f = el();
      const clean = limparVazios(lista);

      const preencher = selectEl => {
        if (!selectEl || selectEl.tagName !== 'SELECT') return;
        const atual = String(selectEl.value || '').trim().toUpperCase();
        selectEl.innerHTML = '<option value="">Selecione</option>';
        clean.forEach(v => {
          const o = document.createElement('option');
          o.value = v;
          o.textContent = v;
          selectEl.appendChild(o);
        });
        const match = [...selectEl.options].find(o => String(o.value || '').trim().toUpperCase() === atual);
        selectEl.value = match ? match.value : '';
      };

      preencher(f.formaPagamento);
      preencher(f.recebimentoForma);
      handleFormaPagamentoChange();
    }

    function handleEstoqueItemChange() {
      const f = el();
      const item = getEstoqueVendavelItem(f.estoqueItem?.value);
      if (!item) return;
      const qtd = parseNumeroInput(f.quantidade?.value || 0);
      const preco = parseNumeroInput(item.preco_venda || 0);
      if (qtd > 0 && preco > 0 && (!String(f.valorTotal?.value || '').trim() || Number(f.valorTotal.value) <= 0)) {
        f.valorTotal.value = (qtd * preco).toFixed(2);
      }
      handleQuantidadeOuTotalChange();
      handleParcelasConfigChange();
    }

    function handleQuantidadeOuTotalChange() {
      const f = el();
      const qtd = parseNumeroInput(f.quantidade?.value || 0);
      const total = parseNumeroInput(f.valorTotal?.value || 0);
      if (!f.valorUnit) return;
      if (qtd > 0 && total > 0) {
        f.valorUnit.value = (total / qtd).toFixed(2);
      } else {
        f.valorUnit.value = '';
      }
      handleParcelasConfigChange();
    }

    function handleFormaPagamentoChange() {
      const f = el();
      if (!f.formaPagamento || !f.parcelasWrap || !f.parcelas) return;
      const exibirParcelas = formaExigeParcelas(f.formaPagamento.value);
      f.parcelasWrap.classList.toggle('hidden', !exibirParcelas);
      if (!exibirParcelas) {
        f.parcelas.value = '1';
      } else if (!String(f.parcelas.value || '').trim() || Number(f.parcelas.value) < 1) {
        f.parcelas.value = '1';
      }
      renderParcelasDetalheVenda();
    }

    function handleParcelasConfigChange() {
      renderParcelasDetalheVenda();
    }

    function abrirFormularioNovo() {
      resetFormulario();
      mostrarFormulario();
    }

    function mostrarFormulario() {
      const f = el();
      if (!f.formulario) return;
      f.formulario.classList.remove('hidden');
    }

    function fecharFormulario() {
      const f = el();
      if (!f.formulario) return;
      f.formulario.classList.add('hidden');
      resetFormulario();
      if (window.VendasController?.limparEdicao) {
        VendasController.limparEdicao();
      }
    }

    function preencherFormulario(data) {
      const f = el();
      if (f.estoqueItem) f.estoqueItem.value = data.estoque_id || '';
      if (f.quantidade) f.quantidade.value = data.quantidade || '';
      if (f.valorTotal) f.valorTotal.value = data.valor_total_venda || '';
      if (f.valorUnit) f.valorUnit.value = data.valor_unit_venda || '';
      if (f.recebidoPor) f.recebidoPor.value = data.recebido_por || '';
      if (f.dataVenda) f.dataVenda.value = data.data_venda || '';
      if (f.formaPagamento) f.formaPagamento.value = data.forma_pagamento || '';
      if (f.parcelas) f.parcelas.value = data.parcelas || '1';
      if (f.observacao) f.observacao.value = data.observacao || '';
      if (f.formTitulo) f.formTitulo.innerText = 'Editar Venda';
      handleFormaPagamentoChange();
      renderParcelasDetalheVenda(
        Array.isArray(data.parcelas_detalhe)
          ? data.parcelas_detalhe.map((p, idx) => ({
            numero: idx + 1,
            data: String(p.data_prevista || p.data || '').trim(),
            valor: Number(p.valor_previsto ?? p.valor ?? 0)
          }))
          : []
      );
      handleQuantidadeOuTotalChange();
    }

    function resetFormulario() {
      const f = el();
      [
        f.estoqueItem,
        f.quantidade,
        f.valorTotal,
        f.valorUnit,
        f.recebidoPor,
        f.dataVenda,
        f.formaPagamento,
        f.parcelas,
        f.observacao
      ].forEach(i => i && (i.value = ''));
      if (f.formTitulo) f.formTitulo.innerText = 'Nova Venda';
      if (f.dataVenda) f.dataVenda.value = getHojeISO();
      if (f.parcelasDetalheLista) f.parcelasDetalheLista.innerHTML = '';
      if (f.parcelasDetalheWrap) f.parcelasDetalheWrap.classList.add('hidden');
      handleFormaPagamentoChange();
    }

    function renderParcelasDetalhe(parcelas) {
      const lista = Array.isArray(parcelas) ? parcelas : [];
      if (lista.length === 0) return '<p>Nenhuma parcela gerada.</p>';
      return lista.map(p => `
        <div class="linha-material">
          <span>Parcela ${Number(p.parcela_numero || 0)}/${Number(p.parcelas_total || 0)} - ${p.data_prevista || '-'}</span>
          <span>${p.status || 'PENDENTE'} | ${formatarMoeda(p.valor_pago || 0)} / ${formatarMoeda(p.valor_previsto || 0)}</span>
        </div>
      `).join('');
    }

    function montarDetalhesCard(v) {
      const podeReceber = Number(v.total_pendente || 0) > 0.009;
      const estoqueLabel = v.estoque_baixado
        ? `SIM (${v.data_baixa_estoque || '-'})`
        : 'NAO';
      return `
        <p><b>Produto:</b> ${v.item || '-'}</p>
        <p><b>Quantidade:</b> ${Number(v.quantidade || 0).toFixed(2)} ${v.unidade || ''}</p>
        <p><b>Valor unitario:</b> ${formatarMoeda(v.valor_unit_venda || 0)}</p>
        <p><b>Valor total:</b> ${formatarMoeda(v.valor_total_venda || 0)}</p>
        <p><b>Recebido por:</b> ${v.recebido_por || '-'}</p>
        <p><b>Data de venda:</b> ${v.data_venda || '-'}</p>
        <p><b>Forma:</b> ${v.forma_pagamento || '-'}</p>
        <p><b>Parcelas:</b> ${Number(v.parcelas || 1)}</p>
        <p><b>Financeiro:</b> ${String(v.status_pagamento || 'PENDENTE').toUpperCase()} | Recebido ${formatarMoeda(v.total_pago || 0)} | Pendente ${formatarMoeda(v.total_pendente || 0)}</p>
        <p><b>Estoque baixado:</b> ${estoqueLabel}</p>
        <p><b>Observacao:</b> ${v.observacao || '-'}</p>
        <div class="bloco">
          <p><b>Parcelas</b></p>
          ${renderParcelasDetalhe(v.parcelas_detalhe)}
        </div>
        <div class="acoes">
          ${podeReceber ? `<button onclick="VendasController.registrarRecebimento('${v.ID}')">Registrar recebimento</button>` : ''}
          <button onclick="VendasController.editar('${v.ID}')">Editar</button>
          <button onclick="VendasController.excluir('${v.ID}')">Excluir</button>
        </div>
      `;
    }

    function montarCardResumo(v) {
      const div = document.createElement('div');
      div.className = 'card';
      div.dataset.id = v.ID;
      div.innerHTML = `
        <div class="card-resumo">
          <strong>${v.item || '-'}</strong><br>
          ${Number(v.quantidade || 0).toFixed(2)} ${v.unidade || ''}<br>
          ${formatarMoeda(v.valor_total_venda || 0)}<br>
          ${String(v.status_pagamento || 'PENDENTE').toUpperCase()}
        </div>
        <button class="ver-mais">Ver mais</button>
      `;
      return div;
    }

    function getVendaById(id) {
      const alvo = String(id || '').trim();
      if (!alvo) return null;
      return (Array.isArray(listaFiltradaAtual) ? listaFiltradaAtual : [])
        .find(v => String(v?.ID || '').trim() === alvo) || null;
    }

    function abrirModalDetalhes(id) {
      const alvoId = String(id || '').trim();
      if (!alvoId) return;
      const f = el();
      if (!f.modalDetalhes || !f.modalDetalhesConteudo) return;
      const item = getVendaById(alvoId);
      if (!item) {
        f.modalDetalhesConteudo.innerHTML = '<p>Venda nao encontrada.</p>';
        f.modalDetalhes.classList.remove('hidden');
        return;
      }
      if (f.modalDetalhesTitulo) {
        f.modalDetalhesTitulo.textContent = item.item || 'Detalhes da venda';
      }
      f.modalDetalhesConteudo.innerHTML = montarDetalhesCard(item);
      detalhesModalAbertoId = alvoId;
      f.modalDetalhes.classList.remove('hidden');
    }

    function fecharModalDetalhes() {
      const f = el();
      if (!f.modalDetalhes) return;
      f.modalDetalhes.classList.add('hidden');
      if (f.modalDetalhesConteudo) f.modalDetalhesConteudo.innerHTML = '';
      detalhesModalAbertoId = '';
    }

    function atualizarModalDetalhesSeAberto() {
      if (!detalhesModalAbertoId) return;
      const item = getVendaById(detalhesModalAbertoId);
      if (!item) {
        fecharModalDetalhes();
        return;
      }
      abrirModalDetalhes(detalhesModalAbertoId);
    }

    function renderLista(itens) {
      const f = el();
      if (!f.lista) return;
      renderJobSeq += 1;
      const jobId = renderJobSeq;
      f.lista.innerHTML = '';
      if (f.listaControles) f.listaControles.innerHTML = '';

      listaFiltradaAtual = Array.isArray(itens) ? itens : [];
      qtdRenderizada = 0;
      renderizandoLista = false;

      if (listaFiltradaAtual.length === 0) {
        if (detalhesModalAbertoId) {
          fecharModalDetalhes();
        }
        f.lista.innerHTML = '<p>Nenhuma venda cadastrada.</p>';
        return;
      }

      renderizandoLista = true;
      let idx = 0;
      const processarChunk = () => {
        if (jobId !== renderJobSeq) return;
        const limite = Math.min(idx + RENDER_CHUNK_SIZE, listaFiltradaAtual.length);
        const fragment = document.createDocumentFragment();
        for (; idx < limite; idx++) {
          fragment.appendChild(montarCardResumo(listaFiltradaAtual[idx]));
        }
        f.lista.appendChild(fragment);
        qtdRenderizada = idx;

        if (idx < listaFiltradaAtual.length) {
          proximoFrame(processarChunk);
          return;
        }

        renderizandoLista = false;
        initDelegation();
        atualizarModalDetalhesSeAberto();
      };

      proximoFrame(processarChunk);
    }

    function initDelegation() {
      if (delegationInit) return;
      delegationInit = true;

      document.addEventListener('click', e => {
        const card = e.target.closest('.card');
        const lista = document.getElementById('listaVendas');
        if (card && lista && !lista.contains(card)) return;

        if (e.target.classList.contains('ver-mais')) {
          e.stopPropagation();
          if (!card) return;
          abrirModalDetalhes(card.dataset.id || '');
          return;
        }
      });
    }

    function abrirModalRecebimento(venda) {
      const f = el();
      if (!f.modalRecebimento) return false;
      if (f.recebimentoTitulo) {
        const nome = String(venda?.item || '').trim();
        f.recebimentoTitulo.textContent = nome
          ? `Registrar recebimento: ${nome}`
          : 'Registrar recebimento';
      }
      if (f.recebimentoData) f.recebimentoData.value = getHojeISO();
      const parcelas = Array.isArray(venda?.parcelas_detalhe) ? venda.parcelas_detalhe : [];
      const totalParcelas = Math.max(1, Math.floor(parseNumeroInput(venda?.parcelas || 1) || 1));
      const parcelado = totalParcelas > 1;
      const proximaParcela = parcelas.find(p => Number(p?.valor_pendente || 0) > 0.009) || null;

      if (f.recebimentoParcelaWrap && f.recebimentoParcela) {
        if (parcelado) {
          if (!proximaParcela?.ID) {
            if (typeof mostrarToast === 'function') {
              mostrarToast('Nao ha parcela pendente para esta venda', 'erro');
            }
            return false;
          }
          const numero = Number(proximaParcela.parcela_numero || 0);
          const total = Number(proximaParcela.parcelas_total || 0);
          const data = String(proximaParcela.data_prevista || '-').trim() || '-';
          const valorPend = Number(proximaParcela.valor_pendente || 0);

          f.recebimentoParcela.innerHTML = '';
          const op = document.createElement('option');
          op.value = String(proximaParcela.ID || '').trim();
          op.textContent = `Parcela ${numero}/${total} - ${data} - ${formatarMoeda(valorPend)}`;
          f.recebimentoParcela.appendChild(op);
          f.recebimentoParcela.value = op.value;
          f.recebimentoParcelaWrap.classList.remove('hidden');

          if (f.recebimentoValor) {
            f.recebimentoValor.value = valorPend > 0 ? valorPend.toFixed(2) : '';
            f.recebimentoValor.readOnly = true;
          }
        } else {
          f.recebimentoParcela.innerHTML = '<option value="">Parcela unica</option>';
          f.recebimentoParcela.value = '';
          f.recebimentoParcelaWrap.classList.add('hidden');
          if (f.recebimentoValor) {
            const pendente = Number(venda?.total_pendente || 0);
            f.recebimentoValor.value = pendente > 0 ? pendente.toFixed(2) : '';
            f.recebimentoValor.readOnly = false;
          }
        }
      } else if (f.recebimentoValor) {
        const pendente = Number(venda?.total_pendente || 0);
        f.recebimentoValor.value = pendente > 0 ? pendente.toFixed(2) : '';
      }

      if (f.recebimentoForma) f.recebimentoForma.value = venda?.forma_pagamento || '';
      if (f.recebimentoObs) f.recebimentoObs.value = '';
      f.modalRecebimento.dataset.parcelado = parcelado ? 'true' : 'false';
      f.modalRecebimento.classList.remove('hidden');
      return true;
    }

    function fecharModalRecebimento() {
      const f = el();
      if (!f.modalRecebimento) return;
      f.modalRecebimento.classList.add('hidden');
      if (f.recebimentoValor) f.recebimentoValor.readOnly = false;
      if (f.recebimentoParcelaWrap) f.recebimentoParcelaWrap.classList.add('hidden');
      if (f.recebimentoParcela) f.recebimentoParcela.innerHTML = '<option value="">Selecione</option>';
      f.modalRecebimento.dataset.parcelado = 'false';
      setModalRecebimentoProcessando(false);
    }

    function lerModalRecebimento() {
      const f = el();
      const parcelado = String(f.modalRecebimento?.dataset?.parcelado || '').toLowerCase() === 'true';
      return {
        data_pagamento: String(f.recebimentoData?.value || '').trim(),
        valor_pago: String(f.recebimentoValor?.value || '').trim(),
        parcela_alvo_id: parcelado ? String(f.recebimentoParcela?.value || '').trim() : '',
        parcelado,
        forma_pagamento: String(f.recebimentoForma?.value || '').trim(),
        observacao: String(f.recebimentoObs?.value || '').trim()
      };
    }

    function setModalRecebimentoProcessando(processando) {
      const f = el();
      const on = !!processando;
      [f.recebimentoData, f.recebimentoValor, f.recebimentoParcela, f.recebimentoForma, f.recebimentoObs, f.btnConfirmarRecebimento]
        .forEach(input => {
          if (input) input.disabled = on;
        });
      if (f.btnConfirmarRecebimento) {
        if (window.AppLoading?.setButtonLoading) {
          window.AppLoading.setButtonLoading(
            f.btnConfirmarRecebimento,
            on,
            'Confirmar recebimento',
            'Salvando'
          );
        } else {
          f.btnConfirmarRecebimento.textContent = on ? 'Salvando...' : 'Confirmar recebimento';
        }
      }
    }

    return {
      abrirFormularioNovo,
      mostrarFormulario,
      fecharFormulario,
      preencherFormulario,
      resetFormulario,
      renderLista,
      renderEstoqueVendavel,
      renderRecebidosPor,
      renderFormasPagamento,
      handleEstoqueItemChange,
      handleQuantidadeOuTotalChange,
      handleFormaPagamentoChange,
      handleParcelasConfigChange,
      fecharModalDetalhes,
      lerParcelasDetalheVenda,
      abrirModalRecebimento,
      fecharModalRecebimento,
      lerModalRecebimento,
      setModalRecebimentoProcessando
    };
  })();
</script>
