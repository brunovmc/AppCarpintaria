<div class="dashboard-toolbar">
  <div class="campo-ajuda-wrap dashboard-mes-wrap">
    <span class="campo-ajuda-tag">Mes de referencia</span>
    <input id="dashMesReferencia" type="month">
  </div>
  <button id="btnDashboardAtualizar" class="dashboard-btn-inline" onclick="DashboardController.atualizar(true)">Atualizar</button>
</div>
<div class="dashboard-statusbar">
  <span id="dashUltimaAtualizacao" class="dashboard-status-text">Ultima atualizacao: -</span>
  <span id="dashModoSomenteLeitura" class="dashboard-readonly hidden">Sem conexao com backend • modo somente leitura</span>
</div>

<div id="dashboardCards" class="dash-cards"></div>

<div class="dash-grid">
  <div class="card">
    <strong>Gasto pago por categoria</strong>
    <div id="dashGastoPorCategoria" class="dash-lista"></div>
  </div>

  <div class="card">
    <strong>Gasto pago por fornecedor</strong>
    <div id="dashGastoPorFornecedor" class="dash-lista"></div>
  </div>

  <div class="card">
    <strong>Valor de estoque por tipo</strong>
    <div id="dashEstoquePorTipo" class="dash-lista"></div>
  </div>

  <div class="card dash-card-wide">
    <strong>Evolucao mensal (pagamentos)</strong>
    <div id="dashEvolucaoMensal" class="dash-lista"></div>
  </div>
</div>

<div id="modalObservabilidadeCard" class="modal hidden">
  <div class="modal-content dash-modal-observabilidade">
    <div class="dash-obs-header">
      <h3 id="obsCardTitulo">Composicao do card</h3>
      <button class="dashboard-btn-inline dash-obs-fechar-topo" onclick="DashboardController.fecharObservabilidadeCard()">Fechar</button>
    </div>
    <div id="obsCardResumo" class="dash-obs-resumo"></div>
    <div id="obsCardLista" class="dash-obs-lista"></div>
    <button onclick="DashboardController.fecharObservabilidadeCard()">Fechar</button>
  </div>
</div>
