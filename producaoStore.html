<script>
  window.ProducaoStore = (() => {

    let itens = [];
    let carregado = false;
    let versao = 0;
    const CACHE_TAB = 'producao';
    let ordenacao = window.AppListOrder?.get?.(CACHE_TAB)
      || { key: 'operation', direction: 'desc' };

    function ordenar(lista) {
      return window.AppListOrder?.sort
        ? window.AppListOrder.sort(CACHE_TAB, lista, ordenacao)
        : [...(Array.isArray(lista) ? lista : [])];
    }

    function getSort() {
      return { ...ordenacao };
    }

    function getSortOptions() {
      return window.AppListOrder?.getOptions?.(CACHE_TAB) || [];
    }

    function setSort(sortOrKey, direction) {
      const next = window.AppListOrder?.normalize
        ? window.AppListOrder.normalize(CACHE_TAB, sortOrKey, direction)
        : {
          key: typeof sortOrKey === 'string' ? sortOrKey : sortOrKey?.key,
          direction: direction || sortOrKey?.direction
        };
      if (next.key === ordenacao.key && next.direction === ordenacao.direction) {
        return getSort();
      }

      ordenacao = next;
      itens = ordenar(itens);
      tocarVersao();
      salvarCache();
      window.AppListOrder?.save?.(CACHE_TAB, ordenacao);
      return getSort();
    }

    function tocarVersao() {
      versao += 1;
    }

    function salvarCache() {
      window.AppTabCache?.salvar?.(CACHE_TAB, itens);
    }

    function removerCache() {
      window.AppTabCache?.remover?.(CACHE_TAB);
    }

    /* =========================
       BASICO
    ========================== */
    function set(lista) {
      itens = ordenar(lista);
      carregado = true;
      tocarVersao();
      salvarCache();
    }

    function get() {
      return ordenar(itens);
    }

    function isLoaded() {
      return carregado;
    }

    function getVersion() {
      return versao;
    }

    function clear() {
      itens = [];
      carregado = false;
      tocarVersao();
      removerCache();
    }

    /* =========================
       CRUD LOCAL
    ========================== */
    function add(item) {
      if (!item || !item.producao_id) return;
      itens.push(item);
      itens = ordenar(itens);
      tocarVersao();
      salvarCache();
    }

    function update(id, dados) {
      const idx = itens.findIndex(i => i.producao_id === id);
      if (idx === -1) return;

      itens[idx] = {
        ...itens[idx],
        ...dados
      };
      itens = ordenar(itens);
      tocarVersao();
      salvarCache();
    }

    function remove(id) {
      itens = itens.filter(i => i.producao_id !== id);
      tocarVersao();
      salvarCache();
    }

    function getById(id) {
      return itens.find(i => i.producao_id === id) || null;
    }

    /* =========================
       FILTROS
    ========================== */
    function filter({ texto, status } = {}) {
      let resultado = [...itens];

      if (texto) {
        const incluiTexto = window.AppSearch?.includesText
          ? window.AppSearch.includesText
          : (base, termo) => String(base ?? '').toLowerCase().includes(String(termo ?? '').toLowerCase());
        resultado = resultado.filter(i =>
          incluiTexto(i.nome_ordem, texto) ||
          incluiTexto(i.nome_produto, texto)
        );
      }

      if (status) {
        resultado = resultado.filter(i => i.status === status);
      }

      return ordenar(resultado);
    }

    /* =========================
       API PUBLICA
    ========================== */
    return {
      set,
      get,
      isLoaded,
      getVersion,
      clear,
      getSort,
      getSortOptions,
      setSort,
      sort: ordenar,

      add,
      update,
      remove,
      getById,

      filter
    };

  })();
</script>
