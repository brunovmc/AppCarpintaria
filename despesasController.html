<script>
  window.DespesasController = (() => {
    let iniciado = false;
    let carregado = false;
    let validacoes = {};
    let despesas = [];
    let filtroTexto = '';
    let filtrosLista = {
      status: '',
      pagoPor: '',
      categoria: '',
      fornecedor: ''
    };

    let despesaEditandoId = null;
    let salvandoDespesa = false;
    let mutationLockToken = null;
    let mutationLockTokenPagamento = null;
    let despesaPagamentoId = null;
    let salvandoPagamentoDespesa = false;
    let despesaPagamentoParcelado = false;
    let listaFiltradaAtual = [];
    let qtdRenderizada = 0;
    let carregandoMais = false;
    let renderJobSeq = 0;
    let listenerFecharFiltrosAtivo = false;
    let listenerMutacoesRegistrado = false;

    const PAGE_SIZE = 30;
    const RENDER_CHUNK_SIZE = 8;
    const STATUS_LABEL_ORDEM = ['VENCIDO', 'PENDENTE', 'PARCIAL', 'PAGO'];
    const STATUS_PRIORIDADE = {
      VENCIDO: 0,
      PENDENTE: 1,
      PARCIAL: 2,
      PAGO: 3
    };

    function el() {
      return {
        listaDespesas: document.getElementById('listaDespesasGerais'),
        listaControles: document.getElementById('listaControlesDespesas'),
        resumoLista: document.getElementById('despesasResumoLista'),
        painelFiltros: document.getElementById('painelFiltroDespesasLista'),
        filtroStatus: document.getElementById('filtroDespesaStatus'),
        filtroPagoPor: document.getElementById('filtroDespesaPagoPor'),
        filtroCategoria: document.getElementById('filtroDespesaCategoria'),
        filtroFornecedor: document.getElementById('filtroDespesaFornecedor'),
        btnLimparFiltros: document.getElementById('btnLimparFiltrosDespesas'),
        formDespesa: document.getElementById('formularioDespesaGeral'),
        despesaFormTitulo: document.getElementById('despesaFormTitulo'),
        btnSalvarDespesa: document.getElementById('btnSalvarDespesaGeral'),

        despesaDescricao: document.getElementById('despesaDescricao'),
        despesaCategoria: document.getElementById('despesaCategoria'),
        despesaFornecedor: document.getElementById('despesaFornecedor'),
        despesaPagoPor: document.getElementById('despesaPagoPor'),
        despesaValorTotal: document.getElementById('despesaValorTotal'),
        despesaDataCompetencia: document.getElementById('despesaDataCompetencia'),
        despesaDataVencimento: document.getElementById('despesaDataVencimento'),
        despesaDataPagamento: document.getElementById('despesaDataPagamento'),
        despesaFormaPagamento: document.getElementById('despesaFormaPagamento'),
        despesaParcelasWrap: document.getElementById('despesaParcelasWrap'),
        despesaParcelas: document.getElementById('despesaParcelas'),
        despesaParcelasDetalheWrap: document.getElementById('despesaParcelasDetalheWrap'),
        despesaParcelasDetalheLista: document.getElementById('despesaParcelasDetalheLista'),
        despesaFixo: document.getElementById('despesaFixo'),
        despesaObservacao: document.getElementById('despesaObservacao'),

        modalPagamentoDespesa: document.getElementById('modalPagamentoDespesa'),
        pagDespesaTitulo: document.getElementById('pagDespesaTitulo'),
        pagDespesaData: document.getElementById('pagDespesaData'),
        pagDespesaValor: document.getElementById('pagDespesaValor'),
        pagDespesaParcelaWrap: document.getElementById('pagDespesaParcelaWrap'),
        pagDespesaParcela: document.getElementById('pagDespesaParcela'),
        pagDespesaForma: document.getElementById('pagDespesaForma'),
        pagDespesaObservacao: document.getElementById('pagDespesaObservacao'),
        btnConfirmarPagDespesa: document.getElementById('btnConfirmarPagDespesa')
      };
    }

    function getHojeISO() {
      if (window.AppDomainUtils?.getHojeISO) {
        return window.AppDomainUtils.getHojeISO();
      }
      const d = new Date();
      const yyyy = d.getFullYear();
      const mm = String(d.getMonth() + 1).padStart(2, '0');
      const dd = String(d.getDate()).padStart(2, '0');
      return `${yyyy}-${mm}-${dd}`;
    }

    function parseNumeroInput(valor) {
      if (window.AppDomainUtils?.parseNumeroZero) {
        return window.AppDomainUtils.parseNumeroZero(valor);
      }
      const s = String(valor ?? '').trim();
      if (!s) return 0;
      const n = Number(s.replace(',', '.'));
      return isNaN(n) ? 0 : n;
    }

    function podeAlterarDados(contexto = 'Operacao') {
      if (window.AppDomainUtils?.ensureWritable) {
        return window.AppDomainUtils.ensureWritable(contexto);
      }
      return !!window.AppRuntime?.ensureWritable
        ? window.AppRuntime.ensureWritable(contexto)
        : true;
    }

    function proximoFrame(fn) {
      let executado = false;
      const run = () => {
        if (executado) return;
        executado = true;
        fn();
      };
      if (typeof window !== 'undefined' && typeof window.requestAnimationFrame === 'function') {
        window.requestAnimationFrame(run);
      }
      setTimeout(run, 80);
    }

    function parseBooleanInput(valor) {
      const s = String(valor ?? '').trim().toLowerCase();
      return s === 'true' || s === '1' || s === 'sim' || s === 'yes';
    }

    function formatarMoeda(valor) {
      const n = Number(valor || 0);
      const seguro = isNaN(n) ? 0 : n;
      return `R$ ${seguro.toFixed(2)}`;
    }

    function formaExigeParcelas(valor) {
      if (window.AppDomainUtils?.formaExigeParcelas) {
        return window.AppDomainUtils.formaExigeParcelas(valor);
      }
      return false;
    }

    function escapeHtml(valor) {
      return String(valor ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function normalizarTexto(valor) {
      const normalizar = window.AppSearch?.normalizeText
        ? window.AppSearch.normalizeText
        : entrada => String(entrada ?? '')
          .normalize('NFD')
          .replace(/[\u0300-\u036f]/g, '')
          .toLowerCase()
          .trim();
      return normalizar(valor);
    }

    function normalizarStatus(valor) {
      return normalizarTexto(valor).toUpperCase();
    }

    function parseDataISO(valor) {
      const raw = String(valor || '').trim();
      if (!/^\d{4}-\d{2}-\d{2}$/.test(raw)) return null;
      const d = new Date(`${raw}T00:00:00`);
      if (Number.isNaN(d.getTime())) return null;
      return d;
    }

    function obterStatusVisual(despesa) {
      const pendente = Number(despesa?.total_pendente || 0);
      if (pendente <= 0.009) return 'PAGO';

      const vencimento = parseDataISO(despesa?.data_vencimento);
      if (vencimento) {
        const hoje = new Date();
        hoje.setHours(0, 0, 0, 0);
        if (vencimento < hoje) return 'VENCIDO';
      }

      const statusRaw = String(despesa?.status_pagamento || '').trim().toUpperCase();
      if (statusRaw.includes('PARCIAL')) return 'PARCIAL';
      if (statusRaw.includes('PAGO')) return 'PAGO';
      return 'PENDENTE';
    }

    function obterClasseStatus(statusVisual) {
      const s = String(statusVisual || '').trim().toUpperCase();
      if (s === 'PAGO') return 'pago';
      if (s === 'PARCIAL') return 'parcial';
      if (s === 'VENCIDO') return 'vencido';
      return 'pendente';
    }

    function prioridadeStatusDespesa(despesa) {
      const status = obterStatusVisual(despesa);
      return Number(STATUS_PRIORIDADE[status] ?? 5);
    }

    function ordenarValoresUnicos(lista) {
      return [...new Set((Array.isArray(lista) ? lista : [])
        .map(v => String(v || '').trim())
        .filter(Boolean))]
        .sort((a, b) => a.localeCompare(b, 'pt-BR', { sensitivity: 'base' }));
    }

    function compararDespesasPrioridade(a, b) {
      const prioridadeA = prioridadeStatusDespesa(a);
      const prioridadeB = prioridadeStatusDespesa(b);
      if (prioridadeA !== prioridadeB) return prioridadeA - prioridadeB;

      const pendenteA = Number(a?.total_pendente || 0);
      const pendenteB = Number(b?.total_pendente || 0);
      if (pendenteA !== pendenteB) return pendenteB - pendenteA;

      const vencA = parseDataISO(a?.data_vencimento);
      const vencB = parseDataISO(b?.data_vencimento);
      if (vencA && vencB) {
        if (vencA.getTime() !== vencB.getTime()) return vencA - vencB;
      } else if (vencA && !vencB) {
        return -1;
      } else if (!vencA && vencB) {
        return 1;
      }

      const nomeA = String(a?.descricao || '').trim();
      const nomeB = String(b?.descricao || '').trim();
      return nomeA.localeCompare(nomeB, 'pt-BR', { sensitivity: 'base' });
    }

    function renderSelect(selectEl, valores, placeholder = 'Selecione') {
      if (!selectEl || selectEl.tagName !== 'SELECT') return;

      const lista = (Array.isArray(valores) ? valores : [])
        .map(v => String(v || '').trim())
        .filter(v => v !== '');
      const atual = String(selectEl.value || '').trim().toUpperCase();

      selectEl.innerHTML = '';
      const o0 = document.createElement('option');
      o0.value = '';
      o0.textContent = placeholder;
      selectEl.appendChild(o0);

      lista.forEach(v => {
        const o = document.createElement('option');
        o.value = v;
        o.textContent = v;
        selectEl.appendChild(o);
      });

      const match = [...selectEl.options].find(o => String(o.value || '').trim().toUpperCase() === atual);
      selectEl.value = match ? match.value : '';
    }

    function atualizarRotuloBotaoFiltroTopBar() {
      const btn = document.getElementById('btnFiltroDespesas');
      if (!btn) return;
      const ativos = [
        filtrosLista.status,
        filtrosLista.pagoPor,
        filtrosLista.categoria,
        filtrosLista.fornecedor
      ].filter(v => String(v || '').trim() !== '').length;
      btn.textContent = ativos > 0 ? `Filtrar (${ativos})` : 'Filtrar';
      btn.classList.toggle('active', ativos > 0);
    }

    function popularFiltrosListaDespesas() {
      const f = el();
      if (!f.filtroStatus || !f.filtroPagoPor || !f.filtroCategoria || !f.filtroFornecedor) return;

      const statusDisponiveis = STATUS_LABEL_ORDEM
        .filter(label => despesas.some(item => obterStatusVisual(item) === label));

      const categorias = ordenarValoresUnicos([
        ...despesas.map(item => item?.categoria),
        ...((Array.isArray(validacoes?.categoriasDespesas) ? validacoes.categoriasDespesas : []))
      ]);

      const fornecedores = ordenarValoresUnicos([
        ...despesas.map(item => item?.fornecedor),
        ...((Array.isArray(validacoes?.fornecedores) ? validacoes.fornecedores : []))
      ]);

      const pagosPor = ordenarValoresUnicos([
        ...despesas.map(item => item?.pago_por),
        ...((Array.isArray(validacoes?.pagosPor) ? validacoes.pagosPor : []))
      ]);

      const statusAtual = String(filtrosLista.status || '').trim();
      const pagoPorAtual = String(filtrosLista.pagoPor || '').trim();
      const categoriaAtual = String(filtrosLista.categoria || '').trim();
      const fornecedorAtual = String(filtrosLista.fornecedor || '').trim();

      renderSelect(f.filtroStatus, statusDisponiveis, 'Todos');
      renderSelect(f.filtroPagoPor, pagosPor, 'Todos');
      renderSelect(f.filtroCategoria, categorias, 'Todas');
      renderSelect(f.filtroFornecedor, fornecedores, 'Todos');

      if (statusDisponiveis.includes(statusAtual)) f.filtroStatus.value = statusAtual;
      else f.filtroStatus.value = '';

      if (pagosPor.includes(pagoPorAtual)) f.filtroPagoPor.value = pagoPorAtual;
      else f.filtroPagoPor.value = '';

      if (categorias.includes(categoriaAtual)) f.filtroCategoria.value = categoriaAtual;
      else f.filtroCategoria.value = '';

      if (fornecedores.includes(fornecedorAtual)) f.filtroFornecedor.value = fornecedorAtual;
      else f.filtroFornecedor.value = '';

      filtrosLista.status = String(f.filtroStatus.value || '').trim();
      filtrosLista.pagoPor = String(f.filtroPagoPor.value || '').trim();
      filtrosLista.categoria = String(f.filtroCategoria.value || '').trim();
      filtrosLista.fornecedor = String(f.filtroFornecedor.value || '').trim();
      atualizarRotuloBotaoFiltroTopBar();
    }

    function limparFiltrosListaDespesas() {
      filtrosLista = {
        status: '',
        pagoPor: '',
        categoria: '',
        fornecedor: ''
      };

      const f = el();
      if (f.filtroStatus) f.filtroStatus.value = '';
      if (f.filtroPagoPor) f.filtroPagoPor.value = '';
      if (f.filtroCategoria) f.filtroCategoria.value = '';
      if (f.filtroFornecedor) f.filtroFornecedor.value = '';
      atualizarRotuloBotaoFiltroTopBar();
    }

    function abrirPainelFiltros() {
      const f = el();
      if (!f.painelFiltros) return;
      f.painelFiltros.classList.remove('hidden');
      if (!listenerFecharFiltrosAtivo) {
        listenerFecharFiltrosAtivo = true;
        document.addEventListener('pointerdown', fecharPainelFiltrosAoClicarFora, { capture: true });
      }
    }

    function fecharPainelFiltros() {
      const f = el();
      if (!f.painelFiltros) return;
      f.painelFiltros.classList.add('hidden');
      if (listenerFecharFiltrosAtivo) {
        listenerFecharFiltrosAtivo = false;
        document.removeEventListener('pointerdown', fecharPainelFiltrosAoClicarFora, { capture: true });
      }
    }

    function togglePainelFiltros() {
      const f = el();
      if (!f.painelFiltros) return;
      if (f.painelFiltros.classList.contains('hidden')) {
        abrirPainelFiltros();
      } else {
        fecharPainelFiltros();
      }
    }

    function fecharPainelFiltrosAoClicarFora(evento) {
      const f = el();
      if (!f.painelFiltros || f.painelFiltros.classList.contains('hidden')) return;
      const btn = document.getElementById('btnFiltroDespesas');
      if (f.painelFiltros.contains(evento.target)) return;
      if (btn && btn.contains(evento.target)) return;
      fecharPainelFiltros();
    }

    function bindFiltrosListaDespesas() {
      const f = el();
      if (!f.painelFiltros) return;
      if (f.painelFiltros.dataset.boundDespesasFilters === '1') return;
      f.painelFiltros.dataset.boundDespesasFilters = '1';

      const onFiltroChange = () => {
        filtrosLista.status = String(f.filtroStatus?.value || '').trim();
        filtrosLista.pagoPor = String(f.filtroPagoPor?.value || '').trim();
        filtrosLista.categoria = String(f.filtroCategoria?.value || '').trim();
        filtrosLista.fornecedor = String(f.filtroFornecedor?.value || '').trim();
        atualizarRotuloBotaoFiltroTopBar();
        renderDespesas();
      };

      [f.filtroStatus, f.filtroPagoPor, f.filtroCategoria, f.filtroFornecedor].forEach(sel => {
        if (!sel) return;
        sel.addEventListener('change', onFiltroChange);
      });

      if (f.btnLimparFiltros) {
        f.btnLimparFiltros.addEventListener('click', () => {
          limparFiltrosListaDespesas();
          renderDespesas();
        });
      }
    }

    function carregarValidacoes(onDone) {
      const loader = window.AppValidacoes?.get
        ? window.AppValidacoes.get({ maxAgeMs: 1000 * 60 * 60 * 12 })
        : Promise.reject(new Error('cache de validacoes indisponivel'));

      loader
        .then(({ data }) => {
          validacoes = data || {};
          validacoes.categoriasDespesas ||= [];
          validacoes.fornecedores ||= [];
          validacoes.formasPagamento ||= [];
          validacoes.pagosPor ||= [];

          const f = el();
          renderSelect(f.despesaCategoria, validacoes.categoriasDespesas);
          renderSelect(f.despesaFornecedor, validacoes.fornecedores);
          renderSelect(f.despesaPagoPor, validacoes.pagosPor);
          renderSelect(f.despesaFormaPagamento, validacoes.formasPagamento);
          renderSelect(f.pagDespesaForma, validacoes.formasPagamento);
          handleDespesaFormaPagamentoChange();
          popularFiltrosListaDespesas();

          if (typeof onDone === 'function') onDone();
        })
        .catch(() => {
          mostrarToast('Falha ao carregar validacoes', 'erro');
          if (typeof onDone === 'function') onDone();
        });
    }

    function getDataBaseParcelasDespesa() {
      const f = el();
      return String(f.despesaDataPagamento?.value || f.despesaDataCompetencia?.value || getHojeISO()).trim();
    }

    function gerarParcelasPadrao(valorTotal, parcelas, dataBase) {
      const total = Number(valorTotal || 0);
      const qtd = Math.max(1, Math.floor(Number(parcelas || 1)));
      const inicioRaw = String(dataBase || getHojeISO()).trim();
      const inicio = /^\d{4}-\d{2}-\d{2}$/.test(inicioRaw) ? new Date(`${inicioRaw}T00:00:00`) : new Date();
      const base = qtd > 0 ? Number((total / qtd).toFixed(2)) : 0;
      const lista = [];
      for (let i = 0; i < qtd; i++) {
        const d = new Date(inicio);
        d.setMonth(d.getMonth() + i);
        const yyyy = d.getFullYear();
        const mm = String(d.getMonth() + 1).padStart(2, '0');
        const dd = String(d.getDate()).padStart(2, '0');
        const valor = i === qtd - 1
          ? Number((total - (base * (qtd - 1))).toFixed(2))
          : base;
        lista.push({
          numero: i + 1,
          data: `${yyyy}-${mm}-${dd}`,
          valor: Number(valor.toFixed(2))
        });
      }
      return lista;
    }

    function lerParcelasDetalheDespesa() {
      const f = el();
      if (!f.despesaParcelasDetalheLista) return [];
      const linhas = [...f.despesaParcelasDetalheLista.querySelectorAll('.parcela-detalhe-linha')];
      return linhas.map((linha, idx) => ({
        numero: idx + 1,
        data: String(linha.querySelector('input[data-campo="data"]')?.value || '').trim(),
        valor: parseNumeroInput(linha.querySelector('input[data-campo="valor"]')?.value || '')
      }));
    }

    function renderParcelasDetalheDespesa(listaForcada) {
      const f = el();
      if (!f.despesaParcelasDetalheWrap || !f.despesaParcelasDetalheLista) return;

      const exibir = formaExigeParcelas(String(f.despesaFormaPagamento?.value || '').trim());
      if (!exibir) {
        f.despesaParcelasDetalheWrap.classList.add('hidden');
        f.despesaParcelasDetalheLista.innerHTML = '';
        return;
      }

      const parcelas = Math.max(1, Math.floor(parseNumeroInput(f.despesaParcelas?.value) || 1));
      const valorTotal = parseNumeroInput(f.despesaValorTotal?.value || 0);
      const dataBase = getDataBaseParcelasDespesa();
      const atuais = Array.isArray(listaForcada) ? listaForcada : lerParcelasDetalheDespesa();
      const usarAtuais = atuais.length === parcelas && atuais.every(p => String(p.data || '').trim() !== '');
      const lista = usarAtuais ? atuais : gerarParcelasPadrao(valorTotal, parcelas, dataBase);

      f.despesaParcelasDetalheLista.innerHTML = lista.map((p, idx) => `
        <div class="parcela-detalhe-linha">
          <span class="parcela-detalhe-num">#${idx + 1}</span>
          <input type="date" data-campo="data" value="${escapeHtml(p.data || '')}">
          <input type="number" data-campo="valor" min="0" step="0.01" value="${Number(p.valor || 0).toFixed(2)}">
        </div>
      `).join('');
      f.despesaParcelasDetalheWrap.classList.remove('hidden');
    }

    function handleDespesaFormaPagamentoChange() {
      const f = el();
      if (!f.despesaFormaPagamento || !f.despesaParcelasWrap || !f.despesaParcelas) return;
      const exibir = formaExigeParcelas(f.despesaFormaPagamento.value);
      f.despesaParcelasWrap.classList.toggle('hidden', !exibir);
      if (!exibir) {
        f.despesaParcelas.value = '1';
      } else if (!String(f.despesaParcelas.value || '').trim() || Number(f.despesaParcelas.value) < 1) {
        f.despesaParcelas.value = '1';
      }
      renderParcelasDetalheDespesa();
    }

    function handleDespesaParcelasDetalheChange() {
      renderParcelasDetalheDespesa();
    }

    function notificarDashboardAlterado() {
      try {
        if (window.AppTabRefresh?.markDirty) {
          window.AppTabRefresh.markDirty('dashboard');
        }
        const dash = window.DashboardController;
        if (dash?.invalidarCacheMeses) {
          const refs = dash.coletarMesesImpactados ? dash.coletarMesesImpactados(...arguments) : [];
          dash.invalidarCacheMeses(refs);
        }
        if (window.AppTabRefresh?.requestSync) {
          window.AppTabRefresh.requestSync('dashboard', {
            delayMs: 360,
            prefetch: true
          });
        } else if (dash?.atualizar) {
          dash.atualizar(true);
        }
      } catch (error) {
        // sem acao
      }
    }

    function listarMutacoesDespesaAtivas() {
      if (!window.AppOptimistic?.list) return [];
      return window.AppOptimistic.list({
        scope: 'despesa',
        domain: 'despesa'
      });
    }

    function reconciliarListaComMutacoes(listaBase) {
      if (!window.AppDespesaMutations?.mergeFetchedList) {
        return Array.isArray(listaBase) ? [...listaBase] : [];
      }
      return window.AppDespesaMutations.mergeFetchedList(listaBase, listarMutacoesDespesaAtivas());
    }

    function persistirEReRenderizarLista() {
      carregado = true;
      popularFiltrosListaDespesas();
      renderDespesas();
      salvarCacheDespesas();
    }

    function agendarSyncSilenciosoDespesas() {
      if (window.AppTabRefresh?.requestSync) {
        window.AppTabRefresh.requestSync('despesas', {
          delayMs: 900,
          prefetch: true
        });
        return;
      }
      setTimeout(() => {
        carregarDespesas(true);
      }, 900);
    }

    function tratarEventoMutacaoDespesa(detail) {
      const entry = detail?.entry;
      if (!entry || String(entry.scope || '').trim() !== 'despesa') return;
      if (String(entry?.meta?.domain || '').trim() !== 'despesa') return;
      if (!window.AppDespesaMutations?.applyEntryToList) return;

      despesas = window.AppDespesaMutations.applyEntryToList(despesas, detail);
      persistirEReRenderizarLista();

      if (String(detail?.type || '').trim() === 'success') {
        agendarSyncSilenciosoDespesas();
        return;
      }

      if (String(detail?.type || '').trim() === 'error'
        && String(entry?.meta?.source || '').trim() === 'despesas') {
        mostrarToast(`${detail?.errorMessage || 'Falha ao sincronizar despesa'}. Use "Tentar novamente".`, 'erro');
      }
    }

    function registrarListenerMutacoesSeNecessario() {
      if (listenerMutacoesRegistrado) return;
      if (typeof window === 'undefined' || typeof window.addEventListener !== 'function') return;
      window.addEventListener('app:optimistic-mutation', evento => {
        tratarEventoMutacaoDespesa(evento?.detail || {});
      });
      listenerMutacoesRegistrado = true;
    }

    function getDespesaUiState(item) {
      if (!window.AppDespesaMutations?.getUiState) {
        return {
          status: '',
          action: '',
          label: '',
          message: '',
          canRetry: false,
          blockActions: false
        };
      }
      return window.AppDespesaMutations.getUiState(item);
    }

    function ehCriacaoLocalComFalha(item, localState = null) {
      const state = localState || getDespesaUiState(item);
      const status = String(state?.status || '').trim().toLowerCase();
      const action = String(item?._localAction || state?.action || '').trim().toLowerCase();
      const mutationId = String(item?._localMutationId || '').trim();
      return ['error', 'conflict'].includes(status)
        && action === 'create'
        && !!mutationId;
    }

    function descartarMutacaoDespesa(item) {
      const mutationId = String(item?._localMutationId || '').trim();
      if (!mutationId || !window.AppOptimistic?.discard) {
        throw new Error('Nao ha sincronizacao local para descartar.');
      }
      return window.AppOptimistic.discard(mutationId);
    }

    function filtrarDespesas(lista, texto) {
      const arr = Array.isArray(lista) ? lista : [];
      const termo = normalizarTexto(texto);
      const filtroStatus = normalizarStatus(filtrosLista.status);
      const filtroPagoPor = normalizarTexto(filtrosLista.pagoPor);
      const filtroCategoria = normalizarTexto(filtrosLista.categoria);
      const filtroFornecedor = normalizarTexto(filtrosLista.fornecedor);

      return arr
        .filter(d => {
          if (termo) {
            const blob = [
              d?.descricao,
              d?.categoria,
              d?.fornecedor,
              d?.pago_por,
              d?.status_pagamento,
              d?.forma_pagamento,
              d?.observacao
            ]
              .map(v => normalizarTexto(v))
              .join(' ');
            if (!blob.includes(termo)) return false;
          }

          if (filtroStatus && normalizarStatus(obterStatusVisual(d)) !== filtroStatus) return false;
          if (filtroPagoPor && normalizarTexto(d?.pago_por) !== filtroPagoPor) return false;
          if (filtroCategoria && normalizarTexto(d?.categoria) !== filtroCategoria) return false;
          if (filtroFornecedor && normalizarTexto(d?.fornecedor) !== filtroFornecedor) return false;

          return true;
        })
        .sort(compararDespesasPrioridade);
    }

    function montarCardResumoDespesa(d) {
      const pendente = Number(d?.total_pendente || 0);
      const pago = Number(d?.total_pago || 0);
      const localState = getDespesaUiState(d);
      const criacaoLocalComFalha = ehCriacaoLocalComFalha(d, localState);
      const bloquearAcoes = !!localState.blockActions && !criacaoLocalComFalha;
      const podePagar = pendente > 0.009 && !bloquearAcoes;
      const statusVisual = obterStatusVisual(d);
      const statusClasse = obterClasseStatus(statusVisual);
      const estadoClasse = localState.status ? `despesa-local-${localState.status}` : '';
      const estadoDeleteClasse = d?._localDeleted ? 'despesa-local-delete' : '';
      const rotuloExcluir = criacaoLocalComFalha ? 'Descartar' : 'Excluir';

      const card = document.createElement('div');
      card.className = `card card-ficha despesa-card despesa-card-${statusClasse} ${estadoClasse} ${estadoDeleteClasse}`.trim();
      card.innerHTML = `
        <div class="card-ficha-topo">${escapeHtml(d?.descricao || '-')}</div>
        <div class="card-ficha-corpo">
          <div class="despesa-card-header despesa-card-header-compact">
            <span class="despesa-card-resumo-label">Despesa geral</span>
            <span class="despesa-status-badge despesa-status-${statusClasse}">${escapeHtml(statusVisual)}</span>
          </div>
          ${localState.label ? `
            <div class="despesa-local-state-row">
              <span class="despesa-local-state despesa-local-state-${escapeHtml(localState.status || 'pending')}">${escapeHtml(localState.label)}</span>
              ${localState.canRetry ? `<button class="despesa-btn-inline despesa-btn-retry" onclick="DespesasController.retryDespesaMutation('${escapeHtml(d?.ID)}')">Tentar novamente</button>` : ''}
            </div>
          ` : ''}
          ${localState.message ? `<div class="despesa-local-message">${escapeHtml(localState.message)}</div>` : ''}

          <div class="despesa-card-meta-area">
            <div class="despesa-card-meta">
              <span class="despesa-meta-item"><strong>Categoria:</strong> ${escapeHtml(d?.categoria || 'SEM_CATEGORIA')}</span>
              <span class="despesa-meta-item"><strong>Fornecedor:</strong> ${escapeHtml(d?.fornecedor || 'SEM_FORNECEDOR')}</span>
              <span class="despesa-meta-item"><strong>Pago por:</strong> ${escapeHtml(d?.pago_por || '-')}</span>
            </div>

            <div class="despesa-acoes-laterais">
              <button class="despesa-btn-acao" onclick="DespesasController.editarDespesa('${escapeHtml(d?.ID)}')" ${bloquearAcoes ? 'disabled' : ''}>Editar</button>
              <button class="despesa-btn-acao" onclick="DespesasController.excluirDespesa('${escapeHtml(d?.ID)}')" ${bloquearAcoes ? 'disabled' : ''}>${rotuloExcluir}</button>
            </div>
          </div>

          <div class="despesa-card-valores">
            <div class="despesa-valor-box despesa-valor-pendente">
              <div class="despesa-valor-topo">
                <span>Pendente</span>
                ${podePagar ? `<button class="despesa-btn-inline" onclick="DespesasController.registrarPagamentoDespesa('${escapeHtml(d?.ID)}')">Registrar pagamento</button>` : ''}
              </div>
              <strong>${formatarMoeda(pendente)}</strong>
            </div>
            <div class="despesa-valor-box despesa-valor-pago">
              <span>Pago</span>
              <strong>${formatarMoeda(pago)}</strong>
            </div>
          </div>
        </div>
      `;
      return card;
    }

    function atualizarResumoLista(totalFiltrados, totalGeral) {
      const f = el();
      if (!f.resumoLista) return;

      const ativos = [];
      if (filtrosLista.status) ativos.push(`Status: ${filtrosLista.status}`);
      if (filtrosLista.pagoPor) ativos.push(`Pago por: ${filtrosLista.pagoPor}`);
      if (filtrosLista.categoria) ativos.push(`Categoria: ${filtrosLista.categoria}`);
      if (filtrosLista.fornecedor) ativos.push(`Fornecedor: ${filtrosLista.fornecedor}`);

      const base = `Mostrando ${totalFiltrados} de ${totalGeral} despesas`;
      const complemento = ativos.length > 0 ? ` | ${ativos.join(' | ')}` : '';
      f.resumoLista.textContent = `${base}${complemento}`;
      f.resumoLista.classList.toggle('hidden', totalGeral <= 0);
    }

    function renderControlesListaDespesas() {
      const f = el();
      if (!f.listaControles) return;

      f.listaControles.innerHTML = '';
      const restante = listaFiltradaAtual.length - qtdRenderizada;
      if (restante <= 0) return;

      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'btn-carregar-mais';
      const labelIdle = `Carregar mais (${restante})`;
      if (window.AppLoading?.setButtonLoading) {
        window.AppLoading.setButtonLoading(btn, carregandoMais, labelIdle, 'Carregando');
      } else {
        btn.textContent = carregandoMais ? 'Carregando...' : labelIdle;
      }
      btn.disabled = carregandoMais;
      btn.addEventListener('click', () => {
        renderMaisItensDespesas();
      });
      f.listaControles.appendChild(btn);
    }

    function renderMaisItensDespesas(onDone) {
      const f = el();
      if (!f.listaDespesas || carregandoMais) return;
      if (qtdRenderizada >= listaFiltradaAtual.length) {
        renderControlesListaDespesas();
        if (typeof onDone === 'function') onDone();
        return;
      }

      carregandoMais = true;
      renderControlesListaDespesas();

      const inicio = qtdRenderizada;
      const fim = Math.min(inicio + PAGE_SIZE, listaFiltradaAtual.length);
      const jobId = ++renderJobSeq;
      let idx = inicio;

      const processarChunk = () => {
        if (jobId !== renderJobSeq) return;

        const limite = Math.min(idx + RENDER_CHUNK_SIZE, fim);
        const fragment = document.createDocumentFragment();

        for (; idx < limite; idx++) {
          fragment.appendChild(montarCardResumoDespesa(listaFiltradaAtual[idx]));
        }

        f.listaDespesas.appendChild(fragment);

        if (idx < fim) {
          proximoFrame(processarChunk);
          return;
        }

        qtdRenderizada = fim;
        carregandoMais = false;
        renderControlesListaDespesas();
        if (typeof onDone === 'function') onDone();
      };

      proximoFrame(processarChunk);
    }

    function renderListaDespesas(itensFiltrados) {
      const f = el();
      if (!f.listaDespesas) return;
      f.listaDespesas.classList.remove('hidden');
      f.listaDespesas.innerHTML = '';
      if (f.listaControles) f.listaControles.innerHTML = '';

      renderJobSeq += 1;
      listaFiltradaAtual = Array.isArray(itensFiltrados) ? itensFiltrados : [];
      qtdRenderizada = 0;
      carregandoMais = false;
      atualizarResumoLista(listaFiltradaAtual.length, Array.isArray(despesas) ? despesas.length : 0);

      if (listaFiltradaAtual.length === 0) {
        const semFiltroTexto = !String(filtroTexto || '').trim();
        const semFiltrosEstruturados = [
          filtrosLista.status,
          filtrosLista.pagoPor,
          filtrosLista.categoria,
          filtrosLista.fornecedor
        ].every(v => String(v || '').trim() === '');
        const semFiltro = semFiltroTexto && semFiltrosEstruturados;
        f.listaDespesas.innerHTML = semFiltro
          ? '<p>Nenhuma despesa geral cadastrada.</p>'
          : '<p>Nenhuma despesa encontrada para os filtros aplicados.</p>';
        return;
      }

      renderMaisItensDespesas();
    }

    function renderDespesas() {
      const lista = filtrarDespesas(despesas, filtroTexto);
      renderListaDespesas(lista);
    }

    function salvarCacheDespesas() {
      window.AppTabCache?.salvar?.('despesas', despesas);
    }

    function hidratarDespesasDoCache() {
      const listaCache = window.AppTabCache?.ler?.('despesas');
      if (!Array.isArray(listaCache)) return false;
      despesas = reconciliarListaComMutacoes(listaCache);
      persistirEReRenderizarLista();
      return true;
    }

    function carregarDespesas(forcarRecarregar = false, onDone) {
      const exibindoCache = !forcarRecarregar && hidratarDespesasDoCache();
      window.AppRequest.runner()
        .withFailureHandler(() => {
          if (exibindoCache) {
            if (window.AppRuntime?.setReadOnly) {
              window.AppRuntime.setReadOnly(true, 'Sem conexao com backend - exibindo cache local');
            }
            mostrarToast('Exibindo ultimo snapshot em cache', 'erro');
            if (typeof onDone === 'function') onDone();
            return;
          }
          mostrarToast('Erro ao carregar despesas gerais', 'erro');
          if (typeof onDone === 'function') onDone();
        })
        .withSuccessHandler(lista => {
          if (window.AppRuntime?.setReadOnly) {
            window.AppRuntime.setReadOnly(false);
          }
          despesas = reconciliarListaComMutacoes(Array.isArray(lista) ? lista : []);
          persistirEReRenderizarLista();
          if (typeof onDone === 'function') onDone();
        })
        .listarDespesasGerais(!!forcarRecarregar);
    }

    function init() {
      registrarListenerMutacoesSeNecessario();
      window.AppOptimistic?.process?.();
      if (!iniciado) {
        const f = el();
        bindFiltrosListaDespesas();
        atualizarRotuloBotaoFiltroTopBar();
        if (f.despesaDataCompetencia && !f.despesaDataCompetencia.value) {
          f.despesaDataCompetencia.value = getHojeISO();
        }
        carregarValidacoes(() => {
          carregarDespesas(false);
        });
        iniciado = true;
        return;
      }
      syncFromBackend();
    }

    function isLoaded() {
      return carregado;
    }

    function syncFromBackend(onDone) {
      carregarDespesas(true, onDone);
    }

    function setFiltroTexto(texto) {
      filtroTexto = String(texto || '');
      renderDespesas();
    }

    function getById(id) {
      const alvo = String(id || '').trim();
      if (!alvo) return null;
      return despesas.find(d => String(d.ID || '').trim() === alvo) || null;
    }

    function limparFormularioDespesa() {
      const f = el();
      if (f.despesaDescricao) f.despesaDescricao.value = '';
      if (f.despesaCategoria) f.despesaCategoria.value = '';
      if (f.despesaFornecedor) f.despesaFornecedor.value = '';
      if (f.despesaPagoPor) f.despesaPagoPor.value = '';
      if (f.despesaValorTotal) f.despesaValorTotal.value = '';
      if (f.despesaDataCompetencia) f.despesaDataCompetencia.value = getHojeISO();
      if (f.despesaDataVencimento) f.despesaDataVencimento.value = '';
      if (f.despesaDataPagamento) f.despesaDataPagamento.value = '';
      if (f.despesaFormaPagamento) f.despesaFormaPagamento.value = '';
      if (f.despesaParcelas) f.despesaParcelas.value = '1';
      if (f.despesaParcelasDetalheLista) f.despesaParcelasDetalheLista.innerHTML = '';
      if (f.despesaParcelasDetalheWrap) f.despesaParcelasDetalheWrap.classList.add('hidden');
      if (f.despesaFixo) f.despesaFixo.checked = false;
      if (f.despesaObservacao) f.despesaObservacao.value = '';
      despesaEditandoId = null;
      handleDespesaFormaPagamentoChange();
      setModoFormularioDespesa(false);
    }

    function setModoFormularioDespesa(editando) {
      const f = el();
      const ehEdicao = !!editando;
      if (f.despesaFormTitulo) {
        f.despesaFormTitulo.textContent = ehEdicao ? 'Editar despesa' : 'Nova despesa';
      }
      if (f.btnSalvarDespesa && !salvandoDespesa) {
        f.btnSalvarDespesa.textContent = ehEdicao ? 'Salvar alteracoes' : 'Salvar despesa';
      }
    }

    function preencherFormularioDespesa(item) {
      const f = el();
      if (!item) return;

      if (f.despesaDescricao) f.despesaDescricao.value = item.descricao || '';
      if (f.despesaCategoria) f.despesaCategoria.value = item.categoria || '';
      if (f.despesaFornecedor) f.despesaFornecedor.value = item.fornecedor || '';
      if (f.despesaPagoPor) f.despesaPagoPor.value = item.pago_por || '';
      if (f.despesaValorTotal) f.despesaValorTotal.value = item.valor_total || '';
      if (f.despesaDataCompetencia) f.despesaDataCompetencia.value = item.data_competencia || '';
      if (f.despesaDataVencimento) f.despesaDataVencimento.value = item.data_vencimento || '';
      if (f.despesaDataPagamento) f.despesaDataPagamento.value = item.data_pagamento || '';
      if (f.despesaFormaPagamento) f.despesaFormaPagamento.value = item.forma_pagamento || item.forma_pagamento_padrao || '';
      if (f.despesaParcelas) f.despesaParcelas.value = item.parcelas || '1';
      if (f.despesaFixo) f.despesaFixo.checked = parseBooleanInput(item.fixo);
      if (f.despesaObservacao) f.despesaObservacao.value = item.observacao || '';
      handleDespesaFormaPagamentoChange();
      renderParcelasDetalheDespesa(
        Array.isArray(item.parcelas_detalhe)
          ? item.parcelas_detalhe.map((p, idx) => ({
            numero: idx + 1,
            data: String(p.data_prevista || p.data || '').trim(),
            valor: Number(p.valor_previsto ?? p.valor ?? 0)
          }))
          : []
      );
    }

    function abrirFormularioDespesa() {
      if (!podeAlterarDados('Adicao bloqueada em modo somente leitura')) return;
      const f = el();
      if (!f.formDespesa) return;
      limparFormularioDespesa();
      f.formDespesa.classList.remove('hidden');
    }

    function abrirFormularioNovo() {
      abrirFormularioDespesa();
    }

    function editarDespesa(id) {
      if (!podeAlterarDados('Edicao bloqueada em modo somente leitura')) return;
      const despesaId = String(id || '').trim();
      const item = getById(despesaId);
      if (!item) {
        mostrarToast('Despesa nao encontrada', 'erro');
        return;
      }
      const localState = getDespesaUiState(item);
      if (ehCriacaoLocalComFalha(item, localState)) {
        const snapshot = window.AppDespesaMutations?.limparMeta?.(item) || { ...(item || {}) };
        try {
          descartarMutacaoDespesa(item);
        } catch (error) {
          mostrarToast(error?.message || 'Nao foi possivel liberar a despesa local para edicao', 'erro');
          return;
        }
        reabrirFormularioDespesaAposErro(snapshot, { editando: false });
        mostrarToast('Despesa com falha reaberta para ajuste.');
        return;
      }
      if (localState.blockActions) {
        mostrarToast('Aguarde a sincronizacao atual terminar ou use "Tentar novamente".', 'erro');
        return;
      }

      despesaEditandoId = despesaId;
      preencherFormularioDespesa(item);
      setModoFormularioDespesa(true);
      const f = el();
      if (f.formDespesa) {
        f.formDespesa.classList.remove('hidden');
      }
    }

    function editar(id) {
      editarDespesa(id);
    }

    function cancelarFormularioDespesa() {
      const f = el();
      if (!f.formDespesa) return;
      f.formDespesa.classList.add('hidden');
      limparFormularioDespesa();
    }

    function reabrirFormularioDespesaAposErro(payload, opcoes = {}) {
      const f = el();
      const dados = payload ? { ...payload } : {};
      const editando = !!opcoes.editando;
      despesaEditandoId = editando ? String(opcoes.id || '') : null;
      preencherFormularioDespesa(dados);
      setModoFormularioDespesa(editando);
      if (f.formDespesa) {
        f.formDespesa.classList.remove('hidden');
      }
    }

    function setSalvandoDespesa(ativo) {
      salvandoDespesa = !!ativo;
      if (window.AppMutationUI?.lock && window.AppMutationUI?.unlock) {
        if (salvandoDespesa) {
          if (!mutationLockToken) {
            mutationLockToken = window.AppMutationUI.lock();
          }
        } else if (mutationLockToken) {
          window.AppMutationUI.unlock(mutationLockToken);
          mutationLockToken = null;
        }
      }
      const f = el();
      if (f.btnSalvarDespesa) {
        f.btnSalvarDespesa.disabled = salvandoDespesa;
        if (salvandoDespesa) {
          if (window.AppLoading?.setButtonLoading) {
            window.AppLoading.setButtonLoading(
              f.btnSalvarDespesa,
              true,
              despesaEditandoId ? 'Salvar alteracoes' : 'Salvar despesa',
              'Salvando'
            );
          } else {
            f.btnSalvarDespesa.textContent = 'Salvando...';
          }
        } else if (window.AppLoading?.setButtonLoading) {
          window.AppLoading.setButtonLoading(
            f.btnSalvarDespesa,
            false,
            despesaEditandoId ? 'Salvar alteracoes' : 'Salvar despesa'
          );
        } else {
          f.btnSalvarDespesa.textContent = despesaEditandoId ? 'Salvar alteracoes' : 'Salvar despesa';
        }
      }
    }

    function salvarDespesa() {
      if (!podeAlterarDados('Salvamento bloqueado em modo somente leitura')) return;
      if (salvandoDespesa) return;
      const f = el();

      const descricao = String(f.despesaDescricao?.value || '').trim();
      const categoria = String(f.despesaCategoria?.value || '').trim();
      const valorTotal = parseNumeroInput(f.despesaValorTotal?.value);
      if (!descricao) {
        mostrarToast('Descricao da despesa e obrigatoria', 'erro');
        return;
      }
      if (!categoria) {
        mostrarToast('Categoria da despesa e obrigatoria', 'erro');
        return;
      }
      if (!isFinite(valorTotal) || valorTotal <= 0) {
        mostrarToast('Valor total invalido', 'erro');
        return;
      }
      const formaPagamento = String(f.despesaFormaPagamento?.value || '').trim();
      const parcelasBruto = parseNumeroInput(f.despesaParcelas?.value);
      const parcelas = formaExigeParcelas(formaPagamento)
        ? Math.floor(Number(parcelasBruto || 0))
        : 1;
      if (formaExigeParcelas(formaPagamento) && (!isFinite(parcelas) || parcelas < 1)) {
        mostrarToast('Parcelas deve ser um numero inteiro maior ou igual a 1', 'erro');
        return;
      }
      const parcelasDetalhe = formaExigeParcelas(formaPagamento)
        ? lerParcelasDetalheDespesa()
        : gerarParcelasPadrao(valorTotal, 1, getDataBaseParcelasDespesa());
      if (formaExigeParcelas(formaPagamento)) {
        if (parcelasDetalhe.length !== parcelas) {
          mostrarToast('Revise as parcelas detalhadas', 'erro');
          return;
        }
        const algumaDataInvalida = parcelasDetalhe.some(p => !String(p.data || '').trim());
        if (algumaDataInvalida) {
          mostrarToast('Preencha a data de todas as parcelas', 'erro');
          return;
        }
        const algumValorInvalido = parcelasDetalhe.some(p => Number(p.valor || 0) <= 0);
        if (algumValorInvalido) {
          mostrarToast('Valor de parcela deve ser maior que zero', 'erro');
          return;
        }
      }

      const payload = {
        descricao,
        categoria,
        fornecedor: String(f.despesaFornecedor?.value || '').trim(),
        pago_por: String(f.despesaPagoPor?.value || '').trim(),
        valor_total: valorTotal,
        data_competencia: String(f.despesaDataCompetencia?.value || '').trim(),
        data_vencimento: String(f.despesaDataVencimento?.value || '').trim(),
        data_pagamento: String(f.despesaDataPagamento?.value || '').trim(),
        forma_pagamento: formaPagamento,
        parcelas,
        parcelas_detalhe: parcelasDetalhe,
        fixo: !!f.despesaFixo?.checked,
        observacao: String(f.despesaObservacao?.value || '').trim()
      };
      const payloadFormulario = {
        ...payload,
        parcelas_detalhe: Array.isArray(payload.parcelas_detalhe)
          ? payload.parcelas_detalhe.map(p => ({ ...p }))
          : []
      };
      const despesaAnterior = despesaEditandoId ? getById(despesaEditandoId) : null;
      const eraEdicao = !!despesaEditandoId;
      const idEdicaoAtual = despesaEditandoId;
      const optimisticId = eraEdicao ? idEdicaoAtual : (window.AppDespesaMutations?.tempId?.('DES_TMP') || `DES_TMP_${Date.now()}`);
      const optimisticItem = window.AppDespesaMutations?.buildFromPayload
        ? window.AppDespesaMutations.buildFromPayload(payload, {
          baseItem: despesaAnterior,
          id: optimisticId
        })
        : {
          ...(despesaAnterior || {}),
          ...payload,
          ID: optimisticId
        };

      setSalvandoDespesa(true);
      try {
        if (!window.AppOptimistic?.enqueue) {
          throw new Error('Fila de sincronizacao indisponivel');
        }
        window.AppOptimistic.enqueue({
          scope: 'despesa',
          handler: eraEdicao ? 'despesa.update' : 'despesa.create',
          entityKey: eraEdicao ? `despesa:${idEdicaoAtual}` : `despesa:${optimisticId}`,
          payload,
          meta: {
            domain: 'despesa',
            action: eraEdicao ? 'update' : 'create',
            source: 'despesas',
            target_id: eraEdicao ? idEdicaoAtual : '',
            before_item: despesaAnterior ? (window.AppDespesaMutations?.limparMeta?.(despesaAnterior) || despesaAnterior) : null,
            optimistic_item: window.AppDespesaMutations?.limparMeta?.(optimisticItem) || optimisticItem
          }
        });
        setSalvandoDespesa(false);
        cancelarFormularioDespesa();
        window.AppModalUI?.closeAll?.();
        mostrarToast(eraEdicao
          ? 'Alteracao aplicada localmente. Sincronizando...'
          : 'Despesa criada localmente. Sincronizando...');
      } catch (error) {
        setSalvandoDespesa(false);
        mostrarToast(error?.message || 'Erro ao enfileirar despesa', 'erro');
        reabrirFormularioDespesaAposErro(payloadFormulario, {
          editando: eraEdicao,
          id: idEdicaoAtual
        });
      }
    }

    function excluirDespesa(id) {
      if (!podeAlterarDados('Exclusao bloqueada em modo somente leitura')) return;
      const despesaId = String(id || '').trim();
      if (!despesaId) return;
      const despesaAtual = getById(despesaId);
      if (!despesaAtual) {
        mostrarToast('Despesa nao encontrada', 'erro');
        return;
      }
      const localState = getDespesaUiState(despesaAtual);
      const mensagemConfirmacao = ehCriacaoLocalComFalha(despesaAtual, localState)
        ? 'Deseja descartar esta despesa local com falha de sincronizacao?'
        : 'Deseja remover esta despesa geral?';
      if (!confirm(mensagemConfirmacao)) return;
      if (ehCriacaoLocalComFalha(despesaAtual, localState)) {
        try {
          descartarMutacaoDespesa(despesaAtual);
          mostrarToast('Despesa local descartada.');
        } catch (error) {
          mostrarToast(error?.message || 'Nao foi possivel descartar a despesa local', 'erro');
        }
        return;
      }
      if (localState.blockActions) {
        mostrarToast('Esta despesa ja possui uma sincronizacao pendente.', 'erro');
        return;
      }

      try {
        if (!window.AppOptimistic?.enqueue) {
          throw new Error('Fila de sincronizacao indisponivel');
        }
        window.AppOptimistic.enqueue({
          scope: 'despesa',
          handler: 'despesa.delete',
          entityKey: `despesa:${despesaId}`,
          payload: {
            id: despesaId
          },
          meta: {
            domain: 'despesa',
            action: 'delete',
            source: 'despesas',
            target_id: despesaId,
            before_item: window.AppDespesaMutations?.limparMeta?.(despesaAtual) || despesaAtual,
            optimistic_item: window.AppDespesaMutations?.limparMeta?.(despesaAtual) || despesaAtual
          }
        });
        mostrarToast('Exclusao aplicada localmente. Sincronizando...');
      } catch (error) {
        mostrarToast(error?.message || 'Erro ao enfileirar exclusao da despesa', 'erro');
      }
    }

    function excluir(id) {
      excluirDespesa(id);
    }

    function retryDespesaMutation(id) {
      const item = getById(id);
      const mutationId = String(item?._localMutationId || '').trim();
      if (!mutationId || !window.AppOptimistic?.retry) {
        mostrarToast('Nao ha sincronizacao pendente para reenviar', 'erro');
        return;
      }
      window.AppOptimistic.retry(mutationId);
      mostrarToast('Tentando sincronizar novamente...');
    }

    function setSalvandoPagamentoDespesa(ativo) {
      salvandoPagamentoDespesa = !!ativo;
      if (window.AppMutationUI?.lock && window.AppMutationUI?.unlock) {
        if (salvandoPagamentoDespesa) {
          if (!mutationLockTokenPagamento) {
            mutationLockTokenPagamento = window.AppMutationUI.lock();
          }
        } else if (mutationLockTokenPagamento) {
          window.AppMutationUI.unlock(mutationLockTokenPagamento);
          mutationLockTokenPagamento = null;
        }
      }
      const f = el();
      [f.pagDespesaData, f.pagDespesaValor, f.pagDespesaParcela, f.pagDespesaForma, f.pagDespesaObservacao, f.btnConfirmarPagDespesa]
        .forEach(input => {
          if (input) input.disabled = salvandoPagamentoDespesa;
        });
      if (f.btnConfirmarPagDespesa) {
        if (window.AppLoading?.setButtonLoading) {
          window.AppLoading.setButtonLoading(
            f.btnConfirmarPagDespesa,
            salvandoPagamentoDespesa,
            'Confirmar pagamento',
            'Salvando'
          );
        } else {
          f.btnConfirmarPagDespesa.textContent = salvandoPagamentoDespesa
            ? 'Salvando...'
            : 'Confirmar pagamento';
        }
      }
    }

    function registrarPagamentoDespesa(id) {
      if (!podeAlterarDados('Pagamento bloqueado em modo somente leitura')) return false;
      if (salvandoPagamentoDespesa) return false;
      const despesaId = String(id || '').trim();
      const item = despesas.find(d => String(d.ID || '').trim() === despesaId);
      if (!item) {
        mostrarToast('Despesa nao encontrada', 'erro');
        return false;
      }
      if (getDespesaUiState(item).blockActions) {
        mostrarToast('Esta despesa ja possui uma sincronizacao pendente.', 'erro');
        return false;
      }

      const pendente = Number(item.total_pendente || 0);
      if (pendente <= 0.009) {
        mostrarToast('Despesa ja esta paga');
        return false;
      }

      const formas = Array.isArray(validacoes?.formasPagamento) ? validacoes.formasPagamento : [];
      if (formas.length === 0) {
        mostrarToast('Cadastre FORMA_PAGAMENTO na aba VALIDACAO', 'erro');
        return false;
      }

      const f = el();
      despesaPagamentoId = despesaId;
      if (f.pagDespesaTitulo) {
        f.pagDespesaTitulo.textContent = `Registrar pagamento: ${item.descricao || despesaId}`;
      }
      if (f.pagDespesaData) f.pagDespesaData.value = item.data_pagamento || getHojeISO();

      const parcelas = Array.isArray(item?.parcelas_detalhe) ? item.parcelas_detalhe : [];
      const totalParcelas = Math.max(1, Math.floor(parseNumeroInput(item?.parcelas || 1) || 1));
      despesaPagamentoParcelado = totalParcelas > 1;
      const proximaParcela = parcelas.find(p => Number(p?.valor_pendente || 0) > 0.009) || null;

      if (f.pagDespesaParcelaWrap && f.pagDespesaParcela) {
        if (despesaPagamentoParcelado) {
          if (!proximaParcela?.ID) {
            despesaPagamentoId = null;
            mostrarToast('Nao ha parcela pendente para esta despesa', 'erro');
            return false;
          }
          const numero = Number(proximaParcela.parcela_numero || 0);
          const total = Number(proximaParcela.parcelas_total || 0);
          const data = String(proximaParcela.data_prevista || '-').trim() || '-';
          const valorPend = Number(proximaParcela.valor_pendente || 0);

          f.pagDespesaParcela.innerHTML = '';
          const op = document.createElement('option');
          op.value = String(proximaParcela.ID || '').trim();
          op.textContent = `Parcela ${numero}/${total} - ${data} - ${formatarMoeda(valorPend)}`;
          f.pagDespesaParcela.appendChild(op);
          f.pagDespesaParcela.value = op.value;
          f.pagDespesaParcelaWrap.classList.remove('hidden');

          if (f.pagDespesaValor) {
            f.pagDespesaValor.value = valorPend > 0 ? valorPend.toFixed(2) : '';
            f.pagDespesaValor.readOnly = true;
          }
        } else {
          f.pagDespesaParcela.innerHTML = '<option value="">Parcela unica</option>';
          f.pagDespesaParcela.value = '';
          f.pagDespesaParcelaWrap.classList.add('hidden');
          if (f.pagDespesaValor) {
            f.pagDespesaValor.value = pendente.toFixed(2);
            f.pagDespesaValor.readOnly = false;
          }
        }
      } else if (f.pagDespesaValor) {
        f.pagDespesaValor.value = pendente.toFixed(2);
      }

      if (f.pagDespesaForma) f.pagDespesaForma.value = item.forma_pagamento || item.forma_pagamento_padrao || '';
      if (f.pagDespesaObservacao) f.pagDespesaObservacao.value = '';
      if (f.modalPagamentoDespesa) f.modalPagamentoDespesa.classList.remove('hidden');
      setSalvandoPagamentoDespesa(false);
      return true;
    }

    function registrarPagamento(id) {
      registrarPagamentoDespesa(id);
    }

    function reabrirPagamentoDespesaAposErro(despesaId, dados) {
      const id = String(despesaId || '').trim();
      if (!id) return;
      const abriu = registrarPagamentoDespesa(id);
      if (!abriu) return;
      const f = el();
      const payload = dados || {};
      const dataPagamento = String(payload.data_pagamento || '').trim();
      const valorPago = String(payload.valor_pago ?? '').trim();
      const parcelaAlvoId = String(payload.parcela_alvo_id || '').trim();
      const formaPagamento = String(payload.forma_pagamento || '').trim();
      const observacao = String(payload.observacao || '').trim();

      if (f.pagDespesaData && dataPagamento) f.pagDespesaData.value = dataPagamento;
      if (f.pagDespesaValor && valorPago !== '') f.pagDespesaValor.value = valorPago;
      if (f.pagDespesaForma && formaPagamento) f.pagDespesaForma.value = formaPagamento;
      if (f.pagDespesaObservacao) f.pagDespesaObservacao.value = observacao;
      if (f.pagDespesaParcela && parcelaAlvoId) {
        const possuiOpcao = [...f.pagDespesaParcela.options]
          .some(op => String(op.value || '').trim() === parcelaAlvoId);
        if (possuiOpcao) {
          f.pagDespesaParcela.value = parcelaAlvoId;
        }
      }
    }

    function confirmarPagamentoDespesa() {
      if (!podeAlterarDados('Pagamento bloqueado em modo somente leitura')) return;
      if (salvandoPagamentoDespesa) return;
      if (!despesaPagamentoId) {
        mostrarToast('Despesa nao selecionada', 'erro');
        return;
      }

      const f = el();
      const dataPagamento = String(f.pagDespesaData?.value || '').trim();
      const valorPago = parseNumeroInput(f.pagDespesaValor?.value);
      const formaPagamento = String(f.pagDespesaForma?.value || '').trim();
      const observacao = String(f.pagDespesaObservacao?.value || '').trim();

      if (!dataPagamento) {
        mostrarToast('Data de pagamento e obrigatoria', 'erro');
        return;
      }
      if (!formaPagamento) {
        mostrarToast('Forma de pagamento e obrigatoria', 'erro');
        return;
      }
      if (despesaPagamentoParcelado && !String(f.pagDespesaParcela?.value || '').trim()) {
        mostrarToast('Selecione a parcela pendente', 'erro');
        return;
      }
      if (!isFinite(valorPago) || valorPago <= 0) {
        mostrarToast('Valor pago invalido', 'erro');
        return;
      }
      const despesaIdAtual = despesaPagamentoId;
      const eraParcelado = despesaPagamentoParcelado;
      const despesaAtual = getById(despesaIdAtual);
      if (!despesaAtual) {
        mostrarToast('Despesa nao encontrada', 'erro');
        return;
      }
      const dadosFormulario = {
        data_pagamento: dataPagamento,
        valor_pago: valorPago,
        parcela_alvo_id: eraParcelado ? String(f.pagDespesaParcela?.value || '').trim() : '',
        forma_pagamento: formaPagamento,
        observacao
      };
      const optimisticItem = window.AppDespesaMutations?.applyPayment
        ? window.AppDespesaMutations.applyPayment(despesaAtual, dadosFormulario)
        : {
          ...(despesaAtual || {}),
          data_pagamento: dataPagamento
        };

      setSalvandoPagamentoDespesa(true);
      if (f.modalPagamentoDespesa) {
        f.modalPagamentoDespesa.classList.add('hidden');
      }
      despesaPagamentoId = null;
      despesaPagamentoParcelado = false;
      try {
        if (!window.AppOptimistic?.enqueue) {
          throw new Error('Fila de sincronizacao indisponivel');
        }
        window.AppOptimistic.enqueue({
          scope: 'despesa',
          handler: 'despesa.payment',
          entityKey: `despesa:${despesaIdAtual}`,
          payload: {
            data_pagamento: dataPagamento,
            valor_pago: valorPago,
            parcela_alvo_id: dadosFormulario.parcela_alvo_id,
            forma_pagamento: formaPagamento,
            observacao
          },
          meta: {
            domain: 'despesa',
            action: 'payment',
            source: 'despesas',
            target_id: despesaIdAtual,
            before_item: despesaAtual ? (window.AppDespesaMutations?.limparMeta?.(despesaAtual) || despesaAtual) : null,
            optimistic_item: window.AppDespesaMutations?.limparMeta?.(optimisticItem) || optimisticItem
          }
        });
        setSalvandoPagamentoDespesa(false);
        window.AppModalUI?.closeAll?.();
        mostrarToast('Pagamento aplicado localmente. Sincronizando...');
      } catch (error) {
        setSalvandoPagamentoDespesa(false);
        mostrarToast(error?.message || 'Erro ao enfileirar pagamento', 'erro');
        reabrirPagamentoDespesaAposErro(despesaIdAtual, dadosFormulario);
      }
    }

    function cancelarPagamentoDespesa() {
      despesaPagamentoId = null;
      despesaPagamentoParcelado = false;
      setSalvandoPagamentoDespesa(false);
      const f = el();
      if (f.pagDespesaValor) f.pagDespesaValor.readOnly = false;
      if (f.pagDespesaParcelaWrap) f.pagDespesaParcelaWrap.classList.add('hidden');
      if (f.pagDespesaParcela) f.pagDespesaParcela.innerHTML = '<option value="">Selecione</option>';
      if (f.modalPagamentoDespesa) {
        f.modalPagamentoDespesa.classList.add('hidden');
      }
    }

    return {
      init,
      isLoaded,
      syncFromBackend,
      setFiltroTexto,
      getById,
      togglePainelFiltros,
      fecharPainelFiltros,

      abrirFormularioNovo,
      abrirFormularioDespesa,
      cancelarFormularioDespesa,
      editar,
      editarDespesa,
      salvarDespesa,
      excluir,
      excluirDespesa,
      retryDespesaMutation,
      registrarPagamento,
      registrarPagamentoDespesa,
      confirmarPagamentoDespesa,
      cancelarPagamentoDespesa,
      handleDespesaFormaPagamentoChange,
      handleDespesaParcelasDetalheChange
    };
  })();
</script>
