<script>
  window.DespesasController = (() => {
    let iniciado = false;
    let carregado = false;
    let validacoes = {};
    let despesas = [];
    let inboxDespesas = [];
    let destinosComprovantes = [];
    let resumoComprovantes = {};
    let filtroInboxComprovantes = 'PENDENTES';
    let carregandoInboxDespesas = false;
    let processandoComprovanteDespesa = false;
    let importandoComprovantesDrive = false;
    let inboxDespesasRequest = null;
    let inboxDespesasRecargaPendente = false;
    let inboxDespesasAmbientePendente = '';
    let inboxDespesasChaveRequest = '';
    let inboxDespesasForcarPendente = false;
    let inboxDespesasUltimoResultado = true;
    const inboxDespesasLoadCallbacks = [];
    let inboxDespesasExpandida = false;
    let inboxDespesasEstadoInicialDefinido = false;
    const inboxDespesasBusyIds = new Set();
    const inboxDespesasRequestIds = new Map();
    let filtroTexto = '';
    let filtrosLista = {
      status: '',
      pagoPor: '',
      categoria: '',
      fornecedor: ''
    };

    let despesaEditandoId = null;
    let salvandoDespesa = false;
    let mutationLockToken = null;
    let mutationLockTokenPagamento = null;
    let despesaPagamentoId = null;
    let salvandoPagamentoDespesa = false;
    let despesaPagamentoParcelado = false;
    let listaFiltradaAtual = [];
    let qtdRenderizada = 0;
    let carregandoMais = false;
    let renderJobSeq = 0;
    let renderCompletionWaiters = [];
    let listenerFecharFiltrosAtivo = false;
    let listenerMutacoesRegistrado = false;
    let despesasLoadSeq = 0;
    let despesasAssinatura = '';

    const PAGE_SIZE = 30;
    const RENDER_CHUNK_SIZE = 8;
    const COMPROVANTE_MAX_DATA_URL_LENGTH = 7 * 1024 * 1024;
    const COMPROVANTE_MAX_DIMENSION = 1600;
    const COMPROVANTE_JPEG_QUALITY = 0.82;
    const STATUS_LABEL_ORDEM = ['VENCIDO', 'PENDENTE', 'PARCIAL', 'PAGO'];
    let despesasSortState = window.AppListOrder?.get?.('despesas') || { key: 'operation', direction: 'desc' };

    function registrarConclusaoRender(onDone) {
      if (typeof onDone === 'function') renderCompletionWaiters.push(onDone);
    }

    function concluirRenderPendente() {
      const waiters = renderCompletionWaiters.splice(0);
      waiters.forEach(callback => {
        try { callback(); } catch (error) { /* sem acao */ }
      });
    }
    const despesasSortAdapter = {
      getSort: () => ({ ...despesasSortState }),
      setSort: (key, direction) => {
        despesasSortState = window.AppListOrder?.save?.('despesas', key, direction)
          || { key, direction };
        return { ...despesasSortState };
      },
      getSortOptions: () => window.AppListOrder?.getOptions?.('despesas') || []
    };

    function el() {
      return {
        listaDespesas: document.getElementById('listaDespesasGerais'),
        listaControles: document.getElementById('listaControlesDespesas'),
        resumoLista: document.getElementById('despesasResumoLista'),
        painelFiltros: document.getElementById('painelFiltroDespesasLista'),
        filtroStatus: document.getElementById('filtroDespesaStatus'),
        filtroPagoPor: document.getElementById('filtroDespesaPagoPor'),
        filtroCategoria: document.getElementById('filtroDespesaCategoria'),
        filtroFornecedor: document.getElementById('filtroDespesaFornecedor'),
        btnLimparFiltros: document.getElementById('btnLimparFiltrosDespesas'),
        despesasInbox: document.getElementById('despesasInbox'),
        despesasInboxResumo: document.getElementById('despesasInboxResumo'),
        despesasInboxConteudo: document.getElementById('despesasInboxConteudo'),
        despesasInboxStatus: document.getElementById('despesasInboxStatus'),
        listaInboxDespesas: document.getElementById('listaInboxDespesas'),
        inputComprovanteDespesa: document.getElementById('inputComprovanteDespesa'),
        btnUploadComprovanteDespesa: document.getElementById('btnUploadComprovanteDespesa'),
        btnToggleInboxDespesas: document.getElementById('btnToggleInboxDespesas'),
        btnBuscarComprovantesDrive: document.getElementById('btnBuscarComprovantesDrive'),
        btnAtualizarInboxDespesas: document.getElementById('btnAtualizarInboxDespesas'),
        filtroInboxComprovantes: document.getElementById('filtroInboxComprovantes'),
        formDespesa: document.getElementById('formularioDespesaGeral'),
        despesaFormTitulo: document.getElementById('despesaFormTitulo'),
        btnSalvarDespesa: document.getElementById('btnSalvarDespesaGeral'),

        despesaDescricao: document.getElementById('despesaDescricao'),
        despesaCategoria: document.getElementById('despesaCategoria'),
        despesaFornecedor: document.getElementById('despesaFornecedor'),
        despesaPagoPor: document.getElementById('despesaPagoPor'),
        despesaValorTotal: document.getElementById('despesaValorTotal'),
        despesaDataCompetencia: document.getElementById('despesaDataCompetencia'),
        despesaDataVencimento: document.getElementById('despesaDataVencimento'),
        despesaDataPagamento: document.getElementById('despesaDataPagamento'),
        despesaFormaPagamento: document.getElementById('despesaFormaPagamento'),
        despesaParcelasWrap: document.getElementById('despesaParcelasWrap'),
        despesaParcelas: document.getElementById('despesaParcelas'),
        despesaParcelasDetalheWrap: document.getElementById('despesaParcelasDetalheWrap'),
        despesaParcelasDetalheLista: document.getElementById('despesaParcelasDetalheLista'),
        despesaFixo: document.getElementById('despesaFixo'),
        despesaObservacao: document.getElementById('despesaObservacao'),

        modalPagamentoDespesa: document.getElementById('modalPagamentoDespesa'),
        pagDespesaTitulo: document.getElementById('pagDespesaTitulo'),
        pagDespesaData: document.getElementById('pagDespesaData'),
        pagDespesaValor: document.getElementById('pagDespesaValor'),
        pagDespesaParcelaWrap: document.getElementById('pagDespesaParcelaWrap'),
        pagDespesaParcela: document.getElementById('pagDespesaParcela'),
        pagDespesaForma: document.getElementById('pagDespesaForma'),
        pagDespesaObservacao: document.getElementById('pagDespesaObservacao'),
        btnConfirmarPagDespesa: document.getElementById('btnConfirmarPagDespesa')
      };
    }

    function getHojeISO() {
      if (window.AppDomainUtils?.getHojeISO) {
        return window.AppDomainUtils.getHojeISO();
      }
      const d = new Date();
      const yyyy = d.getFullYear();
      const mm = String(d.getMonth() + 1).padStart(2, '0');
      const dd = String(d.getDate()).padStart(2, '0');
      return `${yyyy}-${mm}-${dd}`;
    }

    function getAmbienteBancoAtivoInbox() {
      const ctx = window.AppDbEnv?.getContext?.() || {};
      const env = String(ctx.effective_env || ctx.selected_env || '').trim().toLowerCase();
      return env === 'dev' ? 'dev' : 'prod';
    }

    function parseNumeroInput(valor) {
      if (window.AppDomainUtils?.parseNumeroZero) {
        return window.AppDomainUtils.parseNumeroZero(valor);
      }
      const s = String(valor ?? '').trim();
      if (!s) return 0;
      const n = Number(s.replace(',', '.'));
      return isNaN(n) ? 0 : n;
    }

    function podeAlterarDados(contexto = 'Operacao') {
      if (window.AppDomainUtils?.ensureWritable) {
        return window.AppDomainUtils.ensureWritable(contexto);
      }
      return !!window.AppRuntime?.ensureWritable
        ? window.AppRuntime.ensureWritable(contexto)
        : true;
    }

    function proximoFrame(fn) {
      let executado = false;
      const run = () => {
        if (executado) return;
        executado = true;
        fn();
      };
      if (typeof window !== 'undefined' && typeof window.requestAnimationFrame === 'function') {
        window.requestAnimationFrame(run);
      }
      setTimeout(run, 80);
    }

    function parseBooleanInput(valor) {
      const s = String(valor ?? '').trim().toLowerCase();
      return s === 'true' || s === '1' || s === 'sim' || s === 'yes';
    }

    function formatarMoeda(valor) {
      const n = Number(valor || 0);
      const seguro = isNaN(n) ? 0 : n;
      return `R$ ${seguro.toFixed(2)}`;
    }

    function formaExigeParcelas(valor) {
      if (window.AppDomainUtils?.formaExigeParcelas) {
        return window.AppDomainUtils.formaExigeParcelas(valor);
      }
      return false;
    }

    function escapeHtml(valor) {
      return String(valor ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function normalizarTexto(valor) {
      const normalizar = window.AppSearch?.normalizeText
        ? window.AppSearch.normalizeText
        : entrada => String(entrada ?? '')
          .normalize('NFD')
          .replace(/[\u0300-\u036f]/g, '')
          .toLowerCase()
          .trim();
      return normalizar(valor);
    }

    function normalizarStatus(valor) {
      return normalizarTexto(valor).toUpperCase();
    }

    function parseDataISO(valor) {
      const raw = String(valor || '').trim();
      if (!/^\d{4}-\d{2}-\d{2}$/.test(raw)) return null;
      const d = new Date(`${raw}T00:00:00`);
      if (Number.isNaN(d.getTime())) return null;
      return d;
    }

    function obterStatusVisual(despesa) {
      const pendente = Number(despesa?.total_pendente || 0);
      if (pendente <= 0.009) return 'PAGO';

      const vencimento = parseDataISO(despesa?.data_vencimento);
      if (vencimento) {
        const hoje = new Date();
        hoje.setHours(0, 0, 0, 0);
        if (vencimento < hoje) return 'VENCIDO';
      }

      const statusRaw = String(despesa?.status_pagamento || '').trim().toUpperCase();
      if (statusRaw.includes('PARCIAL')) return 'PARCIAL';
      if (statusRaw.includes('PAGO')) return 'PAGO';
      return 'PENDENTE';
    }

    function obterClasseStatus(statusVisual) {
      const s = String(statusVisual || '').trim().toUpperCase();
      if (s === 'PAGO') return 'pago';
      if (s === 'PARCIAL') return 'parcial';
      if (s === 'VENCIDO') return 'vencido';
      return 'pendente';
    }

    function ordenarValoresUnicos(lista) {
      return [...new Set((Array.isArray(lista) ? lista : [])
        .map(v => String(v || '').trim())
        .filter(Boolean))]
        .sort((a, b) => a.localeCompare(b, 'pt-BR', { sensitivity: 'base' }));
    }

    function renderSelect(selectEl, valores, placeholder = 'Selecione') {
      if (!selectEl || selectEl.tagName !== 'SELECT') return;

      const lista = (Array.isArray(valores) ? valores : [])
        .map(v => String(v || '').trim())
        .filter(v => v !== '');
      const atual = String(selectEl.value || '').trim().toUpperCase();

      selectEl.innerHTML = '';
      const o0 = document.createElement('option');
      o0.value = '';
      o0.textContent = placeholder;
      selectEl.appendChild(o0);

      lista.forEach(v => {
        const o = document.createElement('option');
        o.value = v;
        o.textContent = v;
        selectEl.appendChild(o);
      });

      const match = [...selectEl.options].find(o => String(o.value || '').trim().toUpperCase() === atual);
      selectEl.value = match ? match.value : '';
    }

    function atualizarRotuloBotaoFiltroTopBar() {
      const btn = document.getElementById('btnFiltroDespesas');
      if (!btn) return;
      const ativos = [
        filtrosLista.status,
        filtrosLista.pagoPor,
        filtrosLista.categoria,
        filtrosLista.fornecedor
      ].filter(v => String(v || '').trim() !== '').length;
      btn.textContent = ativos > 0 ? `Filtrar (${ativos})` : 'Filtrar';
      btn.classList.toggle('active', ativos > 0);
    }

    function popularFiltrosListaDespesas() {
      const f = el();
      if (!f.filtroStatus || !f.filtroPagoPor || !f.filtroCategoria || !f.filtroFornecedor) return;

      const statusDisponiveis = STATUS_LABEL_ORDEM
        .filter(label => despesas.some(item => obterStatusVisual(item) === label));

      const categorias = ordenarValoresUnicos([
        ...despesas.map(item => item?.categoria),
        ...((Array.isArray(validacoes?.categoriasDespesas) ? validacoes.categoriasDespesas : []))
      ]);

      const fornecedores = ordenarValoresUnicos([
        ...despesas.map(item => item?.fornecedor),
        ...((Array.isArray(validacoes?.fornecedores) ? validacoes.fornecedores : []))
      ]);

      const pagosPor = ordenarValoresUnicos([
        ...despesas.map(item => item?.pago_por),
        ...((Array.isArray(validacoes?.pagosPor) ? validacoes.pagosPor : []))
      ]);

      const statusAtual = String(filtrosLista.status || '').trim();
      const pagoPorAtual = String(filtrosLista.pagoPor || '').trim();
      const categoriaAtual = String(filtrosLista.categoria || '').trim();
      const fornecedorAtual = String(filtrosLista.fornecedor || '').trim();

      renderSelect(f.filtroStatus, statusDisponiveis, 'Todos');
      renderSelect(f.filtroPagoPor, pagosPor, 'Todos');
      renderSelect(f.filtroCategoria, categorias, 'Todas');
      renderSelect(f.filtroFornecedor, fornecedores, 'Todos');

      if (statusDisponiveis.includes(statusAtual)) f.filtroStatus.value = statusAtual;
      else f.filtroStatus.value = '';

      if (pagosPor.includes(pagoPorAtual)) f.filtroPagoPor.value = pagoPorAtual;
      else f.filtroPagoPor.value = '';

      if (categorias.includes(categoriaAtual)) f.filtroCategoria.value = categoriaAtual;
      else f.filtroCategoria.value = '';

      if (fornecedores.includes(fornecedorAtual)) f.filtroFornecedor.value = fornecedorAtual;
      else f.filtroFornecedor.value = '';

      filtrosLista.status = String(f.filtroStatus.value || '').trim();
      filtrosLista.pagoPor = String(f.filtroPagoPor.value || '').trim();
      filtrosLista.categoria = String(f.filtroCategoria.value || '').trim();
      filtrosLista.fornecedor = String(f.filtroFornecedor.value || '').trim();
      atualizarRotuloBotaoFiltroTopBar();
    }

    function limparFiltrosListaDespesas() {
      filtrosLista = {
        status: '',
        pagoPor: '',
        categoria: '',
        fornecedor: ''
      };

      const f = el();
      if (f.filtroStatus) f.filtroStatus.value = '';
      if (f.filtroPagoPor) f.filtroPagoPor.value = '';
      if (f.filtroCategoria) f.filtroCategoria.value = '';
      if (f.filtroFornecedor) f.filtroFornecedor.value = '';
      atualizarRotuloBotaoFiltroTopBar();
    }

    function abrirPainelFiltros() {
      const f = el();
      if (!f.painelFiltros) return;
      f.painelFiltros.classList.remove('hidden');
      if (!listenerFecharFiltrosAtivo) {
        listenerFecharFiltrosAtivo = true;
        document.addEventListener('pointerdown', fecharPainelFiltrosAoClicarFora, { capture: true });
      }
    }

    function fecharPainelFiltros() {
      const f = el();
      if (!f.painelFiltros) return;
      f.painelFiltros.classList.add('hidden');
      if (listenerFecharFiltrosAtivo) {
        listenerFecharFiltrosAtivo = false;
        document.removeEventListener('pointerdown', fecharPainelFiltrosAoClicarFora, { capture: true });
      }
    }

    function togglePainelFiltros() {
      const f = el();
      if (!f.painelFiltros) return;
      if (f.painelFiltros.classList.contains('hidden')) {
        abrirPainelFiltros();
      } else {
        fecharPainelFiltros();
      }
    }

    function fecharPainelFiltrosAoClicarFora(evento) {
      const f = el();
      if (!f.painelFiltros || f.painelFiltros.classList.contains('hidden')) return;
      const btn = document.getElementById('btnFiltroDespesas');
      if (f.painelFiltros.contains(evento.target)) return;
      if (btn && btn.contains(evento.target)) return;
      fecharPainelFiltros();
    }

    function bindFiltrosListaDespesas() {
      const f = el();
      if (!f.painelFiltros) return;
      if (f.painelFiltros.dataset.boundDespesasFilters === '1') return;
      f.painelFiltros.dataset.boundDespesasFilters = '1';

      const onFiltroChange = () => {
        filtrosLista.status = String(f.filtroStatus?.value || '').trim();
        filtrosLista.pagoPor = String(f.filtroPagoPor?.value || '').trim();
        filtrosLista.categoria = String(f.filtroCategoria?.value || '').trim();
        filtrosLista.fornecedor = String(f.filtroFornecedor?.value || '').trim();
        atualizarRotuloBotaoFiltroTopBar();
        renderDespesas();
      };

      [f.filtroStatus, f.filtroPagoPor, f.filtroCategoria, f.filtroFornecedor].forEach(sel => {
        if (!sel) return;
        sel.addEventListener('change', onFiltroChange);
      });

      if (f.btnLimparFiltros) {
        f.btnLimparFiltros.addEventListener('click', () => {
          limparFiltrosListaDespesas();
          renderDespesas();
        });
      }
    }

    function carregarValidacoes(onDone) {
      const loader = window.AppValidacoes?.get
        ? window.AppValidacoes.get({ maxAgeMs: 1000 * 60 * 60 * 12 })
        : Promise.reject(new Error('cache de validacoes indisponivel'));

      loader
        .then(({ data }) => {
          validacoes = data || {};
          validacoes.categoriasDespesas ||= [];
          validacoes.fornecedores ||= [];
          validacoes.formasPagamento ||= [];
          validacoes.pagosPor ||= [];

          const f = el();
          renderSelect(f.despesaCategoria, validacoes.categoriasDespesas);
          renderSelect(f.despesaFornecedor, validacoes.fornecedores);
          renderSelect(f.despesaPagoPor, validacoes.pagosPor);
          renderSelect(f.despesaFormaPagamento, validacoes.formasPagamento);
          renderSelect(f.pagDespesaForma, validacoes.formasPagamento);
          handleDespesaFormaPagamentoChange();
          popularFiltrosListaDespesas();

          if (typeof onDone === 'function') onDone();
        })
        .catch(() => {
          mostrarToast('Falha ao carregar validacoes', 'erro');
          if (typeof onDone === 'function') onDone();
        });
    }

    function getDataBaseParcelasDespesa() {
      const f = el();
      return String(f.despesaDataPagamento?.value || f.despesaDataCompetencia?.value || getHojeISO()).trim();
    }

    function gerarParcelasPadrao(valorTotal, parcelas, dataBase) {
      const total = Number(valorTotal || 0);
      const qtd = Math.max(1, Math.floor(Number(parcelas || 1)));
      const inicioRaw = String(dataBase || getHojeISO()).trim();
      const inicio = /^\d{4}-\d{2}-\d{2}$/.test(inicioRaw) ? new Date(`${inicioRaw}T00:00:00`) : new Date();
      const base = qtd > 0 ? Number((total / qtd).toFixed(2)) : 0;
      const lista = [];
      for (let i = 0; i < qtd; i++) {
        const d = new Date(inicio);
        d.setMonth(d.getMonth() + i);
        const yyyy = d.getFullYear();
        const mm = String(d.getMonth() + 1).padStart(2, '0');
        const dd = String(d.getDate()).padStart(2, '0');
        const valor = i === qtd - 1
          ? Number((total - (base * (qtd - 1))).toFixed(2))
          : base;
        lista.push({
          numero: i + 1,
          data: `${yyyy}-${mm}-${dd}`,
          valor: Number(valor.toFixed(2))
        });
      }
      return lista;
    }

    function lerParcelasDetalheDespesa() {
      const f = el();
      if (!f.despesaParcelasDetalheLista) return [];
      const linhas = [...f.despesaParcelasDetalheLista.querySelectorAll('.parcela-detalhe-linha')];
      return linhas.map((linha, idx) => ({
        numero: idx + 1,
        data: String(linha.querySelector('input[data-campo="data"]')?.value || '').trim(),
        valor: parseNumeroInput(linha.querySelector('input[data-campo="valor"]')?.value || '')
      }));
    }

    function renderParcelasDetalheDespesa(listaForcada) {
      const f = el();
      if (!f.despesaParcelasDetalheWrap || !f.despesaParcelasDetalheLista) return;

      const exibir = formaExigeParcelas(String(f.despesaFormaPagamento?.value || '').trim());
      if (!exibir) {
        f.despesaParcelasDetalheWrap.classList.add('hidden');
        f.despesaParcelasDetalheLista.innerHTML = '';
        return;
      }

      const parcelas = Math.max(1, Math.floor(parseNumeroInput(f.despesaParcelas?.value) || 1));
      const valorTotal = parseNumeroInput(f.despesaValorTotal?.value || 0);
      const dataBase = getDataBaseParcelasDespesa();
      const atuais = Array.isArray(listaForcada) ? listaForcada : lerParcelasDetalheDespesa();
      const usarAtuais = atuais.length === parcelas && atuais.every(p => String(p.data || '').trim() !== '');
      const lista = usarAtuais ? atuais : gerarParcelasPadrao(valorTotal, parcelas, dataBase);

      f.despesaParcelasDetalheLista.innerHTML = lista.map((p, idx) => `
        <div class="parcela-detalhe-linha">
          <span class="parcela-detalhe-num">#${idx + 1}</span>
          <input type="date" data-campo="data" value="${escapeHtml(p.data || '')}">
          <input type="number" data-campo="valor" min="0" step="0.01" value="${Number(p.valor || 0).toFixed(2)}">
        </div>
      `).join('');
      f.despesaParcelasDetalheWrap.classList.remove('hidden');
    }

    function handleDespesaFormaPagamentoChange() {
      const f = el();
      if (!f.despesaFormaPagamento || !f.despesaParcelasWrap || !f.despesaParcelas) return;
      const exibir = formaExigeParcelas(f.despesaFormaPagamento.value);
      f.despesaParcelasWrap.classList.toggle('hidden', !exibir);
      if (!exibir) {
        f.despesaParcelas.value = '1';
      } else if (!String(f.despesaParcelas.value || '').trim() || Number(f.despesaParcelas.value) < 1) {
        f.despesaParcelas.value = '1';
      }
      renderParcelasDetalheDespesa();
    }

    function handleDespesaParcelasDetalheChange() {
      renderParcelasDetalheDespesa();
    }

    function notificarDashboardAlterado() {
      try {
        if (window.AppTabRefresh?.markDirty) {
          window.AppTabRefresh.markDirty('dashboard');
        }
        const dash = window.DashboardController;
        if (dash?.invalidarCacheMeses) {
          const refs = dash.coletarMesesImpactados ? dash.coletarMesesImpactados(...arguments) : [];
          dash.invalidarCacheMeses(refs);
        }
        if (window.AppTabRefresh?.requestSync) {
          window.AppTabRefresh.requestSync('dashboard', {
            delayMs: 360,
            prefetch: true
          });
        } else if (dash?.atualizar) {
          dash.atualizar(true);
        }
      } catch (error) {
        // sem acao
      }
    }

    function listarMutacoesDespesaAtivas() {
      if (!window.AppOptimistic?.list) return [];
      return window.AppOptimistic.list({
        scope: 'despesa',
        domain: 'despesa'
      });
    }

    function reconciliarListaComMutacoes(listaBase) {
      if (!window.AppDespesaMutations?.mergeFetchedList) {
        return Array.isArray(listaBase) ? [...listaBase] : [];
      }
      return window.AppDespesaMutations.mergeFetchedList(listaBase, listarMutacoesDespesaAtivas());
    }

    function persistirEReRenderizarLista(onDone) {
      const proximaAssinatura = window.AppDataRevision?.signature?.(despesas) || '';
      const alterou = !carregado || !proximaAssinatura || proximaAssinatura !== despesasAssinatura;
      carregado = true;
      despesasAssinatura = proximaAssinatura;
      salvarCacheDespesas();
      if (!alterou) {
        if (typeof onDone === 'function') onDone();
        return false;
      }
      if (window.AppTabRefresh?.shouldRender?.('despesas') === false) {
        window.AppTabRefresh?.markRenderPending?.('despesas');
        if (typeof onDone === 'function') onDone();
        return true;
      }
      popularFiltrosListaDespesas();
      renderDespesas(() => {
        window.AppTabRefresh?.notifyRendered?.('despesas', { changed: true });
        if (typeof onDone === 'function') onDone();
      });
      return true;
    }

    function agendarSyncSilenciosoDespesas() {
      if (window.AppTabRefresh?.requestSync) {
        window.AppTabRefresh.requestSync('despesas', {
          delayMs: 900,
          prefetch: true
        });
        return;
      }
      setTimeout(() => {
        carregarDespesas(true);
      }, 900);
    }

    function tratarEventoMutacaoDespesa(detail) {
      const entry = detail?.entry;
      if (!entry || String(entry.scope || '').trim() !== 'despesa') return;
      if (String(entry?.meta?.domain || '').trim() !== 'despesa') return;
      if (!window.AppDespesaMutations?.applyEntryToList) return;

      despesas = window.AppDespesaMutations.applyEntryToList(despesas, detail);
      persistirEReRenderizarLista();

      if (String(detail?.type || '').trim() === 'success') {
        agendarSyncSilenciosoDespesas();
        return;
      }

      if (String(detail?.type || '').trim() === 'error'
        && String(entry?.meta?.source || '').trim() === 'despesas') {
        mostrarToast(`${detail?.errorMessage || 'Falha ao sincronizar despesa'}. Use "Tentar novamente".`, 'erro');
      }
    }

    function registrarListenerMutacoesSeNecessario() {
      if (listenerMutacoesRegistrado) return;
      if (typeof window === 'undefined' || typeof window.addEventListener !== 'function') return;
      window.addEventListener('app:optimistic-mutation', evento => {
        tratarEventoMutacaoDespesa(evento?.detail || {});
      });
      listenerMutacoesRegistrado = true;
    }

    function getDespesaUiState(item) {
      if (!window.AppDespesaMutations?.getUiState) {
        return {
          status: '',
          action: '',
          label: '',
          message: '',
          canRetry: false,
          blockActions: false
        };
      }
      return window.AppDespesaMutations.getUiState(item);
    }

    function ehCriacaoLocalComFalha(item, localState = null) {
      const state = localState || getDespesaUiState(item);
      const status = String(state?.status || '').trim().toLowerCase();
      const action = String(item?._localAction || state?.action || '').trim().toLowerCase();
      const mutationId = String(item?._localMutationId || '').trim();
      return ['error', 'conflict'].includes(status)
        && action === 'create'
        && !!mutationId;
    }

    function podeDescartarFalhaDespesa(item, localState = null) {
      const state = localState || getDespesaUiState(item);
      const status = String(state?.status || '').trim().toLowerCase();
      const mutationId = String(item?._localMutationId || '').trim();
      return ['error', 'conflict'].includes(status) && !!mutationId;
    }

    function descartarMutacaoDespesa(item) {
      const mutationId = String(item?._localMutationId || '').trim();
      if (!mutationId || !window.AppOptimistic?.discard) {
        throw new Error('Nao ha sincronizacao local para descartar.');
      }
      return window.AppOptimistic.discard(mutationId);
    }

    function atualizarAposDescartarFalhaDespesa(item) {
      const refs = window.DashboardController?.coletarMesesImpactados
        ? window.DashboardController.coletarMesesImpactados(item, getHojeISO())
        : [];
      if (window.DashboardController?.invalidarCacheMeses) {
        window.DashboardController.invalidarCacheMeses(refs);
      }
      if (window.AppTabRefresh?.requestSync) {
        window.AppTabRefresh.requestSync('despesas', {
          immediate: true,
          prefetch: true
        });
        window.AppTabRefresh.requestSync('dashboard', {
          immediate: true,
          prefetch: true
        });
        return;
      }
      carregarDespesas(true);
      window.DashboardController?.atualizar?.(true);
    }

    function filtrarDespesas(lista, texto) {
      const arr = Array.isArray(lista) ? lista : [];
      const termo = normalizarTexto(texto);
      const filtroStatus = normalizarStatus(filtrosLista.status);
      const filtroPagoPor = normalizarTexto(filtrosLista.pagoPor);
      const filtroCategoria = normalizarTexto(filtrosLista.categoria);
      const filtroFornecedor = normalizarTexto(filtrosLista.fornecedor);

      const filtradas = arr.filter(d => {
          if (termo) {
            const blob = [
              d?.descricao,
              d?.categoria,
              d?.fornecedor,
              d?.pago_por,
              d?.status_pagamento,
              d?.forma_pagamento,
              d?.observacao
            ]
              .map(v => normalizarTexto(v))
              .join(' ');
            if (!blob.includes(termo)) return false;
          }

          if (filtroStatus && normalizarStatus(obterStatusVisual(d)) !== filtroStatus) return false;
          if (filtroPagoPor && normalizarTexto(d?.pago_por) !== filtroPagoPor) return false;
          if (filtroCategoria && normalizarTexto(d?.categoria) !== filtroCategoria) return false;
          if (filtroFornecedor && normalizarTexto(d?.fornecedor) !== filtroFornecedor) return false;

          return true;
        });
      if (window.AppListOrder?.sort) {
        return window.AppListOrder.sort('despesas', filtradas, despesasSortAdapter.getSort());
      }
      return filtradas.sort((a, b) => String(b?.data_competencia || '').localeCompare(String(a?.data_competencia || '')));
    }

    function montarCardResumoDespesa(d) {
      const pendente = Number(d?.total_pendente || 0);
      const pago = Number(d?.total_pago || 0);
      const localState = getDespesaUiState(d);
      const criacaoLocalComFalha = ehCriacaoLocalComFalha(d, localState);
      const podeDescartarFalha = podeDescartarFalhaDespesa(d, localState) && !criacaoLocalComFalha;
      const bloquearAcoes = !!localState.blockActions && !criacaoLocalComFalha;
      const podePagar = pendente > 0.009 && !bloquearAcoes;
      const statusVisual = obterStatusVisual(d);
      const statusClasse = obterClasseStatus(statusVisual);
      const estadoClasse = localState.status ? `despesa-local-${localState.status}` : '';
      const estadoDeleteClasse = d?._localDeleted ? 'despesa-local-delete' : '';
      const rotuloExcluir = criacaoLocalComFalha ? 'Descartar' : 'Excluir';
      const despesaId = String(d?.ID || '').trim();
      const dataHtml = window.AppListOrderUI?.cardDateHtml?.(
        'despesas',
        d,
        despesasSortAdapter.getSort()
      ) || '';
      const podeCarregarHistorico = !!despesaId && !/^DES_TMP/i.test(despesaId);

      const card = document.createElement('div');
      card.className = `card card-ficha despesa-card despesa-card-${statusClasse} ${estadoClasse} ${estadoDeleteClasse}`.trim();
      card.dataset.id = String(d?.ID || '').trim();
      if (d?._localMutationId) card.dataset.localMutationId = String(d._localMutationId || '').trim();
      card.innerHTML = `
        <div class="card-ficha-topo">${escapeHtml(d?.descricao || '-')}</div>
        <div class="card-ficha-corpo">
          <div class="despesa-card-header despesa-card-header-compact">
            <span class="despesa-card-resumo-label">Despesa geral</span>
            <span class="despesa-status-badge despesa-status-${statusClasse}">${escapeHtml(statusVisual)}</span>
          </div>
          ${dataHtml}
          ${localState.label ? `
            <div class="despesa-local-state-row">
              <span class="despesa-local-state despesa-local-state-${escapeHtml(localState.status || 'pending')}">${escapeHtml(localState.label)}</span>
              ${localState.canRetry ? `<button class="despesa-btn-inline despesa-btn-retry" onclick="DespesasController.retryDespesaMutation('${escapeHtml(d?.ID)}')">Tentar novamente</button>` : ''}
              ${podeDescartarFalha ? `<button class="despesa-btn-inline despesa-btn-retry" onclick="DespesasController.descartarFalhaDespesa('${escapeHtml(d?.ID)}')">Descartar falha</button>` : ''}
            </div>
          ` : ''}
          ${localState.message ? `<div class="despesa-local-message">${escapeHtml(localState.message)}</div>` : ''}

          <div class="despesa-card-meta-area">
            <div class="despesa-card-meta">
              <span class="despesa-meta-item"><strong>Categoria:</strong> ${escapeHtml(d?.categoria || 'SEM_CATEGORIA')}</span>
              <span class="despesa-meta-item"><strong>Fornecedor:</strong> ${escapeHtml(d?.fornecedor || 'SEM_FORNECEDOR')}</span>
              <span class="despesa-meta-item"><strong>Pago por:</strong> ${escapeHtml(d?.pago_por || '-')}</span>
            </div>

            <div class="despesa-acoes-laterais">
              <button class="despesa-btn-acao" onclick="DespesasController.editarDespesa('${escapeHtml(d?.ID)}')" ${bloquearAcoes ? 'disabled' : ''}>Editar</button>
              <button class="despesa-btn-acao" onclick="DespesasController.excluirDespesa('${escapeHtml(d?.ID)}')" ${bloquearAcoes ? 'disabled' : ''}>${rotuloExcluir}</button>
            </div>
          </div>

          <div class="despesa-card-valores">
            <div class="despesa-valor-box despesa-valor-pendente">
              <div class="despesa-valor-topo">
                <span>Pendente</span>
                ${podePagar ? `<button class="despesa-btn-inline" onclick="DespesasController.registrarPagamentoDespesa('${escapeHtml(d?.ID)}')">Registrar pagamento</button>` : ''}
              </div>
              <strong>${formatarMoeda(pendente)}</strong>
            </div>
            <div class="despesa-valor-box despesa-valor-pago">
              <span>Pago</span>
              <strong>${formatarMoeda(pago)}</strong>
            </div>
          </div>
          ${podeCarregarHistorico ? `
            <details class="finance-history-disclosure" data-finance-history-disclosure>
              <summary>Historico financeiro</summary>
              <div
                class="finance-history"
                data-finance-history-type="DESPESA_GERAL"
                data-finance-history-id="${escapeHtml(despesaId)}"
              ><p class="finance-history-empty">Abra para carregar pagamentos e parcelas.</p></div>
            </details>
          ` : ''}
        </div>
      `;
      return card;
    }

    function atualizarResumoLista(totalFiltrados, totalGeral) {
      const f = el();
      if (!f.resumoLista) return;

      const ativos = [];
      if (filtrosLista.status) ativos.push(`Status: ${filtrosLista.status}`);
      if (filtrosLista.pagoPor) ativos.push(`Pago por: ${filtrosLista.pagoPor}`);
      if (filtrosLista.categoria) ativos.push(`Categoria: ${filtrosLista.categoria}`);
      if (filtrosLista.fornecedor) ativos.push(`Fornecedor: ${filtrosLista.fornecedor}`);

      const base = `Mostrando ${totalFiltrados} de ${totalGeral} despesas`;
      const complemento = ativos.length > 0 ? ` | ${ativos.join(' | ')}` : '';
      f.resumoLista.textContent = `${base}${complemento}`;
      f.resumoLista.classList.toggle('hidden', totalGeral <= 0);
    }

    function renderControlesListaDespesas() {
      const f = el();
      if (!f.listaControles) return;

      f.listaControles.innerHTML = '';
      const restante = listaFiltradaAtual.length - qtdRenderizada;
      if (restante <= 0) return;

      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'btn-carregar-mais';
      const labelIdle = `Carregar mais (${restante})`;
      if (window.AppLoading?.setButtonLoading) {
        window.AppLoading.setButtonLoading(btn, carregandoMais, labelIdle, 'Carregando');
      } else {
        btn.textContent = carregandoMais ? 'Carregando...' : labelIdle;
      }
      btn.disabled = carregandoMais;
      btn.addEventListener('click', () => {
        renderMaisItensDespesas();
      });
      f.listaControles.appendChild(btn);
    }

    function renderMaisItensDespesas(onDone) {
      const f = el();
      if (!f.listaDespesas || carregandoMais) return;
      if (qtdRenderizada >= listaFiltradaAtual.length) {
        renderControlesListaDespesas();
        if (typeof onDone === 'function') onDone();
        return;
      }

      carregandoMais = true;
      renderControlesListaDespesas();

      const inicio = qtdRenderizada;
      const fim = Math.min(inicio + PAGE_SIZE, listaFiltradaAtual.length);
      const jobId = ++renderJobSeq;
      let idx = inicio;

      const processarChunk = () => {
        if (jobId !== renderJobSeq) return;

        const limite = Math.min(idx + RENDER_CHUNK_SIZE, fim);
        const fragment = document.createDocumentFragment();

        for (; idx < limite; idx++) {
          fragment.appendChild(montarCardResumoDespesa(listaFiltradaAtual[idx]));
        }

        f.listaDespesas.appendChild(fragment);

        if (idx < fim) {
          proximoFrame(processarChunk);
          return;
        }

        qtdRenderizada = fim;
        carregandoMais = false;
        renderControlesListaDespesas();
        if (typeof onDone === 'function') onDone();
      };

      proximoFrame(processarChunk);
    }

    function revealRecord(options = {}) {
      const id = String(options?.id || options || '').trim();
      const indice = listaFiltradaAtual.findIndex(item => String(item?.ID || '').trim() === id);
      if (!id || indice < 0) return Promise.resolve(false);
      return new Promise(resolve => {
        const avancar = () => {
          if (indice < qtdRenderizada) {
            resolve(true);
            return;
          }
          if (carregandoMais) {
            setTimeout(avancar, 32);
            return;
          }
          renderMaisItensDespesas(avancar);
        };
        avancar();
      });
    }

    function renderListaDespesas(itensFiltrados, onDone) {
      registrarConclusaoRender(onDone);
      const f = el();
      if (!f.listaDespesas) {
        concluirRenderPendente();
        return;
      }
      f.listaDespesas.classList.remove('hidden');
      f.listaDespesas.innerHTML = '';
      if (f.listaControles) f.listaControles.innerHTML = '';

      renderJobSeq += 1;
      listaFiltradaAtual = Array.isArray(itensFiltrados) ? itensFiltrados : [];
      qtdRenderizada = 0;
      carregandoMais = false;
      atualizarResumoLista(listaFiltradaAtual.length, Array.isArray(despesas) ? despesas.length : 0);

      if (listaFiltradaAtual.length === 0) {
        const semFiltroTexto = !String(filtroTexto || '').trim();
        const semFiltrosEstruturados = [
          filtrosLista.status,
          filtrosLista.pagoPor,
          filtrosLista.categoria,
          filtrosLista.fornecedor
        ].every(v => String(v || '').trim() === '');
        const semFiltro = semFiltroTexto && semFiltrosEstruturados;
        f.listaDespesas.innerHTML = semFiltro
          ? '<p>Nenhuma despesa geral cadastrada.</p>'
          : '<p>Nenhuma despesa encontrada para os filtros aplicados.</p>';
        concluirRenderPendente();
        return;
      }

      renderMaisItensDespesas(concluirRenderPendente);
    }

    function renderDespesas(onDone) {
      const lista = filtrarDespesas(despesas, filtroTexto);
      renderListaDespesas(lista, onDone);
    }

    function salvarCacheDespesas() {
      window.AppTabCache?.salvar?.('despesas', despesas);
    }

    function hidratarDespesasDoCache() {
      const listaCache = window.AppTabCache?.ler?.('despesas');
      if (!Array.isArray(listaCache)) return false;
      despesas = reconciliarListaComMutacoes(listaCache);
      persistirEReRenderizarLista();
      return true;
    }

    function carregarDespesas(forcarRecarregar = false, onDone, ambiente = '', options = {}) {
      const seq = ++despesasLoadSeq;
      const ambienteSolicitado = String(
        ambiente || window.AppClientScope?.get?.()?.environment || 'prod'
      ).trim().toLowerCase();
      const dirtyGeneration = window.AppTabRefresh?.getDirtyGeneration?.('despesas') || 0;
      const exibindoCache = !forcarRecarregar && options.hydrate !== false && hidratarDespesasDoCache();
      window.AppRequest.runner()
        .withFailureHandler(() => {
          if (seq !== despesasLoadSeq) {
            if (typeof onDone === 'function') onDone('superseded');
            return;
          }
          window.AppTabRefresh?.reportResult?.('despesas', false, dirtyGeneration);
          if (exibindoCache) {
            if (window.AppRuntime?.setReadOnly) {
              window.AppRuntime.setReadOnly(true, 'Sem conexao com backend - exibindo cache local');
            }
            mostrarToast('Exibindo ultimo snapshot em cache', 'erro');
            if (typeof onDone === 'function') onDone(false);
            return;
          }
          mostrarToast('Erro ao carregar despesas gerais', 'erro');
          if (typeof onDone === 'function') onDone(false);
        })
        .withSuccessHandler(lista => {
          if (seq !== despesasLoadSeq) {
            if (typeof onDone === 'function') onDone('superseded');
            return;
          }
          if (window.AppRuntime?.setReadOnly) {
            window.AppRuntime.setReadOnly(false);
          }
          window.AppTabRefresh?.reportResult?.('despesas', true, dirtyGeneration);
          despesas = reconciliarListaComMutacoes(Array.isArray(lista) ? lista : []);
          persistirEReRenderizarLista(() => {
            if (typeof onDone === 'function') onDone(true);
          });
        })
        .listarDespesasGerais(!!forcarRecarregar, ambienteSolicitado);
    }

    function setInboxStatus(mensagem = '', tipo = '') {
      const f = el();
      if (!f.despesasInboxStatus) return;
      const texto = String(mensagem || '').trim();
      f.despesasInboxStatus.textContent = texto;
      f.despesasInboxStatus.className = `despesas-inbox-status ${tipo ? `despesas-inbox-status-${tipo}` : ''}`.trim();
      f.despesasInboxStatus.classList.toggle('hidden', !texto);
    }

    function setCarregandoInboxDespesas(ativo) {
      carregandoInboxDespesas = !!ativo;
      const f = el();
      if (f.btnAtualizarInboxDespesas) {
        f.btnAtualizarInboxDespesas.disabled = carregandoInboxDespesas;
        f.btnAtualizarInboxDespesas.setAttribute('aria-busy', carregandoInboxDespesas ? 'true' : 'false');
        if (window.AppLoading?.setButtonLoading) {
          window.AppLoading.setButtonLoading(
            f.btnAtualizarInboxDespesas,
            carregandoInboxDespesas,
            'Atualizar',
            'Atualizando'
          );
        } else {
          f.btnAtualizarInboxDespesas.textContent = carregandoInboxDespesas ? 'Atualizando...' : 'Atualizar';
        }
      }
    }

    function setImportandoComprovantesDrive(ativo) {
      importandoComprovantesDrive = !!ativo;
      const f = el();
      if (f.btnBuscarComprovantesDrive) {
        f.btnBuscarComprovantesDrive.disabled = importandoComprovantesDrive;
        f.btnBuscarComprovantesDrive.setAttribute('aria-busy', importandoComprovantesDrive ? 'true' : 'false');
        if (window.AppLoading?.setButtonLoading) {
          window.AppLoading.setButtonLoading(
            f.btnBuscarComprovantesDrive,
            importandoComprovantesDrive,
            'Buscar no Drive',
            'Buscando'
          );
        } else {
          f.btnBuscarComprovantesDrive.textContent = importandoComprovantesDrive ? 'Buscando...' : 'Buscar no Drive';
        }
      }

    function setProcessandoComprovanteDespesa(ativo) {
      processandoComprovanteDespesa = !!ativo;
      const f = el();
      [f.inputComprovanteDespesa, f.btnUploadComprovanteDespesa].forEach(input => {
        if (input) input.disabled = processandoComprovanteDespesa;
      });
      if (f.btnUploadComprovanteDespesa) {
        f.btnUploadComprovanteDespesa.setAttribute('aria-busy', processandoComprovanteDespesa ? 'true' : 'false');
        if (window.AppLoading?.setButtonLoading) {
          window.AppLoading.setButtonLoading(
            f.btnUploadComprovanteDespesa,
            processandoComprovanteDespesa,
            'Adicionar comprovante',
            'Processando'
          );
        } else {
          f.btnUploadComprovanteDespesa.textContent = processandoComprovanteDespesa
            ? 'Processando...'
            : 'Adicionar comprovante';
        }

    function bindInboxDespesas() {
      const f = el();
      if (!f.despesasInbox || f.despesasInbox.dataset.boundInboxDespesas === '1') return;
      f.despesasInbox.dataset.boundInboxDespesas = '1';

      if (f.btnUploadComprovanteDespesa) {
        f.btnUploadComprovanteDespesa.addEventListener('click', abrirSeletorComprovanteDespesa);
      }
      if (f.inputComprovanteDespesa) {
        f.inputComprovanteDespesa.addEventListener('change', handleArquivoComprovanteDespesa);
      }
      if (f.btnAtualizarInboxDespesas) {
        f.btnAtualizarInboxDespesas.addEventListener('click', () => carregarInboxDespesas());
      }
      if (f.filtroInboxComprovantes) {
        f.filtroInboxComprovantes.value = filtroInboxComprovantes;
        f.filtroInboxComprovantes.addEventListener('change', () => {
          filtroInboxComprovantes = String(f.filtroInboxComprovantes?.value || 'PENDENTES').trim().toUpperCase();
          carregarInboxDespesas();
        });
      }
      if (f.btnBuscarComprovantesDrive) {
        f.btnBuscarComprovantesDrive.addEventListener('click', importarComprovantesDoDrive);
      }
      if (f.btnToggleInboxDespesas) {
        f.btnToggleInboxDespesas.addEventListener('click', () => {
          setInboxDespesasExpandida(!inboxDespesasExpandida);
        });
      }
    }

    function setInboxDespesasExpandida(ativa) {
      inboxDespesasExpandida = !!ativa;
      const f = el();
      f.despesasInboxConteudo?.classList.toggle('hidden', !inboxDespesasExpandida);
      if (f.btnToggleInboxDespesas) {
        f.btnToggleInboxDespesas.setAttribute('aria-expanded', inboxDespesasExpandida ? 'true' : 'false');
        f.btnToggleInboxDespesas.textContent = inboxDespesasExpandida ? 'Recolher' : 'Ver comprovantes';
      }
    }

    function abrirSeletorComprovanteDespesa() {
      if (!podeAlterarDados('Upload bloqueado em modo somente leitura')) return;
      if (processandoComprovanteDespesa) return;
      const f = el();
      f.inputComprovanteDespesa?.click();
    }

    function lerArquivoComoDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ''));
        reader.onerror = () => reject(new Error('Nao foi possivel ler a imagem.'));
        reader.readAsDataURL(file);
      });
    }

    function nomeJpegComprovante(nomeOriginal) {
      const nome = String(nomeOriginal || `comprovante-${Date.now()}`).trim();
      if (/\.[a-z0-9]{2,5}$/i.test(nome)) {
        return nome.replace(/\.[a-z0-9]{2,5}$/i, '.jpg');
      }
      return `${nome}.jpg`;
    }

    function compactarImagemComprovante(file, dataUrlOriginal) {
      return new Promise(resolve => {
        const img = new Image();
        img.onload = () => {
          try {
            const larguraOriginal = Number(img.naturalWidth || img.width || 0);
            const alturaOriginal = Number(img.naturalHeight || img.height || 0);
            if (!larguraOriginal || !alturaOriginal) {
              resolve({
                nome: file.name,
                mime_type: file.type || 'image/jpeg',
                data_url: dataUrlOriginal
              });
              return;
            }

            const escala = Math.min(1, COMPROVANTE_MAX_DIMENSION / Math.max(larguraOriginal, alturaOriginal));
            const largura = Math.max(1, Math.round(larguraOriginal * escala));
            const altura = Math.max(1, Math.round(alturaOriginal * escala));
            const canvas = document.createElement('canvas');
            canvas.width = largura;
            canvas.height = altura;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#fff';
            ctx.fillRect(0, 0, largura, altura);
            ctx.drawImage(img, 0, 0, largura, altura);
            const dataUrlJpeg = canvas.toDataURL('image/jpeg', COMPROVANTE_JPEG_QUALITY);
            const usarCompactada = dataUrlOriginal.length > COMPROVANTE_MAX_DATA_URL_LENGTH ||
              dataUrlJpeg.length < dataUrlOriginal.length;
            resolve({
              nome: usarCompactada ? nomeJpegComprovante(file.name) : file.name,
              mime_type: usarCompactada ? 'image/jpeg' : (file.type || 'image/jpeg'),
              data_url: usarCompactada ? dataUrlJpeg : dataUrlOriginal
            });
          } catch (error) {
            resolve({
              nome: file.name,
              mime_type: file.type || 'image/jpeg',
              data_url: dataUrlOriginal
            });
          }
        };
        img.onerror = () => {
          resolve({
            nome: file.name,
            mime_type: file.type || 'image/jpeg',
            data_url: dataUrlOriginal
          });
        };
        img.src = dataUrlOriginal;
      });
    }

    async function prepararComprovanteDespesa(file) {
      if (!file) {
        throw new Error('Selecione uma imagem ou PDF.');
      }
      const mime = String(file.type || '').toLowerCase();
      if (mime && !(mime.startsWith('image/') || mime === 'application/pdf')) {
        throw new Error('Use uma imagem ou PDF.');
      }

      const dataUrlOriginal = await lerArquivoComoDataUrl(file);
      if (mime === 'application/pdf') {
        if (dataUrlOriginal.length > COMPROVANTE_MAX_DATA_URL_LENGTH) {
          throw new Error('PDF muito grande. Use um arquivo de ate aproximadamente 5 MB.');
        }
        return {
          nome: file.name,
          mime_type: mime,
          data_url: dataUrlOriginal
        };
      }
      const preparado = await compactarImagemComprovante(file, dataUrlOriginal);
      if (String(preparado.data_url || '').length > COMPROVANTE_MAX_DATA_URL_LENGTH) {
        throw new Error('Imagem muito grande. Tente recortar ou reduzir a foto.');
      }
      return preparado;
    }

    function handleArquivoComprovanteDespesa(event) {
      const input = event?.target;
      const file = input?.files?.[0] || null;
      if (!file) return;
      if (!podeAlterarDados('Upload bloqueado em modo somente leitura')) {
        if (input) input.value = '';
        return;
      }

      setProcessandoComprovanteDespesa(true);
      setInboxDespesasExpandida(true);
      setInboxStatus('Processando comprovante...', 'info');

      prepararComprovanteDespesa(file)
        .then(payload => {
          if (!window.AppRequest?.call) {
            throw new Error('google.script.run indisponivel');
          }
          return window.AppRequest.call('processarComprovanteDespesaUpload', [{
            ...payload,
            _db_env: getAmbienteBancoAtivoInbox()
          }], {
            context: 'despesas.inbox.upload',
            errorMessage: 'Erro ao processar comprovante'
          });
        })
        .then(item => {
          if (item?.reutilizado) {
            mostrarToast('Este comprovante ja estava na Inbox.');
          } else if (String(item?.status || '').toUpperCase() === 'ERRO') {
            mostrarToast(item?.erro || 'Comprovante recebido, mas a IA falhou', 'erro');
          } else {
            mostrarToast('Comprovante adicionado a Inbox.');
          }
          return carregarInboxDespesas(undefined, '', true);
        })
        .catch(error => {
          mostrarToast(error?.message || 'Erro ao enviar comprovante', 'erro');
          setInboxStatus(error?.message || 'Erro ao enviar comprovante', 'erro');
        })
        .finally(() => {
          if (input) input.value = '';
          setProcessandoComprovanteDespesa(false);
        });
    }

    function carregarInboxDespesas(onDone, ambiente = '', forcar = false) {
      if (typeof onDone === 'function') inboxDespesasLoadCallbacks.push(onDone);
      if (!window.AppRequest?.call) {
        inboxDespesas = [];
        destinosComprovantes = [];
        resumoComprovantes = {};
        renderInboxDespesas();
        const callbacks = inboxDespesasLoadCallbacks.splice(0);
        callbacks.forEach(callback => callback(true));
        return Promise.resolve([]);
      }

      const ambienteSolicitado = String(ambiente || '').trim().toLowerCase() || getAmbienteBancoAtivoInbox();
      const chaveSolicitada = `${ambienteSolicitado}:${filtroInboxComprovantes}`;
      if (inboxDespesasRequest) {
        if (forcar || chaveSolicitada !== inboxDespesasChaveRequest) {
          inboxDespesasRecargaPendente = true;
          inboxDespesasForcarPendente = inboxDespesasForcarPendente || forcar;
          inboxDespesasAmbientePendente = ambienteSolicitado;
        }
        return inboxDespesasRequest;
      }

      const filtroSolicitado = filtroInboxComprovantes;
      inboxDespesasChaveRequest = chaveSolicitada;
      inboxDespesasUltimoResultado = true;
      setCarregandoInboxDespesas(true);
      inboxDespesasRequest = window.AppRequest.call('obterContextoComprovantesFinanceiros', [
        filtroSolicitado,
        ambienteSolicitado
      ], {
        context: 'despesas.inbox.list',
        errorMessage: 'Erro ao carregar comprovantes'
      })
        .then(contexto => {
          if (filtroSolicitado !== filtroInboxComprovantes || ambienteSolicitado !== getAmbienteBancoAtivoInbox()) {
            inboxDespesasRecargaPendente = true;
            return inboxDespesas;
          }
          inboxDespesas = Array.isArray(contexto?.comprovantes) ? contexto.comprovantes : [];
          destinosComprovantes = Array.isArray(contexto?.destinos) ? contexto.destinos : [];
          resumoComprovantes = contexto?.resumo && typeof contexto.resumo === 'object' ? contexto.resumo : {};
          renderInboxDespesas();
          return inboxDespesas;
        })
        .catch(error => {
          inboxDespesasUltimoResultado = false;
          mostrarToast(error?.message || 'Erro ao carregar comprovantes', 'erro');
          setInboxStatus(error?.message || 'Erro ao carregar comprovantes', 'erro');
          return [];
        })
        .finally(() => {
          inboxDespesasRequest = null;
          if (inboxDespesasRecargaPendente) {
            const proximoAmbiente = inboxDespesasAmbientePendente;
            const proximoForcar = inboxDespesasForcarPendente;
            inboxDespesasRecargaPendente = false;
            inboxDespesasAmbientePendente = '';
            inboxDespesasForcarPendente = false;
            return carregarInboxDespesas(undefined, proximoAmbiente, proximoForcar);
          }
          inboxDespesasChaveRequest = '';
          setCarregandoInboxDespesas(false);
          const callbacks = inboxDespesasLoadCallbacks.splice(0);
          callbacks.forEach(callback => {
            try { callback(inboxDespesasUltimoResultado); } catch (error) { /* sem acao */ }
          });
        });
      return inboxDespesasRequest;
    }

    function importarComprovantesDoDrive() {
      if (!podeAlterarDados('Importacao bloqueada em modo somente leitura')) return;
      if (importandoComprovantesDrive || !window.AppRequest?.call) return;
      setImportandoComprovantesDrive(true);
      setInboxDespesasExpandida(true);
      setInboxStatus('Buscando novos comprovantes no Drive...', 'info');
      return window.AppRequest.call('importarComprovantesDriveParaInbox', [5, getAmbienteBancoAtivoInbox()], {
        context: 'despesas.inbox.drive.import',
        errorMessage: 'Erro ao buscar comprovantes no Drive'
      })
        .then(resultado => {
          const adicionados = Number(resultado?.adicionados || 0);
          const erros = Number(resultado?.erros || 0);
          const ignorados = Number(resultado?.ignorados || 0);
          const partes = [`${adicionados} novo(s)`];
          if (ignorados) partes.push(`${ignorados} ja importado(s)`);
          if (erros) partes.push(`${erros} com erro`);
          mostrarToast(`Busca concluida: ${partes.join(', ')}.`, erros ? 'erro' : 'sucesso');
          return carregarInboxDespesas(undefined, '', true);
        })
        .catch(error => {
          mostrarToast(error?.message || 'Erro ao buscar comprovantes no Drive', 'erro');
          setInboxStatus(error?.message || 'Erro ao buscar comprovantes no Drive', 'erro');
        })
        .finally(() => setImportandoComprovantesDrive(false));
    }

    function montarOptionsInboxDespesa(valores, atual, placeholder = 'Selecione', incluirAtual = true) {
      const lista = ordenarValoresUnicos(valores);
      const atualTexto = String(atual || '').trim();
      const atualKey = normalizarTexto(atualTexto);
      const temAtual = atualTexto && lista.some(v => normalizarTexto(v) === atualKey);
      const opcoes = [];
      opcoes.push(`<option value="">${escapeHtml(placeholder)}</option>`);
      if (incluirAtual && atualTexto && !temAtual) {
        opcoes.push(`<option value="${escapeHtml(atualTexto)}" selected>${escapeHtml(atualTexto)}</option>`);
      }
      lista.forEach(valor => {
        const selected = normalizarTexto(valor) === atualKey ? ' selected' : '';
        opcoes.push(`<option value="${escapeHtml(valor)}"${selected}>${escapeHtml(valor)}</option>`);
      });
      return opcoes.join('');
    }

    function montarAlertasInboxDespesa(item) {
      const alertas = Array.isArray(item?.alertas) ? item.alertas : [];
      const erro = String(item?.erro || '').trim();
      const partes = [
        ...alertas.map(v => String(v || '').trim()).filter(Boolean),
        ...(erro ? [erro] : [])

      if (partes.length === 0) return '';
      return `
        <div class="despesas-inbox-alertas">
          ${partes.map(msg => `<span>${escapeHtml(msg)}</span>`).join('')}
        </div>
      `;
    }
