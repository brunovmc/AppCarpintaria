      const card = document.createElement('div');
      card.className = `despesa-inbox-item despesa-inbox-item-${status.toLowerCase()}`;
      card.dataset.inboxId = id;
      card.innerHTML = `
        <div class="despesa-inbox-item-topo">
          <div>
            <span class="despesa-card-resumo-label">Comprovante</span>
            <strong>${escapeHtml(item?.arquivo_nome || item?.descricao || id || '-')}</strong>
          </div>
          <span class="despesa-inbox-badge">${escapeHtml(status === 'ERRO' ? 'Revisar' : 'Pendente')}</span>
        </div>

        <div class="despesa-inbox-meta">
          <span>Confianca: ${Number.isFinite(confianca) ? confianca : 0}%</span>
          ${item?.arquivo_url ? `<a href="${escapeHtml(item.arquivo_url)}" target="_blank" rel="noopener">Arquivo</a>` : ''}
        </div>

        ${montarAlertasInboxDespesa(item)}

        <div class="despesa-inbox-grid">
          <label class="campo-ajuda-wrap">
            <span class="campo-ajuda-tag">Descricao</span>
            <input data-campo="descricao" value="${escapeHtml(item?.descricao || '')}">
          </label>

          <label class="campo-ajuda-wrap">
            <span class="campo-ajuda-tag">Categoria</span>
            <select data-campo="categoria">${montarOptionsInboxDespesa(validacoes?.categoriasDespesas, item?.categoria, 'Selecione')}</select>
          </label>

          <label class="campo-ajuda-wrap">
            <span class="campo-ajuda-tag">Fornecedor</span>
            <input data-campo="fornecedor" value="${escapeHtml(item?.fornecedor || '')}">
          </label>

          <label class="campo-ajuda-wrap">
            <span class="campo-ajuda-tag">Pago por</span>
            <select data-campo="pago_por">${montarOptionsInboxDespesa(validacoes?.pagosPor, item?.pago_por, 'Selecione')}</select>
          </label>

          <label class="campo-ajuda-wrap">
            <span class="campo-ajuda-tag">Valor total (R$)</span>
            <input data-campo="valor_total" type="number" min="0" step="0.01" value="${escapeHtml(item?.valor_total || '')}">
          </label>

          <label class="campo-ajuda-wrap">
            <span class="campo-ajuda-tag">Competencia</span>
            <input data-campo="data_competencia" type="date" value="${escapeHtml(item?.data_competencia || '')}">
          </label>

          <label class="campo-ajuda-wrap">
            <span class="campo-ajuda-tag">Vencimento</span>
            <input data-campo="data_vencimento" type="date" value="${escapeHtml(item?.data_vencimento || '')}">
          </label>

          <label class="campo-ajuda-wrap">
            <span class="campo-ajuda-tag">Pagamento</span>
            <input data-campo="data_pagamento" type="date" value="${escapeHtml(item?.data_pagamento || '')}">
          </label>

          <label class="campo-ajuda-wrap">
            <span class="campo-ajuda-tag">Forma de pagamento</span>
            <select data-campo="forma_pagamento">${montarOptionsInboxDespesa(validacoes?.formasPagamento, item?.forma_pagamento, 'Selecione')}</select>
          </label>

          <label class="campo-ajuda-wrap">
            <span class="campo-ajuda-tag">Parcelas</span>
            <input data-campo="parcelas" type="number" min="1" step="1" value="${escapeHtml(item?.parcelas || 1)}">
          </label>
        </div>

        <label class="campo-ajuda-wrap despesas-inbox-observacao">
          <span class="campo-ajuda-tag">Observacao</span>
          <textarea data-campo="observacao">${escapeHtml(item?.observacao || '')}</textarea>
        </label>

        <div class="despesas-inbox-card-acoes">
          <button type="button" onclick="DespesasController.confirmarInboxDespesa('${escapeHtml(id)}')" ${busy ? 'disabled' : ''}>${busy ? 'Confirmando...' : 'Confirmar despesa'}</button>
          <button type="button" onclick="DespesasController.descartarInboxDespesa('${escapeHtml(id)}')" ${busy ? 'disabled' : ''}>Descartar</button>
        </div>
      `;
      return card;
    }

    function renderInboxDespesas() {
      const f = el();
      if (!f.listaInboxDespesas) return;

      const itens = Array.isArray(inboxDespesas) ? inboxDespesas : [];
      const pendentes = itens.filter(item => String(item?.status || '').toUpperCase() === 'PENDENTE').length;
      const erros = itens.filter(item => String(item?.status || '').toUpperCase() === 'ERRO').length;
      if (!inboxDespesasEstadoInicialDefinido) {
        inboxDespesasEstadoInicialDefinido = true;
        setInboxDespesasExpandida(itens.length > 0);
      }
      if (f.despesasInboxResumo) {
        const partes = [];
        partes.push(`${pendentes} pendente${pendentes === 1 ? '' : 's'}`);
        if (erros > 0) partes.push(`${erros} para revisar`);
        f.despesasInboxResumo.textContent = partes.join(' | ');
      }

      f.listaInboxDespesas.innerHTML = '';
      if (itens.length === 0) {
        setInboxStatus(carregandoInboxDespesas ? 'Carregando Inbox...' : 'Nenhum comprovante pendente.', carregandoInboxDespesas ? 'info' : '');
        return;
      }

      setInboxStatus('', '');
      const fragment = document.createDocumentFragment();
      itens.forEach(item => fragment.appendChild(montarCardInboxDespesa(item)));
      f.listaInboxDespesas.appendChild(fragment);
    }

    function getInboxCard(id) {
      const alvo = String(id || '').trim();
      if (!alvo) return null;
      const f = el();
      return [...(f.listaInboxDespesas?.querySelectorAll('.despesa-inbox-item') || [])]
        .find(card => String(card.dataset.inboxId || '').trim() === alvo) || null;
    }

    function lerPayloadInboxDespesa(id) {
      const card = getInboxCard(id);
      if (!card) {
        throw new Error('Item da Inbox nao encontrado na tela.');
      }

      const campo = nome => card.querySelector(`[data-campo="${nome}"]`);
      const payload = {
        descricao: String(campo('descricao')?.value || '').trim(),
        categoria: String(campo('categoria')?.value || '').trim(),
        fornecedor: String(campo('fornecedor')?.value || '').trim(),
        pago_por: String(campo('pago_por')?.value || '').trim(),
        valor_total: parseNumeroInput(campo('valor_total')?.value || ''),
        data_competencia: String(campo('data_competencia')?.value || '').trim(),
        data_vencimento: String(campo('data_vencimento')?.value || '').trim(),
        data_pagamento: String(campo('data_pagamento')?.value || '').trim(),
        forma_pagamento: String(campo('forma_pagamento')?.value || '').trim(),
        parcelas: Math.max(1, Math.floor(parseNumeroInput(campo('parcelas')?.value || '1') || 1)),
        observacao: String(campo('observacao')?.value || '').trim(),
        _db_env: getAmbienteBancoAtivoInbox()
      };

      if (!payload.descricao) {
        throw new Error('Descricao da despesa e obrigatoria.');
      }
      if (!payload.categoria) {
        throw new Error('Categoria da despesa e obrigatoria.');
      }
      if (!isFinite(payload.valor_total) || payload.valor_total <= 0) {
        throw new Error('Valor total invalido.');
      }
      if (!payload.data_competencia) {
        throw new Error('Data de competencia e obrigatoria.');
      }
      return payload;
    }

    function setInboxItemBusy(id, ativo) {
      const alvo = String(id || '').trim();
      if (!alvo) return;
      if (ativo) inboxDespesasBusyIds.add(alvo);
      else inboxDespesasBusyIds.delete(alvo);
      renderInboxDespesas();
    }

    function confirmarInboxDespesa(id) {
      if (!podeAlterarDados('Confirmacao bloqueada em modo somente leitura')) return;
      const inboxId = String(id || '').trim();
      if (!inboxId || inboxDespesasBusyIds.has(inboxId)) return;

      let payload;
      try {
        payload = lerPayloadInboxDespesa(inboxId);
      } catch (error) {
        mostrarToast(error?.message || 'Revise os dados da Inbox', 'erro');
        return;
      }

      setInboxItemBusy(inboxId, true);
      window.AppRequest.call('confirmarInboxDespesa', [inboxId, payload], {
        context: 'despesas.inbox.confirm',
        errorMessage: 'Erro ao confirmar despesa da Inbox'
      })
        .then(resultado => {
          const despesaId = String(
            resultado?.despesa_id ||
            resultado?.despesa?.ID ||
            resultado?.inbox?.despesa_id_confirmada ||
            ''
          ).trim();
          const diagnosticoResposta = {
            inbox_id: inboxId,
            resultado_tipo: resultado === null ? 'null' : typeof resultado,
            resultado_chaves: resultado && typeof resultado === 'object'
              ? Object.keys(resultado).sort()
              : [],
            ok: resultado?.ok === true,
            despesa_presente: !!resultado?.despesa,
            despesa_chaves: resultado?.despesa && typeof resultado.despesa === 'object'
              ? Object.keys(resultado.despesa).sort()
              : [],
            despesa_id: despesaId,
            servidor: resultado?.diagnostico_confirmacao || null
          };
          if (typeof console !== 'undefined' && console.info) {
            console.info('[inbox-despesas] resposta da confirmacao', diagnosticoResposta);
          }
          if (!resultado?.ok) {
            if (typeof console !== 'undefined' && console.error) {
              console.error('[inbox-despesas] resposta invalida da confirmacao', diagnosticoResposta);
            }
            const traceId = String(resultado?.diagnostico_confirmacao?.trace_id || '').trim();
            const referencia = traceId ? ` Referencia: ${traceId}.` : '';
            throw new Error(`Nao foi possivel confirmar a despesa.${referencia}`);
          }
          if (!despesaId && typeof console !== 'undefined' && console.warn) {
            console.warn('[inbox-despesas] confirmacao concluida sem ID na resposta', diagnosticoResposta);
          }
          inboxDespesas = inboxDespesas.filter(item => String(item?.ID || '').trim() !== inboxId);
          if (inboxDespesas.length === 0) {
            setInboxDespesasExpandida(false);
          }
          renderInboxDespesas();
          mostrarToast(despesaId
            ? `Despesa ${despesaId} criada a partir da Inbox.`
            : 'Despesa criada com sucesso.');
          carregarInboxDespesas();
          carregarDespesas(true);
          window.DashboardController?.atualizar?.(true);
        })
        .catch(error => {
          if (typeof console !== 'undefined' && console.error) {
            console.error('[inbox-despesas] falha na confirmacao', {
              inbox_id: inboxId,
              mensagem: String(error?.message || error || '').trim()
            });
          }
          mostrarToast(error?.message || 'Erro ao confirmar despesa da Inbox', 'erro');
          carregarInboxDespesas();
        })
        .finally(() => {
          setInboxItemBusy(inboxId, false);
        });
    }

    function descartarInboxDespesa(id) {
      if (!podeAlterarDados('Descarte bloqueado em modo somente leitura')) return;
      const inboxId = String(id || '').trim();
      if (!inboxId || inboxDespesasBusyIds.has(inboxId)) return;
      if (!confirm('Descartar este item da Inbox?')) return;

      setInboxItemBusy(inboxId, true);
      window.AppRequest.call('descartarInboxDespesa', [inboxId, getAmbienteBancoAtivoInbox()], {
        context: 'despesas.inbox.discard',
        errorMessage: 'Erro ao descartar item da Inbox'
      })
        .then(() => {
          mostrarToast('Item da Inbox descartado.');
          carregarInboxDespesas();
        })
        .catch(error => {
          mostrarToast(error?.message || 'Erro ao descartar item da Inbox', 'erro');
          carregarInboxDespesas();
        })
        .finally(() => {
          setInboxItemBusy(inboxId, false);
        });
    }

    function init() {
      registrarListenerMutacoesSeNecessario();
      window.AppOptimistic?.process?.();
      if (!iniciado) {
        const f = el();
        bindFiltrosListaDespesas();
        bindInboxDespesas();
        atualizarRotuloBotaoFiltroTopBar();
        if (f.despesaDataCompetencia && !f.despesaDataCompetencia.value) {
          f.despesaDataCompetencia.value = getHojeISO();
        }
        carregarValidacoes(() => {
          carregarDespesas(false);
          carregarInboxDespesas();
        });
        iniciado = true;
        return;
      }
      syncFromBackend();
    }

    function isLoaded() {
      return carregado;
    }

    function syncFromBackend(onDone) {
      let concluidos = 0;
      const done = () => {
        concluidos += 1;
        if (concluidos >= 2 && typeof onDone === 'function') onDone();
      };
      carregarDespesas(true, done);
      carregarInboxDespesas(done);
    }

    function setFiltroTexto(texto) {
      filtroTexto = String(texto || '');
      renderDespesas();
    }

    function getById(id) {
      const alvo = String(id || '').trim();
      if (!alvo) return null;
      return despesas.find(d => String(d.ID || '').trim() === alvo) || null;
    }

    function limparFormularioDespesa() {
      const f = el();
      if (f.despesaDescricao) f.despesaDescricao.value = '';
      if (f.despesaCategoria) f.despesaCategoria.value = '';
      if (f.despesaFornecedor) f.despesaFornecedor.value = '';
      if (f.despesaPagoPor) f.despesaPagoPor.value = '';
      if (f.despesaValorTotal) f.despesaValorTotal.value = '';
      if (f.despesaDataCompetencia) f.despesaDataCompetencia.value = getHojeISO();
      if (f.despesaDataVencimento) f.despesaDataVencimento.value = '';
      if (f.despesaDataPagamento) f.despesaDataPagamento.value = '';
      if (f.despesaFormaPagamento) f.despesaFormaPagamento.value = '';
      if (f.despesaParcelas) f.despesaParcelas.value = '1';
      if (f.despesaParcelasDetalheLista) f.despesaParcelasDetalheLista.innerHTML = '';
      if (f.despesaParcelasDetalheWrap) f.despesaParcelasDetalheWrap.classList.add('hidden');
      if (f.despesaFixo) f.despesaFixo.checked = false;
      if (f.despesaObservacao) f.despesaObservacao.value = '';
      despesaEditandoId = null;
      handleDespesaFormaPagamentoChange();
      setModoFormularioDespesa(false);
    }

    function setModoFormularioDespesa(editando) {
      const f = el();
      const ehEdicao = !!editando;
      if (f.despesaFormTitulo) {
        f.despesaFormTitulo.textContent = ehEdicao ? 'Editar despesa' : 'Nova despesa';
      }
      if (f.btnSalvarDespesa && !salvandoDespesa) {
        f.btnSalvarDespesa.textContent = ehEdicao ? 'Salvar alteracoes' : 'Salvar despesa';
      }
    }

    function preencherFormularioDespesa(item) {
      const f = el();
      if (!item) return;

      if (f.despesaDescricao) f.despesaDescricao.value = item.descricao || '';
      if (f.despesaCategoria) f.despesaCategoria.value = item.categoria || '';
      if (f.despesaFornecedor) f.despesaFornecedor.value = item.fornecedor || '';
      if (f.despesaPagoPor) f.despesaPagoPor.value = item.pago_por || '';
      if (f.despesaValorTotal) f.despesaValorTotal.value = item.valor_total || '';
      if (f.despesaDataCompetencia) f.despesaDataCompetencia.value = item.data_competencia || '';
      if (f.despesaDataVencimento) f.despesaDataVencimento.value = item.data_vencimento || '';
      if (f.despesaDataPagamento) f.despesaDataPagamento.value = item.data_pagamento || '';
      if (f.despesaFormaPagamento) f.despesaFormaPagamento.value = item.forma_pagamento || item.forma_pagamento_padrao || '';
      if (f.despesaParcelas) f.despesaParcelas.value = item.parcelas || '1';
      if (f.despesaFixo) f.despesaFixo.checked = parseBooleanInput(item.fixo);
      if (f.despesaObservacao) f.despesaObservacao.value = item.observacao || '';
      handleDespesaFormaPagamentoChange();
      renderParcelasDetalheDespesa(
        Array.isArray(item.parcelas_detalhe)
          ? item.parcelas_detalhe.map((p, idx) => ({
            numero: idx + 1,
            data: String(p.data_prevista || p.data || '').trim(),
            valor: Number(p.valor_previsto ?? p.valor ?? 0)
          }))
          : []
      );
    }

    function abrirFormularioDespesa() {
      if (!podeAlterarDados('Adicao bloqueada em modo somente leitura')) return;
      const f = el();
      if (!f.formDespesa) return;
      limparFormularioDespesa();
      f.formDespesa.classList.remove('hidden');
    }

    function abrirFormularioNovo() {
      abrirFormularioDespesa();
    }

    function editarDespesa(id) {
      if (!podeAlterarDados('Edicao bloqueada em modo somente leitura')) return;
      const despesaId = String(id || '').trim();
      const item = getById(despesaId);
      if (!item) {
        mostrarToast('Despesa nao encontrada', 'erro');
        return;
      }
      const localState = getDespesaUiState(item);
      if (ehCriacaoLocalComFalha(item, localState)) {
        const snapshot = window.AppDespesaMutations?.limparMeta?.(item) || { ...(item || {}) };
        try {
          descartarMutacaoDespesa(item);
        } catch (error) {
          mostrarToast(error?.message || 'Nao foi possivel liberar a despesa local para edicao', 'erro');
          return;
        }
        reabrirFormularioDespesaAposErro(snapshot, { editando: false });
        mostrarToast('Despesa com falha reaberta para ajuste.');
        return;
      }
      if (localState.blockActions) {
        mostrarToast('Aguarde a sincronizacao atual terminar ou use "Tentar novamente".', 'erro');
        return;
      }

      despesaEditandoId = despesaId;
      preencherFormularioDespesa(item);
      setModoFormularioDespesa(true);
      const f = el();
      if (f.formDespesa) {
        f.formDespesa.classList.remove('hidden');
      }
    }

    function editar(id) {
      editarDespesa(id);
    }

    function cancelarFormularioDespesa() {
      const f = el();
      if (!f.formDespesa) return;
      f.formDespesa.classList.add('hidden');
      limparFormularioDespesa();
    }

    function reabrirFormularioDespesaAposErro(payload, opcoes = {}) {
      const f = el();
      const dados = payload ? { ...payload } : {};
      const editando = !!opcoes.editando;
      despesaEditandoId = editando ? String(opcoes.id || '') : null;
      preencherFormularioDespesa(dados);
      setModoFormularioDespesa(editando);
      if (f.formDespesa) {
        f.formDespesa.classList.remove('hidden');
      }
    }

    function setSalvandoDespesa(ativo) {
      salvandoDespesa = !!ativo;
      if (window.AppMutationUI?.lock && window.AppMutationUI?.unlock) {
        if (salvandoDespesa) {
          if (!mutationLockToken) {
            mutationLockToken = window.AppMutationUI.lock();
          }
        } else if (mutationLockToken) {
          window.AppMutationUI.unlock(mutationLockToken);
          mutationLockToken = null;
        }
      }
      const f = el();
      if (f.btnSalvarDespesa) {
        f.btnSalvarDespesa.disabled = salvandoDespesa;
        if (salvandoDespesa) {
          if (window.AppLoading?.setButtonLoading) {
            window.AppLoading.setButtonLoading(
              f.btnSalvarDespesa,
              true,
              despesaEditandoId ? 'Salvar alteracoes' : 'Salvar despesa',
              'Salvando'
            );
          } else {
            f.btnSalvarDespesa.textContent = 'Salvando...';
          }
        } else if (window.AppLoading?.setButtonLoading) {
          window.AppLoading.setButtonLoading(
            f.btnSalvarDespesa,
            false,
            despesaEditandoId ? 'Salvar alteracoes' : 'Salvar despesa'
          );
        } else {
          f.btnSalvarDespesa.textContent = despesaEditandoId ? 'Salvar alteracoes' : 'Salvar despesa';
        }
      }
    }

    function salvarDespesa() {
      if (!podeAlterarDados('Salvamento bloqueado em modo somente leitura')) return;
      if (salvandoDespesa) return;
      const f = el();

      const descricao = String(f.despesaDescricao?.value || '').trim();
      const categoria = String(f.despesaCategoria?.value || '').trim();
      const valorTotal = parseNumeroInput(f.despesaValorTotal?.value);
      if (!descricao) {
        mostrarToast('Descricao da despesa e obrigatoria', 'erro');
        return;
      }
      if (!categoria) {
        mostrarToast('Categoria da despesa e obrigatoria', 'erro');
        return;
      }
      if (!isFinite(valorTotal) || valorTotal <= 0) {
        mostrarToast('Valor total invalido', 'erro');
        return;
      }
      const formaPagamento = String(f.despesaFormaPagamento?.value || '').trim();
      const parcelasBruto = parseNumeroInput(f.despesaParcelas?.value);
      const parcelas = formaExigeParcelas(formaPagamento)
        ? Math.floor(Number(parcelasBruto || 0))
        : 1;
      if (formaExigeParcelas(formaPagamento) && (!isFinite(parcelas) || parcelas < 1)) {
        mostrarToast('Parcelas deve ser um numero inteiro maior ou igual a 1', 'erro');
        return;
      }
      const parcelasDetalhe = formaExigeParcelas(formaPagamento)
        ? lerParcelasDetalheDespesa()
        : gerarParcelasPadrao(valorTotal, 1, getDataBaseParcelasDespesa());
      if (formaExigeParcelas(formaPagamento)) {
        if (parcelasDetalhe.length !== parcelas) {
          mostrarToast('Revise as parcelas detalhadas', 'erro');
          return;
        }
        const algumaDataInvalida = parcelasDetalhe.some(p => !String(p.data || '').trim());
        if (algumaDataInvalida) {
          mostrarToast('Preencha a data de todas as parcelas', 'erro');
          return;
        }
        const algumValorInvalido = parcelasDetalhe.some(p => Number(p.valor || 0) <= 0);
        if (algumValorInvalido) {
          mostrarToast('Valor de parcela deve ser maior que zero', 'erro');
          return;
        }
      }

      const payload = {
        descricao,
        categoria,
        fornecedor: String(f.despesaFornecedor?.value || '').trim(),
        pago_por: String(f.despesaPagoPor?.value || '').trim(),
        valor_total: valorTotal,
        data_competencia: String(f.despesaDataCompetencia?.value || '').trim(),
        data_vencimento: String(f.despesaDataVencimento?.value || '').trim(),
        data_pagamento: String(f.despesaDataPagamento?.value || '').trim(),
        forma_pagamento: formaPagamento,
        parcelas,
        parcelas_detalhe: parcelasDetalhe,
        fixo: !!f.despesaFixo?.checked,
        observacao: String(f.despesaObservacao?.value || '').trim()
      };
      const payloadFormulario = {
        ...payload,
        parcelas_detalhe: Array.isArray(payload.parcelas_detalhe)
          ? payload.parcelas_detalhe.map(p => ({ ...p }))
          : []
      };
      const despesaAnterior = despesaEditandoId ? getById(despesaEditandoId) : null;
      const eraEdicao = !!despesaEditandoId;
      const idEdicaoAtual = despesaEditandoId;
      const optimisticId = eraEdicao ? idEdicaoAtual : (window.AppDespesaMutations?.tempId?.('DES_TMP') || `DES_TMP_${Date.now()}`);
      if (!eraEdicao) {
        payload.client_request_id = optimisticId;
      }
      const optimisticItem = window.AppDespesaMutations?.buildFromPayload
        ? window.AppDespesaMutations.buildFromPayload(payload, {
          baseItem: despesaAnterior,
          id: optimisticId
        })
        : {
          ...(despesaAnterior || {}),
          ...payload,
          ID: optimisticId
        };

      setSalvandoDespesa(true);
      try {
        if (!window.AppOptimistic?.enqueue) {
          throw new Error('Fila de sincronizacao indisponivel');
        }
        window.AppOptimistic.enqueue({
          scope: 'despesa',
          handler: eraEdicao ? 'despesa.update' : 'despesa.create',
          entityKey: eraEdicao ? `despesa:${idEdicaoAtual}` : `despesa:${optimisticId}`,
          payload,
          meta: {
            domain: 'despesa',
            action: eraEdicao ? 'update' : 'create',
            source: 'despesas',
            target_id: eraEdicao ? idEdicaoAtual : '',
            before_item: despesaAnterior ? (window.AppDespesaMutations?.limparMeta?.(despesaAnterior) || despesaAnterior) : null,
            optimistic_item: window.AppDespesaMutations?.limparMeta?.(optimisticItem) || optimisticItem
          }
        });
        setSalvandoDespesa(false);
        cancelarFormularioDespesa();
        window.AppModalUI?.closeAll?.();
        mostrarToast(eraEdicao
          ? 'Alteracao aplicada localmente. Sincronizando...'
          : 'Despesa criada localmente. Sincronizando...');
      } catch (error) {
        setSalvandoDespesa(false);
        mostrarToast(error?.message || 'Erro ao enfileirar despesa', 'erro');
        reabrirFormularioDespesaAposErro(payloadFormulario, {
          editando: eraEdicao,
          id: idEdicaoAtual
        });
      }
    }

    function excluirDespesa(id) {
      if (!podeAlterarDados('Exclusao bloqueada em modo somente leitura')) return;
      const despesaId = String(id || '').trim();
      if (!despesaId) return;
      const despesaAtual = getById(despesaId);
      if (!despesaAtual) {
        mostrarToast('Despesa nao encontrada', 'erro');
        return;
      }
      const localState = getDespesaUiState(despesaAtual);
      const mensagemConfirmacao = ehCriacaoLocalComFalha(despesaAtual, localState)
        ? 'Deseja descartar esta despesa local com falha de sincronizacao?'
        : 'Deseja remover esta despesa geral?';
      if (!confirm(mensagemConfirmacao)) return;
      if (ehCriacaoLocalComFalha(despesaAtual, localState)) {
        try {
          descartarMutacaoDespesa(despesaAtual);
          mostrarToast('Despesa local descartada.');
        } catch (error) {
          mostrarToast(error?.message || 'Nao foi possivel descartar a despesa local', 'erro');
        }
        return;
      }
      if (localState.blockActions) {
        mostrarToast('Esta despesa ja possui uma sincronizacao pendente.', 'erro');
        return;
      }

      try {
        if (!window.AppOptimistic?.enqueue) {
          throw new Error('Fila de sincronizacao indisponivel');
        }
        window.AppOptimistic.enqueue({
          scope: 'despesa',
          handler: 'despesa.delete',
          entityKey: `despesa:${despesaId}`,
          payload: {
            id: despesaId
          },
          meta: {
            domain: 'despesa',
            action: 'delete',
            source: 'despesas',
            target_id: despesaId,
            before_item: window.AppDespesaMutations?.limparMeta?.(despesaAtual) || despesaAtual,
            optimistic_item: window.AppDespesaMutations?.limparMeta?.(despesaAtual) || despesaAtual
          }
        });
        mostrarToast('Exclusao aplicada localmente. Sincronizando...');
      } catch (error) {
        mostrarToast(error?.message || 'Erro ao enfileirar exclusao da despesa', 'erro');
      }
    }

    function excluir(id) {
      excluirDespesa(id);
    }

    function retryDespesaMutation(id) {
      const item = getById(id);
      const mutationId = String(item?._localMutationId || '').trim();
      if (!mutationId || !window.AppOptimistic?.retry) {
        mostrarToast('Nao ha sincronizacao pendente para reenviar', 'erro');
        return;
      }
      window.AppOptimistic.retry(mutationId);
      mostrarToast('Tentando sincronizar novamente...');
    }

    function descartarFalhaDespesa(id) {
      const item = getById(id);
      if (!item || !podeDescartarFalhaDespesa(item)) {
        mostrarToast('Nao ha falha local para descartar', 'erro');
        return;
      }
      const action = String(item?._localAction || '').trim().toLowerCase();
      const tipo = action === 'payment'
        ? 'pagamento local'
        : action === 'update'
          ? 'alteracao local'
          : 'sincronizacao local';
      if (!confirm(`Descartar esta ${tipo} com falha e recarregar os dados confirmados?`)) return;
      try {
        descartarMutacaoDespesa(item);
        atualizarAposDescartarFalhaDespesa(item);
        mostrarToast('Falha local descartada. Recarregando dados...');
      } catch (error) {
        mostrarToast(error?.message || 'Nao foi possivel descartar a falha local', 'erro');
      }
    }

    function setSalvandoPagamentoDespesa(ativo) {
      salvandoPagamentoDespesa = !!ativo;
      if (window.AppMutationUI?.lock && window.AppMutationUI?.unlock) {
        if (salvandoPagamentoDespesa) {
          if (!mutationLockTokenPagamento) {
            mutationLockTokenPagamento = window.AppMutationUI.lock();
          }
        } else if (mutationLockTokenPagamento) {
          window.AppMutationUI.unlock(mutationLockTokenPagamento);
          mutationLockTokenPagamento = null;
        }
      }
      const f = el();
      [f.pagDespesaData, f.pagDespesaValor, f.pagDespesaParcela, f.pagDespesaForma, f.pagDespesaObservacao, f.btnConfirmarPagDespesa]
        .forEach(input => {
          if (input) input.disabled = salvandoPagamentoDespesa;
        });
      if (f.btnConfirmarPagDespesa) {
        if (window.AppLoading?.setButtonLoading) {
          window.AppLoading.setButtonLoading(
            f.btnConfirmarPagDespesa,
            salvandoPagamentoDespesa,
            'Confirmar pagamento',
            'Salvando'
          );
        } else {
          f.btnConfirmarPagDespesa.textContent = salvandoPagamentoDespesa
            ? 'Salvando...'
            : 'Confirmar pagamento';
        }
      }
    }

    function registrarPagamentoDespesa(id) {
      if (!podeAlterarDados('Pagamento bloqueado em modo somente leitura')) return false;
      if (salvandoPagamentoDespesa) return false;
      const despesaId = String(id || '').trim();
      const item = despesas.find(d => String(d.ID || '').trim() === despesaId);
      if (!item) {
        mostrarToast('Despesa nao encontrada', 'erro');
        return false;
      }
      if (getDespesaUiState(item).blockActions) {
        mostrarToast('Esta despesa ja possui uma sincronizacao pendente.', 'erro');
        return false;
      }

      const pendente = Number(item.total_pendente || 0);
      if (pendente <= 0.009) {
        mostrarToast('Despesa ja esta paga');
        return false;
      }

      const formas = Array.isArray(validacoes?.formasPagamento) ? validacoes.formasPagamento : [];
      if (formas.length === 0) {
        mostrarToast('Cadastre FORMA_PAGAMENTO na aba VALIDACAO', 'erro');
        return false;
      }

      const f = el();
      despesaPagamentoId = despesaId;
      if (f.pagDespesaTitulo) {
        f.pagDespesaTitulo.textContent = `Registrar pagamento: ${item.descricao || despesaId}`;
      }
      if (f.pagDespesaData) f.pagDespesaData.value = item.data_pagamento || getHojeISO();

      const parcelas = Array.isArray(item?.parcelas_detalhe) ? item.parcelas_detalhe : [];
      const totalParcelas = Math.max(1, Math.floor(parseNumeroInput(item?.parcelas || 1) || 1));
      despesaPagamentoParcelado = totalParcelas > 1;
      const proximaParcela = parcelas.find(p => Number(p?.valor_pendente || 0) > 0.009) || null;

      if (f.pagDespesaParcelaWrap && f.pagDespesaParcela) {
        if (despesaPagamentoParcelado) {
          if (!proximaParcela?.ID) {
            despesaPagamentoId = null;
            mostrarToast('Nao ha parcela pendente para esta despesa', 'erro');
            return false;
          }
          const numero = Number(proximaParcela.parcela_numero || 0);
          const total = Number(proximaParcela.parcelas_total || 0);
          const data = String(proximaParcela.data_prevista || '-').trim() || '-';
          const valorPend = Number(proximaParcela.valor_pendente || 0);

          f.pagDespesaParcela.innerHTML = '';
          const op = document.createElement('option');
          op.value = String(proximaParcela.ID || '').trim();
          op.textContent = `Parcela ${numero}/${total} - ${data} - ${formatarMoeda(valorPend)}`;
          f.pagDespesaParcela.appendChild(op);
          f.pagDespesaParcela.value = op.value;
          f.pagDespesaParcelaWrap.classList.remove('hidden');

          if (f.pagDespesaValor) {
            f.pagDespesaValor.value = valorPend > 0 ? valorPend.toFixed(2) : '';
            f.pagDespesaValor.readOnly = true;
          }
        } else {
          f.pagDespesaParcela.innerHTML = '<option value="">Parcela unica</option>';
          f.pagDespesaParcela.value = '';
          f.pagDespesaParcelaWrap.classList.add('hidden');
          if (f.pagDespesaValor) {
            f.pagDespesaValor.value = pendente.toFixed(2);
            f.pagDespesaValor.readOnly = false;
          }
        }
      } else if (f.pagDespesaValor) {
        f.pagDespesaValor.value = pendente.toFixed(2);
      }

      if (f.pagDespesaForma) f.pagDespesaForma.value = item.forma_pagamento || item.forma_pagamento_padrao || '';
      if (f.pagDespesaObservacao) f.pagDespesaObservacao.value = '';
      if (f.modalPagamentoDespesa) f.modalPagamentoDespesa.classList.remove('hidden');
      setSalvandoPagamentoDespesa(false);
      return true;
    }

    function registrarPagamento(id) {
      registrarPagamentoDespesa(id);
    }

    function reabrirPagamentoDespesaAposErro(despesaId, dados) {
      const id = String(despesaId || '').trim();
      if (!id) return;
      const abriu = registrarPagamentoDespesa(id);
      if (!abriu) return;
      const f = el();
      const payload = dados || {};
      const dataPagamento = String(payload.data_pagamento || '').trim();
      const valorPago = String(payload.valor_pago ?? '').trim();
      const parcelaAlvoId = String(payload.parcela_alvo_id || '').trim();
      const formaPagamento = String(payload.forma_pagamento || '').trim();
      const observacao = String(payload.observacao || '').trim();

      if (f.pagDespesaData && dataPagamento) f.pagDespesaData.value = dataPagamento;
      if (f.pagDespesaValor && valorPago !== '') f.pagDespesaValor.value = valorPago;
      if (f.pagDespesaForma && formaPagamento) f.pagDespesaForma.value = formaPagamento;
      if (f.pagDespesaObservacao) f.pagDespesaObservacao.value = observacao;
      if (f.pagDespesaParcela && parcelaAlvoId) {
        const possuiOpcao = [...f.pagDespesaParcela.options]
          .some(op => String(op.value || '').trim() === parcelaAlvoId);
        if (possuiOpcao) {
          f.pagDespesaParcela.value = parcelaAlvoId;
        }
      }
    }

    function confirmarPagamentoDespesa() {
      if (!podeAlterarDados('Pagamento bloqueado em modo somente leitura')) return;
      if (salvandoPagamentoDespesa) return;
      if (!despesaPagamentoId) {
        mostrarToast('Despesa nao selecionada', 'erro');
        return;
      }

      const f = el();
      const dataPagamento = String(f.pagDespesaData?.value || '').trim();
      const valorPago = parseNumeroInput(f.pagDespesaValor?.value);
      const formaPagamento = String(f.pagDespesaForma?.value || '').trim();
      const observacao = String(f.pagDespesaObservacao?.value || '').trim();

      if (!dataPagamento) {
        mostrarToast('Data de pagamento e obrigatoria', 'erro');
        return;
      }
      if (!formaPagamento) {
        mostrarToast('Forma de pagamento e obrigatoria', 'erro');
        return;
      }
      if (despesaPagamentoParcelado && !String(f.pagDespesaParcela?.value || '').trim()) {
        mostrarToast('Selecione a parcela pendente', 'erro');
        return;
      }
      if (!isFinite(valorPago) || valorPago <= 0) {
        mostrarToast('Valor pago invalido', 'erro');
        return;
      }
      const despesaIdAtual = despesaPagamentoId;
      const eraParcelado = despesaPagamentoParcelado;
      const despesaAtual = getById(despesaIdAtual);
      if (!despesaAtual) {
        mostrarToast('Despesa nao encontrada', 'erro');
        return;
      }
      const dadosFormulario = {
        data_pagamento: dataPagamento,
        valor_pago: valorPago,
        parcela_alvo_id: eraParcelado ? String(f.pagDespesaParcela?.value || '').trim() : '',
        forma_pagamento: formaPagamento,
        observacao
      };
      const optimisticItem = window.AppDespesaMutations?.applyPayment
        ? window.AppDespesaMutations.applyPayment(despesaAtual, dadosFormulario)
        : {
          ...(despesaAtual || {}),
          data_pagamento: dataPagamento
        };

      setSalvandoPagamentoDespesa(true);
      if (f.modalPagamentoDespesa) {
        f.modalPagamentoDespesa.classList.add('hidden');
      }
      despesaPagamentoId = null;
      despesaPagamentoParcelado = false;
      try {
        if (!window.AppOptimistic?.enqueue) {
          throw new Error('Fila de sincronizacao indisponivel');
        }
        window.AppOptimistic.enqueue({
          scope: 'despesa',
          handler: 'despesa.payment',
          entityKey: `despesa:${despesaIdAtual}`,
          payload: {
            data_pagamento: dataPagamento,
            valor_pago: valorPago,
            parcela_alvo_id: dadosFormulario.parcela_alvo_id,
            forma_pagamento: formaPagamento,
            observacao
          },
          meta: {
            domain: 'despesa',
            action: 'payment',
            source: 'despesas',
            target_id: despesaIdAtual,
            before_item: despesaAtual ? (window.AppDespesaMutations?.limparMeta?.(despesaAtual) || despesaAtual) : null,
            optimistic_item: window.AppDespesaMutations?.limparMeta?.(optimisticItem) || optimisticItem
          }
        });
        setSalvandoPagamentoDespesa(false);
        window.AppModalUI?.closeAll?.();
        mostrarToast('Pagamento aplicado localmente. Sincronizando...');
      } catch (error) {
        setSalvandoPagamentoDespesa(false);
        mostrarToast(error?.message || 'Erro ao enfileirar pagamento', 'erro');
        reabrirPagamentoDespesaAposErro(despesaIdAtual, dadosFormulario);
      }
    }

    function cancelarPagamentoDespesa() {
      despesaPagamentoId = null;
      despesaPagamentoParcelado = false;
      setSalvandoPagamentoDespesa(false);
      const f = el();
      if (f.pagDespesaValor) f.pagDespesaValor.readOnly = false;
      if (f.pagDespesaParcelaWrap) f.pagDespesaParcelaWrap.classList.add('hidden');
      if (f.pagDespesaParcela) f.pagDespesaParcela.innerHTML = '<option value="">Selecione</option>';
      if (f.modalPagamentoDespesa) {
        f.modalPagamentoDespesa.classList.add('hidden');
      }
    }

    return {
      init,
      isLoaded,
      syncFromBackend,
      setFiltroTexto,
      getById,
      togglePainelFiltros,
      fecharPainelFiltros,

      abrirFormularioNovo,
      abrirFormularioDespesa,
      cancelarFormularioDespesa,
      editar,
      editarDespesa,
      salvarDespesa,
      excluir,
      excluirDespesa,
      retryDespesaMutation,
      descartarFalhaDespesa,
      carregarInboxDespesas,
      confirmarInboxDespesa,
      descartarInboxDespesa,
      registrarPagamento,
      registrarPagamentoDespesa,
      confirmarPagamentoDespesa,
      cancelarPagamentoDespesa,
      handleDespesaFormaPagamentoChange,
      handleDespesaParcelasDetalheChange
    };
  })();
</script>
