<script>
  window.ComprasStore = (() => {

    let itens = [];
    let carregado = false;
    let versao = 0;
    let assinatura = '';
    const CACHE_TAB = 'compras';
    let ordenacao = window.AppListOrder?.get?.(CACHE_TAB)
      || { key: 'operation', direction: 'desc' };

    function ordenarCompras(lista) {
      return window.AppListOrder?.sort
        ? window.AppListOrder.sort(CACHE_TAB, lista, ordenacao)
        : [...(Array.isArray(lista) ? lista : [])];
    }

    function getSort() {
      return { ...ordenacao };
    }

    function getSortOptions() {
      return window.AppListOrder?.getOptions?.(CACHE_TAB) || [];
    }

    function setSort(sortOrKey, direction) {
      const next = window.AppListOrder?.normalize
        ? window.AppListOrder.normalize(CACHE_TAB, sortOrKey, direction)
        : {
          key: typeof sortOrKey === 'string' ? sortOrKey : sortOrKey?.key,
          direction: direction || sortOrKey?.direction
        };
      if (next.key === ordenacao.key && next.direction === ordenacao.direction) {
        return getSort();
      }

      ordenacao = next;
      itens = ordenarCompras(itens);
      assinatura = window.AppDataRevision?.signature?.(itens) || '';
      tocarVersao();
      window.AppListOrder?.save?.(CACHE_TAB, ordenacao);
      return getSort();
    }

    function tocarVersao() {
      versao += 1;
    }

    function salvarCache() {
      window.AppTabCache?.salvar?.(CACHE_TAB, itens);
    }

    function removerCache() {
      window.AppTabCache?.remover?.(CACHE_TAB);
    }

    function emitirStoreLoaded() {
      if (typeof window === 'undefined' || typeof window.dispatchEvent !== 'function') return;
      try {
        window.dispatchEvent(new CustomEvent('app:store:loaded', {
          detail: { tab: CACHE_TAB }
        }));
      } catch (error) {
        // sem acao
      }
    }

    /* =========================
       BASICO
    ========================== */
    function set(lista) {
      const proximos = ordenarCompras(lista);
      const proximaAssinatura = window.AppDataRevision?.signature?.(proximos) || '';
      if (carregado && proximaAssinatura && proximaAssinatura === assinatura) {
        return false;
      }
      itens = proximos;
      assinatura = proximaAssinatura;
      carregado = true;
      tocarVersao();
      salvarCache();
      emitirStoreLoaded();
      return true;
    }

    function get() {
      return ordenarCompras(itens);
    }

    function isLoaded() {
      return carregado;
    }

    function getVersion() {
      return versao;
    }

    function clear() {
      itens = [];
      carregado = false;
      assinatura = '';
      tocarVersao();
      removerCache();
    }

    /* =========================
       CRUD LOCAL
    ========================== */
    function add(item) {
      if (!item || !item.ID) return;
      itens.unshift(item);
      itens = ordenarCompras(itens);
      assinatura = window.AppDataRevision?.signature?.(itens) || '';
      tocarVersao();
      salvarCache();
    }

    function update(id, dados) {
      const idx = itens.findIndex(i => i.ID === id);
      if (idx === -1) return;

      itens[idx] = {
        ...itens[idx],
        ...dados
      };
      itens = ordenarCompras(itens);
      assinatura = window.AppDataRevision?.signature?.(itens) || '';
      tocarVersao();
      salvarCache();
    }

    function remove(id) {
      itens = itens.filter(i => i.ID !== id);
      assinatura = window.AppDataRevision?.signature?.(itens) || '';
      tocarVersao();
      salvarCache();
    }

    function getById(id) {
      return itens.find(i => i.ID === id) || null;
    }

    /* =========================
       FILTROS
    ========================== */
    function filter({ texto, tipo, unidade, categoria } = {}) {
      let resultado = [...itens];

      if (texto) {
        const incluiTexto = window.AppSearch?.includesText
          ? window.AppSearch.includesText
          : (base, termo) => String(base ?? '').toLowerCase().includes(String(termo ?? '').toLowerCase());
        resultado = resultado.filter(i =>
          incluiTexto(i.item, texto) ||
          incluiTexto(i.fornecedor, texto)
        );
      }

      if (tipo) {
        resultado = resultado.filter(i => i.tipo === tipo);
      }

      if (unidade) {
        resultado = resultado.filter(i => i.unidade === unidade);
      }

      if (categoria) {
        resultado = resultado.filter(i => i.categoria === categoria);
      }

      return ordenarCompras(resultado);
    }

    /* =========================
       API PUBLICA
    ========================== */
    return {
      set,
      get,
      isLoaded,
      getVersion,
      clear,
      getSort,
      getSortOptions,
      setSort,
      sort: ordenarCompras,

      add,
      update,
      remove,
      getById,

      filter
    };

  })();
</script>
