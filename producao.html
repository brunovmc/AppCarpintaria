<div id="miniDashboardProducao" class="producao-mini-dashboard"></div>
<div id="topBarProducao" class="top-bar hidden">
  <input id="buscaProducao" type="text" placeholder="Buscar...">
  <button id="btnFiltroProducao" type="button">Filtrar</button>
</div>
<div id="listaProducao"></div>

<div id="modalDetalhesProducao" class="modal hidden">
  <div class="modal-content">
    <button class="modal-close-square" onclick="ProducaoUI.fecharModalDetalhes()" aria-label="Fechar">X</button>
    <h3 id="modalDetalhesProducaoTitulo">Detalhes da producao</h3>
    <div id="modalDetalhesProducaoConteudo"></div>
  </div>
</div>

<div id="formularioProducao" class="modal hidden">
  <div class="modal-content form-modal-content">
  <button class="modal-close-square" onclick="ProducaoUI.fecharFormulario()" aria-label="Fechar">X</button>
  <h2 id="producaoFormTitulo">Nova Producao</h2>

  <div class="campo-ajuda-wrap">
    <span class="campo-ajuda-tag">Produto</span>
    <select id="producaoProduto"></select>
  </div>

  <div class="campo-ajuda-wrap">
    <span class="campo-ajuda-tag">Nome da ordem</span>
    <input id="producaoNome">
  </div>

  <div class="campo-ajuda-wrap">
    <span class="campo-ajuda-tag">Qtd planejada</span>
    <input id="producaoQtd" type="number" step="1" min="1" inputmode="numeric">
  </div>

  <div class="campo-ajuda-wrap">
    <span class="campo-ajuda-tag">Status</span>
    <select id="producaoStatus">
      <option value="Em planejamento">Em planejamento</option>
      <option value="Em producao">Em producao</option>
      <option value="Finalizacao">Finalizacao</option>
      <option value="Concluido">Concluido</option>
    </select>
  </div>

  <div class="campo-ajuda-wrap">
    <span class="campo-ajuda-tag">Data inicio</span>
    <input id="producaoDataInicio" type="date">
  </div>

  <div class="campo-ajuda-wrap">
    <span class="campo-ajuda-tag">Data termino</span>
    <input id="producaoDataPrevista" type="date">
  </div>

  <div class="campo-ajuda-wrap">
    <span class="campo-ajuda-tag">Observacao</span>
    <textarea id="producaoObservacao"></textarea>
  </div>

  <button id="btnSalvarProducao" onclick="ProducaoController.salvar()">Salvar</button>
  <button onclick="ProducaoUI.fecharFormulario()">Cancelar</button>
  </div>
</div>

<div id="modalConsumoProducao" class="modal hidden">
  <div class="modal-content">
    <button class="modal-close-square" onclick="ProducaoUI.fecharModalConsumo()" aria-label="Fechar">X</button>
    <h3 id="consumoTitulo">Revisar baixa da producao</h3>
    <div id="consumoResumoLote" class="comp-meta"></div>
    <div class="campo-ajuda-wrap">
      <span class="campo-ajuda-tag">Qtd produzida neste lote</span>
      <input id="consumoQtdProduzida" type="number" step="1" min="1" inputmode="numeric">
    </div>
    <div class="campo-ajuda-wrap">
      <span class="campo-ajuda-tag">Entradas</span>
      <label class="dash-fixo-toggle">
        <input id="consumoBypassEntradas" type="checkbox">
        <span>Ignorar entradas e lancar apenas saidas</span>
      </label>
    </div>
    <div id="consumoLista"></div>
    <div class="bloco">
      <p><b>Saidas a adicionar no estoque</b></p>
      <div id="consumoSaidasLista"></div>
    </div>
    <div class="acoes">
      <button id="btnConfirmarConsumo" type="button">Confirmar</button>
      <button id="btnCancelarConsumo" type="button">Cancelar</button>
    </div>
  </div>
</div>

<div id="modalPendenciasVinculoProducao" class="modal hidden">
  <div class="modal-content">
    <button class="modal-close-square" onclick="ProducaoUI.fecharModalPendenciasVinculo()" aria-label="Fechar">X</button>
    <h3 id="pendenciasVinculoTitulo">Vincular entradas pendentes</h3>
    <div id="pendenciasVinculoLista"></div>
    <div class="acoes">
      <button id="btnConfirmarPendenciasVinculo" type="button">Salvar vinculos</button>
      <button id="btnCancelarPendenciasVinculo" type="button">Cancelar</button>
    </div>
  </div>
</div>
