<script>
  window.ProdutosStore = (() => {

    let itens = [];
    let carregado = false;
    const CACHE_TAB = 'produtos';

    function salvarCache() {
      window.AppTabCache?.salvar?.(CACHE_TAB, itens);
    }

    function removerCache() {
      window.AppTabCache?.remover?.(CACHE_TAB);
    }

    /* =========================
       BASICO
    ========================== */
    function set(lista) {
      itens = Array.isArray(lista) ? [...lista] : [];
      carregado = true;
      salvarCache();
    }

    function get() {
      return [...itens];
    }

    function isLoaded() {
      return carregado;
    }

    function clear() {
      itens = [];
      carregado = false;
      removerCache();
    }

    /* =========================
       CRUD LOCAL
    ========================== */
    function add(item) {
      if (!item || !item.produto_id) return;
      itens.unshift(item);
      salvarCache();
    }

    function update(id, dados) {
      const idx = itens.findIndex(i => i.produto_id === id);
      if (idx === -1) return;

      itens[idx] = {
        ...itens[idx],
        ...dados
      };
      salvarCache();
    }

    function remove(id) {
      itens = itens.filter(i => i.produto_id !== id);
      salvarCache();
    }

    function getById(id) {
      return itens.find(i => i.produto_id === id) || null;
    }

    /* =========================
       FILTROS
    ========================== */
    function filter({ texto } = {}) {
      let resultado = [...itens];

      if (texto) {
        const incluiTexto = window.AppSearch?.includesText
          ? window.AppSearch.includesText
          : (base, termo) => String(base ?? '').toLowerCase().includes(String(termo ?? '').toLowerCase());
        resultado = resultado.filter(i =>
          incluiTexto(i.nome_produto, texto)
        );
      }

      return resultado;
    }

    /* =========================
       API PUBLICA
    ========================== */
    return {
      set,
      get,
      isLoaded,
      clear,

      add,
      update,
      remove,
      getById,

      filter
    };

  })();
</script>
