<script>
  window.ProducaoController = (() => {

    let editandoId = null;
    let iniciado = false;
    let consumoInit = false;
    let salvando = false;
    let mutationLockToken = null;

    let produtos = [];
    let estoqueOpcoes = [];
    let receitasCache = {};
    let tiposValidacao = [];

    function init() {
      if (iniciado) return;

      carregarProdutos();
      carregarEstoqueOpcoes();
      carregarValidacoes();
      carregarProducao();
      initConsumoUI();
      initFormEventos();

      iniciado = true;
    }

    function initConsumoUI() {
      if (consumoInit) return;
      consumoInit = true;

      const btnConfirmar = document.getElementById('btnConfirmarConsumo');
      const btnCancelar = document.getElementById('btnCancelarConsumo');
      const btnConfirmarPendencias = document.getElementById('btnConfirmarPendenciasVinculo');
      const btnCancelarPendencias = document.getElementById('btnCancelarPendenciasVinculo');

      if (btnConfirmar) {
        btnConfirmar.addEventListener('click', () => confirmarAtualizacaoEstoque());
      }

      if (btnCancelar) {
        btnCancelar.addEventListener('click', () => {
          ProducaoUI.fecharModalConsumo();
        });
      }

      if (btnConfirmarPendencias) {
        btnConfirmarPendencias.addEventListener('click', () => confirmarPendenciasVinculo());
      }

      if (btnCancelarPendencias) {
        btnCancelarPendencias.addEventListener('click', () => {
          ProducaoUI.fecharModalPendenciasVinculo?.();
        });
      }
    }

    function renderListaAtual() {
      if (typeof window.aplicarBuscaProducao === 'function') {
        window.aplicarBuscaProducao();
        return;
      }
      ProducaoUI.renderLista(ProducaoStore.get());
    }

    function hidratarProducaoDoCache() {
      const listaCache = window.AppTabCache?.ler?.('producao');
      if (!Array.isArray(listaCache)) return false;
      ProducaoStore.set(listaCache);
      renderListaAtual();
      return true;
    }

    function parseNumeroInput(valor) {
      const s = String(valor ?? '').trim();
      if (s === '') return 0;
      const n = Number(s.replace(',', '.'));
      return isNaN(n) ? 0 : n;
    }

    function setSalvando(ativo) {
      salvando = !!ativo;
      if (window.AppMutationUI?.lock && window.AppMutationUI?.unlock) {
        if (salvando) {
          if (!mutationLockToken) {
            mutationLockToken = window.AppMutationUI.lock();
          }
        } else if (mutationLockToken) {
          window.AppMutationUI.unlock(mutationLockToken);
          mutationLockToken = null;
        }
      }
      const btn = document.getElementById('btnSalvarProducao');
      if (!btn) return;
      btn.disabled = salvando;
      if (window.AppLoading?.setButtonLoading) {
        window.AppLoading.setButtonLoading(btn, salvando, 'Salvar', 'Salvando');
      } else {
        btn.textContent = salvando ? 'Salvando...' : 'Salvar';
      }
    }

    function reabrirFormularioAposErro(dados, opcoes = {}) {
      const payload = dados ? { ...dados } : {};
      const editando = !!opcoes.editando;
      editandoId = editando ? String(opcoes.id || '') : null;
      ProducaoUI.preencherFormulario(payload);
      if (payload.produto_id) {
        carregarReceitasProduto(payload.produto_id, payload.receita_id || '', true);
      }
      ProducaoUI.mostrarFormulario();
    }

    function podeAlterarDados(contexto = 'Operacao') {
      if (window.AppRuntime?.ensureWritable) {
        return window.AppRuntime.ensureWritable(contexto);
      }
      return true;
    }

    function marcarDashboardComoSujo() {
      if (window.AppTabRefresh?.markDirty) {
        window.AppTabRefresh.markDirty('dashboard');
        window.AppTabRefresh.markDirty('estoque');
      }
      if (window.DashboardController?.invalidarCacheMeses) {
        window.DashboardController.invalidarCacheMeses();
      }
      if (window.AppTabRefresh?.requestSync) {
        window.AppTabRefresh.requestSync('dashboard', {
          delayMs: 420,
          prefetch: true
        });
      }
    }

    function toDateString(value) {
      if (!value) return '';
      if (value instanceof Date) {
        const yyyy = value.getFullYear();
        const mm = String(value.getMonth() + 1).padStart(2, '0');
        const dd = String(value.getDate()).padStart(2, '0');
        return `${yyyy}-${mm}-${dd}`;
      }
      const s = String(value).trim();
      if (s === '') return '';
      if (s.includes('T')) return s.split('T')[0];
      return s.length >= 10 ? s.slice(0, 10) : s;
    }

    function sanitizeEtapa(et, includeId = true) {
      const payload = {
        nome_etapa: String(et.nome_etapa || '').trim(),
        feito: !!et.feito,
        ordem: Number(et.ordem) || 0,
        data_feito: toDateString(et.data_feito)
      };
      if (includeId && et.id) {
        payload.id = String(et.id);
      }
      return payload;
    }

    function normalizarOrdemEtapas(etapas) {
      if (!Array.isArray(etapas)) return [];
      const ordenadas = [...etapas].sort((a, b) => {
        const ordemA = Number(a?.ordem || 0);
        const ordemB = Number(b?.ordem || 0);
        if (ordemA === ordemB) return 0;
        return ordemA - ordemB;
      });
      return ordenadas.map((et, idx) => ({
        ...et,
        ordem: idx + 1
      }));
    }

    function carregarProdutos(forcarRecarregar = false, onDone) {
      google.script.run
        .withSuccessHandler(lista => {
          produtos = Array.isArray(lista) ? lista : [];
          ProducaoUI.renderProdutos(produtos);
          if (typeof onDone === 'function') onDone();
        })
        .withFailureHandler(() => {
          if (typeof onDone === 'function') onDone();
        })
        .listarProdutos(!!forcarRecarregar);
    }

    function carregarEstoqueOpcoes(forcarRecarregar = false, onDone) {
      google.script.run
        .withSuccessHandler(lista => {
          estoqueOpcoes = Array.isArray(lista) ? lista : [];
          ProducaoUI.setEstoqueOpcoes?.(estoqueOpcoes);
          if (typeof onDone === 'function') onDone();
        })
        .withFailureHandler(() => {
          estoqueOpcoes = [];
          ProducaoUI.setEstoqueOpcoes?.([]);
          if (typeof onDone === 'function') onDone();
        })
        .listarEstoque(!!forcarRecarregar);
    }

    function carregarValidacoes() {
      const loader = window.AppValidacoes?.get
        ? window.AppValidacoes.get({ maxAgeMs: 1000 * 60 * 60 * 12 })
        : Promise.reject(new Error('cache de validacoes indisponivel'));

      loader
        .then(({ data }) => {
          const validacoes = data || {};
          tiposValidacao = Array.isArray(validacoes.tipos) ? validacoes.tipos : [];
          ProducaoUI.setTiposValidacao?.(tiposValidacao);
        })
        .catch(() => {
          tiposValidacao = [];
          ProducaoUI.setTiposValidacao?.([]);
        });
    }

    function initFormEventos() {
      const selectProduto = document.getElementById('producaoProduto');
      if (!selectProduto || selectProduto.dataset.bound) return;
      selectProduto.dataset.bound = '1';

      selectProduto.addEventListener('change', () => {
        const produtoId = selectProduto.value || '';
        carregarReceitasProduto(produtoId, '', true);
      });
    }

    function carregarReceitasProduto(produtoId, receitaSelecionada = '', forcar = false) {
      if (!produtoId) {
        ProducaoUI.renderReceitas([]);
        return;
      }

      if (receitasCache[produtoId] && !forcar) {
        const receitas = receitasCache[produtoId] || [];
        const receitaPadrao = receitaSelecionada || (receitas[0]?.receita_id || '');
        ProducaoUI.renderReceitas(receitas, receitaPadrao);
        return;
      }

      google.script.run
        .withSuccessHandler(lista => {
          const receitasBrutas = (Array.isArray(lista) ? lista : [])
            .filter(r => r && r.receita_id);

          const receitas = receitasBrutas.length > 0 ? [receitasBrutas[0]] : [];
          receitasCache[produtoId] = receitas;
          const receitaPadrao = receitaSelecionada || (receitas[0]?.receita_id || '');
          ProducaoUI.renderReceitas(receitas, receitaPadrao);
          if (receitasBrutas.length > 1) {
            mostrarToast('Produto com mais de uma receita ativa. Usando apenas o modelo principal.');
          }
          if (receitas.length === 0) {
            mostrarToast('Produto sem modelo cadastrado. Cadastre o modelo na aba Produtos.', 'erro');
          }
        })
        .withFailureHandler(err => {
          const msg = err?.message || 'Erro ao carregar receitas';
          mostrarToast(msg, 'erro');
          ProducaoUI.renderReceitas([]);
        })
        .listarReceitasProduto(produtoId);
    }

    function carregarProducao(forcarRecarregar = false, onDone) {
      const exibindoCache = !forcarRecarregar && hidratarProducaoDoCache();
      google.script.run
        .withSuccessHandler(lista => {
          if (window.AppRuntime?.setReadOnly) {
            window.AppRuntime.setReadOnly(false);
          }
          ProducaoStore.set(lista);
          renderListaAtual();
          if (typeof onDone === 'function') onDone();
        })
        .withFailureHandler(err => {
          if (exibindoCache) {
            if (window.AppRuntime?.setReadOnly) {
              window.AppRuntime.setReadOnly(true, 'Sem conexao com backend - exibindo cache local');
            }
            mostrarToast('Exibindo ultimo snapshot em cache', 'erro');
            if (typeof onDone === 'function') onDone();
            return;
          }
          const msg = err?.message || 'Erro ao carregar producao';
          mostrarToast(msg, 'erro');
          if (typeof onDone === 'function') onDone();
        })
        .listarProducao(!!forcarRecarregar);
    }

    function syncFromBackend(onDone) {
      let pendencias = 3;
      const concluir = () => {
        pendencias -= 1;
        if (pendencias > 0) return;
        if (typeof onDone === 'function') onDone();
      };
      carregarProdutos(true, concluir);
      carregarEstoqueOpcoes(true, concluir);
      carregarProducao(true, concluir);
    }

    function salvar() {
      if (!podeAlterarDados('Salvamento bloqueado em modo somente leitura')) return;
      if (salvando) return;
      const get = id => document.getElementById(id)?.value || '';

      const produtoId = get('producaoProduto');
      const itemEditando = editandoId ? ProducaoStore.getById(editandoId) : null;

      const dados = {
        produto_id: produtoId,
        receita_id: '',
        nome_ordem: get('producaoNome'),
        qtd_planejada: parseNumeroInput(get('producaoQtd')) || 0,
        status: get('producaoStatus'),
        data_inicio: get('producaoDataInicio'),
        data_prevista_termino: get('producaoDataPrevista'),
        observacao: get('producaoObservacao')
      };

      if (!dados.produto_id) {
        mostrarToast('Selecione o produto', 'erro');
        return;
      }

      if (
        itemEditando &&
        String(itemEditando.produto_id || '') === String(dados.produto_id || '') &&
        String(itemEditando.receita_id || '').trim()
      ) {
        dados.receita_id = String(itemEditando.receita_id || '').trim();
        dados.receita_nome = itemEditando.receita_nome || '';
      }

      if (!dados.receita_id) {
        const receitaPadrao = receitasCache[dados.produto_id]?.[0] || null;
        dados.receita_id = receitaPadrao?.receita_id || '';
        dados.receita_nome = receitaPadrao?.nome_receita || '';
      }

      if (!dados.receita_id) {
        mostrarToast('Produto sem modelo cadastrado', 'erro');
        return;
      }

      const receitasProduto = receitasCache[dados.produto_id] || [];
      const receita = receitasProduto.find(r => r.receita_id === dados.receita_id);
      if (receita) {
        dados.receita_nome = receita.nome_receita || '';
      }
      const dadosFormulario = { ...dados };

      setSalvando(true);

      if (editandoId) {
        const idAtual = editandoId;
        const snapshot = { ...ProducaoStore.getById(idAtual) };

        ProducaoStore.update(idAtual, dados);
        renderListaAtual();
        finalizarUX();

        google.script.run
        .withFailureHandler(err => {
          ProducaoStore.update(idAtual, snapshot);
          renderListaAtual();
          const msg = err?.message || 'Erro ao salvar edicao';
          mostrarToast(msg, 'erro');
          setSalvando(false);
          reabrirFormularioAposErro(dadosFormulario, { editando: true, id: idAtual });
        })
        .withSuccessHandler(() => {
          mostrarToast('Salvo com sucesso');
          marcarDashboardComoSujo();
          if (window.AppTabRefresh?.requestSync) {
            window.AppTabRefresh.requestSync('producao', {
              delayMs: 300,
              prefetch: true
            });
          }
          setSalvando(false);
        })
        .atualizarProducao(idAtual, dados);

        editandoId = null;
        return;
      }

      const tempId = `tmp_${Date.now()}`;
      const produto = produtos.find(p => p.produto_id === dados.produto_id) || {};

      const itemTemp = {
        producao_id: tempId,
        nome_produto: produto.nome_produto || '',
        unidade_produto: produto.unidade_produto || '',
        receita_nome: dados.receita_nome || '',
        etapas: [],
        ...dados
      };

      ProducaoStore.add(itemTemp);
      renderListaAtual();
      finalizarUX();
      mostrarToast('Salvando...');

      google.script.run
        .withFailureHandler(err => {
          ProducaoStore.remove(tempId);
          renderListaAtual();
          const msg = err?.message || 'Erro ao salvar producao';
          mostrarToast(msg, 'erro');
          setSalvando(false);
          reabrirFormularioAposErro(dadosFormulario, { editando: false });
        })
        .withSuccessHandler(itemSalvo => {
          ProducaoStore.remove(tempId);

          if (!itemSalvo || !itemSalvo.producao_id) {
            const concluirSync = window.AppSyncFeedback?.iniciar
              ? window.AppSyncFeedback.iniciar('Salvo com sucesso. Atualizando dados...')
              : null;
            marcarDashboardComoSujo();
            setSalvando(false);
            if (window.AppTabRefresh?.requestSync) {
              window.AppTabRefresh.requestSync('producao', {
                delayMs: 280,
                prefetch: true,
                onDone: () => {
                  if (concluirSync) {
                    concluirSync('Dados atualizados');
                  } else {
                    mostrarToast('Dados atualizados');
                  }
                }
              });
            } else {
              carregarProducao(true, () => {
                if (concluirSync) {
                  concluirSync('Dados atualizados');
                } else {
                  mostrarToast('Dados atualizados');
                }
              });
            }
            return;
          }

          ProducaoStore.add(itemSalvo);
          renderListaAtual();
          mostrarToast('Salvo com sucesso');
          marcarDashboardComoSujo();
          if (window.AppTabRefresh?.requestSync) {
            window.AppTabRefresh.requestSync('producao', {
              delayMs: 300,
              prefetch: true
            });
          }
          setSalvando(false);
        })
        .criarProducao(dados);
    }

    function finalizarUX() {
      ProducaoUI.fecharFormulario();
    }

    function editar(id) {
      if (!podeAlterarDados('Edicao bloqueada em modo somente leitura')) return;
      const item = ProducaoStore.getById(id);

      if (!item) {
        mostrarToast('Producao nao encontrada', 'erro');
        return;
      }

      editandoId = id;
      ProducaoUI.preencherFormulario(item);
      carregarReceitasProduto(item.produto_id, item.receita_id || '', true);
      ProducaoUI.mostrarFormulario();
    }

    function abrirFormularioComModelo(produtoId, receitaId = '') {
      if (!podeAlterarDados('Adicao bloqueada em modo somente leitura')) return;
      const prodId = String(produtoId || '').trim();
      if (!prodId) {
        mostrarToast('Produto invalido', 'erro');
        return;
      }

      if (typeof trocarAba === 'function') {
        trocarAba('producao');
      }

      editandoId = null;
      ProducaoUI.resetFormulario?.();

      const selectProduto = document.getElementById('producaoProduto');
      if (selectProduto) {
        selectProduto.value = prodId;
      }

      carregarReceitasProduto(prodId, receitaId, true);
      ProducaoUI.mostrarFormulario();
    }

    function excluir(id) {
      if (!podeAlterarDados('Exclusao bloqueada em modo somente leitura')) return;
      if (!confirm('Deseja remover esta producao?')) return;

      const snapshot = ProducaoStore.getById(id);

      ProducaoStore.remove(id);
      renderListaAtual();
      mostrarToast('Producao removida');

      google.script.run
        .withFailureHandler(() => {
          ProducaoStore.add(snapshot);
          renderListaAtual();
          mostrarToast('Erro ao remover', 'erro');
        })
        .withSuccessHandler(() => {
          marcarDashboardComoSujo();
        })
        .deletarProducao(id);
    }

    function carregarMateriaisPrevistos(id, forcar = false, onDone) {
      const item = ProducaoStore.getById(id);
      if (item && item.materiaisPrevistos && !forcar) {
        if (typeof onDone === 'function') onDone();
        return;
      }

      google.script.run
        .withSuccessHandler(resp => {
          ProducaoStore.update(id, {
            materiaisPrevistos: resp.itens || [],
            custo_previsto: resp.custoPrevisto || 0
          });
          renderListaAtual();
          if (typeof onDone === 'function') onDone();
        })
        .withFailureHandler(err => {
          const msg = err?.message || 'Erro ao carregar materiais';
          mostrarToast(msg, 'erro');
          if (typeof onDone === 'function') onDone();
        })
        .obterMateriaisPrevistosProducao(id);
    }

    function carregarVinculosMateriais(id, forcar = false, onDone) {
      const item = ProducaoStore.getById(id);
      if (item && item.vinculosMateriais && !forcar) {
        if (typeof onDone === 'function') onDone();
        return;
      }

      google.script.run
        .withSuccessHandler(lista => {
          ProducaoStore.update(id, {
            vinculosMateriais: Array.isArray(lista) ? lista : []
          });
          renderListaAtual();
          if (typeof onDone === 'function') onDone();
        })
        .withFailureHandler(err => {
          const msg = err?.message || 'Erro ao carregar vinculos';
          mostrarToast(msg, 'erro');
          if (typeof onDone === 'function') onDone();
        })
        .listarVinculosMateriaisProducao(id);
    }

    function carregarSaidasLotes(id, forcar = false, onDone) {
      const item = ProducaoStore.getById(id);
      if (item && item.saidasLotes && !forcar) {
        if (typeof onDone === 'function') onDone();
        return;
      }

      google.script.run
        .withSuccessHandler(lista => {
          ProducaoStore.update(id, {
            saidasLotes: Array.isArray(lista) ? lista : []
          });
          renderListaAtual();
          if (typeof onDone === 'function') onDone();
        })
        .withFailureHandler(err => {
          const msg = err?.message || 'Erro ao carregar saidas da OP';
          mostrarToast(msg, 'erro');
          if (typeof onDone === 'function') onDone();
        })
        .listarSaidasLotesProducao(id);
    }

    function atualizarCustoLoteSaida(producaoId, loteId, custoUnitarioInput) {
      if (!podeAlterarDados('Atualizacao bloqueada em modo somente leitura')) return;
      const prodId = String(producaoId || '').trim();
      const lotId = String(loteId || '').trim();
      const custo = Number(String(custoUnitarioInput || '').replace(',', '.'));

      if (!prodId || !lotId) {
        mostrarToast('Lote de saida invalido', 'erro');
        return;
      }
      if (!isFinite(custo) || custo < 0) {
        mostrarToast('Custo unitario invalido', 'erro');
        return;
      }

      mostrarToast('Atualizando custo da saida...');
      google.script.run
        .withFailureHandler(err => {
          const msg = err?.message || 'Erro ao atualizar custo da saida';
          mostrarToast(msg, 'erro');
        })
        .withSuccessHandler(resp => {
          if (resp?.saidasLotes) {
            ProducaoStore.update(prodId, { saidasLotes: resp.saidasLotes });
          } else if (resp?.loteAtualizado) {
            const item = ProducaoStore.getById(prodId) || {};
            const lotes = Array.isArray(item.saidasLotes) ? [...item.saidasLotes] : [];
            const idx = lotes.findIndex(l => String(l.id || '').trim() === String(resp.loteAtualizado.id || '').trim());
            if (idx >= 0) {
              lotes[idx] = resp.loteAtualizado;
            } else {
              lotes.unshift(resp.loteAtualizado);
            }
            ProducaoStore.update(prodId, { saidasLotes: lotes });
          }
          if (resp?.estoqueAtualizado && window.EstoqueStore) {
            EstoqueStore.update(resp.estoqueAtualizado.ID, {
              custo_unitario: resp.estoqueAtualizado.custo_unitario,
              valor_unit: resp.estoqueAtualizado.valor_unit
            });
          }
          if (window.EstoqueController?.syncFromBackend) {
            if (window.AppTabRefresh?.requestSync) {
              window.AppTabRefresh.requestSync('estoque', {
                delayMs: 260,
                prefetch: true
              });
            } else {
              EstoqueController.syncFromBackend();
            }
          }
          renderListaAtual();
          marcarDashboardComoSujo();
          mostrarToast('Custo da saida atualizado');
        })
        .atualizarCustoLoteSaidaProducao(prodId, lotId, custo);
    }

    function atualizarPrecoVendaProdutoSaida(producaoId, nomeSaida, precoVendaInput) {
      if (!podeAlterarDados('Atualizacao bloqueada em modo somente leitura')) return;
      const prodId = String(producaoId || '').trim();
      const nome = String(nomeSaida || '').trim();
      const preco = Number(String(precoVendaInput || '').replace(',', '.'));

      if (!prodId) {
        mostrarToast('Producao invalida', 'erro');
        return;
      }
      if (!nome) {
        mostrarToast('Saida invalida', 'erro');
        return;
      }
      if (!isFinite(preco) || preco <= 0) {
        mostrarToast('Preco de venda deve ser maior que zero', 'erro');
        return;
      }

      mostrarToast('Atualizando preco de venda...');
      google.script.run
        .withFailureHandler(err => {
          const msg = err?.message || 'Erro ao atualizar preco de venda';
          mostrarToast(msg, 'erro');
        })
        .withSuccessHandler(resp => {
          const msgBase = resp?.produtoCriado
            ? 'Preco salvo e produto criado automaticamente'
            : 'Preco de venda atualizado';
          const concluirSync = window.AppSyncFeedback?.iniciar
            ? window.AppSyncFeedback.iniciar(`${msgBase}. Atualizando dados...`)
            : null;
          let pendenciasSync = 0;
          const concluirUmaSync = () => {
            pendenciasSync -= 1;
            if (pendenciasSync > 0) return;
            if (concluirSync) {
              concluirSync('Dados atualizados');
            } else {
              mostrarToast('Dados atualizados');
            }
          };
          const agendarSync = fn => {
            if (typeof fn !== 'function') return;
            pendenciasSync += 1;
            fn(() => concluirUmaSync());
          };

          if (window.ProdutosController?.syncFromBackend) {
            if (window.AppTabRefresh?.requestSync) {
              agendarSync(done => window.AppTabRefresh.requestSync('produtos', {
                delayMs: 240,
                prefetch: true,
                onDone: done
              }));
            } else {
              agendarSync(done => ProdutosController.syncFromBackend(done));
            }
          }
          marcarDashboardComoSujo();
          if (window.AppTabRefresh?.requestSync) {
            agendarSync(done => window.AppTabRefresh.requestSync('producao', {
              delayMs: 240,
              prefetch: true,
              onDone: done
            }));
          } else {
            agendarSync(done => carregarProducao(true, done));
          }
          if (pendenciasSync === 0) {
            if (concluirSync) {
              concluirSync('Dados atualizados');
            } else {
              mostrarToast('Dados atualizados');
            }
          }
        })
        .atualizarPrecoVendaProdutoSaidaProducao(prodId, nome, preco);
    }

    function vincularItemEstoque(producaoId, vinculoId, estoqueId) {
      if (!podeAlterarDados('Vinculo bloqueado em modo somente leitura')) return;
      const prodId = String(producaoId || '').trim();
      const vinId = String(vinculoId || '').trim();
      const estId = String(estoqueId || '').trim();

      if (!prodId || !vinId) {
        mostrarToast('Vinculo invalido', 'erro');
        return;
      }
      if (!estId) {
        mostrarToast('Selecione um item do estoque', 'erro');
        return;
      }

      mostrarToast('Vinculando item...');
      google.script.run
        .withFailureHandler(err => {
          const msg = err?.message || 'Erro ao vincular item';
          mostrarToast(msg, 'erro');
        })
        .withSuccessHandler(resp => {
          if (resp?.vinculos) {
            ProducaoStore.update(prodId, { vinculosMateriais: resp.vinculos });
          }
          if (resp?.materiaisPrevistos) {
            ProducaoStore.update(prodId, {
              materiaisPrevistos: resp.materiaisPrevistos,
              custo_previsto: resp.custoPrevisto || 0
            });
          }
          renderListaAtual();
          mostrarToast('Vinculo atualizado');
        })
        .vincularItemProducaoAoEstoque(prodId, vinId, estId);
    }

    function adicionarItemManual(producaoId, payload) {
      if (!podeAlterarDados('Adicao bloqueada em modo somente leitura')) return;
      const prodId = String(producaoId || '').trim();
      if (!prodId) {
        mostrarToast('Producao invalida', 'erro');
        return;
      }

      mostrarToast('Adicionando item...');
      google.script.run
        .withFailureHandler(err => {
          const msg = err?.message || 'Erro ao adicionar item';
          mostrarToast(msg, 'erro');
        })
        .withSuccessHandler(resp => {
          if (resp?.vinculos) {
            ProducaoStore.update(prodId, { vinculosMateriais: resp.vinculos });
          }
          if (resp?.materiaisPrevistos) {
            ProducaoStore.update(prodId, {
              materiaisPrevistos: resp.materiaisPrevistos,
              custo_previsto: resp.custoPrevisto || 0
            });
          }
          renderListaAtual();
          mostrarToast('Item adicionado');
        })
        .adicionarItemManualProducao(prodId, payload || {});
    }

    function abrirAtualizarEstoque(id) {
      if (!podeAlterarDados('Atualizacao bloqueada em modo somente leitura')) return;
      const item = ProducaoStore.getById(id);
      if (!item) return;

      const status = String(item.status || '');
      const concluido = status === 'Concluido' || status === 'Concluida';
      if (!concluido) {
        mostrarToast('Atualizacao de estoque liberada apenas quando status for Concluido', 'erro');
        return;
      }

      if (item.estoque_atualizado) {
        mostrarToast('Estoque ja atualizado para esta producao', 'erro');
        return;
      }
      if (!item.receita_id) {
        mostrarToast('Receita nao informada', 'erro');
        return;
      }

      if (!item.materiaisPrevistos) {
        mostrarToast('Carregando materiais...');
        google.script.run
          .withSuccessHandler(resp => {
            ProducaoStore.update(id, {
              materiaisPrevistos: resp.itens || [],
              custo_previsto: resp.custoPrevisto || 0
            });
            renderListaAtual();
            ProducaoUI.abrirModalConsumo(id, item.nome_ordem || item.nome_produto || id, resp.itens || []);
          })
          .withFailureHandler(err => {
            const msg = err?.message || 'Erro ao carregar materiais';
            mostrarToast(msg, 'erro');
          })
          .obterMateriaisPrevistosProducao(id);
        return;
      }

      ProducaoUI.abrirModalConsumo(id, item.nome_ordem || item.nome_produto || id, item.materiaisPrevistos || []);
    }

    function confirmarAtualizacaoEstoque() {
      if (!podeAlterarDados('Atualizacao bloqueada em modo somente leitura')) return;
      const payload = ProducaoUI.obterConsumoPayload();
      if (!payload.producaoId) {
        mostrarToast('Producao invalida', 'erro');
        return;
      }

      mostrarToast('Atualizando estoque...');

      google.script.run
        .withFailureHandler(err => {
          const msg = err?.message || 'Erro ao atualizar estoque';
          mostrarToast(msg, 'erro');
        })
        .withSuccessHandler(resp => {
          if (resp?.requer_vinculos) {
            if (resp?.vinculos) {
              ProducaoStore.update(payload.producaoId, { vinculosMateriais: resp.vinculos });
            }
            if (resp?.materiaisPrevistos) {
              ProducaoStore.update(payload.producaoId, {
                materiaisPrevistos: resp.materiaisPrevistos,
                custo_previsto: resp.custoPrevisto || 0
              });
            }
            renderListaAtual();
            ProducaoUI.fecharModalConsumo();
            ProducaoUI.abrirModalPendenciasVinculo?.(
              payload.producaoId,
              resp.pendencias_vinculo || [],
              estoqueOpcoes
            );
            mostrarToast('Vincule os itens de entrada pendentes para concluir');
            return;
          }

          if (resp?.estoqueAtualizados && window.EstoqueStore) {
            resp.estoqueAtualizados.forEach(i => {
              EstoqueStore.update(i.ID, { quantidade: i.quantidade });
            });
          }
          const concluirSync = window.AppSyncFeedback?.iniciar
            ? window.AppSyncFeedback.iniciar('Estoque atualizado. Atualizando dados...')
            : null;
          let pendenciasSync = 0;
          const concluirUmaSync = () => {
            pendenciasSync -= 1;
            if (pendenciasSync > 0) return;
            if (concluirSync) {
              concluirSync('Dados atualizados');
            } else {
              mostrarToast('Dados atualizados');
            }
          };
          const agendarSync = fn => {
            if (typeof fn !== 'function') return;
            pendenciasSync += 1;
            fn(() => concluirUmaSync());
          };

          if (window.EstoqueController?.syncFromBackend) {
            if (window.AppTabRefresh?.requestSync) {
              agendarSync(done => window.AppTabRefresh.requestSync('estoque', {
                delayMs: 220,
                prefetch: true,
                onDone: done
              }));
            } else {
              agendarSync(done => EstoqueController.syncFromBackend(done));
            }
          }
          if (resp?.producaoAtualizada) {
            ProducaoStore.update(payload.producaoId, resp.producaoAtualizada);
          }
          if (resp?.saidasLotes) {
            ProducaoStore.update(payload.producaoId, { saidasLotes: resp.saidasLotes });
          }
          agendarSync(done => carregarMateriaisPrevistos(payload.producaoId, true, done));
          agendarSync(done => carregarVinculosMateriais(payload.producaoId, true, done));
          agendarSync(done => carregarSaidasLotes(payload.producaoId, true, done));
          ProducaoUI.fecharModalConsumo();
          marcarDashboardComoSujo();
          if (pendenciasSync === 0) {
            if (concluirSync) {
              concluirSync('Dados atualizados');
            } else {
              mostrarToast('Dados atualizados');
            }
          }
        })
        .consumirEstoque(payload.producaoId, payload.itens);
    }

    function confirmarPendenciasVinculo() {
      if (!podeAlterarDados('Vinculo bloqueado em modo somente leitura')) return;
      const payload = ProducaoUI.obterPendenciasVinculoPayload?.();
      if (!payload?.producaoId) {
        mostrarToast('Producao invalida', 'erro');
        return;
      }
      if (payload.faltantes > 0) {
        mostrarToast('Selecione o item de estoque para todos os pendentes', 'erro');
        return;
      }
      if (!Array.isArray(payload.vinculacoes) || payload.vinculacoes.length === 0) {
        mostrarToast('Nenhum vinculo informado', 'erro');
        return;
      }

      mostrarToast('Salvando vinculos...');
      google.script.run
        .withFailureHandler(err => {
          const msg = err?.message || 'Erro ao salvar vinculos';
          mostrarToast(msg, 'erro');
        })
        .withSuccessHandler(resp => {
          if (resp?.vinculos) {
            ProducaoStore.update(payload.producaoId, { vinculosMateriais: resp.vinculos });
          }
          if (resp?.materiaisPrevistos) {
            ProducaoStore.update(payload.producaoId, {
              materiaisPrevistos: resp.materiaisPrevistos,
              custo_previsto: resp.custoPrevisto || 0
            });
          }
          renderListaAtual();
          ProducaoUI.fecharModalPendenciasVinculo?.();

          const item = ProducaoStore.getById(payload.producaoId) || {};
          ProducaoUI.abrirModalConsumo(
            payload.producaoId,
            item.nome_ordem || item.nome_produto || payload.producaoId,
            item.materiaisPrevistos || []
          );
          mostrarToast('Vinculos atualizados. Confirme a baixa do estoque.');
        })
        .vincularPendenciasEntradaProducao(payload.producaoId, payload.vinculacoes);
    }

    function adicionarEtapa(producaoId, nome) {
      if (!podeAlterarDados('Adicao bloqueada em modo somente leitura')) return;
      const item = ProducaoStore.getById(producaoId);
      if (!item) return;

      const snapshot = { ...item };
      const etapas = Array.isArray(item.etapas) ? [...item.etapas] : [];
      const ordem = etapas.length + 1;

      etapas.push({
        id: `tmp_${Date.now()}`,
        nome_etapa: nome,
        feito: false,
        ordem
      });

      ProducaoStore.update(producaoId, { etapas });

      google.script.run
        .withFailureHandler(() => {
          ProducaoStore.update(producaoId, snapshot);
          renderListaAtual();
          mostrarToast('Erro ao adicionar etapa', 'erro');
        })
        .withSuccessHandler(() => {
          refreshEtapas(producaoId);
        })
        .atualizarEtapasProducao(producaoId, [
          sanitizeEtapa({
            nome_etapa: nome,
            feito: false,
            ordem,
            data_feito: ''
          }, false)
        ]);
    }

    function marcarEtapa(producaoId, etapaId, feito) {
      if (!podeAlterarDados('Edicao bloqueada em modo somente leitura')) return;
      const item = ProducaoStore.getById(producaoId);
      if (!item) return;

      const etapas = Array.isArray(item.etapas) ? [...item.etapas] : [];
      const idx = etapas.findIndex(e => e.id === etapaId);
      if (idx === -1) return;

      const snapshot = { ...item };
      const dataFeito = feito ? toDateString(new Date()) : '';
      etapas[idx] = {
        ...etapas[idx],
        feito: feito,
        data_feito: dataFeito
      };

      ProducaoStore.update(producaoId, { etapas });

      // payload esperado para atualizarEtapasProducao:
      // { producaoId, etapas: [{ id, nome_etapa, feito, ordem, data_feito }] }
      const payloadEtapa = sanitizeEtapa({
        id: etapaId,
        nome_etapa: etapas[idx].nome_etapa,
        feito: feito,
        ordem: etapas[idx].ordem,
        data_feito: etapas[idx].data_feito
      }, true);

      console.log('payload etapas:', JSON.stringify({ producaoId, etapas: [payloadEtapa] }));
      console.log('data_feito type:', typeof payloadEtapa.data_feito, payloadEtapa.data_feito);

      google.script.run
        .withFailureHandler(() => {
          ProducaoStore.update(producaoId, snapshot);
          renderListaAtual();
          mostrarToast('Erro ao atualizar etapa', 'erro');
        })
        .withSuccessHandler(() => {
          mostrarToast('Etapa atualizada');
        })
        .atualizarEtapasProducao(producaoId, [payloadEtapa]);
    }

    function iniciarEdicaoEtapa(producaoId, etapaId) {
      if (!podeAlterarDados('Edicao bloqueada em modo somente leitura')) return;
      const item = ProducaoStore.getById(producaoId);
      if (!item) return;

      const etapas = Array.isArray(item.etapas) ? [...item.etapas] : [];
      const idx = etapas.findIndex(e => e.id === etapaId);
      if (idx === -1) return;

      etapas[idx] = { ...etapas[idx], _editing: true };
      ProducaoStore.update(producaoId, { etapas });
      renderListaAtual();
    }

    function cancelarEdicaoEtapa(producaoId, etapaId) {
      const item = ProducaoStore.getById(producaoId);
      if (!item) return;

      const etapas = Array.isArray(item.etapas) ? [...item.etapas] : [];
      const idx = etapas.findIndex(e => e.id === etapaId);
      if (idx === -1) return;

      etapas[idx] = { ...etapas[idx], _editing: false };
      ProducaoStore.update(producaoId, { etapas });
      renderListaAtual();
    }

    function salvarEdicaoEtapa(producaoId, etapaId, novoNome) {
      if (!podeAlterarDados('Edicao bloqueada em modo somente leitura')) return;
      const item = ProducaoStore.getById(producaoId);
      if (!item) return;

      const nome = String(novoNome || '').trim();
      if (!nome) {
        mostrarToast('Nome da etapa vazio', 'erro');
        return;
      }

      const snapshot = { ...item };
      const etapas = Array.isArray(item.etapas) ? [...item.etapas] : [];
      const idx = etapas.findIndex(e => e.id === etapaId);
      if (idx === -1) return;

      etapas[idx] = {
        ...etapas[idx],
        nome_etapa: nome,
        _editing: false
      };

      ProducaoStore.update(producaoId, { etapas });
      renderListaAtual();

      google.script.run
        .withFailureHandler(() => {
          ProducaoStore.update(producaoId, snapshot);
          renderListaAtual();
          mostrarToast('Erro ao salvar etapa', 'erro');
        })
        .withSuccessHandler(() => {
          mostrarToast('Etapa atualizada');
        })
        .atualizarEtapasProducao(producaoId, [
          sanitizeEtapa({
            id: etapaId,
            nome_etapa: nome,
            feito: etapas[idx].feito,
            ordem: etapas[idx].ordem,
            data_feito: etapas[idx].data_feito
          }, true)
        ]);
    }

    function moverEtapaParaCima(producaoId, etapaId) {
      if (!podeAlterarDados('Edicao bloqueada em modo somente leitura')) return;
      const item = ProducaoStore.getById(producaoId);
      if (!item) return;

      const etapasOriginais = Array.isArray(item.etapas)
        ? item.etapas.map(et => ({ ...et }))
        : [];
      if (etapasOriginais.length <= 1) return;

      const etapasOrdenadas = normalizarOrdemEtapas(etapasOriginais);
      const idx = etapasOrdenadas.findIndex(et => String(et?.id || '') === String(etapaId || ''));
      if (idx <= 0) return;

      const snapshot = {
        ...item,
        etapas: etapasOriginais
      };

      const anterior = etapasOrdenadas[idx - 1];
      etapasOrdenadas[idx - 1] = etapasOrdenadas[idx];
      etapasOrdenadas[idx] = anterior;

      const etapasAtualizadas = etapasOrdenadas.map((et, pos) => ({
        ...et,
        ordem: pos + 1
      }));

      ProducaoStore.update(producaoId, { etapas: etapasAtualizadas });
      renderListaAtual();

      google.script.run
        .withFailureHandler(() => {
          ProducaoStore.update(producaoId, { etapas: snapshot.etapas || [] });
          renderListaAtual();
          mostrarToast('Erro ao reordenar etapa', 'erro');
        })
        .withSuccessHandler(() => {
          mostrarToast('Etapa reordenada');
          refreshEtapas(producaoId);
        })
        .atualizarEtapasProducao(
          producaoId,
          etapasAtualizadas.map(et => sanitizeEtapa(et, true))
        );
    }

    function deletarEtapa(producaoId, etapaId) {
      if (!podeAlterarDados('Exclusao bloqueada em modo somente leitura')) return;
      if (!confirm('Deseja remover esta etapa?')) return;

      const item = ProducaoStore.getById(producaoId);
      if (!item) return;

      const snapshot = { ...item };
      const etapas = Array.isArray(item.etapas) ? [...item.etapas] : [];
      const novasEtapas = etapas.filter(e => e.id !== etapaId);

      ProducaoStore.update(producaoId, { etapas: novasEtapas });
      renderListaAtual();

      google.script.run
        .withFailureHandler(() => {
          ProducaoStore.update(producaoId, snapshot);
          renderListaAtual();
          mostrarToast('Erro ao remover etapa', 'erro');
        })
        .withSuccessHandler(() => {
          mostrarToast('Etapa removida');
        })
        .deletarEtapaProducao(etapaId);
    }

    function refreshEtapas(producaoId) {
      google.script.run
        .withSuccessHandler(etapas => {
          ProducaoStore.update(producaoId, { etapas: etapas || [] });
          renderListaAtual();
        })
        .listarEtapasProducao(producaoId);
    }

    function limparEdicao() {
      editandoId = null;
    }

    return {
      init,
      syncFromBackend,
      salvar,
      editar,
      abrirFormularioComModelo,
      excluir,
      abrirAtualizarEstoque,
      adicionarEtapa,
      adicionarItemManual,
      vincularItemEstoque,
      marcarEtapa,
      carregarMateriaisPrevistos,
      carregarVinculosMateriais,
      carregarSaidasLotes,
      atualizarCustoLoteSaida,
      atualizarPrecoVendaProdutoSaida,
      confirmarPendenciasVinculo,
      limparEdicao,
      iniciarEdicaoEtapa,
      cancelarEdicaoEtapa,
      salvarEdicaoEtapa,
      moverEtapaParaCima,
      deletarEtapa
    };

  })();
</script>
