  function createBootGateHelper() {
    const DEFAULT_TIMEOUT_MS = 2400;
    const DEFAULT_POLL_MS = 60;

    function dashboardPronto() {
      const cards = document.querySelectorAll('#dashboardCards .dash-card');
      if (cards.length > 0) return true;
      const refs = [
        document.getElementById('dashGastoPorTipo'),
        document.getElementById('dashGastoPorCategoria'),
        document.getElementById('dashGastoPorFornecedor'),
        document.getElementById('dashEstoquePorTipo'),
        document.getElementById('dashEvolucaoMensal')
      ];
      return refs.some(el => String(el?.textContent || '').trim() !== '');
    }

    function abaPronta(tab) {
      const aba = normalizarNomeAba(tab);
      if (!aba) return true;

      if (aba === 'dashboard') return dashboardPronto();
      if (aba === 'despesas') return !!window.DespesasController?.isLoaded?.();
      if (aba === 'estoque') return !!window.EstoqueStore?.isLoaded?.();
      if (aba === 'compras') return !!window.ComprasStore?.isLoaded?.();
      if (aba === 'vendas') return !!window.VendasStore?.isLoaded?.();
      if (aba === 'produtos') return !!window.ProdutosStore?.isLoaded?.();
      if (aba === 'producao') return !!window.ProducaoStore?.isLoaded?.();

      return true;
    }

    function waitForTabReady(tab, options = {}) {
      const aba = normalizarNomeAba(tab);
      if (!aba) return Promise.resolve(true);
      if (abaPronta(aba)) return Promise.resolve(true);

      const timeoutMs = Number(options.timeoutMs) > 0
        ? Number(options.timeoutMs)
        : DEFAULT_TIMEOUT_MS;
      const pollMs = Number(options.pollMs) > 0
        ? Number(options.pollMs)
        : DEFAULT_POLL_MS;
      const startedAt = Date.now();

      return new Promise(resolve => {
        let resolved = false;
        let timer = null;

        const finalizar = ok => {
          if (resolved) return;
          resolved = true;
          if (timer) {
            clearTimeout(timer);
            timer = null;
          }
          window.removeEventListener('app:store:loaded', onStoreLoaded);
          resolve(!!ok);
        };

        const onStoreLoaded = evento => {
          const tabEvento = String(evento?.detail?.tab || '').trim().toLowerCase();
          if (tabEvento !== aba) return;
          if (abaPronta(aba)) {
            finalizar(true);
          }
        };

        const tick = () => {
          if (abaPronta(aba)) {
            finalizar(true);
            return;
          }
          if ((Date.now() - startedAt) >= timeoutMs) {
            finalizar(false);
            return;
          }
          timer = setTimeout(tick, pollMs);
        };

        window.addEventListener('app:store:loaded', onStoreLoaded);
        tick();
      });
    }

    return {
      waitForTabReady
    };
  }

  window.AppBootGate = window.AppBootGate || createBootGateHelper();

  let longTaskObserver = null;

  function deveMonitorarLongTask() {
    return !!window.AppPerf?.isEnabled?.() || !!window.AppDiag?.isEnabled?.();
  }

  function initLongTaskMonitor() {
    if (typeof window === 'undefined' || typeof window.PerformanceObserver === 'undefined') return;
    if (longTaskObserver || !deveMonitorarLongTask()) return;
    try {
      longTaskObserver = new PerformanceObserver(list => {
        const entries = list.getEntries();
        entries.forEach(entry => {
          const durMs = Number(entry.duration || 0);
          const dur = Number(durMs || 0).toFixed(1);
          if (window.AppPerf?.isEnabled?.()) {
            console.warn(`[longtask] ${dur}ms`);
          }
          window.AppDiag?.mark?.('perf.longtask', {
            duration_ms: Number(dur),
            start_ms: Number(Number(entry.startTime || 0).toFixed(1)),
            name: String(entry.name || '')
          });
        });
      });
      longTaskObserver.observe({ entryTypes: ['longtask'] });
    } catch (error) {
      longTaskObserver = null;
    }
  }

  function syncLongTaskMonitor() {
    if (typeof window === 'undefined' || typeof window.PerformanceObserver === 'undefined') return;
    if (deveMonitorarLongTask()) {
      initLongTaskMonitor();
      return;
    }
    if (!longTaskObserver) return;
    try {
      longTaskObserver.disconnect();
    } catch (error) {
      // sem acao
    }
    longTaskObserver = null;
  }

  const modalFocusState = new WeakMap();
  let estadoModalGlobal = {
    aberto: false,
    total: 0
  };

  function listarModaisAbertos() {
    return [...document.querySelectorAll('.modal')].filter(m => !m.classList.contains('hidden'));
  }

  function listarFocaveis(container) {
    if (!container) return [];
    const seletor = [
      'button:not([disabled]):not([tabindex="-1"])',
      'a[href]:not([tabindex="-1"])',
      'input:not([disabled]):not([type="hidden"]):not([tabindex="-1"])',
      'select:not([disabled]):not([tabindex="-1"])',
      'textarea:not([disabled]):not([tabindex="-1"])',
      '[tabindex]:not([tabindex="-1"])'
    ].join(',');
    return [...container.querySelectorAll(seletor)].filter(el => {
      const style = window.getComputedStyle(el);
      return style.display !== 'none' && style.visibility !== 'hidden';
    });
  }

  function atualizarEstadoBodyModal() {
    if (typeof document === 'undefined' || !document.body) return;
    const total = listarModaisAbertos().length;
    const aberto = total > 0;
    document.body.classList.toggle('modal-open', aberto);
    if (estadoModalGlobal.aberto === aberto && estadoModalGlobal.total === total) return;
    estadoModalGlobal = {
      aberto,
      total
    };
    if (typeof window === 'undefined') return;
    try {
      window.dispatchEvent(new CustomEvent('app:modal-open-changed', {
        detail: {
          modal_open: aberto,
          open_modals: total
        }
      }));
    } catch (error) {
      // sem acao
    }
  }

  function focarAoAbrirModal(modal) {
    if (!modal) return;
    const conteudo = modal.querySelector('.modal-content');
    if (!conteudo) return;

    const state = modalFocusState.get(modal) || {};
    if (!state.opener || !document.contains(state.opener)) {
      state.opener = document.activeElement instanceof HTMLElement ? document.activeElement : null;
    }
    modalFocusState.set(modal, state);

    const focoAlvo = modal.querySelector('.modal-close-square:not([disabled])') || listarFocaveis(conteudo)[0] || conteudo;
    if (!focoAlvo.getAttribute('tabindex') && focoAlvo === conteudo) {
      focoAlvo.setAttribute('tabindex', '-1');
    }
    setTimeout(() => {
      try {
        focoAlvo.focus({ preventScroll: true });
      } catch (error) {
        // sem acao
      }
    }, 0);
  }

  function restaurarFocoAoFechar(modal) {
    const state = modalFocusState.get(modal);
    if (!state?.opener || !document.contains(state.opener)) return;
    setTimeout(() => {
      try {
        state.opener.focus({ preventScroll: true });
      } catch (error) {
        // sem acao
      }
    }, 0);
  }

  function atualizarAriaModal(modal) {
    if (!modal) return;
    const aberto = !modal.classList.contains('hidden');
    modal.setAttribute('aria-hidden', aberto ? 'false' : 'true');
    const abertoAntes = modal.dataset.a11yOpen === '1';
    if (aberto && !abertoAntes) {
      modal.dataset.a11yOpen = '1';
      focarAoAbrirModal(modal);
    } else if (!aberto && abertoAntes) {
      modal.dataset.a11yOpen = '0';
      restaurarFocoAoFechar(modal);
    }
    atualizarEstadoBodyModal();
  }

  function fecharModalPorInteracao(modal) {
    if (!modal) return false;
    const btnFechar = modal.querySelector('.modal-close-square');
    if (btnFechar && !btnFechar.disabled) {
      btnFechar.click();
      return true;
    }
    modal.classList.add('hidden');
    atualizarAriaModal(modal);
    return true;
  }

  function initModalA11y() {
    const modais = [...document.querySelectorAll('.modal')];
    if (modais.length === 0) return;

    modais.forEach((modal, idx) => {
      if (!modal.id) {
        modal.id = `modal_auto_${idx + 1}`;
      }
      modal.setAttribute('role', 'dialog');
      modal.setAttribute('aria-modal', 'true');

      const titulo = modal.querySelector('.modal-content h1, .modal-content h2, .modal-content h3');
      if (titulo) {
        if (!titulo.id) {
          titulo.id = `${modal.id}_title`;
        }
        modal.setAttribute('aria-labelledby', titulo.id);
      }

      atualizarAriaModal(modal);

      modal.addEventListener('click', evento => {
        if (evento.target !== modal) return;
        if (window.AppMutationUI?.isLocked?.()) return;
        fecharModalPorInteracao(modal);
      });

      if (typeof MutationObserver !== 'undefined') {
        const observer = new MutationObserver(() => {
          atualizarAriaModal(modal);
        });
        observer.observe(modal, { attributes: true, attributeFilter: ['class'] });
      }
    });

    document.addEventListener('keydown', evento => {
      const abertos = listarModaisAbertos();
      if (abertos.length === 0) return;
      const topo = abertos[abertos.length - 1];

      if (evento.key === 'Escape') {
        if (window.AppMutationUI?.isLocked?.()) return;
        evento.preventDefault();
        fecharModalPorInteracao(topo);
        return;
      }

      if (evento.key !== 'Tab') return;
      const conteudo = topo.querySelector('.modal-content');
      if (!conteudo) return;
      const focaveis = listarFocaveis(conteudo);
      if (focaveis.length === 0) {
        evento.preventDefault();
        conteudo.setAttribute('tabindex', '-1');
        conteudo.focus({ preventScroll: true });
        return;
      }
      const primeiro = focaveis[0];
      const ultimo = focaveis[focaveis.length - 1];
      if (evento.shiftKey && document.activeElement === primeiro) {
        evento.preventDefault();
        ultimo.focus({ preventScroll: true });
      } else if (!evento.shiftKey && document.activeElement === ultimo) {
        evento.preventDefault();
        primeiro.focus({ preventScroll: true });
      }
    });
  }

  window.AppModalUI = window.AppModalUI || {
    listOpen: listarModaisAbertos,
    close(modal) {
      return fecharModalPorInteracao(modal);
    },
    closeClosest(elemento) {
      const modal = elemento?.closest?.('.modal') || null;
      if (!modal || modal.classList.contains('hidden')) return false;
      return fecharModalPorInteracao(modal);
    },
    closeAll() {
      const abertos = listarModaisAbertos().reverse();
      abertos.forEach(modal => fecharModalPorInteracao(modal));
      return abertos.length;
    }
  };

  function initCampoAjudaA11y() {
    let seq = 0;
    const wrappers = document.querySelectorAll('.campo-ajuda-wrap');
    wrappers.forEach(wrap => {
      const tag = wrap.querySelector('.campo-ajuda-tag');
      const label = String(tag?.textContent || '').trim();
      if (!label) return;

      const campos = [...wrap.querySelectorAll('input, select, textarea')];
      campos.forEach(campo => {
        if (!campo.getAttribute('aria-label')) {
          campo.setAttribute('aria-label', label);
        }
        if (!campo.id) {
          seq += 1;
          campo.id = `campo_auto_${seq}`;
        }
        const existente = wrap.querySelector(`label.sr-only[for="${campo.id}"]`);
        if (existente) return;
        const labelEl = document.createElement('label');
        labelEl.className = 'sr-only';
        labelEl.setAttribute('for', campo.id);
        labelEl.textContent = label;
        const campoDentroLabel = campo.closest('label');
        if (campoDentroLabel && wrap.contains(campoDentroLabel) && campoDentroLabel !== wrap) {
          wrap.insertBefore(labelEl, campoDentroLabel);
          return;
        }
        const parent = campo.parentElement;
        if (parent && wrap.contains(parent)) {
          parent.insertBefore(labelEl, campo);
          return;
        }
        wrap.insertBefore(labelEl, wrap.firstChild);
      });
    });
  }

  document.addEventListener('DOMContentLoaded', async () => {
    const bootWatchdog = setTimeout(() => {
      if (document?.body?.classList?.contains('app-booting')) {
        document.body.classList.remove('app-booting');
        if (typeof mostrarToast === 'function') {
          mostrarToast('A inicializacao demorou demais. Interface liberada em modo de recuperacao.', 'erro');
        }
      }
    }, 9000);

    try {
      syncLongTaskMonitor();
      resetarEstadoInicialFiltros();

      let contextoAcesso = null;
      if (window.AppUserAccess?.load) {
        try {
          contextoAcesso = await window.AppUserAccess.load();
        } catch (error) {
          contextoAcesso = null;
        }
      }

      if (contextoAcesso && contextoAcesso.can_read === false) return;

      if (window.AppDbEnv?.initMenu) {
        window.AppDbEnv.initMenu();
      }
      if (window.AppDbEnv?.bootstrap) {
        try {
          await window.AppDbEnv.bootstrap(contextoAcesso || {});
        } catch (error) {
          if (typeof mostrarToast === 'function') {
            mostrarToast(error?.message || 'Falha ao configurar ambiente de banco de dados.', 'erro');
          }
        }
      }

      initNavbarHamburger();
      registrarListenersFiltrosStore();
      initModalA11y();
      initCampoAjudaA11y();
      const abaInicial = lerUltimaAba() || ABA_INICIAL_PADRAO;
      trocarAba(abaInicial);

      if (window.AppBootGate?.waitForTabReady) {
        await window.AppBootGate.waitForTabReady(abaInicial, { timeoutMs: 2600 });
      }
      preaquecerInfraTabsSecundarias(abaInicial);
    } finally {
      clearTimeout(bootWatchdog);
      finalizarBootVisual();
    }
  });
</script>
