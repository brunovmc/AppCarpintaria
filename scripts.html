<script>
  /* =========================
     NAV / ABAS
  ========================== */
  const ABAS_MENU_HAMBURGER = ['estoque', 'compras', 'vendas', 'produtos', 'producao'];
  let listenerFecharMenuNavbarAtivo = false;

  function getNavbarHamburgerEls() {
    return {
      wrap: document.getElementById('navbarMenuWrap'),
      btn: document.getElementById('btnNavHamburger'),
      menu: document.getElementById('navbarMenu')
    };
  }

  function menuNavbarAberto() {
    const { menu } = getNavbarHamburgerEls();
    return !!menu && !menu.classList.contains('hidden');
  }

  function atualizarEstadoNavbar(abaAtiva) {
    const botoes = document.querySelectorAll('.navbar button[data-aba]');
    const alvo = String(abaAtiva || '').trim();
    botoes.forEach(btn => {
      const ehAtivo = String(btn.dataset.aba || '').trim() === alvo;
      btn.classList.toggle('active', ehAtivo);
      if (ehAtivo) {
        btn.setAttribute('aria-current', 'page');
      } else {
        btn.removeAttribute('aria-current');
      }
    });

    const { btn } = getNavbarHamburgerEls();
    if (btn) {
      const ativoNoMenu = ABAS_MENU_HAMBURGER.includes(alvo);
      btn.classList.toggle('active', ativoNoMenu);
      btn.setAttribute('aria-expanded', menuNavbarAberto() ? 'true' : 'false');
    }
  }

  function fecharMenuNavbar() {
    const { menu, btn } = getNavbarHamburgerEls();
    if (menu) menu.classList.add('hidden');
    if (btn) btn.setAttribute('aria-expanded', 'false');

    if (listenerFecharMenuNavbarAtivo) {
      listenerFecharMenuNavbarAtivo = false;
      document.removeEventListener('pointerdown', fecharMenuNavbarAoClicarFora, { capture: true });
      document.removeEventListener('keydown', fecharMenuNavbarPorTeclado);
    }
  }

  function abrirMenuNavbar() {
    const { menu, btn } = getNavbarHamburgerEls();
    if (!menu || !btn) return;
    menu.classList.remove('hidden');
    btn.setAttribute('aria-expanded', 'true');

    if (!listenerFecharMenuNavbarAtivo) {
      listenerFecharMenuNavbarAtivo = true;
      document.addEventListener('pointerdown', fecharMenuNavbarAoClicarFora, { capture: true });
      document.addEventListener('keydown', fecharMenuNavbarPorTeclado);
    }
  }

  function toggleMenuNavbar() {
    if (menuNavbarAberto()) {
      fecharMenuNavbar();
    } else {
      abrirMenuNavbar();
    }
  }

  function fecharMenuNavbarAoClicarFora(evento) {
    const { wrap } = getNavbarHamburgerEls();
    if (!wrap) return;
    if (wrap.contains(evento.target)) return;
    fecharMenuNavbar();
  }

  function fecharMenuNavbarPorTeclado(evento) {
    const tecla = String(evento?.key || '').toLowerCase();
    if (tecla === 'escape') {
      fecharMenuNavbar();
    }
  }

  function initNavbarHamburger() {
    const { btn } = getNavbarHamburgerEls();
    if (!btn) return;
    btn.addEventListener('click', () => {
      toggleMenuNavbar();
    });
  }

  /* =========================
     LOADING UI
  ========================== */
  function createLoadingHelper() {
    function escapeHtml(valor) {
      return String(valor ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function criarInlineNode(label) {
      const wrap = document.createElement('span');
      wrap.className = 'loading-inline';

      const text = document.createElement('span');
      text.className = 'loading-label';
      text.textContent = String(label || 'Carregando');
      wrap.appendChild(text);

      const dots = document.createElement('span');
      dots.className = 'loading-dots';
      dots.setAttribute('aria-hidden', 'true');
      for (let i = 0; i < 3; i++) {
        const dot = document.createElement('span');
        dot.textContent = '.';
        dots.appendChild(dot);
      }
      wrap.appendChild(dots);
      return wrap;
    }

    function inlineHtml(label) {
      const texto = escapeHtml(String(label || 'Carregando'));
      return `<span class="loading-inline"><span class="loading-label">${texto}</span><span class="loading-dots" aria-hidden="true"><span>.</span><span>.</span><span>.</span></span></span>`;
    }

    function setButtonLoading(button, ativo, labelIdle, labelLoading = 'Carregando') {
      const btn = button || null;
      if (!btn) return;
      if (ativo) {
        btn.innerHTML = '';
        btn.appendChild(criarInlineNode(labelLoading));
      } else {
        btn.textContent = String(labelIdle || '');
      }
    }

    function setContainerLoading(el, label = 'Carregando') {
      if (!el) return;
      el.innerHTML = inlineHtml(label);
    }

    return {
      criarInlineNode,
      inlineHtml,
      setButtonLoading,
      setContainerLoading
    };
  }

  window.AppLoading = window.AppLoading || createLoadingHelper();

  /* =========================
     PERF + CICLO DE ABAS
  ========================== */
  function createPerfHelper() {
    const historico = [];
    let ativo = true;
    const LIMITE_HIST = 300;
    const MIN_LOG_MS = 16;

    function agora() {
      if (typeof performance !== 'undefined' && performance.now) {
        return performance.now();
      }
      return Date.now();
    }

    function start(label, meta) {
      return {
        label: String(label || '').trim() || 'sem-label',
        t0: agora(),
        meta: meta || {}
      };
    }

    function end(token, extra) {
      if (!token || !token.label) return 0;
      const ms = agora() - Number(token.t0 || 0);
      const entrada = {
        ts: new Date().toISOString(),
        label: token.label,
        ms: Number(ms.toFixed(2)),
        meta: { ...(token.meta || {}), ...(extra || {}) }
      };
      historico.push(entrada);
      if (historico.length > LIMITE_HIST) historico.shift();

      if (ativo && ms >= MIN_LOG_MS && typeof console !== 'undefined' && console.log) {
        console.log(`[perf] ${entrada.label}: ${entrada.ms}ms`, entrada.meta);
      }
      return ms;
    }

    function measure(label, fn, meta) {
      const token = start(label, meta);
      try {
        const out = fn();
        end(token);
        return out;
      } catch (error) {
        end(token, { erro: true, mensagem: error?.message || '' });
        throw error;
      }
    }

    function setEnabled(v) {
      ativo = !!v;
    }

    function getHistory() {
      return historico.slice();
    }

    function clear() {
      historico.length = 0;
    }

    return {
      start,
      end,
      measure,
      setEnabled,
      getHistory,
      clear
    };
  }

  window.AppPerf = window.AppPerf || createPerfHelper();

  const ABA_REFRESH_INTERVAL_MS = {
    dashboard: 15000,
    estoque: 30000,
    compras: 30000,
    vendas: 30000,
    produtos: 30000,
    producao: 20000
  };
  const abaRefreshState = {};

  function obterNomeAbaAtiva() {
    const ativa = document.querySelector('.aba:not(.hidden)');
    const id = String(ativa?.id || '').trim();
    return id.startsWith('aba-') ? id.slice(4) : '';
  }

  function getMesAtualReferencia() {
    const d = new Date();
    const yyyy = d.getFullYear();
    const mm = String(d.getMonth() + 1).padStart(2, '0');
    return `${yyyy}-${mm}`;
  }

  function deveRecarregarAba(nome, force = false) {
    const aba = String(nome || '').trim();
    if (!aba) return false;
    const agoraMs = Date.now();
    const state = abaRefreshState[aba] || { last: 0, initialized: false };
    const ttl = Number(ABA_REFRESH_INTERVAL_MS[aba] || 30000);

    if (force || !state.initialized) {
      abaRefreshState[aba] = { initialized: true, last: agoraMs };
      return true;
    }

    if (agoraMs - Number(state.last || 0) >= ttl) {
      abaRefreshState[aba] = { initialized: true, last: agoraMs };
      return true;
    }

    return false;
  }

  function executarCicloAba(nome) {
    if (nome === 'estoque') {
      const loaded = !!window.EstoqueStore?.isLoaded?.();
      const recarregar = deveRecarregarAba(nome, !loaded);
      if (window.EstoqueController) {
        if (recarregar && loaded && typeof window.EstoqueController.syncFromBackend === 'function') {
          window.AppPerf?.measure('tab.estoque.sync', () => EstoqueController.syncFromBackend());
        } else if (!loaded || recarregar) {
          window.AppPerf?.measure('tab.estoque.init', () => EstoqueController.init());
        }
      }
      if (typeof aplicarBuscaEstoque === 'function') aplicarBuscaEstoque();
      return;
    }

    if (nome === 'dashboard') {
      const refMes = document.getElementById('dashMesReferencia');
      const mesAtual = getMesAtualReferencia();
      const referenciaVazia = !!refMes && !String(refMes.value || '').trim();
      if (refMes && referenciaVazia) refMes.value = mesAtual;
      const recarregar = deveRecarregarAba(nome, referenciaVazia);
      if (window.DashboardController) {
        if (recarregar || referenciaVazia) {
          window.AppPerf?.measure('tab.dashboard.refresh', () => DashboardController.init());
        }
      }
      return;
    }

    if (nome === 'compras') {
      const loaded = !!window.ComprasStore?.isLoaded?.();
      const recarregar = deveRecarregarAba(nome, !loaded);
      if (window.ComprasController) {
        if (recarregar && loaded && typeof window.ComprasController.syncFromBackend === 'function') {
          window.AppPerf?.measure('tab.compras.sync', () => ComprasController.syncFromBackend());
        } else if (!loaded || recarregar) {
          window.AppPerf?.measure('tab.compras.init', () => ComprasController.init());
        }
      }
      if (typeof aplicarBuscaCompras === 'function') aplicarBuscaCompras();
      return;
    }

    if (nome === 'vendas') {
      const loaded = !!window.VendasStore?.isLoaded?.();
      const recarregar = deveRecarregarAba(nome, !loaded);
      if (window.VendasController) {
        if (recarregar && loaded && typeof window.VendasController.syncFromBackend === 'function') {
          window.AppPerf?.measure('tab.vendas.sync', () => VendasController.syncFromBackend());
        } else if (!loaded || recarregar) {
          window.AppPerf?.measure('tab.vendas.init', () => VendasController.init());
        }
      }
      if (typeof aplicarBuscaVendas === 'function') aplicarBuscaVendas();
      return;
    }

    if (nome === 'produtos') {
      const loaded = !!window.ProdutosStore?.isLoaded?.();
      const recarregar = deveRecarregarAba(nome, !loaded);
      if (window.ProdutosController) {
        if (recarregar && loaded && typeof window.ProdutosController.syncFromBackend === 'function') {
          window.AppPerf?.measure('tab.produtos.sync', () => ProdutosController.syncFromBackend());
        } else if (!loaded || recarregar) {
          window.AppPerf?.measure('tab.produtos.init', () => ProdutosController.init());
        }
      }
      if (typeof aplicarBuscaProdutos === 'function') aplicarBuscaProdutos();
      return;
    }

    if (nome === 'producao') {
      const loaded = !!window.ProducaoStore?.isLoaded?.();
      const recarregar = deveRecarregarAba(nome, !loaded);
      if (window.ProducaoController) {
        if (recarregar && loaded && typeof window.ProducaoController.syncFromBackend === 'function') {
          window.AppPerf?.measure('tab.producao.sync', () => ProducaoController.syncFromBackend());
        } else if (!loaded || recarregar) {
          window.AppPerf?.measure('tab.producao.init', () => ProducaoController.init());
        }
      }
      if (typeof aplicarBuscaProducao === 'function') aplicarBuscaProducao();
    }
  }

  function trocarAba(nome) {
    window.AppPerf?.measure('nav.trocarAba', () => {
      const alvo = String(nome || '').trim();
      if (!alvo) return;
      const atual = obterNomeAbaAtiva();
      if (atual && atual === alvo) {
        fecharMenuNavbar();
        atualizarEstadoNavbar(alvo);
        setTopBars(alvo);
        executarCicloAba(alvo);
        return;
      }

      document.querySelectorAll('.aba')
        .forEach(a => a.classList.add('hidden'));

      const aba = document.getElementById('aba-' + alvo);
      if (aba) aba.classList.remove('hidden');
      fecharMenuNavbar();
      atualizarEstadoNavbar(alvo);
      setTopBars(alvo);
      executarCicloAba(alvo);
    }, { aba: String(nome || '') });
  }

  function setTopBars(nome) {
    const topEstoque = document.getElementById('topBarEstoque');
    const topCompras = document.getElementById('topBarCompras');
    const topVendas = document.getElementById('topBarVendas');
    const topProdutos = document.getElementById('topBarProdutos');
    const topProducao = document.getElementById('topBarProducao');
    const bottomBar = document.querySelector('.bottom-bar');

    if (topEstoque) topEstoque.classList.toggle('hidden', nome !== 'estoque');
    if (topCompras) topCompras.classList.toggle('hidden', nome !== 'compras');
    if (topVendas) topVendas.classList.toggle('hidden', nome !== 'vendas');
    if (topProdutos) topProdutos.classList.toggle('hidden', nome !== 'produtos');
    if (topProducao) topProducao.classList.toggle('hidden', nome !== 'producao');
    if (bottomBar) bottomBar.classList.toggle('hidden', nome === 'dashboard');

    if (nome !== 'estoque') fecharPainelFiltro();
    if (nome !== 'compras') fecharPainelFiltroCompras();
  }

  function acaoPrimaria() {
    const abaAtiva = document.querySelector('.aba:not(.hidden)');
    if (!abaAtiva) return;

    if (abaAtiva.id === 'aba-estoque') {
      if (window.EstoqueUI?.abrirFormularioNovo) {
        EstoqueUI.abrirFormularioNovo();
      } else if (window.EstoqueUI?.abrirFormulario) {
        EstoqueUI.abrirFormulario();
      }
    } else if (abaAtiva.id === 'aba-compras') {
      if (window.ComprasUI?.abrirFormularioNovo) {
        ComprasUI.abrirFormularioNovo();
      } else if (window.ComprasUI?.abrirFormulario) {
        ComprasUI.abrirFormulario();
      }
    } else if (abaAtiva.id === 'aba-vendas') {
      if (window.VendasUI?.abrirFormularioNovo) {
        VendasUI.abrirFormularioNovo();
      } else if (window.VendasUI?.abrirFormulario) {
        VendasUI.abrirFormulario();
      }
    } else if (abaAtiva.id === 'aba-produtos') {
      if (window.ProdutosUI?.abrirFormularioNovo) {
        ProdutosUI.abrirFormularioNovo();
      } else if (window.ProdutosUI?.abrirFormulario) {
        ProdutosUI.abrirFormulario();
      }
    } else if (abaAtiva.id === 'aba-producao') {
      if (window.ProducaoUI?.abrirFormularioNovo) {
        ProducaoUI.abrirFormularioNovo();
      } else if (window.ProducaoUI?.abrirFormulario) {
        ProducaoUI.abrirFormulario();
      }
    } else if (abaAtiva.id === 'aba-dashboard') {
      if (window.DashboardController?.abrirFormularioDespesa) {
        DashboardController.abrirFormularioDespesa();
      }
    }
  }

  /* =========================
     TOAST
  ========================== */
  function mostrarToast(msg, tipo = '') {
    const t = document.getElementById('toast');
    if (!t) return;

    t.textContent = msg;
    t.className = `toast show ${tipo}`;

    setTimeout(() => {
      t.classList.remove('show');
    }, 2500);
  }

  /* =========================
     BUSCA + FILTROS (STATE)
  ========================== */
  const buscaState = {
    texto: '',
    tipo: '',
    categoria: '',
    unidade: ''
  };

  const buscaStateCompras = {
    texto: '',
    tipo: '',
    categoria: '',
    unidade: ''
  };

  const buscaStateVendas = {
    texto: ''
  };

  const buscaStateProdutos = {
    texto: ''
  };

  const buscaStateProducao = {
    texto: ''
  };

  function setFiltroTipoRapidoEstoque(tipo) {
    buscaState.tipo = String(tipo || '').trim();

    const selTipo = document.getElementById('filtroTipo');
    if (selTipo) {
      const existe = [...selTipo.options].some(o => (o.value || '') === buscaState.tipo);
      selTipo.value = existe ? buscaState.tipo : '';
      if (!existe) buscaState.tipo = '';
    }

    if (window.EstoqueUI?.marcarTipoRapidoAtivo) {
      EstoqueUI.marcarTipoRapidoAtivo(buscaState.tipo);
    }

    aplicarBuscaEstoque();
  }

  function setFiltroTipoRapidoCompras(tipo) {
    buscaStateCompras.tipo = String(tipo || '').trim();

    const selTipo = document.getElementById('filtroTipoCompras');
    if (selTipo) {
      const existe = [...selTipo.options].some(o => (o.value || '') === buscaStateCompras.tipo);
      selTipo.value = existe ? buscaStateCompras.tipo : '';
      if (!existe) buscaStateCompras.tipo = '';
    }

    if (window.ComprasUI?.marcarTipoRapidoAtivo) {
      ComprasUI.marcarTipoRapidoAtivo(buscaStateCompras.tipo);
    }

    aplicarBuscaCompras();
  }

  function debounce(fn, delay = 250) {
    let t = null;
    return (...args) => {
      clearTimeout(t);
      t = setTimeout(() => fn(...args), delay);
    };
  }

  function estoqueEstaAtivo() {
    const abaEstoque = document.getElementById('aba-estoque');
    return abaEstoque && !abaEstoque.classList.contains('hidden');
  }

  function comprasEstaAtivo() {
    const abaCompras = document.getElementById('aba-compras');
    return abaCompras && !abaCompras.classList.contains('hidden');
  }

  function produtosEstaAtivo() {
    const abaProdutos = document.getElementById('aba-produtos');
    return abaProdutos && !abaProdutos.classList.contains('hidden');
  }

  function vendasEstaAtivo() {
    const abaVendas = document.getElementById('aba-vendas');
    return abaVendas && !abaVendas.classList.contains('hidden');
  }

  function producaoEstaAtivo() {
    const abaProducao = document.getElementById('aba-producao');
    return abaProducao && !abaProducao.classList.contains('hidden');
  }

  function lerFiltrosDoPainel() {
    const tipo = document.getElementById('filtroTipo');
    const categoria = document.getElementById('filtroCategoria');
    const unidade = document.getElementById('filtroUnidade');

    buscaState.tipo = tipo ? (tipo.value || '') : buscaState.tipo;
    buscaState.categoria = categoria ? (categoria.value || '') : buscaState.categoria;
    buscaState.unidade = unidade ? (unidade.value || '') : buscaState.unidade;

    if (window.EstoqueUI?.marcarTipoRapidoAtivo) {
      EstoqueUI.marcarTipoRapidoAtivo(buscaState.tipo);
    }
  }

  function lerFiltrosDoPainelCompras() {
    const tipo = document.getElementById('filtroTipoCompras');
    const categoria = document.getElementById('filtroCategoriaCompras');
    const unidade = document.getElementById('filtroUnidadeCompras');

    buscaStateCompras.tipo = tipo ? (tipo.value || '') : buscaStateCompras.tipo;
    buscaStateCompras.categoria = categoria ? (categoria.value || '') : buscaStateCompras.categoria;
    buscaStateCompras.unidade = unidade ? (unidade.value || '') : buscaStateCompras.unidade;

    if (window.ComprasUI?.marcarTipoRapidoAtivo) {
      ComprasUI.marcarTipoRapidoAtivo(buscaStateCompras.tipo);
    }
  }

  function aplicarBuscaEstoque() {
    if (!estoqueEstaAtivo()) return;

    if (!window.EstoqueStore || !window.EstoqueUI) return;
    if (!EstoqueStore.isLoaded()) return;

    const perf = window.AppPerf?.start('busca.estoque.aplicar');

    const texto = (buscaState.texto || '').trim();
    const tipo = (buscaState.tipo || '').trim();
    const categoria = (buscaState.categoria || '').trim();
    const unidade = (buscaState.unidade || '').trim();

    const lista = EstoqueStore.filter({
      texto: texto || undefined,
      tipo: tipo || undefined,
      categoria: categoria || undefined,
      unidade: unidade || undefined
    });

    EstoqueUI.renderLista(lista);
    window.AppPerf?.end(perf, {
      total: Array.isArray(lista) ? lista.length : 0,
      texto_len: texto.length,
      tipo,
      categoria,
      unidade
    });
  }

  const aplicarBuscaEstoqueDebounced = debounce(aplicarBuscaEstoque, 350);

  function aplicarBuscaCompras() {
    if (!comprasEstaAtivo()) return;

    if (!window.ComprasStore || !window.ComprasUI) return;
    if (!ComprasStore.isLoaded()) return;

    const perf = window.AppPerf?.start('busca.compras.aplicar');

    const texto = (buscaStateCompras.texto || '').trim();
    const tipo = (buscaStateCompras.tipo || '').trim();
    const categoria = (buscaStateCompras.categoria || '').trim();
    const unidade = (buscaStateCompras.unidade || '').trim();

    const lista = ComprasStore.filter({
      texto: texto || undefined,
      tipo: tipo || undefined,
      categoria: categoria || undefined,
      unidade: unidade || undefined
    });

    ComprasUI.renderLista(lista);
    window.AppPerf?.end(perf, {
      total: Array.isArray(lista) ? lista.length : 0,
      texto_len: texto.length,
      tipo,
      categoria,
      unidade
    });
  }

  const aplicarBuscaComprasDebounced = debounce(aplicarBuscaCompras, 350);

  function aplicarBuscaVendas() {
    if (!vendasEstaAtivo()) return;

    if (!window.VendasStore || !window.VendasUI) return;
    if (!VendasStore.isLoaded()) return;

    const perf = window.AppPerf?.start('busca.vendas.aplicar');

    const texto = (buscaStateVendas.texto || '').trim();
    const lista = VendasStore.filter({
      texto: texto || undefined
    });
    VendasUI.renderLista(lista);
    window.AppPerf?.end(perf, {
      total: Array.isArray(lista) ? lista.length : 0,
      texto_len: texto.length
    });
  }

  const aplicarBuscaVendasDebounced = debounce(aplicarBuscaVendas, 350);

  function aplicarBuscaProdutos() {
    if (!produtosEstaAtivo()) return;

    if (!window.ProdutosStore || !window.ProdutosUI) return;
    if (!ProdutosStore.isLoaded()) return;

    const perf = window.AppPerf?.start('busca.produtos.aplicar');

    const texto = (buscaStateProdutos.texto || '').trim();

    const lista = ProdutosStore.filter({
      texto: texto || undefined
    });

    ProdutosUI.renderLista(lista);
    window.AppPerf?.end(perf, {
      total: Array.isArray(lista) ? lista.length : 0,
      texto_len: texto.length
    });
  }

  const aplicarBuscaProdutosDebounced = debounce(aplicarBuscaProdutos, 350);

  function aplicarBuscaProducao() {
    if (!producaoEstaAtivo()) return;

    if (!window.ProducaoStore || !window.ProducaoUI) return;
    if (!ProducaoStore.isLoaded()) return;

    const perf = window.AppPerf?.start('busca.producao.aplicar');

    const texto = (buscaStateProducao.texto || '').trim();

    const lista = ProducaoStore.filter({
      texto: texto || undefined
    });

    ProducaoUI.renderLista(lista);
    window.AppPerf?.end(perf, {
      total: Array.isArray(lista) ? lista.length : 0,
      texto_len: texto.length
    });
  }

  const aplicarBuscaProducaoDebounced = debounce(aplicarBuscaProducao, 350);

  /* =========================
     PAINEL DE FILTRO (UI)
  ========================== */
  function painelFiltroExiste() {
    return !!document.getElementById('painelFiltroEstoque');
  }

  let listenerFecharForaAtivo = false;

  function abrirPainelFiltro() {
    const p = document.getElementById('painelFiltroEstoque');
    if (!p) return;

    p.classList.remove('hidden');

    // evita adicionar o listener várias vezes
    if (!listenerFecharForaAtivo) {
      listenerFecharForaAtivo = true;
      document.addEventListener('pointerdown', fecharFiltroAoClicarFora, { capture: true });
    }
  }

  function fecharPainelFiltro() {
    const p = document.getElementById('painelFiltroEstoque');
    if (!p) return;

    p.classList.add('hidden');

    if (listenerFecharForaAtivo) {
      listenerFecharForaAtivo = false;
      document.removeEventListener('pointerdown', fecharFiltroAoClicarFora, { capture: true });
    }
  }

  function togglePainelFiltro() {
    const p = document.getElementById('painelFiltroEstoque');
    if (!p) return;

    if (p.classList.contains('hidden')) abrirPainelFiltro();
    else fecharPainelFiltro();
  }

  function fecharFiltroAoClicarFora(e) {
    const p = document.getElementById('painelFiltroEstoque');
    if (!p || p.classList.contains('hidden')) return;

    const btn = document.getElementById('btnFiltro');
    if (p.contains(e.target)) return;
    if (btn && btn.contains(e.target)) return;

    fecharPainelFiltro();
  }

  function limparFiltros() {
    buscaState.tipo = '';
    buscaState.categoria = '';
    buscaState.unidade = '';

    const tipo = document.getElementById('filtroTipo');
    const categoria = document.getElementById('filtroCategoria');
    const unidade = document.getElementById('filtroUnidade');

    if (tipo) tipo.value = '';
    if (categoria) categoria.value = '';
    if (unidade) unidade.value = '';

    if (window.EstoqueUI?.marcarTipoRapidoAtivo) {
      EstoqueUI.marcarTipoRapidoAtivo('');
    }

    aplicarBuscaEstoque();
  }

  function limparFiltrosCompras() {
    buscaStateCompras.tipo = '';
    buscaStateCompras.categoria = '';
    buscaStateCompras.unidade = '';

    const tipo = document.getElementById('filtroTipoCompras');
    const categoria = document.getElementById('filtroCategoriaCompras');
    const unidade = document.getElementById('filtroUnidadeCompras');

    if (tipo) tipo.value = '';
    if (categoria) categoria.value = '';
    if (unidade) unidade.value = '';

    if (window.ComprasUI?.marcarTipoRapidoAtivo) {
      ComprasUI.marcarTipoRapidoAtivo('');
    }

    aplicarBuscaCompras();
  }

  /* =========================
     POPULAR SELECTS DO PAINEL
     (usa o cache do EstoqueStore)
  ========================== */
  function uniqueSorted(arr) {
    return [...new Set(arr.filter(v => String(v || '').trim() !== ''))]
      .map(v => String(v).trim())
      .sort((a, b) => a.localeCompare(b));
  }

  function preencherSelect(selectEl, valores, placeholder) {
    if (!selectEl) return;

    selectEl.innerHTML = '';
    const opt0 = document.createElement('option');
    opt0.value = '';
    opt0.textContent = placeholder;
    selectEl.appendChild(opt0);

    valores.forEach(v => {
      const o = document.createElement('option');
      o.value = v;
      o.textContent = v;
      selectEl.appendChild(o);
    });
  }

  function getTiposValidacaoCache() {
    const cache = window.AppValidacoesCache || {};
    const tipos = Array.isArray(cache.tipos) ? cache.tipos : [];
    return uniqueSorted(tipos);
  }

  function popularFiltrosDoPainel() {
    if (!window.EstoqueStore) return;
    if (!EstoqueStore.isLoaded()) return;

    const itens = EstoqueStore.get();

    const tiposValidacao = getTiposValidacaoCache();
    const tipos = tiposValidacao.length > 0
      ? tiposValidacao
      : uniqueSorted(itens.map(i => i.tipo));
    const categorias = uniqueSorted(itens.map(i => i.categoria));
    const unidades = uniqueSorted(itens.map(i => i.unidade));

    const selTipo = document.getElementById('filtroTipo');
    const selCategoria = document.getElementById('filtroCategoria');
    const selUnidade = document.getElementById('filtroUnidade');

    // preserva seleção atual (se já tiver)
    const tipoAtual = selTipo ? selTipo.value : '';
    const catAtual = selCategoria ? selCategoria.value : '';
    const unidadeAtual = selUnidade ? selUnidade.value : '';

    preencherSelect(selTipo, tipos, 'Tipo (todos)');
    preencherSelect(selUnidade, unidades, 'Unidade (todas)');
    preencherSelect(selCategoria, categorias, 'Categoria (todas)');

    // restaura se ainda existir
    if (selTipo && tipos.includes(tipoAtual)) selTipo.value = tipoAtual;
    if (selCategoria && categorias.includes(catAtual)) selCategoria.value = catAtual;
    if (selUnidade && unidades.includes(unidadeAtual)) selUnidade.value = unidadeAtual;

    if (window.EstoqueUI?.marcarTipoRapidoAtivo) {
      EstoqueUI.marcarTipoRapidoAtivo(selTipo ? selTipo.value : '');
    }
  }

  // espera o EstoqueStore carregar (sem travar nada)
  let filtroPoll = null;
  function iniciarPollFiltros() {
    if (!painelFiltroExiste()) return;

    // evita múltiplos polls
    if (filtroPoll) return;

    filtroPoll = setInterval(() => {
      if (window.EstoqueStore && EstoqueStore.isLoaded()) {
        popularFiltrosDoPainel();
        clearInterval(filtroPoll);
        filtroPoll = null;
      }
    }, 300);
  }

  function popularFiltrosDoPainelCompras() {
    if (!window.ComprasStore) return;
    if (!ComprasStore.isLoaded()) return;

    const itens = ComprasStore.get();

    const tiposValidacao = getTiposValidacaoCache();
    const tipos = tiposValidacao.length > 0
      ? tiposValidacao
      : uniqueSorted(itens.map(i => i.tipo));
    const tiposSemProduto = tipos
      .filter(t => String(t || '').trim().toUpperCase() !== 'PRODUTO');
    const categorias = uniqueSorted(itens.map(i => i.categoria));
    const unidades = uniqueSorted(itens.map(i => i.unidade));

    const selTipo = document.getElementById('filtroTipoCompras');
    const selCategoria = document.getElementById('filtroCategoriaCompras');
    const selUnidade = document.getElementById('filtroUnidadeCompras');

    const tipoAtual = selTipo ? selTipo.value : '';
    const catAtual = selCategoria ? selCategoria.value : '';
    const unidadeAtual = selUnidade ? selUnidade.value : '';

    preencherSelect(selTipo, tiposSemProduto, 'Tipo (todos)');
    preencherSelect(selUnidade, unidades, 'Unidade (todas)');
    preencherSelect(selCategoria, categorias, 'Categoria (todas)');

    if (selTipo && tiposSemProduto.includes(tipoAtual)) selTipo.value = tipoAtual;
    if (selCategoria && categorias.includes(catAtual)) selCategoria.value = catAtual;
    if (selUnidade && unidades.includes(unidadeAtual)) selUnidade.value = unidadeAtual;

    if (window.ComprasUI?.marcarTipoRapidoAtivo) {
      ComprasUI.marcarTipoRapidoAtivo(selTipo ? selTipo.value : '');
    }
  }

  let filtroPollCompras = null;
  function iniciarPollFiltrosCompras() {
    if (!painelFiltroComprasExiste()) return;
    if (filtroPollCompras) return;

    filtroPollCompras = setInterval(() => {
      if (window.ComprasStore && ComprasStore.isLoaded()) {
        popularFiltrosDoPainelCompras();
        clearInterval(filtroPollCompras);
        filtroPollCompras = null;
      }
    }, 300);
  }

  /* =========================
     INIT BUSCA/FILTRO
  ========================== */
  function initBuscaEFiltroEstoque() {
    const input = document.getElementById('buscaEstoque');
    const btnFiltro = document.getElementById('btnFiltro');

    // busca
    if (input) {
      input.addEventListener('input', () => {
        buscaState.texto = input.value || '';
        aplicarBuscaEstoqueDebounced();
      });
    }

    // botão filtro
    if (btnFiltro) {
      btnFiltro.addEventListener('click', () => {
        if (!painelFiltroExiste()) {
          mostrarToast('Filtro avancado em breve');
          return;
        }
        togglePainelFiltro();
      });
    }

    // listeners do painel (se existir)
    const p = document.getElementById('painelFiltroEstoque');
    if (!p) return;

    const tipo = document.getElementById('filtroTipo');
    const categoria = document.getElementById('filtroCategoria');
    const unidade = document.getElementById('filtroUnidade');
    const btnLimpar = document.getElementById('btnLimparFiltros'); // ✅ seu ID correto

    // muda e aplica automaticamente
    [tipo, categoria, unidade].forEach(sel => {
      if (!sel) return;
      sel.addEventListener('change', () => {
        lerFiltrosDoPainel();
        aplicarBuscaEstoque();
      });
    });

    if (btnLimpar) {
      btnLimpar.addEventListener('click', () => {
        limparFiltros();
      });
    }

    // garante opções preenchidas assim que o store carregar
    iniciarPollFiltros();
  }

    const unidade = document.getElementById('filtroUnidadeCompras');
    const btnLimpar = document.getElementById('btnLimparFiltrosCompras');

    [tipo, categoria, unidade].forEach(sel => {
      if (!sel) return;
      sel.addEventListener('change', () => {

        aplicarBuscaCompras();
      });
    });

    if (btnLimpar) {
      btnLimpar.addEventListener('click', () => {

    iniciarPollFiltrosCompras();
  }

  document.addEventListener('DOMContentLoaded', () => {
