          btn.textContent = `${loadingLabel}...`;
        }
      }

      return estado;
    }

    function end(estado) {
      if (!estado || typeof estado !== 'object') return;
      const btn = estado.button;
      if (btn) {
        btn.disabled = !!estado.originalDisabled;
        btn.removeAttribute('aria-busy');
        if (typeof estado.originalHtml === 'string' && estado.originalHtml !== '') {
          btn.innerHTML = estado.originalHtml;
        } else if (window.AppLoading?.setButtonLoading) {
          window.AppLoading.setButtonLoading(btn, false, estado.idleLabel || 'Salvar');
        } else {
          btn.textContent = estado.idleLabel || 'Salvar';
        }
      }
      if (estado.token && window.AppMutationUI?.unlock) {
        window.AppMutationUI.unlock(estado.token);
      }
    }

    function finishSuccess(estado, options = {}) {
      end(estado);
      if (options.closeModals !== false) {
        window.AppModalUI?.closeAll?.();
      }
    }

    return {
      begin,
      end,
      finishSuccess
    };
  }

  window.AppActionButtons = window.AppActionButtons || createActionButtonHelper();

  function createOptimisticMutationHelper() {
    // v4 usa namespace de usuario injetivo e valida o escopo dentro do
    // envelope. O v3 e deliberadamente ignorado: como o namespace antigo
    // podia colidir, nao e seguro atribuir suas mutacoes ao usuario atual.
    const STORAGE_PREFIX = 'app:optimistic:v4:';
    const STORAGE_SCHEMA = 'optimistic-outbox-v4';
    const AMBIGUOUS_STORAGE_PREFIX = 'app:optimistic:v3:';
    const STORAGE_KEYS_LEGACY = ['app:optimistic:v2', 'app:optimistic:v1'];
    const LEGACY_QUARANTINE_PREFIX = 'app:optimistic:quarantine:v2:';
    const LEGACY_QUARANTINE_SCHEMA = 'optimistic-quarantine-v2';
    const LEGACY_QUARANTINE_TTL_MS = 1000 * 60 * 60 * 24 * 30;
    const PROCESS_LOCK_PREFIX = 'app-optimistic-processor-v4:';
    const PROCESS_LEASE_PREFIX = 'app:optimistic:processor-lease:v4:';
    const STORAGE_TTL_MS = 1000 * 60 * 60 * 24 * 14;
    const BASE_BACKOFF_MS = 1800;
    const MAX_BACKOFF_MS = 45000;
    const MAX_AUTO_ATTEMPTS = 4;
    const PROCESS_LEASE_MS = 1000 * 60 * 2;
    const PROCESS_LEASE_HEARTBEAT_MS = 1000 * 20;
    let seq = 0;
    let processing = false;
    let retryTimer = null;
    let bootstrapReady = false;
    let storageLoaded = false;
    let contextSwitching = false;
    let legacyQuarantineInfo = null;
    let legacyWarningEmitted = false;
    const entries = new Map();
    const handlers = {};
    const processorOwnerId = (() => {
      try {
        if (typeof crypto !== 'undefined' && typeof crypto.randomUUID === 'function') {
          return crypto.randomUUID();
        }
      } catch (error) {
        // usa o fallback abaixo
      }
      return `owner_${Date.now()}_${Math.random().toString(36).slice(2)}`;
    })();

    function contextoStorage() {
      const scope = window.AppClientScope?.get?.();
      return {
        env: normalizarDbEnvFront(scope?.environment || 'prod'),
        user: String(scope?.user || 'session-only'),
        canPersist: scope?.canPersist === true
      };
    }

    function storageKey() {
      const ctx = contextoStorage();
      return `${STORAGE_PREFIX}${ctx.env}:${ctx.user}`;
    }

    function escopoPersistencia(schema = STORAGE_SCHEMA) {
      return window.AppClientScope?.persistenceScope?.(schema) || null;
    }

    function escopoPersistenciaValido(candidate, schema = STORAGE_SCHEMA) {
      return window.AppClientScope?.matchesPersistenceScope?.(candidate, schema) === true;
    }

    function processorLockName() {
      const ctx = contextoStorage();
      return `${PROCESS_LOCK_PREFIX}${ctx.env}:${ctx.user}`;
    }

    function processorLeaseKey() {
      const ctx = contextoStorage();
      return `${PROCESS_LEASE_PREFIX}${ctx.env}:${ctx.user}`;
    }

    function storageDisponivel() {
      try {
        if (!contextoStorage().canPersist) return false;
        if (!window.localStorage) return false;
        const key = `${STORAGE_PREFIX}probe`;
        window.localStorage.setItem(key, '1');
        window.localStorage.removeItem(key);
        return true;
      } catch (error) {
        return false;
      }
    }

    function clone(value) {
      if (value == null) return value;
      try {
        return JSON.parse(JSON.stringify(value));
      } catch (error) {
        return value;
      }
    }

    function normalizarTextoErro(valor) {
      const texto = String(valor || '').trim();
      if (!texto) return '';
      try {
        return texto.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase();
      } catch (error) {
        return texto.toLowerCase();
      }
    }

    function normalizarStatus(status) {
      const valor = String(status || '').trim().toLowerCase();
      if (['pending', 'sending', 'paused', 'offline', 'error', 'conflict'].includes(valor)) {
        return valor;
      }
      return 'pending';
    }

    function gerarId() {
      seq += 1;
      try {
        if (typeof crypto !== 'undefined' && typeof crypto.randomUUID === 'function') {
          return `opt_${crypto.randomUUID()}`;
        }
        if (typeof crypto !== 'undefined' && typeof crypto.getRandomValues === 'function') {
          const bytes = new Uint32Array(4);
          crypto.getRandomValues(bytes);
          return `opt_${Date.now()}_${seq}_${[...bytes].map(v => v.toString(36)).join('')}`;
        }
      } catch (error) {
        // Mantem um fallback compativel com navegadores antigos.
      }
      return `opt_${Date.now()}_${seq}_${Math.random().toString(36).slice(2)}`;
    }

    function ordenarEntries(lista) {
      return [...lista].sort((a, b) => {
        const ra = Number(a?.retryAt || 0);
        const rb = Number(b?.retryAt || 0);
        const ta = ra > 0 ? ra : Number(a?.createdAt || 0);
        const tb = rb > 0 ? rb : Number(b?.createdAt || 0);
        if (ta !== tb) return ta - tb;
        return String(a?.id || '').localeCompare(String(b?.id || ''));
      });
    }

    function snapshotEntries() {
      return ordenarEntries(entries.values()).map(clone);
    }

    function resumoFila() {
      const resumo = {
        total: 0,
        pending: 0,
        sending: 0,
        paused: 0,
        offline: 0,
        error: 0,
        conflict: 0,
        active: 0,
        nextRetryAt: 0,
        legacyQuarantine: !!legacyQuarantineInfo,
        legacyQuarantineSources: Math.max(0, Number(legacyQuarantineInfo?.totalSources || 0)),
        online: typeof navigator === 'undefined' || navigator.onLine !== false
      };
      snapshotEntries().forEach(entry => {
        const status = normalizarStatus(entry?.status);
        resumo.total += 1;
        resumo[status] = Math.max(0, Number(resumo[status] || 0)) + 1;
        if (['pending', 'sending', 'paused', 'offline'].includes(status)) {
          resumo.active += 1;
        }
        const retryAt = Number(entry?.retryAt || 0);
        if (retryAt > 0 && (!resumo.nextRetryAt || retryAt < resumo.nextRetryAt)) {
          resumo.nextRetryAt = retryAt;
        }
      });
      return resumo;
    }

    function emitirEstado() {
      if (typeof window === 'undefined') return;
      try {
        window.dispatchEvent(new CustomEvent('app:optimistic-state', {
          detail: {
            summary: resumoFila(),
            entries: snapshotEntries()
          }
        }));
      } catch (error) {
        // sem acao
      }
    }

    function salvarStorage() {
      if (!bootstrapReady || !storageDisponivel()) return;
      const scope = escopoPersistencia();
      if (!scope) return;
      try {
        window.localStorage.setItem(storageKey(), JSON.stringify({
          scope,
          updatedAt: Date.now(),
          seq,
          entries: snapshotEntries()
        }));
      } catch (error) {
        // sem acao
      }
    }

    function lerStoragePorChave(key) {
      try {
        if (!key || !storageDisponivel()) return null;
        const raw = window.localStorage.getItem(key);
        if (!raw) return null;
        return JSON.parse(raw);
      } catch (error) {
        return null;
      }
    }

    function normalizarEntry(raw) {
      if (!raw || typeof raw !== 'object') return null;
      const id = String(raw.id || '').trim() || gerarId();
      const createdAt = Number(raw.createdAt || Date.now());
      const updatedAt = Number(raw.updatedAt || createdAt || Date.now());
      const meta = clone(raw.meta ?? {});
      const idempotencyToken = String(
        raw.idempotencyToken || meta?._idempotency_token || id
      ).trim() || id;
      if (meta && typeof meta === 'object') {
        meta._idempotency_token = idempotencyToken;
      }
      return {
        id,
        idempotencyToken,
        scope: String(raw.scope || '').trim(),
        handler: String(raw.handler || '').trim(),
        entityKey: String(raw.entityKey || '').trim(),
        payload: clone(raw.payload ?? null),
        meta,
        environment: normalizarDbEnvFront(
          raw.environment || raw?.meta?._db_env || raw?.meta?.environment || contextoStorage().env
        ),
        attempts: Math.max(0, Number(raw.attempts || 0)),
        status: normalizarStatus(raw.status),
        errorMessage: String(raw.errorMessage || '').trim(),
        errorKind: String(raw.errorKind || '').trim().toLowerCase(),
        retryAt: Math.max(0, Number(raw.retryAt || 0)),
        lastAttemptAt: Math.max(0, Number(raw.lastAttemptAt || 0)),
        createdAt,
        updatedAt
      };
    }

    function carregarStorage(options = {}) {
      const force = options.force === true;
      const recoverSending = options.recoverSending === true;
      if (!bootstrapReady || (!force && storageLoaded) || !storageDisponivel()) return false;
      storageLoaded = true;
      try {
        const keyAtual = storageKey();
        const payload = lerStoragePorChave(keyAtual);
        if (!payload || typeof payload !== 'object') {
          if (force) entries.clear();
          return false;
        }
        if (!escopoPersistenciaValido(payload.scope)) {
          window.AppDiag?.mark?.('optimistic.storage.scope_mismatch', {
            storage_key: keyAtual
          });
          return false;
        }
        const updatedAt = Number(payload.updatedAt || 0);
        if (updatedAt && (Date.now() - updatedAt) > STORAGE_TTL_MS) {
          window.localStorage.removeItem(keyAtual);
          if (force) entries.clear();
          return false;
        }
        seq = Math.max(seq, Number(payload.seq || 0));
        const lista = Array.isArray(payload.entries) ? payload.entries : [];
        const carregadas = new Map();
        let recuperadas = 0;
        lista.forEach(item => {
          const entry = normalizarEntry(item);
          if (!entry) return;
          if (entry.environment !== contextoStorage().env) return;
          if (recoverSending && normalizarStatus(entry.status) === 'sending') {
            // O lock exclusivo garante que nao ha outro processador vivo antes
            // de transformar uma tentativa interrompida em uma nova tentativa.
            // O ID/token nao muda, permitindo deduplicacao no servidor quando
            // a operacao correspondente oferece idempotencia.
            entry.status = 'paused';
            entry.errorKind = 'interrupted';
            entry.errorMessage = 'Sincronizacao interrompida; nova tentativa agendada.';
            entry.retryAt = Date.now() + BASE_BACKOFF_MS;
            entry.updatedAt = Date.now();
            recuperadas += 1;
          }
          carregadas.set(entry.id, entry);
        });
        entries.clear();
        carregadas.forEach((entry, id) => entries.set(id, entry));
        if (recuperadas > 0) {
          salvarStorage();
          window.AppDiag?.mark?.('optimistic.sending.recovered', { total: recuperadas });
        }
        return true;
      } catch (error) {
        // sem acao
        return false;
      }
    }

    function quarantineStorageKey() {
      const ctx = contextoStorage();
      return `${LEGACY_QUARANTINE_PREFIX}${ctx.env}:${ctx.user}`;
    }

    function chaveAmbiguaV3DoContexto() {
      const email = String(window.AppUserAccess?.getContext?.()?.email || '').trim().toLowerCase();
      if (!email) return '';
      const usuarioAntigo = email.replace(/[^a-z0-9@._-]+/g, '_');
      return `${AMBIGUOUS_STORAGE_PREFIX}${contextoStorage().env}:${usuarioAntigo}`;
    }

    function avisarQuarentenaLegada() {
      if (!legacyQuarantineInfo || legacyWarningEmitted) return;
      legacyWarningEmitted = true;
      const detail = {
        total_sources: Math.max(0, Number(legacyQuarantineInfo.totalSources || 0)),
        quarantined_at: Number(legacyQuarantineInfo.quarantinedAt || 0),
        expires_at: Number(legacyQuarantineInfo.expiresAt || 0),
        auto_replay: false
      };
      try {
        window.dispatchEvent(new CustomEvent('app:optimistic-legacy-quarantine', { detail }));
      } catch (error) {
        // sem acao
      }
      if (typeof mostrarToast === 'function') {
        mostrarToast('Ha alteracoes antigas isoladas que nao serao reenviadas automaticamente.', 'erro');
      }
    }

    function quarentenarStorageLegado() {
      if (!storageDisponivel()) return;
      try {
        const keyQuarentena = quarantineStorageKey();
        const agora = Date.now();
        let payloadExistente = null;
        const rawExistente = window.localStorage.getItem(keyQuarentena);
        if (rawExistente) {
          try {
            const parsed = JSON.parse(rawExistente);
            if (
              escopoPersistenciaValido(parsed?.scope, LEGACY_QUARANTINE_SCHEMA) &&
              Number(parsed?.expiresAt || 0) > agora
            ) {
              payloadExistente = parsed;
            } else if (Number(parsed?.expiresAt || 0) > 0 && Number(parsed.expiresAt) <= agora) {
              window.localStorage.removeItem(keyQuarentena);
            }
          } catch (error) {
            // Envelope invalido e ignorado; nunca e reproduzido.
          }
        }

        const fontes = {
          ...((payloadExistente?.sources && typeof payloadExistente.sources === 'object')
            ? payloadExistente.sources
            : {})
        };
        const candidatas = [
          ...STORAGE_KEYS_LEGACY,
          'app:optimistic:quarantine:v1',
          chaveAmbiguaV3DoContexto()
        ].filter(Boolean);
        const novas = [];
        candidatas.forEach(key => {
          if (Object.prototype.hasOwnProperty.call(fontes, key)) return;
          const raw = window.localStorage.getItem(key);
          if (!raw) return;
          fontes[key] = raw;
          novas.push(key);
        });

        const totalSources = Object.keys(fontes).length;
        if (totalSources === 0) {
          legacyQuarantineInfo = null;
          return;
        }

        const quarantinedAt = Number(payloadExistente?.quarantinedAt || agora);
        const envelope = {
          scope: escopoPersistencia(LEGACY_QUARANTINE_SCHEMA),
          quarantinedAt,
          updatedAt: agora,
          expiresAt: quarantinedAt + LEGACY_QUARANTINE_TTL_MS,
          reason: 'legacy_scope_unknown',
          autoReplay: false,
          totalSources,
          sources: fontes
        };
        window.localStorage.setItem(keyQuarentena, JSON.stringify(envelope));
        // So remove a fonte depois que a copia escopada foi confirmada.
        novas.forEach(key => window.localStorage.removeItem(key));
        legacyQuarantineInfo = {
          quarantinedAt: envelope.quarantinedAt,
          expiresAt: envelope.expiresAt,
          totalSources: envelope.totalSources
        };
        window.AppDiag?.mark?.('optimistic.legacy.quarantined', {
          total_sources: totalSources,
          auto_replay: false
        });
        avisarQuarentenaLegada();
      } catch (error) {
        // Mantem o legado intacto se a quarentena nao puder ser gravada.
      }
    }

    function emitir(type, extra = {}) {
      if (typeof window === 'undefined') return;
      try {
        window.dispatchEvent(new CustomEvent('app:optimistic-mutation', {
          detail: {
            type: String(type || '').trim(),
            entry: extra.entry ? clone(extra.entry) : null,
            result: extra.result === undefined ? undefined : clone(extra.result),
            errorMessage: String(extra.errorMessage || '').trim(),
            entries: snapshotEntries(),
            summary: resumoFila()
          }
        }));
      } catch (error) {
        // sem acao
      } finally {
        emitirEstado();
      }
    }

    function limparRetryTimer() {
      if (!retryTimer) return;
      clearTimeout(retryTimer);
      retryTimer = null;
    }

    function esperar(ms) {
      return new Promise(resolve => setTimeout(resolve, Math.max(0, Number(ms || 0))));
    }

    function lerLeaseProcessador() {
      try {
        const raw = window.localStorage?.getItem(processorLeaseKey());
        if (!raw) return null;
        const lease = JSON.parse(raw);
        if (!lease || typeof lease !== 'object') return null;
        if (!escopoPersistenciaValido(lease.scope)) return null;
        return lease;
      } catch (error) {
        return null;
      }
    }

    async function adquirirLeaseProcessador() {
      if (!storageDisponivel()) return null;
      const key = processorLeaseKey();
      const agora = Date.now();
      const atual = lerLeaseProcessador();
      if (
        atual &&
        String(atual.owner || '') !== processorOwnerId &&
        Number(atual.expiresAt || 0) > agora
      ) {
        return null;
      }

      const nonce = `${processorOwnerId}_${agora}_${Math.random().toString(36).slice(2)}`;
      const gravar = () => {
        window.localStorage.setItem(key, JSON.stringify({
          scope: escopoPersistencia(),
          owner: processorOwnerId,
          nonce,
          updatedAt: Date.now(),
          expiresAt: Date.now() + PROCESS_LEASE_MS
        }));
      };

      try {
        gravar();
        // localStorage nao oferece compare-and-swap. Uma pequena janela de
        // confirmacao resolve a disputa usual; Web Locks, quando disponivel,
        // continua sendo a garantia primaria.
        await esperar(36 + Math.floor(Math.random() * 28));
        const confirmado = lerLeaseProcessador();
        if (
          String(confirmado?.owner || '') !== processorOwnerId ||
          String(confirmado?.nonce || '') !== nonce
        ) {
          return null;
        }

        let ativo = true;
        const isOwner = () => {
          if (!ativo) return false;
          const lease = lerLeaseProcessador();
          return String(lease?.owner || '') === processorOwnerId
            && String(lease?.nonce || '') === nonce
            && Number(lease?.expiresAt || 0) > Date.now();
        };
        const heartbeat = setInterval(() => {
          if (!isOwner()) {
            ativo = false;
            clearInterval(heartbeat);
            return;
          }
          try {
            gravar();
          } catch (error) {
            ativo = false;
            clearInterval(heartbeat);
          }
        }, PROCESS_LEASE_HEARTBEAT_MS);

        return {
          isOwner,
          release() {
            if (!ativo) return;
            ativo = false;
            clearInterval(heartbeat);
            try {
              const lease = lerLeaseProcessador();
              if (
                String(lease?.owner || '') === processorOwnerId &&
                String(lease?.nonce || '') === nonce
              ) {
                window.localStorage.removeItem(key);
              }
            } catch (error) {
              // O lease expira sozinho em caso de falha.
            }
          }
        };
      } catch (error) {
        return null;
      }
    }

    async function executarComExclusaoProcessador(callback) {
      const locks = typeof navigator !== 'undefined' ? navigator.locks : null;
      if (locks && typeof locks.request === 'function') {
        let adquirido = false;
        try {
          const result = await locks.request(
            processorLockName(),
            { mode: 'exclusive', ifAvailable: true },
            async lock => {
              if (!lock) return undefined;
              adquirido = true;
              return callback({ isOwner: () => true, strategy: 'web-locks' });
            }
          );
          return { acquired: adquirido, result };
        } catch (error) {
          // Uma falha do callback depois de adquirir o lock nao pode cair no
          // fallback, pois isso executaria a mesma mutacao uma segunda vez.
          if (adquirido) throw error;
          // Navegadores com implementacao parcial caem no lease abaixo.
          window.AppDiag?.mark?.('optimistic.processor.web_lock_unavailable', {
            message: String(error?.message || error || '')
          });
        }
      }

      // Sem persistencia nao ha uma fila compartilhada entre abas; o flag
      // `processing` desta instancia ja e suficiente para a fila em memoria.
      if (!storageDisponivel()) {
        return {
          acquired: true,
          result: await callback({ isOwner: () => true, strategy: 'memory-only' })
        };
      }

      const lease = await adquirirLeaseProcessador();
      if (!lease) return { acquired: false, result: undefined };
      try {
        return {
          acquired: true,
          result: await callback({ isOwner: lease.isOwner, strategy: 'local-storage-lease' })
        };
      } finally {
        lease.release();
      }
    }

    function calcularBackoff(attempts) {
      const tentativa = Math.max(1, Number(attempts || 1));
      return Math.min(MAX_BACKOFF_MS, BASE_BACKOFF_MS * Math.pow(2, tentativa - 1));
    }

    function obterProximaElegivel(now = Date.now()) {
      const online = typeof navigator === 'undefined' || navigator.onLine !== false;
      return snapshotEntries().find(item => {
        if (!handlers[item.handler] || item.environment !== contextoStorage().env) return false;
        const status = normalizarStatus(item.status);
        if (!['pending', 'paused', 'offline'].includes(status)) return false;
        if (!online) return false;
        const retryAt = Number(item.retryAt || 0);
        return !retryAt || retryAt <= now;
      }) || null;
    }

    function agendarProcessamento(delayMs = null) {
      limparRetryTimer();
      if (!bootstrapReady || contextSwitching) {
        emitirEstado();
        return;
      }
      if (processing) {
        emitirEstado();
        return;
      }

      const pendentes = snapshotEntries().filter(item => {
        if (!handlers[item.handler] || item.environment !== contextoStorage().env) return false;
        const status = normalizarStatus(item.status);
        // `sending` persistido tambem precisa chegar ao processador: somente
        // depois de adquirir o lock ele pode ser recuperado como interrompido.
        return ['pending', 'sending', 'paused', 'offline'].includes(status);
      });
      if (pendentes.length === 0) {
        emitirEstado();
        return;
      }

      const online = typeof navigator === 'undefined' || navigator.onLine !== false;
      const precisaRecuperarSending = pendentes.some(item => normalizarStatus(item.status) === 'sending');
      if (!online && !precisaRecuperarSending) {
        emitirEstado();
        return;
      }

      const now = Date.now();
      const immediata = pendentes.some(item => {
        if (normalizarStatus(item.status) === 'sending') return true;
        const retryAt = Number(item.retryAt || 0);
        return !retryAt || retryAt <= now;
      });
      const proximoRetryAt = pendentes
        .map(item => Number(item.retryAt || 0))
        .filter(ts => ts > now)
        .sort((a, b) => a - b)[0] || 0;
      const wait = Number.isFinite(delayMs)
        ? Math.max(0, Number(delayMs || 0))
        : (immediata ? 48 : Math.max(96, proximoRetryAt - now));

      retryTimer = setTimeout(() => {
        retryTimer = null;
        processarFila();
      }, Math.min(wait, MAX_BACKOFF_MS));
      emitirEstado();
    }

    function listar(options = {}) {
      const scope = String(options.scope || '').trim();
      const domain = String(options.domain || '').trim();
      const status = String(options.status || '').trim().toLowerCase();
      return snapshotEntries().filter(entry => {
        if (scope && entry.scope !== scope) return false;
        if (domain && String(entry?.meta?.domain || '').trim() !== domain) return false;
        if (status && String(entry.status || '').trim().toLowerCase() !== status) return false;
        return true;
      });
    }

    function get(id) {
      const chave = String(id || '').trim();
      if (!chave || !entries.has(chave)) return null;
      return clone(entries.get(chave));
    }

    function existeMutacaoAtiva(entityKey, ignoreId = '') {
      const alvo = String(entityKey || '').trim();
      const ignorar = String(ignoreId || '').trim();
      if (!alvo) return false;
      return snapshotEntries().some(entry => {
        if (ignorar && entry.id === ignorar) return false;
        return entry.entityKey === alvo;
      });
    }

    function getState() {
      return resumoFila();
    }

    function enqueue(config = {}) {
      if (!bootstrapReady || contextSwitching) {
        throw new Error('Aguarde a inicializacao do ambiente antes de salvar.');
      }
      const entry = normalizarEntry({
        ...config,
        id: config.id || gerarId(),
        attempts: 0,
        status: 'pending',
        createdAt: Date.now(),
        updatedAt: Date.now(),
        errorMessage: '',
        errorKind: '',
        retryAt: 0,
        lastAttemptAt: 0,
        environment: contextoStorage().env,
        meta: {
          ...(config.meta || {}),
          _db_env: contextoStorage().env
        }
      });
      if (!entry || !entry.handler) {
        throw new Error('Mutacao otimista invalida.');
      }
      if (entry.entityKey && existeMutacaoAtiva(entry.entityKey, entry.id)) {
        throw new Error('Ja existe uma sincronizacao pendente para este item.');
      }
      entries.set(entry.id, entry);
      salvarStorage();
      emitir('queued', { entry });
      agendarProcessamento(48);
      return clone(entry);
    }

    function retry(id) {
      const chave = String(id || '').trim();
      const entry = chave ? entries.get(chave) : null;
      if (!entry) return null;
      entry.status = 'pending';
      entry.errorMessage = '';
      entry.errorKind = '';
      entry.retryAt = 0;
      entry.updatedAt = Date.now();
      salvarStorage();
      emitir('retry', { entry });
      agendarProcessamento(48);
      return clone(entry);
    }

    function discard(id) {
      const chave = String(id || '').trim();
      const entry = chave ? entries.get(chave) : null;
      if (!entry) return null;
      if (normalizarStatus(entry.status) === 'sending') {
        throw new Error('Nao e possivel descartar uma sincronizacao em andamento.');
      }
      const snapshot = clone(entry);
      entries.delete(chave);
      salvarStorage();
      emitir('discarded', { entry: snapshot });
      agendarProcessamento(48);
      return snapshot;
    }

    function registerHandler(name, handler) {
      const chave = String(name || '').trim();
      if (!chave || typeof handler !== 'function') return () => {};
      handlers[chave] = handler;
      agendarProcessamento(48);
      return () => {
        if (handlers[chave] === handler) {
          delete handlers[chave];
        }
      };
    }

    function classificarErro(error, entry) {
      const mensagem = String(error?.message || 'Falha ao sincronizar').trim() || 'Falha ao sincronizar';
      const rawCode = String(error?.raw?.code || error?.code || '').trim().toUpperCase();
      const mensagemNormalizada = normalizarTextoErro(mensagem);
      const lower = mensagemNormalizada;
      const offlinePorNavegador = typeof navigator !== 'undefined' && navigator.onLine === false;
      let conflito = rawCode.includes('CONFLICT')
        || /conflit|incert|tentativa anterior|vers[aã]o|stale|atualizad[oa] por outro|modificad[oa] por outro|updated by another|already changed/i.test(mensagem);
      conflito = conflito || /conflit|incert|tentativa anterior|versao|stale|atualizad[oa] por outro|modificad[oa] por outro|updated by another|already changed/i.test(mensagemNormalizada);
      const offline = offlinePorNavegador
        || (!conflito && /offline|sem conexao|google\.script\.run indisponivel|network|internet|dns|failed to fetch|tempo limite|timeout|temporari/i.test(lower));
      const invalido = /obrigat|invalido|permissa|nao encontrado|proibido|forbidden|unauthori|denied/i.test(lower);
      const attempts = Math.max(0, Number(entry?.attempts || 0)) + 1;

      if (conflito) {
        return {
          status: 'conflict',
          kind: 'conflict',
          retryAt: 0,
          message: mensagem
        };
      }

      if (offline) {
        return {
          status: 'offline',
          kind: 'offline',
          retryAt: Date.now() + 3000,
          message: mensagem
        };
      }

      if (!invalido && attempts < MAX_AUTO_ATTEMPTS) {
        return {
          status: 'paused',
          kind: 'transient',
          retryAt: Date.now() + calcularBackoff(attempts),
          message: mensagem
        };
      }

      return {
        status: 'error',
        kind: invalido ? 'validation' : 'error',
        retryAt: 0,
        message: mensagem
      };
    }

    async function processarFila() {
      if (!bootstrapReady || contextSwitching) return;
      if (processing) return;
      processing = true;
      let lockAdquirido = false;
      try {
        const exclusivo = await executarComExclusaoProcessador(async guard => {
          // Sob o lock, o storage volta a ser a fonte autoritativa. E somente
          // aqui que `sending` pode ser considerado resto de um crash/reload.
          carregarStorage({ force: true, recoverSending: true });
          const entry = obterProximaElegivel();
          if (!entry) return false;
          const original = entries.get(entry.id);
          if (!original || !guard.isOwner()) return false;

          original.status = 'sending';
          original.lastAttemptAt = Date.now();
          original.updatedAt = Date.now();
          salvarStorage();
          emitir('sending', { entry: original });

          try {
            if (
              !guard.isOwner() ||
              contextSwitching ||
              !window.AppClientScope?.matchesCurrentEnvironment?.() ||
              entry.environment !== contextoStorage().env
            ) {
              throw new Error('Contexto de banco alterado antes da sincronizacao.');
            }
            const result = await Promise.resolve(handlers[entry.handler](clone(entry)));
            const atual = entries.get(entry.id);
            const snapshot = clone(atual || entry);
            entries.delete(entry.id);
            salvarStorage();
            emitir('success', {
              entry: snapshot,
              result
            });
          } catch (error) {
            const atual = entries.get(entry.id);
            if (atual) {
              const info = classificarErro(error, atual);
              atual.status = info.status;
              atual.errorKind = info.kind;
              atual.errorMessage = info.message;
              atual.retryAt = Math.max(0, Number(info.retryAt || 0));
              atual.attempts = Math.max(0, Number(atual.attempts || 0)) + 1;
              atual.updatedAt = Date.now();
              salvarStorage();
              emitir(info.status || 'error', {
                entry: atual,
                errorMessage: atual.errorMessage
              });
            }
          }
          return true;
        });
        lockAdquirido = exclusivo.acquired === true;
      } catch (error) {
        window.AppDiag?.mark?.('optimistic.processor.failed', {
          message: String(error?.message || error || '')
        });
      } finally {
        processing = false;
        agendarProcessamento(lockAdquirido ? null : 180);
      }
    }

    if (typeof window !== 'undefined' && typeof window.addEventListener === 'function') {
      window.addEventListener('online', () => {
        snapshotEntries().forEach(entry => {
          const atual = entries.get(entry.id);
          if (!atual) return;
          if (['offline', 'paused'].includes(String(atual.status || '').trim().toLowerCase())) {
            atual.status = 'pending';
            atual.retryAt = 0;
            atual.updatedAt = Date.now();
          }
        });
        salvarStorage();
        emitirEstado();
        agendarProcessamento(80);
      });
      window.addEventListener('offline', emitirEstado);
      window.addEventListener('focus', () => agendarProcessamento(120));
      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible') {
          agendarProcessamento(120);
        }
      });
      window.addEventListener('storage', evento => {
        const key = String(evento?.key || '').trim();
        if (!key || key !== storageKey()) return;
        carregarStorage({ force: true, recoverSending: false });
        emitirEstado();
        agendarProcessamento(120);
      });
      window.addEventListener('app:bootstrap-ready', () => {
        bootstrapReady = true;
        contextSwitching = false;
        entries.clear();
        storageLoaded = false;
        quarentenarStorageLegado();
        carregarStorage();
        emitirEstado();
        agendarProcessamento(120);
      }, { once: true });
      window.addEventListener('app:client-scope-changing', () => {
        contextSwitching = true;
        limparRetryTimer();
        salvarStorage();
        emitirEstado();
      });
    }

    emitirEstado();

    function prepareContextSwitch(targetEnvironment) {
      const alvo = normalizarDbEnvFront(targetEnvironment);
      const atual = contextoStorage().env;
      if (alvo === atual) return { ok: true };
      const summary = resumoFila();
      if (summary.total > 0 && !contextoStorage().canPersist) {
        return {
          ok: false,
          reason: 'Ha alteracoes locais nao persistidas. Sincronize-as antes de trocar o banco.'
        };
      }
      if (processing || summary.sending > 0) {
        return {
          ok: false,
          reason: 'Aguarde a sincronizacao em andamento antes de trocar o banco.'
        };
      }
      contextSwitching = true;
      limparRetryTimer();
      salvarStorage();
      emitirEstado();
      return { ok: true };
    }

    function cancelContextSwitch() {
      contextSwitching = false;
      agendarProcessamento(80);
    }

    return {
      enqueue,
      retry,
      discard,
      list: listar,
      get,
      getState,
      registerHandler,
      process: agendarProcessamento,
      prepareContextSwitch,
      cancelContextSwitch
    };
  }

  window.AppOptimistic = window.AppOptimistic || createOptimisticMutationHelper();

  function createDespesaMutationHelper() {
    const META_KEYS = [
      '_localStatus',
      '_localAction',
      '_localMutationId',
      '_localErrorMessage',
      '_localErrorKind',
      '_localRetryAt',
      '_localRetryable',
      '_localDeleted',
      '_localSource'
    ];

    function clone(value) {
      if (value == null) return value;
      try {
        return JSON.parse(JSON.stringify(value));
      } catch (error) {
        return value;
      }
    }

    function parseNumero(valor) {
      if (window.AppDomainUtils?.parseNumeroZero) {
        return window.AppDomainUtils.parseNumeroZero(valor);
      }
      const raw = String(valor ?? '').trim();
      if (!raw) return 0;
      const num = Number(raw.replace(',', '.'));
      return Number.isFinite(num) ? num : 0;
    }

    function round2(valor) {
      return Math.round(parseNumero(valor) * 100) / 100;
    }

    function clampDate(valor) {
      const raw = String(valor || '').trim();
      return /^\d{4}-\d{2}-\d{2}$/.test(raw) ? raw : '';
    }

    function tempId(prefix = 'DES_TMP') {
      return `${prefix}_${Date.now()}_${Math.floor(Math.random() * 100000)}`;
    }

    function limparMeta(item) {
      const base = clone(item) || {};
      META_KEYS.forEach(key => {
        delete base[key];
      });
      return base;
    }

    function normalizarLocalStatus(status) {
      const valor = String(status || '').trim().toLowerCase();
      if (['pending', 'sending', 'paused', 'offline', 'error', 'conflict'].includes(valor)) {
        return valor;
      }
      return '';
    }

    function ehStatusMutacaoAtivo(status) {
      return !!normalizarLocalStatus(status);
    }

    function ehRetryManualDisponivel(status) {
      return ['paused', 'offline', 'error', 'conflict'].includes(normalizarLocalStatus(status));
    }

    function obterMensagemReenvio(retryAt) {
      const alvo = Math.max(0, Number(retryAt || 0));
      if (!alvo) return 'Nova tentativa em instantes.';
      const diffSeg = Math.max(0, Math.ceil((alvo - Date.now()) / 1000));
      if (diffSeg <= 1) return 'Nova tentativa em instantes.';
      return `Nova tentativa em ${diffSeg}s.`;
    }

    function resolverStatusDetalhe(detail) {
      const tipo = normalizarLocalStatus(detail?.type);
      if (tipo && tipo !== 'pending') return tipo;
      const entryStatus = normalizarLocalStatus(detail?.entry?.status);
      if (entryStatus) return entryStatus;
      return 'pending';
    }

    function aplicarMeta(item, opcoes = {}) {
      const base = limparMeta(item);
      const status = normalizarLocalStatus(opcoes.status);
      if (!status) return base;
      base._localStatus = status;
      base._localAction = String(opcoes.action || '').trim();
      base._localMutationId = String(opcoes.mutationId || '').trim();
      base._localErrorMessage = String(opcoes.errorMessage || '').trim();
      base._localErrorKind = String(opcoes.errorKind || '').trim().toLowerCase();
      base._localRetryAt = Math.max(0, Number(opcoes.retryAt || 0));
      base._localRetryable = opcoes.retryable !== false;
      base._localDeleted = !!opcoes.localDeleted;
      base._localSource = String(opcoes.source || '').trim();
      return base;
    }

    function getStatusPagamento(totalPrevisto, totalPago) {
      const previsto = round2(totalPrevisto);
      const pago = round2(totalPago);
      const pendente = round2(Math.max(0, previsto - pago));
      if (pendente <= 0.009) return 'PAGO';
      if (pago > 0.009) return 'PARCIAL';
      return 'PENDENTE';
    }

    function buildParcelasDetalhe(payload, baseItem) {
      const base = clone(baseItem) || {};
      const parcelasAtuais = Array.isArray(base.parcelas_detalhe) ? base.parcelas_detalhe : [];
      const possuiPagamento = parcelasAtuais.some(parcela => round2(parcela?.valor_pago) > 0.009);
      if (possuiPagamento) {
        return parcelasAtuais;
      }

      const detalhes = Array.isArray(payload?.parcelas_detalhe) ? payload.parcelas_detalhe : [];
      const quantidade = Math.max(1, Math.floor(parseNumero(payload?.parcelas || detalhes.length || 1) || 1));
      const origemId = String(base.ID || payload?.ID || tempId('PAR')).trim();
      const fallbackData = clampDate(payload?.data_vencimento || payload?.data_competencia);

      if (detalhes.length === 0) {
        const valorPrevisto = round2(payload?.valor_total);
        return [{
          ID: `${origemId}_P1`,
          parcela_numero: 1,
          parcelas_total: 1,
          data_prevista: fallbackData,
          valor_previsto: valorPrevisto,
          valor_pago: 0,
          valor_pendente: valorPrevisto,
          status: valorPrevisto <= 0.009 ? 'PAGO' : 'PENDENTE',
          data_quitacao: '',
          pagamento_id: ''
        }];
      }

      return detalhes.map((parcela, idx) => {
        const valorPrevisto = round2(parcela?.valor ?? parcela?.valor_previsto);
        const valorPago = round2(parcela?.valor_pago);
        const pendente = round2(Math.max(0, valorPrevisto - valorPago));
        return {
          ID: String(parcela?.ID || `${origemId}_P${idx + 1}`).trim(),
          parcela_numero: idx + 1,
          parcelas_total: quantidade,
          data_prevista: clampDate(parcela?.data || parcela?.data_prevista || fallbackData),
          valor_previsto: valorPrevisto,
          valor_pago: valorPago,
          valor_pendente: pendente,
          status: pendente <= 0.009 ? 'PAGO' : (valorPago > 0.009 ? 'PARCIAL' : 'PENDENTE'),
          data_quitacao: clampDate(parcela?.data_quitacao),
          pagamento_id: String(parcela?.pagamento_id || '').trim()
        };
      });
    }

    function buildFromPayload(payload, options = {}) {
      const base = clone(options.baseItem) || {};
      const id = String(options.id || base.ID || tempId()).trim();
      const totalPrevisto = round2(payload?.valor_total ?? base.valor_total ?? base.total_previsto);
      const totalPago = round2(base.total_pago);
      const totalPendente = round2(Math.max(0, totalPrevisto - totalPago));
      const parcelasDetalhe = buildParcelasDetalhe({
        ...payload,
        ID: id
      }, base);

      return {
        ...base,
        ID: id,
        ativo: true,
        descricao: String((payload?.descricao ?? base.descricao) || '').trim(),
        categoria: String((payload?.categoria ?? base.categoria) || '').trim(),
        fornecedor: String((payload?.fornecedor ?? base.fornecedor) || '').trim(),
        pago_por: String((payload?.pago_por ?? base.pago_por) || '').trim(),
        valor_total: totalPrevisto,
        data_competencia: clampDate(payload?.data_competencia ?? base.data_competencia),
        data_vencimento: clampDate(payload?.data_vencimento ?? base.data_vencimento),
        data_pagamento: clampDate(payload?.data_pagamento ?? base.data_pagamento),
        forma_pagamento: String((payload?.forma_pagamento ?? base.forma_pagamento) || '').trim(),
        forma_pagamento_padrao: String((payload?.forma_pagamento ?? base.forma_pagamento_padrao) || '').trim(),
        parcelas: Math.max(1, Math.floor(parseNumero((payload?.parcelas ?? base.parcelas) || parcelasDetalhe.length || 1) || 1)),
        parcelas_detalhe: parcelasDetalhe,
        fixo: !!(payload?.fixo ?? base.fixo),
        observacao: String((payload?.observacao ?? base.observacao) || '').trim(),
        total_previsto: totalPrevisto,
        total_pago: totalPago,
        total_pendente: totalPendente,
        status_pagamento: getStatusPagamento(totalPrevisto, totalPago),
        quantidade_pagamentos: Math.max(0, Number(base.quantidade_pagamentos || 0)),
        data_ultimo_pagamento: clampDate(base.data_ultimo_pagamento),
        forma_ultimo_pagamento: String(base.forma_ultimo_pagamento || '').trim()
      };
    }

    function applyPayment(item, payload, mutationId = '') {
      const base = limparMeta(item);
      const totalPrevisto = round2(base.total_previsto || base.valor_total);
      const valorPagoAtual = round2(base.total_pago);
      const incremento = round2(Math.min(parseNumero(payload?.valor_pago), Math.max(0, totalPrevisto - valorPagoAtual)));
      const totalPago = round2(valorPagoAtual + incremento);
      const totalPendente = round2(Math.max(0, totalPrevisto - totalPago));
      const dataPagamento = clampDate(payload?.data_pagamento);
      const formaPagamento = String(payload?.forma_pagamento || base.forma_pagamento || '').trim();
      const parcelaAlvoId = String(payload?.parcela_alvo_id || '').trim();

      const parcelas = (Array.isArray(base.parcelas_detalhe) ? clone(base.parcelas_detalhe) : []).map(parcela => {
        const valorPrevisto = round2(parcela?.valor_previsto);
        const valorPagoParcial = round2(parcela?.valor_pago);
        const valorPendenteParcial = round2(Math.max(0, valorPrevisto - valorPagoParcial));
        return {
          ...parcela,
          valor_previsto: valorPrevisto,
          valor_pago: valorPagoParcial,
          valor_pendente: valorPendenteParcial,
          status: valorPendenteParcial <= 0.009 ? 'PAGO' : (valorPagoParcial > 0.009 ? 'PARCIAL' : 'PENDENTE')
        };
      });

      if (incremento > 0 && parcelas.length > 0) {
        const idxParcela = parcelaAlvoId
          ? parcelas.findIndex(parcela => String(parcela?.ID || '').trim() === parcelaAlvoId)
          : parcelas.findIndex(parcela => round2(parcela?.valor_pendente) > 0.009);
        if (idxParcela >= 0) {
          const atual = parcelas[idxParcela];
          const pagoParcela = round2(Math.min(round2(atual.valor_pendente) + round2(atual.valor_pago), round2(atual.valor_pago) + incremento));
          const pendenteParcela = round2(Math.max(0, round2(atual.valor_previsto) - pagoParcela));
          parcelas[idxParcela] = {
            ...atual,
            valor_pago: pagoParcela,
            valor_pendente: pendenteParcela,
            status: pendenteParcela <= 0.009 ? 'PAGO' : 'PARCIAL',
            data_quitacao: pendenteParcela <= 0.009 ? dataPagamento : String(atual?.data_quitacao || '').trim(),
            pagamento_id: String(atual?.pagamento_id || (mutationId ? `TMPPG_${mutationId}` : '')).trim()
          };
        }
      }

      return {
        ...base,
        forma_pagamento: formaPagamento || base.forma_pagamento,
        forma_pagamento_padrao: formaPagamento || base.forma_pagamento_padrao,
        data_pagamento: dataPagamento || base.data_pagamento,
        data_ultimo_pagamento: dataPagamento || base.data_ultimo_pagamento,
        forma_ultimo_pagamento: formaPagamento || base.forma_ultimo_pagamento,
        total_previsto: totalPrevisto,
        total_pago: totalPago,
        total_pendente: totalPendente,
        status_pagamento: getStatusPagamento(totalPrevisto, totalPago),
        quantidade_pagamentos: Math.max(0, Number(base.quantidade_pagamentos || 0)) + (incremento > 0 ? 1 : 0),
        parcelas_detalhe: parcelas
      };
    }

    function getUiState(item) {
      const status = normalizarLocalStatus(item?._localStatus);
      const action = String(item?._localAction || '').trim().toLowerCase();
      if (!status) {
        return {
          status: '',
          action: '',
          label: '',
          message: '',
          canRetry: false,
          blockActions: false
        };
      }

      if (status === 'conflict') {
        const label = action === 'delete'
          ? 'Conflito ao excluir'
          : action === 'payment'
            ? 'Conflito no pagamento'
            : 'Conflito de sincronizacao';
        return {
          status: 'conflict',
          action,
          label,
          message: String(item?._localErrorMessage || '').trim() || 'O item foi alterado em outro lugar. Revise e tente novamente.',
          canRetry: !!item?._localMutationId,
          blockActions: true
        };
      }

      if (status === 'error') {
        const label = action === 'delete'
          ? 'Falha ao excluir'
          : action === 'payment'
            ? 'Falha no pagamento'
            : 'Falha na sincronizacao';
        return {
          status: 'error',
          action,
          label,
          message: String(item?._localErrorMessage || '').trim(),
          canRetry: !!item?._localMutationId,
          blockActions: true
        };
      }

      if (status === 'offline') {
        return {
          status: 'offline',
          action,
          label: 'Aguardando conexao',
          message: 'A alteracao sera reenviada quando a conexao voltar.',
          canRetry: !!item?._localMutationId,
          blockActions: true
        };
      }

      if (status === 'paused') {
        return {
          status: 'paused',
          action,
          label: 'Reenvio automatico',
          message: obterMensagemReenvio(item?._localRetryAt),
          canRetry: !!item?._localMutationId,
          blockActions: true
        };
      }

      const label = action === 'delete'
        ? 'Exclusao pendente'
        : action === 'payment'
          ? 'Pagamento pendente'
          : 'Sincronizando';

      return {
        status: 'pending',
        action,
        label,
        message: '',
        canRetry: false,
        blockActions: true
      };
    }

    function localizarIndex(lista, ids = []) {
      const chaves = ids
        .map(valor => String(valor || '').trim())
        .filter(Boolean);
      if (chaves.length === 0) return -1;
      return (Array.isArray(lista) ? lista : []).findIndex(item => {
        const id = String(item?.ID || '').trim();
        return !!id && chaves.includes(id);
      });
    }

    function upsert(lista, item, extraIds = []) {
      const arr = Array.isArray(lista) ? clone(lista) : [];
      const base = clone(item);
      if (!base) return arr;
      const idx = localizarIndex(arr, [base.ID, ...extraIds]);
      if (idx >= 0) {
        arr[idx] = base;
      } else {
        arr.unshift(base);
      }
      return arr;
    }

    function remove(lista, ids = []) {
      const chaves = ids
        .map(valor => String(valor || '').trim())
        .filter(Boolean);
      if (chaves.length === 0) return Array.isArray(lista) ? clone(lista) : [];
      return (Array.isArray(lista) ? clone(lista) : []).filter(item => {
        const id = String(item?.ID || '').trim();
        return !id || !chaves.includes(id);
      });
    }

    function canonicalSuccessItem(entry, detail = {}) {
      const meta = entry?.meta || {};
      if (meta.action === 'create' && detail?.result && typeof detail.result === 'object') {
        return limparMeta(detail.result);
      }
      if (meta.action === 'payment' && detail?.result?.despesaAtualizada) {
        return limparMeta(detail.result.despesaAtualizada);
      }
      if (meta.action === 'update' && detail?.result && typeof detail.result === 'object' && detail.result.ID) {
        return limparMeta(detail.result);
      }

  function createEntityMutationHelper() {
    const META_KEYS = [
      '_localStatus',
      '_localAction',
      '_localMutationId',
      '_localErrorMessage',
      '_localErrorKind',
      '_localRetryAt',
      '_localRetryable',
      '_localDeleted',
      '_localSource'
    ];

    function clone(value) {
      if (value == null) return value;
      try {
        return JSON.parse(JSON.stringify(value));
      } catch (error) {
        return value;
      }
    }

    function parseNumero(valor) {
      if (window.AppDomainUtils?.parseNumeroZero) {
        return window.AppDomainUtils.parseNumeroZero(valor);
      }
      const raw = String(valor ?? '').trim();
      if (!raw) return 0;
      const num = Number(raw.replace(',', '.'));
      return Number.isFinite(num) ? num : 0;
    }

    function round2(valor) {
      return Math.round(parseNumero(valor) * 100) / 100;
    }

    function clampDate(valor) {
      const raw = String(valor || '').trim();
      return /^\d{4}-\d{2}-\d{2}$/.test(raw) ? raw : '';
    }

    function getFinancialStatus(totalPrevisto, totalPago) {
      const previsto = round2(totalPrevisto);
      const pago = round2(totalPago);
      const pendente = round2(Math.max(0, previsto - pago));
      if (pendente <= 0.009) return 'PAGO';
      if (pago > 0.009) return 'PARCIAL';
      return 'PENDENTE';
    }

    function tempId(prefix = 'TMP') {
      return `${prefix}_${Date.now()}_${Math.floor(Math.random() * 100000)}`;
    }

    function limparMeta(item) {
      const base = clone(item) || {};
      META_KEYS.forEach(key => {
        delete base[key];

      return base;
    }

    function normalizarLocalStatus(status) {
      const valor = String(status || '').trim().toLowerCase();
      if (['pending', 'sending', 'paused', 'offline', 'error', 'conflict'].includes(valor)) {
        return valor;
      }
      return '';
    }

    function ehStatusMutacaoAtivo(status) {
      return !!normalizarLocalStatus(status);
    }

    function ehRetryManualDisponivel(status) {
      return ['paused', 'offline', 'error', 'conflict'].includes(normalizarLocalStatus(status));
    }

    function obterMensagemReenvio(retryAt) {
      const alvo = Math.max(0, Number(retryAt || 0));
      if (!alvo) return 'Nova tentativa em instantes.';
      const diffSeg = Math.max(0, Math.ceil((alvo - Date.now()) / 1000));
      if (diffSeg <= 1) return 'Nova tentativa em instantes.';
      return `Nova tentativa em ${diffSeg}s.`;
    }

    function resolverStatusDetalhe(detail) {
      const tipo = normalizarLocalStatus(detail?.type);
      if (tipo && tipo !== 'pending') return tipo;
      const entryStatus = normalizarLocalStatus(detail?.entry?.status);
      if (entryStatus) return entryStatus;
      return 'pending';
    }

    function aplicarMeta(item, opcoes = {}) {
      const base = limparMeta(item);
      const status = normalizarLocalStatus(opcoes.status);
      if (!status) return base;
      base._localStatus = status;
      base._localAction = String(opcoes.action || '').trim();
      base._localMutationId = String(opcoes.mutationId || '').trim();
      base._localErrorMessage = String(opcoes.errorMessage || '').trim();
      base._localErrorKind = String(opcoes.errorKind || '').trim().toLowerCase();
      base._localRetryAt = Math.max(0, Number(opcoes.retryAt || 0));
      base._localRetryable = opcoes.retryable !== false;
      base._localDeleted = !!opcoes.localDeleted;
      base._localSource = String(opcoes.source || '').trim();
      return base;
    }

    function getUiState(item, options = {}) {
      const status = normalizarLocalStatus(item?._localStatus);
      const action = String(item?._localAction || '').trim().toLowerCase();
      if (!status) {
        return {
          status: '',
          action: '',
          label: '',
          message: '',
          canRetry: false,
          blockActions: false
        };
      }

      const pendingLabels = options.pendingLabels || {};
      const sendingLabels = options.sendingLabels || pendingLabels;
      const offlineLabels = options.offlineLabels || {};
      const pausedLabels = options.pausedLabels || {};
      const conflictLabels = options.conflictLabels || {};
      const errorLabels = options.errorLabels || {};
      const pendingFallback = String(options.pendingFallback || 'Sincronizando').trim() || 'Sincronizando';
      const sendingFallback = String(options.sendingFallback || pendingFallback).trim() || pendingFallback;
      const offlineFallback = String(options.offlineFallback || 'Aguardando conexao').trim() || 'Aguardando conexao';
      const pausedFallback = String(options.pausedFallback || 'Reenvio automatico').trim() || 'Reenvio automatico';
      const conflictFallback = String(options.conflictFallback || 'Conflito de sincronizacao').trim() || 'Conflito de sincronizacao';
      const errorFallback = String(options.errorFallback || 'Falha na sincronizacao').trim() || 'Falha na sincronizacao';

      if (status === 'conflict') {
        return {
          status: 'conflict',
          action,
          label: String(conflictLabels[action] || conflictFallback).trim() || conflictFallback,
          message: String(item?._localErrorMessage || options.conflictMessage || '').trim() || 'O registro foi alterado em outro lugar. Revise e tente novamente.',
          canRetry: !!item?._localMutationId,
          blockActions: options.blockActionsOnError !== false
        };
      }

      if (status === 'error') {
        return {
          status: 'error',
          action,
          label: String(errorLabels[action] || errorFallback).trim() || errorFallback,
          message: String(item?._localErrorMessage || '').trim(),
          canRetry: !!item?._localMutationId,
          blockActions: options.blockActionsOnError !== false
        };
      }

      if (status === 'offline') {
        return {
          status: 'offline',
          action,
          label: String(offlineLabels[action] || offlineFallback).trim() || offlineFallback,
          message: String(options.offlineMessage || '').trim() || 'A alteracao sera reenviada quando a conexao voltar.',
          canRetry: !!item?._localMutationId,
          blockActions: options.blockActionsOnPending !== false
        };
      }

      if (status === 'paused') {
        return {
          status: 'paused',
          action,
          label: String(pausedLabels[action] || pausedFallback).trim() || pausedFallback,
          message: String(options.pausedMessage || '').trim() || obterMensagemReenvio(item?._localRetryAt),
          canRetry: !!item?._localMutationId,
          blockActions: options.blockActionsOnPending !== false
        };
      }

      return {
        status: 'pending',
        action,
        label: String((status === 'sending' ? sendingLabels[action] : pendingLabels[action]) || (status === 'sending' ? sendingFallback : pendingFallback)).trim()
          || (status === 'sending' ? sendingFallback : pendingFallback),
        message: '',
        canRetry: false,
        blockActions: options.blockActionsOnPending !== false
      };
    }

    function getId(item, idKey = 'ID') {
      return String(item?.[idKey] || '').trim();
    }

    function localizarIndex(lista, idKey, ids = []) {
      const chaves = ids
        .map(valor => String(valor || '').trim())
        .filter(Boolean);
      if (chaves.length === 0) return -1;
      return (Array.isArray(lista) ? lista : []).findIndex(item => {
        const id = getId(item, idKey);
        return !!id && chaves.includes(id);
      });
    }

    function upsert(lista, item, options = {}) {
      const arr = Array.isArray(lista) ? clone(lista) : [];
      const base = clone(item);
      if (!base) return arr;
      const idKey = String(options.idKey || 'ID').trim() || 'ID';
      const extraIds = Array.isArray(options.extraIds) ? options.extraIds : [];
      const idx = localizarIndex(arr, idKey, [getId(base, idKey), ...extraIds]);
      if (idx >= 0) {
        arr[idx] = base;
      } else {
        arr.unshift(base);
      }
      return arr;

    function remove(lista, idKey, ids = []) {
      const chaves = ids
        .map(valor => String(valor || '').trim())
        .filter(Boolean);
      if (chaves.length === 0) return Array.isArray(lista) ? clone(lista) : [];
      return (Array.isArray(lista) ? clone(lista) : []).filter(item => {
        const id = getId(item, idKey);
        return !id || !chaves.includes(id);

    function applyEntryToList(lista, detail = {}, options = {}) {
      const entry = detail.entry || {};
      const meta = entry.meta || {};
      const domain = String(options.domain || '').trim();
      if (domain && String(meta.domain || '').trim() !== domain) {
        return Array.isArray(lista) ? clone(lista) : [];
      }

      const type = String(detail.type || '').trim().toLowerCase();
      const action = String(meta.action || '').trim().toLowerCase();
      const idKey = String(options.idKey || meta.idKey || 'ID').trim() || 'ID';
      const beforeItem = clone(meta.before_item);
      const optimisticItem = clone(meta.optimistic_item);
      const idsRelacionados = [
        getId(optimisticItem, idKey),
        getId(beforeItem, idKey),
        meta.target_id,
        meta.temp_id,
        meta.optimistic_id
      ];

      if (type === 'success') {
        if (action === 'delete') {
          return remove(lista, idKey, idsRelacionados);
        }
        const canonical = canonicalSuccessItem(entry, detail, {
          ...options,
          idKey
        });
        return upsert(remove(lista, idKey, idsRelacionados), canonical, {
          idKey,
          extraIds: idsRelacionados
        });
      }

      if (type === 'discarded') {
        if (action === 'create') {
          return remove(lista, idKey, idsRelacionados);
        }
        if (beforeItem) {
          return upsert(remove(lista, idKey, idsRelacionados), limparMeta(beforeItem), {
            idKey,
            extraIds: idsRelacionados
          });
        }
        return remove(lista, idKey, idsRelacionados);
      }

      const statusAtual = resolverStatusDetalhe(detail);
      const withMeta = aplicarMeta(optimisticItem || beforeItem, {
        status: statusAtual,
        action,
        mutationId: entry.id,
        errorMessage: detail.errorMessage || entry.errorMessage,
        errorKind: entry.errorKind,
        retryAt: entry.retryAt,
        retryable: ehRetryManualDisponivel(statusAtual),
        localDeleted: action === 'delete',
        source: meta.source
      });
      return upsert(lista, withMeta, {
        idKey,
        extraIds: idsRelacionados
      });
    }

    function mergeFetchedList(listaBase, entriesAtivas, options = {}) {
      let atual = Array.isArray(listaBase) ? clone(listaBase).map(limparMeta) : [];
      (Array.isArray(entriesAtivas) ? entriesAtivas : []).forEach(entry => {
        const status = normalizarLocalStatus(entry?.status);
        if (!entry || !ehStatusMutacaoAtivo(status)) {

        atual = applyEntryToList(atual, {
          type: status || 'pending',
          entry,
          errorMessage: entry.errorMessage
        }, options);
      });
      return atual;

      clone,
      parseNumero,
      round2,
      clampDate,
      getFinancialStatus,
      tempId,

      getUiState,
      applyEntryToList,
      mergeFetchedList

  function createUserAccessHelper() {
    let contexto = null;
    let inFlight = null;
    let mutationLockToken = null;
    const ACCESS_TEMP_HIDDEN_ATTR = 'data-access-temp-hidden';

    function aplicarTelaAcesso(ctx) {
      const bloqueado = ctx?.can_read === false;
      const painel = document.getElementById('appAccessDenied');
      const emailEl = document.getElementById('appAccessDeniedEmail');
      const msgEl = document.getElementById('appAccessDeniedMsg');

      if (emailEl) {
        emailEl.textContent = String(ctx?.email || '-').trim() || '-';
      }
      if (msgEl) {
        msgEl.textContent = bloqueado
          ? (String(ctx?.motivo || '').trim() || 'Seu usuario nao possui permissao para acessar os dados deste app.')
          : 'Seu usuario nao possui permissao para acessar os dados deste app.';
      }
      if (painel) {
        painel.classList.toggle('hidden', !bloqueado);
      }

      const alvos = document.querySelectorAll('.navbar, .app-workspace-header, #appBootSkeleton, #appDbEnvBanner, #appSyncBanner, .top-bar, #painelFiltroEstoque, #painelFiltroCompras, .aba, .bottom-bar, .mobile-bottom-nav');
      if (bloqueado) {
        alvos.forEach(el => {
          if (!el.classList.contains('hidden')) {
            el.setAttribute(ACCESS_TEMP_HIDDEN_ATTR, '1');
            el.classList.add('hidden');
            return;
          }
          el.removeAttribute(ACCESS_TEMP_HIDDEN_ATTR);
        });
        return;
      }

      alvos.forEach(el => {
        if (el.getAttribute(ACCESS_TEMP_HIDDEN_ATTR) !== '1') return;
        el.classList.remove('hidden');
        el.removeAttribute(ACCESS_TEMP_HIDDEN_ATTR);
      });
    }

    function normalizarContexto(raw) {
      const base = raw && typeof raw === 'object' ? raw : {};
      const canRead = base.can_read !== false;
      const canWrite = canRead && base.can_write === true;
      const motivo = String(base.motivo || '').trim();
      return {
        ...base,
        can_read: canRead,
        can_write: canWrite,
        read_only: !canWrite,
        role: String(base.role || (canWrite ? 'admin' : 'viewer') || '').trim(),
        motivo: canRead
          ? (canWrite ? '' : (motivo || 'Perfil somente leitura.'))
          : (motivo || 'Usuario sem permissao para visualizar os dados.')
      };
    }

    function sincronizarBloqueioMutacao(canWrite) {
      if (canWrite) {
        if (mutationLockToken && window.AppMutationUI?.unlock) {
          window.AppMutationUI.unlock(mutationLockToken);
          mutationLockToken = null;
        }
        return;
      }

      if (!mutationLockToken && window.AppMutationUI?.lock) {
        mutationLockToken = window.AppMutationUI.lock();
      }
    }

    function aplicar(raw) {
      const ctx = normalizarContexto(raw);
      contexto = ctx;

      if (window.AppRuntime?.setAccessReadOnly) {
        window.AppRuntime.setAccessReadOnly(ctx.read_only, ctx.motivo);
      } else if (window.AppRuntime?.setReadOnly) {
        window.AppRuntime.setReadOnly(ctx.read_only, ctx.motivo);
      }

      sincronizarBloqueioMutacao(ctx.can_write);
      aplicarTelaAcesso(ctx);

      if (typeof window !== 'undefined') {
        try {
          window.dispatchEvent(new CustomEvent('app:user:context-changed', {
            detail: ctx
          }));
        } catch (error) {
          // sem acao
        }
      }

      return ctx;
    }

    function getContext() {
      return contexto;
    }

    function load(options = {}) {
      const force = !!options.force;
      if (inFlight && !force) return inFlight;

      // Ate validar o perfil, fica bloqueado por seguranca.
      aplicar({
        can_write: false,
        role: 'viewer',
        motivo: 'Validando perfil de acesso...'
      });

      if (!window.google?.script?.run) {
        const offline = aplicar({
          can_read: false,
          can_write: false,
          role: 'viewer',
          motivo: 'Sem conexao com backend - nao foi possivel validar seu acesso.'
        });
        return Promise.resolve(offline);
      }

      inFlight = new Promise(resolve => {
        window.AppRequest.call('obterContextoUsuario', [force], {
          context: 'user.access.load',
          errorMessage: 'Falha ao validar perfil de acesso.'
        })
          .then(raw => {
            resolve(aplicar(raw || {}));
          })
          .catch(err => {
            const mensagem = String(err?.message || err || '').trim();
            resolve(aplicar({
              can_read: false,
              can_write: false,
              role: 'viewer',
              motivo: mensagem || 'Falha ao validar perfil de acesso.'
            }));
          });
      }).finally(() => {
        inFlight = null;
      });

      return inFlight;
    }

    return {
      load,
      apply: aplicar,
      getContext
    };
  }

  function createPerfHelper() {
    const historico = [];
    function lerFlagDebugPerf() {
      try {
        const params = new URLSearchParams(window.location.search || '');
        const q = String(params.get('debugPerf') || params.get('perf') || '').trim().toLowerCase();
        if (q === '1' || q === 'true' || q === 'on' || q === 'yes') return true;
        if (q === '0' || q === 'false' || q === 'off' || q === 'no') return false;
      } catch (error) {
        // sem acao
      }

      try {
        if (!window.localStorage) return false;
        const raw = window.localStorage.getItem('APP_DEBUG_PERF');
        if (raw === null) return false;
        const v = String(raw || '').trim().toLowerCase();
        return v === '1' || v === 'true' || v === 'on' || v === 'yes';
      } catch (error) {
        return false;
      }
    }

    let ativo = lerFlagDebugPerf();
    const LIMITE_HIST = 300;
    const MIN_LOG_MS = 16;

    function agora() {
      if (typeof performance !== 'undefined' && performance.now) {
        return performance.now();
      }
      return Date.now();
    }

    function start(label, meta) {
      if (!ativo) return null;
      return {
        label: String(label || '').trim() || 'sem-label',
        t0: agora(),
        meta: meta || {}
      };
    }

    function end(token, extra) {
      if (!ativo || !token || !token.label) return 0;
      const ms = agora() - Number(token.t0 || 0);
      const entrada = {
        ts: new Date().toISOString(),
        label: token.label,
        ms: Number(ms.toFixed(2)),
        meta: { ...(token.meta || {}), ...(extra || {}) }
      };
      historico.push(entrada);
      if (historico.length > LIMITE_HIST) historico.shift();

      if (ativo && ms >= MIN_LOG_MS && typeof console !== 'undefined' && console.log) {
        console.log(`[perf] ${entrada.label}: ${entrada.ms}ms`, entrada.meta);
      }
      return ms;
    }

    function measure(label, fn, meta) {
      if (!ativo) {
        return fn();
      }
      const token = start(label, meta);
      try {
        const out = fn();
        if (out && typeof out.then === 'function') {
          return Promise.resolve(out).then(
            value => {
              end(token, { async: true });
              return value;
            },
            error => {
              end(token, {
                async: true,
                erro: true,
                mensagem: String(error?.message || '')
              });
              throw error;
            }
          );
        }
        end(token);
        return out;
      } catch (error) {
        end(token, { erro: true, mensagem: error?.message || '' });
        throw error;
      }
    }

    function setEnabled(v) {
      ativo = !!v;
    }

    function isEnabled() {
      return !!ativo;
    }

    function getHistory() {
      return historico.slice();
    }

    function clear() {
      historico.length = 0;
    }

    return {
      start,
      end,
      measure,
      setEnabled,
      isEnabled,
      getHistory,
      clear
    };
  }

  function createSyncStatusHelper() {
    let seq = 0;
    const ativos = new Map();
    const hints = new Map();
    let elWrap = null;
    let elTexto = null;
    let acaoAtual = null;
    let eventosBannerRegistrados = false;

    function executarAcaoAtual() {
      if (typeof acaoAtual !== 'function') return;
      try {
        acaoAtual();
      } catch (error) {
        if (typeof console !== 'undefined' && console.warn) {
          console.warn('[sync] erro ao executar acao do aviso', error);
        }
      }
    }

    function garantirElemento() {
      if (elWrap && document.body?.contains(elWrap)) return;
      elWrap = document.getElementById('appSyncBanner');
      if (!elWrap) return;
      elTexto = document.getElementById('appSyncBannerText');
      if (!elTexto) {
        elTexto = document.createElement('span');
        elTexto.id = 'appSyncBannerText';
        elWrap.appendChild(elTexto);
      }
      if (!eventosBannerRegistrados) {
        elWrap.addEventListener('click', event => {
          if (typeof acaoAtual !== 'function') return;
          event.preventDefault();
          executarAcaoAtual();
        });
        elWrap.addEventListener('keydown', event => {
          if (typeof acaoAtual !== 'function') return;
          const tecla = String(event?.key || '').toLowerCase();
          if (tecla !== 'enter' && tecla !== ' ' && tecla !== 'spacebar') return;
          event.preventDefault();
          executarAcaoAtual();
        });
        eventosBannerRegistrados = true;
      }
    }

    function render() {
      garantirElemento();
      if (!elWrap || !elTexto) return;

      const abaAtiva = obterNomeAbaAtiva();
      const listaAtivos = [...ativos.values()];
      const ativosDaAba = abaAtiva
        ? listaAtivos.filter(item => String(item?.aba || '').trim() === abaAtiva)
        : [];
      const alvoAtivo = ativosDaAba.length > 0 ? ativosDaAba[0] : listaAtivos[0];
      const listaHints = [...hints.values()].filter(item => !!String(item?.texto || '').trim());
      const hintsDaAba = abaAtiva
        ? listaHints.filter(item => String(item?.aba || '').trim() === abaAtiva)
        : [];
      const hintGlobal = listaHints.find(item => !String(item?.aba || '').trim()) || null;
      const alvoHint = hintsDaAba[0] || hintGlobal || listaHints[0] || null;
      const alvo = alvoAtivo || alvoHint;

      if (!alvo) {
        acaoAtual = null;
        elWrap.classList.add('hidden');
        elWrap.classList.remove('app-sync-banner-clickable');
        elWrap.removeAttribute('data-aba-sync');
        elWrap.removeAttribute('data-sync-kind');
        elWrap.removeAttribute('tabindex');
        elWrap.setAttribute('role', 'status');
        elWrap.removeAttribute('aria-label');
        return;
      }

      const abaAlvo = String(alvo?.aba || '').trim();
      const texto = String(alvo?.texto || '').trim();
      const kind = String(alvo?.kind || '').trim();
      const labelAba = obterLabelAbaSync(abaAlvo);
      acaoAtual = typeof alvo?.onClick === 'function' ? alvo.onClick : null;

      elTexto.textContent = texto || `Sincronizando ${labelAba}...`;
      if (abaAlvo) {
        elWrap.setAttribute('data-aba-sync', abaAlvo);
      } else {
        elWrap.removeAttribute('data-aba-sync');
      }
      if (kind) {
        elWrap.setAttribute('data-sync-kind', kind);
      } else {
        elWrap.removeAttribute('data-sync-kind');
      }
      if (acaoAtual) {
        elWrap.classList.add('app-sync-banner-clickable');
        elWrap.setAttribute('tabindex', '0');
        elWrap.setAttribute('role', 'button');
        elWrap.setAttribute('aria-label', `${texto || `Sincronizando ${labelAba}`} Abrir item relacionado.`);
      } else {
        elWrap.classList.remove('app-sync-banner-clickable');
        elWrap.removeAttribute('tabindex');
        elWrap.setAttribute('role', 'status');
        elWrap.removeAttribute('aria-label');
      }
      elWrap.classList.remove('hidden');
    }

    function iniciar(aba, texto = '') {
      const token = `sync_${++seq}`;
      const abaNormalizada = normalizarNomeAba(aba);
      const textoNormalizado = String(texto || '').trim();
      ativos.set(token, {
        aba: abaNormalizada,
        texto: textoNormalizado
      });
      render();
      window.AppDiag?.mark?.('sync.banner.start', {
        token,
        aba: abaNormalizada,
        texto: textoNormalizado
      });
      return token;
    }

    function finalizar(token) {
      if (!token) return;
      const item = ativos.get(token);
      const removido = ativos.delete(token);
      render();
      window.AppDiag?.mark?.('sync.banner.end', {
        token: String(token || ''),
        removed: !!removido,
        aba: String(item?.aba || '')
      });
    }

    function limparAba(aba) {
      const alvo = normalizarNomeAba(aba);
      if (!alvo) return;
      [...ativos.keys()].forEach(token => {
        const item = ativos.get(token);
        if (String(item?.aba || '').trim() !== alvo) return;
        ativos.delete(token);
      });
      render();
    }

    function setHint(key, payload = {}) {
      const chave = String(key || '').trim();
      if (!chave) return;
      const texto = String(payload?.texto || '').trim();
      if (!texto) {
        hints.delete(chave);
        render();
        return;
      }
      hints.set(chave, {
        aba: normalizarNomeAba(payload?.aba),
        texto,
        kind: String(payload?.kind || '').trim(),
        onClick: typeof payload?.onClick === 'function' ? payload.onClick : null
      });
      render();
    }

    function clearHint(key) {
      const chave = String(key || '').trim();
      if (!chave) return;
      hints.delete(chave);
      render();
    }

    function refresh() {
      render();
    }

    return {
      iniciar,
      finalizar,
      limparAba,
      setHint,
      clearHint,
      refresh
    };
  }
