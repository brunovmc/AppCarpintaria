  function abrirEntradaOutbox(entryOrId) {
    const entry = typeof entryOrId === 'string'
      ? window.AppOptimistic?.get?.(entryOrId)
      : entryOrId;
    if (!entry) {
      if (typeof mostrarToast === 'function') mostrarToast('Falha local nao encontrada.', 'erro');
      return false;
    }
    const aba = obterAbaEntradaOutbox(entry);
    if (!aba) {
      if (typeof mostrarToast === 'function') mostrarToast('Nao consegui identificar a aba da falha.', 'erro');
      return false;
    }
    if (typeof trocarAba === 'function') {
      trocarAba(aba);
    }
    setTimeout(() => tentarLocalizarEntradaOutbox(entry), 280);
    return true;
  }

  window.AppOutboxLocator = {
    ...(window.AppOutboxLocator || {}),
    open: abrirEntradaOutbox
  };

  function criarNavegadorRegistros() {
    const ROTULOS_ABA = {
      estoque: 'Estoque',
      compras: 'Compras',
      vendas: 'Vendas',
      investimentos: 'Investimentos',
      despesas: 'Despesas',
      produtos: 'Produtos',
      producao: 'Producao'
    };
    let navegacaoSeq = 0;
    let suspensaoAtiva = null;
    let navegacaoEmVoo = null;
    let navegacaoFixada = null;
    let destinoTrocaInterna = '';

    function esperar(ms) {
      return new Promise(resolve => setTimeout(resolve, Math.max(0, Number(ms) || 0)));
    }

    function raizAba(aba) {
      return document.getElementById(`aba-${aba}`) || null;
    }

    function encontrarRegistro(aba, id) {
      const raiz = raizAba(aba);
      const registroId = String(id || '').trim();
      if (!raiz || !registroId) return null;
      return raiz.querySelector(`[data-id="${escaparCssAttr(registroId)}"]`);
    }

    async function aguardarRegistro(aba, id, timeoutMs = 900) {
      const inicio = Date.now();
      let alvo = encontrarRegistro(aba, id);
      while (!alvo && (Date.now() - inicio) < timeoutMs) {
        await esperar(70);
        alvo = encontrarRegistro(aba, id);
      }
      return alvo;
    }

    async function localizarComPaginacao(aba, id) {
      let alvo = await aguardarRegistro(aba, id, 1100);
      if (alvo) return alvo;

      const raiz = raizAba(aba);
      if (!raiz) return null;
      for (let pagina = 0; pagina < 40; pagina += 1) {
        const btnMais = raiz.querySelector('.btn-carregar-mais:not(:disabled)');
        if (!btnMais) break;
        btnMais.click();
        alvo = await aguardarRegistro(aba, id, 650);
        if (alvo) return alvo;
      }
      return aguardarRegistro(aba, id, 350);
    }

    function obterControllerAba(aba) {
      const mapa = {
        estoque: window.EstoqueController,
        compras: window.ComprasController,
        vendas: window.VendasController,
        investimentos: window.InvestimentosController,
        despesas: window.DespesasController,
        produtos: window.ProdutosController,
        producao: window.ProducaoController
      };
      return mapa[aba] || null;
    }

    function normalizarRestauracaoHook(resultado) {
      if (typeof resultado === 'function') return resultado;
      if (resultado && typeof resultado.restore === 'function') {
        return () => resultado.restore();
      }
      return null;
    }

    async function tentarHookPublico(aba, id) {
      const controller = obterControllerAba(aba);
      if (!controller) return { usado: false, restaurar: null };
      const hook = controller.revealRecord || controller.revelarRegistro || controller.prepararNavegacaoRegistro;
      if (typeof hook !== 'function') return { usado: false, restaurar: null };
      try {
        const resultado = await Promise.resolve(hook.call(controller, {
          id: String(id || '').trim(),
          source: 'record-navigator'
        }));
        return {
          usado: true,
          restaurar: normalizarRestauracaoHook(resultado)
        };
      } catch (error) {
        window.AppDiag?.mark?.('nav.record.reveal_hook_error', {
          tab: aba,
          message: String(error?.message || error || '')
        });
        return { usado: true, restaurar: null };
      }
    }

    function configBuscaAba(aba) {
      if (aba === 'estoque') {
        return {
          state: buscaState,
          campos: {
            texto: 'buscaEstoque',
            tipo: 'filtroTipo',
            categoria: 'filtroCategoria',
            unidade: 'filtroUnidade'
          },
          aplicar: aplicarBuscaEstoque,
          atualizarTipo: valor => window.EstoqueUI?.marcarTipoRapidoAtivo?.(valor)
        };
      }
      if (aba === 'compras') {
        return {
          state: buscaStateCompras,
          campos: {
            texto: 'buscaCompras',
            tipo: 'filtroTipoCompras',
            categoria: 'filtroCategoriaCompras',
            unidade: 'filtroUnidadeCompras'
          },
          aplicar: aplicarBuscaCompras,
          atualizarTipo: valor => window.ComprasUI?.marcarTipoRapidoAtivo?.(valor)
        };
      }
      if (aba === 'vendas') {
        return {
          state: buscaStateVendas,
          campos: { texto: 'buscaVendas' },
          aplicar: aplicarBuscaVendas
        };
      }
      if (aba === 'investimentos') {
        return {
          state: buscaStateInvestimentos,
          campos: { texto: 'buscaInvestimentos' },
          aplicar: aplicarBuscaInvestimentos
        };
      }
      if (aba === 'produtos') {
        return {
          state: buscaStateProdutos,
          campos: { texto: 'buscaProdutos' },
          aplicar: aplicarBuscaProdutos
        };
      }
      if (aba === 'producao') {
        return {
          state: buscaStateProducao,
          campos: { texto: 'buscaProducao' },
          aplicar: aplicarBuscaProducao
        };
      }
      return null;
    }

    function suspenderBuscaAba(aba) {
      const config = configBuscaAba(aba);
      if (!config?.state || typeof config.aplicar !== 'function') return null;
      const snapshot = {};
      let alterou = false;

      Object.keys(config.campos).forEach(chave => {
        const valor = String(config.state[chave] || '');
        snapshot[chave] = valor;
        if (valor.trim()) alterou = true;
      });
      if (!alterou) return null;

      Object.keys(config.campos).forEach(chave => {
        config.state[chave] = '';
        const campo = document.getElementById(config.campos[chave]);
        if (campo) campo.value = '';
      });
      config.atualizarTipo?.('');
      config.aplicar();

      return () => {
        const usuarioAlterouFiltros = Object.keys(config.campos)
          .some(chave => String(config.state[chave] || '').trim() !== '');
        if (usuarioAlterouFiltros) return;
        Object.keys(config.campos).forEach(chave => {
          config.state[chave] = snapshot[chave];
          const campo = document.getElementById(config.campos[chave]);
          if (campo) campo.value = snapshot[chave];
        });
        config.atualizarTipo?.(snapshot.tipo || '');
        config.aplicar();
      };
    }

    function aplicarFiltrosEstruturadosDespesas(valores) {
      const ids = [
        'filtroDespesaStatus',
        'filtroDespesaPagoPor',
        'filtroDespesaCategoria',
        'filtroDespesaFornecedor'
      ];
      const campos = ids.map(id => document.getElementById(id)).filter(Boolean);
      campos.forEach((campo, index) => {
        campo.value = String(valores[index] || '');
      });
      if (campos[0]) {
        campos[0].dispatchEvent(new Event('change', { bubbles: true }));
      }
    }

    function suspenderFiltrosDespesas() {
      const inputBusca = document.getElementById('buscaDespesas');
      const ids = [
        'filtroDespesaStatus',
        'filtroDespesaPagoPor',
        'filtroDespesaCategoria',
        'filtroDespesaFornecedor'
      ];
      const texto = String(buscaStateDespesas.texto || inputBusca?.value || '');
      const estruturados = ids.map(id => String(document.getElementById(id)?.value || ''));
      if (!texto.trim() && estruturados.every(valor => !valor.trim())) return null;

      buscaStateDespesas.texto = '';
      if (inputBusca) inputBusca.value = '';
      aplicarFiltrosEstruturadosDespesas(['', '', '', '']);
      window.DespesasController?.setFiltroTexto?.('');

      return () => {
        const usuarioAlterouFiltros = String(buscaStateDespesas.texto || '').trim() !== '' || ids
          .some(id => String(document.getElementById(id)?.value || '').trim() !== '');
        if (usuarioAlterouFiltros) return;
        buscaStateDespesas.texto = texto;
        if (inputBusca) inputBusca.value = texto;
        aplicarFiltrosEstruturadosDespesas(estruturados);
        window.DespesasController?.setFiltroTexto?.(texto);
      };
    }

    function suspenderFiltrosNativos(aba) {
      return aba === 'despesas'
        ? suspenderFiltrosDespesas()
        : suspenderBuscaAba(aba);
    }

    function exibirComprasAdicionadas() {
      const raiz = raizAba('compras');
      const botao = raiz?.querySelector?.('.compras-separador-acao');
      const texto = String(botao?.textContent || '').trim().toLowerCase();
      if (!botao || !texto.startsWith('ver adicionadas')) return null;
      botao.click();
      return () => {
        const atual = raizAba('compras')?.querySelector?.('.compras-separador-acao');
        if (String(atual?.textContent || '').trim().toLowerCase().startsWith('ocultar')) {
          atual.click();
        }
      };
    }

    function executarRestauracoes(restauracoes) {
      [...(Array.isArray(restauracoes) ? restauracoes : [])].reverse().forEach(restaurar => {
        try {
          restaurar?.();
        } catch (error) {
          window.AppDiag?.mark?.('nav.record.restore_error', {
            message: String(error?.message || error || '')
          });
        }
      });
    }

    function adicionarRestauracao(contexto, restaurar) {
      if (typeof restaurar !== 'function' || !contexto) return;
      if (contexto.cancelado) {
        executarRestauracoes([restaurar]);
        return;
      }
      contexto.restauracoes.push(restaurar);
    }

    function liberarNavegacaoFixada(contexto = navegacaoFixada) {
      if (!contexto) return false;
      if (contexto.releaseTimer) {
        clearTimeout(contexto.releaseTimer);
        contexto.releaseTimer = null;
      }
      if (contexto.modalObserver) {
        contexto.modalObserver.disconnect();
        contexto.modalObserver = null;
      }
      if (contexto.lease) {
        window.AppTabRefresh?.releaseLease?.(contexto.lease);
        contexto.lease = null;
      }
      if (navegacaoFixada === contexto) navegacaoFixada = null;
      return true;
    }

    function fixarNavegacaoAteFecharDetalhes(contexto) {
      if (!contexto?.lease) return;
      liberarNavegacaoFixada();
      navegacaoFixada = contexto;
      const modal = contexto.detailsTarget?.matches?.('.modal:not(.hidden)')
        ? contexto.detailsTarget
        : null;
      const disclosure = contexto.detailsTarget?.matches?.('details[open]')
        ? contexto.detailsTarget
        : (encontrarRegistro(contexto.aba, contexto.id)?.querySelector?.('details[open]') || null);
      const observado = modal || disclosure;
      if (!observado || typeof MutationObserver !== 'function') {
        contexto.releaseTimer = setTimeout(() => liberarNavegacaoFixada(contexto), 2400);
        return;
      }
      contexto.modalObserver = new MutationObserver(() => {
        const continuaAberto = modal
          ? !modal.classList.contains('hidden')
          : disclosure.hasAttribute('open');
        if (continuaAberto) return;
        liberarNavegacaoFixada(contexto);
      });
      contexto.modalObserver.observe(observado, {
        attributes: true,
        attributeFilter: modal ? ['class'] : ['open']
      });
    }

    function cancelarNavegacao(contexto) {
      if (!contexto || contexto.cancelado) return;
      contexto.cancelado = true;
      if (contexto.lease) {
        window.AppTabRefresh?.releaseLease?.(contexto.lease);
        contexto.lease = null;
      }
      executarRestauracoes(contexto.restauracoes.splice(0));
      if (navegacaoEmVoo === contexto) navegacaoEmVoo = null;
    }

    function navegacaoContinuaValida(contexto) {
      return !!contexto
        && !contexto.cancelado
        && contexto.seq === navegacaoSeq
        && obterNomeAbaAtiva() === contexto.aba;
    }

    function restaurarFiltrosSuspensos() {
      if (!suspensaoAtiva) return false;
      const atual = suspensaoAtiva;
      suspensaoAtiva = null;
      executarRestauracoes(atual.restauracoes);
      return true;
    }

    function antesDeTrocarAba(origem, destino) {
      const de = normalizarNomeAba(origem);
      const para = normalizarNomeAba(destino);
      if (navegacaoFixada && navegacaoFixada.aba !== para) {
        liberarNavegacaoFixada(navegacaoFixada);
      }
      const trocaInterna = !!destinoTrocaInterna
        && destinoTrocaInterna === para
        && navegacaoEmVoo?.aba === para;
      destinoTrocaInterna = '';
      if (!trocaInterna && navegacaoEmVoo) {
        navegacaoSeq += 1;
        const contexto = navegacaoEmVoo;
        cancelarNavegacao(contexto);
        window.AppModalUI?.closeAll?.();
      }
      if (!suspensaoAtiva || de !== suspensaoAtiva.aba || de === para) return;
      restaurarFiltrosSuspensos();
    }

    function renderizarPendenteAbaAtiva(aba, timeoutMs = 1800) {
      const lifecycle = window.AppTabRefresh?.getState?.(aba);
      if (!lifecycle?.renderPending || obterNomeAbaAtiva() !== aba) {
        return Promise.resolve(false);
      }
      return new Promise(resolve => {
        let finalizado = false;
        let timer = null;
        const finalizar = renderizou => {
          if (finalizado) return;
          finalizado = true;
          if (timer) clearTimeout(timer);
          window.removeEventListener('app:tab:rendered', onRendered);
          resolve(!!renderizou);
        };
        const onRendered = evento => {
          if (normalizarNomeAba(evento?.detail?.tab) !== aba) return;
          finalizar(true);
        };
        window.addEventListener('app:tab:rendered', onRendered);
        timer = setTimeout(() => finalizar(false), Math.max(250, Number(timeoutMs) || 1800));
        executarCicloAba(aba);
      });
    }

    function sincronizarAbaUmaVez(aba) {
      return new Promise(resolve => {
        if (!window.AppTabRefresh?.requestSync) {
          resolve(false);
          return;
        }
        let finalizado = false;
        const timer = setTimeout(() => {
          if (finalizado) return;
          finalizado = true;
          resolve(false);
        }, 9000);
        const finalizar = resultado => {
          if (finalizado) return;
          finalizado = true;
          clearTimeout(timer);
          resolve(resultado !== false);
        };
        const concluirAposResposta = () => {
          renderizarPendenteAbaAtiva(aba).then(() => finalizar(true));
        };
        const concluir = resultado => {
          if (resultado === false) {
            finalizar(false);
            return;
          }
          if (resultado !== 'superseded') {
            concluirAposResposta();
            return;
          }
          const inicioEspera = Date.now();
          const aguardarSubstituta = () => {
            if (finalizado) return;
            const lifecycle = window.AppTabRefresh?.getState?.(aba);
            const assentou = lifecycle?.status !== 'refreshing' || lifecycle?.renderPending;
            if (assentou || (Date.now() - inicioEspera) >= 1800) {
              concluirAposResposta();
              return;
            }
            setTimeout(aguardarSubstituta, 60);
          };
          aguardarSubstituta();
        };
        const solicitado = window.AppTabRefresh.requestSync(aba, {
          immediate: true,
          prefetch: true,
          timeoutMs: 8500,
          markDirty: false,
          ignoreLease: true,
          onDone: concluir
        });
        if (!solicitado) finalizar(false);
      });
    }

    function obterUiAba(aba) {
      const controller = obterControllerAba(aba);
      if (controller && [controller.openDetails, controller.abrirDetalhes, controller.abrirModalDetalhes]
        .some(method => typeof method === 'function')) {
        return controller;
      }
      const mapa = {
        estoque: window.EstoqueUI,
        compras: window.ComprasUI,
        vendas: window.VendasUI,
        investimentos: window.InvestimentosUI,
        produtos: window.ProdutosUI,
        producao: window.ProducaoUI
      };
      return mapa[aba] || null;
    }

    async function focarSubrecurso(subresource) {
      const id = String(
        (subresource && typeof subresource === 'object' ? subresource.id : subresource) || ''
      ).trim();
      if (!id) return false;
      const escaped = escaparCssAttr(id);
      for (let tentativa = 0; tentativa < 8; tentativa += 1) {
        const modais = [...document.querySelectorAll('.modal:not(.hidden)')].reverse();
        const raizes = modais.concat(document);
        const alvo = raizes
          .map(raiz => raiz.querySelector(
            `[data-subresource-id="${escaped}"], [data-payment-id="${escaped}"], [data-pagamento-id="${escaped}"]`
          ))
          .find(Boolean);
        if (alvo) {
          destacarElementoEntradaOutbox(alvo);
          return true;
        }
        await esperar(90);
      }
      return false;
    }

    async function abrirDetalhesRegistro(aba, id, card, subresource) {
      const modaisAntes = new Set(document.querySelectorAll('.modal:not(.hidden)'));
      const ui = obterUiAba(aba);
      const abrirPublico = ui?.openDetails || ui?.abrirDetalhes || ui?.abrirModalDetalhes;
      if (typeof abrirPublico === 'function') {
        await Promise.resolve(abrirPublico.call(ui, id));
      } else {
        const botao = card.querySelector(
          '.ver-mais, [data-action="details"], [data-action="detalhes"], .btn-detalhes'
        );
        if (botao) botao.click();
        else card.click();
      }
      if (subresource) await focarSubrecurso(subresource);
      const modalAberto = [...document.querySelectorAll('.modal:not(.hidden)')]
        .reverse()
        .find(item => !modaisAntes.has(item)) || null;
      const disclosure = encontrarRegistro(aba, id)?.querySelector?.('details[open]') || null;
      return modalAberto || disclosure;
    }

    async function abrir(options = {}) {
      const seq = ++navegacaoSeq;
      const aba = normalizarNomeAba(options.tab);
      const id = String(options.id || '').trim();
      if (!aba || aba === 'dashboard' || !id || !raizAba(aba)) {
        mostrarToast('Destino deste registro nao esta disponivel.', 'erro');
        return false;
      }

      if (navegacaoEmVoo) {
        cancelarNavegacao(navegacaoEmVoo);
        window.AppModalUI?.closeAll?.();
      }
      liberarNavegacaoFixada();
      restaurarFiltrosSuspensos();
      const contextoNavegacao = {
        seq,
        aba,
        id,
        restauracoes: [],
        cancelado: false,
        lease: window.AppTabRefresh?.acquireLease?.(aba, 'record-navigation') || null,
        modalObserver: null,
        releaseTimer: null,
        detailsTarget: null
      };
      navegacaoEmVoo = contextoNavegacao;
      try {
      window.AppWorklistUI?.select?.(aba, 'records');
      if (typeof trocarAba === 'function') {
        destinoTrocaInterna = aba;
        try {
          trocarAba(aba);
        } finally {
          destinoTrocaInterna = '';
        }
      }
      if (window.AppTabRefresh?.waitForSync) {
        await window.AppTabRefresh.waitForSync(aba);
      }
      await renderizarPendenteAbaAtiva(aba);
      const pronta = window.AppBootGate?.waitForTabReady
        ? await window.AppBootGate.waitForTabReady(aba, { timeoutMs: 4500 })
        : true;
      if (!navegacaoContinuaValida(contextoNavegacao)) {
        cancelarNavegacao(contextoNavegacao);
        return false;
      }

      let alvo = pronta ? await aguardarRegistro(aba, id, 260) : null;
      if (!navegacaoContinuaValida(contextoNavegacao)) {
        cancelarNavegacao(contextoNavegacao);
        return false;
      }
      let filtrosSuspensos = false;

      if (!alvo) {
        const hook = await tentarHookPublico(aba, id);
        adicionarRestauracao(contextoNavegacao, hook.restaurar);
        if (!navegacaoContinuaValida(contextoNavegacao)) {
          cancelarNavegacao(contextoNavegacao);
          return false;
        }
        if (hook.usado) alvo = await localizarComPaginacao(aba, id);
        if (!navegacaoContinuaValida(contextoNavegacao)) {
          cancelarNavegacao(contextoNavegacao);
          return false;
        }
      }

      if (!alvo) {
        alvo = await localizarComPaginacao(aba, id);
        if (!navegacaoContinuaValida(contextoNavegacao)) {
          cancelarNavegacao(contextoNavegacao);
          return false;
        }
      }

      if (!alvo) {
        const restaurarFiltros = suspenderFiltrosNativos(aba);
        if (restaurarFiltros) {
          adicionarRestauracao(contextoNavegacao, restaurarFiltros);
          filtrosSuspensos = true;
          alvo = await localizarComPaginacao(aba, id);
          if (!navegacaoContinuaValida(contextoNavegacao)) {
            cancelarNavegacao(contextoNavegacao);
            return false;
          }
        }
      }

      if (!alvo && aba === 'compras') {
        const restaurarVisibilidade = exibirComprasAdicionadas();
        if (restaurarVisibilidade) {
          adicionarRestauracao(contextoNavegacao, restaurarVisibilidade);
          filtrosSuspensos = true;
          alvo = await localizarComPaginacao(aba, id);
          if (!navegacaoContinuaValida(contextoNavegacao)) {
            cancelarNavegacao(contextoNavegacao);
            return false;
          }
        }
      }

      if (!alvo) {
        mostrarToast(`Atualizando ${ROTULOS_ABA[aba] || 'a aba'} para localizar o registro...`);
        await sincronizarAbaUmaVez(aba);
        if (!navegacaoContinuaValida(contextoNavegacao)) {
          cancelarNavegacao(contextoNavegacao);
          return false;
        }
        alvo = await localizarComPaginacao(aba, id);
        if (!navegacaoContinuaValida(contextoNavegacao)) {
          cancelarNavegacao(contextoNavegacao);
          return false;
        }
      }

      if (!navegacaoContinuaValida(contextoNavegacao)) {
        cancelarNavegacao(contextoNavegacao);
        return false;
      }

      if (!alvo) {
        cancelarNavegacao(contextoNavegacao);
        mostrarToast(
          `Nao encontrei o registro em ${ROTULOS_ABA[aba] || 'sua aba'}. Ele pode ter sido removido ou estar fora dos dados carregados.`,
          'erro'
        );
        return false;
      }

      destacarElementoEntradaOutbox(alvo);
      if (options.openDetails !== false) {
        await esperar(160);
        if (!navegacaoContinuaValida(contextoNavegacao)) {
          cancelarNavegacao(contextoNavegacao);
          return false;
        }
        contextoNavegacao.detailsTarget = await abrirDetalhesRegistro(
          aba,
          id,
          alvo,
          options.subresource
        );
        if (!navegacaoContinuaValida(contextoNavegacao)) {
          cancelarNavegacao(contextoNavegacao);
          return false;
        }
      }

      fixarNavegacaoAteFecharDetalhes(contextoNavegacao);
      if (navegacaoEmVoo === contextoNavegacao) navegacaoEmVoo = null;
      if (contextoNavegacao.restauracoes.length > 0) {
        suspensaoAtiva = {
          aba,
          restauracoes: contextoNavegacao.restauracoes.splice(0)
        };
      }
      if (filtrosSuspensos) {
        mostrarToast('Filtros temporariamente suspensos. Eles serao restaurados ao sair desta aba.');
      }
      return true;
      } catch (error) {
        cancelarNavegacao(contextoNavegacao);
        window.AppModalUI?.closeAll?.();
        throw error;
      }
    }

    if (!window.__appRecordNavigatorRenderBound) {
      window.addEventListener('app:tab:rendered', evento => {
        const contexto = navegacaoFixada;
        const abaEvento = normalizarNomeAba(evento?.detail?.tab);
        if (!contexto || contexto.aba !== abaEvento || obterNomeAbaAtiva() !== abaEvento) return;
        requestAnimationFrame(() => {
          const alvo = encontrarRegistro(contexto.aba, contexto.id);
          if (alvo) destacarElementoEntradaOutbox(alvo);
        });
      });
      window.__appRecordNavigatorRenderBound = true;
    }

    return {
      open: abrir,
      beforeTabChange: antesDeTrocarAba,
      restoreSuspendedFilters: restaurarFiltrosSuspensos
    };
  }

  window.AppRecordNavigator = window.AppRecordNavigator || criarNavegadorRegistros();

  function formatarResumoOutboxHint(summary = {}) {
    const total = Math.max(0, Number(summary?.total || 0));
    if (total <= 0) return '';

    const active = Math.max(0, Number(summary?.active || 0));
    const conflict = Math.max(0, Number(summary?.conflict || 0));
    const error = Math.max(0, Number(summary?.error || 0));
    const offline = Math.max(0, Number(summary?.offline || 0));
    const paused = Math.max(0, Number(summary?.paused || 0));
    const sending = Math.max(0, Number(summary?.sending || 0));
    const pending = Math.max(0, Number(summary?.pending || 0));
    const online = summary?.online !== false;
    const proximaTentativa = Math.max(0, Number(summary?.nextRetryAt || 0));
    const pluralizar = (valor, singular, plural) => `${valor} ${valor === 1 ? singular : plural}`;

    if (conflict > 0) {
      return `${pluralizar(conflict, 'alteracao com conflito', 'alteracoes com conflito')} aguardando revisao. Toque para revisar.`;
    }

    if (error > 0 && active === 0) {
      return `${pluralizar(error, 'alteracao falhou', 'alteracoes falharam')}. Toque para localizar.`;
    }

    if (!online || offline > 0) {
      const alvo = Math.max(offline, active, total);
      return `Sem conexao. ${pluralizar(alvo, 'alteracao local aguarda', 'alteracoes locais aguardam')} reenvio automatico.`;
    }

    if (paused > 0) {
      const diffSeg = proximaTentativa > 0
        ? Math.max(1, Math.ceil((proximaTentativa - Date.now()) / 1000))
        : 0;
      const sufixo = diffSeg > 0 ? ` Nova tentativa em ${diffSeg}s.` : '';
      return `${pluralizar(paused, 'alteracao aguarda reenvio', 'alteracoes aguardam reenvio automatico')}.${sufixo}`.trim();
    }

    if (sending > 0 || pending > 0 || active > 0) {
      return `Sincronizando ${pluralizar(Math.max(active, sending + pending), 'alteracao local', 'alteracoes locais')}...`;
    }

    return '';
  }

  function atualizarHintOutboxSincronizacao(summary = {}, entries = []) {
    const syncStatus = window.AppSyncStatus;
    if (!syncStatus?.setHint || !syncStatus?.clearHint) return;
    const texto = formatarResumoOutboxHint(summary);
    if (!texto) {
      syncStatus.clearHint('optimistic-outbox');
      return;
    }
    const entradaAlvo = escolherEntradaOutboxPrincipal(entries);
    syncStatus.setHint('optimistic-outbox', {
      texto,
      kind: 'optimistic',
      onClick: entradaAlvo?.id ? () => abrirEntradaOutbox(entradaAlvo.id) : null
    });
  }

  if (typeof window !== 'undefined' && typeof window.addEventListener === 'function' && !window.__appOptimisticSyncHintBound) {
    window.addEventListener('app:optimistic-state', evento => {
      atualizarHintOutboxSincronizacao(evento?.detail?.summary || {}, evento?.detail?.entries || []);
    });
    window.__appOptimisticSyncHintBound = true;
    atualizarHintOutboxSincronizacao(window.AppOptimistic?.getState?.() || {}, window.AppOptimistic?.list?.() || []);
  }

  function getMesAtualReferencia() {
    const d = new Date();
    const yyyy = d.getFullYear();
    const mm = String(d.getMonth() + 1).padStart(2, '0');
    return `${yyyy}-${mm}`;
  }

  function obterEstadoRefreshAba(nome) {
    const aba = normalizarNomeAba(nome);
    if (!aba) return null;
    if (!abaRefreshState[aba]) {
      abaRefreshState[aba] = {
        lastSuccessfulAt: 0,
        lastAttemptAt: 0,
        initialized: false,
        controllerInitialized: false,
        dirty: false,
        dirtyGeneration: 0,
        appliedDirtyGeneration: 0,
        renderRevision: 0,
        renderPending: false,
        status: 'empty',
        leases: new Set()
      };
    }
    return abaRefreshState[aba];
  }

  function marcarAbaComoSuja(nome) {
    const state = obterEstadoRefreshAba(nome);
    if (!state) return false;
    state.dirty = true;
    state.dirtyGeneration += 1;
    return true;
  }

  function limparAbaSuja(nome, generation) {
    const state = obterEstadoRefreshAba(nome);
    if (!state) return false;
    const alvo = Number.isFinite(Number(generation))
      ? Number(generation)
      : state.dirtyGeneration;
    state.appliedDirtyGeneration = Math.max(state.appliedDirtyGeneration, alvo);
    if (state.dirtyGeneration > alvo) return false;
    state.dirty = false;
    return true;
  }

  function abaEstaSuja(nome) {
    const state = obterEstadoRefreshAba(nome);
    return !!state?.dirty;
  }

  function obterEstadoSyncAba(nome) {
    const aba = normalizarNomeAba(nome);
    if (!aba) return null;
    if (!abaSyncState[aba]) {
      abaSyncState[aba] = {
        timer: null,
        running: false,
        pendingCallbacks: [],
        activeCallbacks: [],
        queuedCallbacks: [],
        queued: false,
        queuedPrefetch: false,
        queuedForce: false,
        queuedIncludeSecondary: false,
        scheduledAt: 0,
        lastStartedAt: 0,
        lastFinishedAt: 0,
        startedDirtyGeneration: 0,
        requestGeneration: 0,
        activePromise: null,
        activeResolve: null,
        deferredByLease: false
      };
    }
    return abaSyncState[aba];
  }

  function deveRecarregarAba(nome, force = false) {
    const aba = normalizarNomeAba(nome);
    if (!aba) return false;
    const agoraMs = Date.now();
    const state = obterEstadoRefreshAba(aba);
    if (!state) return false;
    const ttl = Number(ABA_REFRESH_INTERVAL_MS[aba] || 30000);

    if (force || !state.initialized || !!state.dirty) return true;
    const referencia = Math.max(
      Number(state.lastSuccessfulAt || 0),
      Number(state.lastAttemptAt || 0)
    );
    return !referencia || (agoraMs - referencia) >= ttl;
  }

  function marcarAbaInicializada(nome, options = {}) {
    const state = obterEstadoRefreshAba(nome);
    if (!state) return false;
    state.initialized = true;
    state.lastAttemptAt = Date.now();
    if (state.status === 'empty') {
      state.status = options.hydrated ? 'hydrated' : 'refreshing';
    }
    return true;
  }

  function marcarResultadoAba(nome, sucesso, generation) {
    const state = obterEstadoRefreshAba(nome);
    if (!state) return false;
    state.initialized = true;
    state.lastAttemptAt = Date.now();
    if (sucesso === true) {
      state.lastSuccessfulAt = Date.now();
      state.status = 'ready';
      limparAbaSuja(nome, generation);
      return true;
    }
    state.status = 'error';
    state.dirty = true;
    return false;
  }

  function notificarRenderAba(nome, detail = {}) {
    const aba = normalizarNomeAba(nome);
    const state = obterEstadoRefreshAba(aba);
    if (!state) return 0;
    state.renderRevision += 1;
    state.renderPending = false;
    try {
      window.dispatchEvent(new CustomEvent('app:tab:rendered', {
        detail: {
          tab: aba,
          revision: state.renderRevision,
          changed: detail?.changed !== false
        }
      }));
    } catch (error) {
      // sem acao
    }
    return state.renderRevision;
  }

  function marcarRenderPendenteAba(nome) {
    const state = obterEstadoRefreshAba(nome);
    if (!state) return false;
    state.renderPending = true;
    return true;
  }

  function deveRenderizarAba(nome) {
    const aba = normalizarNomeAba(nome);
    const state = obterEstadoRefreshAba(aba);
    if (obterNomeAbaAtiva() !== aba) return false;
    // Durante a navegacao para um registro, permite o primeiro desenho da aba,
    // mas congela redesenhos posteriores ate o usuario fechar os detalhes.
    return !state || state.leases.size === 0 || state.renderRevision === 0;
  }

  function adquirirLeaseRefreshAba(nome, reason = '') {
    const aba = normalizarNomeAba(nome);
    const state = obterEstadoRefreshAba(aba);
    if (!state) return null;
    const token = `${aba}:lease:${++tabRefreshLeaseSeq}`;
    state.leases.add(token);
    const syncState = obterEstadoSyncAba(aba);
    if (syncState?.timer && !syncState.running) {
      clearTimeout(syncState.timer);
      syncState.timer = null;
      syncState.scheduledAt = 0;
      syncState.deferredByLease = true;
    }
    window.AppDiag?.mark?.('tab.refresh.lease.acquire', {
      tab: aba,
      reason: String(reason || ''),
      lease_count: state.leases.size
    });
    return { tab: aba, token };
  }

  function liberarLeaseRefreshAba(lease) {
    const aba = normalizarNomeAba(lease?.tab);
    const token = String(lease?.token || '').trim();
    const state = obterEstadoRefreshAba(aba);
    if (!state || !token) return false;
    const removed = state.leases.delete(token);
    window.AppDiag?.mark?.('tab.refresh.lease.release', {
      tab: aba,
      lease_count: state.leases.size
    });
    const syncState = obterEstadoSyncAba(aba);
    if (removed && state.leases.size === 0 && syncState?.deferredByLease) {
      syncState.deferredByLease = false;
      requestSyncAba(aba, {
        immediate: true,
        prefetch: obterNomeAbaAtiva() !== aba,
        force: false,
        markDirty: false
      });
    }
    if (removed && state.leases.size === 0 && state.renderPending && obterNomeAbaAtiva() === aba) {
      setTimeout(() => executarCicloAba(aba), 0);
    }
    return removed;
  }

  function abaPossuiLeaseRefresh(nome) {
    const state = obterEstadoRefreshAba(nome);
    return !!state && state.leases.size > 0;
  }

  function aguardarSyncAba(nome) {
    const state = obterEstadoSyncAba(nome);
    return state?.activePromise || Promise.resolve(true);
  }

  function executarSincronizacaoAba(nome, onDone, options = {}) {
    const aba = normalizarNomeAba(nome);
    const force = options.force === true;
    const includeSecondary = options.includeSecondary === true;
    const ambiente = window.AppClientScope?.get?.()?.environment
      || window.AppDbEnv?.getContext?.()?.effective_env
      || 'prod';
    const concluir = (() => {
      let finalizado = false;
      return resultado => {
        if (finalizado) return;
        finalizado = true;
        if (typeof onDone === 'function') {
          onDone(resultado === 'superseded' ? 'superseded' : resultado !== false);
        }
      };
    })();

    if (!aba) {
      concluir();
      return;
    }

    if (aba === 'dashboard') {
      if (window.DashboardController?.atualizar) {
        const resultado = window.AppPerf?.measure(
          'tab.dashboard.sync',
          () => DashboardController.atualizar(force, concluir)
        );
        if (resultado && typeof resultado.then === 'function') {
          Promise.resolve(resultado).then(
            () => concluir(true),
            () => concluir(false)
          );
        }
        return;
      }
      if (window.DashboardController?.init) {
        window.AppPerf?.measure('tab.dashboard.init', () => DashboardController.init());
      }
      concluir();
      return;
    }

    const map = {
      estoque: {
        sync: window.EstoqueController?.syncFromBackend,
        init: window.EstoqueController?.init,
        labelSync: 'tab.estoque.sync',
        labelInit: 'tab.estoque.init'
      },
      despesas: {
        sync: window.DespesasController?.syncFromBackend,
        init: window.DespesasController?.init,
        labelSync: 'tab.despesas.sync',
        labelInit: 'tab.despesas.init'
      },
      compras: {
        sync: window.ComprasController?.syncFromBackend,
        init: window.ComprasController?.init,
        labelSync: 'tab.compras.sync',
        labelInit: 'tab.compras.init'
      },
      vendas: {
        sync: window.VendasController?.syncFromBackend,
        init: window.VendasController?.init,
        labelSync: 'tab.vendas.sync',
        labelInit: 'tab.vendas.init'
      },
      investimentos: {
        sync: window.InvestimentosController?.syncFromBackend,
        init: window.InvestimentosController?.init,
        labelSync: 'tab.investimentos.sync',
        labelInit: 'tab.investimentos.init'
      },
      produtos: {
        sync: window.ProdutosController?.syncFromBackend,
        init: window.ProdutosController?.init,
        labelSync: 'tab.produtos.sync',
        labelInit: 'tab.produtos.init'
      },
      producao: {
        sync: window.ProducaoController?.syncFromBackend,
        init: window.ProducaoController?.init,
        labelSync: 'tab.producao.sync',
        labelInit: 'tab.producao.init'
      }
    };

    const alvo = map[aba];
    if (!alvo) {
      concluir();
      return;
    }

    if (typeof alvo.sync === 'function') {
      if (alvo.sync.length >= 1) {
        window.AppPerf?.measure(
          alvo.labelSync,
          () => alvo.sync(concluir, ambiente, { force, includeSecondary })
        );
      } else {
        window.AppPerf?.measure(alvo.labelSync, () => alvo.sync());
        concluir(true);
      }
      return;
    }

    if (typeof alvo.init === 'function') {
      window.AppPerf?.measure(alvo.labelInit, () => alvo.init());
    }
    concluir(true);
  }

  function requestSyncAba(nome, options = {}) {
    const aba = normalizarNomeAba(nome);
    if (!aba) return false;
    const refreshState = obterEstadoRefreshAba(aba);
    const state = obterEstadoSyncAba(aba);
    if (!state || !refreshState) return false;

    const deveInvalidar = options.markDirty !== false;
    if (deveInvalidar) marcarAbaComoSuja(aba);
    const dirtyGeneration = refreshState.dirtyGeneration;
    const onDone = typeof options.onDone === 'function' ? options.onDone : null;
    const delayBase = Number(options.delayMs);
    const delayMs = Number.isFinite(delayBase) && delayBase >= 0
      ? delayBase
      : TAB_SYNC_COALESCE_MS;
    const timeoutBase = Number(options.timeoutMs);
    const timeoutMs = Number.isFinite(timeoutBase) && timeoutBase > 0
      ? timeoutBase
      : 35000;
    const immediate = !!options.immediate;
    const prefetch = !!options.prefetch;
    const force = options.force === true;
    const includeSecondary = options.includeSecondary === true;
    const abaAtiva = obterNomeAbaAtiva();
    const agoraMs = Date.now();
    const referenciaGap = Math.max(
      Number(state.lastFinishedAt || 0),
      Number(state.lastStartedAt || 0)
    );
    const cooldownRestante = referenciaGap > 0
      ? Math.max(0, TAB_SYNC_MIN_GAP_MS - (agoraMs - referenciaGap))
      : 0;

    if (state.running) {
      const existeInvalidacaoNova = dirtyGeneration > Number(state.startedDirtyGeneration || 0);
      const precisaSecundarios = includeSecondary && !state.activeIncludeSecondary;
      if (existeInvalidacaoNova || (force && !state.activeForce) || precisaSecundarios) {
        state.queued = true;
        state.queuedPrefetch = state.queuedPrefetch || prefetch;
        state.queuedForce = state.queuedForce || force;
        state.queuedIncludeSecondary = state.queuedIncludeSecondary || includeSecondary;
        if (onDone) state.queuedCallbacks.push(onDone);
      } else if (onDone) {
        state.activeCallbacks.push(onDone);
      }
      return true;
    }

    const deveExecutarAgora = abaAtiva === aba || prefetch;
    if (!deveExecutarAgora) {
      if (onDone) {
        try {
          onDone(false);
        } catch (error) {
          // sem acao
        }
      }
      return true;
    }

    if (abaPossuiLeaseRefresh(aba) && options.ignoreLease !== true) {
      if (onDone) state.pendingCallbacks.push(onDone);
      state.pendingPrefetch = !!(state.pendingPrefetch || prefetch);
      state.pendingForce = !!(state.pendingForce || force);
      state.pendingIncludeSecondary = !!(state.pendingIncludeSecondary || includeSecondary);
      state.deferredByLease = true;
      return true;
    }

    const delayEfetivo = (immediate || delayMs <= 0)
      ? Math.min(180, cooldownRestante)
      : Math.max(delayMs, cooldownRestante);

    if (onDone) state.pendingCallbacks.push(onDone);
    state.pendingPrefetch = !!(state.pendingPrefetch || prefetch);
    state.pendingForce = !!(state.pendingForce || force);
    state.pendingIncludeSecondary = !!(state.pendingIncludeSecondary || includeSecondary);

    const iniciarExecucao = () => {
      if (state.running) {
        state.queued = true;
        state.queuedPrefetch = state.queuedPrefetch || state.pendingPrefetch;
        state.queuedForce = state.queuedForce || state.pendingForce;
        state.queuedIncludeSecondary = state.queuedIncludeSecondary || state.pendingIncludeSecondary;
        state.queuedCallbacks.push(...state.pendingCallbacks.splice(0));
        return;
      }

      state.scheduledAt = 0;
      state.running = true;
      state.activeCallbacks = state.pendingCallbacks.splice(0);
      state.activeForce = !!state.pendingForce;
      state.activeIncludeSecondary = !!state.pendingIncludeSecondary;
      state.pendingPrefetch = false;
      state.pendingForce = false;
      state.pendingIncludeSecondary = false;
      state.lastStartedAt = Date.now();
      state.startedDirtyGeneration = refreshState.dirtyGeneration;
      state.requestGeneration += 1;
      refreshState.initialized = true;
      refreshState.lastAttemptAt = state.lastStartedAt;
      refreshState.status = 'refreshing';
      state.activePromise = new Promise(resolve => {
        state.activeResolve = resolve;
      });
      const tokenSync = window.AppSyncStatus?.iniciar
        ? window.AppSyncStatus.iniciar(aba, '')
        : null;
      let finalizado = false;
      let watchdog = null;

      const finalizarExecucao = (origem, resultado) => {
        if (finalizado) return;
        finalizado = true;

        if (watchdog) {
          clearTimeout(watchdog);
          watchdog = null;
        }

        state.running = false;
        state.lastFinishedAt = Date.now();
        const neutro = origem === 'done' && resultado === 'superseded';
        const sucesso = neutro || (origem === 'done' && resultado !== false);
        if (!neutro) marcarResultadoAba(aba, sucesso, state.startedDirtyGeneration);
        if (tokenSync) {
          window.AppSyncStatus.finalizar(tokenSync);
        }

        if (origem === 'timeout') {
          window.AppDiag?.mark?.('sync.timeout', {
            aba,
            timeout_ms: timeoutMs
          });
          if (typeof console !== 'undefined' && console.warn) {
            console.warn(`[sync] timeout ${aba} (${timeoutMs}ms)`);
          }
        }

        const callbacks = state.activeCallbacks.splice(0);
        callbacks.forEach(fn => {
          try {
            fn(neutro ? 'superseded' : sucesso);
          } catch (error) {
            // sem acao
          }
        });

        if (typeof state.activeResolve === 'function') {
          state.activeResolve(sucesso);
        }
        state.activeResolve = null;
        state.activePromise = null;
        state.activeForce = false;
        state.activeIncludeSecondary = false;

        if (!state.queued) return;
        const queuedPrefetch = !!state.queuedPrefetch;
        const queuedForce = !!state.queuedForce;
        const queuedIncludeSecondary = !!state.queuedIncludeSecondary;
        state.pendingCallbacks.push(...state.queuedCallbacks.splice(0));
        state.queued = false;
        state.queuedPrefetch = false;
        state.queuedForce = false;
        state.queuedIncludeSecondary = false;
        if (abaPossuiLeaseRefresh(aba)) {
          state.pendingPrefetch = !!(state.pendingPrefetch || queuedPrefetch);
          state.pendingForce = !!(state.pendingForce || queuedForce);
          state.pendingIncludeSecondary = !!(
            state.pendingIncludeSecondary || queuedIncludeSecondary
          );
          state.deferredByLease = true;
          return;
        }
        requestSyncAba(aba, {
          immediate: true,
          prefetch: queuedPrefetch,
          force: queuedForce,
          includeSecondary: queuedIncludeSecondary,
          markDirty: false
        });
      };

      watchdog = setTimeout(() => {
        finalizarExecucao('timeout', false);
      }, timeoutMs);

      try {
        executarSincronizacaoAba(aba, resultado => {
          finalizarExecucao('done', resultado);
        }, {
          force: state.activeForce,
          includeSecondary: state.activeIncludeSecondary
        });
      } catch (error) {
        window.AppDiag?.mark?.('sync.error', {
          aba,
          message: String(error?.message || error || '')
        });
        if (typeof console !== 'undefined' && console.error) {
          console.error(`[sync] erro ao sincronizar ${aba}`, error);
        }
        finalizarExecucao('error', false);
      }
    };

    if (delayEfetivo <= 0) {
      iniciarExecucao();
      return true;
    }

    const scheduledAt = agoraMs + delayEfetivo;
    if (state.timer && Number(state.scheduledAt || 0) > 0 && Number(state.scheduledAt || 0) <= scheduledAt) {
      return true;
    }
    if (state.timer) {
      clearTimeout(state.timer);
      state.timer = null;
    }

    state.scheduledAt = scheduledAt;
    state.timer = setTimeout(() => {
      state.timer = null;
      state.scheduledAt = 0;
      iniciarExecucao();
    }, delayEfetivo);
    return true;
  }

  const appTabRefreshApi = window.AppTabRefresh || {};
  appTabRefreshApi.markDirty = marcarAbaComoSuja;
  appTabRefreshApi.clearDirty = limparAbaSuja;
  appTabRefreshApi.isDirty = abaEstaSuja;
  appTabRefreshApi.requestSync = requestSyncAba;
  appTabRefreshApi.waitForSync = aguardarSyncAba;
  appTabRefreshApi.acquireLease = adquirirLeaseRefreshAba;
  appTabRefreshApi.releaseLease = liberarLeaseRefreshAba;
  appTabRefreshApi.isLeased = abaPossuiLeaseRefresh;
  appTabRefreshApi.shouldRender = deveRenderizarAba;
  appTabRefreshApi.markRenderPending = marcarRenderPendenteAba;
  appTabRefreshApi.notifyRendered = notificarRenderAba;
  appTabRefreshApi.markInitialized = marcarAbaInicializada;
  appTabRefreshApi.reportResult = marcarResultadoAba;
  appTabRefreshApi.getDirtyGeneration = nome => Number(
    obterEstadoRefreshAba(nome)?.dirtyGeneration || 0
  );
  appTabRefreshApi.getState = nome => {
    const state = obterEstadoRefreshAba(nome);
    if (!state) return null;
    return {
      initialized: state.initialized,
      dirty: state.dirty,
      status: state.status,
      lastSuccessfulAt: state.lastSuccessfulAt,
      renderRevision: state.renderRevision,
      renderPending: state.renderPending,
      leased: state.leases.size > 0
    };
  };
  window.AppTabRefresh = appTabRefreshApi;

  function revalidarAbaAtivaAoRetomar() {
    if (document?.body?.classList?.contains('app-booting')) return;
    const aba = normalizarNomeAba(obterNomeAbaAtiva());
    if (!aba || abaPossuiLeaseRefresh(aba) || !deveRecarregarAba(aba, false)) return;
    requestSyncAba(aba, {
      immediate: false,
      delayMs: 240,
      prefetch: false,
      force: false,
      markDirty: false
    });
  }

  if (!window.__appResumeRefreshBound) {
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') revalidarAbaAtivaAoRetomar();
    });
    window.addEventListener('online', revalidarAbaAtivaAoRetomar);
    window.__appResumeRefreshBound = true;
  }

  function executarCicloAba(nome) {
    const aba = normalizarNomeAba(nome);
    if (!aba) return;
    ensureTabUiInfra(aba);

    if (aba === 'dashboard') {
      const refMes = document.getElementById('dashMesReferencia');
      const mesAtual = getMesAtualReferencia();
      const referenciaVazia = !!refMes && !String(refMes.value || '').trim();
      if (refMes && referenciaVazia) refMes.value = mesAtual;
      const refreshState = obterEstadoRefreshAba(aba);
      const primeiroCiclo = !refreshState?.controllerInitialized || referenciaVazia || !!refreshState?.renderPending;
      const recarregar = deveRecarregarAba(aba, referenciaVazia);
      if (window.DashboardController && primeiroCiclo) {
        refreshState.controllerInitialized = true;
        marcarAbaInicializada(aba);
        const resultado = window.AppPerf?.measure(
          'tab.dashboard.init',
          () => DashboardController.init()
        );
        if (resultado && typeof resultado.catch === 'function') resultado.catch(() => {});
      } else if (recarregar) {
        window.AppTabRefresh?.requestSync?.(aba, {
          immediate: true,
          prefetch: false,
          force: false,
          markDirty: false
        });
      }
      return;
    }

    const config = {
      despesas: {
        loaded: () => !!window.DespesasController?.isLoaded?.(),
        controller: () => window.DespesasController,
        aplicar: onDone => window.DespesasController?.setFiltroTexto?.(
          buscaStateDespesas.texto,
          onDone,
          { refreshFilters: true }
        )
      },
      estoque: {
        loaded: () => !!window.EstoqueStore?.isLoaded?.(),
        controller: () => window.EstoqueController,
        aplicar: onDone => window.aplicarBuscaEstoque?.(onDone)
      },
      compras: {
        loaded: () => !!window.ComprasStore?.isLoaded?.(),
        controller: () => window.ComprasController,
        aplicar: onDone => window.aplicarBuscaCompras?.(onDone)
      },
      vendas: {
        loaded: () => !!window.VendasStore?.isLoaded?.(),
        controller: () => window.VendasController,
        aplicar: onDone => window.aplicarBuscaVendas?.(onDone)
      },
      investimentos: {
        loaded: () => !!window.InvestimentosStore?.isLoaded?.(),
        controller: () => window.InvestimentosController,
        aplicar: onDone => window.aplicarBuscaInvestimentos?.(onDone)
      },
      produtos: {
        loaded: () => !!window.ProdutosStore?.isLoaded?.(),
        controller: () => window.ProdutosController,
        aplicar: onDone => window.aplicarBuscaProdutos?.(onDone)
      },
      producao: {
        loaded: () => !!window.ProducaoStore?.isLoaded?.(),
        controller: () => window.ProducaoController,
        aplicar: onDone => window.aplicarBuscaProducao?.(onDone)
      }
    }[aba];
    if (!config) return;

    const loaded = config.loaded();
    const state = obterEstadoRefreshAba(aba);
    const recarregar = deveRecarregarAba(aba, false);
    const controller = config.controller();

    if (!state?.controllerInitialized) {
      state.controllerInitialized = true;
      marcarAbaInicializada(aba, { hydrated: loaded });
      if (controller?.init) {
        window.AppPerf?.measure(`tab.${aba}.init`, () => controller.init());
      }
    } else if (recarregar) {
      window.AppTabRefresh?.requestSync?.(aba, {
        immediate: true,
        prefetch: false,
        force: false,
        markDirty: false
      });
    }

    if (loaded) {
      const precisaRenderizar = !!state?.renderPending || Number(state?.renderRevision || 0) === 0;
      if (precisaRenderizar) {
        config.aplicar(() => notificarRenderAba(aba, { changed: true }));
      }
    }
  }

  function trocarAba(nome) {
    window.AppPerf?.measure('nav.trocarAba', () => {
      const alvo = normalizarNomeAba(nome) || ABA_INICIAL_PADRAO;
      if (!alvo) return;
      const atual = obterNomeAbaAtiva();
      window.AppRecordNavigator?.beforeTabChange?.(atual, alvo);
      window.AppDiag?.mark?.('nav.tab.request', {
        from_tab: atual,
        to_tab: alvo
      });
      const abaAlvo = document.getElementById('aba-' + alvo);
      if (!abaAlvo) {
        window.AppDiag?.mark?.('nav.tab.invalid_target', {
          from_tab: atual,
          to_tab: alvo
        });
        return;
      }
      if (atual && atual === alvo) {
        fecharMenuNavbar();
        atualizarEstadoNavbar(alvo);
        setTopBars(alvo);
        executarCicloAba(alvo);
        window.AppSyncStatus?.refresh?.();
        salvarUltimaAba(alvo);
        window.AppDiag?.mark?.('nav.tab.same', {
          tab: alvo
        });
        return;
      }

      document.querySelectorAll('.aba')
        .forEach(a => a.classList.add('hidden'));

      abaAlvo.classList.remove('hidden');
      fecharMenuNavbar();
      atualizarEstadoNavbar(alvo);
      setTopBars(alvo);
      executarCicloAba(alvo);
      window.AppSyncStatus?.refresh?.();
      salvarUltimaAba(alvo);
      window.AppDiag?.mark?.('nav.tab.changed', {
        from_tab: atual,
        to_tab: alvo
      });
    }, { aba: String(nome || '') });
  }

    const topEstoque = document.getElementById('topBarEstoque');

    const topProducao = document.getElementById('topBarProducao');
    const bottomBar = document.querySelector('.bottom-bar');

    if (topEstoque) topEstoque.classList.toggle('hidden', nome !== 'estoque');
    if (topCompras) topCompras.classList.toggle('hidden', nome !== 'compras');
    if (topVendas) topVendas.classList.toggle('hidden', nome !== 'vendas');
    if (topInvestimentos) topInvestimentos.classList.toggle('hidden', nome !== 'investimentos');
    if (topDespesas) topDespesas.classList.toggle('hidden', nome !== 'despesas');
    if (topProdutos) topProdutos.classList.toggle('hidden', nome !== 'produtos');
    if (topProducao) topProducao.classList.toggle('hidden', nome !== 'producao');

    if (nome !== 'compras') {

      window.DespesasController.fecharPainelFiltros();
    }

    } else if (abaAtiva.id === 'aba-compras') {

      }
    } else if (abaAtiva.id === 'aba-vendas') {

  function createSyncFeedbackHelper() {
    const MIN_FINAL_DELAY_MS = 450;

    function iniciar(msgInicial = 'Salvo com sucesso. Atualizando dados...', msgFinalPadrao = 'Dados atualizados', opcoes = {}) {
      const inicio = Date.now();
      const abaSync = normalizarNomeAba(opcoes?.aba || obterNomeAbaAtiva());
      const tokenSync = window.AppSyncStatus?.iniciar
        ? window.AppSyncStatus.iniciar(abaSync, String(opcoes?.textoSync || '').trim())
        : null;
      if (msgInicial) {
        mostrarToast(msgInicial);
      }
      let concluido = false;
      return function concluir(msgFinal = msgFinalPadrao) {
        if (concluido) return;
        concluido = true;
        if (tokenSync) {
          window.AppSyncStatus.finalizar(tokenSync);
        }
        const atrasar = Math.max(0, MIN_FINAL_DELAY_MS - (Date.now() - inicio));
        setTimeout(() => {
          mostrarToast(msgFinal);
        }, atrasar);
      };
    }

    return {
      iniciar
    };
  }

    const unidade = (buscaState.unidade || '').trim();
    const renderKey = buildBuscaRenderKey([texto, tipo, categoria, unidade]);
    const versaoStore = window.EstoqueStore?.getVersion?.();

    const versaoStore = window.ProducaoStore?.getVersion?.();

    if (devePularRenderBusca('producao', versaoStore, renderKey)) {
      window.AppPerf?.end(perf, {
        skipped_render: true,
        texto_len: texto.length
      });
      concluir?.();
      return;
    }

    const lista = ProducaoStore.filter({
      texto: texto || undefined
    });

    ProducaoUI.renderLista(lista, concluir);
    window.AppPerf?.end(perf, {
      total: Array.isArray(lista) ? lista.length : 0,
      texto_len: texto.length
    });
  }

  function createBootGateHelper() {
    const DEFAULT_TIMEOUT_MS = 2400;
    const DEFAULT_POLL_MS = 60;

    function dashboardPronto() {
      const cards = document.querySelectorAll('#dashboardCards .dash-card');
      if (cards.length > 0) return true;
      const content = document.getElementById('dashboardContent');
      const error = document.getElementById('dashboardError');
      return (!!content && !content.classList.contains('hidden')) ||
        (!!error && !error.classList.contains('hidden'));
    }

    function abaPronta(tab) {
      const aba = normalizarNomeAba(tab);
      if (!aba) return true;

      if (aba === 'dashboard') return dashboardPronto();
      const loaded = aba === 'despesas'
        ? !!window.DespesasController?.isLoaded?.()
        : aba === 'estoque'
          ? !!window.EstoqueStore?.isLoaded?.()
          : aba === 'compras'
            ? !!window.ComprasStore?.isLoaded?.()
            : aba === 'vendas'
              ? !!window.VendasStore?.isLoaded?.()
              : aba === 'investimentos'
                ? !!window.InvestimentosStore?.isLoaded?.()
                : aba === 'produtos'
                  ? !!window.ProdutosStore?.isLoaded?.()
                  : aba === 'producao'
                    ? !!window.ProducaoStore?.isLoaded?.()
                    : true;
      if (!loaded) return false;
      const lifecycle = window.AppTabRefresh?.getState?.(aba);
      return Number(lifecycle?.renderRevision || 0) > 0;

    }

    function waitForTabReady(tab, options = {}) {
      const aba = normalizarNomeAba(tab);
      if (!aba) return Promise.resolve(true);
      if (abaPronta(aba)) return Promise.resolve(true);

      const timeoutMs = Number(options.timeoutMs) > 0
        ? Number(options.timeoutMs)
        : DEFAULT_TIMEOUT_MS;
      const pollMs = Number(options.pollMs) > 0
        ? Number(options.pollMs)
        : DEFAULT_POLL_MS;
      const startedAt = Date.now();

      return new Promise(resolve => {
        let resolved = false;
        let timer = null;

        const finalizar = ok => {
          if (resolved) return;
          resolved = true;
          if (timer) {
            clearTimeout(timer);
            timer = null;
          }
          window.removeEventListener('app:store:loaded', onStoreLoaded);
          window.removeEventListener('app:tab:rendered', onTabRendered);
          resolve(!!ok);
        };

        const onStoreLoaded = evento => {
          const tabEvento = String(evento?.detail?.tab || '').trim().toLowerCase();
          if (tabEvento !== aba) return;
          if (abaPronta(aba)) {
            finalizar(true);
          }
        };

        const onTabRendered = evento => {
          const tabEvento = String(evento?.detail?.tab || '').trim().toLowerCase();
          if (tabEvento !== aba) return;
          if (abaPronta(aba)) finalizar(true);
        };

        const tick = () => {
          if (abaPronta(aba)) {
            finalizar(true);
            return;
          }
          if ((Date.now() - startedAt) >= timeoutMs) {
            finalizar(false);
            return;
          }
          timer = setTimeout(tick, pollMs);
        };

        window.addEventListener('app:store:loaded', onStoreLoaded);
        window.addEventListener('app:tab:rendered', onTabRendered);
        tick();
      });
    }

    return {
      waitForTabReady
    };
  }

  async function carregarContextoInicialAplicacao() {
    window.AppUserAccess?.apply?.({
      can_read: true,
      can_write: false,
      role: 'viewer',
      motivo: 'Validando perfil de acesso...'
    });

    const ambienteDesejado = salvarDbEnvSessaoFront(lerDbEnvSessaoFront());
    if (window.AppRequest?.call) {
      try {
        const payload = await Promise.race([
          window.AppRequest.call(
            'obterContextoInicialAplicacao',
            [ambienteDesejado, false],
            {
              context: 'app.bootstrap',
              errorMessage: 'Falha ao inicializar acesso e ambiente.'
            }
          ),
          new Promise((_, reject) => setTimeout(() => {
            reject(new Error('Tempo limite ao validar acesso e ambiente.'));
          }, 7500))
        ]);
        const acesso = window.AppUserAccess?.apply?.(payload?.acesso || {}) || payload?.acesso || {};
        if (acesso?.can_read === false) {
          return { acesso, bancoDados: null, source: 'bootstrap' };
        }
        const bancoDados = window.AppDbEnv?.apply?.(payload?.banco_dados || {}) || payload?.banco_dados || {};
        salvarDbEnvSessaoFront(bancoDados?.can_toggle ? bancoDados?.effective_env : 'prod');
        try {
          window.sessionStorage?.removeItem(DB_ENV_RECONCILE_STORAGE_KEY);
        } catch (storageError) {
          // sem acao
        }
        return { acesso, bancoDados, source: 'bootstrap' };
      } catch (error) {
        window.AppDiag?.mark?.('app.bootstrap.fallback', {
          message: String(error?.message || error || '')
        });
        const acesso = window.AppUserAccess?.apply?.({
          can_read: false,
          can_write: false,
          role: 'viewer',
          motivo: error?.message || 'Nao foi possivel validar seu acesso e o banco ativo.'
        }) || { can_read: false };
        return { acesso, bancoDados: null, source: 'bootstrap-error' };
      }
    }
    const acesso = window.AppUserAccess?.apply?.({
      can_read: false,
      can_write: false,
      role: 'viewer',
      motivo: 'Backend indisponivel - nao foi possivel validar seu acesso.'
    }) || { can_read: false };
    return { acesso, bancoDados: null, source: 'backend-unavailable' };
  }

  function uniqueSorted(arr) {
    return [...new Set(arr.filter(v => String(v || '').trim() !== ''))]
      .map(v => String(v).trim())
      .sort((a, b) => a.localeCompare(b));
  }

  function preencherSelect(selectEl, valores, placeholder) {
    if (!selectEl) return;

    selectEl.innerHTML = '';
    const opt0 = document.createElement('option');
    opt0.value = '';
    opt0.textContent = placeholder;
    selectEl.appendChild(opt0);

    valores.forEach(v => {
      const o = document.createElement('option');
      o.value = v;
      o.textContent = v;
      selectEl.appendChild(o);
    });
  }

  function getTiposValidacaoCache() {
    const cache = window.AppValidacoesCache || {};
    const tipos = Array.isArray(cache.tipos) ? cache.tipos : [];
    return uniqueSorted(tipos);
  }

  function popularFiltrosDoPainel() {
    if (!window.EstoqueStore) return;
    if (!EstoqueStore.isLoaded()) return;

    const itens = EstoqueStore.get();

    const tiposValidacao = getTiposValidacaoCache();
    const tipos = tiposValidacao.length > 0
      ? tiposValidacao
      : uniqueSorted(itens.map(i => i.tipo));
    const categorias = uniqueSorted(itens.map(i => i.categoria));
    const unidades = uniqueSorted(itens.map(i => i.unidade));

    const selTipo = document.getElementById('filtroTipo');
    const selCategoria = document.getElementById('filtroCategoria');
    const selUnidade = document.getElementById('filtroUnidade');

    // preserva seleção atual (se já tiver)
    const tipoAtual = selTipo ? selTipo.value : '';
    const catAtual = selCategoria ? selCategoria.value : '';
    const unidadeAtual = selUnidade ? selUnidade.value : '';

    preencherSelect(selTipo, tipos, 'Tipo (todos)');
    preencherSelect(selUnidade, unidades, 'Unidade (todas)');
    preencherSelect(selCategoria, categorias, 'Categoria (todas)');

    // restaura se ainda existir
    if (selTipo && tipos.includes(tipoAtual)) selTipo.value = tipoAtual;
    if (selCategoria && categorias.includes(catAtual)) selCategoria.value = catAtual;
    if (selUnidade && unidades.includes(unidadeAtual)) selUnidade.value = unidadeAtual;

    if (window.EstoqueUI?.marcarTipoRapidoAtivo) {
      EstoqueUI.marcarTipoRapidoAtivo(selTipo ? selTipo.value : '');
    }
  }

  const buscaRenderCache = {};

  function buildBuscaRenderKey(partes = []) {
    return (Array.isArray(partes) ? partes : [])
      .map(parte => String(parte ?? '').trim())
      .join('||');
  }

  function devePularRenderBusca(nomeAba, versaoStore, chaveRender) {
    const aba = normalizarNomeAba(nomeAba);
    const versao = Number(versaoStore);
    if (!aba || !Number.isFinite(versao)) return false;
    const chave = String(chaveRender || '').trim();
    const cache = buscaRenderCache[aba] || {};
    if (cache.versao === versao && cache.chave === chave) {
      return true;
    }
    buscaRenderCache[aba] = {
      versao,
      chave
    };
    return false;
  }

  function agendarIdle(task, timeoutMs = 1200) {
    const fn = typeof task === 'function' ? task : null;
    if (!fn) return;
    if (typeof window !== 'undefined' && typeof window.requestIdleCallback === 'function') {
      window.requestIdleCallback(() => fn(), { timeout: timeoutMs });
      return;
    }
    setTimeout(() => fn(), Math.min(260, Math.max(80, Math.floor(timeoutMs / 6))));
  }

    if (tabUiInfraInitState[aba]) return;

      initBuscaEFiltroEstoque();

    if (aba === 'compras') {

      return;

    if (aba === 'vendas') {
      initBuscaVendas();
      return;
    }
    if (aba === 'investimentos') {
      initBuscaInvestimentos();
      return;

    if (aba === 'despesas') {

      return;

    if (aba === 'produtos') {

  function initBuscaEFiltroEstoque() {

    tabUiInfraInitState.estoque = true;
    const input = document.getElementById('buscaEstoque');
    const btnFiltro = document.getElementById('btnFiltro');

    // busca
    if (input) {
      input.addEventListener('input', () => {
        buscaState.texto = input.value || '';
        aplicarBuscaEstoqueDebounced();
      });
    }

    // botão filtro
    if (btnFiltro) {
      btnFiltro.addEventListener('click', () => {
        if (!painelFiltroExiste()) {
          mostrarToast('Filtro avancado em breve');
          return;

        togglePainelFiltro();

    // listeners do painel (se existir)

    const tipo = document.getElementById('filtroTipo');
    const categoria = document.getElementById('filtroCategoria');
    const unidade = document.getElementById('filtroUnidade');
    const btnLimpar = document.getElementById('btnLimparFiltros'); // ✅ seu ID correto

    // muda e aplica automaticamente
    [tipo, categoria, unidade].forEach(sel => {
      if (!sel) return;
      sel.addEventListener('change', () => {
        lerFiltrosDoPainel();
        aplicarBuscaEstoque();

    if (btnLimpar) {
      btnLimpar.addEventListener('click', () => {
        limparFiltros();

    if (input) {
      input.addEventListener('input', () => {
        buscaStateVendas.texto = input.value || '';
        aplicarBuscaVendasDebounced();
      });
    }

    if (btnFiltro) {
      btnFiltro.addEventListener('click', () => {
        mostrarToast('Filtro avancado em breve');
      });
    }
  }

  let longTaskObserver = null;

  function deveMonitorarLongTask() {
    return !!window.AppPerf?.isEnabled?.() || !!window.AppDiag?.isEnabled?.();
  }

  function initLongTaskMonitor() {
    if (typeof window === 'undefined' || typeof window.PerformanceObserver === 'undefined') return;
    if (longTaskObserver || !deveMonitorarLongTask()) return;
    try {
      longTaskObserver = new PerformanceObserver(list => {
        const entries = list.getEntries();
        entries.forEach(entry => {
          const durMs = Number(entry.duration || 0);
          const dur = Number(durMs || 0).toFixed(1);
          if (window.AppPerf?.isEnabled?.()) {
            console.warn(`[longtask] ${dur}ms`);
          }
          window.AppDiag?.mark?.('perf.longtask', {
            duration_ms: Number(dur),
            start_ms: Number(Number(entry.startTime || 0).toFixed(1)),
            name: String(entry.name || '')
          });
        });
      });
      longTaskObserver.observe({ entryTypes: ['longtask'] });
    } catch (error) {
      longTaskObserver = null;
    }
  }

  function syncLongTaskMonitor() {
    if (typeof window === 'undefined' || typeof window.PerformanceObserver === 'undefined') return;
    if (deveMonitorarLongTask()) {
      initLongTaskMonitor();
      return;
    }
    if (!longTaskObserver) return;
    try {
      longTaskObserver.disconnect();
    } catch (error) {
      // sem acao
    }
    longTaskObserver = null;
  }

  const modalFocusState = new WeakMap();
  let estadoModalGlobal = {
    aberto: false,
    total: 0
  };

  function listarModaisAbertos() {
    return [...document.querySelectorAll('.modal')].filter(m => !m.classList.contains('hidden'));
  }

  function listarFocaveis(container) {
    if (!container) return [];
    const seletor = [
      'button:not([disabled]):not([tabindex="-1"])',
      'a[href]:not([tabindex="-1"])',
      'input:not([disabled]):not([type="hidden"]):not([tabindex="-1"])',
      'select:not([disabled]):not([tabindex="-1"])',
      'textarea:not([disabled]):not([tabindex="-1"])',
      '[tabindex]:not([tabindex="-1"])'
    ].join(',');
    return [...container.querySelectorAll(seletor)].filter(el => {
      const style = window.getComputedStyle(el);
      return style.display !== 'none' && style.visibility !== 'hidden';
    });
  }

  function atualizarEstadoBodyModal() {
    if (typeof document === 'undefined' || !document.body) return;
    const total = listarModaisAbertos().length;
    const aberto = total > 0;
    document.body.classList.toggle('modal-open', aberto);
    if (estadoModalGlobal.aberto === aberto && estadoModalGlobal.total === total) return;
    estadoModalGlobal = {
      aberto,
      total
    };
    if (typeof window === 'undefined') return;
    try {
      window.dispatchEvent(new CustomEvent('app:modal-open-changed', {
        detail: {
          modal_open: aberto,
          open_modals: total
        }
      }));
    } catch (error) {
      // sem acao
    }
  }

  function focarAoAbrirModal(modal) {
    if (!modal) return;
    const conteudo = modal.querySelector('.modal-content');
    if (!conteudo) return;

    const state = modalFocusState.get(modal) || {};
    if (!state.opener || !document.contains(state.opener)) {
      state.opener = document.activeElement instanceof HTMLElement ? document.activeElement : null;
    }
    modalFocusState.set(modal, state);

    const focoAlvo = modal.querySelector('.modal-close-square:not([disabled])') || listarFocaveis(conteudo)[0] || conteudo;
    if (!focoAlvo.getAttribute('tabindex') && focoAlvo === conteudo) {
      focoAlvo.setAttribute('tabindex', '-1');
    }
    setTimeout(() => {
      try {
        focoAlvo.focus({ preventScroll: true });
      } catch (error) {
        // sem acao
      }
    }, 0);
  }

  function restaurarFocoAoFechar(modal) {
    const state = modalFocusState.get(modal);
    if (!state?.opener || !document.contains(state.opener)) return;
    setTimeout(() => {
      try {
        state.opener.focus({ preventScroll: true });
      } catch (error) {
        // sem acao
      }
    }, 0);
  }

  function atualizarAriaModal(modal) {
    if (!modal) return;
    const aberto = !modal.classList.contains('hidden');
    modal.setAttribute('aria-hidden', aberto ? 'false' : 'true');
    const abertoAntes = modal.dataset.a11yOpen === '1';
    if (aberto && !abertoAntes) {
      modal.dataset.a11yOpen = '1';
      focarAoAbrirModal(modal);
    } else if (!aberto && abertoAntes) {
      modal.dataset.a11yOpen = '0';
      restaurarFocoAoFechar(modal);
    }
    atualizarEstadoBodyModal();
  }

  function fecharModalPorInteracao(modal) {
    if (!modal) return false;
    const btnFechar = modal.querySelector('.modal-close-square');
    if (btnFechar && !btnFechar.disabled) {
      btnFechar.click();
      return true;
    }
    modal.classList.add('hidden');
    atualizarAriaModal(modal);
    return true;
  }

  function initModalA11y() {
    const modais = [...document.querySelectorAll('.modal')];
    if (modais.length === 0) return;

    modais.forEach((modal, idx) => {
      if (!modal.id) {
        modal.id = `modal_auto_${idx + 1}`;
      }
      modal.setAttribute('role', 'dialog');
      modal.setAttribute('aria-modal', 'true');

      const titulo = modal.querySelector('.modal-content h1, .modal-content h2, .modal-content h3');
      if (titulo) {
        if (!titulo.id) {
          titulo.id = `${modal.id}_title`;
        }
        modal.setAttribute('aria-labelledby', titulo.id);
      }

      atualizarAriaModal(modal);

      modal.addEventListener('click', evento => {
        if (evento.target !== modal) return;
        if (window.AppMutationUI?.isLocked?.()) return;
        fecharModalPorInteracao(modal);
      });

      if (typeof MutationObserver !== 'undefined') {
        const observer = new MutationObserver(() => {
          atualizarAriaModal(modal);
        });
        observer.observe(modal, { attributes: true, attributeFilter: ['class'] });
      }
    });

    document.addEventListener('keydown', evento => {
      const abertos = listarModaisAbertos();
      if (abertos.length === 0) return;
      const topo = abertos[abertos.length - 1];

      if (evento.key === 'Escape') {
        if (window.AppMutationUI?.isLocked?.()) return;
        evento.preventDefault();
        fecharModalPorInteracao(topo);
        return;
      }

      if (evento.key !== 'Tab') return;
      const conteudo = topo.querySelector('.modal-content');
      if (!conteudo) return;
      const focaveis = listarFocaveis(conteudo);
      if (focaveis.length === 0) {
        evento.preventDefault();
        conteudo.setAttribute('tabindex', '-1');
        conteudo.focus({ preventScroll: true });
        return;
      }
      const primeiro = focaveis[0];
      const ultimo = focaveis[focaveis.length - 1];
      if (evento.shiftKey && document.activeElement === primeiro) {
        evento.preventDefault();
        ultimo.focus({ preventScroll: true });
      } else if (!evento.shiftKey && document.activeElement === ultimo) {
        evento.preventDefault();
        primeiro.focus({ preventScroll: true });
      }
    });
  }

  window.AppModalUI = window.AppModalUI || {
    listOpen: listarModaisAbertos,
    close(modal) {
      return fecharModalPorInteracao(modal);
    },
    closeClosest(elemento) {
      const modal = elemento?.closest?.('.modal') || null;
      if (!modal || modal.classList.contains('hidden')) return false;
      return fecharModalPorInteracao(modal);
    },
    closeAll() {
      const abertos = listarModaisAbertos().reverse();
      abertos.forEach(modal => fecharModalPorInteracao(modal));
      return abertos.length;
    }
  };

  function initCampoAjudaA11y() {
    let seq = 0;
    const wrappers = document.querySelectorAll('.campo-ajuda-wrap');
    wrappers.forEach(wrap => {
      const tag = wrap.querySelector('.campo-ajuda-tag');
      const label = String(tag?.textContent || '').trim();
      if (!label) return;

      const campos = [...wrap.querySelectorAll('input, select, textarea')];
      campos.forEach(campo => {
        if (!campo.getAttribute('aria-label')) {
          campo.setAttribute('aria-label', label);
        }
        if (!campo.id) {
          seq += 1;
          campo.id = `campo_auto_${seq}`;
        }
        const existente = wrap.querySelector(`label.sr-only[for="${campo.id}"]`);
        if (existente) return;
        const labelEl = document.createElement('label');
        labelEl.className = 'sr-only';
        labelEl.setAttribute('for', campo.id);
        labelEl.textContent = label;
        const campoDentroLabel = campo.closest('label');
        if (campoDentroLabel && wrap.contains(campoDentroLabel) && campoDentroLabel !== wrap) {
          wrap.insertBefore(labelEl, campoDentroLabel);
          return;
        }
        const parent = campo.parentElement;
        if (parent && wrap.contains(parent)) {
          parent.insertBefore(labelEl, campo);
          return;
        }
        wrap.insertBefore(labelEl, wrap.firstChild);
      });
    });
  }

  document.addEventListener('DOMContentLoaded', async () => {
    const bootWatchdog = setTimeout(() => {
      if (document?.body?.classList?.contains('app-booting')) {
        document.body.classList.remove('app-booting');
        if (typeof mostrarToast === 'function') {
          mostrarToast('A inicializacao demorou demais. Interface liberada em modo de recuperacao.', 'erro');
        }
      }
    }, 9000);

    try {
      syncLongTaskMonitor();
      resetarEstadoInicialFiltros();

      if (window.AppDbEnv?.initMenu) {
        window.AppDbEnv.initMenu();
      }
      const contextoInicial = await carregarContextoInicialAplicacao();
      const contextoAcesso = contextoInicial?.acesso || null;
      if (contextoAcesso?.can_read === false) return;

      window.dispatchEvent(new CustomEvent('app:bootstrap-ready', {
        detail: {
          acesso: contextoAcesso,
          banco_dados: contextoInicial?.bancoDados || null,
          source: contextoInicial?.source || ''
        }
      }));

      initNavbarHamburger();
      initNavegacaoAdaptativa();
      registrarListenersFiltrosStore();
      initModalA11y();
      initCampoAjudaA11y();
      const abaInicial = lerUltimaAba() || ABA_INICIAL_PADRAO;
      trocarAba(abaInicial);
      finalizarBootVisual();
      preaquecerInfraTabsSecundarias(abaInicial);
    } finally {
      clearTimeout(bootWatchdog);
      finalizarBootVisual();
    }
  });
</script>
