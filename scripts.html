<script>
  /* =========================
     NAV / ABAS
  ========================== */
  const ABAS_MENU_HAMBURGER = ['dashboard', 'despesas', 'estoque', 'compras', 'vendas', 'investimentos', 'produtos', 'producao'];
  const ABAS_APP = [...ABAS_MENU_HAMBURGER];
  const ABAS_MOBILE_NAV_DIRETAS = ['dashboard', 'despesas', 'compras', 'producao'];
  const ABA_INICIAL_PADRAO = 'dashboard';
  const LAST_TAB_STORAGE_KEY = 'app:lasttab:v1';
  const QUICK_FILTER_STOCK_TYPE_KEY = 'app:quickfilter:v1:estoque:tipo';
  const QUICK_FILTER_PURCHASE_TYPE_KEY = 'app:quickfilter:v1:compras:tipo';
  const DB_ENV_SESSION_STORAGE_KEY = 'app:db_env_session:v1';
  const DB_ENV_RECONCILE_STORAGE_KEY = 'app:db_env_reconcile:v1';
  let listenerFecharMenuNavbarAtivo = false;
  let listenerBloqueioDrawerAtivo = false;
  let ultimoAcionadorMenuNavbar = null;

  function normalizarDbEnvFront(valor) {
    const env = String(valor || '').trim().toLowerCase();
    return env === 'dev' ? 'dev' : 'prod';
  }

  function lerDbEnvSessaoFront() {
    try {
      if (!window.sessionStorage) return 'prod';
      const raw = window.sessionStorage.getItem(DB_ENV_SESSION_STORAGE_KEY);
      return normalizarDbEnvFront(raw);
    } catch (error) {
      return 'prod';
    }
  }

  function salvarDbEnvSessaoFront(valor) {
    const env = normalizarDbEnvFront(valor);
    try {
      if (!window.sessionStorage) return env;
      window.sessionStorage.setItem(DB_ENV_SESSION_STORAGE_KEY, env);
    } catch (error) {
      // sem acao
    }
    return env;
  }

  function getDbEnvEls() {
    return {
      section: document.getElementById('dbEnvMenuSection'),
      btnProd: document.getElementById('btnDbEnvProd'),
      btnDev: document.getElementById('btnDbEnvDev'),
      banner: document.getElementById('appDbEnvBanner'),
      bannerText: document.getElementById('appDbEnvBannerText')
    };
  }

  function createDbEnvironmentHelper() {
    let contexto = {
      can_toggle: false,
      effective_env: 'prod',
      selected_env: 'prod',
      role: 'viewer'
    };
    let inFlight = null;
    let menuInitDone = false;

    function withTimeout(promise, timeoutMs, timeoutMsg) {
      const ms = Math.max(500, Number(timeoutMs) || 5000);
      return Promise.race([
        Promise.resolve(promise),
        new Promise((_, reject) => {
          setTimeout(() => {
            const error = new Error(String(timeoutMsg || 'Tempo limite excedido').trim());
            error.code = 'APP_REQUEST_TIMEOUT';
            reject(error);
          }, ms);
        })
      ]);
    }

    function isAdmin(acesso) {
      return String(acesso?.role || '').trim().toLowerCase() === 'admin' && acesso?.can_write === true;
    }

    function normalizarContexto(raw) {
      const base = raw && typeof raw === 'object' ? raw : {};
      return {
        ...base,
        can_toggle: base.can_toggle === true,
        effective_env: normalizarDbEnvFront(base.effective_env || base.selected_env || 'prod'),
        selected_env: normalizarDbEnvFront(base.selected_env || base.effective_env || 'prod'),
        role: String(base.role || '').trim().toLowerCase() || 'viewer'
      };
    }

    function render() {
      const { section, btnProd, btnDev, banner, bannerText } = getDbEnvEls();
      const canToggle = contexto.can_toggle === true;
      const envAtivo = normalizarDbEnvFront(contexto.effective_env);
      const isDev = envAtivo === 'dev';

      if (section) {
        section.classList.toggle('hidden', !canToggle);
      }

      if (btnProd) {
        btnProd.classList.toggle('active', envAtivo === 'prod');
        btnProd.disabled = !canToggle || inFlight !== null;
        btnProd.setAttribute('aria-pressed', envAtivo === 'prod' ? 'true' : 'false');
      }

      if (btnDev) {
        btnDev.classList.toggle('active', envAtivo === 'dev');
        btnDev.disabled = !canToggle || inFlight !== null;
        btnDev.setAttribute('aria-pressed', envAtivo === 'dev' ? 'true' : 'false');
      }

      if (banner) {
        banner.classList.toggle('hidden', !isDev);
      }
      if (bannerText) {
        bannerText.textContent = isDev
          ? 'MODO DEV ativo - voce esta trabalhando no banco de testes'
          : 'MODO PROD ativo';
      }
    }

    function recarregarAplicacaoAposTrocaDb_() {
      let fallbackTimer = null;
      try {
        fallbackTimer = setTimeout(() => {
          try {
            window.location.reload();
          } catch (error) {
            // sem acao
          }
        }, 1200);
      } catch (error) {
        // sem acao
      }

      try {
        const url = new URL(window.location.href);
        url.searchParams.set('db_refresh', String(Date.now()));
        window.location.assign(url.toString());
        return;
      } catch (error) {
        // fallback abaixo
      }

      try {
        window.location.reload();
      } catch (error) {
        // sem acao
      } finally {
        if (fallbackTimer) {
          clearTimeout(fallbackTimer);
        }
      }
    }

    function aplicar(raw) {
      contexto = normalizarContexto(raw);
      render();
      if (typeof window !== 'undefined') {
        try {
          window.dispatchEvent(new CustomEvent('app:db-env:changed', {
            detail: contexto
          }));
        } catch (error) {
          // sem acao
        }
      }
      return contexto;
    }

    async function bootstrap(acessoCtx) {
      if (!window.AppRequest?.call) {
        aplicar({
          can_toggle: isAdmin(acessoCtx),
          effective_env: 'prod',
          selected_env: 'prod',
          role: String(acessoCtx?.role || '').trim().toLowerCase() || 'viewer'
        });
        return contexto;
      }

      const admin = isAdmin(acessoCtx);
      let desiredEnv = 'prod';
      if (admin) {
        desiredEnv = salvarDbEnvSessaoFront(lerDbEnvSessaoFront());
      } else {
        salvarDbEnvSessaoFront('prod');
      }

      try {
        const payload = await withTimeout(
          window.AppRequest.call('definirContextoBancoDados', [desiredEnv], {
            context: 'db.env.bootstrap',
            errorMessage: 'Falha ao aplicar ambiente de banco de dados.'
          }),
          6000,
          'Timeout ao aplicar ambiente de banco de dados.'
        );
        const ctx = aplicar(payload || {});
        if (ctx.can_toggle) {
          salvarDbEnvSessaoFront(ctx.effective_env);
        } else {
          salvarDbEnvSessaoFront('prod');
        }
        return ctx;
      } catch (error) {
        // Nao inventa PROD/admin quando o backend nao confirmou o contexto.
        // Este caminho legado deve falhar fechado; o bootstrap principal
        // tambem bloqueia a interface quando a validacao remota falha.
        window.AppDiag?.mark?.('db.env.legacy_bootstrap.failed_closed', {
          desired_env: desiredEnv,
          message: String(error?.message || error || '')
        });
        throw error;
      }
    }

    async function trocar(ambiente) {
      const alvo = normalizarDbEnvFront(ambiente);
      if (!contexto.can_toggle) {
        if (typeof mostrarToast === 'function') {
          mostrarToast('Somente admin pode trocar o banco de dados ativo.', 'erro');
        }
        return contexto;
      }
      if (normalizarDbEnvFront(contexto.effective_env) === alvo) {
        fecharMenuNavbar();
        return contexto;
      }
      if (inFlight) return inFlight;
      if (window.AppMutationUI?.isLocked?.()) {
        if (typeof mostrarToast === 'function') {
          mostrarToast('Aguarde a operacao em andamento antes de trocar o banco.', 'erro');
        }
        return contexto;
      }
      const preparoTroca = window.AppOptimistic?.prepareContextSwitch?.(alvo) || { ok: true };
      if (preparoTroca.ok === false) {
        if (typeof mostrarToast === 'function') {
          mostrarToast(preparoTroca.reason || 'Aguarde a sincronizacao antes de trocar o banco.', 'erro');
        }
        return contexto;
      }
      if (!window.AppRequest?.call) {
        window.AppOptimistic?.cancelContextSwitch?.();
        throw new Error('google.script.run indisponivel');
      }
      inFlight = withTimeout(
        window.AppRequest.call('definirContextoBancoDados', [alvo], {
          context: 'db.env.toggle',
          errorMessage: 'Falha ao trocar banco de dados.'
        }),
        8000,
        'Timeout ao trocar banco de dados.'
      )
        .then(payload => {
          const ctx = aplicar(payload || {});
          const envAtivo = normalizarDbEnvFront(ctx.effective_env);
          salvarDbEnvSessaoFront(envAtivo);
          fecharMenuNavbar();
          if (typeof mostrarToast === 'function') {
            mostrarToast(`Banco ativo: ${envAtivo.toUpperCase()}`);
          }
          setTimeout(() => {
            recarregarAplicacaoAposTrocaDb_();
          }, 120);
          return ctx;
        })
        .catch(error => {
          if (String(error?.code || '') === 'APP_REQUEST_TIMEOUT') {
            // A Promise do GAS nao e cancelavel e pode concluir depois do
            // timeout local. Mantemos a outbox pausada, persistimos o destino
            // desejado e recarregamos para o bootstrap consultar o estado real.
            salvarDbEnvSessaoFront(alvo);
            try {
              window.sessionStorage?.setItem(DB_ENV_RECONCILE_STORAGE_KEY, JSON.stringify({
                target: alvo,
                requestedAt: Date.now()
              }));
            } catch (storageError) {
              // A chave principal de sessao acima ainda orienta o bootstrap.
            }
            window.AppDiag?.mark?.('db.env.toggle.timeout_reconcile', { target: alvo });
            if (typeof mostrarToast === 'function') {
              mostrarToast('A troca demorou. Recarregando para confirmar o banco ativo...', 'erro');
            }
            setTimeout(() => recarregarAplicacaoAposTrocaDb_(), 80);
          } else {
            window.AppOptimistic?.cancelContextSwitch?.();
          }
          throw error;
        })
        .finally(() => {
          inFlight = null;
          render();
        });

      render();
      return inFlight;
    }

    function initMenu() {
      if (menuInitDone) return;
      menuInitDone = true;
      const { btnProd, btnDev } = getDbEnvEls();
      if (btnProd) {
        btnProd.addEventListener('click', () => {
          trocar('prod').catch(error => {
            if (String(error?.code || '') !== 'APP_REQUEST_TIMEOUT' && typeof mostrarToast === 'function') {
              mostrarToast(error?.message || 'Falha ao trocar para PROD', 'erro');
            }
          });
        });
      }
      if (btnDev) {
        btnDev.addEventListener('click', () => {
          trocar('dev').catch(error => {
            if (String(error?.code || '') !== 'APP_REQUEST_TIMEOUT' && typeof mostrarToast === 'function') {
              mostrarToast(error?.message || 'Falha ao trocar para DEV', 'erro');
            }
          });
        });
      }
      render();
    }

    function getContext() {
      return contexto;
    }

    return {
      bootstrap,
      initMenu,
      getContext,
      apply: aplicar
    };
  }

  window.AppDbEnv = window.AppDbEnv || createDbEnvironmentHelper();

  const APP_TAB_PRESENTATION = {
    dashboard: {
      label: 'Inicio',
      eyebrow: 'Painel operacional',
      title: 'Visao consolidada',
      subtitle: 'Acompanhe caixa, estoque, gastos e producao em uma leitura unica e mais executiva.'
    },
    despesas: {
      label: 'Despesas',
      eyebrow: 'Controle financeiro',
      title: 'Saidas e obrigacoes',
      subtitle: 'Organize pagamentos, categorias e acompanhamento de despesas em um fluxo mais claro.'
    },
    estoque: {
      label: 'Estoque',
      eyebrow: 'Posicao operacional',
      title: 'Saldo, reserva e disponibilidade',
      subtitle: 'Visualize itens em estoque com uma leitura mais proxima de carteira e posicao.'
    },
    compras: {
      label: 'Compras',
      eyebrow: 'Entradas e aquisicoes',
      title: 'Abastecimento da operacao',
      subtitle: 'Acompanhe pedidos, fornecedores e entradas de estoque em um fluxo mais limpo.'
    },
    vendas: {
      label: 'Vendas',
      eyebrow: 'Receita e recebimento',
      title: 'Faturamento acompanhado de perto',
      subtitle: 'Consulte vendas, recebimentos e pendencias em uma tela mais objetiva.'
    },
    investimentos: {
      label: 'Investimentos',
      eyebrow: 'Capital dos socios',
      title: 'Aportes e recebimentos',
      subtitle: 'Acompanhe os recursos colocados na empresa sem mistura-los ao faturamento operacional.'
    },
    produtos: {
      label: 'Produtos',
      eyebrow: 'Catalogo de producao',
      title: 'Modelos e composicao do portfolio',
      subtitle: 'Gerencie produtos e modelos com uma organizacao mais forte de cadastro.'
    },
    producao: {
      label: 'Producao',
      eyebrow: 'Ordens e execucao',
      title: 'Planejamento e baixa de materiais',
      subtitle: 'Acompanhe ordens de producao, reservas e consumo em um layout mais controlado.'
    }
  };

  const APP_PRIMARY_ACTION_LABELS = {
    despesas: 'Nova despesa',
    estoque: 'Novo item de estoque',
    compras: 'Nova compra',
    vendas: 'Nova venda',
    investimentos: 'Novo investimento',
    produtos: 'Novo produto',
    producao: 'Nova producao'
  };

  function normalizarNomeAba(valor) {
    const aba = String(valor || '').trim().toLowerCase();
    return ABAS_APP.includes(aba) ? aba : '';
  }

  function obterApresentacaoAba(valor) {
    const aba = normalizarNomeAba(valor) || ABA_INICIAL_PADRAO;
    return APP_TAB_PRESENTATION[aba] || APP_TAB_PRESENTATION.dashboard;
  }

  function atualizarAcaoPrimaria(abaValor) {
    const aba = normalizarNomeAba(abaValor) || ABA_INICIAL_PADRAO;
    const botao = document.getElementById('btnAcaoPrimaria');
    const label = document.getElementById('btnAcaoPrimariaLabel');
    const rotulo = APP_PRIMARY_ACTION_LABELS[aba] || 'Adicionar';
    if (label) label.textContent = rotulo;
    if (botao) botao.setAttribute('aria-label', rotulo);
  }

  function obterAmbienteAtualVisual() {
    const contexto = window.AppDbEnv?.getContext?.() || {};
    return normalizarDbEnvFront(contexto.effective_env || contexto.selected_env || lerDbEnvSessaoFront());
  }

  function atualizarResumoWorkspace(abaValor) {
    const aba = normalizarNomeAba(abaValor) || normalizarNomeAba(obterNomeAbaAtiva()) || ABA_INICIAL_PADRAO;
    const apresentacao = obterApresentacaoAba(aba);
    const envAtual = obterAmbienteAtualVisual();
    const badgeNav = document.getElementById('navCurrentSectionBadge');
    const eyebrow = document.getElementById('appWorkspaceEyebrow');
    const title = document.getElementById('appWorkspaceTitle');
    const subtitle = document.getElementById('appWorkspaceSubtitle');
    const tabBadge = document.getElementById('appWorkspaceTabBadge');
    const envBadge = document.getElementById('appWorkspaceEnvBadge');

    if (badgeNav) badgeNav.textContent = apresentacao.label;
    if (eyebrow) eyebrow.textContent = apresentacao.eyebrow;
    if (title) title.textContent = apresentacao.title;
    if (subtitle) subtitle.textContent = apresentacao.subtitle;
    if (tabBadge) tabBadge.textContent = apresentacao.label;
    if (envBadge) envBadge.textContent = String(envAtual || 'prod').toUpperCase();

    if (document?.body) {
      document.body.dataset.activeTab = aba;
      document.body.dataset.activeEnv = envAtual;
    }
  }

  if (typeof window !== 'undefined') {
    window.addEventListener('app:db-env:changed', () => {
      atualizarResumoWorkspace();
    });
  }

  function salvarUltimaAba(valor) {
    const aba = normalizarNomeAba(valor);
    if (!aba) return;
    try {
      if (!window.localStorage) return;
      window.localStorage.setItem(LAST_TAB_STORAGE_KEY, aba);
    } catch (error) {
      // sem acao
    }
  }

  function lerUltimaAba() {
    try {
      if (!window.localStorage) return '';
      return normalizarNomeAba(window.localStorage.getItem(LAST_TAB_STORAGE_KEY));
    } catch (error) {
      return '';
    }
  }

  function getNavbarHamburgerEls() {
    return {
      wrap: document.getElementById('navbarMenuWrap'),
      btn: document.getElementById('btnNavHamburger'),
      menu: document.getElementById('navbarMenu'),
      backdrop: document.getElementById('navbarMenuBackdrop')
    };
  }

  function setInteracaoPlanoDeFundoDrawer(bloqueado) {
    const alvo = bloqueado === true;
    const shell = document.querySelector('.app-shell');
    const bottomBar = document.querySelector('.bottom-bar');
    const mobileBottomNav = document.getElementById('mobileBottomNav');
    [shell, bottomBar, mobileBottomNav].forEach(el => {
      if (!el) return;
      if (alvo) {
        el.setAttribute('inert', '');
        el.setAttribute('aria-hidden', 'true');
      } else {
        el.removeAttribute('inert');
        el.removeAttribute('aria-hidden');
      }
    });
  }

  function alvoPertenceAoDrawer(target) {
    const { wrap, menu, backdrop } = getNavbarHamburgerEls();
    if (!target) return false;
    if (wrap?.contains?.(target)) return true;
    if (menu?.contains?.(target)) return true;
    if (backdrop?.contains?.(target)) return true;
    return false;
  }

  function bloquearInteracaoForaDrawer(evento) {
    if (!menuNavbarAberto()) return;
    if (alvoPertenceAoDrawer(evento?.target)) return;
    if (typeof evento?.preventDefault === 'function') evento.preventDefault();
    if (typeof evento?.stopImmediatePropagation === 'function') {
      evento.stopImmediatePropagation();
    } else if (typeof evento?.stopPropagation === 'function') {
      evento.stopPropagation();
    }
    if (String(evento?.type || '').toLowerCase() === 'focusin' && typeof evento?.target?.blur === 'function') {
      try {
        evento.target.blur();
      } catch (error) {
        // sem acao
      }
    }
  }

  function ativarBloqueioInteracaoDrawer() {
    if (listenerBloqueioDrawerAtivo) return;
    listenerBloqueioDrawerAtivo = true;
    document.addEventListener('click', bloquearInteracaoForaDrawer, true);
    document.addEventListener('focusin', bloquearInteracaoForaDrawer, true);
    document.addEventListener('touchstart', bloquearInteracaoForaDrawer, { capture: true, passive: false });
    document.addEventListener('touchmove', bloquearInteracaoForaDrawer, { capture: true, passive: false });
    document.addEventListener('touchend', bloquearInteracaoForaDrawer, { capture: true, passive: false });
  }

  function desativarBloqueioInteracaoDrawer() {
    if (!listenerBloqueioDrawerAtivo) return;
    listenerBloqueioDrawerAtivo = false;
    document.removeEventListener('click', bloquearInteracaoForaDrawer, true);
    document.removeEventListener('focusin', bloquearInteracaoForaDrawer, true);
    document.removeEventListener('touchstart', bloquearInteracaoForaDrawer, true);
    document.removeEventListener('touchmove', bloquearInteracaoForaDrawer, true);
    document.removeEventListener('touchend', bloquearInteracaoForaDrawer, true);
  }

  function menuNavbarAberto() {
    const { menu } = getNavbarHamburgerEls();
    return !!menu && !menu.classList.contains('hidden');
  }

  function obterLabelAbaMenu(aba) {
    const alvo = String(aba || '').trim();
    if (!alvo) return '';
    const btnMenu = document.querySelector(`#navbarMenu button[data-aba="${alvo}"]`);
    return String(btnMenu?.textContent || '').trim();
  }

  function atualizarRotuloBotaoHamburger(abaAtiva) {
    const { btn } = getNavbarHamburgerEls();
    if (!btn) return;
    const alvo = String(abaAtiva || '').trim();
    const ativoNoMenu = ABAS_MENU_HAMBURGER.includes(alvo);
    const rotulo = ativoNoMenu ? (obterLabelAbaMenu(alvo) || 'Menu') : 'Menu';
    btn.innerHTML = `<span class="navbar-hamburger-icon" aria-hidden="true">&#9776;</span><span class="navbar-hamburger-label">${rotulo}</span>`;
    btn.setAttribute('aria-label', ativoNoMenu ? `Abrir menu de abas (atual: ${rotulo})` : 'Abrir menu de abas');
  }

  function atualizarEstadoNavbar(abaAtiva) {
    const botoes = document.querySelectorAll('.navbar button[data-aba], #navbarMenu button[data-aba], #mobileBottomNav button[data-aba]');
    const alvo = String(abaAtiva || '').trim();
    botoes.forEach(btn => {
      const ehAtivo = String(btn.dataset.aba || '').trim() === alvo;
      btn.classList.toggle('active', ehAtivo);
      if (ehAtivo) {
        btn.setAttribute('aria-current', 'page');
      } else {
        btn.removeAttribute('aria-current');
      }
    });

    const { btn } = getNavbarHamburgerEls();
    if (btn) {
      const ativoNoMenu = ABAS_MENU_HAMBURGER.includes(alvo);
      btn.classList.toggle('active', ativoNoMenu);
      btn.setAttribute('aria-expanded', menuNavbarAberto() ? 'true' : 'false');
    }

    const btnMais = document.getElementById('btnMobileNavMais');
    if (btnMais) {
      const ehGrupoAtivo = ABAS_APP.includes(alvo) && !ABAS_MOBILE_NAV_DIRETAS.includes(alvo);
      const rotuloAtual = ehGrupoAtivo ? (obterApresentacaoAba(alvo)?.label || '') : '';
      btnMais.classList.toggle('active', ehGrupoAtivo);
      btnMais.setAttribute('aria-expanded', menuNavbarAberto() ? 'true' : 'false');
      btnMais.setAttribute('aria-label', rotuloAtual ? `Abrir mais areas (atual: ${rotuloAtual})` : 'Abrir mais areas');
      if (ehGrupoAtivo) {
        btnMais.setAttribute('aria-current', 'page');
      } else {
        btnMais.removeAttribute('aria-current');
      }
    }
    atualizarRotuloBotaoHamburger(alvo);
    atualizarResumoWorkspace(alvo);
    atualizarAcaoPrimaria(alvo);
  }

  function salvarFiltroRapidoNoCache(chave, valor) {
    try {
      if (!window.localStorage) return;
      window.localStorage.setItem(String(chave || ''), String(valor || '').trim());
    } catch (error) {
      // sem acao
    }
  }

  function lerFiltroRapidoDoCache(chave) {
    try {
      if (!window.localStorage) return null;
      const raw = window.localStorage.getItem(String(chave || ''));
      if (raw === null) return null;
      return String(raw || '').trim();
    } catch (error) {
      return null;
    }
  }

  function aplicarFiltroTipoRapidoPersistidoEstoque() {
    const tipo = lerFiltroRapidoDoCache(QUICK_FILTER_STOCK_TYPE_KEY);
    if (tipo === null) return;
    setFiltroTipoRapidoEstoque(tipo);
  }

  function aplicarFiltroTipoRapidoPersistidoCompras() {
    const tipo = lerFiltroRapidoDoCache(QUICK_FILTER_PURCHASE_TYPE_KEY);
    if (tipo === null) return;
    setFiltroTipoRapidoCompras(tipo);
  }

  function fecharMenuNavbar() {
    const { menu, btn, backdrop } = getNavbarHamburgerEls();
    const estavaAberto = menuNavbarAberto();
    const acionadorAnterior = ultimoAcionadorMenuNavbar;
    if (menu) menu.classList.add('hidden');
    if (backdrop) backdrop.classList.add('hidden');
    if (btn) btn.setAttribute('aria-expanded', 'false');
    const btnMais = document.getElementById('btnMobileNavMais');
    if (btnMais) btnMais.setAttribute('aria-expanded', 'false');
    if (document?.body) document.body.classList.remove('nav-drawer-open');
    setInteracaoPlanoDeFundoDrawer(false);
    desativarBloqueioInteracaoDrawer();

    if (listenerFecharMenuNavbarAtivo) {
      listenerFecharMenuNavbarAtivo = false;
      document.removeEventListener('pointerdown', fecharMenuNavbarAoClicarFora, { capture: true });
      document.removeEventListener('keydown', fecharMenuNavbarPorTeclado);
    }

    ultimoAcionadorMenuNavbar = null;
    if (estavaAberto && acionadorAnterior?.isConnected && typeof acionadorAnterior.focus === 'function') {
      window.requestAnimationFrame(() => acionadorAnterior.focus());
    }
  }

  function abrirMenuNavbar(acionador = null) {

  function createDataRevisionHelper() {
    function signature(value) {
      try {
        return JSON.stringify(value ?? null);
      } catch (error) {
        return '';
      }
    }

    function equal(left, right) {
      if (left === right) return true;
      const leftSignature = signature(left);
      return !!leftSignature && leftSignature === signature(right);
    }

    return { signature, equal };
  }

  function createClientScopeHelper() {
    let scope = null;
    let contextSwitching = false;

    function normalizarUsuario(email) {
      const normalizado = String(email || '').trim().toLowerCase();
      if (!normalizado) return '';

      // Nao use uma substituicao por `_` aqui: enderecos diferentes como
      // `nome+um@...` e `nome+dois@...` acabariam no mesmo namespace. A
      // codificacao fixa de cada code unit e injetiva para strings JavaScript
      // e tambem produz uma chave segura para localStorage/Web Locks.
      let codificado = 'u_';
      for (let i = 0; i < normalizado.length; i += 1) {
        codificado += normalizado.charCodeAt(i).toString(16).padStart(4, '0');
      }
      return codificado;
    }

    function ativar(detail = {}) {
      if (scope) return scope;
      const acesso = detail.acesso || window.AppUserAccess?.getContext?.() || {};
      const banco = detail.banco_dados || detail.bancoDados || window.AppDbEnv?.getContext?.() || {};
      const email = normalizarUsuario(acesso.email);
      scope = Object.freeze({
        environment: normalizarDbEnvFront(banco.effective_env || banco.selected_env || 'prod'),
        user: email || 'session-only',
        canPersist: !!email
      });
      return scope;
    }

    function get() {
      return scope;
    }

    function cacheNamespace(schema) {
      if (!scope) return '';
      return `${String(schema || '').trim()}:${scope.environment}:${scope.user}`;
    }

    function persistenceScope(schema) {
      if (!scope) return null;
      return {
        schema: String(schema || '').trim(),
        environment: scope.environment,
        user: scope.user
      };
    }

    function matchesPersistenceScope(candidate, schema) {
      const expected = persistenceScope(schema);
      if (!expected || !candidate || typeof candidate !== 'object') return false;
      const candidateEnvironment = String(candidate.environment || '').trim().toLowerCase();
      if (!['prod', 'dev'].includes(candidateEnvironment)) return false;
      return String(candidate.schema || '') === expected.schema
        && candidateEnvironment === expected.environment
        && String(candidate.user || '') === expected.user;
    }

    function ambienteAtualConfere() {
      if (!scope) return false;
      const atual = window.AppDbEnv?.getContext?.() || {};
      return normalizarDbEnvFront(atual.effective_env || atual.selected_env || 'prod') === scope.environment;
    }

    if (typeof window !== 'undefined' && typeof window.addEventListener === 'function') {
      window.addEventListener('app:bootstrap-ready', evento => ativar(evento?.detail || {}), { once: true });
      window.addEventListener('app:db-env:changed', evento => {
        if (!scope) return;
        const proximo = normalizarDbEnvFront(

        if (proximo === scope.environment) return;
        contextSwitching = true;
        window.dispatchEvent(new CustomEvent('app:client-scope-changing', {
          detail: { from: scope.environment, to: proximo }
        }));
      });
    }

    return {
      activate: ativar,
      get,
      cacheNamespace,
      persistenceScope,
      matchesPersistenceScope,
      matchesCurrentEnvironment: ambienteAtualConfere,
      isContextSwitching: () => contextSwitching

    const STORAGE_PREFIX = 'app:tabcache:v3:';
    const LEGACY_STORAGE_PREFIX = 'app:tabcache:v1:';
    const CACHE_SCHEMA = 'loading-ux-2026-07-scope-v2';
    const TABS_PERMITIDAS = {
      despesas: true,
      estoque: true,
      compras: true,
      vendas: true,
      investimentos: true,
      produtos: true,
      producao: true
    };

    const pendingWrites = new Map();
    let storageDisponivelMemo = null;
    let legadoLimpo = false;

    function normalizarTab(tab) {
      const chave = String(tab || '').trim().toLowerCase();

    function storageDisponivel() {
      if (storageDisponivelMemo !== null) return storageDisponivelMemo;

        storageDisponivelMemo = false;
        return storageDisponivelMemo;

      return window.AppClientScope?.cacheNamespace?.(CACHE_SCHEMA) || '';
    }

    function escopoPersistencia() {
      return window.AppClientScope?.persistenceScope?.(CACHE_SCHEMA) || null;
    }

    function escopoPersistenciaValido(candidate) {
      return window.AppClientScope?.matchesPersistenceScope?.(candidate, CACHE_SCHEMA) === true;
    }

    function storageKey(tab) {
      const contexto = contextoCache();
      return contexto ? `${STORAGE_PREFIX}${contexto}:${tab}` : '';
    }

    function limparLegado() {
      if (legadoLimpo || !storageDisponivel()) return;
      legadoLimpo = true;
      Object.keys(TABS_PERMITIDAS).forEach(tab => {
        try {
          window.localStorage.removeItem(`${LEGACY_STORAGE_PREFIX}${tab}`);
        } catch (error) {
          // sem acao
        }
      });
    }

    function lerBruto(tab) {
      const chave = normalizarTab(tab);
      if (!chave || !storageDisponivel()) return null;
      if (window.AppClientScope?.get?.()?.canPersist !== true) return null;
      limparLegado();
      try {
        const key = storageKey(chave);
        if (!key) return null;
        const pending = pendingWrites.get(key);
        const raw = pending?.payload || window.localStorage.getItem(key);
        if (!raw) return null;
        const parsed = typeof raw === 'string' ? JSON.parse(raw) : raw;
        if (!parsed || typeof parsed !== 'object') return null;
        if (!escopoPersistenciaValido(parsed.scope)) return null;
        const updatedAt = Number(parsed.updatedAt || 0);
        const data = parsed.data;
        if (!updatedAt || (Date.now() - updatedAt) > TTL_MS) return null;
        return { updatedAt, data };
      } catch (error) {
        return null;
      }
    }

    function ler(tab) {
      const entry = lerBruto(tab);
      return entry ? entry.data : null;
    }

    function salvar(tab, data) {
      const chave = normalizarTab(tab);
      if (!chave || !storageDisponivel()) return false;
      limparLegado();
      const key = storageKey(chave);
      if (!key || window.AppClientScope?.get?.()?.canPersist !== true) return false;
      const anterior = pendingWrites.get(key);
      if (anterior?.timer) clearTimeout(anterior.timer);
      const entry = {
        payload: {
          scope: escopoPersistencia(),
          updatedAt: Date.now(),
          data: data ?? null
        },
        timer: null
      };
      entry.timer = setTimeout(() => {
        pendingWrites.delete(key);
        try {
          window.localStorage.setItem(key, JSON.stringify(entry.payload));
        } catch (error) {
          // sem acao
        }
      }, 120);
      pendingWrites.set(key, entry);
      return true;
    }

    function remover(tab) {
      const chave = normalizarTab(tab);
      if (!chave || !storageDisponivel()) return false;
      if (window.AppClientScope?.get?.()?.canPersist !== true) return false;
      limparLegado();
      try {
        const key = storageKey(chave);
        if (!key) return false;
        const pendente = pendingWrites.get(key);
        if (pendente?.timer) clearTimeout(pendente.timer);
        pendingWrites.delete(key);
        window.localStorage.removeItem(key);
        return true;
      } catch (error) {
        return false;
      }
    }

    function flush() {
      [...pendingWrites.entries()].forEach(([key, entry]) => {
        if (entry?.timer) clearTimeout(entry.timer);
        pendingWrites.delete(key);
        try {
          window.localStorage.setItem(key, JSON.stringify(entry.payload));
        } catch (error) {
          // sem acao
        }
      });
    }

    if (typeof window !== 'undefined' && typeof window.addEventListener === 'function') {
      window.addEventListener('pagehide', flush);
    }

    return {
      ler,
      lerBruto,
      salvar,
      remover,
      flush
    };
  }

    const CACHE_SCHEMA = 'loading-ux-2026-07-scope-v2';

    }

      const contexto = contextoCache();
      return contexto ? `${STORAGE_PREFIX}${contexto}` : '';

    function garantirContextoMemoria() {
      const atual = contextoCache();
      if (contextoMemoria === atual) return;

      memoriaTs = 0;

      legadoLimpo = true;

      } catch (error) {
        // sem acao
      }
    }

    function storageDisponivel() {
      if (storageDisponivelMemo !== null) return storageDisponivelMemo;
      try {
        if (!window.localStorage) {
          storageDisponivelMemo = false;
          return false;
        }
        const key = `${STORAGE_PREFIX}__probe__`;
        window.localStorage.setItem(key, '1');
        window.localStorage.removeItem(key);
        storageDisponivelMemo = true;
        return true;

        storageDisponivelMemo = false;

    function normalizarMapaCategorias(rawMap) {
      const mapa = {};
      if (!rawMap || typeof rawMap !== 'object') return mapa;
      Object.keys(rawMap).forEach(k => {
        const chave = String(k || '').trim().toUpperCase();
        if (!chave) return;
        mapa[chave] = listaNormalizada(rawMap[k]);
      });
      return mapa;
    }

    function normalizarMapaCores(rawMap) {
      const mapa = {};
      if (!rawMap || typeof rawMap !== 'object') return mapa;

        coresPorTipo: normalizarMapaCores(data.coresPorTipo),
        unidades: listaNormalizada(data.unidades),
        categorias: listaNormalizada(data.categorias),
        categoriasPorTipo: normalizarMapaCategorias(data.categoriasPorTipo),
        fornecedores: listaNormalizada(data.fornecedores),
        pagosPor: listaNormalizada(data.pagosPor),
        investidores: listaNormalizada(data.investidores),
        tiposInvestimento: listaNormalizada(data.tiposInvestimento),

        investidores: data.investidores || [],

      if (!storageDisponivel()) return;
      garantirContextoMemoria();
      if (!storageKey() || window.AppClientScope?.get?.()?.canPersist !== true) return;
      limparLegado();

          scope: escopoPersistencia(),

    function lerStorage(maxAgeMs) {
      if (!storageDisponivel()) return null;
      garantirContextoMemoria();
      if (!storageKey() || window.AppClientScope?.get?.()?.canPersist !== true) return null;
      limparLegado();

        const data = normalizar(payload.data);

        memoriaTs = ts;
        atualizarCacheGlobal(data);
        return data;
      } catch (error) {

    function lerMemoria(maxAgeMs) {
      garantirContextoMemoria();
      if (!memoriaData || !memoriaTs) return null;
      if ((Date.now() - memoriaTs) > Number(maxAgeMs || DEFAULT_TTL_MS)) return null;
      return memoriaData;

    function prime(rawData, ts = Date.now()) {
      garantirContextoMemoria();
      const data = normalizar(rawData);
      const stamp = Number(ts || Date.now());

      memoriaTs = stamp;
      atualizarCacheGlobal(data);
      salvarStorage(data, stamp);

      memoriaTs = 0;

      if (!storageKey() || window.AppClientScope?.get?.()?.canPersist !== true) return;

      const deveSincronizarBackend = backendDisponivel && (!!force || !backendSincronizadoNaSessao);

      if (!deveSincronizarBackend && cache) {
        return Promise.resolve({ data: cache, source: 'cache' });
      }

      if (inFlightPromise) return inFlightPromise;

      if (!backendDisponivel) {
        if (stale) return Promise.resolve({ data: stale, source: 'stale' });
        return Promise.reject(new Error('google.script.run indisponivel'));
      }

      const contextoRequisicao = contextoCache();
      let requisicao = null;
      requisicao = window.AppRequest.call('obterValidacoes', [false, window.AppClientScope?.get?.()?.environment || 'prod'], {
        context: 'validacoes.load',

        }
        throw err || new Error('Falha ao carregar validacoes');
      }).finally(() => {

      });

      inFlightPromise = requisicao;
      return requisicao;

      get,
      peek,
      prime,
      invalidate,
      normalizar

  function createMutationUiLock() {
    let seq = 0;

      if (document?.body) {
        document.body.classList.toggle('app-mutation-locked', !!ativo);
      }
    }

    function emitirMudanca() {
      if (typeof window === 'undefined') return;
      try {
        window.dispatchEvent(new CustomEvent('app:mutation-lock-changed', {
          detail: {
            locked: tokens.size > 0,
            token_count: tokens.size
          }
        }));
      } catch (error) {
        // sem acao
      }
    }

    function lock() {
      const token = `mutation_${++seq}`;
      tokens.add(token);
      aplicarEstadoBloqueio(true);
      emitirMudanca();
      return token;
    }

    function unlock(token) {
      if (token) {
        tokens.delete(token);
      } else {
        tokens.clear();
      }
      if (tokens.size > 0) {
        aplicarEstadoBloqueio(true);
        emitirMudanca();
        return;
      }
      aplicarEstadoBloqueio(false);
      emitirMudanca();
    }

    function isLocked() {
      return tokens.size > 0;
    }

    return {
      lock,
      unlock,
      isLocked
    };
  }
