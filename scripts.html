<script>
  /* =========================
     NAV / ABAS
  ========================== */
  const ABAS_MENU_HAMBURGER = ['dashboard', 'despesas', 'estoque', 'compras', 'vendas', 'produtos', 'producao'];
  const ABAS_APP = [...ABAS_MENU_HAMBURGER];
  const ABA_INICIAL_PADRAO = 'dashboard';
  const LAST_TAB_STORAGE_KEY = 'app:lasttab:v1';
  const QUICK_FILTER_STOCK_TYPE_KEY = 'app:quickfilter:v1:estoque:tipo';
  const QUICK_FILTER_PURCHASE_TYPE_KEY = 'app:quickfilter:v1:compras:tipo';
  const DB_ENV_SESSION_STORAGE_KEY = 'app:db_env_session:v1';
  let listenerFecharMenuNavbarAtivo = false;
  let listenerBloqueioDrawerAtivo = false;

  function normalizarDbEnvFront(valor) {
    const env = String(valor || '').trim().toLowerCase();
    return env === 'dev' ? 'dev' : 'prod';
  }

  function lerDbEnvSessaoFront() {
    try {
      if (!window.sessionStorage) return 'prod';
      const raw = window.sessionStorage.getItem(DB_ENV_SESSION_STORAGE_KEY);
      return normalizarDbEnvFront(raw);
    } catch (error) {
      return 'prod';
    }
  }

  function salvarDbEnvSessaoFront(valor) {
    const env = normalizarDbEnvFront(valor);
    try {
      if (!window.sessionStorage) return env;
      window.sessionStorage.setItem(DB_ENV_SESSION_STORAGE_KEY, env);
    } catch (error) {
      // sem acao
    }
    return env;
  }

  function getDbEnvEls() {
    return {
      section: document.getElementById('dbEnvMenuSection'),
      btnProd: document.getElementById('btnDbEnvProd'),
      btnDev: document.getElementById('btnDbEnvDev'),
      banner: document.getElementById('appDbEnvBanner'),
      bannerText: document.getElementById('appDbEnvBannerText')
    };
  }

  function createDbEnvironmentHelper() {
    let contexto = {
      can_toggle: false,
      effective_env: 'prod',
      selected_env: 'prod',
      role: 'viewer'
    };
    let inFlight = null;
    let menuInitDone = false;

    function withTimeout(promise, timeoutMs, timeoutMsg) {
      const ms = Math.max(500, Number(timeoutMs) || 5000);
      return Promise.race([
        Promise.resolve(promise),
        new Promise((_, reject) => {
          setTimeout(() => {
            reject(new Error(String(timeoutMsg || 'Tempo limite excedido').trim()));
          }, ms);
        })
      ]);
    }

    function isAdmin(acesso) {
      return String(acesso?.role || '').trim().toLowerCase() === 'admin' && acesso?.can_write === true;
    }

    function normalizarContexto(raw) {
      const base = raw && typeof raw === 'object' ? raw : {};
      return {
        ...base,
        can_toggle: base.can_toggle === true,
        effective_env: normalizarDbEnvFront(base.effective_env || base.selected_env || 'prod'),
        selected_env: normalizarDbEnvFront(base.selected_env || base.effective_env || 'prod'),
        role: String(base.role || '').trim().toLowerCase() || 'viewer'
      };
    }

    function render() {
      const { section, btnProd, btnDev, banner, bannerText } = getDbEnvEls();
      const canToggle = contexto.can_toggle === true;
      const envAtivo = normalizarDbEnvFront(contexto.effective_env);
      const isDev = envAtivo === 'dev';

      if (section) {
        section.classList.toggle('hidden', !canToggle);
      }

      if (btnProd) {
        btnProd.classList.toggle('active', envAtivo === 'prod');
        btnProd.disabled = !canToggle || inFlight !== null;
        btnProd.setAttribute('aria-pressed', envAtivo === 'prod' ? 'true' : 'false');
      }

      if (btnDev) {
        btnDev.classList.toggle('active', envAtivo === 'dev');
        btnDev.disabled = !canToggle || inFlight !== null;
        btnDev.setAttribute('aria-pressed', envAtivo === 'dev' ? 'true' : 'false');
      }

      if (banner) {
        banner.classList.toggle('hidden', !isDev);
      }
      if (bannerText) {
        bannerText.textContent = isDev
          ? 'MODO DEV ativo - voce esta trabalhando no banco de testes'
          : 'MODO PROD ativo';
      }
    }

    function recarregarAplicacaoAposTrocaDb_() {
      let fallbackTimer = null;
      try {
        fallbackTimer = setTimeout(() => {
          try {
            window.location.reload();
          } catch (error) {
            // sem acao
          }
        }, 1200);
      } catch (error) {
        // sem acao
      }

      try {
        const url = new URL(window.location.href);
        url.searchParams.set('db_refresh', String(Date.now()));
        window.location.assign(url.toString());
        return;
      } catch (error) {
        // fallback abaixo
      }

      try {
        window.location.reload();
      } catch (error) {
        // sem acao
      } finally {
        if (fallbackTimer) {
          clearTimeout(fallbackTimer);
        }
      }
    }

    function aplicar(raw) {
      contexto = normalizarContexto(raw);
      render();
      if (typeof window !== 'undefined') {
        try {
          window.dispatchEvent(new CustomEvent('app:db-env:changed', {
            detail: contexto
          }));
        } catch (error) {
          // sem acao
        }
      }
      return contexto;
    }

    async function bootstrap(acessoCtx) {
      if (!window.AppRequest?.call) {
        aplicar({
          can_toggle: isAdmin(acessoCtx),
          effective_env: 'prod',
          selected_env: 'prod',
          role: String(acessoCtx?.role || '').trim().toLowerCase() || 'viewer'
        });
        return contexto;
      }

      const admin = isAdmin(acessoCtx);
      let desiredEnv = 'prod';
      if (admin) {
        desiredEnv = salvarDbEnvSessaoFront(lerDbEnvSessaoFront());
      } else {
        salvarDbEnvSessaoFront('prod');
      }

      try {
        const payload = await withTimeout(
          window.AppRequest.call('definirContextoBancoDados', [desiredEnv], {
            context: 'db.env.bootstrap',
            errorMessage: 'Falha ao aplicar ambiente de banco de dados.'
          }),
          6000,
          'Timeout ao aplicar ambiente de banco de dados.'
        );
        const ctx = aplicar(payload || {});
        if (ctx.can_toggle) {
          salvarDbEnvSessaoFront(ctx.effective_env);
        } else {
          salvarDbEnvSessaoFront('prod');
        }
        return ctx;
      } catch (error) {
        const fallback = aplicar({
          can_toggle: admin,
          effective_env: 'prod',
          selected_env: 'prod',
          role: admin ? 'admin' : 'viewer'
        });
        salvarDbEnvSessaoFront('prod');
        return fallback;
      }
    }

    async function trocar(ambiente) {
      const alvo = normalizarDbEnvFront(ambiente);
      if (!contexto.can_toggle) {
        if (typeof mostrarToast === 'function') {
          mostrarToast('Somente admin pode trocar o banco de dados ativo.', 'erro');
        }
        return contexto;
      }
      if (normalizarDbEnvFront(contexto.effective_env) === alvo) {
        fecharMenuNavbar();
        return contexto;
      }
      if (!window.AppRequest?.call) {
        throw new Error('google.script.run indisponivel');
      }
      if (inFlight) return inFlight;

      inFlight = withTimeout(
        window.AppRequest.call('definirContextoBancoDados', [alvo], {
          context: 'db.env.toggle',
          errorMessage: 'Falha ao trocar banco de dados.'
        }),
        8000,
        'Timeout ao trocar banco de dados.'
      )
        .then(payload => {
          const ctx = aplicar(payload || {});
          const envAtivo = normalizarDbEnvFront(ctx.effective_env);
          salvarDbEnvSessaoFront(envAtivo);
          fecharMenuNavbar();
          if (typeof mostrarToast === 'function') {
            mostrarToast(`Banco ativo: ${envAtivo.toUpperCase()}`);
          }
          setTimeout(() => {
            recarregarAplicacaoAposTrocaDb_();
          }, 120);
          return ctx;
        })
        .finally(() => {
          inFlight = null;
          render();
        });

      render();
      return inFlight;
    }

    function initMenu() {
      if (menuInitDone) return;
      menuInitDone = true;
      const { btnProd, btnDev } = getDbEnvEls();
      if (btnProd) {
        btnProd.addEventListener('click', () => {
          trocar('prod').catch(error => {
            if (typeof mostrarToast === 'function') {
              mostrarToast(error?.message || 'Falha ao trocar para PROD', 'erro');
            }
          });
        });
      }
      if (btnDev) {
        btnDev.addEventListener('click', () => {
          trocar('dev').catch(error => {
            if (typeof mostrarToast === 'function') {
              mostrarToast(error?.message || 'Falha ao trocar para DEV', 'erro');
            }
          });
        });
      }
      render();
    }

    function getContext() {
      return contexto;
    }

    return {
      bootstrap,
      initMenu,
      getContext,
      apply: aplicar
    };
  }

  window.AppDbEnv = window.AppDbEnv || createDbEnvironmentHelper();

  const APP_TAB_PRESENTATION = {
    dashboard: {
      label: 'Inicio',
      eyebrow: 'Painel operacional',
      title: 'Visao consolidada',
      subtitle: 'Acompanhe caixa, estoque, gastos e producao em uma leitura unica e mais executiva.'
    },
    despesas: {
      label: 'Despesas',
      eyebrow: 'Controle financeiro',
      title: 'Saidas e obrigacoes',
      subtitle: 'Organize pagamentos, categorias e acompanhamento de despesas em um fluxo mais claro.'
    },
    estoque: {
      label: 'Estoque',
      eyebrow: 'Posicao operacional',
      title: 'Saldo, reserva e disponibilidade',
      subtitle: 'Visualize itens em estoque com uma leitura mais proxima de carteira e posicao.'
    },
    compras: {
      label: 'Compras',
      eyebrow: 'Entradas e aquisicoes',
      title: 'Abastecimento da operacao',
      subtitle: 'Acompanhe pedidos, fornecedores e entradas de estoque em um fluxo mais limpo.'
    },
    vendas: {
      label: 'Vendas',
      eyebrow: 'Receita e recebimento',
      title: 'Faturamento acompanhado de perto',
      subtitle: 'Consulte vendas, recebimentos e pendencias em uma tela mais objetiva.'
    },
    produtos: {
      label: 'Produtos',
      eyebrow: 'Catalogo de producao',
      title: 'Modelos e composicao do portfolio',
      subtitle: 'Gerencie produtos e modelos com uma organizacao mais forte de cadastro.'
    },
    producao: {
      label: 'Producao',
      eyebrow: 'Ordens e execucao',
      title: 'Planejamento e baixa de materiais',
      subtitle: 'Acompanhe ordens de producao, reservas e consumo em um layout mais controlado.'
    }
  };

  function normalizarNomeAba(valor) {
    const aba = String(valor || '').trim().toLowerCase();
    return ABAS_APP.includes(aba) ? aba : '';
  }

  function obterApresentacaoAba(valor) {
    const aba = normalizarNomeAba(valor) || ABA_INICIAL_PADRAO;
    return APP_TAB_PRESENTATION[aba] || APP_TAB_PRESENTATION.dashboard;
  }

  function obterAmbienteAtualVisual() {
    const contexto = window.AppDbEnv?.getContext?.() || {};
    return normalizarDbEnvFront(contexto.effective_env || contexto.selected_env || lerDbEnvSessaoFront());
  }

  function atualizarResumoWorkspace(abaValor) {
    const aba = normalizarNomeAba(abaValor) || normalizarNomeAba(obterNomeAbaAtiva()) || ABA_INICIAL_PADRAO;
    const apresentacao = obterApresentacaoAba(aba);
    const envAtual = obterAmbienteAtualVisual();
    const badgeNav = document.getElementById('navCurrentSectionBadge');
    const eyebrow = document.getElementById('appWorkspaceEyebrow');
    const title = document.getElementById('appWorkspaceTitle');
    const subtitle = document.getElementById('appWorkspaceSubtitle');
    const tabBadge = document.getElementById('appWorkspaceTabBadge');
    const envBadge = document.getElementById('appWorkspaceEnvBadge');

    if (badgeNav) badgeNav.textContent = apresentacao.label;
    if (eyebrow) eyebrow.textContent = apresentacao.eyebrow;
    if (title) title.textContent = apresentacao.title;
    if (subtitle) subtitle.textContent = apresentacao.subtitle;
    if (tabBadge) tabBadge.textContent = apresentacao.label;
    if (envBadge) envBadge.textContent = String(envAtual || 'prod').toUpperCase();

    if (document?.body) {
      document.body.dataset.activeTab = aba;
      document.body.dataset.activeEnv = envAtual;
    }
  }

  if (typeof window !== 'undefined') {
    window.addEventListener('app:db-env:changed', () => {
      atualizarResumoWorkspace();
    });
  }

  function salvarUltimaAba(valor) {
    const aba = normalizarNomeAba(valor);
    if (!aba) return;
    try {
      if (!window.localStorage) return;
      window.localStorage.setItem(LAST_TAB_STORAGE_KEY, aba);
    } catch (error) {
      // sem acao
    }
  }

  function lerUltimaAba() {
    try {
      if (!window.localStorage) return '';
      return normalizarNomeAba(window.localStorage.getItem(LAST_TAB_STORAGE_KEY));
    } catch (error) {
      return '';
    }
  }

  function getNavbarHamburgerEls() {
    return {
      wrap: document.getElementById('navbarMenuWrap'),
      btn: document.getElementById('btnNavHamburger'),
      menu: document.getElementById('navbarMenu'),
      backdrop: document.getElementById('navbarMenuBackdrop')
    };
  }

  function setInteracaoPlanoDeFundoDrawer(bloqueado) {
    const alvo = bloqueado === true;
    const shell = document.querySelector('.app-shell');
    const bottomBar = document.querySelector('.bottom-bar');
    [shell, bottomBar].forEach(el => {
      if (!el) return;
      if (alvo) {
        el.setAttribute('inert', '');
        el.setAttribute('aria-hidden', 'true');
      } else {
        el.removeAttribute('inert');
        el.removeAttribute('aria-hidden');
      }
    });
  }

  function alvoPertenceAoDrawer(target) {
    const { wrap, menu, backdrop } = getNavbarHamburgerEls();
    if (!target) return false;
    if (wrap?.contains?.(target)) return true;
    if (menu?.contains?.(target)) return true;
    if (backdrop?.contains?.(target)) return true;
    return false;
  }

  function bloquearInteracaoForaDrawer(evento) {
    if (!menuNavbarAberto()) return;
    if (alvoPertenceAoDrawer(evento?.target)) return;
    if (typeof evento?.preventDefault === 'function') evento.preventDefault();
    if (typeof evento?.stopImmediatePropagation === 'function') {
      evento.stopImmediatePropagation();
    } else if (typeof evento?.stopPropagation === 'function') {
      evento.stopPropagation();
    }
    if (String(evento?.type || '').toLowerCase() === 'focusin' && typeof evento?.target?.blur === 'function') {
      try {
        evento.target.blur();
      } catch (error) {
        // sem acao
      }
    }
  }

  function ativarBloqueioInteracaoDrawer() {
    if (listenerBloqueioDrawerAtivo) return;
    listenerBloqueioDrawerAtivo = true;
    document.addEventListener('click', bloquearInteracaoForaDrawer, true);
    document.addEventListener('focusin', bloquearInteracaoForaDrawer, true);
    document.addEventListener('touchstart', bloquearInteracaoForaDrawer, { capture: true, passive: false });
    document.addEventListener('touchmove', bloquearInteracaoForaDrawer, { capture: true, passive: false });
    document.addEventListener('touchend', bloquearInteracaoForaDrawer, { capture: true, passive: false });
  }

  function desativarBloqueioInteracaoDrawer() {
    if (!listenerBloqueioDrawerAtivo) return;
    listenerBloqueioDrawerAtivo = false;
    document.removeEventListener('click', bloquearInteracaoForaDrawer, true);
    document.removeEventListener('focusin', bloquearInteracaoForaDrawer, true);
    document.removeEventListener('touchstart', bloquearInteracaoForaDrawer, true);
    document.removeEventListener('touchmove', bloquearInteracaoForaDrawer, true);
    document.removeEventListener('touchend', bloquearInteracaoForaDrawer, true);
  }

  function menuNavbarAberto() {
    const { menu } = getNavbarHamburgerEls();
    return !!menu && !menu.classList.contains('hidden');
  }

  function obterLabelAbaMenu(aba) {
    const alvo = String(aba || '').trim();
    if (!alvo) return '';
    const btnMenu = document.querySelector(`#navbarMenu button[data-aba="${alvo}"]`);
    return String(btnMenu?.textContent || '').trim();
  }

  function atualizarRotuloBotaoHamburger(abaAtiva) {
    const { btn } = getNavbarHamburgerEls();
    if (!btn) return;
    const alvo = String(abaAtiva || '').trim();
    const ativoNoMenu = ABAS_MENU_HAMBURGER.includes(alvo);
    const rotulo = ativoNoMenu ? (obterLabelAbaMenu(alvo) || 'Menu') : 'Menu';
    btn.innerHTML = `<span class="navbar-hamburger-icon" aria-hidden="true">&#9776;</span><span class="navbar-hamburger-label">${rotulo}</span>`;
    btn.setAttribute('aria-label', ativoNoMenu ? `Abrir menu de abas (atual: ${rotulo})` : 'Abrir menu de abas');
  }

  function atualizarEstadoNavbar(abaAtiva) {
    const botoes = document.querySelectorAll('.navbar button[data-aba], #navbarMenu button[data-aba]');
    const alvo = String(abaAtiva || '').trim();
    botoes.forEach(btn => {
      const ehAtivo = String(btn.dataset.aba || '').trim() === alvo;
      btn.classList.toggle('active', ehAtivo);
      if (ehAtivo) {
        btn.setAttribute('aria-current', 'page');
      } else {
        btn.removeAttribute('aria-current');
      }
    });

    const { btn } = getNavbarHamburgerEls();
    if (btn) {
      const ativoNoMenu = ABAS_MENU_HAMBURGER.includes(alvo);
      btn.classList.toggle('active', ativoNoMenu);
      btn.setAttribute('aria-expanded', menuNavbarAberto() ? 'true' : 'false');
    }
    atualizarRotuloBotaoHamburger(alvo);
    atualizarResumoWorkspace(alvo);
  }

  function salvarFiltroRapidoNoCache(chave, valor) {
    try {
      if (!window.localStorage) return;
      window.localStorage.setItem(String(chave || ''), String(valor || '').trim());
    } catch (error) {
      // sem acao
    }
  }

  function lerFiltroRapidoDoCache(chave) {
    try {
      if (!window.localStorage) return null;
      const raw = window.localStorage.getItem(String(chave || ''));
      if (raw === null) return null;
      return String(raw || '').trim();
    } catch (error) {
      return null;
    }
  }

  function aplicarFiltroTipoRapidoPersistidoEstoque() {
    const tipo = lerFiltroRapidoDoCache(QUICK_FILTER_STOCK_TYPE_KEY);
    if (tipo === null) return;
    setFiltroTipoRapidoEstoque(tipo);
  }

  function aplicarFiltroTipoRapidoPersistidoCompras() {
    const tipo = lerFiltroRapidoDoCache(QUICK_FILTER_PURCHASE_TYPE_KEY);
    if (tipo === null) return;
    setFiltroTipoRapidoCompras(tipo);
  }

  function fecharMenuNavbar() {
    const { menu, btn, backdrop } = getNavbarHamburgerEls();
    if (menu) menu.classList.add('hidden');
    if (backdrop) backdrop.classList.add('hidden');
    if (btn) btn.setAttribute('aria-expanded', 'false');
    if (document?.body) document.body.classList.remove('nav-drawer-open');
    setInteracaoPlanoDeFundoDrawer(false);
    desativarBloqueioInteracaoDrawer();

    if (listenerFecharMenuNavbarAtivo) {
      listenerFecharMenuNavbarAtivo = false;
      document.removeEventListener('pointerdown', fecharMenuNavbarAoClicarFora, { capture: true });
      document.removeEventListener('keydown', fecharMenuNavbarPorTeclado);
    }
  }

  function abrirMenuNavbar() {
    const { menu, btn, backdrop } = getNavbarHamburgerEls();
    if (!menu || !btn) return;
    menu.classList.remove('hidden');
    if (backdrop) backdrop.classList.remove('hidden');
    btn.setAttribute('aria-expanded', 'true');
    if (document?.body) document.body.classList.add('nav-drawer-open');
    setInteracaoPlanoDeFundoDrawer(true);
    ativarBloqueioInteracaoDrawer();

    if (!listenerFecharMenuNavbarAtivo) {
      listenerFecharMenuNavbarAtivo = true;
      document.addEventListener('pointerdown', fecharMenuNavbarAoClicarFora, { capture: true });
      document.addEventListener('keydown', fecharMenuNavbarPorTeclado);
    }
  }

  function toggleMenuNavbar() {
    if (menuNavbarAberto()) {
      fecharMenuNavbar();
    } else {
      abrirMenuNavbar();
    }
  }

  function fecharMenuNavbarAoClicarFora(evento) {
    const { backdrop } = getNavbarHamburgerEls();
    if (alvoPertenceAoDrawer(evento?.target)) return;
    if (backdrop && evento?.target === backdrop) return;
    if (typeof evento?.preventDefault === 'function') evento.preventDefault();
    if (typeof evento?.stopImmediatePropagation === 'function') {
      evento.stopImmediatePropagation();
    } else if (typeof evento?.stopPropagation === 'function') {
      evento.stopPropagation();
    }
  }

  function fecharMenuNavbarPorTeclado(evento) {
    const tecla = String(evento?.key || '').toLowerCase();
    if (tecla === 'escape') {
      fecharMenuNavbar();
    }
  }

  function initNavbarHamburger() {
    const { btn, backdrop } = getNavbarHamburgerEls();
    if (!btn) return;
    btn.addEventListener('click', () => {
      toggleMenuNavbar();
    });
    if (backdrop) {
      backdrop.addEventListener('pointerdown', evento => {
        evento.preventDefault();
        evento.stopPropagation();
      });
      backdrop.addEventListener('click', () => {
        fecharMenuNavbar();
      });
    }
  }

  /* =========================
     CORE SHARED MODULES
     (carregados via include('appCore') no index)
  ========================== */

  function createTabCacheHelper() {
    const STORAGE_PREFIX = 'app:tabcache:v1:';
    const TABS_PERMITIDAS = {
      despesas: true,
      estoque: true,
      compras: true,
      vendas: true,
      produtos: true,
      producao: true
    };
    const TTL_MS = 1000 * 60 * 60 * 24 * 7; // 7 dias

    function normalizarTab(tab) {
      const chave = String(tab || '').trim().toLowerCase();
      return TABS_PERMITIDAS[chave] ? chave : '';
    }

    function storageDisponivel() {
      try {
        if (!window.localStorage) return false;
        const key = `${STORAGE_PREFIX}__ping__`;
        window.localStorage.setItem(key, '1');
        window.localStorage.removeItem(key);
        return true;
      } catch (error) {
        return false;
      }
    }

    function lerBruto(tab) {
      const chave = normalizarTab(tab);
      if (!chave || !storageDisponivel()) return null;
      try {
        const raw = window.localStorage.getItem(`${STORAGE_PREFIX}${chave}`);
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        if (!parsed || typeof parsed !== 'object') return null;
        const updatedAt = Number(parsed.updatedAt || 0);
        const data = parsed.data;
        if (!updatedAt || (Date.now() - updatedAt) > TTL_MS) return null;
        return { updatedAt, data };
      } catch (error) {
        return null;
      }
    }

    function ler(tab) {
      const entry = lerBruto(tab);
      return entry ? entry.data : null;
    }

    function salvar(tab, data) {
      const chave = normalizarTab(tab);
      if (!chave || !storageDisponivel()) return false;
      try {
        const payload = {
          updatedAt: Date.now(),
          data: data ?? null
        };
        window.localStorage.setItem(`${STORAGE_PREFIX}${chave}`, JSON.stringify(payload));
        return true;
      } catch (error) {
        return false;
      }
    }

    function remover(tab) {
      const chave = normalizarTab(tab);
      if (!chave || !storageDisponivel()) return false;
      try {
        window.localStorage.removeItem(`${STORAGE_PREFIX}${chave}`);
        return true;
      } catch (error) {
        return false;
      }
    }

    return {
      ler,
      salvar,
      remover
    };
  }

  window.AppTabCache = window.AppTabCache || createTabCacheHelper();

  function createValidacoesHelper() {
    const STORAGE_KEY = 'app:validacoes:v1';
    const DEFAULT_TTL_MS = 1000 * 60 * 60 * 12; // 12h

      peek,
      prime,
      invalidate,

  function createMutationUiLock() {
    let seq = 0;
    const tokens = new Set();

    function aplicarEstadoBloqueio(ativo) {
      if (document?.body) {
        document.body.classList.toggle('app-mutation-locked', !!ativo);
      }
    }

    function emitirMudanca() {
      if (typeof window === 'undefined') return;
      try {
        window.dispatchEvent(new CustomEvent('app:mutation-lock-changed', {
          detail: {
            locked: tokens.size > 0,
            token_count: tokens.size
          }
        }));
      } catch (error) {
        // sem acao
      }
    }

    function lock() {
      const token = `mutation_${++seq}`;
      tokens.add(token);
      aplicarEstadoBloqueio(true);
      emitirMudanca();
      return token;
    }

    function unlock(token) {
      if (token) {
        tokens.delete(token);
      } else {
        tokens.clear();
      }
      if (tokens.size > 0) {
        aplicarEstadoBloqueio(true);
        emitirMudanca();
        return;
      }
      aplicarEstadoBloqueio(false);
      emitirMudanca();
    }

    function isLocked() {
      return tokens.size > 0;
    }

    return {
      lock,
      unlock,
      isLocked
    };
  }

  window.AppMutationUI = window.AppMutationUI || createMutationUiLock();

  function createActionButtonHelper() {
    function resolverBotao(alvo) {
      if (!alvo) return null;
      if (alvo instanceof HTMLButtonElement) return alvo;
      return alvo?.closest?.('button') || null;
    }

    function textoPadraoBotao(btn, fallback = 'Salvar') {
      const texto = String(btn?.dataset?.idleLabel || btn?.textContent || '').trim();
      return texto || String(fallback || '').trim() || 'Salvar';
    }

    function begin(options = {}) {
      const btn = resolverBotao(options.button);
      const idleLabel = String(options.idleLabel || textoPadraoBotao(btn, 'Salvar')).trim() || 'Salvar';
      const loadingLabel = String(options.loadingLabel || 'Salvando').trim() || 'Salvando';
      const usarLock = options.lock !== false;
      const estado = {
        button: btn,
        idleLabel,
        loadingLabel,
        originalHtml: btn ? btn.innerHTML : '',
        originalDisabled: btn ? !!btn.disabled : false,
        token: null
      };

      if (usarLock && window.AppMutationUI?.lock) {
        estado.token = window.AppMutationUI.lock();
      }

      if (btn) {
        btn.disabled = true;
        btn.setAttribute('aria-busy', 'true');
        if (window.AppLoading?.setButtonLoading) {
          window.AppLoading.setButtonLoading(btn, true, idleLabel, loadingLabel);
        } else {
          btn.textContent = `${loadingLabel}...`;
        }
      }

      return estado;
    }

    function end(estado) {
      if (!estado || typeof estado !== 'object') return;
      const btn = estado.button;
      if (btn) {
        btn.disabled = !!estado.originalDisabled;
        btn.removeAttribute('aria-busy');
        if (typeof estado.originalHtml === 'string' && estado.originalHtml !== '') {
          btn.innerHTML = estado.originalHtml;
        } else if (window.AppLoading?.setButtonLoading) {
          window.AppLoading.setButtonLoading(btn, false, estado.idleLabel || 'Salvar');
        } else {
          btn.textContent = estado.idleLabel || 'Salvar';
        }
      }
      if (estado.token && window.AppMutationUI?.unlock) {
        window.AppMutationUI.unlock(estado.token);
      }
    }

    function finishSuccess(estado, options = {}) {
      end(estado);
      if (options.closeModals !== false) {
        window.AppModalUI?.closeAll?.();
      }
    }

    return {
      begin,
      end,
      finishSuccess
    };
  }

  window.AppActionButtons = window.AppActionButtons || createActionButtonHelper();

  function createOptimisticMutationHelper() {
    const STORAGE_KEY = 'app:optimistic:v2';
    const STORAGE_KEYS_LEGACY = ['app:optimistic:v1'];
    const STORAGE_TTL_MS = 1000 * 60 * 60 * 24 * 14;
    const BASE_BACKOFF_MS = 1800;
    const MAX_BACKOFF_MS = 45000;
    const MAX_AUTO_ATTEMPTS = 4;
    let seq = 0;
    let processing = false;
    let retryTimer = null;
    const entries = new Map();
    const handlers = {};

    function storageDisponivel() {
      try {
        if (!window.localStorage) return false;
        const key = `${STORAGE_KEY}:probe`;
        window.localStorage.setItem(key, '1');
        window.localStorage.removeItem(key);

      } catch (error) {
        return false;
      }
    }

    function clone(value) {
      if (value == null) return value;
      try {
        return JSON.parse(JSON.stringify(value));
      } catch (error) {

      }

    function normalizarTextoErro(valor) {

      }
      return 'pending';
    }

    function gerarId() {

      return `opt_${Date.now()}_${seq}`;
    }

    function ordenarEntries(lista) {
      return [...lista].sort((a, b) => {
        const ra = Number(a?.retryAt || 0);
        const rb = Number(b?.retryAt || 0);
        const ta = ra > 0 ? ra : Number(a?.createdAt || 0);
        const tb = rb > 0 ? rb : Number(b?.createdAt || 0);
        if (ta !== tb) return ta - tb;
        return String(a?.id || '').localeCompare(String(b?.id || ''));
      });
    }

    function snapshotEntries() {
      return ordenarEntries(entries.values()).map(clone);
    }

    function resumoFila() {
      const resumo = {
        total: 0,
        pending: 0,
        sending: 0,
        paused: 0,
        offline: 0,
        error: 0,
        conflict: 0,
        active: 0,
        nextRetryAt: 0,
        online: typeof navigator === 'undefined' || navigator.onLine !== false

        }
      });
      return resumo;
    }

    function emitirEstado() {
      if (typeof window === 'undefined') return;

        window.dispatchEvent(new CustomEvent('app:optimistic-state', {
          detail: {
            summary: resumoFila(),
            entries: snapshotEntries()

      }

    function salvarStorage() {

        id,
        scope: String(raw.scope || '').trim(),
        handler: String(raw.handler || '').trim(),
        entityKey: String(raw.entityKey || '').trim(),

    function get(id) {

      if (!chave || !entries.has(chave)) return null;

    function existeMutacaoAtiva(entityKey, ignoreId = '') {

    function enqueue(config = {}) {

        status: 'pending',

        updatedAt: Date.now(),
        errorMessage: '',
        errorKind: '',

      if (conflito) {
        return {
          status: 'conflict',
          kind: 'conflict',
          retryAt: 0,
          message: mensagem
        };
      }

      if (offline) {
        return {
          status: 'offline',
          kind: 'offline',
          retryAt: Date.now() + 3000,
          message: mensagem

          status: 'paused',
          kind: 'transient',
          retryAt: Date.now() + calcularBackoff(attempts),
          message: mensagem
        };
      }

      return {
        status: 'error',
        kind: invalido ? 'validation' : 'error',
        retryAt: 0,
        message: mensagem
      };

    async function processarFila() {
      if (processing) return;
      const entry = obterProximaElegivel();
      if (!entry) {

  function createDespesaMutationHelper() {

    }

    function round2(valor) {

    }

    function clampDate(valor) {

    function normalizarLocalStatus(status) {
      const valor = String(status || '').trim().toLowerCase();
      if (['pending', 'sending', 'paused', 'offline', 'error', 'conflict'].includes(valor)) {
        return valor;
      }
      return '';

    function ehStatusMutacaoAtivo(status) {

    function ehRetryManualDisponivel(status) {
      return ['paused', 'offline', 'error', 'conflict'].includes(normalizarLocalStatus(status));

    function obterMensagemReenvio(retryAt) {
      const alvo = Math.max(0, Number(retryAt || 0));
      if (!alvo) return 'Nova tentativa em instantes.';

      if (diffSeg <= 1) return 'Nova tentativa em instantes.';
      return `Nova tentativa em ${diffSeg}s.`;
    }

      if (tipo && tipo !== 'pending') return tipo;

    function aplicarMeta(item, opcoes = {}) {
      const base = limparMeta(item);
      const status = normalizarLocalStatus(opcoes.status);
      if (!status) return base;
      base._localStatus = status;
      base._localAction = String(opcoes.action || '').trim();
      base._localMutationId = String(opcoes.mutationId || '').trim();
      base._localErrorMessage = String(opcoes.errorMessage || '').trim();

      base._localDeleted = !!opcoes.localDeleted;

    function getStatusPagamento(totalPrevisto, totalPago) {
      const previsto = round2(totalPrevisto);
      const pago = round2(totalPago);
      const pendente = round2(Math.max(0, previsto - pago));
      if (pendente <= 0.009) return 'PAGO';
      if (pago > 0.009) return 'PARCIAL';
      return 'PENDENTE';

    function buildParcelasDetalhe(payload, baseItem) {

      const origemId = String(base.ID || payload?.ID || tempId('PAR')).trim();
      const fallbackData = clampDate(payload?.data_vencimento || payload?.data_competencia);

      if (detalhes.length === 0) {
        const valorPrevisto = round2(payload?.valor_total);
        return [{
          ID: `${origemId}_P1`,
          parcela_numero: 1,
          parcelas_total: 1,
          data_prevista: fallbackData,
          valor_previsto: valorPrevisto,
          valor_pago: 0,
          valor_pendente: valorPrevisto,
          status: valorPrevisto <= 0.009 ? 'PAGO' : 'PENDENTE',
          data_quitacao: '',
          pagamento_id: ''
        }];
      }

      return detalhes.map((parcela, idx) => {
        const valorPrevisto = round2(parcela?.valor ?? parcela?.valor_previsto);
        const valorPago = round2(parcela?.valor_pago);
        const pendente = round2(Math.max(0, valorPrevisto - valorPago));
        return {
          ID: String(parcela?.ID || `${origemId}_P${idx + 1}`).trim(),
          parcela_numero: idx + 1,
          parcelas_total: quantidade,
          data_prevista: clampDate(parcela?.data || parcela?.data_prevista || fallbackData),
          valor_previsto: valorPrevisto,
          valor_pago: valorPago,
          valor_pendente: pendente,
          status: pendente <= 0.009 ? 'PAGO' : (valorPago > 0.009 ? 'PARCIAL' : 'PENDENTE'),
          data_quitacao: clampDate(parcela?.data_quitacao),
          pagamento_id: String(parcela?.pagamento_id || '').trim()
        };

    function buildFromPayload(payload, options = {}) {
      const base = clone(options.baseItem) || {};
      const id = String(options.id || base.ID || tempId()).trim();
      const totalPrevisto = round2(payload?.valor_total ?? base.valor_total ?? base.total_previsto);
      const totalPago = round2(base.total_pago);
      const totalPendente = round2(Math.max(0, totalPrevisto - totalPago));
      const parcelasDetalhe = buildParcelasDetalhe({
        ...payload,
        ID: id
      }, base);

      return {
        ...base,
        ID: id,
        ativo: true,
        descricao: String((payload?.descricao ?? base.descricao) || '').trim(),
        categoria: String((payload?.categoria ?? base.categoria) || '').trim(),
        fornecedor: String((payload?.fornecedor ?? base.fornecedor) || '').trim(),
        pago_por: String((payload?.pago_por ?? base.pago_por) || '').trim(),
        valor_total: totalPrevisto,
        data_competencia: clampDate(payload?.data_competencia ?? base.data_competencia),
        data_vencimento: clampDate(payload?.data_vencimento ?? base.data_vencimento),
        data_pagamento: clampDate(payload?.data_pagamento ?? base.data_pagamento),
        forma_pagamento: String((payload?.forma_pagamento ?? base.forma_pagamento) || '').trim(),
        forma_pagamento_padrao: String((payload?.forma_pagamento ?? base.forma_pagamento_padrao) || '').trim(),
        parcelas: Math.max(1, Math.floor(parseNumero((payload?.parcelas ?? base.parcelas) || parcelasDetalhe.length || 1) || 1)),
        parcelas_detalhe: parcelasDetalhe,
        fixo: !!(payload?.fixo ?? base.fixo),
        observacao: String((payload?.observacao ?? base.observacao) || '').trim(),
        total_previsto: totalPrevisto,
        total_pago: totalPago,
        total_pendente: totalPendente,
        status_pagamento: getStatusPagamento(totalPrevisto, totalPago),
        quantidade_pagamentos: Math.max(0, Number(base.quantidade_pagamentos || 0)),
        data_ultimo_pagamento: clampDate(base.data_ultimo_pagamento),
        forma_ultimo_pagamento: String(base.forma_ultimo_pagamento || '').trim()
      };
    }

    function applyPayment(item, payload, mutationId = '') {
      const base = limparMeta(item);
      const totalPrevisto = round2(base.total_previsto || base.valor_total);
      const valorPagoAtual = round2(base.total_pago);
      const incremento = round2(Math.min(parseNumero(payload?.valor_pago), Math.max(0, totalPrevisto - valorPagoAtual)));
      const totalPago = round2(valorPagoAtual + incremento);
      const totalPendente = round2(Math.max(0, totalPrevisto - totalPago));
      const dataPagamento = clampDate(payload?.data_pagamento);
      const formaPagamento = String(payload?.forma_pagamento || base.forma_pagamento || '').trim();
      const parcelaAlvoId = String(payload?.parcela_alvo_id || '').trim();

      const parcelas = (Array.isArray(base.parcelas_detalhe) ? clone(base.parcelas_detalhe) : []).map(parcela => {
        const valorPrevisto = round2(parcela?.valor_previsto);
        const valorPagoParcial = round2(parcela?.valor_pago);
        const valorPendenteParcial = round2(Math.max(0, valorPrevisto - valorPagoParcial));
        return {
          ...parcela,
          valor_previsto: valorPrevisto,
          valor_pago: valorPagoParcial,
          valor_pendente: valorPendenteParcial,
          status: valorPendenteParcial <= 0.009 ? 'PAGO' : (valorPagoParcial > 0.009 ? 'PARCIAL' : 'PENDENTE')
        };
      });

      if (incremento > 0 && parcelas.length > 0) {
        const idxParcela = parcelaAlvoId
          ? parcelas.findIndex(parcela => String(parcela?.ID || '').trim() === parcelaAlvoId)
          : parcelas.findIndex(parcela => round2(parcela?.valor_pendente) > 0.009);
        if (idxParcela >= 0) {
          const atual = parcelas[idxParcela];
          const pagoParcela = round2(Math.min(round2(atual.valor_pendente) + round2(atual.valor_pago), round2(atual.valor_pago) + incremento));
          const pendenteParcela = round2(Math.max(0, round2(atual.valor_previsto) - pagoParcela));
          parcelas[idxParcela] = {
            ...atual,
            valor_pago: pagoParcela,
            valor_pendente: pendenteParcela,
            status: pendenteParcela <= 0.009 ? 'PAGO' : 'PARCIAL',
            data_quitacao: pendenteParcela <= 0.009 ? dataPagamento : String(atual?.data_quitacao || '').trim(),
            pagamento_id: String(atual?.pagamento_id || (mutationId ? `TMPPG_${mutationId}` : '')).trim()
          };
        }
      }

      return {
        ...base,
        forma_pagamento: formaPagamento || base.forma_pagamento,
        forma_pagamento_padrao: formaPagamento || base.forma_pagamento_padrao,
        data_pagamento: dataPagamento || base.data_pagamento,
        data_ultimo_pagamento: dataPagamento || base.data_ultimo_pagamento,
        forma_ultimo_pagamento: formaPagamento || base.forma_ultimo_pagamento,
        total_previsto: totalPrevisto,
        total_pago: totalPago,
        total_pendente: totalPendente,
        status_pagamento: getStatusPagamento(totalPrevisto, totalPago),
        quantidade_pagamentos: Math.max(0, Number(base.quantidade_pagamentos || 0)) + (incremento > 0 ? 1 : 0),
        parcelas_detalhe: parcelas
      };

    function getUiState(item) {
      const status = normalizarLocalStatus(item?._localStatus);
      const action = String(item?._localAction || '').trim().toLowerCase();
      if (!status) {
        return {
          status: '',
          action: '',
          label: '',
          message: '',
          canRetry: false,
          blockActions: false
        };
      }

      if (status === 'conflict') {
        const label = action === 'delete'
          ? 'Conflito ao excluir'
          : action === 'payment'
            ? 'Conflito no pagamento'
            : 'Conflito de sincronizacao';
        return {
          status: 'conflict',
          action,
          label,
          message: String(item?._localErrorMessage || '').trim() || 'O item foi alterado em outro lugar. Revise e tente novamente.',
          canRetry: !!item?._localMutationId,
          blockActions: true
        };
      }

      if (status === 'error') {
        const label = action === 'delete'
          ? 'Falha ao excluir'
          : action === 'payment'
            ? 'Falha no pagamento'
            : 'Falha na sincronizacao';
        return {
          status: 'error',
          action,
          label,
          message: String(item?._localErrorMessage || '').trim(),
          canRetry: !!item?._localMutationId,
          blockActions: true
        };
      }

      if (status === 'offline') {
        return {
          status: 'offline',
          action,
          label: 'Aguardando conexao',
          message: 'A alteracao sera reenviada quando a conexao voltar.',
          canRetry: !!item?._localMutationId,
          blockActions: true
        };
      }

      if (status === 'paused') {
        return {
          status: 'paused',
          action,
          label: 'Reenvio automatico',
          message: obterMensagemReenvio(item?._localRetryAt),
          canRetry: !!item?._localMutationId,
          blockActions: true
        };
      }

      const label = action === 'delete'
        ? 'Exclusao pendente'
        : action === 'payment'
          ? 'Pagamento pendente'
          : 'Sincronizando';

      return {
        status: 'pending',
        action,
        label,
        message: '',
        canRetry: false,
        blockActions: true
      };

    function localizarIndex(lista, ids = []) {
      const chaves = ids
        .map(valor => String(valor || '').trim())
        .filter(Boolean);
      if (chaves.length === 0) return -1;
      return (Array.isArray(lista) ? lista : []).findIndex(item => {
        const id = String(item?.ID || '').trim();
        return !!id && chaves.includes(id);
      });
    }

    function upsert(lista, item, extraIds = []) {
      const arr = Array.isArray(lista) ? clone(lista) : [];
      const base = clone(item);
      if (!base) return arr;
      const idx = localizarIndex(arr, [base.ID, ...extraIds]);
      if (idx >= 0) {
        arr[idx] = base;
      } else {
        arr.unshift(base);
      }
      return arr;
    }

    function remove(lista, ids = []) {
      const chaves = ids
        .map(valor => String(valor || '').trim())
        .filter(Boolean);
      if (chaves.length === 0) return Array.isArray(lista) ? clone(lista) : [];
      return (Array.isArray(lista) ? clone(lista) : []).filter(item => {
        const id = String(item?.ID || '').trim();
        return !id || !chaves.includes(id);
      });
    }

    function canonicalSuccessItem(entry, detail = {}) {
      const meta = entry?.meta || {};
      if (meta.action === 'create' && detail?.result && typeof detail.result === 'object') {
        return limparMeta(detail.result);
      }
      if (meta.action === 'payment' && detail?.result?.despesaAtualizada) {
        return limparMeta(detail.result.despesaAtualizada);
      }
      if (meta.action === 'update' && detail?.result && typeof detail.result === 'object' && detail.result.ID) {
        return limparMeta(detail.result);
      }
      return limparMeta(meta.optimistic_item);
    }

    function applyEntryToList(lista, detail = {}) {
      const entry = detail.entry || {};
      const meta = entry.meta || {};
      if (String(meta.domain || '').trim() !== 'despesa') {
        return Array.isArray(lista) ? clone(lista) : [];
      }

      const tipo = String(detail.type || '').trim().toLowerCase();
      const action = String(meta.action || '').trim().toLowerCase();
      const beforeItem = clone(meta.before_item);
      const optimisticItem = clone(meta.optimistic_item);
      const idsRelacionados = [
        optimisticItem?.ID,
        beforeItem?.ID,
        entry.entityKey
      ];

      if (tipo === 'success') {
        if (action === 'delete') {
          return remove(lista, idsRelacionados);
        }
        const canonical = canonicalSuccessItem(entry, detail);
        return upsert(remove(lista, idsRelacionados), canonical, idsRelacionados);
      }

      if (tipo === 'discarded') {
        if (action === 'create') {
          return remove(lista, idsRelacionados);
        }
        if (beforeItem) {
          return upsert(remove(lista, idsRelacionados), limparMeta(beforeItem), idsRelacionados);
        }
        return remove(lista, idsRelacionados);
      }

      const statusAtual = resolverStatusDetalhe(detail);
      const withMeta = aplicarMeta(optimisticItem || beforeItem, {
        status: statusAtual,
        action,
        mutationId: entry.id,
        errorMessage: detail.errorMessage || entry.errorMessage,
        errorKind: entry.errorKind,
        retryAt: entry.retryAt,
        retryable: ehRetryManualDisponivel(statusAtual),
        localDeleted: action === 'delete',
        source: meta.source
      });
      return upsert(lista, withMeta, idsRelacionados);
    }

    function mergeFetchedList(listaBase, entriesAtivas) {
      let atual = Array.isArray(listaBase) ? clone(listaBase).map(limparMeta) : [];
      (Array.isArray(entriesAtivas) ? entriesAtivas : []).forEach(entry => {
        const status = normalizarLocalStatus(entry?.status);
        if (!entry || !ehStatusMutacaoAtivo(status)) {
          return;
        }
        atual = applyEntryToList(atual, {
          type: status || 'pending',
          entry,
          errorMessage: entry.errorMessage
        });
      });
      return atual;
    }

    return {
      clone,
      round2,
      tempId,
      limparMeta,
      aplicarMeta,
      buildFromPayload,
      applyPayment,
      getUiState,
      applyEntryToList,
      mergeFetchedList
    };
  }

          canRetry: false,
          blockActions: false
        };
      }

      const pendingLabels = options.pendingLabels || {};
      const sendingLabels = options.sendingLabels || pendingLabels;
      const offlineLabels = options.offlineLabels || {};
      const pausedLabels = options.pausedLabels || {};
      const conflictLabels = options.conflictLabels || {};
      const errorLabels = options.errorLabels || {};
      const pendingFallback = String(options.pendingFallback || 'Sincronizando').trim() || 'Sincronizando';
      const sendingFallback = String(options.sendingFallback || pendingFallback).trim() || pendingFallback;
      const offlineFallback = String(options.offlineFallback || 'Aguardando conexao').trim() || 'Aguardando conexao';
      const pausedFallback = String(options.pausedFallback || 'Reenvio automatico').trim() || 'Reenvio automatico';
      const conflictFallback = String(options.conflictFallback || 'Conflito de sincronizacao').trim() || 'Conflito de sincronizacao';
      const errorFallback = String(options.errorFallback || 'Falha na sincronizacao').trim() || 'Falha na sincronizacao';

      if (status === 'conflict') {
        return {
          status: 'conflict',
          action,
          label: String(conflictLabels[action] || conflictFallback).trim() || conflictFallback,
          message: String(item?._localErrorMessage || options.conflictMessage || '').trim() || 'O registro foi alterado em outro lugar. Revise e tente novamente.',
          canRetry: !!item?._localMutationId,
          blockActions: options.blockActionsOnError !== false
        };
      }

      if (status === 'error') {
        return {
          status: 'error',
          action,
          label: String(errorLabels[action] || errorFallback).trim() || errorFallback,
          message: String(item?._localErrorMessage || '').trim(),
          canRetry: !!item?._localMutationId,
          blockActions: options.blockActionsOnError !== false
        };
      }

      if (status === 'offline') {
        return {
          status: 'offline',
          action,
          label: String(offlineLabels[action] || offlineFallback).trim() || offlineFallback,
          message: String(options.offlineMessage || '').trim() || 'A alteracao sera reenviada quando a conexao voltar.',
          canRetry: !!item?._localMutationId,
          blockActions: options.blockActionsOnPending !== false
        };
      }

      if (status === 'paused') {
        return {
          status: 'paused',
          action,
          label: String(pausedLabels[action] || pausedFallback).trim() || pausedFallback,
          message: String(options.pausedMessage || '').trim() || obterMensagemReenvio(item?._localRetryAt),
          canRetry: !!item?._localMutationId,
          blockActions: options.blockActionsOnPending !== false
        };
      }

      return {
        status: 'pending',
        action,
        label: String((status === 'sending' ? sendingLabels[action] : pendingLabels[action]) || (status === 'sending' ? sendingFallback : pendingFallback)).trim()
          || (status === 'sending' ? sendingFallback : pendingFallback),
        message: '',
        canRetry: false,
        blockActions: options.blockActionsOnPending !== false
      };
    }

    function getId(item, idKey = 'ID') {
      return String(item?.[idKey] || '').trim();
    }

    function localizarIndex(lista, idKey, ids = []) {
      const chaves = ids
        .map(valor => String(valor || '').trim())
        .filter(Boolean);
      if (chaves.length === 0) return -1;
      return (Array.isArray(lista) ? lista : []).findIndex(item => {
        const id = getId(item, idKey);
        return !!id && chaves.includes(id);
      });
    }

    function upsert(lista, item, options = {}) {
      const arr = Array.isArray(lista) ? clone(lista) : [];
      const base = clone(item);
      if (!base) return arr;
      const idKey = String(options.idKey || 'ID').trim() || 'ID';
      const extraIds = Array.isArray(options.extraIds) ? options.extraIds : [];
      const idx = localizarIndex(arr, idKey, [getId(base, idKey), ...extraIds]);
      if (idx >= 0) {
        arr[idx] = base;
      } else {
        arr.unshift(base);
      }
      return arr;
    }

    function remove(lista, idKey, ids = []) {
      const chaves = ids
        .map(valor => String(valor || '').trim())
        .filter(Boolean);
      if (chaves.length === 0) return Array.isArray(lista) ? clone(lista) : [];
      return (Array.isArray(lista) ? clone(lista) : []).filter(item => {
        const id = getId(item, idKey);
        return !id || !chaves.includes(id);
      });
    }

    function canonicalSuccessItem(entry, detail = {}, options = {}) {
      if (typeof options.resolveSuccessItem === 'function') {
        const resolved = options.resolveSuccessItem(entry, detail, {
          clone,
          limparMeta
        });
        if (resolved) {
          return limparMeta(resolved);
        }
      }
      return limparMeta(entry?.meta?.optimistic_item);
    }

    function applyEntryToList(lista, detail = {}, options = {}) {
      const entry = detail.entry || {};
      const meta = entry.meta || {};
      const domain = String(options.domain || '').trim();
      if (domain && String(meta.domain || '').trim() !== domain) {
        return Array.isArray(lista) ? clone(lista) : [];
      }

      const type = String(detail.type || '').trim().toLowerCase();
      const action = String(meta.action || '').trim().toLowerCase();
      const idKey = String(options.idKey || meta.idKey || 'ID').trim() || 'ID';
      const beforeItem = clone(meta.before_item);
      const optimisticItem = clone(meta.optimistic_item);
      const idsRelacionados = [
        getId(optimisticItem, idKey),
        getId(beforeItem, idKey),
        meta.target_id,
        meta.temp_id,
        meta.optimistic_id
      ];

      if (type === 'success') {
        if (action === 'delete') {
          return remove(lista, idKey, idsRelacionados);
        }
        const canonical = canonicalSuccessItem(entry, detail, {
          ...options,
          idKey
        });
        return upsert(remove(lista, idKey, idsRelacionados), canonical, {
          idKey,
          extraIds: idsRelacionados
        });
      }

      if (type === 'discarded') {
        if (action === 'create') {
          return remove(lista, idKey, idsRelacionados);
        }
        if (beforeItem) {
          return upsert(remove(lista, idKey, idsRelacionados), limparMeta(beforeItem), {
            idKey,
            extraIds: idsRelacionados
          });
        }
        return remove(lista, idKey, idsRelacionados);
      }

      const statusAtual = resolverStatusDetalhe(detail);
      const withMeta = aplicarMeta(optimisticItem || beforeItem, {
        status: statusAtual,
        action,
        mutationId: entry.id,
        errorMessage: detail.errorMessage || entry.errorMessage,
        errorKind: entry.errorKind,
        retryAt: entry.retryAt,
        retryable: ehRetryManualDisponivel(statusAtual),
        localDeleted: action === 'delete',
        source: meta.source
      });
      return upsert(lista, withMeta, {
        idKey,
        extraIds: idsRelacionados
      });
    }

    function mergeFetchedList(listaBase, entriesAtivas, options = {}) {
      let atual = Array.isArray(listaBase) ? clone(listaBase).map(limparMeta) : [];
      (Array.isArray(entriesAtivas) ? entriesAtivas : []).forEach(entry => {
        const status = normalizarLocalStatus(entry?.status);
        if (!entry || !ehStatusMutacaoAtivo(status)) {
          return;
        }
        atual = applyEntryToList(atual, {
          type: status || 'pending',
          entry,
          errorMessage: entry.errorMessage
        }, options);
      });
      return atual;
    }

    return {
      clone,
      parseNumero,
      round2,
      clampDate,
      getFinancialStatus,
      tempId,
      limparMeta,
      aplicarMeta,
      getUiState,
      applyEntryToList,
      mergeFetchedList
    };
  }

  function createUserAccessHelper() {
    let contexto = null;
    let inFlight = null;
    let mutationLockToken = null;
    const ACCESS_TEMP_HIDDEN_ATTR = 'data-access-temp-hidden';

    function aplicarTelaAcesso(ctx) {
      const bloqueado = ctx?.can_read === false;
      const painel = document.getElementById('appAccessDenied');
      const emailEl = document.getElementById('appAccessDeniedEmail');
      const msgEl = document.getElementById('appAccessDeniedMsg');

      if (emailEl) {
        emailEl.textContent = String(ctx?.email || '-').trim() || '-';
      }
      if (msgEl) {
        msgEl.textContent = bloqueado
          ? (String(ctx?.motivo || '').trim() || 'Seu usuario nao possui permissao para acessar os dados deste app.')
          : 'Seu usuario nao possui permissao para acessar os dados deste app.';
      }
      if (painel) {
        painel.classList.toggle('hidden', !bloqueado);
      }

      const alvos = document.querySelectorAll('.navbar, #appSyncBanner, .top-bar, #painelFiltroEstoque, #painelFiltroCompras, .aba, .bottom-bar');
      if (bloqueado) {
        alvos.forEach(el => {
          if (!el.classList.contains('hidden')) {
            el.setAttribute(ACCESS_TEMP_HIDDEN_ATTR, '1');
            el.classList.add('hidden');
            return;
          }
          el.removeAttribute(ACCESS_TEMP_HIDDEN_ATTR);
        });
        return;
      }

      alvos.forEach(el => {
        if (el.getAttribute(ACCESS_TEMP_HIDDEN_ATTR) !== '1') return;
        el.classList.remove('hidden');
        el.removeAttribute(ACCESS_TEMP_HIDDEN_ATTR);
      });
    }

    function normalizarContexto(raw) {
      const base = raw && typeof raw === 'object' ? raw : {};
      const canRead = base.can_read !== false;
      const canWrite = canRead && base.can_write === true;
      const motivo = String(base.motivo || '').trim();
      return {
        ...base,
        can_read: canRead,
        can_write: canWrite,
        read_only: !canWrite,
        role: String(base.role || (canWrite ? 'admin' : 'viewer') || '').trim(),
        motivo: canRead
          ? (canWrite ? '' : (motivo || 'Perfil somente leitura.'))
          : (motivo || 'Usuario sem permissao para visualizar os dados.')
      };
    }

    function sincronizarBloqueioMutacao(canWrite) {
      if (canWrite) {
        if (mutationLockToken && window.AppMutationUI?.unlock) {
          window.AppMutationUI.unlock(mutationLockToken);
          mutationLockToken = null;
        }
        return;
      }

      if (!mutationLockToken && window.AppMutationUI?.lock) {
        mutationLockToken = window.AppMutationUI.lock();
      }
    }

    function aplicar(raw) {
      const ctx = normalizarContexto(raw);
      contexto = ctx;

      if (window.AppRuntime?.setAccessReadOnly) {
        window.AppRuntime.setAccessReadOnly(ctx.read_only, ctx.motivo);
      } else if (window.AppRuntime?.setReadOnly) {
        window.AppRuntime.setReadOnly(ctx.read_only, ctx.motivo);
      }

      sincronizarBloqueioMutacao(ctx.can_write);
      aplicarTelaAcesso(ctx);

      if (typeof window !== 'undefined') {
        try {
          window.dispatchEvent(new CustomEvent('app:user:context-changed', {
            detail: ctx
          }));
        } catch (error) {
          // sem acao
        }
      }

      return ctx;
    }

    function getContext() {
      return contexto;
    }

    function load(options = {}) {
      const force = !!options.force;
      if (inFlight && !force) return inFlight;

      // Ate validar o perfil, fica bloqueado por seguranca.
      aplicar({
        can_write: false,
        role: 'viewer',
        motivo: 'Validando perfil de acesso...'
      });

      if (!window.google?.script?.run) {
        const offline = aplicar({
          can_read: false,
          can_write: false,
          role: 'viewer',
          motivo: 'Sem conexao com backend - nao foi possivel validar seu acesso.'
        });
        return Promise.resolve(offline);
      }

      inFlight = new Promise(resolve => {
        window.AppRequest.call('obterContextoUsuario', [force], {
          context: 'user.access.load',
          errorMessage: 'Falha ao validar perfil de acesso.'
        })
          .then(raw => {
            resolve(aplicar(raw || {}));
          })
          .catch(err => {
            const mensagem = String(err?.message || err || '').trim();
            resolve(aplicar({
              can_read: false,
              can_write: false,
              role: 'viewer',
              motivo: mensagem || 'Falha ao validar perfil de acesso.'
            }));
          });
      }).finally(() => {
        inFlight = null;
      });

      return inFlight;
    }

    return {
      load,
      apply: aplicar,
      getContext
    };
  }

  function createPerfHelper() {
    const historico = [];
    function lerFlagDebugPerf() {
      try {
        const params = new URLSearchParams(window.location.search || '');
        const q = String(params.get('debugPerf') || params.get('perf') || '').trim().toLowerCase();
        if (q === '1' || q === 'true' || q === 'on' || q === 'yes') return true;
        if (q === '0' || q === 'false' || q === 'off' || q === 'no') return false;
      } catch (error) {
        // sem acao
      }

      try {
        if (!window.localStorage) return false;
        const raw = window.localStorage.getItem('APP_DEBUG_PERF');
        if (raw === null) return false;
        const v = String(raw || '').trim().toLowerCase();
        return v === '1' || v === 'true' || v === 'on' || v === 'yes';
      } catch (error) {
        return false;
      }
    }

    let ativo = lerFlagDebugPerf();
    const LIMITE_HIST = 300;
    const MIN_LOG_MS = 16;

    function agora() {
      if (typeof performance !== 'undefined' && performance.now) {
        return performance.now();
      }
      return Date.now();
    }

    function start(label, meta) {
      if (!ativo) return null;
      return {
        label: String(label || '').trim() || 'sem-label',
        t0: agora(),
        meta: meta || {}
      };
    }

    function end(token, extra) {
      if (!ativo || !token || !token.label) return 0;
      const ms = agora() - Number(token.t0 || 0);
      const entrada = {
        ts: new Date().toISOString(),
        label: token.label,
        ms: Number(ms.toFixed(2)),
        meta: { ...(token.meta || {}), ...(extra || {}) }
      };
      historico.push(entrada);
      if (historico.length > LIMITE_HIST) historico.shift();

      if (ativo && ms >= MIN_LOG_MS && typeof console !== 'undefined' && console.log) {
        console.log(`[perf] ${entrada.label}: ${entrada.ms}ms`, entrada.meta);
      }
      return ms;
    }

    function measure(label, fn, meta) {
      if (!ativo) {
        return fn();
      }
      const token = start(label, meta);
      try {
        const out = fn();
        end(token);
        return out;
      } catch (error) {
        end(token, { erro: true, mensagem: error?.message || '' });
        throw error;
      }
    }

    function setEnabled(v) {
      ativo = !!v;
    }

    function isEnabled() {
      return !!ativo;
    }

    function getHistory() {
      return historico.slice();
    }

    function clear() {
      historico.length = 0;
    }

    return {
      start,
      end,
      measure,
      setEnabled,
      isEnabled,
      getHistory,
      clear
    };
  }

  function createSyncStatusHelper() {
    let seq = 0;
    const ativos = new Map();
    const hints = new Map();
    let elWrap = null;
    let elTexto = null;

    function garantirElemento() {
      if (elWrap && document.body?.contains(elWrap)) return;
      elWrap = document.getElementById('appSyncBanner');
      if (!elWrap) return;
      elTexto = document.getElementById('appSyncBannerText');
      if (!elTexto) {
        elTexto = document.createElement('span');
        elTexto.id = 'appSyncBannerText';
        elWrap.appendChild(elTexto);
      }
    }

    function render() {
      garantirElemento();
      if (!elWrap || !elTexto) return;

      const abaAtiva = obterNomeAbaAtiva();
      const listaAtivos = [...ativos.values()];
      const ativosDaAba = abaAtiva
        ? listaAtivos.filter(item => String(item?.aba || '').trim() === abaAtiva)
        : [];
      const alvoAtivo = ativosDaAba.length > 0 ? ativosDaAba[0] : listaAtivos[0];
      const listaHints = [...hints.values()].filter(item => !!String(item?.texto || '').trim());
      const hintsDaAba = abaAtiva
        ? listaHints.filter(item => String(item?.aba || '').trim() === abaAtiva)
        : [];
      const hintGlobal = listaHints.find(item => !String(item?.aba || '').trim()) || null;
      const alvoHint = hintsDaAba[0] || hintGlobal || listaHints[0] || null;
      const alvo = alvoAtivo || alvoHint;

      if (!alvo) {
        elWrap.classList.add('hidden');
        elWrap.removeAttribute('data-aba-sync');
        elWrap.removeAttribute('data-sync-kind');
        return;
      }

      const abaAlvo = String(alvo?.aba || '').trim();
      const texto = String(alvo?.texto || '').trim();
      const kind = String(alvo?.kind || '').trim();
      const labelAba = obterLabelAbaSync(abaAlvo);

      elTexto.textContent = texto || `Sincronizando ${labelAba}...`;
      if (abaAlvo) {
        elWrap.setAttribute('data-aba-sync', abaAlvo);
      } else {
        elWrap.removeAttribute('data-aba-sync');
      }
      if (kind) {
        elWrap.setAttribute('data-sync-kind', kind);
      } else {
        elWrap.removeAttribute('data-sync-kind');
      }
      elWrap.classList.remove('hidden');
    }

    function iniciar(aba, texto = '') {
      const token = `sync_${++seq}`;
      const abaNormalizada = normalizarNomeAba(aba);
      const textoNormalizado = String(texto || '').trim();
      ativos.set(token, {
        aba: abaNormalizada,
        texto: textoNormalizado
      });
      render();
      window.AppDiag?.mark?.('sync.banner.start', {
        token,
        aba: abaNormalizada,
        texto: textoNormalizado
      });
      return token;
    }

    function finalizar(token) {
      if (!token) return;
      const item = ativos.get(token);
      const removido = ativos.delete(token);
      render();
      window.AppDiag?.mark?.('sync.banner.end', {
        token: String(token || ''),
        removed: !!removido,
        aba: String(item?.aba || '')
      });
    }

    function limparAba(aba) {
      const alvo = normalizarNomeAba(aba);
      if (!alvo) return;
      [...ativos.keys()].forEach(token => {
        const item = ativos.get(token);
        if (String(item?.aba || '').trim() !== alvo) return;
        ativos.delete(token);
      });
      render();
    }

    function setHint(key, payload = {}) {
      const chave = String(key || '').trim();
      if (!chave) return;
      const texto = String(payload?.texto || '').trim();
      if (!texto) {
        hints.delete(chave);
        render();
        return;
      }
      hints.set(chave, {
        aba: normalizarNomeAba(payload?.aba),
        texto,
        kind: String(payload?.kind || '').trim()
      });
      render();
    }

    function clearHint(key) {
      const chave = String(key || '').trim();
      if (!chave) return;
      hints.delete(chave);
      render();
    }

    function refresh() {
      render();
    }

    return {
      iniciar,
      finalizar,
      limparAba,
      setHint,
      clearHint,
      refresh
    };
  }

  function formatarResumoOutboxHint(summary = {}) {
    const total = Math.max(0, Number(summary?.total || 0));
    if (total <= 0) return '';

    const active = Math.max(0, Number(summary?.active || 0));
    const conflict = Math.max(0, Number(summary?.conflict || 0));
    const error = Math.max(0, Number(summary?.error || 0));
    const offline = Math.max(0, Number(summary?.offline || 0));
    const paused = Math.max(0, Number(summary?.paused || 0));
    const sending = Math.max(0, Number(summary?.sending || 0));
    const pending = Math.max(0, Number(summary?.pending || 0));
    const online = summary?.online !== false;
    const proximaTentativa = Math.max(0, Number(summary?.nextRetryAt || 0));
    const pluralizar = (valor, singular, plural) => `${valor} ${valor === 1 ? singular : plural}`;

    if (conflict > 0) {
      return `${pluralizar(conflict, 'alteracao com conflito', 'alteracoes com conflito')} aguardando revisao.`;
    }

    if (error > 0 && active === 0) {
      return `${pluralizar(error, 'alteracao falhou', 'alteracoes falharam')}. Use "Tentar novamente".`;
    }

    if (!online || offline > 0) {
      const alvo = Math.max(offline, active, total);
      return `Sem conexao. ${pluralizar(alvo, 'alteracao local aguarda', 'alteracoes locais aguardam')} reenvio automatico.`;
    }

    if (paused > 0) {
      const diffSeg = proximaTentativa > 0
        ? Math.max(1, Math.ceil((proximaTentativa - Date.now()) / 1000))
        : 0;
      const sufixo = diffSeg > 0 ? ` Nova tentativa em ${diffSeg}s.` : '';
      return `${pluralizar(paused, 'alteracao aguarda reenvio', 'alteracoes aguardam reenvio automatico')}.${sufixo}`.trim();
    }

    if (sending > 0 || pending > 0 || active > 0) {
      return `Sincronizando ${pluralizar(Math.max(active, sending + pending), 'alteracao local', 'alteracoes locais')}...`;
    }

    return '';
  }

  function atualizarHintOutboxSincronizacao(summary = {}) {

    const texto = formatarResumoOutboxHint(summary);

    syncStatus.setHint('optimistic-outbox', {

  function obterEstadoRefreshAba(nome) {

        initialized: false,
        dirty: false

  function marcarAbaComoSuja(nome) {

    if (!state) return false;

  function limparAbaSuja(nome) {
    const state = obterEstadoRefreshAba(nome);
    if (!state) return false;
    state.dirty = false;
    return true;

  function abaEstaSuja(nome) {
    const state = obterEstadoRefreshAba(nome);

  function obterEstadoSyncAba(nome) {
    const aba = normalizarNomeAba(nome);
    if (!aba) return null;
    if (!abaSyncState[aba]) {
      abaSyncState[aba] = {
        timer: null,
        running: false,
        pendingCallbacks: [],
        queued: false,
        queuedPrefetch: false,
        scheduledAt: 0,
        lastStartedAt: 0,
        lastFinishedAt: 0
      };

  function deveRecarregarAba(nome, force = false) {
    const aba = String(nome || '').trim();
    if (!aba) return false;
    const agoraMs = Date.now();
    const state = obterEstadoRefreshAba(aba);
    if (!state) return false;
    const ttl = Number(ABA_REFRESH_INTERVAL_MS[aba] || 30000);

    if (force || !state.initialized || !!state.dirty) {
      state.initialized = true;
      state.last = agoraMs;
      state.dirty = false;
      return true;
    }

    if (agoraMs - Number(state.last || 0) >= ttl) {
      state.initialized = true;
      state.last = agoraMs;
      state.dirty = false;
      return true;
    }

    return false;
  }

  function executarSincronizacaoForcadaAba(nome, onDone) {
    const aba = normalizarNomeAba(nome);
    const concluir = (() => {
      let finalizado = false;
      return () => {
        if (finalizado) return;
        finalizado = true;
        if (typeof onDone === 'function') onDone();

    if (!aba) {

      if (window.DashboardController?.init) {
        window.AppPerf?.measure('tab.dashboard.init', () => DashboardController.init());
      }
      concluir();
      return;
    }

    const map = {
      estoque: {
        sync: window.EstoqueController?.syncFromBackend,
        init: window.EstoqueController?.init,
        labelSync: 'tab.estoque.sync',
        labelInit: 'tab.estoque.init'

      despesas: {
        sync: window.DespesasController?.syncFromBackend,
        init: window.DespesasController?.init,
        labelSync: 'tab.despesas.sync',

        sync: window.ComprasController?.syncFromBackend,

        labelSync: 'tab.producao.sync',

    if (!alvo) {
      concluir();

  function requestSyncAba(nome, options = {}) {
    const aba = normalizarNomeAba(nome);
    if (!aba) return false;

    marcarAbaComoSuja(aba);

    const state = obterEstadoSyncAba(aba);
    if (!state) return false;
    const onDone = typeof options.onDone === 'function' ? options.onDone : null;
    if (onDone) {
      state.pendingCallbacks.push(onDone);
    }

    const delayBase = Number(options.delayMs);
    const delayMs = Number.isFinite(delayBase) && delayBase >= 0
      ? delayBase
      : TAB_SYNC_COALESCE_MS;
    const timeoutBase = Number(options.timeoutMs);
    const timeoutMs = Number.isFinite(timeoutBase) && timeoutBase > 0
      ? timeoutBase
      : 35000;
    const immediate = !!options.immediate;
    const prefetch = !!options.prefetch;
    const abaAtiva = obterNomeAbaAtiva();
    const agoraMs = Date.now();
    const referenciaGap = Math.max(
      Number(state.lastFinishedAt || 0),
      Number(state.lastStartedAt || 0)
    );
    const cooldownRestante = referenciaGap > 0
      ? Math.max(0, TAB_SYNC_MIN_GAP_MS - (agoraMs - referenciaGap))
      : 0;

    if (state.running) {
      state.queued = true;
      state.queuedPrefetch = state.queuedPrefetch || prefetch;
      return true;
    }

    const deveExecutarAgora = abaAtiva === aba || prefetch;
    if (!deveExecutarAgora) {
      if (onDone) {
        state.pendingCallbacks = state.pendingCallbacks.filter(fn => fn !== onDone);
        try {
          onDone();
        } catch (error) {
          // sem acao
        }
      }
      return true;
    }

    const delayEfetivo = (immediate || delayMs <= 0)
      ? Math.min(180, cooldownRestante)
      : Math.max(delayMs, cooldownRestante);

    const iniciarExecucao = () => {
      if (state.running) {
        state.queued = true;
        state.queuedPrefetch = state.queuedPrefetch || prefetch;
        return;
      }

      state.scheduledAt = 0;
      state.running = true;
      state.queued = false;
      state.queuedPrefetch = false;
      state.lastStartedAt = Date.now();
      const tokenSync = window.AppSyncStatus?.iniciar
        ? window.AppSyncStatus.iniciar(aba, '')
        : null;
      let finalizado = false;
      let watchdog = null;

      const finalizarExecucao = (origem) => {
        if (finalizado) return;
        finalizado = true;

        if (watchdog) {
          clearTimeout(watchdog);
          watchdog = null;
        }

        state.running = false;
        state.lastFinishedAt = Date.now();
        limparAbaSuja(aba);
        if (tokenSync) {
          window.AppSyncStatus.finalizar(tokenSync);
        }

        if (origem === 'timeout') {
          window.AppDiag?.mark?.('sync.timeout', {
            aba,
            timeout_ms: timeoutMs
          });
          if (typeof console !== 'undefined' && console.warn) {
            console.warn(`[sync] timeout ${aba} (${timeoutMs}ms)`);
          }
        }

        const callbacks = state.pendingCallbacks.splice(0);
        callbacks.forEach(fn => {
          try {
            fn();
          } catch (error) {
            // sem acao
          }
        });

        if (!state.queued) return;
        const queuedPrefetch = !!state.queuedPrefetch;
        state.queued = false;
        state.queuedPrefetch = false;
        requestSyncAba(aba, {
          immediate: true,
          prefetch: queuedPrefetch
        });
      };

      watchdog = setTimeout(() => {
        finalizarExecucao('timeout');
      }, timeoutMs);

      try {
        executarSincronizacaoForcadaAba(aba, () => {
          finalizarExecucao('done');
        });
      } catch (error) {
        window.AppDiag?.mark?.('sync.error', {
          aba,
          message: String(error?.message || error || '')
        });
        if (typeof console !== 'undefined' && console.error) {
          console.error(`[sync] erro ao sincronizar ${aba}`, error);
        }
        finalizarExecucao('error');
      }
    };

    if (delayEfetivo <= 0) {
      iniciarExecucao();
      return true;
    }

    const scheduledAt = agoraMs + delayEfetivo;
    if (state.timer && Number(state.scheduledAt || 0) > 0 && Number(state.scheduledAt || 0) <= scheduledAt) {
      return true;
    }
    if (state.timer) {
      clearTimeout(state.timer);
      state.timer = null;
    }

    state.scheduledAt = scheduledAt;
    state.timer = setTimeout(() => {
      state.timer = null;
      state.scheduledAt = 0;
      iniciarExecucao();
    }, delayEfetivo);
    return true;
  }

        if (recarregar && loaded && typeof window.ProducaoController.syncFromBackend === 'function') {
          window.AppTabRefresh?.requestSync?.('producao', { immediate: true, prefetch: true });
        } else if (!loaded || recarregar) {
          window.AppPerf?.measure('tab.producao.init', () => ProducaoController.init());
        }
      }
      if (typeof aplicarBuscaProducao === 'function') aplicarBuscaProducao();
    }

  function trocarAba(nome) {
    window.AppPerf?.measure('nav.trocarAba', () => {
      const alvo = normalizarNomeAba(nome) || ABA_INICIAL_PADRAO;
      if (!alvo) return;
      const atual = obterNomeAbaAtiva();
      window.AppDiag?.mark?.('nav.tab.request', {
        from_tab: atual,
        to_tab: alvo
      });
      const abaAlvo = document.getElementById('aba-' + alvo);
      if (!abaAlvo) {
        window.AppDiag?.mark?.('nav.tab.invalid_target', {
          from_tab: atual,
          to_tab: alvo
        });
        return;
      }
      if (atual && atual === alvo) {
        fecharMenuNavbar();
        atualizarEstadoNavbar(alvo);
        setTopBars(alvo);
        executarCicloAba(alvo);
        window.AppSyncStatus?.refresh?.();
        salvarUltimaAba(alvo);
        window.AppDiag?.mark?.('nav.tab.same', {
          tab: alvo
        });
        return;
      }

      document.querySelectorAll('.aba')
        .forEach(a => a.classList.add('hidden'));

      abaAlvo.classList.remove('hidden');
      fecharMenuNavbar();
      atualizarEstadoNavbar(alvo);
      setTopBars(alvo);
      executarCicloAba(alvo);
      window.AppSyncStatus?.refresh?.();
      salvarUltimaAba(alvo);
      window.AppDiag?.mark?.('nav.tab.changed', {
        from_tab: atual,
        to_tab: alvo
      });
    }, { aba: String(nome || '') });
  }

    const topVendas = document.getElementById('topBarVendas');
    const topDespesas = document.getElementById('topBarDespesas');
    const topProdutos = document.getElementById('topBarProdutos');
    const topProducao = document.getElementById('topBarProducao');
    const bottomBar = document.querySelector('.bottom-bar');

    if (topEstoque) topEstoque.classList.toggle('hidden', nome !== 'estoque');
    if (topCompras) topCompras.classList.toggle('hidden', nome !== 'compras');
    if (topVendas) topVendas.classList.toggle('hidden', nome !== 'vendas');
    if (topDespesas) topDespesas.classList.toggle('hidden', nome !== 'despesas');
    if (topProdutos) topProdutos.classList.toggle('hidden', nome !== 'produtos');
    if (topProducao) topProducao.classList.toggle('hidden', nome !== 'producao');
    if (bottomBar) bottomBar.classList.toggle('hidden', nome === 'dashboard');

    if (nome !== 'estoque') {

      pararPollFiltros();

    if (nome !== 'compras') {
      fecharPainelFiltroCompras();
      pararPollFiltrosCompras();

    if (nome !== 'despesas' && window.DespesasController?.fecharPainelFiltros) {

  function createSyncFeedbackHelper() {
    const MIN_FINAL_DELAY_MS = 450;

    function iniciar(msgInicial = 'Salvo com sucesso. Atualizando dados...', msgFinalPadrao = 'Dados atualizados', opcoes = {}) {
      const inicio = Date.now();
      const abaSync = normalizarNomeAba(opcoes?.aba || obterNomeAbaAtiva());
      const tokenSync = window.AppSyncStatus?.iniciar
        ? window.AppSyncStatus.iniciar(abaSync, String(opcoes?.textoSync || '').trim())
        : null;
      if (msgInicial) {
        mostrarToast(msgInicial);
      }
      let concluido = false;
      return function concluir(msgFinal = msgFinalPadrao) {
        if (concluido) return;
        concluido = true;
        if (tokenSync) {
          window.AppSyncStatus.finalizar(tokenSync);
        }
        const atrasar = Math.max(0, MIN_FINAL_DELAY_MS - (Date.now() - inicio));
        setTimeout(() => {
          mostrarToast(msgFinal);
        }, atrasar);
      };
    }

    return {
      iniciar
    };
  }

    // evita adicionar o listener várias vezes

  let listenerFecharForaComprasAtivo = false;
  const COMPRAS_UI_GUARD_MS = 260;
  let comprasUiGuardAte = 0;

  function tryEnterComprasUiGuard(action = '') {
    const agora = Date.now();
    const restante = Math.max(0, comprasUiGuardAte - agora);
    if (restante > 0) {
      window.AppDiag?.mark?.('compras.ui.guard.blocked', {
        action: String(action || ''),
        wait_ms: restante
      });
      return false;
    }
    comprasUiGuardAte = agora + COMPRAS_UI_GUARD_MS;
    window.AppDiag?.mark?.('compras.ui.guard.enter', {
      action: String(action || ''),
      hold_ms: COMPRAS_UI_GUARD_MS
    });
    return true;
  }

  const appComprasUiGuardApi = window.AppComprasUiGuard || {};
  appComprasUiGuardApi.tryEnter = action => tryEnterComprasUiGuard(action);
  appComprasUiGuardApi.isLocked = () => Date.now() < comprasUiGuardAte;
  appComprasUiGuardApi.getRemainingMs = () => Math.max(0, comprasUiGuardAte - Date.now());
  window.AppComprasUiGuard = appComprasUiGuardApi;
