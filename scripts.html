<script>
  /* =========================
     NAV / ABAS
  ========================== */
  const ABAS_MENU_HAMBURGER = ['despesas', 'estoque', 'compras', 'vendas', 'produtos', 'producao'];
  const ABAS_APP = ['dashboard', ...ABAS_MENU_HAMBURGER];
  const ABA_INICIAL_PADRAO = 'dashboard';
  const LAST_TAB_STORAGE_KEY = 'app:lasttab:v1';
  const QUICK_FILTER_STOCK_TYPE_KEY = 'app:quickfilter:v1:estoque:tipo';
  const QUICK_FILTER_PURCHASE_TYPE_KEY = 'app:quickfilter:v1:compras:tipo';
  let listenerFecharMenuNavbarAtivo = false;

  function normalizarNomeAba(valor) {
    const aba = String(valor || '').trim().toLowerCase();
    return ABAS_APP.includes(aba) ? aba : '';
  }

  function salvarUltimaAba(valor) {
    const aba = normalizarNomeAba(valor);
    if (!aba) return;
    try {
      if (!window.localStorage) return;
      window.localStorage.setItem(LAST_TAB_STORAGE_KEY, aba);
    } catch (error) {
      // sem acao
    }
  }

  function lerUltimaAba() {
    try {
      if (!window.localStorage) return '';
      return normalizarNomeAba(window.localStorage.getItem(LAST_TAB_STORAGE_KEY));
    } catch (error) {
      return '';
    }
  }

  function getNavbarHamburgerEls() {
    return {
      wrap: document.getElementById('navbarMenuWrap'),
      btn: document.getElementById('btnNavHamburger'),
      menu: document.getElementById('navbarMenu')
    };
  }

  function menuNavbarAberto() {
    const { menu } = getNavbarHamburgerEls();
    return !!menu && !menu.classList.contains('hidden');
  }

  function obterLabelAbaMenu(aba) {
    const alvo = String(aba || '').trim();
    if (!alvo) return '';
    const btnMenu = document.querySelector(`#navbarMenu button[data-aba="${alvo}"]`);
    return String(btnMenu?.textContent || '').trim();
  }

  function atualizarRotuloBotaoHamburger(abaAtiva) {
    const { btn } = getNavbarHamburgerEls();
    if (!btn) return;
    const alvo = String(abaAtiva || '').trim();
    const ativoNoMenu = ABAS_MENU_HAMBURGER.includes(alvo);
    const rotulo = ativoNoMenu ? (obterLabelAbaMenu(alvo) || 'Menu') : 'Menu';
    btn.innerHTML = `<span class="navbar-hamburger-icon" aria-hidden="true">&#9776;</span><span class="navbar-hamburger-label">${rotulo}</span>`;
    btn.setAttribute('aria-label', ativoNoMenu ? `Abrir menu de abas (atual: ${rotulo})` : 'Abrir menu de abas');
  }

  function atualizarEstadoNavbar(abaAtiva) {
    const botoes = document.querySelectorAll('.navbar button[data-aba]');
    const alvo = String(abaAtiva || '').trim();
    botoes.forEach(btn => {
      const ehAtivo = String(btn.dataset.aba || '').trim() === alvo;
      btn.classList.toggle('active', ehAtivo);
      if (ehAtivo) {
        btn.setAttribute('aria-current', 'page');
      } else {
        btn.removeAttribute('aria-current');
      }
    });

    const { btn } = getNavbarHamburgerEls();
    if (btn) {
      const ativoNoMenu = ABAS_MENU_HAMBURGER.includes(alvo);
      btn.classList.toggle('active', ativoNoMenu);
      btn.setAttribute('aria-expanded', menuNavbarAberto() ? 'true' : 'false');
    }
    atualizarRotuloBotaoHamburger(alvo);
  }

  function salvarFiltroRapidoNoCache(chave, valor) {
    try {
      if (!window.localStorage) return;
      window.localStorage.setItem(String(chave || ''), String(valor || '').trim());
    } catch (error) {
      // sem acao
    }
  }

  function lerFiltroRapidoDoCache(chave) {
    try {
      if (!window.localStorage) return null;
      const raw = window.localStorage.getItem(String(chave || ''));
      if (raw === null) return null;
      return String(raw || '').trim();
    } catch (error) {
      return null;
    }
  }

  function aplicarFiltroTipoRapidoPersistidoEstoque() {
    const tipo = lerFiltroRapidoDoCache(QUICK_FILTER_STOCK_TYPE_KEY);
    if (tipo === null) return;
    setFiltroTipoRapidoEstoque(tipo);
  }

  function aplicarFiltroTipoRapidoPersistidoCompras() {
    const tipo = lerFiltroRapidoDoCache(QUICK_FILTER_PURCHASE_TYPE_KEY);
    if (tipo === null) return;
    setFiltroTipoRapidoCompras(tipo);
  }

  function fecharMenuNavbar() {
    const { menu, btn } = getNavbarHamburgerEls();
    if (menu) menu.classList.add('hidden');
    if (btn) btn.setAttribute('aria-expanded', 'false');

    if (listenerFecharMenuNavbarAtivo) {
      listenerFecharMenuNavbarAtivo = false;
      document.removeEventListener('pointerdown', fecharMenuNavbarAoClicarFora, { capture: true });
      document.removeEventListener('keydown', fecharMenuNavbarPorTeclado);
    }
  }

  function abrirMenuNavbar() {
    const { menu, btn } = getNavbarHamburgerEls();
    if (!menu || !btn) return;
    menu.classList.remove('hidden');
    btn.setAttribute('aria-expanded', 'true');

    if (!listenerFecharMenuNavbarAtivo) {
      listenerFecharMenuNavbarAtivo = true;
      document.addEventListener('pointerdown', fecharMenuNavbarAoClicarFora, { capture: true });
      document.addEventListener('keydown', fecharMenuNavbarPorTeclado);
    }
  }

  function toggleMenuNavbar() {
    if (menuNavbarAberto()) {
      fecharMenuNavbar();
    } else {
      abrirMenuNavbar();
    }
  }

  function fecharMenuNavbarAoClicarFora(evento) {
    const { wrap } = getNavbarHamburgerEls();
    if (!wrap) return;
    if (wrap.contains(evento.target)) return;
    fecharMenuNavbar();
  }

  function fecharMenuNavbarPorTeclado(evento) {
    const tecla = String(evento?.key || '').toLowerCase();
    if (tecla === 'escape') {
      fecharMenuNavbar();
    }
  }

  function initNavbarHamburger() {
    const { btn } = getNavbarHamburgerEls();
    if (!btn) return;
    btn.addEventListener('click', () => {
      toggleMenuNavbar();
    });
  }

  /* =========================
     LOADING UI
  ========================== */
  function createLoadingHelper() {
    function escapeHtml(valor) {
      return String(valor ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function criarInlineNode(label) {
      const wrap = document.createElement('span');
      wrap.className = 'loading-inline';

      const text = document.createElement('span');
      text.className = 'loading-label';
      text.textContent = String(label || 'Carregando');
      wrap.appendChild(text);

      const dots = document.createElement('span');
      dots.className = 'loading-dots';
      dots.setAttribute('aria-hidden', 'true');
      for (let i = 0; i < 3; i++) {
        const dot = document.createElement('span');
        dot.textContent = '.';
        dots.appendChild(dot);
      }
      wrap.appendChild(dots);
      return wrap;
    }

    function inlineHtml(label) {
      const texto = escapeHtml(String(label || 'Carregando'));
      return `<span class="loading-inline"><span class="loading-label">${texto}</span><span class="loading-dots" aria-hidden="true"><span>.</span><span>.</span><span>.</span></span></span>`;
    }

    function setButtonLoading(button, ativo, labelIdle, labelLoading = 'Carregando') {
      const btn = button || null;
      if (!btn) return;
      if (ativo) {
        btn.innerHTML = '';
        btn.appendChild(criarInlineNode(labelLoading));
      } else {
        btn.textContent = String(labelIdle || '');
      }
    }

    function setContainerLoading(el, label = 'Carregando') {
      if (!el) return;
      el.innerHTML = inlineHtml(label);
    }

    return {
      criarInlineNode,
      inlineHtml,
      setButtonLoading,
      setContainerLoading
    };
  }

  window.AppLoading = window.AppLoading || createLoadingHelper();

  function createRuntimeState() {
    let offlineReadOnly = false;
    let offlineReason = '';
    let accessReadOnly = false;
    let accessReason = '';

    function estadoAtual() {
      const readOnly = !!(offlineReadOnly || accessReadOnly);
      const reason = String(accessReason || offlineReason || '').trim();
      return {
        readOnly,
        reason,
        offlineReadOnly,
        accessReadOnly,
        offlineReason,
        accessReason
      };
    }

    function emitirMudanca() {
      if (typeof window === 'undefined') return;
      const atual = estadoAtual();
      try {
        window.dispatchEvent(new CustomEvent('app:runtime:readonly-changed', {
          detail: {
            readOnly: atual.readOnly,
            reason: atual.reason,
            offlineReadOnly: atual.offlineReadOnly,
            accessReadOnly: atual.accessReadOnly,
            offlineReason: atual.offlineReason,
            accessReason: atual.accessReason
          }
        }));
      } catch (error) {
        // sem acao
      }
    }

    function setReadOnly(ativo, motivo = '') {
      const novoAtivo = !!ativo;
      const novoMotivo = String(motivo || '').trim();
      if (offlineReadOnly === novoAtivo && offlineReason === novoMotivo) return;
      offlineReadOnly = novoAtivo;
      offlineReason = novoMotivo;
      emitirMudanca();
    }

    function setAccessReadOnly(ativo, motivo = '') {
      const novoAtivo = !!ativo;
      const novoMotivo = String(motivo || '').trim();
      if (accessReadOnly === novoAtivo && accessReason === novoMotivo) return;
      accessReadOnly = novoAtivo;
      accessReason = novoMotivo;
      emitirMudanca();
    }

    function isReadOnly() {
      return estadoAtual().readOnly;
    }

    function getReason() {
      return estadoAtual().reason;
    }

    function ensureWritable(contexto = 'Operacao bloqueada') {
      if (!isReadOnly()) return true;
      if (typeof mostrarToast === 'function') {
        const msg = getReason() || `${String(contexto || '').trim() || 'Operacao'} indisponivel em modo somente leitura`;
        mostrarToast(msg, 'erro');
      }
      return false;
    }

    return {
      setReadOnly,
      setAccessReadOnly,
      isReadOnly,
      getReason,
      ensureWritable,
      getState: estadoAtual
    };
  }

  window.AppRuntime = window.AppRuntime || createRuntimeState();

  function createRequestHelper() {
    function normalizeError(raw, fallback = '') {
      if (raw instanceof Error) return raw;
      const mensagem = String(raw?.message || raw || '').trim()
        || String(fallback || '').trim()
        || 'Falha na comunicacao com o servidor';
      const erro = new Error(mensagem);
      if (raw && typeof raw === 'object') {
        erro.raw = raw;
      }
      return erro;
    }

    function disponivel() {
      return !!window.google?.script?.run;
    }

    function call(method, args = [], options = {}) {
      const metodo = String(method || '').trim();
      if (!metodo) {
        return Promise.reject(new Error('Metodo RPC invalido'));
      }
      if (!disponivel()) {
        return Promise.reject(new Error('google.script.run indisponivel'));
      }

      const argumentos = Array.isArray(args) ? args : [args];
      const contexto = String(options.context || metodo).trim() || metodo;
      const perf = window.AppPerf?.start?.(`rpc.${contexto}`, {
        method: metodo
      });
      window.AppDiag?.mark?.('rpc.call', {
        context: contexto,
        method: metodo
      });

      return new Promise((resolve, reject) => {
        let runner = window.google.script.run
          .withSuccessHandler(payload => {
            window.AppPerf?.end?.(perf, { ok: true });
            resolve(payload);
          })
          .withFailureHandler(err => {
            window.AppPerf?.end?.(perf, { ok: false });
            const erro = normalizeError(err, options.errorMessage);
            window.AppDiag?.mark?.('rpc.fail', {
              context: contexto,
              method: metodo,
              message: String(erro?.message || '').trim()
            });
            reject(erro);
          });

        try {
          runner[metodo](...argumentos);
        } catch (error) {
          window.AppPerf?.end?.(perf, { ok: false, exception: true });
          reject(normalizeError(error, options.errorMessage));
        }
      });
    }

    function runner(options = {}) {
      let successHandler = null;
      let failureHandler = null;

      const base = {
        withSuccessHandler(fn) {
          successHandler = typeof fn === 'function' ? fn : null;
          return proxy;
        },
        withFailureHandler(fn) {
          failureHandler = typeof fn === 'function' ? fn : null;
          return proxy;
        }
      };

      const proxy = new Proxy(base, {
        get(target, prop) {
          if (prop in target) return target[prop];
          if (typeof prop !== 'string') return undefined;
          if (!prop || prop === 'then' || prop === 'catch' || prop === 'finally') return undefined;

          return (...args) => {
            call(prop, args, options)
              .then(payload => {
                if (typeof successHandler === 'function') {
                  successHandler(payload);
                }
              })
              .catch(err => {
                if (typeof failureHandler === 'function') {
                  failureHandler(err);
                  return;
                }
                if (typeof console !== 'undefined' && console.error) {
                  console.error(`[rpc] ${prop}`, err);
                }
              });
          };
        }
      });

      return proxy;
    }

    return {
      call,
      runner,
      normalizeError,
      isAvailable: disponivel
    };
  }

  window.AppRequest = window.AppRequest || createRequestHelper();

  function createTabCacheHelper() {
    const STORAGE_PREFIX = 'app:tabcache:v1:';
    const TABS_PERMITIDAS = {
      despesas: true,
      estoque: true,
      compras: true,
      vendas: true,
      produtos: true,
      producao: true
    };
    const TTL_MS = 1000 * 60 * 60 * 24 * 7; // 7 dias

    function normalizarTab(tab) {
      const chave = String(tab || '').trim().toLowerCase();
      return TABS_PERMITIDAS[chave] ? chave : '';
    }

    function storageDisponivel() {
      try {
        if (!window.localStorage) return false;
        const key = `${STORAGE_PREFIX}__ping__`;
        window.localStorage.setItem(key, '1');
        window.localStorage.removeItem(key);
        return true;
      } catch (error) {
        return false;
      }
    }

    function lerBruto(tab) {
      const chave = normalizarTab(tab);
      if (!chave || !storageDisponivel()) return null;
      try {
        const raw = window.localStorage.getItem(`${STORAGE_PREFIX}${chave}`);
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        if (!parsed || typeof parsed !== 'object') return null;
        const updatedAt = Number(parsed.updatedAt || 0);
        const data = parsed.data;
        if (!updatedAt || (Date.now() - updatedAt) > TTL_MS) return null;
        return { updatedAt, data };
      } catch (error) {
        return null;
      }
    }

    function ler(tab) {
      const entry = lerBruto(tab);
      return entry ? entry.data : null;
    }

    function salvar(tab, data) {
      const chave = normalizarTab(tab);
      if (!chave || !storageDisponivel()) return false;
      try {
        const payload = {
          updatedAt: Date.now(),
          data: data ?? null
        };
        window.localStorage.setItem(`${STORAGE_PREFIX}${chave}`, JSON.stringify(payload));
        return true;
      } catch (error) {
        return false;
      }
    }

    function remover(tab) {
      const chave = normalizarTab(tab);
      if (!chave || !storageDisponivel()) return false;
      try {
        window.localStorage.removeItem(`${STORAGE_PREFIX}${chave}`);
        return true;
      } catch (error) {
        return false;
      }
    }

    return {
      ler,
      salvar,
      remover
    };
  }

  window.AppTabCache = window.AppTabCache || createTabCacheHelper();

  function createValidacoesHelper() {
    const STORAGE_KEY = 'app:validacoes:v1';
    const DEFAULT_TTL_MS = 1000 * 60 * 60 * 12; // 12h
    let memoriaData = null;
    let memoriaTs = 0;
    let inFlightPromise = null;
    let storageDisponivelMemo = null;
    let backendSincronizadoNaSessao = false;

    function storageDisponivel() {
      if (storageDisponivelMemo !== null) return storageDisponivelMemo;
      try {
        if (!window.localStorage) {
          storageDisponivelMemo = false;
          return false;
        }
        const key = `${STORAGE_KEY}:__probe__`;
        window.localStorage.setItem(key, '1');
        window.localStorage.removeItem(key);
        storageDisponivelMemo = true;
        return true;
      } catch (error) {
        storageDisponivelMemo = false;
        return false;
      }
    }

    function listaNormalizada(lista) {
      return [...new Set((Array.isArray(lista) ? lista : [])
        .map(v => String(v || '').trim())
        .filter(v => v !== ''))];
    }

    function normalizarMapaCategorias(rawMap) {
      const mapa = {};
      if (!rawMap || typeof rawMap !== 'object') return mapa;
      Object.keys(rawMap).forEach(k => {
        const chave = String(k || '').trim().toUpperCase();
        if (!chave) return;
        mapa[chave] = listaNormalizada(rawMap[k]);
      });
      return mapa;
    }

    function normalizarMapaCores(rawMap) {
      const mapa = {};
      if (!rawMap || typeof rawMap !== 'object') return mapa;

      function normalizarCor(rawColor) {
        const raw = String(rawColor || '').trim();
        if (!raw) return '';
        const hexMatch = raw.match(/^#?([0-9A-Fa-f]{3}|[0-9A-Fa-f]{6}|[0-9A-Fa-f]{8})$/);
        if (hexMatch) return `#${hexMatch[1]}`;
        return raw;
      }

      Object.keys(rawMap).forEach(k => {
        const chave = String(k || '').trim().toUpperCase();
        const cor = normalizarCor(rawMap[k]);
        if (!chave || !cor) return;
        mapa[chave] = cor;
      });
      return mapa;
    }

    function normalizar(raw) {
      const data = raw && typeof raw === 'object' ? raw : {};
      return {
        tipos: listaNormalizada(data.tipos),
        coresPorTipo: normalizarMapaCores(data.coresPorTipo),
        unidades: listaNormalizada(data.unidades),
        categorias: listaNormalizada(data.categorias),
        categoriasPorTipo: normalizarMapaCategorias(data.categoriasPorTipo),
        fornecedores: listaNormalizada(data.fornecedores),
        pagosPor: listaNormalizada(data.pagosPor),
        formasPagamento: listaNormalizada(data.formasPagamento),
        categoriasDespesas: listaNormalizada(data.categoriasDespesas)
      };
    }

    function atualizarCacheGlobal(data) {
      window.AppValidacoesCache = {
        ...(window.AppValidacoesCache || {}),
        tipos: data.tipos || [],
        coresPorTipo: data.coresPorTipo || {},
        unidades: data.unidades || [],
        categorias: data.categorias || [],
        categoriasPorTipo: data.categoriasPorTipo || {},
        fornecedores: data.fornecedores || [],
        pagosPor: data.pagosPor || [],
        formasPagamento: data.formasPagamento || [],
        categoriasDespesas: data.categoriasDespesas || []
      };
    }

    function salvarStorage(data, ts) {
      if (!storageDisponivel()) return;
      try {
        window.localStorage.setItem(STORAGE_KEY, JSON.stringify({
          ts: Number(ts || Date.now()),
          data
        }));
      } catch (error) {
        // sem acao
      }
    }

    function lerStorage(maxAgeMs) {
      if (!storageDisponivel()) return null;
      try {
        const raw = window.localStorage.getItem(STORAGE_KEY);
        if (!raw) return null;
        const payload = JSON.parse(raw);
        if (!payload || typeof payload !== 'object') return null;
        const ts = Number(payload.ts || 0);
        if (!ts) return null;
        if ((Date.now() - ts) > Number(maxAgeMs || DEFAULT_TTL_MS)) return null;
        const data = normalizar(payload.data);
        memoriaData = data;
        memoriaTs = ts;
        atualizarCacheGlobal(data);
        return data;
      } catch (error) {
        return null;
      }
    }

    function lerMemoria(maxAgeMs) {
      if (!memoriaData || !memoriaTs) return null;
      if ((Date.now() - memoriaTs) > Number(maxAgeMs || DEFAULT_TTL_MS)) return null;
      return memoriaData;
    }

    function prime(rawData, ts = Date.now()) {
      const data = normalizar(rawData);
      const stamp = Number(ts || Date.now());
      memoriaData = data;
      memoriaTs = stamp;
      atualizarCacheGlobal(data);
      salvarStorage(data, stamp);
      return data;
    }

    function peek(maxAgeMs = DEFAULT_TTL_MS) {
      return lerMemoria(maxAgeMs) || lerStorage(maxAgeMs);
    }

    function invalidate() {
      memoriaData = null;
      memoriaTs = 0;
      backendSincronizadoNaSessao = false;
      if (!storageDisponivel()) return;
      try {
        window.localStorage.removeItem(STORAGE_KEY);
      } catch (error) {
        // sem acao
      }
    }

    function get(options = {}) {
      const force = !!options.force;
      const maxAgeMs = Number(options.maxAgeMs) > 0 ? Number(options.maxAgeMs) : DEFAULT_TTL_MS;
      const staleOnError = options.staleOnError !== false;
      const cache = !force ? peek(maxAgeMs) : null;
      const stale = cache || peek(Number.MAX_SAFE_INTEGER);
      const backendDisponivel = !!window.google?.script?.run;
      const deveSincronizarBackend = backendDisponivel && (!!force || !backendSincronizadoNaSessao);

      if (!deveSincronizarBackend && cache) {
        return Promise.resolve({ data: cache, source: 'cache' });
      }

      if (inFlightPromise) return inFlightPromise;

      if (!backendDisponivel) {
        if (stale) return Promise.resolve({ data: stale, source: 'stale' });
        return Promise.reject(new Error('google.script.run indisponivel'));
      }

      inFlightPromise = window.AppRequest.call('obterValidacoes', [], {
        context: 'validacoes.load',
        errorMessage: 'Falha ao carregar validacoes'
      }).then(raw => {
        const data = prime(raw);
        backendSincronizadoNaSessao = true;
        return { data, source: 'backend' };
      }).catch(err => {
        if (staleOnError && stale) {
          return { data: stale, source: 'stale' };
        }
        throw err || new Error('Falha ao carregar validacoes');
      }).finally(() => {
        inFlightPromise = null;
      });

      return inFlightPromise;
    }

    return {
      get,
      peek,
      prime,
      invalidate,
      normalizar
    };
  }

  window.AppValidacoes = window.AppValidacoes || createValidacoesHelper();

  function createMutationUiLock() {
    let seq = 0;
    const tokens = new Set();
    const estadosOriginais = new WeakMap();

    const classesSomenteLeitura = [
      'ver-mais',
      'modal-close-square',
      'btn-carregar-mais',
      'compras-separador-acao'
    ];
    const acoesSomenteLeituraOnclick = [
      'fecharmodal',
      'fecharformulario',
      'cancelarpagamento',
      'cancelarrecebimento',
      'fecharobservabilidadecard'
    ];

    function coletarBotoesBloqueio() {
      return [...document.querySelectorAll('button')].filter(isMutationButton);
    }

    function isReadOnlyButton(btn) {
      if (!btn || btn.tagName !== 'BUTTON') return false;
      if (btn.classList && classesSomenteLeitura.some(cls => btn.classList.contains(cls))) {
        return true;
      }
      if (btn.id === 'btnDashboardAtualizar') return true;
      const onclick = String(btn.getAttribute('onclick') || '').toLowerCase();
      return acoesSomenteLeituraOnclick.some(acao => onclick.includes(acao));
    }

    function aplicarEstadoBloqueio(ativo) {
      if (document?.body) {
        document.body.classList.toggle('app-mutation-locked', !!ativo);
      }
      const botoes = coletarBotoesBloqueio();

      if (ativo) {
        botoes.forEach(btn => {
          if (!estadosOriginais.has(btn)) {
            estadosOriginais.set(btn, !!btn.disabled);
          }
          btn.disabled = true;
          btn.dataset.appMutationLocked = '1';
        });
        return;
      }

      const bloqueado = ctx?.can_read === false;
      const painel = document.getElementById('appAccessDenied');
      const emailEl = document.getElementById('appAccessDeniedEmail');
      const msgEl = document.getElementById('appAccessDeniedMsg');

      if (emailEl) {

          : 'Seu usuario nao possui permissao para acessar os dados deste app.';
      }
      if (painel) {
        painel.classList.toggle('hidden', !bloqueado);
      }

      const alvos = document.querySelectorAll('.navbar, #appSyncBanner, .top-bar, #painelFiltroEstoque, #painelFiltroCompras, .aba, .bottom-bar');
      if (bloqueado) {
        alvos.forEach(el => {
          if (!el.classList.contains('hidden')) {
            el.setAttribute(ACCESS_TEMP_HIDDEN_ATTR, '1');
            el.classList.add('hidden');
            return;
          }
          el.removeAttribute(ACCESS_TEMP_HIDDEN_ATTR);
        });
        return;
      }

      alvos.forEach(el => {
        if (el.getAttribute(ACCESS_TEMP_HIDDEN_ATTR) !== '1') return;
        el.classList.remove('hidden');
        el.removeAttribute(ACCESS_TEMP_HIDDEN_ATTR);
      });
    }

    function normalizarContexto(raw) {
      const base = raw && typeof raw === 'object' ? raw : {};
      const canRead = base.can_read !== false;
      const canWrite = canRead && base.can_write === true;
      const motivo = String(base.motivo || '').trim();
      return {
        ...base,
        can_read: canRead,
        can_write: canWrite,
        read_only: !canWrite,
        role: String(base.role || (canWrite ? 'admin' : 'viewer') || '').trim(),
        motivo: canRead
          ? (canWrite ? '' : (motivo || 'Perfil somente leitura.'))
          : (motivo || 'Usuario sem permissao para visualizar os dados.')

    function sincronizarBloqueioMutacao(canWrite) {

      }

    function aplicar(raw) {
      const ctx = normalizarContexto(raw);
      contexto = ctx;

      if (window.AppRuntime?.setAccessReadOnly) {
        window.AppRuntime.setAccessReadOnly(ctx.read_only, ctx.motivo);
      } else if (window.AppRuntime?.setReadOnly) {
        window.AppRuntime.setReadOnly(ctx.read_only, ctx.motivo);
      }

      sincronizarBloqueioMutacao(ctx.can_write);
      aplicarTelaAcesso(ctx);

      if (typeof window !== 'undefined') {
        try {
          window.dispatchEvent(new CustomEvent('app:user:context-changed', {
            detail: ctx
          }));
        } catch (error) {
          // sem acao
        }
      }

      return ctx;
    }

    function getContext() {
      return contexto;
    }

    function load(options = {}) {
      const force = !!options.force;
      if (inFlight && !force) return inFlight;

      // Ate validar o perfil, fica bloqueado por seguranca.
      aplicar({
        can_write: false,
        role: 'viewer',
        motivo: 'Validando perfil de acesso...'
      });

      if (!window.google?.script?.run) {
        const offline = aplicar({
          can_read: false,
          can_write: false,
          role: 'viewer',
          motivo: 'Sem conexao com backend - nao foi possivel validar seu acesso.'
        });
        return Promise.resolve(offline);
      }

      inFlight = new Promise(resolve => {
        window.AppRequest.call('obterContextoUsuario', [force], {
          context: 'user.access.load',
          errorMessage: 'Falha ao validar perfil de acesso.'
        })
          .then(raw => {
            resolve(aplicar(raw || {}));

          .catch(err => {
            const mensagem = String(err?.message || err || '').trim();
            resolve(aplicar({
              can_read: false,
              can_write: false,
              role: 'viewer',
              motivo: mensagem || 'Falha ao validar perfil de acesso.'
            }));
          });
      }).finally(() => {
        inFlight = null;
      });

      return inFlight;
    }

    return {
      load,
      apply: aplicar,
      getContext
    };
  }

  function createPerfHelper() {
    const historico = [];
    function lerFlagDebugPerf() {
      try {
        const params = new URLSearchParams(window.location.search || '');
        const q = String(params.get('debugPerf') || params.get('perf') || '').trim().toLowerCase();
        if (q === '1' || q === 'true' || q === 'on' || q === 'yes') return true;
        if (q === '0' || q === 'false' || q === 'off' || q === 'no') return false;
      } catch (error) {
        // sem acao
      }

      try {
        if (!window.localStorage) return false;
        const raw = window.localStorage.getItem('APP_DEBUG_PERF');
        if (raw === null) return false;
        const v = String(raw || '').trim().toLowerCase();
        return v === '1' || v === 'true' || v === 'on' || v === 'yes';
      } catch (error) {
        return false;
      }
    }

    let ativo = lerFlagDebugPerf();
    const LIMITE_HIST = 300;
    const MIN_LOG_MS = 16;

    function agora() {
      if (typeof performance !== 'undefined' && performance.now) {
        return performance.now();
      }
      return Date.now();
    }

    function start(label, meta) {
      if (!ativo) return null;
      return {
        label: String(label || '').trim() || 'sem-label',
        t0: agora(),
        meta: meta || {}
      };
    }

    function end(token, extra) {
      if (!ativo || !token || !token.label) return 0;
      const ms = agora() - Number(token.t0 || 0);
      const entrada = {
        ts: new Date().toISOString(),
        label: token.label,
        ms: Number(ms.toFixed(2)),
        meta: { ...(token.meta || {}), ...(extra || {}) }
      };
      historico.push(entrada);
      if (historico.length > LIMITE_HIST) historico.shift();

      if (ativo && ms >= MIN_LOG_MS && typeof console !== 'undefined' && console.log) {
        console.log(`[perf] ${entrada.label}: ${entrada.ms}ms`, entrada.meta);
      }
      return ms;
    }

    function measure(label, fn, meta) {
      if (!ativo) {
        return fn();
      }
      const token = start(label, meta);
      try {
        const out = fn();
        end(token);
        return out;
      } catch (error) {
        end(token, { erro: true, mensagem: error?.message || '' });
        throw error;
      }
    }

    function setEnabled(v) {
      ativo = !!v;
    }

    function isEnabled() {
      return !!ativo;
    }

    function getHistory() {
      return historico.slice();
    }

    function clear() {
      historico.length = 0;
    }

    return {
      start,
      end,
      measure,
      setEnabled,
      isEnabled,
      getHistory,
      clear
    };
  }

  function createSyncStatusHelper() {

        ? lista.filter(item => String(item?.aba || '').trim() === abaAtiva)

      const alvo = daAbaAtiva.length > 0 ? daAbaAtiva[0] : lista[0];

        finalizado = true;

      estoque: {
        sync: window.EstoqueController?.syncFromBackend,
        init: window.EstoqueController?.init,
        labelSync: 'tab.estoque.sync',
        labelInit: 'tab.estoque.init'

      despesas: {
        sync: window.DespesasController?.syncFromBackend,

        labelSync: 'tab.producao.sync',
        labelInit: 'tab.producao.init'
      }
    };

    const alvo = map[aba];
    if (!alvo) {
      concluir();
      return;
    }

    if (typeof alvo.sync === 'function') {
      if (alvo.sync.length >= 1) {
        window.AppPerf?.measure(alvo.labelSync, () => alvo.sync(concluir));
      } else {

  function requestSyncAba(nome, options = {}) {
    const aba = normalizarNomeAba(nome);
    if (!aba) return false;

    marcarAbaComoSuja(aba);

    const state = obterEstadoSyncAba(aba);
    if (!state) return false;
    const onDone = typeof options.onDone === 'function' ? options.onDone : null;
    if (onDone) {
      state.pendingCallbacks.push(onDone);
    }

    const delayBase = Number(options.delayMs);
    const delayMs = Number.isFinite(delayBase) && delayBase >= 0
      ? delayBase
      : TAB_SYNC_COALESCE_MS;
    const immediate = !!options.immediate;
    const prefetch = !!options.prefetch;
    const abaAtiva = obterNomeAbaAtiva();

    if (state.running) {
      state.queued = true;
      state.queuedPrefetch = state.queuedPrefetch || prefetch;
      return true;
    }

    if (state.timer) {
      clearTimeout(state.timer);
      state.timer = null;
    }

    const deveExecutarAgora = abaAtiva === aba || prefetch;
    if (!deveExecutarAgora) {
      if (onDone) {
        state.pendingCallbacks = state.pendingCallbacks.filter(fn => fn !== onDone);
        try {
          onDone();
        } catch (error) {
          // sem acao
        }
      }
      return true;
    }

    const iniciarExecucao = () => {
      if (state.running) {
        state.queued = true;
        state.queuedPrefetch = state.queuedPrefetch || prefetch;
        return;
      }

      state.running = true;
      state.queued = false;
      state.queuedPrefetch = false;
      const tokenSync = window.AppSyncStatus?.iniciar
        ? window.AppSyncStatus.iniciar(aba, '')
        : null;

      executarSincronizacaoForcadaAba(aba, () => {
        state.running = false;
        limparAbaSuja(aba);
        if (tokenSync) {
          window.AppSyncStatus.finalizar(tokenSync);
        }
        const callbacks = state.pendingCallbacks.splice(0);
        callbacks.forEach(fn => {
          try {
            fn();
          } catch (error) {
            // sem acao
          }
        });

        if (!state.queued) return;
        const queuedPrefetch = !!state.queuedPrefetch;
        state.queued = false;
        state.queuedPrefetch = false;
        requestSyncAba(aba, {
          immediate: true,
          prefetch: queuedPrefetch
        });
      });
    };

    if (immediate || delayMs <= 0) {
      iniciarExecucao();
      return true;
    }

    state.timer = setTimeout(() => {
      state.timer = null;
      iniciarExecucao();
    }, delayMs);
    return true;
  }

    if (nome === 'estoque') {
      const loaded = !!window.EstoqueStore?.isLoaded?.();
      const recarregar = deveRecarregarAba(nome, !loaded);
      if (window.EstoqueController) {
        if (recarregar && loaded && typeof window.EstoqueController.syncFromBackend === 'function') {
          window.AppTabRefresh?.requestSync?.('estoque', { immediate: true, prefetch: true });
        } else if (!loaded || recarregar) {
          window.AppPerf?.measure('tab.estoque.init', () => EstoqueController.init());
        }
      }
      if (typeof aplicarBuscaEstoque === 'function') aplicarBuscaEstoque();
      return;
    }

    if (nome === 'dashboard') {
      const refMes = document.getElementById('dashMesReferencia');
      const mesAtual = getMesAtualReferencia();
      const referenciaVazia = !!refMes && !String(refMes.value || '').trim();
      if (refMes && referenciaVazia) refMes.value = mesAtual;
      const recarregar = deveRecarregarAba(nome, referenciaVazia);
      if (window.DashboardController) {
        if (recarregar || referenciaVazia) {
          window.AppPerf?.measure('tab.dashboard.refresh', () => DashboardController.init());
        }
      }
      return;
    }

    if (nome === 'despesas') {
      const loaded = !!window.DespesasController?.isLoaded?.();
      const recarregar = deveRecarregarAba(nome, !loaded);
      if (window.DespesasController) {
        if (!loaded || recarregar) {
          if (recarregar && loaded && typeof window.DespesasController.syncFromBackend === 'function') {
            window.AppTabRefresh?.requestSync?.('despesas', { immediate: true, prefetch: true });

            window.AppPerf?.measure('tab.despesas.init', () => DespesasController.init());

        }

  function trocarAba(nome) {
    window.AppPerf?.measure('nav.trocarAba', () => {
      const alvo = normalizarNomeAba(nome) || ABA_INICIAL_PADRAO;
      if (!alvo) return;
      const atual = obterNomeAbaAtiva();
      window.AppDiag?.mark?.('nav.tab.request', {
        from_tab: atual,
        to_tab: alvo
      });
      const abaAlvo = document.getElementById('aba-' + alvo);
      if (!abaAlvo) {
        window.AppDiag?.mark?.('nav.tab.invalid_target', {
          from_tab: atual,
          to_tab: alvo
        });
        return;
      }
      if (atual && atual === alvo) {
        fecharMenuNavbar();
        atualizarEstadoNavbar(alvo);
        setTopBars(alvo);
        executarCicloAba(alvo);
        window.AppSyncStatus?.refresh?.();
        salvarUltimaAba(alvo);
        window.AppDiag?.mark?.('nav.tab.same', {
          tab: alvo
        });
        return;
      }

      document.querySelectorAll('.aba')
        .forEach(a => a.classList.add('hidden'));

      abaAlvo.classList.remove('hidden');
      fecharMenuNavbar();
      atualizarEstadoNavbar(alvo);
      setTopBars(alvo);
      executarCicloAba(alvo);
      window.AppSyncStatus?.refresh?.();
      salvarUltimaAba(alvo);
      window.AppDiag?.mark?.('nav.tab.changed', {
        from_tab: atual,
        to_tab: alvo
      });
    }, { aba: String(nome || '') });
  }

  function createSyncFeedbackHelper() {
    const MIN_FINAL_DELAY_MS = 450;

    function iniciar(msgInicial = 'Salvo com sucesso. Atualizando dados...', msgFinalPadrao = 'Dados atualizados', opcoes = {}) {
      const inicio = Date.now();
      const abaSync = normalizarNomeAba(opcoes?.aba || obterNomeAbaAtiva());
      const tokenSync = window.AppSyncStatus?.iniciar
        ? window.AppSyncStatus.iniciar(abaSync, String(opcoes?.textoSync || '').trim())
        : null;
      if (msgInicial) {
        mostrarToast(msgInicial);
      }
      let concluido = false;
      return function concluir(msgFinal = msgFinalPadrao) {
        if (concluido) return;
        concluido = true;
        if (tokenSync) {
          window.AppSyncStatus.finalizar(tokenSync);
        }
        const atrasar = Math.max(0, MIN_FINAL_DELAY_MS - (Date.now() - inicio));
        setTimeout(() => {
          mostrarToast(msgFinal);
        }, atrasar);
      };
    }

    return {
      iniciar
    };
  }

  function createSearchHelper() {
    function normalizeText(valor) {
      const bruto = String(valor ?? '');
      const semAcento = (typeof bruto.normalize === 'function')
        ? bruto.normalize('NFD').replace(/[\u0300-\u036f]/g, '')
        : bruto;
      return semAcento.toLowerCase().trim();
    }

    function includesText(base, termo) {
      const needle = normalizeText(termo);
      if (!needle) return true;
      return normalizeText(base).includes(needle);
    }

    return {
      normalizeText,
      includesText
    };
  }

  function abrirPainelFiltro() {
    const p = document.getElementById('painelFiltroEstoque');
    if (!p) return;

    p.classList.remove('hidden');

    // evita adicionar o listener várias vezes
    if (!listenerFecharForaAtivo) {
      listenerFecharForaAtivo = true;
      document.addEventListener('pointerdown', fecharFiltroAoClicarFora, { capture: true });
    }

  function fecharPainelFiltro() {
    const p = document.getElementById('painelFiltroEstoque');
    if (!p) return;

    p.classList.add('hidden');

    if (listenerFecharForaAtivo) {
      listenerFecharForaAtivo = false;
      document.removeEventListener('pointerdown', fecharFiltroAoClicarFora, { capture: true });
    }
  }

    const p = document.getElementById('painelFiltroEstoque');
    if (!p || p.classList.contains('hidden')) return;

    const btn = document.getElementById('btnFiltro');
    if (p.contains(e.target)) return;
    if (btn && btn.contains(e.target)) return;

    fecharPainelFiltro();
  }

  function tryEnterComprasUiGuard(action = '') {
    const agora = Date.now();
    const restante = Math.max(0, comprasUiGuardAte - agora);
    if (restante > 0) {
      window.AppDiag?.mark?.('compras.ui.guard.blocked', {
        action: String(action || ''),
        wait_ms: restante
      });
      return false;
    }
    comprasUiGuardAte = agora + COMPRAS_UI_GUARD_MS;
    window.AppDiag?.mark?.('compras.ui.guard.enter', {
      action: String(action || ''),
      hold_ms: COMPRAS_UI_GUARD_MS
    });
    return true;
  }

  const appComprasUiGuardApi = window.AppComprasUiGuard || {};
  appComprasUiGuardApi.tryEnter = action => tryEnterComprasUiGuard(action);
  appComprasUiGuardApi.isLocked = () => Date.now() < comprasUiGuardAte;
  appComprasUiGuardApi.getRemainingMs = () => Math.max(0, comprasUiGuardAte - Date.now());
  window.AppComprasUiGuard = appComprasUiGuardApi;

  function createBootGateHelper() {
    const DEFAULT_TIMEOUT_MS = 2400;
    const DEFAULT_POLL_MS = 60;

    function dashboardPronto() {
      const cards = document.querySelectorAll('#dashboardCards .dash-card');
      if (cards.length > 0) return true;
      const refs = [
        document.getElementById('dashGastoPorTipo'),
        document.getElementById('dashGastoPorCategoria'),
        document.getElementById('dashGastoPorFornecedor'),
        document.getElementById('dashEstoquePorTipo'),
        document.getElementById('dashEvolucaoMensal')
      ];
      return refs.some(el => String(el?.textContent || '').trim() !== '');
    }

    function abaPronta(tab) {
      const aba = normalizarNomeAba(tab);
      if (!aba) return true;

      if (aba === 'dashboard') return dashboardPronto();
      if (aba === 'despesas') return !!window.DespesasController?.isLoaded?.();
      if (aba === 'estoque') return !!window.EstoqueStore?.isLoaded?.();
      if (aba === 'compras') return !!window.ComprasStore?.isLoaded?.();
      if (aba === 'vendas') return !!window.VendasStore?.isLoaded?.();
      if (aba === 'produtos') return !!window.ProdutosStore?.isLoaded?.();
      if (aba === 'producao') return !!window.ProducaoStore?.isLoaded?.();

      return true;
    }

    function waitForTabReady(tab, options = {}) {
      const aba = normalizarNomeAba(tab);
      if (!aba) return Promise.resolve(true);
      if (abaPronta(aba)) return Promise.resolve(true);

      const timeoutMs = Number(options.timeoutMs) > 0
        ? Number(options.timeoutMs)
        : DEFAULT_TIMEOUT_MS;
      const pollMs = Number(options.pollMs) > 0
        ? Number(options.pollMs)
        : DEFAULT_POLL_MS;
      const startedAt = Date.now();

      return new Promise(resolve => {
        let resolved = false;
        let timer = null;

        const finalizar = ok => {
          if (resolved) return;
          resolved = true;
          if (timer) {
            clearTimeout(timer);
            timer = null;
          }
          window.removeEventListener('app:store:loaded', onStoreLoaded);
          resolve(!!ok);
        };

        const onStoreLoaded = evento => {
          const tabEvento = String(evento?.detail?.tab || '').trim().toLowerCase();
          if (tabEvento !== aba) return;
          if (abaPronta(aba)) {
            finalizar(true);
          }
        };

        const tick = () => {
          if (abaPronta(aba)) {
            finalizar(true);
            return;
          }
          if ((Date.now() - startedAt) >= timeoutMs) {
            finalizar(false);
            return;
          }
          timer = setTimeout(tick, pollMs);
        };

        window.addEventListener('app:store:loaded', onStoreLoaded);
        tick();
      });
    }

    return {
      waitForTabReady
    };
  }

  window.AppBootGate = window.AppBootGate || createBootGateHelper();

  }

  function uniqueSorted(arr) {
    return [...new Set(arr.filter(v => String(v || '').trim() !== ''))]
      .map(v => String(v).trim())
      .sort((a, b) => a.localeCompare(b));
  }

  function preencherSelect(selectEl, valores, placeholder) {
    if (!selectEl) return;

    selectEl.innerHTML = '';
    const opt0 = document.createElement('option');
    opt0.value = '';
    opt0.textContent = placeholder;
    selectEl.appendChild(opt0);

    valores.forEach(v => {
      const o = document.createElement('option');
      o.value = v;
      o.textContent = v;
      selectEl.appendChild(o);
    });
  }

  function getTiposValidacaoCache() {
    const cache = window.AppValidacoesCache || {};
    const tipos = Array.isArray(cache.tipos) ? cache.tipos : [];
    return uniqueSorted(tipos);
  }

  function popularFiltrosDoPainel() {
    if (!window.EstoqueStore) return;
    if (!EstoqueStore.isLoaded()) return;

    const itens = EstoqueStore.get();

    const tiposValidacao = getTiposValidacaoCache();
    const tipos = tiposValidacao.length > 0
      ? tiposValidacao
      : uniqueSorted(itens.map(i => i.tipo));
    const categorias = uniqueSorted(itens.map(i => i.categoria));
    const unidades = uniqueSorted(itens.map(i => i.unidade));

    const selTipo = document.getElementById('filtroTipo');
    const selCategoria = document.getElementById('filtroCategoria');
    const selUnidade = document.getElementById('filtroUnidade');

    // preserva seleção atual (se já tiver)
    const tipoAtual = selTipo ? selTipo.value : '';
    const catAtual = selCategoria ? selCategoria.value : '';
    const unidadeAtual = selUnidade ? selUnidade.value : '';

    preencherSelect(selTipo, tipos, 'Tipo (todos)');
    preencherSelect(selUnidade, unidades, 'Unidade (todas)');
    preencherSelect(selCategoria, categorias, 'Categoria (todas)');

    // restaura se ainda existir
    if (selTipo && tipos.includes(tipoAtual)) selTipo.value = tipoAtual;
    if (selCategoria && categorias.includes(catAtual)) selCategoria.value = catAtual;
    if (selUnidade && unidades.includes(unidadeAtual)) selUnidade.value = unidadeAtual;

    if (window.EstoqueUI?.marcarTipoRapidoAtivo) {
      EstoqueUI.marcarTipoRapidoAtivo(selTipo ? selTipo.value : '');
    }
  }

  let longTaskObserver = null;

  function deveMonitorarLongTask() {
    return !!window.AppPerf?.isEnabled?.() || !!window.AppDiag?.isEnabled?.();
  }

  function initLongTaskMonitor() {
    if (typeof window === 'undefined' || typeof window.PerformanceObserver === 'undefined') return;
    if (longTaskObserver || !deveMonitorarLongTask()) return;
    try {
      longTaskObserver = new PerformanceObserver(list => {
        const entries = list.getEntries();
        entries.forEach(entry => {
          const durMs = Number(entry.duration || 0);
          const dur = Number(durMs || 0).toFixed(1);
          if (window.AppPerf?.isEnabled?.()) {
            console.warn(`[longtask] ${dur}ms`);
          }
          window.AppDiag?.mark?.('perf.longtask', {
            duration_ms: Number(dur),
            start_ms: Number(Number(entry.startTime || 0).toFixed(1)),
            name: String(entry.name || '')
          });
        });
      });
      longTaskObserver.observe({ entryTypes: ['longtask'] });
    } catch (error) {
      longTaskObserver = null;
    }
  }

  function syncLongTaskMonitor() {
    if (typeof window === 'undefined' || typeof window.PerformanceObserver === 'undefined') return;
    if (deveMonitorarLongTask()) {
      initLongTaskMonitor();
      return;
    }
    if (!longTaskObserver) return;
    try {
      longTaskObserver.disconnect();
    } catch (error) {
      // sem acao
    }
    longTaskObserver = null;
  }

  const modalFocusState = new WeakMap();
  let estadoModalGlobal = {
    aberto: false,
    total: 0
  };

  function listarModaisAbertos() {
    return [...document.querySelectorAll('.modal')].filter(m => !m.classList.contains('hidden'));
  }

  function listarFocaveis(container) {
    if (!container) return [];
    const seletor = [
      'button:not([disabled]):not([tabindex="-1"])',
      'a[href]:not([tabindex="-1"])',
      'input:not([disabled]):not([type="hidden"]):not([tabindex="-1"])',
      'select:not([disabled]):not([tabindex="-1"])',
      'textarea:not([disabled]):not([tabindex="-1"])',
      '[tabindex]:not([tabindex="-1"])'
    ].join(',');
    return [...container.querySelectorAll(seletor)].filter(el => {
      const style = window.getComputedStyle(el);
      return style.display !== 'none' && style.visibility !== 'hidden';
    });
  }

  function atualizarEstadoBodyModal() {
    if (typeof document === 'undefined' || !document.body) return;
    const total = listarModaisAbertos().length;
    const aberto = total > 0;
    document.body.classList.toggle('modal-open', aberto);
    if (estadoModalGlobal.aberto === aberto && estadoModalGlobal.total === total) return;
    estadoModalGlobal = {
      aberto,
      total
    };
    if (typeof window === 'undefined') return;
    try {
      window.dispatchEvent(new CustomEvent('app:modal-open-changed', {
        detail: {
          modal_open: aberto,
          open_modals: total
        }
      }));
    } catch (error) {
      // sem acao
    }
  }

  function focarAoAbrirModal(modal) {
    if (!modal) return;
    const conteudo = modal.querySelector('.modal-content');
    if (!conteudo) return;

    const state = modalFocusState.get(modal) || {};
    if (!state.opener || !document.contains(state.opener)) {
      state.opener = document.activeElement instanceof HTMLElement ? document.activeElement : null;
    }
    modalFocusState.set(modal, state);

    const focoAlvo = modal.querySelector('.modal-close-square:not([disabled])') || listarFocaveis(conteudo)[0] || conteudo;
    if (!focoAlvo.getAttribute('tabindex') && focoAlvo === conteudo) {
      focoAlvo.setAttribute('tabindex', '-1');
    }
    setTimeout(() => {
      try {
        focoAlvo.focus({ preventScroll: true });
      } catch (error) {
        // sem acao
      }
    }, 0);
  }

  function restaurarFocoAoFechar(modal) {
    const state = modalFocusState.get(modal);
    if (!state?.opener || !document.contains(state.opener)) return;
    setTimeout(() => {
      try {
        state.opener.focus({ preventScroll: true });
      } catch (error) {
        // sem acao
      }
    }, 0);
  }

  function atualizarAriaModal(modal) {
    if (!modal) return;
    const aberto = !modal.classList.contains('hidden');
    modal.setAttribute('aria-hidden', aberto ? 'false' : 'true');
    const abertoAntes = modal.dataset.a11yOpen === '1';
    if (aberto && !abertoAntes) {
      modal.dataset.a11yOpen = '1';
      focarAoAbrirModal(modal);
    } else if (!aberto && abertoAntes) {
      modal.dataset.a11yOpen = '0';
      restaurarFocoAoFechar(modal);
    }
    atualizarEstadoBodyModal();
  }

  function fecharModalPorInteracao(modal) {
    if (!modal) return false;
    const btnFechar = modal.querySelector('.modal-close-square');
    if (btnFechar && !btnFechar.disabled) {
      btnFechar.click();
      return true;
    }
    modal.classList.add('hidden');
    atualizarAriaModal(modal);
    return true;
  }

  function initModalA11y() {
    const modais = [...document.querySelectorAll('.modal')];
    if (modais.length === 0) return;

    modais.forEach((modal, idx) => {
      if (!modal.id) {
        modal.id = `modal_auto_${idx + 1}`;
      }
      modal.setAttribute('role', 'dialog');
      modal.setAttribute('aria-modal', 'true');

      const titulo = modal.querySelector('.modal-content h1, .modal-content h2, .modal-content h3');
      if (titulo) {
        if (!titulo.id) {
          titulo.id = `${modal.id}_title`;
        }
        modal.setAttribute('aria-labelledby', titulo.id);
      }

      atualizarAriaModal(modal);

      modal.addEventListener('click', evento => {
        if (evento.target !== modal) return;
        if (window.AppMutationUI?.isLocked?.()) return;
        fecharModalPorInteracao(modal);
      });

      if (typeof MutationObserver !== 'undefined') {
        const observer = new MutationObserver(() => {
          atualizarAriaModal(modal);
        });
        observer.observe(modal, { attributes: true, attributeFilter: ['class'] });
      }
    });

    document.addEventListener('keydown', evento => {
      const abertos = listarModaisAbertos();
      if (abertos.length === 0) return;
      const topo = abertos[abertos.length - 1];

      if (evento.key === 'Escape') {
        if (window.AppMutationUI?.isLocked?.()) return;
        evento.preventDefault();
        fecharModalPorInteracao(topo);
        return;
      }

      if (evento.key !== 'Tab') return;
      const conteudo = topo.querySelector('.modal-content');
      if (!conteudo) return;
      const focaveis = listarFocaveis(conteudo);
      if (focaveis.length === 0) {
        evento.preventDefault();
        conteudo.setAttribute('tabindex', '-1');
        conteudo.focus({ preventScroll: true });
        return;
      }
      const primeiro = focaveis[0];
      const ultimo = focaveis[focaveis.length - 1];
      if (evento.shiftKey && document.activeElement === primeiro) {
        evento.preventDefault();
        ultimo.focus({ preventScroll: true });
      } else if (!evento.shiftKey && document.activeElement === ultimo) {
        evento.preventDefault();
        primeiro.focus({ preventScroll: true });
      }
    });
  }

  function initCampoAjudaA11y() {
    let seq = 0;
    const wrappers = document.querySelectorAll('.campo-ajuda-wrap');
    wrappers.forEach(wrap => {
      const tag = wrap.querySelector('.campo-ajuda-tag');
      const label = String(tag?.textContent || '').trim();
      if (!label) return;

      const campos = [...wrap.querySelectorAll('input, select, textarea')];
      campos.forEach(campo => {
        if (!campo.getAttribute('aria-label')) {
          campo.setAttribute('aria-label', label);
        }
        if (!campo.id) {
          seq += 1;
          campo.id = `campo_auto_${seq}`;
        }
        const existente = wrap.querySelector(`label.sr-only[for="${campo.id}"]`);
        if (existente) return;
        const labelEl = document.createElement('label');
        labelEl.className = 'sr-only';
        labelEl.setAttribute('for', campo.id);
        labelEl.textContent = label;
        const campoDentroLabel = campo.closest('label');
        if (campoDentroLabel && wrap.contains(campoDentroLabel) && campoDentroLabel !== wrap) {
          wrap.insertBefore(labelEl, campoDentroLabel);
          return;
        }
        const parent = campo.parentElement;
        if (parent && wrap.contains(parent)) {
          parent.insertBefore(labelEl, campo);
          return;
        }
        wrap.insertBefore(labelEl, wrap.firstChild);
      });
    });
  }

  document.addEventListener('DOMContentLoaded', async () => {
    try {
      syncLongTaskMonitor();
      resetarEstadoInicialFiltros();

      let contextoAcesso = null;
      if (window.AppUserAccess?.load) {
        try {
          contextoAcesso = await window.AppUserAccess.load();
        } catch (error) {
          contextoAcesso = null;
        }
      }

      if (contextoAcesso && contextoAcesso.can_read === false) return;

      initNavbarHamburger();
      registrarListenersFiltrosStore();
      initModalA11y();
      initCampoAjudaA11y();
      const abaInicial = lerUltimaAba() || ABA_INICIAL_PADRAO;
      trocarAba(abaInicial);
      initBuscaEFiltroEstoque();
      initBuscaEFiltroCompras();
      initBuscaVendas();
      initBuscaDespesas();
      initBuscaProdutos();
      initBuscaProducao();

      if (window.AppBootGate?.waitForTabReady) {
        await window.AppBootGate.waitForTabReady(abaInicial, { timeoutMs: 2600 });
      }
    } finally {
      finalizarBootVisual();
    }
  });
</script>
