<script>
  /* =========================
     NAV / ABAS
  ========================== */
  const ABAS_MENU_HAMBURGER = ['despesas', 'estoque', 'compras', 'vendas', 'produtos', 'producao'];
  const ABAS_APP = ['dashboard', ...ABAS_MENU_HAMBURGER];
  const ABA_INICIAL_PADRAO = 'dashboard';
  const LAST_TAB_STORAGE_KEY = 'app:lasttab:v1';
  const QUICK_FILTER_STOCK_TYPE_KEY = 'app:quickfilter:v1:estoque:tipo';
  const QUICK_FILTER_PURCHASE_TYPE_KEY = 'app:quickfilter:v1:compras:tipo';
  let listenerFecharMenuNavbarAtivo = false;

  function normalizarNomeAba(valor) {
    const aba = String(valor || '').trim().toLowerCase();
    return ABAS_APP.includes(aba) ? aba : '';
  }

  function salvarUltimaAba(valor) {
    const aba = normalizarNomeAba(valor);
    if (!aba) return;
    try {
      if (!window.localStorage) return;
      window.localStorage.setItem(LAST_TAB_STORAGE_KEY, aba);
    } catch (error) {
      // sem acao
    }
  }

  function lerUltimaAba() {
    try {
      if (!window.localStorage) return '';
      return normalizarNomeAba(window.localStorage.getItem(LAST_TAB_STORAGE_KEY));
    } catch (error) {
      return '';
    }
  }

  function getNavbarHamburgerEls() {
    return {
      wrap: document.getElementById('navbarMenuWrap'),
      btn: document.getElementById('btnNavHamburger'),
      menu: document.getElementById('navbarMenu')
    };
  }

  function menuNavbarAberto() {
    const { menu } = getNavbarHamburgerEls();
    return !!menu && !menu.classList.contains('hidden');
  }

  function obterLabelAbaMenu(aba) {
    const alvo = String(aba || '').trim();
    if (!alvo) return '';
    const btnMenu = document.querySelector(`#navbarMenu button[data-aba="${alvo}"]`);
    return String(btnMenu?.textContent || '').trim();
  }

  function atualizarRotuloBotaoHamburger(abaAtiva) {
    const { btn } = getNavbarHamburgerEls();
    if (!btn) return;
    const alvo = String(abaAtiva || '').trim();
    const ativoNoMenu = ABAS_MENU_HAMBURGER.includes(alvo);
    const rotulo = ativoNoMenu ? (obterLabelAbaMenu(alvo) || 'Menu') : 'Menu';
    btn.innerHTML = `<span class="navbar-hamburger-icon" aria-hidden="true">&#9776;</span><span class="navbar-hamburger-label">${rotulo}</span>`;
    btn.setAttribute('aria-label', ativoNoMenu ? `Abrir menu de abas (atual: ${rotulo})` : 'Abrir menu de abas');
  }

  function atualizarEstadoNavbar(abaAtiva) {
    const botoes = document.querySelectorAll('.navbar button[data-aba]');
    const alvo = String(abaAtiva || '').trim();
    botoes.forEach(btn => {
      const ehAtivo = String(btn.dataset.aba || '').trim() === alvo;
      btn.classList.toggle('active', ehAtivo);
      if (ehAtivo) {
        btn.setAttribute('aria-current', 'page');
      } else {
        btn.removeAttribute('aria-current');
      }
    });

    const { btn } = getNavbarHamburgerEls();
    if (btn) {
      const ativoNoMenu = ABAS_MENU_HAMBURGER.includes(alvo);
      btn.classList.toggle('active', ativoNoMenu);
      btn.setAttribute('aria-expanded', menuNavbarAberto() ? 'true' : 'false');
    }
    atualizarRotuloBotaoHamburger(alvo);
  }

  function salvarFiltroRapidoNoCache(chave, valor) {
    try {
      if (!window.localStorage) return;
      window.localStorage.setItem(String(chave || ''), String(valor || '').trim());
    } catch (error) {
      // sem acao
    }
  }

  function lerFiltroRapidoDoCache(chave) {
    try {
      if (!window.localStorage) return null;
      const raw = window.localStorage.getItem(String(chave || ''));
      if (raw === null) return null;
      return String(raw || '').trim();
    } catch (error) {
      return null;
    }
  }

  function aplicarFiltroTipoRapidoPersistidoEstoque() {
    const tipo = lerFiltroRapidoDoCache(QUICK_FILTER_STOCK_TYPE_KEY);
    if (tipo === null) return;
    setFiltroTipoRapidoEstoque(tipo);
  }

  function aplicarFiltroTipoRapidoPersistidoCompras() {
    const tipo = lerFiltroRapidoDoCache(QUICK_FILTER_PURCHASE_TYPE_KEY);
    if (tipo === null) return;
    setFiltroTipoRapidoCompras(tipo);
  }

  function fecharMenuNavbar() {
    const { menu, btn } = getNavbarHamburgerEls();
    if (menu) menu.classList.add('hidden');
    if (btn) btn.setAttribute('aria-expanded', 'false');

    if (listenerFecharMenuNavbarAtivo) {
      listenerFecharMenuNavbarAtivo = false;
      document.removeEventListener('pointerdown', fecharMenuNavbarAoClicarFora, { capture: true });
      document.removeEventListener('keydown', fecharMenuNavbarPorTeclado);
    }
  }

  function abrirMenuNavbar() {
    const { menu, btn } = getNavbarHamburgerEls();
    if (!menu || !btn) return;
    menu.classList.remove('hidden');
    btn.setAttribute('aria-expanded', 'true');

    if (!listenerFecharMenuNavbarAtivo) {
      listenerFecharMenuNavbarAtivo = true;
      document.addEventListener('pointerdown', fecharMenuNavbarAoClicarFora, { capture: true });
      document.addEventListener('keydown', fecharMenuNavbarPorTeclado);
    }
  }

  function toggleMenuNavbar() {
    if (menuNavbarAberto()) {
      fecharMenuNavbar();
    } else {
      abrirMenuNavbar();
    }
  }

  function fecharMenuNavbarAoClicarFora(evento) {
    const { wrap } = getNavbarHamburgerEls();
    if (!wrap) return;
    if (wrap.contains(evento.target)) return;
    fecharMenuNavbar();
  }

  function fecharMenuNavbarPorTeclado(evento) {
    const tecla = String(evento?.key || '').toLowerCase();
    if (tecla === 'escape') {
      fecharMenuNavbar();
    }
  }

  function initNavbarHamburger() {
    const { btn } = getNavbarHamburgerEls();
    if (!btn) return;
    btn.addEventListener('click', () => {
      toggleMenuNavbar();
    });
  }

  /* =========================
     LOADING UI
  ========================== */
  function createLoadingHelper() {
    function escapeHtml(valor) {
      return String(valor ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function criarInlineNode(label) {
      const wrap = document.createElement('span');
      wrap.className = 'loading-inline';

      const text = document.createElement('span');
      text.className = 'loading-label';
      text.textContent = String(label || 'Carregando');
      wrap.appendChild(text);

      const dots = document.createElement('span');
      dots.className = 'loading-dots';
      dots.setAttribute('aria-hidden', 'true');
      for (let i = 0; i < 3; i++) {
        const dot = document.createElement('span');
        dot.textContent = '.';
        dots.appendChild(dot);
      }
      wrap.appendChild(dots);
      return wrap;
    }

    function inlineHtml(label) {
      const texto = escapeHtml(String(label || 'Carregando'));
      return `<span class="loading-inline"><span class="loading-label">${texto}</span><span class="loading-dots" aria-hidden="true"><span>.</span><span>.</span><span>.</span></span></span>`;
    }

    function setButtonLoading(button, ativo, labelIdle, labelLoading = 'Carregando') {
      const btn = button || null;
      if (!btn) return;
      if (ativo) {
        btn.innerHTML = '';
        btn.appendChild(criarInlineNode(labelLoading));
      } else {
        btn.textContent = String(labelIdle || '');
      }
    }

    function setContainerLoading(el, label = 'Carregando') {
      if (!el) return;
      el.innerHTML = inlineHtml(label);
    }

    return {
      criarInlineNode,
      inlineHtml,
      setButtonLoading,
      setContainerLoading
    };
  }

  window.AppLoading = window.AppLoading || createLoadingHelper();

  function createRuntimeState() {
    let readOnly = false;
    let reason = '';

    function emitirMudanca() {
      if (typeof window === 'undefined') return;
      try {
        window.dispatchEvent(new CustomEvent('app:runtime:readonly-changed', {
          detail: {
            readOnly,
            reason
          }
        }));
      } catch (error) {
        // sem acao
      }
    }

    function setReadOnly(ativo, motivo = '') {
      readOnly = !!ativo;
      reason = String(motivo || '').trim();
      emitirMudanca();
    }

    function isReadOnly() {
      return !!readOnly;
    }

    function getReason() {
      return reason;
    }

    function ensureWritable(contexto = 'Operacao bloqueada') {
      if (!readOnly) return true;
      if (typeof mostrarToast === 'function') {
        const msg = reason || `${String(contexto || '').trim() || 'Operacao'} indisponivel em modo somente leitura`;
        mostrarToast(msg, 'erro');
      }
      return false;
    }

    return {
      setReadOnly,
      isReadOnly,
      getReason,
      ensureWritable
    };
  }

  window.AppRuntime = window.AppRuntime || createRuntimeState();

  function createTabCacheHelper() {
    const STORAGE_PREFIX = 'app:tabcache:v1:';
    const TABS_PERMITIDAS = {
      despesas: true,
      estoque: true,
      compras: true,
      vendas: true,
      produtos: true,
      producao: true
    };
    const TTL_MS = 1000 * 60 * 60 * 24 * 7; // 7 dias

    function normalizarTab(tab) {
      const chave = String(tab || '').trim().toLowerCase();
      return TABS_PERMITIDAS[chave] ? chave : '';
    }

    function storageDisponivel() {
      try {
        if (!window.localStorage) return false;
        const key = `${STORAGE_PREFIX}__ping__`;
        window.localStorage.setItem(key, '1');
        window.localStorage.removeItem(key);
        return true;
      } catch (error) {
        return false;
      }
    }

    function lerBruto(tab) {
      const chave = normalizarTab(tab);
      if (!chave || !storageDisponivel()) return null;
      try {
        const raw = window.localStorage.getItem(`${STORAGE_PREFIX}${chave}`);
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        if (!parsed || typeof parsed !== 'object') return null;
        const updatedAt = Number(parsed.updatedAt || 0);
        const data = parsed.data;
        if (!updatedAt || (Date.now() - updatedAt) > TTL_MS) return null;
        return { updatedAt, data };
      } catch (error) {
        return null;
      }
    }

    function ler(tab) {
      const entry = lerBruto(tab);
      return entry ? entry.data : null;
    }

    function salvar(tab, data) {
      const chave = normalizarTab(tab);
      if (!chave || !storageDisponivel()) return false;
      try {
        const payload = {
          updatedAt: Date.now(),
          data: data ?? null
        };
        window.localStorage.setItem(`${STORAGE_PREFIX}${chave}`, JSON.stringify(payload));
        return true;
      } catch (error) {
        return false;
      }
    }

    function remover(tab) {
      const chave = normalizarTab(tab);
      if (!chave || !storageDisponivel()) return false;
      try {
        window.localStorage.removeItem(`${STORAGE_PREFIX}${chave}`);
        return true;
      } catch (error) {
        return false;
      }
    }

    return {
      ler,
      salvar,
      remover
    };
  }

  window.AppTabCache = window.AppTabCache || createTabCacheHelper();

  function createMutationUiLock() {
    let seq = 0;
    const tokens = new Set();
    const estadosOriginais = new WeakMap();
    let observer = null;

    const seletoresBloqueados = [
      '.bottom-bar button',
      '#lista button',
      '#listaCompras button',
      '#listaVendas button',
      '#listaProdutos button',
      '#listaProducao button',
      '#listaDespesasGerais button',
      '#btnSalvarEstoque',
      '#btnSalvarCompra',
      '#btnSalvarVenda',
      '#btnSalvarProduto',
      '#btnSalvarProducao',
      '#btnSalvarDespesaGeral'
    ];

    function coletarBotoesBloqueio() {
      return [...document.querySelectorAll(seletoresBloqueados.join(','))]
        .filter(btn => btn && btn.tagName === 'BUTTON');
    }

    function garantirObserver() {
      if (observer || typeof MutationObserver === 'undefined' || !document?.body) return;
      observer = new MutationObserver(() => {
        if (!isLocked()) return;
        aplicarEstadoBloqueio(true);
      });
      observer.observe(document.body, { childList: true, subtree: true });
    }

    function aplicarEstadoBloqueio(ativo) {
      const botoes = coletarBotoesBloqueio();

      if (ativo) {
        botoes.forEach(btn => {
          if (!estadosOriginais.has(btn)) {
            estadosOriginais.set(btn, !!btn.disabled);
          }
          btn.disabled = true;
          btn.dataset.appMutationLocked = '1';
        });
        return;
      }

      botoes.forEach(btn => {
        if (btn.dataset.appMutationLocked !== '1') return;
        const estadoOriginal = estadosOriginais.has(btn)
          ? estadosOriginais.get(btn)
          : false;
        btn.disabled = !!estadoOriginal;
        delete btn.dataset.appMutationLocked;
        estadosOriginais.delete(btn);
      });
    }

    function isMutationButton(btn) {
      if (!btn || btn.tagName !== 'BUTTON') return false;
      if (btn.closest('.navbar')) return false;
      if (btn.closest('.top-bar')) return false;
      if (btn.closest('#painelFiltroEstoque')) return false;
      if (btn.closest('#painelFiltroCompras')) return false;
      return true;
    }

    function lock() {
      garantirObserver();
      const token = `mutation_${++seq}`;
      tokens.add(token);
      aplicarEstadoBloqueio(true);
      return token;
    }

    function unlock(token) {
      if (token) {
        tokens.delete(token);
      } else {
        tokens.clear();
      }
      if (tokens.size > 0) {
        aplicarEstadoBloqueio(true);
        return;
      }
      aplicarEstadoBloqueio(false);
    }

    function isLocked() {
      return tokens.size > 0;
    }

    document.addEventListener('click', evento => {
      if (!isLocked()) return;
      const btn = evento.target?.closest?.('button');
      if (!btn || !isMutationButton(btn)) return;
      evento.preventDefault();
      evento.stopImmediatePropagation();
    }, true);

    return {
      lock,
      unlock,
      isLocked
    };
  }

  window.AppMutationUI = window.AppMutationUI || createMutationUiLock();

  /* =========================
     PERF + CICLO DE ABAS
  ========================== */
  function createPerfHelper() {
    const historico = [];
    function lerFlagDebugPerf() {
      try {
        const params = new URLSearchParams(window.location.search || '');
        const q = String(params.get('debugPerf') || params.get('perf') || '').trim().toLowerCase();
        if (q === '1' || q === 'true' || q === 'on' || q === 'yes') return true;
        if (q === '0' || q === 'false' || q === 'off' || q === 'no') return false;
      } catch (error) {
        // sem acao
      }

      try {
        if (!window.localStorage) return false;
        const raw = window.localStorage.getItem('APP_DEBUG_PERF');
        if (raw === null) return false;
        const v = String(raw || '').trim().toLowerCase();
        return v === '1' || v === 'true' || v === 'on' || v === 'yes';
      } catch (error) {
        return false;
      }
    }

    let ativo = lerFlagDebugPerf();
    const LIMITE_HIST = 300;
    const MIN_LOG_MS = 16;

    function agora() {
      if (typeof performance !== 'undefined' && performance.now) {
        return performance.now();
      }
      return Date.now();
    }

    function start(label, meta) {
      if (!ativo) return null;
      return {
        label: String(label || '').trim() || 'sem-label',
        t0: agora(),
        meta: meta || {}
      };
    }

    function end(token, extra) {
      if (!ativo || !token || !token.label) return 0;
      const ms = agora() - Number(token.t0 || 0);
      const entrada = {
        ts: new Date().toISOString(),
        label: token.label,
        ms: Number(ms.toFixed(2)),
        meta: { ...(token.meta || {}), ...(extra || {}) }
      };
      historico.push(entrada);
      if (historico.length > LIMITE_HIST) historico.shift();

      if (ativo && ms >= MIN_LOG_MS && typeof console !== 'undefined' && console.log) {
        console.log(`[perf] ${entrada.label}: ${entrada.ms}ms`, entrada.meta);
      }
      return ms;
    }

    function measure(label, fn, meta) {
      if (!ativo) {
        return fn();
      }
      const token = start(label, meta);
      try {
        const out = fn();
        end(token);
        return out;
      } catch (error) {
        end(token, { erro: true, mensagem: error?.message || '' });
        throw error;
      }
    }

    function setEnabled(v) {
      ativo = !!v;
    }

    function isEnabled() {
      return !!ativo;
    }

    function getHistory() {
      return historico.slice();
    }

    function clear() {
      historico.length = 0;
    }

    return {
      start,
      end,
      measure,
      setEnabled,
      isEnabled,
      getHistory,
      clear
    };
  }

  window.AppPerf = window.AppPerf || createPerfHelper();

  window.setAppPerfDebug = function setAppPerfDebug(ativo) {
    const on = !!ativo;
    try {
      if (window.localStorage) {
        if (on) {
          window.localStorage.setItem('APP_DEBUG_PERF', '1');
        } else {
          window.localStorage.removeItem('APP_DEBUG_PERF');
        }
      }
    } catch (error) {
      // sem acao
    }
    if (window.AppPerf?.setEnabled) {
      window.AppPerf.setEnabled(on);
    }
    if (typeof mostrarToast === 'function') {
      mostrarToast(`Perf debug ${on ? 'ativado' : 'desativado'}`);
    }
  };

  const ABA_REFRESH_INTERVAL_MS = {
    dashboard: 15000,
    despesas: 30000,
    estoque: 30000,
    compras: 30000,
    vendas: 30000,
    produtos: 30000,
    producao: 20000
  };
  const abaRefreshState = {};

  function obterNomeAbaAtiva() {
    const ativa = document.querySelector('.aba:not(.hidden)');
    const id = String(ativa?.id || '').trim();
    return id.startsWith('aba-') ? id.slice(4) : '';
  }

  function getMesAtualReferencia() {
    const d = new Date();
    const yyyy = d.getFullYear();
    const mm = String(d.getMonth() + 1).padStart(2, '0');
    return `${yyyy}-${mm}`;
  }

  function deveRecarregarAba(nome, force = false) {
    const aba = String(nome || '').trim();
    if (!aba) return false;
    const agoraMs = Date.now();
    const state = abaRefreshState[aba] || { last: 0, initialized: false };
    const ttl = Number(ABA_REFRESH_INTERVAL_MS[aba] || 30000);

    if (force || !state.initialized) {
      abaRefreshState[aba] = { initialized: true, last: agoraMs };
      return true;
    }

    if (agoraMs - Number(state.last || 0) >= ttl) {
      abaRefreshState[aba] = { initialized: true, last: agoraMs };
      return true;
    }

    return false;
  }

  function executarCicloAba(nome) {
    if (nome === 'estoque') {
      const loaded = !!window.EstoqueStore?.isLoaded?.();
      const recarregar = deveRecarregarAba(nome, !loaded);
      if (window.EstoqueController) {
        if (recarregar && loaded && typeof window.EstoqueController.syncFromBackend === 'function') {
          window.AppPerf?.measure('tab.estoque.sync', () => EstoqueController.syncFromBackend());
        } else if (!loaded || recarregar) {
          window.AppPerf?.measure('tab.estoque.init', () => EstoqueController.init());
        }
      }
      if (typeof aplicarBuscaEstoque === 'function') aplicarBuscaEstoque();
      return;
    }

    if (nome === 'dashboard') {
      const refMes = document.getElementById('dashMesReferencia');
      const mesAtual = getMesAtualReferencia();
      const referenciaVazia = !!refMes && !String(refMes.value || '').trim();
      if (refMes && referenciaVazia) refMes.value = mesAtual;
      const recarregar = deveRecarregarAba(nome, referenciaVazia);
      if (window.DashboardController) {
        if (recarregar || referenciaVazia) {
          window.AppPerf?.measure('tab.dashboard.refresh', () => DashboardController.init());
        }
      }
      return;
    }

    if (nome === 'despesas') {
      const loaded = !!window.DespesasController?.isLoaded?.();
      const recarregar = deveRecarregarAba(nome, !loaded);
      if (window.DespesasController) {
        if (!loaded || recarregar) {
          if (recarregar && loaded && typeof window.DespesasController.syncFromBackend === 'function') {
            window.AppPerf?.measure('tab.despesas.sync', () => DespesasController.syncFromBackend());
          } else {
            window.AppPerf?.measure('tab.despesas.init', () => DespesasController.init());
          }
        }
      }
      if (typeof aplicarBuscaDespesas === 'function') aplicarBuscaDespesas();
      return;
    }

    if (nome === 'compras') {
      const loaded = !!window.ComprasStore?.isLoaded?.();
      const recarregar = deveRecarregarAba(nome, !loaded);
      if (window.ComprasController) {
        if (recarregar && loaded && typeof window.ComprasController.syncFromBackend === 'function') {
          window.AppPerf?.measure('tab.compras.sync', () => ComprasController.syncFromBackend());
        } else if (!loaded || recarregar) {
          window.AppPerf?.measure('tab.compras.init', () => ComprasController.init());
        }
      }
      if (typeof aplicarBuscaCompras === 'function') aplicarBuscaCompras();
      return;
    }

    if (nome === 'vendas') {
      const loaded = !!window.VendasStore?.isLoaded?.();
      const recarregar = deveRecarregarAba(nome, !loaded);
      if (window.VendasController) {
        if (recarregar && loaded && typeof window.VendasController.syncFromBackend === 'function') {
          window.AppPerf?.measure('tab.vendas.sync', () => VendasController.syncFromBackend());
        } else if (!loaded || recarregar) {
          window.AppPerf?.measure('tab.vendas.init', () => VendasController.init());
        }
      }
      if (typeof aplicarBuscaVendas === 'function') aplicarBuscaVendas();
      return;
    }

    if (nome === 'produtos') {
      const loaded = !!window.ProdutosStore?.isLoaded?.();
      const recarregar = deveRecarregarAba(nome, !loaded);
      if (window.ProdutosController) {
        if (recarregar && loaded && typeof window.ProdutosController.syncFromBackend === 'function') {
          window.AppPerf?.measure('tab.produtos.sync', () => ProdutosController.syncFromBackend());
        } else if (!loaded || recarregar) {
          window.AppPerf?.measure('tab.produtos.init', () => ProdutosController.init());
        }
      }
      if (typeof aplicarBuscaProdutos === 'function') aplicarBuscaProdutos();
      return;
    }

    if (nome === 'producao') {
      const loaded = !!window.ProducaoStore?.isLoaded?.();
      const recarregar = deveRecarregarAba(nome, !loaded);
      if (window.ProducaoController) {
        if (recarregar && loaded && typeof window.ProducaoController.syncFromBackend === 'function') {
          window.AppPerf?.measure('tab.producao.sync', () => ProducaoController.syncFromBackend());
        } else if (!loaded || recarregar) {
          window.AppPerf?.measure('tab.producao.init', () => ProducaoController.init());
        }
      }
      if (typeof aplicarBuscaProducao === 'function') aplicarBuscaProducao();
    }
  }

  function trocarAba(nome) {
    window.AppPerf?.measure('nav.trocarAba', () => {
      const alvo = normalizarNomeAba(nome) || ABA_INICIAL_PADRAO;
      if (!alvo) return;
      const abaAlvo = document.getElementById('aba-' + alvo);
      if (!abaAlvo) return;
      const atual = obterNomeAbaAtiva();
      if (atual && atual === alvo) {
        fecharMenuNavbar();
        atualizarEstadoNavbar(alvo);
        setTopBars(alvo);
        executarCicloAba(alvo);
        salvarUltimaAba(alvo);
        return;
      }

      document.querySelectorAll('.aba')
        .forEach(a => a.classList.add('hidden'));

      abaAlvo.classList.remove('hidden');
      fecharMenuNavbar();
      atualizarEstadoNavbar(alvo);
      setTopBars(alvo);
      executarCicloAba(alvo);
      salvarUltimaAba(alvo);
    }, { aba: String(nome || '') });
  }

  /* =========================
     POPULAR SELECTS DO PAINEL
     (usa o cache do EstoqueStore)
  ========================== */
  function uniqueSorted(arr) {
    return [...new Set(arr.filter(v => String(v || '').trim() !== ''))]
      .map(v => String(v).trim())
      .sort((a, b) => a.localeCompare(b));
  }

  function preencherSelect(selectEl, valores, placeholder) {
    if (!selectEl) return;

    selectEl.innerHTML = '';
    const opt0 = document.createElement('option');
    opt0.value = '';
    opt0.textContent = placeholder;
    selectEl.appendChild(opt0);

    valores.forEach(v => {
      const o = document.createElement('option');
      o.value = v;
      o.textContent = v;
      selectEl.appendChild(o);
    });
  }

  function getTiposValidacaoCache() {
    const cache = window.AppValidacoesCache || {};
    const tipos = Array.isArray(cache.tipos) ? cache.tipos : [];
    return uniqueSorted(tipos);
  }

  function popularFiltrosDoPainel() {
    if (!window.EstoqueStore) return;
    if (!EstoqueStore.isLoaded()) return;

    const itens = EstoqueStore.get();

    const tiposValidacao = getTiposValidacaoCache();
    const tipos = tiposValidacao.length > 0
      ? tiposValidacao
      : uniqueSorted(itens.map(i => i.tipo));
    const categorias = uniqueSorted(itens.map(i => i.categoria));
    const unidades = uniqueSorted(itens.map(i => i.unidade));

    const selTipo = document.getElementById('filtroTipo');
    const selCategoria = document.getElementById('filtroCategoria');
    const selUnidade = document.getElementById('filtroUnidade');

    // preserva seleção atual (se já tiver)
    const tipoAtual = selTipo ? selTipo.value : '';
    const catAtual = selCategoria ? selCategoria.value : '';
    const unidadeAtual = selUnidade ? selUnidade.value : '';

    preencherSelect(selTipo, tipos, 'Tipo (todos)');
    preencherSelect(selUnidade, unidades, 'Unidade (todas)');
    preencherSelect(selCategoria, categorias, 'Categoria (todas)');

    // restaura se ainda existir
    if (selTipo && tipos.includes(tipoAtual)) selTipo.value = tipoAtual;
    if (selCategoria && categorias.includes(catAtual)) selCategoria.value = catAtual;
    if (selUnidade && unidades.includes(unidadeAtual)) selUnidade.value = unidadeAtual;

    if (window.EstoqueUI?.marcarTipoRapidoAtivo) {
      EstoqueUI.marcarTipoRapidoAtivo(selTipo ? selTipo.value : '');
    }
  }

  // espera o EstoqueStore carregar (sem travar nada)
  const FILTRO_RETRY_MS = 300;
  const FILTRO_RETRY_MAX_TENTATIVAS = 20;
  let filtroPoll = null;
  let filtroPollTentativas = 0;
  let filtroPollToken = 0;

  function pararPollFiltros() {
    filtroPollToken += 1;
    filtroPollTentativas = 0;
    if (filtroPoll) {
      clearTimeout(filtroPoll);
      filtroPoll = null;
    }
  }
  function iniciarPollFiltros() {
    if (!painelFiltroExiste()) return;
    if (window.EstoqueStore && EstoqueStore.isLoaded()) {
      popularFiltrosDoPainel();
      pararPollFiltros();
      return;
    }

    // evita múltiplos polls
    if (filtroPoll) return;

    const token = ++filtroPollToken;
    filtroPollTentativas = 0;
    const tentar = () => {
      if (token !== filtroPollToken) return;
      if (window.EstoqueStore && EstoqueStore.isLoaded()) {
        popularFiltrosDoPainel();
        filtroPollTentativas = 0;
        filtroPoll = null;
        return;
      }
      filtroPollTentativas += 1;
      if (filtroPollTentativas >= FILTRO_RETRY_MAX_TENTATIVAS) {
        filtroPoll = null;
        return;
      }
      filtroPoll = setTimeout(tentar, FILTRO_RETRY_MS);
    };

    filtroPoll = setTimeout(tentar, 0);
  }

  function popularFiltrosDoPainelCompras() {
    if (!window.ComprasStore) return;
    if (!ComprasStore.isLoaded()) return;

    const itens = ComprasStore.get();

    const tiposValidacao = getTiposValidacaoCache();
    const tipos = tiposValidacao.length > 0
      ? tiposValidacao
      : uniqueSorted(itens.map(i => i.tipo));
    const tiposSemProduto = tipos
      .filter(t => String(t || '').trim().toUpperCase() !== 'PRODUTO');
    const categorias = uniqueSorted(itens.map(i => i.categoria));
    const unidades = uniqueSorted(itens.map(i => i.unidade));

    const selTipo = document.getElementById('filtroTipoCompras');
    const selCategoria = document.getElementById('filtroCategoriaCompras');
    const selUnidade = document.getElementById('filtroUnidadeCompras');

    const tipoAtual = selTipo ? selTipo.value : '';
    const catAtual = selCategoria ? selCategoria.value : '';
    const unidadeAtual = selUnidade ? selUnidade.value : '';

    preencherSelect(selTipo, tiposSemProduto, 'Tipo (todos)');
    preencherSelect(selUnidade, unidades, 'Unidade (todas)');
    preencherSelect(selCategoria, categorias, 'Categoria (todas)');

    if (selTipo && tiposSemProduto.includes(tipoAtual)) selTipo.value = tipoAtual;
    if (selCategoria && categorias.includes(catAtual)) selCategoria.value = catAtual;
    if (selUnidade && unidades.includes(unidadeAtual)) selUnidade.value = unidadeAtual;

    if (window.ComprasUI?.marcarTipoRapidoAtivo) {
      ComprasUI.marcarTipoRapidoAtivo(selTipo ? selTipo.value : '');
    }
  }

  let filtroPollCompras = null;
  let filtroPollComprasTentativas = 0;
  let filtroPollComprasToken = 0;

  function pararPollFiltrosCompras() {
    filtroPollComprasToken += 1;
    filtroPollComprasTentativas = 0;
    if (filtroPollCompras) {
      clearTimeout(filtroPollCompras);
      filtroPollCompras = null;
    }
  }

  function iniciarPollFiltrosCompras() {
    if (!painelFiltroComprasExiste()) return;
    if (window.ComprasStore && ComprasStore.isLoaded()) {
      popularFiltrosDoPainelCompras();
      pararPollFiltrosCompras();
      return;
    }
    if (filtroPollCompras) return;

    const token = ++filtroPollComprasToken;
    filtroPollComprasTentativas = 0;
    const tentar = () => {
      if (token !== filtroPollComprasToken) return;
      if (window.ComprasStore && ComprasStore.isLoaded()) {
        popularFiltrosDoPainelCompras();
        filtroPollComprasTentativas = 0;
        filtroPollCompras = null;
        return;
      }
      filtroPollComprasTentativas += 1;
      if (filtroPollComprasTentativas >= FILTRO_RETRY_MAX_TENTATIVAS) {
        filtroPollCompras = null;
        return;
      }
      filtroPollCompras = setTimeout(tentar, FILTRO_RETRY_MS);
    };

    filtroPollCompras = setTimeout(tentar, 0);
  }

  ========================== */
  function initBuscaEFiltroEstoque() {
    const input = document.getElementById('buscaEstoque');
    const btnFiltro = document.getElementById('btnFiltro');

    // busca
    if (input) {
      input.addEventListener('input', () => {
        buscaState.texto = input.value || '';
        aplicarBuscaEstoqueDebounced();
      });
    }

    // botão filtro
    if (btnFiltro) {
      btnFiltro.addEventListener('click', () => {
        if (!painelFiltroExiste()) {
          mostrarToast('Filtro avancado em breve');
          return;
        }
        togglePainelFiltro();
      });
    }

    // listeners do painel (se existir)
    const p = document.getElementById('painelFiltroEstoque');
    if (!p) return;

    const tipo = document.getElementById('filtroTipo');
    const categoria = document.getElementById('filtroCategoria');
    const unidade = document.getElementById('filtroUnidade');
    const btnLimpar = document.getElementById('btnLimparFiltros'); // ✅ seu ID correto

    // muda e aplica automaticamente
    [tipo, categoria, unidade].forEach(sel => {
      if (!sel) return;
      sel.addEventListener('change', () => {
        lerFiltrosDoPainel();
        aplicarBuscaEstoque();
      });
    });

    if (btnLimpar) {
      btnLimpar.addEventListener('click', () => {
        limparFiltros();
      });
    }

    // garante opções preenchidas assim que o store carregar
    iniciarPollFiltros();
  }

  function initLongTaskMonitor() {
    if (!window.AppPerf?.isEnabled?.()) return;
    if (typeof window === 'undefined' || typeof window.PerformanceObserver === 'undefined') return;
    try {
      const observer = new PerformanceObserver(list => {
        const entries = list.getEntries();
        entries.forEach(entry => {
          const dur = Number(entry.duration || 0).toFixed(1);
          console.warn(`[longtask] ${dur}ms`);
        });
      });
      observer.observe({ entryTypes: ['longtask'] });
    } catch (error) {
      // sem acao
    }
  }
