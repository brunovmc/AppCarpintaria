<script>
  window.EstoqueUI = (() => {
    let cardAberto = null;
    let delegationInit = false;

    let opcoesProducao = [];
    let categoriasBaseValidacao = [];
    let categoriasPorTipoValidacao = {};
    let listaFiltradaAtual = [];
    let itensPorId = {};
    let qtdRenderizada = 0;
    let carregandoMais = false;
    let renderJobSeq = 0;

    const PAGE_SIZE = 30;
    const RENDER_CHUNK_SIZE = 8;

    /* =========================
       HELPERS
    ========================== */
    function el() {
      return {
        formulario: document.getElementById('formulario'),
        lista: document.getElementById('lista'),
        listaControles: document.getElementById('listaControlesEstoque'),

        // Form
        tipo: document.getElementById('tipo'),
        item: document.getElementById('item'),
        quantidade: document.getElementById('quantidade'),
        unidade: document.getElementById('unidade'),
        categoria: document.getElementById('categoria'),
        fornecedor: document.getElementById('fornecedor'),
        pago_por: document.getElementById('pago_por'),
        data_pagamento: document.getElementById('data_pagamento'),
        forma_pagamento: document.getElementById('forma_pagamento'),
        parcelas_wrap: document.getElementById('parcelas_wrap'),
        parcelas: document.getElementById('parcelas'),
        custo_unitario: document.getElementById('custo_unitario'),
        preco_venda: document.getElementById('preco_venda'),
        observacao: document.getElementById('observacao'),

        comprimento_cm: document.getElementById('comprimento_cm'),
        largura_cm: document.getElementById('largura_cm'),
        espessura_cm: document.getElementById('espessura_cm'),

        potencia: document.getElementById('potencia'),
        voltagem: document.getElementById('voltagem'),
        comprado_em: document.getElementById('comprado_em'),
        vida_util_mes: document.getElementById('vida_util_mes'),

        equipamentoFields: document.getElementById('equipamentoFields'),
        madeiraFields: document.getElementById('madeiraFields'),
        formTitulo: document.getElementById('formTitulo'),

        // Painel de filtro (inline)
        filtroTipo: document.getElementById('filtroTipo'),
        filtroCategoria: document.getElementById('filtroCategoria'),
        filtroTipoRapido: document.getElementById('filtroTipoRapidoEstoque')
      };
    }

    function limparVazios(lista) {
      return (Array.isArray(lista) ? lista : [])
        .map(v => (v ?? '').toString().trim())
        .filter(v => v !== '');
    }

    function parseNumeroInput(valor) {
      const s = String(valor ?? '').trim();
      if (s === '') return 0;
      const n = Number(s.replace(',', '.'));
      return isNaN(n) ? 0 : n;
    }

    function proximoFrame(fn) {
      if (typeof window !== 'undefined' && typeof window.requestAnimationFrame === 'function') {
        window.requestAnimationFrame(fn);
        return;
      }
      setTimeout(fn, 16);
    }

    function normalizarFormaPagamento(valor) {
      return String(valor || '')
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .trim()
        .toUpperCase();
    }

    function formaExigeParcelas(valor) {
      const forma = normalizarFormaPagamento(valor);
      return forma === 'CREDITO' || forma === 'PIX PARCELADO' || forma === 'DINHEIRO';
    }

    function normalizarMapaCategoriasPorTipo(mapa) {
      const out = {};
      if (!mapa || typeof mapa !== 'object') return out;

      Object.keys(mapa).forEach(tipo => {
        const chave = String(tipo || '').trim().toUpperCase();
        if (!chave) return;
        const lista = Array.isArray(mapa[tipo]) ? mapa[tipo] : [];
        const unicos = [];
        lista.forEach(cat => {
          const label = String(cat || '').trim();
          if (!label) return;
          if (!unicos.some(v => v.toUpperCase() === label.toUpperCase())) {
            unicos.push(label);
          }
        });
        out[chave] = unicos;
      });

      return out;
    }

    function getCategoriasParaTipo(tipo) {
      const t = String(tipo || '').trim().toUpperCase();
      const categoriasTipo = Array.isArray(categoriasPorTipoValidacao[t])
        ? categoriasPorTipoValidacao[t]
        : [];
      return categoriasTipo.length > 0 ? categoriasTipo : categoriasBaseValidacao;
    }

    function preencherSelectCategoria(categorias, selecionado = '') {
      const { categoria } = el();
      if (!categoria || categoria.tagName !== 'SELECT') return;

      const alvo = String(selecionado || '').trim().toUpperCase();
      categoria.innerHTML = '<option value="">Selecione</option>';

      (Array.isArray(categorias) ? categorias : []).forEach(v => {
        const label = String(v || '').trim();
        if (!label) return;
        const o = document.createElement('option');
        o.value = label;
        o.textContent = label;
        categoria.appendChild(o);
      });

      const match = [...categoria.options].find(o => String(o.value || '').trim().toUpperCase() === alvo);
      categoria.value = match ? match.value : '';
    }

    function renderCategoriasDoTipo(tipo, categoriaSelecionada = '') {
      preencherSelectCategoria(getCategoriasParaTipo(tipo), categoriaSelecionada);
    }

    function atualizarQuantidadeMadeira() {
      const f = el();
      if (!f.tipo || f.tipo.value !== 'MADEIRA') return;
      if (!f.quantidade) return;

      const comp = parseNumeroInput(f.comprimento_cm?.value);
      const larg = parseNumeroInput(f.largura_cm?.value);
      const espes = parseNumeroInput(f.espessura_cm?.value);

      if (!comp || !larg || !espes) {
        f.quantidade.value = '';
        return;
      }

      const m3 = (comp * larg * espes) / 1000000;
      f.quantidade.value = m3.toFixed(2);
    }

    function setOpcoesAdicao({ producao } = {}) {
      opcoesProducao = Array.isArray(producao) ? producao : [];

      const selects = document.querySelectorAll('.add-destino-ref');
      selects.forEach(sel => {
        sel.innerHTML = renderOpcoesDestino(sel.value || '');
      });
    }

    function renderOpcoesDestino(selecionadoId) {
      const lista = opcoesProducao;
      const placeholder = '<option value="">Selecione a producao</option>';
      const opts = lista.map(i => {
        const val = i.producao_id;
        const label = i.nome_ordem || i.nome_produto || i.producao_id;
        const selected = val === selecionadoId ? 'selected' : '';
        return `<option value="${val}" ${selected}>${label}</option>`;
      }).join('');
      return placeholder + opts;
    }

    function resetarAdicaoDestino(estoqueId) {
      const ref = document.getElementById(`addRef_${estoqueId}`);
      const qtd = document.getElementById(`addQtd_${estoqueId}`);

      if (ref) ref.innerHTML = '<option value="">Selecione a producao</option>';
      if (qtd) qtd.value = '';
    }

    /* =========================
       FORMULARIO
    ========================== */
    function abrirFormularioNovo() {
      resetFormulario();
      mostrarFormulario();
    }

    function mostrarFormulario() {
      const { formulario } = el();
      if (!formulario) return;
      formulario.classList.remove('hidden');
    }

    function fecharFormulario() {
      const { formulario } = el();
      if (!formulario) return;
      formulario.classList.add('hidden');
      resetFormulario();

      if (window.EstoqueController) {
        EstoqueController.limparEdicao();
      }
    }

    function preencherFormulario(data) {
      const f = el();

      if (f.tipo) f.tipo.value = data.tipo || '';
      if (f.unidade) f.unidade.value = data.unidade || '';

      if (f.item) f.item.value = data.item || '';
      if (f.quantidade) f.quantidade.value = data.quantidade || '';

      if (f.categoria) f.categoria.value = data.categoria || '';
      if (f.fornecedor) f.fornecedor.value = data.fornecedor || '';
      if (f.pago_por) f.pago_por.value = data.pago_por || '';
      if (f.data_pagamento) f.data_pagamento.value = data.data_pagamento || '';
      if (f.forma_pagamento) f.forma_pagamento.value = data.forma_pagamento || '';
      if (f.parcelas) f.parcelas.value = data.parcelas || '1';

      if (f.custo_unitario) f.custo_unitario.value = data.custo_unitario ?? data.valor_unit ?? '';
      if (f.preco_venda) f.preco_venda.value = data.preco_venda ?? '';
      if (f.observacao) f.observacao.value = data.observacao || '';

      if (f.comprimento_cm) f.comprimento_cm.value = data.comprimento_cm || '';
      if (f.largura_cm) f.largura_cm.value = data.largura_cm || '';
      if (f.espessura_cm) f.espessura_cm.value = data.espessura_cm || '';

      if (f.potencia) f.potencia.value = data.potencia || '';
      if (f.voltagem) f.voltagem.value = data.voltagem || '';
      if (f.comprado_em) f.comprado_em.value = data.comprado_em || '';
      if (f.vida_util_mes) f.vida_util_mes.value = data.vida_util_mes || '';

      if (f.formTitulo) f.formTitulo.innerText = 'Editar Item';
      handleTipoChange();
      handleFormaPagamentoChange();
    }

    function resetFormulario() {
      const f = el();

      [
        f.tipo,
        f.item,
        f.quantidade,
        f.unidade,
        f.categoria,
        f.fornecedor,
        f.pago_por,
        f.data_pagamento,
        f.forma_pagamento,
        f.parcelas,
        f.custo_unitario,
        f.preco_venda,
        f.observacao,
        f.comprimento_cm,
        f.largura_cm,
        f.espessura_cm,
        f.potencia,
        f.voltagem,
        f.comprado_em,
        f.vida_util_mes
      ].forEach(i => i && (i.value = ''));

      if (f.equipamentoFields) f.equipamentoFields.classList.add('hidden');
      if (f.madeiraFields) f.madeiraFields.classList.add('hidden');
      if (f.quantidade) f.quantidade.readOnly = false;
      renderCategoriasDoTipo('', '');
      handleFormaPagamentoChange();
      if (f.formTitulo) f.formTitulo.innerText = 'Novo Item';
    }

    function handleTipoChange() {
      const { tipo, categoria, equipamentoFields, madeiraFields, quantidade, unidade } = el();
      if (!tipo) return;

      const isEquip = tipo.value === 'EQUIPAMENTO';
      const isMadeira = tipo.value === 'MADEIRA';

      if (equipamentoFields) {
        equipamentoFields.classList.toggle('hidden', !isEquip);
      }

      if (madeiraFields) {
        madeiraFields.classList.toggle('hidden', !isMadeira);
      }

      if (quantidade) {
        quantidade.readOnly = isMadeira;
      }

      renderCategoriasDoTipo(tipo.value, categoria ? categoria.value : '');

      if (isMadeira && unidade) {
        const optM3 = [...unidade.options].find(o =>
          String(o.value || '').trim().toUpperCase() === 'M3'
        );
        unidade.value = optM3 ? optM3.value : '';
        if (!optM3 && typeof mostrarToast === 'function') {
          mostrarToast('Configure M3 na aba VALIDACAO para itens MADEIRA', 'erro');
        }
        atualizarQuantidadeMadeira();
      }

      if (!isMadeira && madeiraFields) {
        const inputs = madeiraFields.querySelectorAll('input');
        inputs.forEach(i => (i.value = ''));
      }
    }

    function handleFormaPagamentoChange() {
      const { forma_pagamento, parcelas_wrap, parcelas } = el();
      if (!forma_pagamento || !parcelas_wrap || !parcelas) return;
      const exibirParcelas = formaExigeParcelas(forma_pagamento.value);
      parcelas_wrap.classList.toggle('hidden', !exibirParcelas);
      if (!exibirParcelas) {
        parcelas.value = '1';
      } else if (!String(parcelas.value || '').trim() || Number(parcelas.value) < 1) {
        parcelas.value = '1';
      }
    }

    /* =========================
       SELECTS (RENDER ONLY)
    ========================== */
    function renderTipos(lista) {
      const { tipo } = el();
      if (!tipo) return;

      const clean = limparVazios(lista);

      tipo.innerHTML = '<option value="">Selecione</option>';
      clean.forEach(v => {
        const o = document.createElement('option');
        o.value = v;
        o.textContent = v;
        tipo.appendChild(o);
      });
    }

    function renderUnidades(lista) {
      const { unidade } = el();
      if (!unidade) return;

      const clean = limparVazios(lista);

      unidade.innerHTML = '<option value="">Selecione</option>';
      clean.forEach(v => {
        const o = document.createElement('option');
        o.value = v;
        o.textContent = v;
        unidade.appendChild(o);
      });
    }

    function renderCategorias(lista, mapaPorTipo = {}) {
      const { categoria } = el();
      if (!categoria) return;

      categoriasBaseValidacao = limparVazios(lista);
      categoriasPorTipoValidacao = normalizarMapaCategoriasPorTipo(mapaPorTipo);
      const tipoAtual = el().tipo?.value || '';
      const categoriaAtual = categoria.value || '';
      renderCategoriasDoTipo(tipoAtual, categoriaAtual);
    }

    function renderFornecedores(lista) {
      const { fornecedor } = el();
      if (!fornecedor) return;

      const clean = limparVazios(lista);

      if (fornecedor.tagName === 'SELECT') {
        fornecedor.innerHTML = '<option value="">Selecione</option>';
        clean.forEach(v => {
          const o = document.createElement('option');
          o.value = v;
          o.textContent = v;
          fornecedor.appendChild(o);
        });
      }
    }

    function renderPagosPor(lista) {
      const { pago_por } = el();
      if (!pago_por || pago_por.tagName !== 'SELECT') return;

      const clean = limparVazios(lista);
      const atual = String(pago_por.value || '').trim();
      pago_por.innerHTML = '<option value="">Selecione</option>';
      clean.forEach(v => {
        const o = document.createElement('option');
        o.value = v;
        o.textContent = v;
        pago_por.appendChild(o);
      });
      const match = [...pago_por.options].find(o => String(o.value || '').trim().toUpperCase() === atual.toUpperCase());
      pago_por.value = match ? match.value : '';
    }

    function renderFormasPagamento(lista) {
      const { forma_pagamento } = el();
      if (!forma_pagamento || forma_pagamento.tagName !== 'SELECT') return;

      const clean = limparVazios(lista);
      const atual = String(forma_pagamento.value || '').trim();
      forma_pagamento.innerHTML = '<option value="">Selecione</option>';
      clean.forEach(v => {
        const o = document.createElement('option');
        o.value = v;
        o.textContent = v;
        forma_pagamento.appendChild(o);
      });
      const match = [...forma_pagamento.options].find(o => String(o.value || '').trim().toUpperCase() === atual.toUpperCase());
      forma_pagamento.value = match ? match.value : '';
      handleFormaPagamentoChange();
    }

    /* =========================
       SELECTS DO PAINEL DE FILTRO
    ========================== */
    function renderFiltroTipos(lista) {
      const { filtroTipo } = el();
      if (!filtroTipo) return;

      const clean = limparVazios(lista);

      filtroTipo.innerHTML = '<option value="">Tipo (todos)</option>';
      clean.forEach(v => {
        const o = document.createElement('option');
        o.value = v;
        o.textContent = v;
        filtroTipo.appendChild(o);
      });
    }

    function renderFiltroCategorias(lista) {
      const { filtroCategoria } = el();
      if (!filtroCategoria) return;

      const clean = limparVazios(lista);

      filtroCategoria.innerHTML = '<option value="">Categoria (todas)</option>';
      clean.forEach(v => {
        const o = document.createElement('option');
        o.value = v;
        o.textContent = v;
        filtroCategoria.appendChild(o);
      });
    }

    function construirIndiceItens(lista) {
      itensPorId = {};
      (Array.isArray(lista) ? lista : []).forEach(i => {
        const id = String(i?.ID || '').trim();
        if (!id) return;
        itensPorId[id] = i;
      });
    }

    function montarCardResumo(i) {
      const div = document.createElement('div');
      div.className = 'card';
      div.dataset.id = i.ID;
      const isMadeira = String(i.tipo || '').toUpperCase() === 'MADEIRA';

      div.innerHTML = `
        <div class="card-resumo">
          <strong>${i.item}</strong><br>
          ${i.tipo} - ${i.categoria || '-'}<br>
          ${i.quantidade || 0} ${i.unidade || ''}
          ${isMadeira ? `<br><span>(${i.comprimento_cm || '-'} x ${i.largura_cm || '-'} x ${i.espessura_cm || '-'}) cm</span>` : ''}
        </div>

        <button class="ver-mais">Ver mais</button>

        <div class="card-detalhes" data-loaded="0">
          <button class="fechar-card">X</button>
          <div class="card-detalhes-body"></div>
        </div>
      `;

      return div;
    }

    function montarDetalhesCard(i) {
      const isMadeira = String(i.tipo || '').toUpperCase() === 'MADEIRA';
      return `
        <p><b>Fornecedor:</b> ${i.fornecedor || '-'}</p>
        <p><b>Pago por:</b> ${i.pago_por || '-'}</p>
        <p><b>Data de pagamento:</b> ${i.data_pagamento || '-'}</p>
        <p><b>Forma de pagamento:</b> ${i.forma_pagamento || '-'}</p>
        <p><b>Parcelas:</b> ${Number(i.parcelas || 1)}</p>
        <p><b>Custo unitario:</b> R$ ${Number(i.custo_unitario ?? i.valor_unit ?? 0).toFixed(2)}</p>
        <p><b>Preco de venda:</b> ${String(i.preco_venda ?? '').trim() === '' ? '-' : `R$ ${Number(i.preco_venda || 0).toFixed(2)}`}</p>
        <p><b>Observacao:</b> ${i.observacao || '-'}</p>

        ${isMadeira ? `
          <p><b>Medidas (cm):</b> ${i.comprimento_cm || '-'} x ${i.largura_cm || '-'} x ${i.espessura_cm || '-'}</p>
        ` : ''}

        ${i.tipo === 'EQUIPAMENTO' ? `
          <p><b>Potencia:</b> ${i.potencia || '-'}</p>
          <p><b>Voltagem:</b> ${i.voltagem || '-'}</p>
        ` : ''}

        <div class="bloco">
          <p><b>Adicionar a producao</b></p>
          <div class="linha-add-destino">
            <select id="addRef_${i.ID}" class="add-destino-ref" data-estoque-id="${i.ID}">
              ${renderOpcoesDestino('')}
            </select>
            <input
              id="addQtd_${i.ID}"
              class="add-destino-qtd"
              type="number"
              step="0.01"
              min="0"
              placeholder="Qtd (${i.unidade || ''})"
            >
            <button class="btn-add-destino" data-estoque-id="${i.ID}">Adicionar</button>
          </div>
        </div>

        <div class="acoes">
          <button onclick="EstoqueController.editar('${i.ID}')">Editar</button>
          <button onclick="EstoqueController.excluir('${i.ID}')">Excluir</button>
        </div>
      `;
    }

    function garantirDetalhesCard(card) {
      if (!card) return;
      const detalhes = card.querySelector('.card-detalhes');
      const body = card.querySelector('.card-detalhes-body');
      if (!detalhes || !body) return;
      if (detalhes.dataset.loaded === '1') return;

      const id = String(card.dataset.id || '').trim();
      const item = itensPorId[id];
      if (!item) {
        body.innerHTML = '<p>Item nao encontrado.</p>';
        detalhes.dataset.loaded = '1';
        return;
      }

      body.innerHTML = montarDetalhesCard(item);
      detalhes.dataset.loaded = '1';
    }

    function renderControlesLista() {
      const { listaControles } = el();
      if (!listaControles) return;

      listaControles.innerHTML = '';
      const restante = listaFiltradaAtual.length - qtdRenderizada;
      if (restante <= 0) return;

      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'btn-carregar-mais';
      const labelIdle = `Carregar mais (${restante})`;
      if (window.AppLoading?.setButtonLoading) {
        window.AppLoading.setButtonLoading(btn, carregandoMais, labelIdle, 'Carregando');
      } else {
        btn.textContent = carregandoMais ? 'Carregando...' : labelIdle;
      }
      btn.disabled = carregandoMais;
      btn.addEventListener('click', () => {
        renderMaisItens();
      });

      listaControles.appendChild(btn);
    }

    function renderMaisItens(onDone) {
      const { lista } = el();
      if (!lista || carregandoMais) return;
      if (qtdRenderizada >= listaFiltradaAtual.length) {
        renderControlesLista();
        if (typeof onDone === 'function') onDone();
        return;
      }

      carregandoMais = true;
      renderControlesLista();

      const inicio = qtdRenderizada;
      const fim = Math.min(inicio + PAGE_SIZE, listaFiltradaAtual.length);
      const jobId = ++renderJobSeq;
      const perf = window.AppPerf?.start('ui.estoque.renderMais', {
        inicio,
        fim,
        total: listaFiltradaAtual.length
      });
      let idx = inicio;

      const processarChunk = () => {
        if (jobId !== renderJobSeq) return;

        const limite = Math.min(idx + RENDER_CHUNK_SIZE, fim);
        const fragment = document.createDocumentFragment();

        for (; idx < limite; idx++) {
          fragment.appendChild(montarCardResumo(listaFiltradaAtual[idx]));
        }

        lista.appendChild(fragment);

        if (idx < fim) {
          proximoFrame(processarChunk);
          return;
        }

        qtdRenderizada = fim;
        carregandoMais = false;
        renderControlesLista();
        initDelegation();
        window.AppPerf?.end(perf, {
          renderizados: fim - inicio,
          renderizados_total: qtdRenderizada
        });
        if (typeof onDone === 'function') onDone();
      };

      proximoFrame(processarChunk);
    }

    function normalizarTipos(lista) {
      const unicos = [];
      limparVazios(lista).forEach(v => {
        if (!unicos.some(x => x.toUpperCase() === v.toUpperCase())) {
          unicos.push(v);
        }
      });
      return unicos.sort((a, b) => a.localeCompare(b));
    }

    function marcarTipoRapidoAtivo(tipoAtual) {
      const { filtroTipoRapido } = el();
      if (!filtroTipoRapido) return;
      const alvo = String(tipoAtual || '').trim().toUpperCase();
      filtroTipoRapido.querySelectorAll('button[data-tipo]').forEach(btn => {
        const tipoBtn = String(btn.dataset.tipo || '').trim().toUpperCase();
        btn.classList.toggle('ativo', tipoBtn === alvo);
      });
    }

    function renderFiltroRapidoTipos(lista) {
      const { filtroTipoRapido, filtroTipo } = el();
      if (!filtroTipoRapido) return;

      const tipos = normalizarTipos(lista);
      filtroTipoRapido.innerHTML = '';

      const criarBotao = (label, tipo) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.textContent = label;
        btn.dataset.tipo = tipo;
        btn.addEventListener('click', () => {
          if (typeof window.setFiltroTipoRapidoEstoque === 'function') {
            window.setFiltroTipoRapidoEstoque(tipo);
            return;
          }
          if (filtroTipo) filtroTipo.value = tipo;
        });
        return btn;
      };

      filtroTipoRapido.appendChild(criarBotao('Todos', ''));
      tipos.forEach(tipo => filtroTipoRapido.appendChild(criarBotao(tipo, tipo)));
      marcarTipoRapidoAtivo(filtroTipo ? filtroTipo.value : '');
    }

    /* =========================
       LISTA + CARDS
    ========================== */
    function renderLista(itens) {
      const { lista, listaControles } = el();
      if (!lista) return;

      const perf = window.AppPerf?.start('ui.estoque.renderLista', {
        total: Array.isArray(itens) ? itens.length : 0
      });
      fecharCard();
      renderJobSeq += 1;
      lista.innerHTML = '';
      if (listaControles) listaControles.innerHTML = '';

      listaFiltradaAtual = Array.isArray(itens) ? itens : [];
      construirIndiceItens(listaFiltradaAtual);
      qtdRenderizada = 0;
      carregandoMais = false;

      if (listaFiltradaAtual.length === 0) {
        lista.innerHTML = '<p>Nenhum item no estoque.</p>';
        window.AppPerf?.end(perf, { vazio: true });
        return;
      }

      renderMaisItens(() => {
        window.AppPerf?.end(perf, {
          renderizados_iniciais: qtdRenderizada,
          total: listaFiltradaAtual.length
        });
      });
    }

    /* =========================
       EVENT DELEGATION (CORE)
    ========================== */
    function initDelegation() {
      if (delegationInit) return;
      delegationInit = true;

      document.addEventListener('click', e => {
        const card = e.target.closest('.card');
        const lista = document.getElementById('lista');

        if (card && lista && !lista.contains(card)) return;

        if (e.target.classList.contains('ver-mais')) {
          e.stopPropagation();
          abrirCard(card);
          return;
        }

        if (e.target.classList.contains('fechar-card')) {
          e.stopPropagation();
          fecharCard();
          return;
        }

        if (e.target.classList.contains('btn-add-destino')) {
          const estoqueId = e.target.dataset.estoqueId;
          const destinoId = document.getElementById(`addRef_${estoqueId}`)?.value || '';
          const quantidade = document.getElementById(`addQtd_${estoqueId}`)?.value || '';

          if (window.EstoqueController) {
            EstoqueController.adicionarMaterialDestino(estoqueId, destinoId, quantidade);
          }
          return;
        }

        if (cardAberto && !cardAberto.contains(e.target)) {
          fecharCard();
        }
      });

    }

    function abrirCard(card) {
      if (!card) return;

      if (cardAberto && cardAberto !== card) {
        fecharCard();
      }
      garantirDetalhesCard(card);
      card.classList.add('aberto');
      cardAberto = card;
    }

    function fecharCard() {
      if (!cardAberto) return;
      cardAberto.classList.remove('aberto');
      cardAberto = null;
    }

    /* =========================
       API PUBLICA
    ========================== */
    return {
      abrirFormularioNovo,
      mostrarFormulario,
      fecharFormulario,
      preencherFormulario,
      resetFormulario,
      handleTipoChange,
      renderLista,

      renderTipos,
      renderUnidades,
      renderCategorias,
      renderFornecedores,
      renderPagosPor,
      renderFormasPagamento,

      renderFiltroTipos,
      renderFiltroCategorias,
      renderFiltroRapidoTipos,
      marcarTipoRapidoAtivo,

      setOpcoesAdicao,
      resetarAdicaoDestino,
      atualizarQuantidadeMadeira,
      handleFormaPagamentoChange
    };

  })();
</script>
