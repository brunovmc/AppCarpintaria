<script>
  window.EstoqueController = (() => {

    let editandoId = null;
    let iniciado = false;
    let salvando = false;
    let mutationLockToken = null;
    let listenerMutacoesRegistrado = false;

    let validacoes = null;

    function perfStart(label, meta) {
      return window.AppPerf?.start(label, meta);
    }

    function perfEnd(token, extra) {
      window.AppPerf?.end(token, extra);
    }

    function marcarDashboardComoSujo() {
      if (window.AppTabRefresh?.markDirty) {
        window.AppTabRefresh.markDirty('dashboard');
        window.AppTabRefresh.markDirty('vendas');
      }
      if (window.DashboardController?.invalidarCacheMeses) {
        window.DashboardController.invalidarCacheMeses();
      }
      if (window.AppTabRefresh?.requestSync) {
        window.AppTabRefresh.requestSync('dashboard', {
          delayMs: 420,
          prefetch: true
        });
      }
    }

    function podeAlterarDados(contexto = 'Operacao') {
      if (window.AppDomainUtils?.ensureWritable) {
        return window.AppDomainUtils.ensureWritable(contexto);
      }
      return !!window.AppRuntime?.ensureWritable
        ? window.AppRuntime.ensureWritable(contexto)
        : true;
    }

    function formaExigeParcelas(formaPagamento) {
      if (window.AppDomainUtils?.formaExigeParcelas) {
        return window.AppDomainUtils.formaExigeParcelas(formaPagamento);
      }
      return false;
    }

    function setSalvando(ativo) {
      salvando = !!ativo;
      if (window.AppMutationUI?.lock && window.AppMutationUI?.unlock) {
        if (salvando) {
          if (!mutationLockToken) {
            mutationLockToken = window.AppMutationUI.lock();
          }
        } else if (mutationLockToken) {
          window.AppMutationUI.unlock(mutationLockToken);
          mutationLockToken = null;
        }
      }
      const btn = document.getElementById('btnSalvarEstoque');
      if (!btn) return;
      btn.disabled = salvando;
      if (window.AppLoading?.setButtonLoading) {
        window.AppLoading.setButtonLoading(btn, salvando, 'Salvar', 'Salvando');
      } else {
        btn.textContent = salvando ? 'Salvando...' : 'Salvar';
      }
    }

    function reabrirFormularioAposErro(dados, opcoes = {}) {
      const payload = dados ? { ...dados } : {};
      const editando = !!opcoes.editando;
      editandoId = editando ? String(opcoes.id || '') : null;
      EstoqueUI.preencherFormulario(payload);
      EstoqueUI.mostrarFormulario();
    }

    function getEstoqueUiState(item) {
      if (!window.AppEntityMutations?.getUiState) {
        return {
          status: '',
          action: '',
          label: '',
          message: '',
          canRetry: false,
          blockActions: false
        };
      }
      return window.AppEntityMutations.getUiState(item, {
        pendingLabels: {
          delete: 'Exclusao pendente'
        },
        errorLabels: {
          delete: 'Falha ao excluir'
        }
      });
    }

    function limparEstoqueMeta(item) {
      return window.AppEntityMutations?.limparMeta
        ? window.AppEntityMutations.limparMeta(item)
        : { ...(item || {}) };
    }

    function buildEstoqueOptimistic(payload, options = {}) {
      const base = limparEstoqueMeta(options.baseItem);
      const id = String(options.id || base.ID || '').trim() || `tmp_${Date.now()}`;
      return {
        ...base,
        ...payload,
        ID: id,
        custo_total_item: payload?.custo_total_item === '' ? '' : Number((payload?.custo_total_item ?? base?.custo_total_item) || 0),
        valor_unit: Number((payload?.valor_unit ?? base?.valor_unit) || 0),
        custo_unitario: Number((payload?.custo_unitario ?? base?.custo_unitario) || 0)
      };
    }

    function resolveEstoqueSuccessItem(entry, detail, helpers = {}) {
      const limparMeta = helpers?.limparMeta || (valor => valor);
      const meta = entry?.meta || {};
      const result = detail?.result || {};
      if (result?.ID) {
        return limparMeta(result);
      }
      return limparMeta(meta.optimistic_item) || limparMeta(meta.before_item);
    }

    function listarMutacoesEstoqueAtivas() {
      if (!window.AppOptimistic?.list) return [];
      return window.AppOptimistic.list({
        scope: 'estoque',
        domain: 'estoque'
      });
    }

    function reconciliarListaEstoqueComMutacoes(listaBase) {
      if (!window.AppEntityMutations?.mergeFetchedList) {
        return Array.isArray(listaBase) ? [...listaBase] : [];
      }
      return window.AppEntityMutations.mergeFetchedList(listaBase, listarMutacoesEstoqueAtivas(), {
        domain: 'estoque',
        idKey: 'ID',
        resolveSuccessItem: resolveEstoqueSuccessItem
      });
    }

    function persistirEReRenderizarEstoque(lista) {
      if (Array.isArray(lista)) {
        EstoqueStore.set(lista);
      }
      if (typeof aplicarBuscaEstoque === 'function') {
        aplicarBuscaEstoque();
      } else {
        EstoqueUI.renderLista(EstoqueStore.get());
      }
      if (typeof popularFiltrosDoPainel === 'function') {
        popularFiltrosDoPainel();
      }
    }

    function agendarSyncSilenciosoEstoque() {
      if (window.AppTabRefresh?.requestSync) {
        window.AppTabRefresh.requestSync('estoque', {
          delayMs: 900,
          prefetch: true
        });
        return;
      }
      setTimeout(() => carregarEstoque(true), 900);
    }

    function tratarEventoMutacaoEstoque(detail) {
      const entry = detail?.entry;
      if (!entry || String(entry.scope || '').trim() !== 'estoque') return;
      if (String(entry?.meta?.domain || '').trim() !== 'estoque') return;
      if (!window.AppEntityMutations?.applyEntryToList) return;

      const atualizada = window.AppEntityMutations.applyEntryToList(EstoqueStore.get(), detail, {
        domain: 'estoque',
        idKey: 'ID',
        resolveSuccessItem: resolveEstoqueSuccessItem
      });
      persistirEReRenderizarEstoque(atualizada);
      if (window.ProducaoUI?.setEstoqueOpcoes) {
        window.ProducaoUI.setEstoqueOpcoes(EstoqueStore.get());
      }

      if (String(detail?.type || '').trim().toLowerCase() === 'success') {
        marcarDashboardComoSujo();
        agendarSyncSilenciosoEstoque();
        return;
      }

      if (String(detail?.type || '').trim().toLowerCase() === 'error'
        && String(entry?.meta?.source || '').trim() === 'estoque') {
        mostrarToast(`${detail?.errorMessage || 'Falha ao sincronizar estoque'}. Use "Tentar novamente".`, 'erro');
      }
    }

    function registrarListenerMutacoesSeNecessario() {
      if (listenerMutacoesRegistrado) return;
      if (typeof window === 'undefined' || typeof window.addEventListener !== 'function') return;
      window.addEventListener('app:optimistic-mutation', evento => {
        tratarEventoMutacaoEstoque(evento?.detail || {});
      });
      listenerMutacoesRegistrado = true;
    }

    function retryEstoqueMutation(id) {
      const item = EstoqueStore.getById(String(id || '').trim());
      const mutationId = String(item?._localMutationId || '').trim();
      if (!mutationId || !window.AppOptimistic?.retry) {
        mostrarToast('Nao ha sincronizacao pendente para reenviar', 'erro');
        return;
      }
      window.AppOptimistic.retry(mutationId);
      mostrarToast('Tentando sincronizar novamente...');
    }

    function init() {
      if (iniciado) return;

      registrarListenerMutacoesSeNecessario();
      window.AppOptimistic?.process?.();
      carregarValidacoes();
      carregarEstoque();

      iniciado = true;
    }

    function carregarValidacoes() {
      const perf = perfStart('rpc.estoque.obterValidacoes');
      const loader = window.AppValidacoes?.get
        ? window.AppValidacoes.get({ maxAgeMs: 1000 * 60 * 60 * 12 })
        : Promise.reject(new Error('cache de validacoes indisponivel'));

      loader
        .then(({ data }) => {
          perfEnd(perf, { ok: true });
          validacoes = data || {};

          validacoes.tipos ||= [];
          validacoes.coresPorTipo ||= {};
          validacoes.unidades ||= [];
          validacoes.categorias ||= [];
          validacoes.categoriasPorTipo ||= {};
          validacoes.fornecedores ||= [];
          validacoes.pagosPor ||= [];
          validacoes.formasPagamento ||= [];

          EstoqueUI.setCoresPorTipo?.(validacoes.coresPorTipo);
          EstoqueUI.renderTipos?.(validacoes.tipos);
          EstoqueUI.renderUnidades?.(validacoes.unidades);
          EstoqueUI.renderCategorias?.(validacoes.categorias, validacoes.categoriasPorTipo);
          EstoqueUI.renderFornecedores?.(validacoes.fornecedores);
          EstoqueUI.renderPagosPor?.(validacoes.pagosPor);
          EstoqueUI.renderFormasPagamento?.(validacoes.formasPagamento);

          EstoqueUI.renderFiltroTipos?.(validacoes.tipos);
          EstoqueUI.renderFiltroCategorias?.(validacoes.categorias);
          EstoqueUI.renderFiltroRapidoTipos?.(validacoes.tipos);
          if (typeof popularFiltrosDoPainel === 'function') {
            popularFiltrosDoPainel();
          }
          if (typeof aplicarFiltroTipoRapidoPersistidoEstoque === 'function') {
            aplicarFiltroTipoRapidoPersistidoEstoque();
          }

          const listaAtual = EstoqueStore.get();
          if (Array.isArray(listaAtual) && listaAtual.length > 0) {
            if (typeof aplicarBuscaEstoque === 'function') {
              aplicarBuscaEstoque();
            } else {
              EstoqueUI.renderLista(listaAtual);
            }
          }
        })
        .catch(() => {
          perfEnd(perf, { ok: false });
          EstoqueUI.renderFiltroRapidoTipos?.([]);
          mostrarToast('Falha ao carregar validacoes', 'erro');
        });
    }

    function categoriaValidaParaTipo(tipo, categoria) {
      const t = String(tipo || '').trim().toUpperCase();
      const c = String(categoria || '').trim().toUpperCase();
      if (!t || !c) return false;

      const mapa = validacoes?.categoriasPorTipo || {};
      const categoriasTipo = Array.isArray(mapa[t]) ? mapa[t] : [];
      if (categoriasTipo.length > 0) {
        return categoriasTipo.some(v => String(v || '').trim().toUpperCase() === c);
      }

      return (Array.isArray(validacoes?.categorias) ? validacoes.categorias : [])
        .some(v => String(v || '').trim().toUpperCase() === c);
    }

    function hidratarEstoqueDoCache() {
      const listaCache = window.AppTabCache?.ler?.('estoque');
      if (!Array.isArray(listaCache)) return false;
      persistirEReRenderizarEstoque(reconciliarListaEstoqueComMutacoes(listaCache));
      return true;
    }

    function carregarEstoque(forcarRecarregar = false, onDone) {
      const exibindoCache = !forcarRecarregar && hidratarEstoqueDoCache();
      const perf = perfStart('rpc.estoque.listarEstoque');
      window.AppRequest.runner()
        .withSuccessHandler(lista => {
          if (window.AppRuntime?.setReadOnly) {
            window.AppRuntime.setReadOnly(false);
          }
          perfEnd(perf, { ok: true, total: Array.isArray(lista) ? lista.length : 0 });
          persistirEReRenderizarEstoque(reconciliarListaEstoqueComMutacoes(lista));
          if (typeof onDone === 'function') onDone();
        })
        .withFailureHandler(() => {
          perfEnd(perf, { ok: false });
          if (exibindoCache) {
            if (window.AppRuntime?.setReadOnly) {
              window.AppRuntime.setReadOnly(true, 'Sem conexao com backend - exibindo cache local');
            }
            mostrarToast('Exibindo ultimo snapshot em cache', 'erro');
            if (typeof onDone === 'function') onDone();
            return;
          }
          mostrarToast('Erro ao carregar estoque', 'erro');
          if (typeof onDone === 'function') onDone();
        })
        .listarEstoque(!!forcarRecarregar);
    }

    function syncFromBackend(onDone) {
      carregarEstoque(true, onDone);
    }

    function salvar() {
      if (!podeAlterarDados('Salvamento bloqueado em modo somente leitura')) return;
      if (salvando) return;

      const get = id => document.getElementById(id)?.value || '';
      const parseNumeroInput = valor => (
        window.AppDomainUtils?.parseNumeroOptional
          ? window.AppDomainUtils.parseNumeroOptional(valor)
          : ''
      );

      const tipo = get('tipo');
      const categoria = get('categoria');
      const dataPagamento = String(get('data_pagamento') || '').trim();
      const formaPagamento = String(get('forma_pagamento') || '').trim();
      const parcelasBruto = parseNumeroInput(get('parcelas'));
      const parcelas = formaExigeParcelas(formaPagamento)
        ? Math.floor(Number(parcelasBruto || 0))
        : 1;
      if (!categoriaValidaParaTipo(tipo, categoria)) {
        mostrarToast('Categoria invalida para o tipo selecionado', 'erro');
        return;
      }
      if (formaExigeParcelas(formaPagamento) && (!isFinite(parcelas) || parcelas < 1)) {
        mostrarToast('Parcelas deve ser um numero inteiro maior ou igual a 1', 'erro');
        return;
      }

      const comprimentoInput = tipo === 'MADEIRA' ? parseNumeroInput(get('comprimento_cm')) : '';
      const larguraInput = tipo === 'MADEIRA' ? parseNumeroInput(get('largura_cm')) : '';
      const espessuraInput = tipo === 'MADEIRA' ? parseNumeroInput(get('espessura_cm')) : '';

      const comprimento_cm = tipo === 'MADEIRA' ? Number(comprimentoInput || 0) : '';
      const largura_cm = tipo === 'MADEIRA' ? Number(larguraInput || 0) : '';
      const espessura_cm = tipo === 'MADEIRA' ? Number(espessuraInput || 0) : '';

      if (tipo === 'MADEIRA' && (comprimento_cm <= 0 || largura_cm <= 0 || espessura_cm <= 0)) {
        mostrarToast('Para MADEIRA, informe comprimento, largura e espessura validos', 'erro');
        return;
      }

      const qtdMadeira = tipo === 'MADEIRA'
        ? Number(((comprimento_cm * largura_cm * espessura_cm) / 1000000).toFixed(6))
        : '';
      const quantidadeFinal = tipo === 'MADEIRA'
        ? qtdMadeira
        : (parseNumeroInput(get('quantidade')) || 0);
      if (!quantidadeFinal || quantidadeFinal <= 0) {
        mostrarToast('Quantidade deve ser maior que zero', 'erro');
        return;
      }

      const custoUnitarioBruto = parseNumeroInput(get('custo_unitario'));
      const custoTotalBruto = parseNumeroInput(get('custo_total_item'));
      const precoVendaBruto = parseNumeroInput(get('preco_venda'));
      let custoUnitario = custoUnitarioBruto === '' ? 0 : Number(custoUnitarioBruto);
      if (custoTotalBruto !== '' && Number(custoTotalBruto) >= 0) {
        custoUnitario = Number((Number(custoTotalBruto) / Number(quantidadeFinal)).toFixed(6));
      }
      const precoVenda = precoVendaBruto === '' ? '' : precoVendaBruto;

      const dados = {
        tipo,
        item: get('item'),
        quantidade: quantidadeFinal,
        unidade: tipo === 'MADEIRA' ? 'M3' : get('unidade'),
        categoria,
        fornecedor: get('fornecedor'),
        pago_por: get('pago_por'),
        data_pagamento: dataPagamento,
        forma_pagamento: formaPagamento,
        parcelas,
        custo_unitario: custoUnitario,
        custo_total_item: custoTotalBruto === '' ? '' : Number(custoTotalBruto),
        preco_venda: precoVenda,
        valor_unit: custoUnitario,
        observacao: get('observacao'),
        comprimento_cm,
        largura_cm,
        espessura_cm,
        potencia: get('potencia'),
        voltagem: get('voltagem'),
        comprado_em: get('comprado_em'),
        vida_util_mes: parseNumeroInput(get('vida_util_mes')) || ''
      };
      const dadosFormulario = { ...dados };

      setSalvando(true);
      const eraEdicao = !!editandoId;
      const idAtual = String(editandoId || '').trim();
      const snapshot = eraEdicao ? EstoqueStore.getById(idAtual) : null;
      const optimisticId = eraEdicao
        ? idAtual
        : (window.AppEntityMutations?.tempId?.('EST_TMP') || `EST_TMP_${Date.now()}`);
      const optimisticItem = buildEstoqueOptimistic(dados, {
        baseItem: snapshot,
        id: optimisticId
      });

      try {
        if (!window.AppOptimistic?.enqueue) {
          throw new Error('Fila de sincronizacao indisponivel');
        }
        window.AppOptimistic.enqueue({
          scope: 'estoque',
          handler: eraEdicao ? 'estoque.update' : 'estoque.create',
          entityKey: `estoque:${optimisticId}`,
          payload: dados,
          meta: {
            domain: 'estoque',
            action: eraEdicao ? 'update' : 'create',
            source: 'estoque',
            target_id: eraEdicao ? idAtual : '',
            temp_id: eraEdicao ? '' : optimisticId,
            before_item: snapshot ? limparEstoqueMeta(snapshot) : null,
            optimistic_item: limparEstoqueMeta(optimisticItem)
          }
        });
        setSalvando(false);
        editandoId = null;
        finalizarUX();
        window.AppModalUI?.closeAll?.();
        mostrarToast(eraEdicao
          ? 'Alteracao aplicada localmente. Sincronizando...'
          : 'Item criado localmente. Sincronizando...');
      } catch (error) {
        setSalvando(false);
        mostrarToast(error?.message || 'Erro ao enfileirar item de estoque', 'erro');
        reabrirFormularioAposErro(dadosFormulario, {
          editando: eraEdicao,
          id: idAtual
        });
      }
    }

    function finalizarUX() {
      EstoqueUI.fecharFormulario();
    }

    function editar(id) {
      if (!podeAlterarDados('Edicao bloqueada em modo somente leitura')) return;
      const item = EstoqueStore.getById(id);

      if (!item) {
        mostrarToast('Item nao encontrado', 'erro');
        return;
      }
      if (getEstoqueUiState(item).blockActions) {
        mostrarToast('Este item possui uma sincronizacao pendente.', 'erro');
        return;
      }

      editandoId = id;
      EstoqueUI.preencherFormulario(item);
      EstoqueUI.mostrarFormulario();
    }

    function excluir(id) {
      if (!podeAlterarDados('Exclusao bloqueada em modo somente leitura')) return;
      if (!confirm('Deseja remover este item?')) return;

      const snapshot = EstoqueStore.getById(id);
      if (!snapshot) {
        mostrarToast('Item nao encontrado', 'erro');
        return;
      }
      if (getEstoqueUiState(snapshot).blockActions) {
        mostrarToast('Este item ja possui uma sincronizacao pendente.', 'erro');
        return;
      }

      try {
        if (!window.AppOptimistic?.enqueue) {
          throw new Error('Fila de sincronizacao indisponivel');
        }
        window.AppOptimistic.enqueue({
          scope: 'estoque',
          handler: 'estoque.delete',
          entityKey: `estoque:${String(id || '').trim()}`,
          payload: {
            id: String(id || '').trim()
          },
          meta: {
            domain: 'estoque',
            action: 'delete',
            source: 'estoque',
            target_id: String(id || '').trim(),
            before_item: limparEstoqueMeta(snapshot),
            optimistic_item: limparEstoqueMeta(snapshot)
          }
        });
        mostrarToast('Exclusao aplicada localmente. Sincronizando...');
      } catch (error) {
        mostrarToast(error?.message || 'Erro ao enfileirar exclusao do item', 'erro');
      }
    }


    function limparEdicao() {
      editandoId = null;
    }

    return {
      init,
      salvar,
      editar,
      excluir,
      retryEstoqueMutation,
      limparEdicao,
      syncFromBackend
    };

  })();
</script>
