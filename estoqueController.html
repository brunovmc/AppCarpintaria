<script>
  window.EstoqueController = (() => {

    let editandoId = null;
    let iniciado = false;

    let validacoes = null;

    let destinosProducao = [];

    function init() {
      if (iniciado) return;

      carregarValidacoes();
      carregarEstoque();
      carregarDestinosAdicao();

      iniciado = true;
    }


    function carregarDestinosAdicao() {
      google.script.run
        .withSuccessHandler(lista => {
          destinosProducao = Array.isArray(lista) ? lista : [];
          EstoqueUI.setOpcoesAdicao?.({
            producao: destinosProducao
          });
        })
        .listarProducao();
    }

    function carregarValidacoes() {
      google.script.run
        .withSuccessHandler(data => {
          validacoes = data || {};

          validacoes.tipos ||= [];
          validacoes.unidades ||= [];
          validacoes.categorias ||= [];
          validacoes.categoriasPorTipo ||= {};
          validacoes.fornecedores ||= [];

          if (typeof window !== 'undefined') {
            window.AppValidacoesCache = {
              ...(window.AppValidacoesCache || {}),
              tipos: validacoes.tipos,
              categorias: validacoes.categorias,
              categoriasPorTipo: validacoes.categoriasPorTipo
            };
          }

          EstoqueUI.renderTipos?.(validacoes.tipos);
          EstoqueUI.renderUnidades?.(validacoes.unidades);
          EstoqueUI.renderCategorias?.(validacoes.categorias, validacoes.categoriasPorTipo);
          EstoqueUI.renderFornecedores?.(validacoes.fornecedores);

          EstoqueUI.renderFiltroTipos?.(validacoes.tipos);
          EstoqueUI.renderFiltroCategorias?.(validacoes.categorias);
          if (typeof popularFiltrosDoPainel === 'function') {
            popularFiltrosDoPainel();
          }
        })
        .obterValidacoes();
    }

    function categoriaValidaParaTipo(tipo, categoria) {
      const t = String(tipo || '').trim().toUpperCase();
      const c = String(categoria || '').trim().toUpperCase();
      if (!t || !c) return false;

      const mapa = validacoes?.categoriasPorTipo || {};
      const categoriasTipo = Array.isArray(mapa[t]) ? mapa[t] : [];
      if (categoriasTipo.length > 0) {
        return categoriasTipo.some(v => String(v || '').trim().toUpperCase() === c);
      }

      return (Array.isArray(validacoes?.categorias) ? validacoes.categorias : [])
        .some(v => String(v || '').trim().toUpperCase() === c);
    }

    function carregarEstoque() {
      google.script.run
        .withSuccessHandler(lista => {
          EstoqueStore.set(lista);
          if (typeof aplicarBuscaEstoque === 'function') {
            aplicarBuscaEstoque();
          } else {
            EstoqueUI.renderLista(EstoqueStore.get());
          }
        })
        .listarEstoque();
    }

    function syncFromBackend() {
      carregarEstoque();
    }

    function salvar() {
      const get = id => document.getElementById(id)?.value || '';
      const parseNumeroInput = valor => {
        const s = String(valor ?? '').trim();
        if (s === '') return '';
        const n = Number(s.replace(',', '.'));
        return isNaN(n) ? '' : n;
      };

      const tipo = get('tipo');
      const categoria = get('categoria');
      if (!categoriaValidaParaTipo(tipo, categoria)) {
        mostrarToast('Categoria invalida para o tipo selecionado', 'erro');
        return;
      }

      const comprimentoInput = tipo === 'MADEIRA' ? parseNumeroInput(get('comprimento_cm')) : '';
      const larguraInput = tipo === 'MADEIRA' ? parseNumeroInput(get('largura_cm')) : '';
      const espessuraInput = tipo === 'MADEIRA' ? parseNumeroInput(get('espessura_cm')) : '';

      const comprimento_cm = tipo === 'MADEIRA' ? Number(comprimentoInput || 0) : '';
      const largura_cm = tipo === 'MADEIRA' ? Number(larguraInput || 0) : '';
      const espessura_cm = tipo === 'MADEIRA' ? Number(espessuraInput || 0) : '';

      if (tipo === 'MADEIRA' && (comprimento_cm <= 0 || largura_cm <= 0 || espessura_cm <= 0)) {
        mostrarToast('Para MADEIRA, informe comprimento, largura e espessura validos', 'erro');
        return;
      }

      const qtdMadeira = tipo === 'MADEIRA'
        ? Number(((comprimento_cm * largura_cm * espessura_cm) / 1000000).toFixed(2))
        : '';

      const dados = {
        tipo,
        item: get('item'),
        quantidade: tipo === 'MADEIRA' ? qtdMadeira : parseNumeroInput(get('quantidade')) || 0,
        unidade: tipo === 'MADEIRA' ? 'M3' : get('unidade'),
        categoria,
        fornecedor: get('fornecedor'),
        valor_unit: parseNumeroInput(get('valor_unit')) || 0,
        observacao: get('observacao'),

        comprimento_cm,
        largura_cm,
        espessura_cm,

        potencia: get('potencia'),
        voltagem: get('voltagem'),
        comprado_em: get('comprado_em'),
        vida_util_mes: parseNumeroInput(get('vida_util_mes')) || ''
      };

      /* =========
         EDIÇÃO
      ========= */
      if (editandoId) {
        const idAtual = editandoId;
        const snapshot = { ...EstoqueStore.getById(idAtual) };

        EstoqueStore.update(idAtual, dados);
        EstoqueUI.renderLista(EstoqueStore.get());
        finalizarUX();

        google.script.run
          .withFailureHandler(() => {
            EstoqueStore.update(idAtual, snapshot);
            EstoqueUI.renderLista(EstoqueStore.get());
            mostrarToast('Erro ao salvar edição', 'erro');
          })
          .withSuccessHandler(() => {
            mostrarToast('Salvo com sucesso');
          })
          .atualizarItemEstoque(idAtual, dados);

        editandoId = null;
        return;
      }

      /* =========
         CRIAÇÃO
      ========= */
      const tempId = `tmp_${Date.now()}`;

      const itemTemp = {
        ID: tempId,
        ...dados
      };

      EstoqueStore.add(itemTemp);
      EstoqueUI.renderLista(EstoqueStore.get());
      finalizarUX();
      mostrarToast('Salvando...');

      google.script.run
        .withFailureHandler(() => {
          EstoqueStore.remove(tempId);
          EstoqueUI.renderLista(EstoqueStore.get());
          mostrarToast('Erro ao salvar item', 'erro');
        })
        .withSuccessHandler(itemSalvo => {
          // ✅ sempre remove o temporário
          EstoqueStore.remove(tempId);

          // ✅ se o backend não devolveu objeto com ID, faz refetch (fallback robusto)
          if (!itemSalvo || !itemSalvo.ID) {
            mostrarToast('Salvo. Atualizando lista…');
            carregarEstoque();
            return;
          }

          EstoqueStore.add(itemSalvo);
          EstoqueUI.renderLista(EstoqueStore.get());
          mostrarToast('Salvo com sucesso');
        })
        .criarItemEstoque(dados);
    }

    function finalizarUX() {
      EstoqueUI.fecharFormulario();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function editar(id) {
      const item = EstoqueStore.getById(id);

      if (!item) {
        mostrarToast('Item não encontrado', 'erro');
        return;
      }

      editandoId = id;
      EstoqueUI.preencherFormulario(item);
      EstoqueUI.mostrarFormulario();
    }

    function excluir(id) {
      if (!confirm('Deseja remover este item?')) return;

      const snapshot = EstoqueStore.getById(id);

      EstoqueStore.remove(id);
      EstoqueUI.renderLista(EstoqueStore.get());
      mostrarToast('Item removido');

      google.script.run
        .withFailureHandler(() => {
          EstoqueStore.add(snapshot);
          EstoqueUI.renderLista(EstoqueStore.get());
          mostrarToast('Erro ao remover', 'erro');
        })
        .deletarItemEstoque(id);
    }


    function adicionarMaterialDestino(estoqueId, destinoId, quantidade) {
      const qtd = Number(String(quantidade || '').replace(',', '.'));

      if (!estoqueId || !destinoId) {
        mostrarToast('Selecione a producao', 'erro');
        return;
      }

      if (!qtd || isNaN(qtd) || qtd <= 0) {
        mostrarToast('Quantidade invalida', 'erro');
        return;
      }

      mostrarToast('Adicionando a producao...');

      google.script.run
        .withFailureHandler(() => {
          mostrarToast('Erro ao adicionar a producao', 'erro');
        })
        .withSuccessHandler(() => {
          if (window.ProducaoController?.carregarMateriaisPrevistos) {
            ProducaoController.carregarMateriaisPrevistos(destinoId, true);
          }
          EstoqueUI.resetarAdicaoDestino?.(estoqueId);
          mostrarToast('Adicionado a producao');
        })
        .adicionarMaterialExtraProducao(destinoId, estoqueId, qtd);
    }

    function limparEdicao() {
      editandoId = null;
    }

    return {
      init,
      salvar,
      editar,
      excluir,
      adicionarMaterialDestino,
      limparEdicao,
      syncFromBackend
    };

  })();
</script>
