<script>
  window.DashboardController = (() => {
    const STORAGE_PREFIX = 'app:dash:v2:executivo:';
    const CACHE_TTL_MS = 30000;
    const DETAIL_CACHE_TTL_MS = 30000;
    let iniciado = false;
    let carregando = false;
    let requestSeq = 0;
    let detailRequestSeq = 0;
    let cacheMemoria = {};
    let cacheDetalhes = {};
    let detalheAberto = null;
    let itensDetalhe = [];
    let runtimeListenerRegistrado = false;
    let focoAntesDoModal = null;

    function refs() {
      return {
        root: document.getElementById('dashboardExecutive'),
        month: document.getElementById('dashMesReferencia'),
        refresh: document.getElementById('btnDashboardAtualizar'),
        updated: document.getElementById('dashUltimaAtualizacao'),
        readonly: document.getElementById('dashModoSomenteLeitura'),
        loading: document.getElementById('dashboardLoading'),
        content: document.getElementById('dashboardContent'),
        error: document.getElementById('dashboardError'),
        errorMessage: document.getElementById('dashboardErrorMessage'),
        cards: document.getElementById('dashboardCards'),
        periodLabel: document.getElementById('dashKpiPeriodLabel'),
        positionCards: document.getElementById('dashPositionCards'),
        positionDate: document.getElementById('dashPositionDate'),
        salesAverage: document.getElementById('dashSalesAverage'),
        capitalMetrics: document.getElementById('dashCapitalMetrics'),
        productionAlert: document.getElementById('dashProductionAlert'),
        productionStatus: document.getElementById('dashProductionStatus'),
        partnersCenter: document.getElementById('dashPartnersCenter'),
        partnersSummary: document.getElementById('dashPartnersSummary'),
        quality: document.getElementById('dashQualityNotice'),
        modal: document.getElementById('modalObservabilidadeCard'),
        detailTitle: document.getElementById('obsCardTitulo'),
        detailSummary: document.getElementById('obsCardResumo'),
        detailList: document.getElementById('obsCardLista')
      };
    }

    function escapar(valor) {
      return String(valor ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function moeda(valor) {
      return Number(valor || 0).toLocaleString('pt-BR', {
        style: 'currency',
        currency: 'BRL',
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      });
    }

    function numero(valor) {
      return Number(valor || 0).toLocaleString('pt-BR', { maximumFractionDigits: 0 });
    }

    function dataBr(valor) {
      const texto = String(valor || '').trim();
      const match = texto.match(/^(\d{4})-(\d{2})-(\d{2})$/);
      return match ? `${match[3]}/${match[2]}/${match[1]}` : (texto || '-');
    }

    function mesAtual() {
      const hoje = new Date();
      return `${hoje.getFullYear()}-${String(hoje.getMonth() + 1).padStart(2, '0')}`;
    }

    function referenciaValida(valor) {
      return /^\d{4}-\d{2}$/.test(String(valor || '').trim());
    }

    function referenciaAtiva() {
      const valor = String(refs().month?.value || '').trim();
      return referenciaValida(valor) ? valor : mesAtual();
    }

    function mesLabel(valor) {
      const match = String(valor || '').match(/^(\d{4})-(\d{2})$/);
      if (!match) return String(valor || '-');
      const nomes = ['janeiro', 'fevereiro', 'marco', 'abril', 'maio', 'junho', 'julho', 'agosto', 'setembro', 'outubro', 'novembro', 'dezembro'];
      return `${nomes[Number(match[2]) - 1]} de ${match[1]}`;
    }

    function ambienteAtual() {
      const contexto = window.AppDbEnv?.getContext?.() || {};
      return String(contexto.effective_env || contexto.selected_env || 'prod').trim().toLowerCase() === 'dev'
        ? 'dev'
        : 'prod';
    }

    function storageKey(referencia) {
      return `${STORAGE_PREFIX}${ambienteAtual()}:${referencia}`;
    }

    function lerSnapshot(referencia) {
      const memoria = cacheMemoria[referencia];
      if (memoria?.data) return memoria;
      try {
        const raw = window.localStorage?.getItem(storageKey(referencia));
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        if (!parsed?.data || parsed.data.version !== 'v2') return null;
        cacheMemoria[referencia] = parsed;
        return parsed;
      } catch (error) {
        return null;
      }
    }

    function salvarSnapshot(referencia, data) {
      const entry = { ts: Date.now(), data };
      cacheMemoria[referencia] = entry;
      try {
        window.localStorage?.setItem(storageKey(referencia), JSON.stringify(entry));
      } catch (error) {
        // O cache persistente e opcional.
      }
      return entry;
    }

    function limparSnapshots() {
      cacheMemoria = {};
      cacheDetalhes = {};
      try {
        const chaves = [];
        for (let i = 0; i < window.localStorage.length; i += 1) {
          const chave = window.localStorage.key(i);
          if (String(chave || '').startsWith(STORAGE_PREFIX)) chaves.push(chave);
        }
        chaves.forEach(chave => window.localStorage.removeItem(chave));
      } catch (error) {
        // O cache persistente e opcional.
      }
    }

    function atualizarReadonly() {
      const f = refs();
      f.readonly?.classList.toggle('hidden', !window.AppRuntime?.isReadOnly?.());
    }

    function setOffline(ativo, motivo) {
      window.AppRuntime?.setReadOnly?.(!!ativo, String(motivo || ''));
      atualizarReadonly();
    }

    function setLoading(ativo, manterConteudo) {
      carregando = !!ativo;
      const f = refs();
      if (f.refresh) {
        f.refresh.disabled = carregando;
        f.refresh.textContent = carregando ? 'Atualizando...' : 'Atualizar dados';
      }
      f.loading?.classList.toggle('hidden', !carregando || !!manterConteudo);
      f.content?.classList.toggle('dashx-content-refreshing', carregando && !!manterConteudo);
    }

    function mostrarEstadoErro(mensagem) {
      const f = refs();
      f.loading?.classList.add('hidden');
      f.content?.classList.add('hidden');
      f.error?.classList.remove('hidden');
      if (f.errorMessage) f.errorMessage.textContent = String(mensagem || 'Tente atualizar os dados.');
    }

    function atualizarHora(ts) {
      const f = refs();
      if (!f.updated) return;
      const data = new Date(Number(ts || Date.now()));
      f.updated.textContent = `Ultima atualizacao: ${data.toLocaleString('pt-BR', {
        day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit'
      })}`;
    }

    function filtroAttr(filtro) {
      return escapar(encodeURIComponent(JSON.stringify(filtro || {})));
    }

    function botaoDetalhe(conteudo, contexto, filtro, classe) {
      return `<button type="button" class="${escapar(classe || '')}" data-dash-context="${escapar(contexto)}" data-dash-filter="${filtroAttr(filtro)}">${conteudo}</button>`;
    }

    function tendenciaHtml(kpi, tipo) {
      const percentual = kpi?.variacao_percentual;
      const anterior = Number(kpi?.valor_anterior || 0);
      if (percentual === null || percentual === undefined || !Number.isFinite(Number(percentual))) {
        return `<span class="dashx-trend dashx-trend-neutral">Sem base comparavel</span><span class="dashx-previous">Anterior: ${moeda(anterior)}</span>`;
      }
      const variacao = Number(percentual || 0);
      const sinal = variacao > 0 ? 'up' : (variacao < 0 ? 'down' : 'flat');
      const classeImpacto = tipo === 'pagamentos'
        ? (sinal === 'up' ? 'negative' : (sinal === 'down' ? 'positive' : 'neutral'))
        : (sinal === 'up' ? 'positive' : (sinal === 'down' ? 'negative' : 'neutral'));
      const icone = sinal === 'up' ? '&uarr;' : (sinal === 'down' ? '&darr;' : '&rarr;');
      return `<span class="dashx-trend dashx-trend-${classeImpacto}">${icone} ${Math.abs(variacao).toLocaleString('pt-BR', { maximumFractionDigits: 1 })}%</span><span class="dashx-previous">Anterior: ${moeda(anterior)}</span>`;
    }

    function renderKpis(payload) {
      const f = refs();
      if (!f.cards) return;
      const definicoes = [
        { id: 'vendas', label: 'Vendas registradas', context: 'kpi_vendas', help: 'Negocios lancados no mes, independentemente do recebimento.' },
        { id: 'recebimentos', label: 'Recebimentos realizados', context: 'kpi_recebimentos', help: 'Entradas efetivamente recebidas no mes.' },
        { id: 'pagamentos', label: 'Pagamentos realizados', context: 'kpi_pagamentos', help: 'Saidas efetivamente pagas no mes.' },
        { id: 'fluxo_liquido', label: 'Fluxo liquido realizado', context: 'kpi_fluxo', help: 'Recebimentos menos pagamentos; nao e saldo bancario.' }
      ];
      f.cards.innerHTML = definicoes.map(def => {
        const kpi = payload?.kpis?.[def.id] || {};
        const valor = Number(kpi.valor || 0);
        const estado = def.id === 'fluxo_liquido' ? (valor < 0 ? 'negative' : 'positive') : 'default';
        return botaoDetalhe(`
          <span class="dashx-kpi-label">${escapar(def.label)}</span>
          <strong class="dashx-kpi-value dashx-value-${estado}">${moeda(valor)}</strong>
          <span class="dashx-kpi-comparison">${tendenciaHtml(kpi, def.id)}</span>
          <span class="dashx-kpi-help">${escapar(def.help)}</span>
          <span class="dashx-kpi-action">Ver composicao <span aria-hidden="true">&rarr;</span></span>
        `, def.context, {}, 'dash-card dashx-kpi-card');
      }).join('');
      if (f.periodLabel) f.periodLabel.textContent = `${mesLabel(payload.referencia)} comparado ao mes anterior`;
    }

    function renderPosicao(payload) {
      const f = refs();
      const posicao = payload?.posicao || {};
      const cards = [
        { label: 'A receber', valor: posicao.receber_total, vencido: posicao.receber_vencido, context: 'posicao_receber', tone: 'receive' },
        { label: 'A pagar', valor: posicao.pagar_total, vencido: posicao.pagar_vencido, context: 'posicao_pagar', tone: 'pay' }
      ];
      if (f.positionCards) {
        f.positionCards.innerHTML = cards.map(item => botaoDetalhe(`
          <span class="dashx-position-label">${escapar(item.label)}</span>
          <strong>${moeda(item.valor)}</strong>
          <span class="dashx-position-overdue">Vencido: ${moeda(item.vencido)}</span>
          <span class="dashx-kpi-action">Ver titulos <span aria-hidden="true">&rarr;</span></span>
        `, item.context, {}, `dashx-position-card dashx-position-${item.tone}`)).join('');
      }
      if (f.positionDate) f.positionDate.textContent = `Posicao em ${dataBr(payload.posicao_em)}. Valores em aberto, independentemente do mes selecionado.`;
    }

    function renderCapital(payload) {
      const f = refs();
      const capital = payload?.capital || {};
      const metricas = [
        { label: 'Capital operacional a custo', valor: capital.capital_operacional_total, context: 'capital_operacional', help: 'Estoque mais custos consumidos nas ordens ativas.' },
        { label: 'Estoque a custo', valor: capital.estoque_custo_total, context: 'capital_estoque', help: 'Produtos e insumos ao custo cadastrado.' },
        { label: 'Custo em producao', valor: capital.producao_custo_em_andamento, context: 'capital_producao', help: 'Materiais consumidos nas ordens em andamento.' },
        { label: 'Potencial de venda', valor: capital.potencial_venda_total, context: 'capital_potencial', help: 'Estimativa separada; nao representa receita realizada.' }
      ];
      if (f.capitalMetrics) {
        f.capitalMetrics.innerHTML = metricas.map(item => botaoDetalhe(`
          <span>${escapar(item.label)}</span><strong>${moeda(item.valor)}</strong><small>${escapar(item.help)}</small>
        `, item.context, {}, 'dashx-metric-card')).join('');
      }
      if (f.productionAlert) {
        f.productionAlert.className = Number(capital.ordens_atrasadas || 0) > 0 ? 'dashx-alert-chip' : 'dashx-ok-chip';
        f.productionAlert.textContent = Number(capital.ordens_atrasadas || 0) > 0
          ? `${numero(capital.ordens_atrasadas)} atrasada(s)`
          : 'Sem atrasos';
      }
      if (f.productionStatus) {
        const status = Array.isArray(capital.producao_por_status) ? capital.producao_por_status : [];
        f.productionStatus.innerHTML = status.length
          ? status.map(item => botaoDetalhe(`<span>${escapar(item.label)}</span><strong>${numero(item.quantidade)}</strong>`, 'producao_status', item, 'dashx-status-row')).join('')
          : '<p class="dashx-empty">Nenhuma ordem em andamento.</p>';
      }
    }

    function renderSocios(payload) {
      const f = refs();
      const socios = payload?.socios || {};
      if (f.partnersCenter) {
        f.partnersCenter.innerHTML = `<span>Total classificado</span><strong>${moeda(socios.total_periodo)}</strong>`;
      }
      if (f.partnersSummary) {
        f.partnersSummary.innerHTML = `
          <span class="dashx-section-kicker">Historico de aporte</span>
          <h4>Investimento acumulado</h4>
          <strong>${moeda(socios.investimento_acumulado)}</strong>
          <p>Soma dos pagamentos classificados como investimento em todo o historico disponivel.</p>
          ${botaoDetalhe('Ver composicao <span aria-hidden="true">&rarr;</span>', 'socio_acumulado', { socio: 'investimento', label: 'Investimento' }, 'dashx-text-action')}
        `;
      }
    }

    function renderQualidade(payload) {
      const f = refs();
      if (!f.quality) return;
      const qualidade = payload?.qualidade || {};
      const avisos = [];
      if (Number(qualidade.sem_vencimento_receber || 0) > 0) avisos.push(`${moeda(qualidade.sem_vencimento_receber)} a receber sem data prevista`);
      if (Number(qualidade.sem_vencimento_pagar || 0) > 0) avisos.push(`${moeda(qualidade.sem_vencimento_pagar)} a pagar sem data prevista`);
      if (Number(qualidade.itens_sem_custo || 0) > 0) avisos.push(`${numero(qualidade.itens_sem_custo)} item(ns) de estoque sem custo cadastrado`);
      if (Number(qualidade.pagamentos_sem_responsavel || 0) > 0) avisos.push(`${moeda(qualidade.pagamentos_sem_responsavel)} em pagamentos sem responsavel classificado`);
      f.quality.classList.toggle('hidden', avisos.length === 0);
      f.quality.innerHTML = avisos.length
        ? `<strong>Qualidade dos dados</strong><span>${escapar(avisos.join(' • '))}</span>`
        : '';
    }

    function render(payload) {
      const f = refs();
      if (!payload || payload.version !== 'v2') {
        mostrarEstadoErro('A resposta recebida nao corresponde a versao atual do painel.');
        return;
      }
      f.error?.classList.add('hidden');
      f.loading?.classList.add('hidden');
      f.content?.classList.remove('hidden');
      renderKpis(payload);
      renderPosicao(payload);
      renderCapital(payload);
      renderSocios(payload);
      renderQualidade(payload);
      if (f.salesAverage) f.salesAverage.textContent = `Media: ${moeda(payload?.direcionadores?.media_vendas_produto)}`;

      requestAnimationFrame(() => {
        window.DashboardCharts?.renderAll?.(payload, {
          onSelect: (contexto, filtro) => abrirDetalhes(contexto, filtro)
        });
      });
    }

    function atualizar(forcarRecarregar = false, onDone) {
      const referencia = referenciaAtiva();
      const seq = ++requestSeq;
      const snapshot = lerSnapshot(referencia);
      const snapshotFresco = snapshot && (Date.now() - Number(snapshot.ts || 0)) <= CACHE_TTL_MS;
      if (snapshot?.data) {
        render(snapshot.data);
        atualizarHora(snapshot.ts);
      }
      if (!forcarRecarregar && snapshotFresco) {
        setLoading(false, true);
        window.AppTabRefresh?.clearDirty?.('dashboard');
        if (typeof onDone === 'function') onDone();
        return Promise.resolve(snapshot.data);
      }

      setLoading(true, !!snapshot?.data);
      return window.AppRequest.call('obterDashboardExecutivoFinanceiro', [referencia, !!forcarRecarregar], {
        context: 'dashboard.executivo',
        errorMessage: 'Erro ao carregar o painel financeiro'
      }).then(payload => {
        if (seq !== requestSeq) return payload;
        const entry = salvarSnapshot(referencia, payload || {});
        render(payload || {});
        atualizarHora(entry.ts);
        setOffline(false, '');
        window.AppTabRefresh?.clearDirty?.('dashboard');
        return payload;
      }).catch(error => {
        if (seq !== requestSeq) return null;
        if (snapshot?.data) {
          render(snapshot.data);
          setOffline(true, 'Sem conexao com backend - exibindo o ultimo snapshot');
          mostrarToast('Exibindo o ultimo snapshot salvo', 'erro');
          return snapshot.data;
        }
        mostrarEstadoErro(error?.message || 'Nao foi possivel carregar os dados.');
        setOffline(true, 'Sem conexao com backend');
        mostrarToast(error?.message || 'Erro ao carregar dashboard', 'erro');
        return null;
      }).finally(() => {
        if (seq === requestSeq) setLoading(false, true);
        if (typeof onDone === 'function') onDone();
      });
    }

    function init() {
      const f = refs();
      if (!f.month) return;
      if (!referenciaValida(f.month.value)) f.month.value = mesAtual();
      if (!iniciado) {
        f.month.addEventListener('change', () => atualizar(false));
        f.root?.addEventListener('click', evento => {
          const alvo = evento.target?.closest?.('[data-dash-context]');
          if (!alvo || !f.root?.contains(alvo)) return;
          let filtro = {};
          try {
            filtro = JSON.parse(decodeURIComponent(String(alvo.dataset.dashFilter || '%7B%7D')));
          } catch (error) {
            filtro = {};
          }
          abrirDetalhes(alvo.dataset.dashContext, filtro);
        });
        f.modal?.addEventListener('click', evento => {
          if (evento.target === f.modal) fecharObservabilidadeCard();
        });
        document.addEventListener('keydown', evento => {
          if (evento.key === 'Escape' && !f.modal?.classList.contains('hidden')) fecharObservabilidadeCard();
        });
        if (!runtimeListenerRegistrado) {
          window.addEventListener('app:runtime:readonly-changed', atualizarReadonly);
          runtimeListenerRegistrado = true;
        }
        iniciado = true;
      }
      atualizarReadonly();
      return atualizar(false);
    }

    function renderDetalhes(payload) {
      const f = refs();
      if (!f.detailTitle || !f.detailSummary || !f.detailList) return;
      const data = payload || {};
      itensDetalhe = Array.isArray(data.itens) ? data.itens : [];
      f.detailTitle.textContent = String(data.card_label || 'Detalhes');
      f.detailSummary.innerHTML = `
        <div class="dashx-detail-summary">
          <div><span>Total</span><strong>${moeda(data.total)}</strong></div>
          <div><span>Registros</span><strong>${numero(data.total_itens)}</strong></div>
          <div><span>Referencia</span><strong>${escapar(data.referencia || '-')}</strong></div>
        </div>
      `;
      if (!itensDetalhe.length) {
        f.detailList.innerHTML = '<p class="dashx-empty">Nenhum registro compoe este valor.</p>';
        return;
      }
      f.detailList.innerHTML = itensDetalhe.map((item, index) => {
        const acoes = [
          item.pode_editar_origem ? `<button type="button" onclick="DashboardController.editarOrigemObservabilidade(${index})">Editar origem</button>` : '',
          item.pode_excluir_origem ? `<button type="button" onclick="DashboardController.excluirOrigemObservabilidade(${index})">Excluir origem</button>` : '',
          item.pode_remover_pagamento ? `<button type="button" class="danger" onclick="DashboardController.removerPagamentoObservabilidade(${index})">Remover pagamento</button>` : ''
        ].filter(Boolean).join('');
        return `
          <article class="dashx-detail-item">
            <div class="dashx-detail-copy">
              <strong>${escapar(item.titulo || '-')}</strong>
              <span>${escapar(item.detalhe || '-')}</span>
              <time>${escapar(dataBr(item.data))}</time>
            </div>
            <div class="dashx-detail-value">
              <strong class="${Number(item.valor || 0) < 0 ? 'negative' : ''}">${moeda(item.valor)}</strong>
              ${acoes ? `<div class="dashx-detail-actions">${acoes}</div>` : ''}
            </div>
          </article>
        `;
      }).join('');
    }

    function abrirDetalhes(contexto, filtro = {}, options = {}) {
      const chave = String(contexto || '').trim();
      if (!chave) return;
      const f = refs();
      const referencia = referenciaAtiva();
      const cacheKey = `${referencia}|${chave}|${JSON.stringify(filtro || {})}`;
      const cache = cacheDetalhes[cacheKey];
      detalheAberto = { contexto: chave, filtro: filtro || {} };
      focoAntesDoModal = document.activeElement;
      f.modal?.classList.remove('hidden');
      document.body.classList.add('modal-open');
      setTimeout(() => f.modal?.querySelector?.('.modal-close-square')?.focus?.(), 0);
      if (cache?.data && !options.force && (Date.now() - cache.ts) <= DETAIL_CACHE_TTL_MS) {
        renderDetalhes(cache.data);
        return;
      }
      if (f.detailTitle) f.detailTitle.textContent = 'Buscando composicao';
      if (f.detailSummary) f.detailSummary.innerHTML = '<span class="loading-inline">Carregando...</span>';
      if (f.detailList) f.detailList.innerHTML = '<p class="dashx-empty">Consultando os registros de origem.</p>';
      const seq = ++detailRequestSeq;
      window.AppRequest.call('obterDetalhesDashboardExecutivoFinanceiro', [referencia, chave, filtro || {}], {
        context: 'dashboard.detalhes',
        errorMessage: 'Erro ao carregar a composicao'
      }).then(payload => {
        if (seq !== detailRequestSeq || f.modal?.classList.contains('hidden')) return;
        cacheDetalhes[cacheKey] = { ts: Date.now(), data: payload || {} };
        renderDetalhes(payload || {});
      }).catch(error => {
        if (seq !== detailRequestSeq) return;
        if (f.detailTitle) f.detailTitle.textContent = 'Detalhes indisponiveis';
        if (f.detailSummary) f.detailSummary.innerHTML = '';
        if (f.detailList) f.detailList.innerHTML = `<p class="dashx-empty">${escapar(error?.message || 'Nao foi possivel carregar os registros.')}</p>`;
        mostrarToast(error?.message || 'Erro ao carregar composicao', 'erro');
      });
    }

    function abrirObservabilidadeCard(cardKey) {
      const mapaLegado = {
        vendas_no_mes: 'kpi_vendas',
        recebido_vendas_mes: 'kpi_recebimentos',
        gasto_pago_mes: 'kpi_pagamentos'
      };
      abrirDetalhes(mapaLegado[String(cardKey || '').trim()] || String(cardKey || '').trim(), {});
    }

    function fecharObservabilidadeCard() {
      detailRequestSeq += 1;
      detalheAberto = null;
      itensDetalhe = [];
      const f = refs();
      f.modal?.classList.add('hidden');
      document.body.classList.remove('modal-open');
      focoAntesDoModal?.focus?.();
      focoAntesDoModal = null;
    }

    function itemDetalhe(index) {
      const indice = Number(index);
      return Number.isInteger(indice) && indice >= 0 ? itensDetalhe[indice] || null : null;
    }

    function podeAlterar(contexto) {
      if (window.AppDomainUtils?.ensureWritable) return window.AppDomainUtils.ensureWritable(contexto);
      return window.AppRuntime?.ensureWritable?.(contexto) ?? true;
    }

    function abrirAbaEExecutar(aba, callback) {
      if (!aba || typeof callback !== 'function') return;
      let tentativas = 0;
      const tentar = () => {
        if (callback()) return;
        tentativas += 1;
        if (tentativas >= 12) {
          mostrarToast('Nao foi possivel abrir a origem agora. Tente novamente.', 'erro');
          return;
        }
        setTimeout(tentar, 140);
      };
      if (typeof trocarAba === 'function') trocarAba(aba);
      setTimeout(tentar, 120);
    }

    function editarOrigemObservabilidade(index) {
      if (!podeAlterar('Edicao bloqueada em modo somente leitura')) return;
      const item = itemDetalhe(index);
      if (!item?.origem_aba || !item?.origem_id) {
        mostrarToast('Origem desta linha nao esta disponivel', 'erro');
        return;
      }
      const aba = String(item.origem_aba);
      const id = String(item.origem_id);
      fecharObservabilidadeCard();
      abrirAbaEExecutar(aba, () => {
        if (aba === 'compras' && window.ComprasController?.editar && window.ComprasStore?.getById?.(id)) {
          window.ComprasController.editar(id); return true;
        }
        if (aba === 'despesas' && window.DespesasController?.editar) {
          const existe = window.DespesasController?.getById?.(id);
          if (!existe) {
            window.AppTabRefresh?.requestSync?.('despesas', { immediate: true, prefetch: true });
            return false;
          }
          window.DespesasController.editar(id); return true;
        }
        if (aba === 'vendas' && window.VendasController?.editar && window.VendasStore?.getById?.(id)) {
          window.VendasController.editar(id); return true;
        }
        if (aba === 'estoque' && window.EstoqueController?.editar && window.EstoqueStore?.getById?.(id)) {
          window.EstoqueController.editar(id); return true;
        }
        return false;
      });
    }

    function excluirOrigemObservabilidade(index) {
      if (!podeAlterar('Exclusao bloqueada em modo somente leitura')) return;
      const item = itemDetalhe(index);
      if (!item?.origem_aba || !item?.origem_id) {
        mostrarToast('Origem desta linha nao esta disponivel', 'erro');
        return;
      }
      const aba = String(item.origem_aba);
      const id = String(item.origem_id);
      fecharObservabilidadeCard();
      abrirAbaEExecutar(aba, () => {
        if (aba === 'compras' && window.ComprasController?.excluir && window.ComprasStore?.getById?.(id)) {
          window.ComprasController.excluir(id); return true;
        }
        if (aba === 'despesas' && window.DespesasController?.excluir) {
          const existe = window.DespesasController?.getById?.(id);
          if (!existe) {
            window.AppTabRefresh?.requestSync?.('despesas', { immediate: true, prefetch: true });
            return false;
          }
          window.DespesasController.excluir(id); return true;
        }
        if (aba === 'vendas' && window.VendasController?.excluir && window.VendasStore?.getById?.(id)) {
          window.VendasController.excluir(id); return true;
        }
        if (aba === 'estoque' && window.EstoqueController?.excluir && window.EstoqueStore?.getById?.(id)) {
          window.EstoqueController.excluir(id); return true;
        }
        return false;
      });
    }

    function removerPagamentoObservabilidade(index) {
      if (!podeAlterar('Remocao bloqueada em modo somente leitura')) return;
      const item = itemDetalhe(index);
      const pagamentoId = String(item?.pagamento_id || '').trim();
      if (!pagamentoId) {
        mostrarToast('Pagamento nao encontrado para esta linha', 'erro');
        return;
      }
      if (!confirm('Deseja remover este pagamento?')) return;
      const reabrir = detalheAberto ? { ...detalheAberto } : null;
      window.AppRequest.call('removerPagamento', [pagamentoId], {
        context: 'dashboard.remover_pagamento',
        errorMessage: 'Erro ao remover pagamento'
      }).then(ok => {
        if (!ok) throw new Error('Nao foi possivel remover o pagamento');
        invalidarCacheMeses();
        fecharObservabilidadeCard();
        return atualizar(true).then(resultado => {
          if (!resultado) {
            mostrarToast('Pagamento removido, mas o painel nao pode ser atualizado agora', 'erro');
            return;
          }
          mostrarToast('Pagamento removido e painel atualizado');
          if (reabrir) abrirDetalhes(reabrir.contexto, reabrir.filtro, { force: true });
        });
      }).catch(error => mostrarToast(error?.message || 'Erro ao remover pagamento', 'erro'));
    }

    function extrairMes(valor) {
      const match = String(valor || '').trim().match(/^(\d{4}-\d{2})(?:-\d{2})?/);
      return match?.[1] || '';
    }

    function coletarMesesImpactados() {
      const meses = new Set();
      const visitar = valor => {
        if (!valor) return;
        if (Array.isArray(valor)) { valor.forEach(visitar); return; }
        if (typeof valor === 'string') {
          const mes = extrairMes(valor);
          if (mes) meses.add(mes);
          return;
        }
        if (typeof valor !== 'object') return;
        ['referencia', 'data', 'data_pagamento', 'data_venda', 'data_competencia', 'data_vencimento', 'data_prevista', 'data_prevista_termino', 'comprado_em']
          .forEach(campo => visitar(valor[campo]));
        visitar(valor.parcelas_detalhe);
      };
      Array.from(arguments).forEach(visitar);
      if (!meses.size) meses.add(referenciaAtiva());
      return Array.from(meses);
    }

    function invalidarCacheMeses() {
      limparSnapshots();
      window.AppTabRefresh?.markDirty?.('dashboard');
    }

    function handleCardClick(cardKey) {
      abrirObservabilidadeCard(cardKey);
    }

    function handleCardKeydown(event, cardKey) {
      if (event?.key !== 'Enter' && event?.key !== ' ') return;
      event.preventDefault();
      abrirObservabilidadeCard(cardKey);
    }

    return {
      init,
      atualizar,
      invalidarCacheMeses,
      coletarMesesImpactados,
      abrirDetalhes,
      abrirObservabilidadeCard,
      fecharObservabilidadeCard,
      editarOrigemObservabilidade,
      excluirOrigemObservabilidade,
      removerPagamentoObservabilidade,
      handleCardClick,
      handleCardKeydown
    };
  })();
</script>
