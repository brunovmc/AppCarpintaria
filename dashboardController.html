<script>
  window.DashboardController = (() => {
    let iniciado = false;
    let validacoes = {};
    let despesas = [];
    let despesaEditandoId = null;
    let salvandoDespesa = false;
    let despesaPagamentoId = null;
    let salvandoPagamentoDespesa = false;
    let despesaPagamentoParcelado = false;
    let cardObservabilidadeAberto = '';
    let cardObservabilidadeItens = [];
    let carregandoObservabilidade = false;
    let carregandoDashboard = false;
    let resumoRequestSeq = 0;
    let despesasVisiveis = false;
    let cacheResumoLocal = {};
    let cacheComposicaoLocal = {};
    let cacheDespesasLocal = { ts: 0, data: null };
    let runtimeListenerRegistrado = false;
    let prefetchVizinhoRefTs = {};

    const DASHBOARD_CACHE_TTL_RESUMO_MS = 30000;
    const DASHBOARD_CACHE_TTL_COMPOSICAO_MS = 30000;
    const DASHBOARD_CACHE_TTL_DESPESAS_MS = 30000;
    const DASHBOARD_STORAGE_VERSION = 'v1';
    const DASHBOARD_STORAGE_PREFIX = `app:dash:${DASHBOARD_STORAGE_VERSION}:resumo:`;
    const DASHBOARD_STORAGE_COMP_PREFIX = `app:dash:${DASHBOARD_STORAGE_VERSION}:comp:`;
    const DASHBOARD_PREFETCH_TTL_MS = 120000;
    const DASHBOARD_CARD_DEFINICOES = [
      { key: 'gasto_pago_mes', label: 'Pago no mes', moeda: true },
      { key: 'compromisso_previsto_mes', label: 'Compromissos previstos (mes)', moeda: true },
      { key: 'vendas_no_mes', label: 'Vendas no mes', moeda: true },
      { key: 'recebido_vendas_mes', label: 'Recebido de vendas (mes)', moeda: true },
      { key: 'pendente_total', label: 'Pendente total', moeda: true },
      { key: 'vencido_total', label: 'Vencido', moeda: true },
      { key: 'avencer_7_dias', label: 'A vencer (7 dias)', moeda: true },
      { key: 'valor_estoque_total', label: 'Valor em estoque', moeda: true },
      { key: 'valor_produtos_estoque', label: 'Valor de produtos em estoque', moeda: true },
      { key: 'valor_produtos_producao', label: 'Valor de produtos em producao', moeda: true },
      { key: 'contador_bruno_mes', label: 'BRUNO (pago no mes)', moeda: true },
      { key: 'contador_zizu_mes', label: 'ZIZU (pago no mes)', moeda: true },
      { key: 'contador_investimento_mes', label: 'INVESTIMENTO (pago no mes)', moeda: true },
      { key: 'contador_investimento_acumulado', label: 'INVESTIMENTO (acumulado)', moeda: true }
    ];
    const DASHBOARD_CARD_KEYS_OBSERVABILIDADE = DASHBOARD_CARD_DEFINICOES
      .map(def => String(def.key || '').trim())
      .filter(key => key && key !== 'valor_estoque_total');
    const composicaoInFlight = {};

    function el() {
      return {
        mesReferencia: document.getElementById('dashMesReferencia'),
        btnAtualizar: document.getElementById('btnDashboardAtualizar'),
        ultimaAtualizacao: document.getElementById('dashUltimaAtualizacao'),
        modoSomenteLeitura: document.getElementById('dashModoSomenteLeitura'),
        cards: document.getElementById('dashboardCards'),
        gastoPorTipo: document.getElementById('dashGastoPorTipo'),
        gastoPorCategoria: document.getElementById('dashGastoPorCategoria'),
        gastoPorFornecedor: document.getElementById('dashGastoPorFornecedor'),
        estoquePorTipo: document.getElementById('dashEstoquePorTipo'),
        evolucaoMensal: document.getElementById('dashEvolucaoMensal'),

        listaDespesas: document.getElementById('listaDespesasGerais'),
        btnToggleDespesas: document.getElementById('btnToggleDespesas'),
        formDespesa: document.getElementById('formularioDespesaGeral'),
        despesaFormTitulo: document.getElementById('despesaFormTitulo'),
        btnSalvarDespesa: document.getElementById('btnSalvarDespesaGeral'),

        despesaDescricao: document.getElementById('despesaDescricao'),
        despesaCategoria: document.getElementById('despesaCategoria'),
        despesaFornecedor: document.getElementById('despesaFornecedor'),
        despesaPagoPor: document.getElementById('despesaPagoPor'),
        despesaValorTotal: document.getElementById('despesaValorTotal'),
        despesaDataCompetencia: document.getElementById('despesaDataCompetencia'),
        despesaDataVencimento: document.getElementById('despesaDataVencimento'),
        despesaDataPagamento: document.getElementById('despesaDataPagamento'),
        despesaFormaPagamento: document.getElementById('despesaFormaPagamento'),
        despesaParcelasWrap: document.getElementById('despesaParcelasWrap'),
        despesaParcelas: document.getElementById('despesaParcelas'),
        despesaParcelasDetalheWrap: document.getElementById('despesaParcelasDetalheWrap'),
        despesaParcelasDetalheLista: document.getElementById('despesaParcelasDetalheLista'),
        despesaFixo: document.getElementById('despesaFixo'),
        despesaObservacao: document.getElementById('despesaObservacao'),

        modalPagamentoDespesa: document.getElementById('modalPagamentoDespesa'),
        pagDespesaTitulo: document.getElementById('pagDespesaTitulo'),
        pagDespesaData: document.getElementById('pagDespesaData'),
        pagDespesaValor: document.getElementById('pagDespesaValor'),
        pagDespesaParcelaWrap: document.getElementById('pagDespesaParcelaWrap'),
        pagDespesaParcela: document.getElementById('pagDespesaParcela'),
        pagDespesaForma: document.getElementById('pagDespesaForma'),
        pagDespesaObservacao: document.getElementById('pagDespesaObservacao'),
        btnConfirmarPagDespesa: document.getElementById('btnConfirmarPagDespesa'),

        modalObservabilidadeCard: document.getElementById('modalObservabilidadeCard'),
        obsCardTitulo: document.getElementById('obsCardTitulo'),
        obsCardResumo: document.getElementById('obsCardResumo'),
        obsCardLista: document.getElementById('obsCardLista')
      };
    }

    function getHojeISO() {
      if (window.AppDomainUtils?.getHojeISO) {
        return window.AppDomainUtils.getHojeISO();
      }
      const d = new Date();
      const yyyy = d.getFullYear();
      const mm = String(d.getMonth() + 1).padStart(2, '0');
      const dd = String(d.getDate()).padStart(2, '0');
      return `${yyyy}-${mm}-${dd}`;
    }

    function getMesAtualISO() {
      const d = new Date();
      const yyyy = d.getFullYear();
      const mm = String(d.getMonth() + 1).padStart(2, '0');
      return `${yyyy}-${mm}`;
    }

    function referenciaEhValida(referencia) {
      return /^\d{4}-\d{2}$/.test(String(referencia || '').trim());
    }

    function deslocarReferenciaMes(referencia, delta) {
      const ref = String(referencia || '').trim();
      if (!referenciaEhValida(ref)) return '';
      const [yyyy, mm] = ref.split('-').map(Number);
      const d = new Date(yyyy, mm - 1, 1);
      d.setMonth(d.getMonth() + Number(delta || 0));
      const y2 = d.getFullYear();
      const m2 = String(d.getMonth() + 1).padStart(2, '0');
      return `${y2}-${m2}`;
    }

    function obterJanelaReferencias(referenciaBase) {
      const base = referenciaEhValida(referenciaBase) ? referenciaBase : getMesAtualISO();
      const refs = [];
      for (let i = -3; i <= 3; i++) {
        refs.push(deslocarReferenciaMes(base, i));
      }
      return refs.filter(Boolean);
    }

    function getStorageKeyResumo(referencia) {
      const ref = String(referencia || '').trim();
      if (!referenciaEhValida(ref)) return '';
      return `${DASHBOARD_STORAGE_PREFIX}${ref}`;
    }

    function getStorageKeyComposicao(referencia, cardKey) {
      const ref = String(referencia || '').trim();
      const card = String(cardKey || '').trim();
      if (!referenciaEhValida(ref) || !card) return '';
      return `${DASHBOARD_STORAGE_COMP_PREFIX}${ref}:${card}`;
    }

    function getCacheKeyComposicao(referencia, cardKey) {
      const ref = String(referencia || '').trim();
      const card = String(cardKey || '').trim();
      if (!referenciaEhValida(ref) || !card) return '';
      return `${ref}::${card}`;
    }

    function storageDisponivel() {
      try {
        if (typeof window === 'undefined' || !window.localStorage) return false;
        const key = `${DASHBOARD_STORAGE_PREFIX}__probe`;
        window.localStorage.setItem(key, '1');
        window.localStorage.removeItem(key);
        return true;
      } catch (error) {
        return false;
      }
    }

    function storageLerJson(key) {
      try {
        if (!key || !storageDisponivel()) return null;
        const raw = window.localStorage.getItem(key);
        if (!raw) return null;
        return JSON.parse(raw);
      } catch (error) {
        return null;
      }
    }

    function storageSalvarJson(key, value) {
      try {
        if (!key || !storageDisponivel()) return false;
        window.localStorage.setItem(key, JSON.stringify(value || {}));
        return true;
      } catch (error) {
        return false;
      }
    }

    function storageRemover(key) {
      try {
        if (!key || !storageDisponivel()) return;
        window.localStorage.removeItem(key);
      } catch (error) {
        // sem acao
      }
    }

    function gerarResumoHash(resumo) {
      try {
        return JSON.stringify(resumo || {});
      } catch (error) {
        return '';
      }
    }

    function lerResumoPersistido(referencia) {
      const key = getStorageKeyResumo(referencia);
      if (!key) return null;
      const payload = storageLerJson(key);
      if (!payload || typeof payload !== 'object') return null;
      return {
        resumo: payload.resumo || {},
        hash: String(payload.hash || ''),
        updatedAt: Number(payload.updatedAt || 0)
      };
    }

    function salvarResumoPersistido(referencia, resumo, updatedAt, hashForcado = '') {
      const key = getStorageKeyResumo(referencia);
      if (!key) return;
      const hash = String(hashForcado || gerarResumoHash(resumo));
      storageSalvarJson(key, {
        referencia: String(referencia || '').trim(),
        updatedAt: Number(updatedAt || Date.now()),
        hash,
        resumo: resumo || {}
      });
    }

    function lerComposicaoPersistida(referencia, cardKey) {
      const key = getStorageKeyComposicao(referencia, cardKey);
      if (!key) return null;
      const payload = storageLerJson(key);
      if (!payload || typeof payload !== 'object') return null;
      return {
        data: payload.data || {},
        hash: String(payload.hash || ''),
        updatedAt: Number(payload.updatedAt || 0)
      };
    }

    function composicaoPersistidaEhFresca(entry) {
      if (!entry || typeof entry !== 'object') return false;
      const ts = Number(entry.updatedAt || 0);
      if (!ts) return false;
      return (Date.now() - ts) <= DASHBOARD_CACHE_TTL_COMPOSICAO_MS;
    }

    function salvarComposicaoPersistida(referencia, cardKey, data, updatedAt, hashForcado = '') {
      const key = getStorageKeyComposicao(referencia, cardKey);
      if (!key) return;
      const hash = String(hashForcado || gerarResumoHash(data));
      storageSalvarJson(key, {
        referencia: String(referencia || '').trim(),
        card: String(cardKey || '').trim(),
        updatedAt: Number(updatedAt || Date.now()),
        hash,
        data: data || {}
      });
    }

    function lerComposicaoCacheLocal(referencia, cardKey) {
      const cacheKey = getCacheKeyComposicao(referencia, cardKey);
      if (!cacheKey) return null;
      const entry = cacheComposicaoLocal[cacheKey];
      if (!entry) return null;
      if ((Date.now() - Number(entry.ts || 0)) > DASHBOARD_CACHE_TTL_COMPOSICAO_MS) return null;
      return entry.data || null;
    }

    function salvarComposicaoCacheLocal(referencia, cardKey, data) {
      const cacheKey = getCacheKeyComposicao(referencia, cardKey);
      if (!cacheKey) return;
      cacheComposicaoLocal[cacheKey] = {
        ts: Date.now(),
        data: data || {}
      };
    }

    function obterEstadoCacheComposicao(referencia, cardKey) {
      const ref = String(referencia || '').trim();
      const key = String(cardKey || '').trim();
      if (!referenciaEhValida(ref) || !key) {
        return {
          payloadCache: null,
          cacheFresco: false,
          haviaCache: false
        };
      }

      const cacheSessao = lerComposicaoCacheLocal(ref, key);
      const cachePersistido = lerComposicaoPersistida(ref, key);
      const payloadCache = cacheSessao || cachePersistido?.data || null;
      const cachePersistidoFresco = composicaoPersistidaEhFresca(cachePersistido);
      const cacheFresco = !!cacheSessao || cachePersistidoFresco;

      return {
        payloadCache,
        cacheFresco,
        haviaCache: !!payloadCache
      };
    }

    function getComposicaoInFlightKey(referencia, cardKey) {
      const ref = String(referencia || '').trim();
      const key = String(cardKey || '').trim();
      if (!referenciaEhValida(ref) || !key) return '';
      return `${ref}::${key}`;
    }

    function carregarComposicaoCardRemota(referencia, cardKey) {
      const ref = String(referencia || '').trim();
      const key = String(cardKey || '').trim();
      const inflightKey = getComposicaoInFlightKey(ref, key);
      if (!inflightKey) {
        return Promise.reject(new Error('Referencia de composicao invalida'));
      }
      if (!window.google?.script?.run) {
        return Promise.reject(new Error('Sem conexao com backend'));
      }

      const existente = composicaoInFlight[inflightKey];
      if (existente) return existente;

      const promise = new Promise((resolve, reject) => {
        window.AppRequest.runner()
          .withSuccessHandler(payload => {
            const data = payload || {};
            const ts = Date.now();
            const hashNovo = gerarResumoHash(data);
            salvarComposicaoCacheLocal(ref, key, data);
            salvarComposicaoPersistida(ref, key, data, ts, hashNovo);
            limparComposicaoPersistidaForaDaJanela(ref);
            resolve(data);
          })
          .withFailureHandler(err => {
            reject(err || new Error('Falha ao carregar composicao do card'));
          })
          .obterComposicaoCardDashboardFinanceiro(ref, key);
      });

      composicaoInFlight[inflightKey] = promise;
      const limparInFlight = () => {
        if (composicaoInFlight[inflightKey] === promise) {
          delete composicaoInFlight[inflightKey];
        }
      };
      promise.then(limparInFlight).catch(limparInFlight);
      return promise;
    }

    function prefetchComposicoesCardsDashboard(referencia) {
      const ref = String(referencia || '').trim();
      if (!referenciaEhValida(ref)) return;
      if (!window.google?.script?.run) return;

      DASHBOARD_CARD_KEYS_OBSERVABILIDADE.forEach(cardKey => {
        const estado = obterEstadoCacheComposicao(ref, cardKey);
        if (estado.cacheFresco) return;
        carregarComposicaoCardRemota(ref, cardKey).catch(() => {
          // Prefetch em background: sem toasts.
        });
      });
    }

    function limparResumoPersistidoForaDaJanela(referenciaBase) {
      if (!storageDisponivel()) return;
      const permitidas = new Set(obterJanelaReferencias(referenciaBase).map(r => getStorageKeyResumo(r)).filter(Boolean));
      try {
        const keys = [];
        for (let i = 0; i < window.localStorage.length; i++) {
          const key = window.localStorage.key(i);
          if (!key) continue;
          if (key.startsWith(DASHBOARD_STORAGE_PREFIX)) keys.push(key);
        }
        keys.forEach(key => {
          if (!permitidas.has(key)) storageRemover(key);
        });
      } catch (error) {
        // sem acao
      }
    }

    function limparComposicaoPersistidaForaDaJanela(referenciaBase) {
      if (!storageDisponivel()) return;
      const refsPermitidas = new Set(obterJanelaReferencias(referenciaBase).map(r => String(r || '').trim()));
      try {
        const keys = [];
        for (let i = 0; i < window.localStorage.length; i++) {
          const key = window.localStorage.key(i);
          if (!key) continue;
          if (key.startsWith(DASHBOARD_STORAGE_COMP_PREFIX)) keys.push(key);
        }
        keys.forEach(key => {
          const semPrefixo = key.slice(DASHBOARD_STORAGE_COMP_PREFIX.length);
          const ref = semPrefixo.split(':')[0] || '';
          if (!refsPermitidas.has(ref)) storageRemover(key);
        });
      } catch (error) {
        // sem acao
      }
    }

    function limparComposicaoPersistidaMes(referencia) {
      const ref = String(referencia || '').trim();
      if (!referenciaEhValida(ref) || !storageDisponivel()) return;
      try {
        const keys = [];
        const prefixoRef = `${DASHBOARD_STORAGE_COMP_PREFIX}${ref}:`;
        for (let i = 0; i < window.localStorage.length; i++) {
          const key = window.localStorage.key(i);
          if (!key) continue;
          if (key.startsWith(prefixoRef)) keys.push(key);
        }
        keys.forEach(storageRemover);
      } catch (error) {
        // sem acao
      }
    }

    function formatarDataHora(ts) {
      const n = Number(ts || 0);
      if (!n) return '-';
      const d = new Date(n);
      if (Number.isNaN(d.getTime())) return '-';
      return d.toLocaleString('pt-BR', {
        day: '2-digit',
        month: '2-digit',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    function atualizarTextoUltimaAtualizacao(ts) {
      const f = el();
      if (!f.ultimaAtualizacao) return;
      f.ultimaAtualizacao.textContent = `Ultima atualizacao: ${formatarDataHora(ts)}`;
    }

    function atualizarIndicadorSomenteLeitura() {
      const f = el();
      if (!f.modoSomenteLeitura) return;
      const ativo = !!window.AppRuntime?.isReadOnly?.();
      f.modoSomenteLeitura.classList.toggle('hidden', !ativo);
    }

    function setModoSomenteLeitura(ativo, motivo = '') {
      if (window.AppRuntime?.setReadOnly) {
        window.AppRuntime.setReadOnly(!!ativo, motivo);
      }
      atualizarIndicadorSomenteLeitura();
    }

    function registrarListenerRuntimeSeNecessario() {
      if (runtimeListenerRegistrado) return;
      if (typeof window === 'undefined' || typeof window.addEventListener !== 'function') return;
      window.addEventListener('app:runtime:readonly-changed', () => {
        atualizarIndicadorSomenteLeitura();
      });
      runtimeListenerRegistrado = true;
    }

    function podeAlterarDados(contexto = 'Operacao') {
      if (window.AppDomainUtils?.ensureWritable) {
        return window.AppDomainUtils.ensureWritable(contexto);
      }
      return !!window.AppRuntime?.ensureWritable
        ? window.AppRuntime.ensureWritable(contexto)
        : true;
    }

    function getMesReferenciaAtiva() {
      const ref = String(el().mesReferencia?.value || getMesAtualISO()).trim();
      return referenciaEhValida(ref) ? ref : getMesAtualISO();
    }

    function extrairMesReferencia(valor) {
      const s = String(valor || '').trim();
      if (!s) return '';
      if (/^\d{4}-\d{2}$/.test(s)) return s;
      const match = s.match(/^(\d{4}-\d{2})-\d{2}/);
      if (match && match[1]) return match[1];
      if (s.includes('T')) {
        const m2 = s.split('T')[0].match(/^(\d{4}-\d{2})-\d{2}/);
        if (m2 && m2[1]) return m2[1];
      }
      return '';
    }

    function coletarMesesImpactados() {
      const refs = new Set();

      const addMes = valor => {
        const ref = extrairMesReferencia(valor);
        if (referenciaEhValida(ref)) refs.add(ref);
      };

      const percorrer = valor => {
        if (!valor) return;
        if (Array.isArray(valor)) {
          valor.forEach(percorrer);
          return;
        }
        if (typeof valor === 'string') {
          addMes(valor);
          return;
        }
        if (typeof valor !== 'object') return;

        addMes(valor.referencia);
        addMes(valor.data);
        addMes(valor.data_pagamento);
        addMes(valor.data_venda);
        addMes(valor.data_competencia);
        addMes(valor.data_vencimento);
        addMes(valor.data_prevista);
        addMes(valor.data_prevista_termino);
        addMes(valor.data_ultimo_pagamento);
        addMes(valor.comprado_em);

        if (Array.isArray(valor.parcelas_detalhe)) {
          valor.parcelas_detalhe.forEach(p => {
            addMes(p?.data_prevista);
            addMes(p?.data);
            addMes(p?.data_pagamento);
          });
        }
      };

      for (let i = 0; i < arguments.length; i++) {
        percorrer(arguments[i]);
      }

      if (refs.size === 0) {
        refs.add(getMesReferenciaAtiva());
      }
      return Array.from(refs);
    }

    function invalidarCacheMeses(referencias) {
      const lista = (Array.isArray(referencias) ? referencias : [])
        .map(r => String(r || '').trim())
        .filter(referenciaEhValida);
      const refs = lista.length > 0 ? [...new Set(lista)] : [getMesReferenciaAtiva()];
      if (window.AppTabRefresh?.markDirty) {
        window.AppTabRefresh.markDirty('dashboard');
      }

      refs.forEach(ref => {
        delete cacheResumoLocal[ref];
        const prefixoCache = `${ref}::`;
        Object.keys(cacheComposicaoLocal).forEach(key => {
          if (key.startsWith(prefixoCache)) delete cacheComposicaoLocal[key];
        });
        storageRemover(getStorageKeyResumo(ref));
        limparComposicaoPersistidaMes(ref);
      });
    }

    function limparCacheDashboardLocal(referencias = []) {
      cacheDespesasLocal = { ts: 0, data: null };
      const refs = (Array.isArray(referencias) && referencias.length > 0)
        ? referencias
        : obterJanelaReferencias(getMesReferenciaAtiva());
      invalidarCacheMeses(refs);
    }

    function lerResumoCacheLocal(referencia) {
      const ref = String(referencia || '').trim();
      if (!ref) return null;
      const entry = cacheResumoLocal[ref];
      if (!entry) return null;
      if ((Date.now() - Number(entry.ts || 0)) > DASHBOARD_CACHE_TTL_RESUMO_MS) return null;
      return entry.data || null;
    }

    function salvarResumoCacheLocal(referencia, resumo) {
      const ref = String(referencia || '').trim();
      if (!ref) return;
      cacheResumoLocal[ref] = {
        ts: Date.now(),
        data: resumo || {}
      };
    }

    function lerDespesasCacheLocal() {
      if (!cacheDespesasLocal?.data) return null;
      if ((Date.now() - Number(cacheDespesasLocal.ts || 0)) > DASHBOARD_CACHE_TTL_DESPESAS_MS) return null;
      return cacheDespesasLocal.data;
    }

    function salvarDespesasCacheLocal(lista) {
      cacheDespesasLocal = {
        ts: Date.now(),
        data: Array.isArray(lista) ? lista : []
      };
    }

    function setCarregandoDashboard(ativo) {
      carregandoDashboard = !!ativo;
      const f = el();
      if (!f.btnAtualizar) return;
      f.btnAtualizar.disabled = carregandoDashboard;
      if (window.AppLoading?.setButtonLoading) {
        window.AppLoading.setButtonLoading(
          f.btnAtualizar,
          carregandoDashboard,
          'Atualizar',
          'Atualizando'
        );
      } else {
        f.btnAtualizar.textContent = carregandoDashboard ? 'Atualizando...' : 'Atualizar';
      }
    }

    function parseNumeroInput(valor) {
      if (window.AppDomainUtils?.parseNumeroZero) {
        return window.AppDomainUtils.parseNumeroZero(valor);
      }
      const s = String(valor ?? '').trim();
      if (!s) return 0;
      const n = Number(s.replace(',', '.'));
      return isNaN(n) ? 0 : n;
    }

    function parseBooleanInput(valor) {
      const s = String(valor ?? '').trim().toLowerCase();
      return s === 'true' || s === '1' || s === 'sim' || s === 'yes';
    }

    function formatarMoeda(valor) {
      const n = Number(valor || 0);
      const seguro = isNaN(n) ? 0 : n;
      return `R$ ${seguro.toFixed(2)}`;
    }

    function formatarNumeroInteiro(valor) {
      const n = Number(valor || 0);
      const seguro = isNaN(n) ? 0 : n;
      return `${Math.round(seguro)}`;
    }

    function formaExigeParcelas(valor) {
      if (window.AppDomainUtils?.formaExigeParcelas) {
        return window.AppDomainUtils.formaExigeParcelas(valor);
      }
      return false;
    }

    function getDataBaseParcelasDespesa() {
      const f = el();
      return String(f.despesaDataPagamento?.value || f.despesaDataCompetencia?.value || getHojeISO()).trim();
    }

    function gerarParcelasPadrao(valorTotal, parcelas, dataBase) {
      const total = Number(valorTotal || 0);
      const qtd = Math.max(1, Math.floor(Number(parcelas || 1)));
      const inicioRaw = String(dataBase || getHojeISO()).trim();
      const inicio = /^\d{4}-\d{2}-\d{2}$/.test(inicioRaw) ? new Date(`${inicioRaw}T00:00:00`) : new Date();
      const base = qtd > 0 ? Number((total / qtd).toFixed(2)) : 0;
      const lista = [];
      for (let i = 0; i < qtd; i++) {
        const d = new Date(inicio);
        d.setMonth(d.getMonth() + i);
        const yyyy = d.getFullYear();
        const mm = String(d.getMonth() + 1).padStart(2, '0');
        const dd = String(d.getDate()).padStart(2, '0');
        const valor = i === qtd - 1
          ? Number((total - (base * (qtd - 1))).toFixed(2))
          : base;
        lista.push({
          numero: i + 1,
          data: `${yyyy}-${mm}-${dd}`,
          valor: Number(valor.toFixed(2))
        });
      }
      return lista;
    }

    function lerParcelasDetalheDespesa() {
      const f = el();
      if (!f.despesaParcelasDetalheLista) return [];
      const linhas = [...f.despesaParcelasDetalheLista.querySelectorAll('.parcela-detalhe-linha')];
      return linhas.map((linha, idx) => ({
        numero: idx + 1,
        data: String(linha.querySelector('input[data-campo="data"]')?.value || '').trim(),
        valor: parseNumeroInput(linha.querySelector('input[data-campo="valor"]')?.value || '')
      }));
    }

    function renderParcelasDetalheDespesa(listaForcada) {
      const f = el();
      if (!f.despesaParcelasDetalheWrap || !f.despesaParcelasDetalheLista) return;

      const exibir = formaExigeParcelas(String(f.despesaFormaPagamento?.value || '').trim());
      if (!exibir) {
        f.despesaParcelasDetalheWrap.classList.add('hidden');
        f.despesaParcelasDetalheLista.innerHTML = '';
        return;
      }

      const parcelas = Math.max(1, Math.floor(parseNumeroInput(f.despesaParcelas?.value) || 1));
      const valorTotal = parseNumeroInput(f.despesaValorTotal?.value || 0);
      const dataBase = getDataBaseParcelasDespesa();
      const atuais = Array.isArray(listaForcada) ? listaForcada : lerParcelasDetalheDespesa();
      const usarAtuais = atuais.length === parcelas && atuais.every(p => String(p.data || '').trim() !== '');
      const lista = usarAtuais ? atuais : gerarParcelasPadrao(valorTotal, parcelas, dataBase);

      f.despesaParcelasDetalheLista.innerHTML = lista.map((p, idx) => `
        <div class="parcela-detalhe-linha">
          <span class="parcela-detalhe-num">#${idx + 1}</span>
          <input type="date" data-campo="data" value="${escapeHtml(p.data || '')}">
          <input type="number" data-campo="valor" min="0" step="0.01" value="${Number(p.valor || 0).toFixed(2)}">
        </div>
      `).join('');
      f.despesaParcelasDetalheWrap.classList.remove('hidden');
    }

    function escapeHtml(valor) {
      return String(valor ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function renderSelect(selectEl, valores, placeholder = 'Selecione') {
      if (!selectEl || selectEl.tagName !== 'SELECT') return;

      const lista = (Array.isArray(valores) ? valores : [])
        .map(v => String(v || '').trim())
        .filter(v => v !== '');
      const atual = String(selectEl.value || '').trim().toUpperCase();

      selectEl.innerHTML = '';
      const o0 = document.createElement('option');
      o0.value = '';
      o0.textContent = placeholder;
      selectEl.appendChild(o0);

      lista.forEach(v => {
        const o = document.createElement('option');
        o.value = v;
        o.textContent = v;
        selectEl.appendChild(o);
      });

      const match = [...selectEl.options].find(o => String(o.value || '').trim().toUpperCase() === atual);
      selectEl.value = match ? match.value : '';
    }

    function carregarValidacoes(onDone) {
      const loader = window.AppValidacoes?.get
        ? window.AppValidacoes.get({ maxAgeMs: 1000 * 60 * 60 * 12 })
        : Promise.reject(new Error('cache de validacoes indisponivel'));

      loader
        .then(({ data }) => {
          validacoes = data || {};
          validacoes.categoriasDespesas ||= [];
          validacoes.fornecedores ||= [];
          validacoes.formasPagamento ||= [];
          validacoes.pagosPor ||= [];

          const f = el();
          renderSelect(f.despesaCategoria, validacoes.categoriasDespesas);
          renderSelect(f.despesaFornecedor, validacoes.fornecedores);
          renderSelect(f.despesaPagoPor, validacoes.pagosPor);
          renderSelect(f.despesaFormaPagamento, validacoes.formasPagamento);
          renderSelect(f.pagDespesaForma, validacoes.formasPagamento);
          handleDespesaFormaPagamentoChange();

          if (typeof onDone === 'function') onDone();
        })
        .catch(() => {
          mostrarToast('Falha ao carregar validacoes', 'erro');
          if (typeof onDone === 'function') onDone();
        });
    }

    function init() {
      registrarListenerRuntimeSeNecessario();
      atualizarIndicadorSomenteLeitura();
      bindEventosDashboard();

      if (!iniciado) {
        const f = el();
        if (f.mesReferencia && !String(f.mesReferencia.value || '').trim()) {
          f.mesReferencia.value = getMesAtualISO();
        }
        atualizar(false);
        iniciado = true;
        return;
      }

      atualizar(false);
    }

    function bindEventosDashboard() {
      const f = el();
      if (!f.mesReferencia) return;
      if (f.mesReferencia.dataset.boundAutoRefresh === '1') return;
      f.mesReferencia.dataset.boundAutoRefresh = '1';

      const onMesChange = () => {
        const ref = String(f.mesReferencia?.value || '').trim();
        if (!referenciaEhValida(ref)) return;
        atualizar(false);
      };

      f.mesReferencia.addEventListener('change', onMesChange);
      f.mesReferencia.addEventListener('input', onMesChange);
    }

    function setDespesasVisiveis(visivel) {
      despesasVisiveis = !!visivel;
      const f = el();
      if (f.listaDespesas) {
        f.listaDespesas.classList.toggle('hidden', !despesasVisiveis);
      }
      if (f.btnToggleDespesas) {
        f.btnToggleDespesas.textContent = despesasVisiveis ? 'Ocultar despesas' : 'Ver despesas';
        f.btnToggleDespesas.setAttribute('aria-expanded', despesasVisiveis ? 'true' : 'false');
      }
    }

    function toggleDespesas() {
      setDespesasVisiveis(!despesasVisiveis);
    }

    function renderListaAgregada(container, itens) {
      if (!container) return;
      const lista = Array.isArray(itens) ? itens : [];
      if (lista.length === 0) {
        container.innerHTML = '<p class="dash-empty">Sem dados no periodo.</p>';
        return;
      }

      container.innerHTML = lista.map(i => `
        <div class="dash-lista-linha">
          <span>${escapeHtml(i.label || '-')}</span>
          <strong>${formatarMoeda(i.valor || 0)}</strong>
        </div>
      `).join('');
    }

    function renderEvolucaoMensal(container, itens) {
      if (!container) return;
      const lista = Array.isArray(itens) ? itens : [];
      if (lista.length === 0) {
        container.innerHTML = '<p class="dash-empty">Sem dados de pagamentos.</p>';
        return;
      }

      container.innerHTML = lista.map(i => `
        <div class="dash-lista-linha">
          <span>${escapeHtml(i.mes || '-')}</span>
          <strong>${formatarMoeda(i.valor || 0)}</strong>
        </div>
      `).join('');
    }

    function renderCards(cards) {
      const f = el();
      if (!f.cards) return;
      const c = cards || {};
      const definicoes = DASHBOARD_CARD_DEFINICOES.map(def => ({
        ...def,
        valor: c?.[def.key] || 0
      }));

      f.cards.innerHTML = definicoes.map(def => `
        <div
          class="dash-card dash-card-click card-ficha"
          role="button"
          tabindex="0"
          onclick="DashboardController.handleCardClick('${escapeHtml(def.key)}')"
          onkeydown="DashboardController.handleCardKeydown(event, '${escapeHtml(def.key)}')"
        >
          <div class="card-ficha-topo dash-card-topo">${escapeHtml(def.label)}</div>
          <div class="card-ficha-corpo dash-card-corpo">
            <div class="dash-card-valor">${def.moeda ? formatarMoeda(def.valor) : formatarNumeroInteiro(def.valor)}</div>
          </div>
        </div>
      `).join('');
    }

    function renderResumoCompleto(resumo) {
      const f = el();
      const data = resumo || {};
      renderCards(data?.cards || {});
      renderListaAgregada(f.gastoPorTipo, data?.agregados?.gasto_por_tipo);
      renderListaAgregada(f.gastoPorCategoria, data?.agregados?.gasto_por_categoria);
      renderListaAgregada(f.gastoPorFornecedor, data?.agregados?.gasto_por_fornecedor);
      renderListaAgregada(f.estoquePorTipo, data?.agregados?.valor_estoque_por_tipo);
      renderEvolucaoMensal(f.evolucaoMensal, data?.evolucao_mensal);
    }

    function devePrefetchResumoVizinho(referencia) {
      const ref = String(referencia || '').trim();
      if (!referenciaEhValida(ref)) return false;
      const now = Date.now();
      const last = Number(prefetchVizinhoRefTs[ref] || 0);
      if ((now - last) < DASHBOARD_PREFETCH_TTL_MS) return false;
      prefetchVizinhoRefTs[ref] = now;
      return true;
    }

    function prefetchResumosVizinhos(referenciaBase) {
      const refs = obterJanelaReferencias(referenciaBase);
      refs.forEach(ref => {
        if (ref === referenciaBase) return;
        if (!devePrefetchResumoVizinho(ref)) return;

        window.AppRequest.runner()
          .withSuccessHandler(resumo => {
            const resumoSeguro = resumo || {};
            const hash = gerarResumoHash(resumoSeguro);
            salvarResumoCacheLocal(ref, resumoSeguro);
            salvarResumoPersistido(ref, resumoSeguro, Date.now(), hash);
          })
          .withFailureHandler(() => {
            // prefetch nao deve poluir UX
          })
          .obterResumoDashboardFinanceiro(ref, false);
      });
    }

    function carregarResumo(forcarRecarregar = false, onDone) {
      const requestSeq = ++resumoRequestSeq;
      const f = el();
      const referencia = String(f.mesReferencia?.value || getMesAtualISO()).trim() || getMesAtualISO();
      const refValida = referenciaEhValida(referencia) ? referencia : getMesAtualISO();
      const cacheSessao = !forcarRecarregar ? lerResumoCacheLocal(refValida) : null;
      const cachePersistido = !forcarRecarregar ? lerResumoPersistido(refValida) : null;
      const hadCache = !!cacheSessao || !!cachePersistido;
      const resumoCache = cacheSessao || cachePersistido?.resumo || null;
      const hashCache = cachePersistido?.hash || gerarResumoHash(resumoCache || {});

      if (resumoCache) {
        renderResumoCompleto(resumoCache);
        atualizarTextoUltimaAtualizacao(cachePersistido?.updatedAt || Date.now());
      } else {
        atualizarTextoUltimaAtualizacao(0);
      }

      window.AppRequest.runner()
        .withSuccessHandler(resumo => {
          if (requestSeq !== resumoRequestSeq) return;

          const resumoSeguro = resumo || {};
          const hashNovo = gerarResumoHash(resumoSeguro);
          const mudou = !!forcarRecarregar || !hadCache || hashNovo !== hashCache;
          const tsAtualizacao = Date.now();

          salvarResumoCacheLocal(refValida, resumoSeguro);
          salvarResumoPersistido(refValida, resumoSeguro, tsAtualizacao, hashNovo);
          limparResumoPersistidoForaDaJanela(refValida);
          limparComposicaoPersistidaForaDaJanela(refValida);
          prefetchResumosVizinhos(refValida);
          prefetchComposicoesCardsDashboard(refValida);

          if (mudou) {
            renderResumoCompleto(resumoSeguro);
          }
          atualizarTextoUltimaAtualizacao(tsAtualizacao);
          setModoSomenteLeitura(false);
          if (window.AppTabRefresh?.clearDirty) {
            window.AppTabRefresh.clearDirty('dashboard');
          }
          if (typeof onDone === 'function') onDone();
        })
        .withFailureHandler(() => {
          if (requestSeq !== resumoRequestSeq) return;

          setModoSomenteLeitura(true, 'Sem conexao com backend - modo somente leitura');
          mostrarToast('Erro ao carregar dashboard', 'erro');
          if (hadCache) {
            mostrarToast('Exibindo ultimo snapshot em cache', 'erro');
          }
          if (typeof onDone === 'function') onDone();
        })
        .obterResumoDashboardFinanceiro(refValida, !!forcarRecarregar);

      return requestSeq;
    }

    function atualizar(forcarRecarregar = false, onDone) {
      setCarregandoDashboard(true);
      const requestSeq = carregarResumo(!!forcarRecarregar, () => {
        if (requestSeq !== resumoRequestSeq) return;
        setCarregandoDashboard(false);
        if (typeof onDone === 'function') onDone();
      });
    }

    function handleCardKeydown(event, cardKey) {
      const tecla = String(event?.key || '').toLowerCase();
      if (tecla !== 'enter' && tecla !== ' ' && tecla !== 'spacebar') return;
      if (event?.preventDefault) event.preventDefault();
      handleCardClick(cardKey);
    }

    function handleCardClick(cardKey) {
      const key = String(cardKey || '').trim();
      if (!key) return;
      window.AppDiag?.mark?.('dashboard.card.click', {
        card_key: key
      });
      if (key === 'valor_estoque_total') {
        if (typeof window.trocarAba === 'function') {
          window.trocarAba('estoque');
        }
        return;
      }
      abrirObservabilidadeCard(key);
    }

    function renderObservabilidadeCard(payload, fallbackCardKey) {
      const f = el();
      if (!f.obsCardLista || !f.obsCardResumo || !f.obsCardTitulo) return;

      const p = payload || {};
      const cardLabel = String(p.card_label || fallbackCardKey || 'Card').trim() || 'Card';
      const referencia = String(p.referencia || '').trim();
      const campoValor = String(p.campo_valor || 'valor').trim() || 'valor';
      const total = Number(p.total || 0);
      const totalItens = Number(p.total_itens || 0);

      const totalFmt = campoValor === 'quantidade_linhas'
        ? formatarNumeroInteiro(total)
        : formatarMoeda(total);

      f.obsCardTitulo.textContent = cardLabel;
      f.obsCardResumo.innerHTML = `
        <div class="card card-ficha dash-obs-summary-card">
          <div class="card-ficha-topo dash-obs-item-topo">Resumo do card</div>
          <div class="card-ficha-corpo dash-obs-summary-body">
            <div class="dash-obs-summary-line"><strong>Total:</strong> ${escapeHtml(totalFmt)}</div>
            <div class="dash-obs-summary-line"><strong>Itens:</strong> ${formatarNumeroInteiro(totalItens)}</div>
            <div class="dash-obs-summary-line"><strong>Referencia:</strong> ${escapeHtml(referencia || '-')}</div>
          </div>
        </div>
      `;

      cardObservabilidadeItens = Array.isArray(p.itens) ? p.itens : [];
      if (cardObservabilidadeItens.length === 0) {
        f.obsCardLista.innerHTML = '<p class="dash-empty">Sem composicao para este card no periodo.</p>';
        return;
      }

      f.obsCardLista.innerHTML = cardObservabilidadeItens.map((item, idx) => {
        const ehContagem = !!item.eh_contagem || campoValor === 'quantidade_linhas';
        const valorBruto = ehContagem ? Number(item[campoValor] || 0) : Number(item.valor || 0);
        const valorFmt = ehContagem ? formatarNumeroInteiro(valorBruto) : formatarMoeda(valorBruto);
        const detalhes = [
          String(item.detalhe || '').trim(),
          String(item.data || '').trim() ? `Data: ${String(item.data || '').trim()}` : ''
        ].filter(Boolean).join(' | ');

        const podeEditar = !!item.pode_editar_origem && !!item.origem_id && !!item.origem_aba;
        const podeExcluir = !!item.pode_excluir_origem && !!item.origem_id && !!item.origem_aba;
        const podeRemoverPagamento = !!item.pode_remover_pagamento && !!item.pagamento_id;

        return `
          <div class="card card-ficha dash-obs-item">
            <div class="card-ficha-topo dash-obs-item-topo">${escapeHtml(String(item.titulo || '-'))}</div>
            <div class="card-ficha-corpo dash-obs-item-corpo">
              <div class="dash-obs-item-main">
                <div class="dash-obs-item-detalhe">${escapeHtml(detalhes || '-')}</div>
              </div>
              <div class="dash-obs-item-right">
                <div class="dash-obs-item-valor">${escapeHtml(valorFmt)}</div>
                <div class="dash-obs-item-acoes">
                  ${podeEditar ? `<button onclick="DashboardController.editarOrigemObservabilidade(${idx})">Editar</button>` : ''}
                  ${podeExcluir ? `<button onclick="DashboardController.excluirOrigemObservabilidade(${idx})">Excluir</button>` : ''}
                  ${podeRemoverPagamento ? `<button onclick="DashboardController.removerPagamentoObservabilidade(${idx})">Remover pagamento</button>` : ''}
                </div>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    function abrirObservabilidadeCard(cardKey) {
      if (carregandoObservabilidade) {
        window.AppDiag?.mark?.('dashboard.obs.open.skipped_loading', {
          card_key: String(cardKey || '').trim()
        });
        return;
      }

      const key = String(cardKey || '').trim();
      if (!key) return;
      window.AppDiag?.mark?.('dashboard.obs.open.request', {
        card_key: key
      });
      cardObservabilidadeAberto = key;

      const f = el();
      if (!f.modalObservabilidadeCard || !f.obsCardLista || !f.obsCardResumo || !f.obsCardTitulo) return;

      f.modalObservabilidadeCard.classList.remove('hidden');
      window.AppDiag?.mark?.('dashboard.obs.modal.opened', {
        card_key: key
      });
      const referencia = String(f.mesReferencia?.value || getMesAtualISO()).trim() || getMesAtualISO();
      const estadoCache = obterEstadoCacheComposicao(referencia, key);
      const payloadCache = estadoCache.payloadCache;
      const cacheFresco = estadoCache.cacheFresco;
      const haviaCache = estadoCache.haviaCache;

      if (payloadCache) {
        renderObservabilidadeCard(payloadCache, key);
        setModoSomenteLeitura(false);
        window.AppDiag?.mark?.('dashboard.obs.cache.rendered', {
          card_key: key,
          cache_fresh: !!cacheFresco
        });
      }

      if (haviaCache && cacheFresco) {
        window.AppDiag?.mark?.('dashboard.obs.open.done_cache_only', {
          card_key: key
        });
        return;
      }

      if (!haviaCache) {
        f.obsCardTitulo.textContent = 'Buscando dados';
        const loadingHtml = window.AppLoading?.inlineHtml
          ? window.AppLoading.inlineHtml('Carregando')
          : 'Carregando...';
        f.obsCardResumo.innerHTML = `<span>${loadingHtml}</span>`;
        f.obsCardLista.innerHTML = `<p class="dash-empty">${loadingHtml}</p>`;
      }

      carregandoObservabilidade = true;
      window.AppDiag?.mark?.('dashboard.obs.rpc.start', {
        card_key: key
      });
      carregarComposicaoCardRemota(referencia, key)
        .then(data => {
          carregandoObservabilidade = false;
          setModoSomenteLeitura(false);
          renderObservabilidadeCard(data, key);
          window.AppDiag?.mark?.('dashboard.obs.rpc.success', {
            card_key: key,
            itens: Array.isArray(data?.itens) ? data.itens.length : 0
          });
        })
        .catch(err => {
          carregandoObservabilidade = false;
          window.AppDiag?.mark?.('dashboard.obs.rpc.failure', {
            card_key: key,
            message: String(err?.message || '')
          }, true);
          if (haviaCache) {
            setModoSomenteLeitura(true, 'Sem conexao com backend - exibindo cache local');
            mostrarToast('Exibindo ultimo snapshot em cache', 'erro');
            return;
          }
          f.obsCardTitulo.textContent = 'Buscando dados';
          f.obsCardResumo.innerHTML = '<span>Falha ao carregar.</span>';
          f.obsCardLista.innerHTML = '<p class="dash-empty">Nao foi possivel carregar os dados deste card.</p>';
          mostrarToast(err?.message || 'Erro ao carregar composicao do card', 'erro');
        });
    }

    function fecharObservabilidadeCard() {
      const f = el();
      window.AppDiag?.mark?.('dashboard.obs.modal.close', {
        card_key: String(cardObservabilidadeAberto || '').trim()
      });
      cardObservabilidadeAberto = '';
      cardObservabilidadeItens = [];
      carregandoObservabilidade = false;
      if (f.modalObservabilidadeCard) f.modalObservabilidadeCard.classList.add('hidden');
    }

    function getItemObservabilidade(index) {
      const idx = Number(index);
      if (!isFinite(idx) || idx < 0) return null;
      if (!Array.isArray(cardObservabilidadeItens)) return null;
      return cardObservabilidadeItens[idx] || null;
    }

    function abrirAbaEExecutarAcao(aba, callback) {
      const destino = String(aba || '').trim();
      if (!destino || typeof callback !== 'function') return;
      const maxTentativas = 12;
      let tentativas = 0;

      const tentar = () => {
        const concluido = !!callback();
        if (concluido) return;
        tentativas += 1;
        if (tentativas >= maxTentativas) {
          mostrarToast('Nao foi possivel abrir a origem agora. Tente novamente.', 'erro');
          return;
        }
        setTimeout(tentar, 140);
      };

      if (typeof trocarAba === 'function') {
        trocarAba(destino);
      }
      setTimeout(tentar, 120);
    }

    function editarOrigemObservabilidade(index) {
      if (!podeAlterarDados('Edicao bloqueada em modo somente leitura')) return;
      const item = getItemObservabilidade(index);
      if (!item) {
        mostrarToast('Linha de composicao nao encontrada', 'erro');
        return;
      }

      const aba = String(item.origem_aba || '').trim();
      const id = String(item.origem_id || '').trim();
      if (!aba || !id) {
        mostrarToast('Origem desta linha nao esta disponivel', 'erro');
        return;
      }

      fecharObservabilidadeCard();

        .withFailureHandler(err => {
          mostrarToast(err?.message || 'Erro ao remover pagamento', 'erro');

        .withSuccessHandler(ok => {

            mostrarToast('Nao foi possivel remover o pagamento', 'erro');

          const concluirSync = window.AppSyncFeedback?.iniciar

    function limparFormularioDespesa() {
      const f = el();
      if (f.despesaDescricao) f.despesaDescricao.value = '';
      if (f.despesaCategoria) f.despesaCategoria.value = '';
      if (f.despesaFornecedor) f.despesaFornecedor.value = '';
      if (f.despesaPagoPor) f.despesaPagoPor.value = '';
      if (f.despesaValorTotal) f.despesaValorTotal.value = '';
      if (f.despesaDataCompetencia) f.despesaDataCompetencia.value = getHojeISO();
      if (f.despesaDataVencimento) f.despesaDataVencimento.value = '';
      if (f.despesaDataPagamento) f.despesaDataPagamento.value = '';
      if (f.despesaFormaPagamento) f.despesaFormaPagamento.value = '';
      if (f.despesaParcelas) f.despesaParcelas.value = '1';
      if (f.despesaParcelasDetalheLista) f.despesaParcelasDetalheLista.innerHTML = '';

      if (f.despesaFixo) f.despesaFixo.checked = false;
      if (f.despesaObservacao) f.despesaObservacao.value = '';

        f.despesaFormTitulo.textContent = ehEdicao ? 'Editar despesa' : 'Nova despesa';

    function preencherFormularioDespesa(item) {
      const f = el();
      if (!item) return;

      if (f.despesaDescricao) f.despesaDescricao.value = item.descricao || '';
      if (f.despesaCategoria) f.despesaCategoria.value = item.categoria || '';
      if (f.despesaFornecedor) f.despesaFornecedor.value = item.fornecedor || '';
      if (f.despesaPagoPor) f.despesaPagoPor.value = item.pago_por || '';
      if (f.despesaValorTotal) f.despesaValorTotal.value = item.valor_total || '';
      if (f.despesaDataCompetencia) f.despesaDataCompetencia.value = item.data_competencia || '';
      if (f.despesaDataVencimento) f.despesaDataVencimento.value = item.data_vencimento || '';
      if (f.despesaDataPagamento) f.despesaDataPagamento.value = item.data_pagamento || '';
      if (f.despesaFormaPagamento) f.despesaFormaPagamento.value = item.forma_pagamento || item.forma_pagamento_padrao || '';

            numero: idx + 1,

          }))

    function setSalvandoDespesa(ativo) {

              false,
              despesaEditandoId ? 'Salvar alteracoes' : 'Salvar despesa'

            f.btnSalvarDespesa.textContent = despesaEditandoId ? 'Salvar alteracoes' : 'Salvar despesa';

    function salvarDespesa() {
      if (!podeAlterarDados('Salvamento bloqueado em modo somente leitura')) return;
      if (salvandoDespesa) return;
      const f = el();

      const descricao = String(f.despesaDescricao?.value || '').trim();
      const categoria = String(f.despesaCategoria?.value || '').trim();
      const valorTotal = parseNumeroInput(f.despesaValorTotal?.value);
      if (!descricao) {
        mostrarToast('Descricao da despesa e obrigatoria', 'erro');
        return;
      }
      if (!categoria) {
        mostrarToast('Categoria da despesa e obrigatoria', 'erro');
        return;
      }
      if (!isFinite(valorTotal) || valorTotal <= 0) {
        mostrarToast('Valor total invalido', 'erro');
        return;
      }
      const formaPagamento = String(f.despesaFormaPagamento?.value || '').trim();
      const parcelasBruto = parseNumeroInput(f.despesaParcelas?.value);
      const parcelas = formaExigeParcelas(formaPagamento)
        ? Math.floor(Number(parcelasBruto || 0))
        : 1;
      if (formaExigeParcelas(formaPagamento) && (!isFinite(parcelas) || parcelas < 1)) {
        mostrarToast('Parcelas deve ser um numero inteiro maior ou igual a 1', 'erro');
        return;
      }
      const parcelasDetalhe = formaExigeParcelas(formaPagamento)
        ? lerParcelasDetalheDespesa()
        : gerarParcelasPadrao(valorTotal, 1, getDataBaseParcelasDespesa());
      if (formaExigeParcelas(formaPagamento)) {
        if (parcelasDetalhe.length !== parcelas) {
          mostrarToast('Revise as parcelas detalhadas', 'erro');
          return;
        }
        const algumaDataInvalida = parcelasDetalhe.some(p => !String(p.data || '').trim());
        if (algumaDataInvalida) {
          mostrarToast('Preencha a data de todas as parcelas', 'erro');
          return;
        }
        const algumValorInvalido = parcelasDetalhe.some(p => Number(p.valor || 0) <= 0);
        if (algumValorInvalido) {
          mostrarToast('Valor de parcela deve ser maior que zero', 'erro');
          return;
        }
      }

      const payload = {
        descricao,
        categoria,
        fornecedor: String(f.despesaFornecedor?.value || '').trim(),
        pago_por: String(f.despesaPagoPor?.value || '').trim(),
        valor_total: valorTotal,
        data_competencia: String(f.despesaDataCompetencia?.value || '').trim(),
        data_vencimento: String(f.despesaDataVencimento?.value || '').trim(),
        data_pagamento: String(f.despesaDataPagamento?.value || '').trim(),
        forma_pagamento: formaPagamento,
        parcelas,
        parcelas_detalhe: parcelasDetalhe,
        fixo: !!f.despesaFixo?.checked,
        observacao: String(f.despesaObservacao?.value || '').trim()
      };
      const despesaAnterior = despesaEditandoId ? getById(despesaEditandoId) : null;

      setSalvandoDespesa(true);
      const runner = window.AppRequest.runner()
        .withFailureHandler(err => {
          setSalvandoDespesa(false);
          mostrarToast(err?.message || 'Erro ao salvar despesa', 'erro');
        })
        .withSuccessHandler(() => {
          setSalvandoDespesa(false);
          cancelarFormularioDespesa();
          window.AppModalUI?.closeAll?.();
          const concluirSync = window.AppSyncFeedback?.iniciar
            ? window.AppSyncFeedback.iniciar('Despesa salva. Atualizando dados...')
            : null;
          invalidarCacheMeses(coletarMesesImpactados(despesaAnterior, payload));
          if (window.AppTabRefresh?.requestSync) {
            window.AppTabRefresh.requestSync('dashboard', {
              delayMs: 220,
              prefetch: true,
              onDone: () => {
                if (concluirSync) {
                  concluirSync('Dados atualizados');
                } else {
                  mostrarToast('Dados atualizados');
                }
              }
            });
          } else {
            atualizar(true, () => {
              if (concluirSync) {
                concluirSync('Dados atualizados');
              } else {
                mostrarToast('Dados atualizados');
              }
            });
          }
        });

      if (despesaEditandoId) {
        runner.atualizarDespesaGeral(despesaEditandoId, payload);
      } else {
        runner.criarDespesaGeral(payload);
      }
    }

    function carregarDespesas(forcarRecarregar = false, onDone) {
      const despesasCache = !forcarRecarregar ? lerDespesasCacheLocal() : null;
      if (Array.isArray(despesasCache)) {
        despesas = despesasCache;
        renderDespesas();
        if (typeof onDone === 'function') onDone();
        return;
      }

      window.AppRequest.runner()
        .withFailureHandler(() => {
          mostrarToast('Erro ao carregar despesas gerais', 'erro');
          if (typeof onDone === 'function') onDone();
        })
        .withSuccessHandler(lista => {
          despesas = Array.isArray(lista) ? lista : [];
          salvarDespesasCacheLocal(despesas);
          renderDespesas();
          if (typeof onDone === 'function') onDone();
        })
        .listarDespesasGerais(!!forcarRecarregar);
    }

    function renderDespesas() {
      const f = el();
      if (!f.listaDespesas) return;
      if (!Array.isArray(despesas) || despesas.length === 0) {
        f.listaDespesas.innerHTML = '<p>Nenhuma despesa geral cadastrada.</p>';
        return;
      }

      f.listaDespesas.innerHTML = despesas.map(d => {
        const pendente = Number(d.total_pendente || 0);
        const podePagar = pendente > 0.009;
        const fixo = parseBooleanInput(d.fixo);
        return `
          <div class="card">
            <div class="card-resumo">
              <strong>${escapeHtml(d.descricao || '-')}</strong><br>
              ${escapeHtml(d.categoria || 'SEM_CATEGORIA')} | ${escapeHtml(d.fornecedor || 'SEM_FORNECEDOR')} | Pago por: ${escapeHtml(d.pago_por || '-')}<br>
              Previsto: ${formatarMoeda(d.total_previsto || 0)} | Pago: ${formatarMoeda(d.total_pago || 0)} | Pendente: ${formatarMoeda(d.total_pendente || 0)}<br>
              Status: ${escapeHtml(d.status_pagamento || 'PENDENTE')} | Vencimento: ${escapeHtml(d.data_vencimento || '-')}<br>
              Pagamento: ${escapeHtml(d.data_pagamento || '-')} | Forma: ${escapeHtml(d.forma_pagamento || '-')} | Parcelas: ${Number(d.parcelas || 1)} | Fixo: ${fixo ? 'SIM' : 'NAO'}
            </div>
            <div class="acoes">
              <button onclick="DashboardController.editarDespesa('${escapeHtml(d.ID)}')">Editar</button>
              ${podePagar ? `<button onclick="DashboardController.registrarPagamentoDespesa('${escapeHtml(d.ID)}')">Registrar pagamento</button>` : ''}
              <button onclick="DashboardController.excluirDespesa('${escapeHtml(d.ID)}')">Excluir</button>
            </div>
          </div>
        `;
      }).join('');
    }

    function excluirDespesa(id) {
      if (!podeAlterarDados('Exclusao bloqueada em modo somente leitura')) return;
      const despesaId = String(id || '').trim();
      if (!despesaId) return;
      if (!confirm('Deseja remover esta despesa geral?')) return;
      const despesaAtual = getById(despesaId);

          atualizar(true);

    function setSalvandoPagamentoDespesa(ativo) {
      salvandoPagamentoDespesa = !!ativo;
      const f = el();
      [f.pagDespesaData, f.pagDespesaValor, f.pagDespesaParcela, f.pagDespesaForma, f.pagDespesaObservacao, f.btnConfirmarPagDespesa]
        .forEach(input => {
          if (input) input.disabled = salvandoPagamentoDespesa;
        });
      if (f.btnConfirmarPagDespesa) {
        if (window.AppLoading?.setButtonLoading) {
          window.AppLoading.setButtonLoading(
            f.btnConfirmarPagDespesa,
            salvandoPagamentoDespesa,
            'Confirmar pagamento',
            'Salvando'
          );
        } else {
          f.btnConfirmarPagDespesa.textContent = salvandoPagamentoDespesa
            ? 'Salvando...'
            : 'Confirmar pagamento';
        }
      }

    function registrarPagamentoDespesa(id) {
      if (!podeAlterarDados('Pagamento bloqueado em modo somente leitura')) return;
      if (salvandoPagamentoDespesa) return;
      const despesaId = String(id || '').trim();
      const item = despesas.find(d => String(d.ID || '').trim() === despesaId);
      if (!item) {
        mostrarToast('Despesa nao encontrada', 'erro');
        return;
      }

      const pendente = Number(item.total_pendente || 0);
      if (pendente <= 0.009) {
        mostrarToast('Despesa ja esta paga');
        return;
      }

      const formas = Array.isArray(validacoes?.formasPagamento) ? validacoes.formasPagamento : [];
      if (formas.length === 0) {
        mostrarToast('Cadastre FORMA_PAGAMENTO na aba VALIDACAO', 'erro');
        return;
      }

      const f = el();
      despesaPagamentoId = despesaId;
      if (f.pagDespesaTitulo) {
        f.pagDespesaTitulo.textContent = `Registrar pagamento: ${item.descricao || despesaId}`;
      }
      if (f.pagDespesaData) f.pagDespesaData.value = item.data_pagamento || getHojeISO();

      const parcelas = Array.isArray(item?.parcelas_detalhe) ? item.parcelas_detalhe : [];
      const totalParcelas = Math.max(1, Math.floor(parseNumeroInput(item?.parcelas || 1) || 1));
      despesaPagamentoParcelado = totalParcelas > 1;
      const proximaParcela = parcelas.find(p => Number(p?.valor_pendente || 0) > 0.009) || null;

      if (f.pagDespesaParcelaWrap && f.pagDespesaParcela) {
        if (despesaPagamentoParcelado) {
          if (!proximaParcela?.ID) {
            despesaPagamentoId = null;
            mostrarToast('Nao ha parcela pendente para esta despesa', 'erro');
            return;
          }
          const numero = Number(proximaParcela.parcela_numero || 0);
          const total = Number(proximaParcela.parcelas_total || 0);
          const data = String(proximaParcela.data_prevista || '-').trim() || '-';
          const valorPend = Number(proximaParcela.valor_pendente || 0);

          f.pagDespesaParcela.innerHTML = '';
          const op = document.createElement('option');
          op.value = String(proximaParcela.ID || '').trim();
          op.textContent = `Parcela ${numero}/${total} - ${data} - ${formatarMoeda(valorPend)}`;
          f.pagDespesaParcela.appendChild(op);
          f.pagDespesaParcela.value = op.value;
          f.pagDespesaParcelaWrap.classList.remove('hidden');

          if (f.pagDespesaValor) {
            f.pagDespesaValor.value = valorPend > 0 ? valorPend.toFixed(2) : '';
            f.pagDespesaValor.readOnly = true;
          }
        } else {
          f.pagDespesaParcela.innerHTML = '<option value="">Parcela unica</option>';
          f.pagDespesaParcela.value = '';
          f.pagDespesaParcelaWrap.classList.add('hidden');
          if (f.pagDespesaValor) {
            f.pagDespesaValor.value = pendente.toFixed(2);
            f.pagDespesaValor.readOnly = false;
          }
        }
      } else if (f.pagDespesaValor) {
        f.pagDespesaValor.value = pendente.toFixed(2);
      }

      if (f.pagDespesaForma) f.pagDespesaForma.value = item.forma_pagamento || item.forma_pagamento_padrao || '';
      if (f.pagDespesaObservacao) f.pagDespesaObservacao.value = '';
      if (f.modalPagamentoDespesa) f.modalPagamentoDespesa.classList.remove('hidden');
      setSalvandoPagamentoDespesa(false);
    }

    function handleDespesaFormaPagamentoChange() {
      const f = el();
      if (!f.despesaFormaPagamento || !f.despesaParcelasWrap || !f.despesaParcelas) return;
      const exibir = formaExigeParcelas(f.despesaFormaPagamento.value);
      f.despesaParcelasWrap.classList.toggle('hidden', !exibir);
      if (!exibir) {
        f.despesaParcelas.value = '1';
      } else if (!String(f.despesaParcelas.value || '').trim() || Number(f.despesaParcelas.value) < 1) {
        f.despesaParcelas.value = '1';
      }
      renderParcelasDetalheDespesa();
    }

    function handleDespesaParcelasDetalheChange() {
      renderParcelasDetalheDespesa();
    }

    function confirmarPagamentoDespesa() {
      if (!podeAlterarDados('Pagamento bloqueado em modo somente leitura')) return;
      if (salvandoPagamentoDespesa) return;
      if (!despesaPagamentoId) {
        mostrarToast('Despesa nao selecionada', 'erro');
        return;
      }

      const f = el();
      const dataPagamento = String(f.pagDespesaData?.value || '').trim();
      const valorPago = parseNumeroInput(f.pagDespesaValor?.value);
      const formaPagamento = String(f.pagDespesaForma?.value || '').trim();
      const observacao = String(f.pagDespesaObservacao?.value || '').trim();

      if (!dataPagamento) {
        mostrarToast('Data de pagamento e obrigatoria', 'erro');
        return;
      }
      if (!formaPagamento) {
        mostrarToast('Forma de pagamento e obrigatoria', 'erro');
        return;
      }
      if (despesaPagamentoParcelado && !String(f.pagDespesaParcela?.value || '').trim()) {
        mostrarToast('Selecione a parcela pendente', 'erro');
        return;
      }
      if (!isFinite(valorPago) || valorPago <= 0) {
        mostrarToast('Valor pago invalido', 'erro');
        return;
      }
      const despesaAtual = getById(despesaPagamentoId);

      setSalvandoPagamentoDespesa(true);
      window.AppRequest.runner()
        .withFailureHandler(err => {
          setSalvandoPagamentoDespesa(false);
          mostrarToast(err?.message || 'Erro ao registrar pagamento', 'erro');
        })
        .withSuccessHandler(() => {
          setSalvandoPagamentoDespesa(false);
          cancelarPagamentoDespesa();
          window.AppModalUI?.closeAll?.();
          const concluirSync = window.AppSyncFeedback?.iniciar
            ? window.AppSyncFeedback.iniciar('Pagamento registrado. Atualizando dados...')
            : null;
          invalidarCacheMeses(coletarMesesImpactados(despesaAtual, {
            data_pagamento: dataPagamento
          }));
          if (window.AppTabRefresh?.requestSync) {
            window.AppTabRefresh.requestSync('dashboard', {
              delayMs: 220,
              prefetch: true,
              onDone: () => {
                if (concluirSync) {
                  concluirSync('Dados atualizados');
                } else {
                  mostrarToast('Dados atualizados');
                }
              }
            });
          } else {
            atualizar(true, () => {
              if (concluirSync) {
                concluirSync('Dados atualizados');
              } else {
                mostrarToast('Dados atualizados');
              }
            });
          }
        })
        .registrarPagamentoDespesaGeral(despesaPagamentoId, {
          data_pagamento: dataPagamento,
          valor_pago: valorPago,
          parcela_alvo_id: despesaPagamentoParcelado ? String(f.pagDespesaParcela?.value || '').trim() : '',
          forma_pagamento: formaPagamento,
          observacao
        });
    }

    function cancelarPagamentoDespesa() {
      despesaPagamentoId = null;
      despesaPagamentoParcelado = false;
      setSalvandoPagamentoDespesa(false);
      const f = el();
      if (f.pagDespesaValor) f.pagDespesaValor.readOnly = false;
      if (f.pagDespesaParcelaWrap) f.pagDespesaParcelaWrap.classList.add('hidden');
      if (f.pagDespesaParcela) f.pagDespesaParcela.innerHTML = '<option value="">Selecione</option>';
      if (f.modalPagamentoDespesa) {
        f.modalPagamentoDespesa.classList.add('hidden');
      }
    }

    return {
      init,
      atualizar,
      invalidarCacheMeses,
      coletarMesesImpactados,
      handleCardClick,
      handleCardKeydown,
      abrirObservabilidadeCard,
      fecharObservabilidadeCard,
      editarOrigemObservabilidade,
      excluirOrigemObservabilidade,
      removerPagamentoObservabilidade,
      toggleDespesas,
      abrirFormularioDespesa,
      cancelarFormularioDespesa,
      editarDespesa,
      salvarDespesa,
      excluirDespesa,
      registrarPagamentoDespesa,
      confirmarPagamentoDespesa,
      cancelarPagamentoDespesa,
      handleDespesaFormaPagamentoChange,
      handleDespesaParcelasDetalheChange
    };
  })();
</script>
