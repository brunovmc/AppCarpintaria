<script>
  window.ProdutosController = (() => {

    let editandoId = null;
    let iniciado = false;
    let salvando = false;
    let mutationLockToken = null;
    let listenerMutacoesRegistrado = false;

    let receitasCache = {};
    let tiposValidacao = [];
    let unidadesValidacao = [];
    let categoriasValidacao = [];
    let categoriasPorTipoValidacao = {};

    function parseNumeroInput(valor) {
      if (window.AppDomainUtils?.parseNumeroOptional) {
        return window.AppDomainUtils.parseNumeroOptional(valor);
      }
      const s = String(valor ?? '').trim();
      if (s === '') return '';
      const n = Number(s.replace(',', '.'));
      return isNaN(n) ? '' : n;
    }

    function formatPrecoVendaInput(valor) {
      const n = Number(String(valor ?? '').replace(',', '.'));
      if (!isFinite(n) || n <= 0) return '';
      return String(Number(n.toFixed(2)));
    }

    function iniciarAcaoBotao(button, idleLabel, loadingLabel) {
      return window.AppActionButtons?.begin
        ? window.AppActionButtons.begin({
          button,
          idleLabel,
          loadingLabel
        })
        : null;
    }

    function finalizarAcaoBotao(estado, opcoes = {}) {
      if (!estado) return;
      if (opcoes?.sucesso && window.AppActionButtons?.finishSuccess) {
        window.AppActionButtons.finishSuccess(estado, {
          closeModals: opcoes.closeModals !== false
        });
        return;
      }
      window.AppActionButtons?.end?.(estado);
    }

    function setSalvando(ativo) {
      salvando = !!ativo;
      if (window.AppMutationUI?.lock && window.AppMutationUI?.unlock) {
        if (salvando) {
          if (!mutationLockToken) {
            mutationLockToken = window.AppMutationUI.lock();
          }
        } else if (mutationLockToken) {
          window.AppMutationUI.unlock(mutationLockToken);
          mutationLockToken = null;
        }
      }
      const btn = document.getElementById('btnSalvarProduto');
      if (!btn) return;
      btn.disabled = salvando;
      if (window.AppLoading?.setButtonLoading) {
        window.AppLoading.setButtonLoading(btn, salvando, 'Salvar', 'Salvando');
      } else {
        btn.textContent = salvando ? 'Salvando...' : 'Salvar';
      }
    }

    function reabrirFormularioAposErro(payload, opcoes = {}) {
      const editando = !!opcoes.editando;
      editandoId = editando ? String(opcoes.id || '') : null;

      if (window.ProdutosUI?.resetFormulario) {
        ProdutosUI.resetFormulario();
      }

      const dadosProduto = payload?.dadosProduto || {};
      const modelo = payload?.modelo || {
        dados: { nome_receita: 'Modelo principal', descricao: '' },
        entradas: [],
        saidas: [],
        etapas: []
      };

      const nomeInput = document.getElementById('produtoNome');
      if (nomeInput) nomeInput.value = String(dadosProduto.nome_produto || '').trim();
      const precoInput = document.getElementById('produtoPrecoVenda');
      if (precoInput) precoInput.value = formatPrecoVendaInput(dadosProduto.preco_venda);
      if (window.ProdutosUI?.preencherModeloFormulario) {
        ProdutosUI.preencherModeloFormulario(modelo);
      }
      const titulo = document.getElementById('produtoFormTitulo');
      if (titulo) {
        titulo.innerText = editando ? 'Editar Produto' : 'Novo Produto';
      }
      ProdutosUI.mostrarFormulario();
    }

    function getProdutoUiState(item) {
      if (!window.AppEntityMutations?.getUiState) {
        return {
          status: '',
          action: '',
          label: '',
          message: '',
          canRetry: false,
          blockActions: false
        };
      }
      return window.AppEntityMutations.getUiState(item, {
        pendingLabels: {
          delete: 'Exclusao pendente'
        },
        errorLabels: {
          delete: 'Falha ao excluir'
        }
      });
    }

    function limparProdutoMeta(item) {
      return window.AppEntityMutations?.limparMeta
        ? window.AppEntityMutations.limparMeta(item)
        : { ...(item || {}) };
    }

    function buildProdutoOptimistic(payload, options = {}) {
      const base = limparProdutoMeta(options.baseItem);
      const id = String(options.id || base.produto_id || '').trim()
        || (window.AppEntityMutations?.tempId?.('PRD_TMP') || `PRD_TMP_${Date.now()}`);
      const dadosProduto = payload?.dadosProduto || {};
      const modelo = payload?.modelo || {};
      const modeloDados = modelo?.dados || {};
      const entradas = Array.isArray(modelo?.entradas) ? window.AppEntityMutations?.clone?.(modelo.entradas) || [...modelo.entradas] : [];
      const saidas = Array.isArray(modelo?.saidas) ? window.AppEntityMutations?.clone?.(modelo.saidas) || [...modelo.saidas] : [];
      const etapas = Array.isArray(modelo?.etapas) ? window.AppEntityMutations?.clone?.(modelo.etapas) || [...modelo.etapas] : [];
      const nomeModelo = String(modeloDados?.nome_receita || base?.modelo_nome || 'Modelo principal').trim() || 'Modelo principal';
      const receitaBase = {
        receita_id: String(base?.receitas?.[0]?.receita_id || `${id}_MODELO`).trim(),
        nome_receita: nomeModelo,
        descricao: String(modeloDados?.descricao || '').trim(),
        entradas,
        saidas,
        etapas
      };

      return {
        ...base,
        produto_id: id,
        nome_produto: String(dadosProduto?.nome_produto || base?.nome_produto || '').trim(),
        unidade_produto: 'UN',
        preco_venda: dadosProduto?.preco_venda === '' ? '' : Number((dadosProduto?.preco_venda ?? base?.preco_venda) || 0),
        modelo_nome: nomeModelo,
        modelo_entradas_total: entradas.length,
        modelo_saidas_total: saidas.length,
        modelo_etapas_total: etapas.length,
        receitas: [receitaBase],
        receitasCarregadas: true
      };
    }

    function resolveProdutoSuccessItem(entry, detail, helpers = {}) {
      const limparMeta = helpers?.limparMeta || (valor => valor);
      const meta = entry?.meta || {};
      const result = detail?.result || {};
      const optimisticItem = limparMeta(meta.optimistic_item) || {};
      const beforeItem = limparMeta(meta.before_item) || {};
      if (result?.produto_id) {
        return {
          ...beforeItem,
          ...optimisticItem,
          ...limparMeta(result),
          receitas: Array.isArray(result?.receitas) ? result.receitas : optimisticItem.receitas,
          receitasCarregadas: result?.receitasCarregadas === undefined
            ? !!optimisticItem.receitasCarregadas
            : !!result.receitasCarregadas
        };
      }
      return optimisticItem.produto_id ? optimisticItem : beforeItem;
    }

    function listarMutacoesProdutoAtivas() {
      if (!window.AppOptimistic?.list) return [];
      return window.AppOptimistic.list({
        scope: 'produto',
        domain: 'produto'
      });
    }

    function reconciliarListaProdutosComMutacoes(listaBase) {
      if (!window.AppEntityMutations?.mergeFetchedList) {
        return Array.isArray(listaBase) ? [...listaBase] : [];
      }
      return window.AppEntityMutations.mergeFetchedList(listaBase, listarMutacoesProdutoAtivas(), {
        domain: 'produto',
        idKey: 'produto_id',
        resolveSuccessItem: resolveProdutoSuccessItem
      });
    }

    function persistirEReRenderizarProdutos(lista) {
      if (Array.isArray(lista)) {
        ProdutosStore.set(lista);
      }
      atualizarOpcoesReceitas();
      renderListaAtual();
    }

    function agendarSyncSilenciosoProdutos() {
      if (window.AppTabRefresh?.requestSync) {
        window.AppTabRefresh.requestSync('produtos', {
          delayMs: 900,
          prefetch: true
        });
        window.AppTabRefresh.requestSync('producao', {
          delayMs: 980,
          prefetch: true
        });
        return;
      }
      setTimeout(() => carregarProdutos(true), 900);
    }

    function tratarEventoMutacaoProduto(detail) {
      const entry = detail?.entry;
      if (!entry || String(entry.scope || '').trim() !== 'produto') return;
      if (String(entry?.meta?.domain || '').trim() !== 'produto') return;
      if (!window.AppEntityMutations?.applyEntryToList) return;

      const atualizada = window.AppEntityMutations.applyEntryToList(ProdutosStore.get(), detail, {
        domain: 'produto',
        idKey: 'produto_id',
        resolveSuccessItem: resolveProdutoSuccessItem
      });
      persistirEReRenderizarProdutos(atualizada);
      if (window.ProducaoUI?.renderProdutos) {
        window.ProducaoUI.renderProdutos(ProdutosStore.get());
      }

      if (String(detail?.type || '').trim().toLowerCase() === 'success') {
        marcarDashboardComoSujo();
        agendarSyncSilenciosoProdutos();
        return;
      }

      if (String(detail?.type || '').trim().toLowerCase() === 'error'
        && String(entry?.meta?.source || '').trim() === 'produtos') {
        mostrarToast(`${detail?.errorMessage || 'Falha ao sincronizar produto'}. Use "Tentar novamente".`, 'erro');
      }
    }

    function registrarListenerMutacoesSeNecessario() {
      if (listenerMutacoesRegistrado) return;
      if (typeof window === 'undefined' || typeof window.addEventListener !== 'function') return;
      window.addEventListener('app:optimistic-mutation', evento => {
        tratarEventoMutacaoProduto(evento?.detail || {});
      });
      listenerMutacoesRegistrado = true;
    }

    function retryProdutoMutation(id) {
      const item = ProdutosStore.getById(String(id || '').trim());
      const mutationId = String(item?._localMutationId || '').trim();
      if (!mutationId || !window.AppOptimistic?.retry) {
        mostrarToast('Nao ha sincronizacao pendente para reenviar', 'erro');
        return;
      }
      window.AppOptimistic.retry(mutationId);
      mostrarToast('Tentando sincronizar novamente...');
    }

    function podeAlterarDados(contexto = 'Operacao') {
      if (window.AppDomainUtils?.ensureWritable) {
        return window.AppDomainUtils.ensureWritable(contexto);
      }
      return !!window.AppRuntime?.ensureWritable
        ? window.AppRuntime.ensureWritable(contexto)
        : true;
    }

    function marcarDashboardComoSujo() {
      if (window.AppTabRefresh?.markDirty) {
        window.AppTabRefresh.markDirty('dashboard');
        window.AppTabRefresh.markDirty('producao');
      }
      if (window.DashboardController?.invalidarCacheMeses) {
        window.DashboardController.invalidarCacheMeses();
      }
      if (window.AppTabRefresh?.requestSync) {
        window.AppTabRefresh.requestSync('dashboard', {
          delayMs: 420,
          prefetch: true
        });
      }
    }

    function isTipoValidacao(tipo) {
      const t = String(tipo || '').toUpperCase();
      return (tiposValidacao || []).some(v => String(v || '').toUpperCase() === t);
    }

    function isValorValidacao(lista, valor) {
      const alvo = String(valor || '').trim().toUpperCase();
      if (!alvo) return false;
      return (lista || []).some(v => String(v || '').trim().toUpperCase() === alvo);
    }

    function isUnidadeValidacao(unidade) {
      return isValorValidacao(unidadesValidacao, unidade);
    }

    function isCategoriaValidacao(categoria) {
      return isValorValidacao(categoriasValidacao, categoria);
    }

    function getCategoriasPorTipo(tipo) {
      const t = String(tipo || '').trim().toUpperCase();
      if (!t) return [];
      return Array.isArray(categoriasPorTipoValidacao[t])
        ? categoriasPorTipoValidacao[t]
        : [];
    }

    function isCategoriaValidaParaTipo(tipo, categoria) {
      const categoriasTipo = getCategoriasPorTipo(tipo);
      if (categoriasTipo.length > 0) {
        return isValorValidacao(categoriasTipo, categoria);
      }
      return isCategoriaValidacao(categoria);
    }

    function init() {
      if (iniciado) return;

      registrarListenerMutacoesSeNecessario();
      window.AppOptimistic?.process?.();
      carregarValidacoes();
      carregarProdutos();

      iniciado = true;
    }

    function atualizarOpcoesReceitas() {
      if (!window.ProdutosUI || !window.ProdutosStore) return;
      ProdutosUI.setOpcoesReceitas({
        tipos: tiposValidacao,
        unidades: unidadesValidacao,
        categorias: categoriasValidacao,
        categoriasPorTipo: categoriasPorTipoValidacao
      });
    }

    function carregarValidacoes() {
      const loader = window.AppValidacoes?.get
        ? window.AppValidacoes.get({ maxAgeMs: 1000 * 60 * 60 * 12 })
        : Promise.reject(new Error('cache de validacoes indisponivel'));

      loader
        .then(({ data }) => {
          const validacoes = data || {};
          tiposValidacao = Array.isArray(validacoes.tipos) ? validacoes.tipos : [];
          unidadesValidacao = Array.isArray(validacoes.unidades) ? validacoes.unidades : [];
          categoriasValidacao = Array.isArray(validacoes.categorias) ? validacoes.categorias : [];
          categoriasPorTipoValidacao = validacoes.categoriasPorTipo && typeof validacoes.categoriasPorTipo === 'object'
            ? validacoes.categoriasPorTipo
            : {};
          atualizarOpcoesReceitas();
        })
        .catch(() => {
          tiposValidacao = [];
          unidadesValidacao = [];
          categoriasValidacao = [];
          categoriasPorTipoValidacao = {};
          atualizarOpcoesReceitas();
        });
    }

    function renderListaAtual() {
      if (window.aplicarBuscaProdutos) {
        aplicarBuscaProdutos();
        return;
      }
      ProdutosUI.renderLista(ProdutosStore.get());
    }

    function hidratarProdutosDoCache() {
      const listaCache = window.AppTabCache?.ler?.('produtos');
      if (!Array.isArray(listaCache)) return false;
      persistirEReRenderizarProdutos(reconciliarListaProdutosComMutacoes(listaCache));
      return true;
    }

    function carregarProdutos(forcarRecarregar = false, onDone) {
      const exibindoCache = !forcarRecarregar && hidratarProdutosDoCache();
      window.AppRequest.runner()
        .withSuccessHandler(lista => {
          if (window.AppRuntime?.setReadOnly) {
            window.AppRuntime.setReadOnly(false);
          }
          const atual = ProdutosStore.get();
          const map = {};
          atual.forEach(p => {
            if (p && p.produto_id) {
              map[p.produto_id] = p;
            }
          });

          const normalizada = (Array.isArray(lista) ? lista : []).map(p => {
            const existente = map[p.produto_id] || {};
            return {
              ...p,
              receitas: Array.isArray(existente.receitas) ? existente.receitas : [],
              receitasCarregadas: !!existente.receitasCarregadas
            };
          });

          persistirEReRenderizarProdutos(reconciliarListaProdutosComMutacoes(normalizada));
          if (typeof onDone === 'function') onDone();
        })
        .withFailureHandler(() => {
          if (exibindoCache) {
            if (window.AppRuntime?.setReadOnly) {
              window.AppRuntime.setReadOnly(true, 'Sem conexao com backend - exibindo cache local');
            }
            mostrarToast('Exibindo ultimo snapshot em cache', 'erro');
            if (typeof onDone === 'function') onDone();
            return;
          }
          mostrarToast('Erro ao carregar produtos', 'erro');
          if (typeof onDone === 'function') onDone();
        })
        .listarProdutos(!!forcarRecarregar);
    }

    function syncFromBackend(onDone) {
      carregarProdutos(true, onDone);
    }

    function carregarReceitas(produtoId, forcar = false) {
      const item = ProdutosStore.getById(produtoId);
      if (!item) return;
      if (getProdutoUiState(item).blockActions) return;

      if (item.receitasCarregadas && !forcar) return;

      window.AppRequest.runner()
        .withSuccessHandler(receitas => {
          const lista = Array.isArray(receitas) ? receitas : [];
          if (lista.length === 0) {
            window.AppRequest.runner()
              .withSuccessHandler(receita => {
                const receitaBase = receita && receita.receita_id
                  ? [{
                    ...receita,
                    entradas: Array.isArray(receita.entradas) ? receita.entradas : [],
                    saidas: Array.isArray(receita.saidas) ? receita.saidas : [],
                    _editing: true
                  }]
                  : [];

                receitasCache[produtoId] = receitaBase;
                ProdutosStore.update(produtoId, {
                  receitas: receitaBase,
                  receitasCarregadas: true
                });
                renderListaAtual();
              })
              .withFailureHandler(() => {
                mostrarToast('Erro ao criar modelo inicial', 'erro');
              })
              .criarReceitaProduto(produtoId, {
                nome_receita: 'Modelo principal'
              });
            return;
          }

          if (lista.length > 1) {
            mostrarToast('Apenas um modelo por produto. Usando o modelo principal.');
          }

          const receitaUnica = [lista[0]];
          receitasCache[produtoId] = receitaUnica;
          ProdutosStore.update(produtoId, {
            receitas: receitaUnica,
            receitasCarregadas: true
          });
          renderListaAtual();
        })
        .withFailureHandler(() => {
          mostrarToast('Erro ao carregar modelos', 'erro');
        })
        .listarReceitasProduto(produtoId);
    }

    function criarReceita(produtoId) {
      if (!podeAlterarDados('Edicao bloqueada em modo somente leitura')) return;
      const item = ProdutosStore.getById(produtoId);
      if (!item) return;
      if (getProdutoUiState(item).blockActions) {
        mostrarToast('Este produto possui uma sincronizacao pendente.', 'erro');
        return;
      }

      mostrarToast('Carregando modelo...');

      window.AppRequest.runner()
        .withSuccessHandler(receita => {
          const receitaUnica = receita && receita.receita_id
            ? [{
            ...receita,
            entradas: [],
            saidas: [],
            _editing: true
          }]
            : [];

          ProdutosStore.update(produtoId, {
            receitas: receitaUnica,
            receitasCarregadas: true
          });
          renderListaAtual();
        })
        .withFailureHandler(() => {
          mostrarToast('Erro ao carregar modelo', 'erro');
        })
        .criarReceitaProduto(produtoId, {
          nome_receita: 'Modelo principal'
        });
    }

    function iniciarEdicaoReceita(produtoId, receitaId) {
      if (!podeAlterarDados('Edicao bloqueada em modo somente leitura')) return;
      const item = ProdutosStore.getById(produtoId);
      if (!item) return;
      if (getProdutoUiState(item).blockActions) {
        mostrarToast('Este produto possui uma sincronizacao pendente.', 'erro');
        return;
      }

      if (!item.receitasCarregadas) {
        carregarReceitas(produtoId, true);
        return;
      }

      const receitas = (item.receitas || []).map(r => {
        if (r.receita_id !== receitaId) return r;
        return { ...r, _editing: true };
      });

      ProdutosStore.update(produtoId, { receitas });
      renderListaAtual();
    }

    function cancelarEdicaoReceita(produtoId, receitaId) {
      const item = ProdutosStore.getById(produtoId);
      if (!item) return;

      if (!item.receitasCarregadas) return;

      carregarReceitas(produtoId, true);
    }

    function validarReceita(dados, entradas, saidas) {
      const nome = String(dados?.nome_receita || '').trim();
      if (!nome) return 'Informe o nome do modelo';

      if (!Array.isArray(entradas) || entradas.length === 0) {
        return 'Adicione ao menos uma entrada';
      }

      for (const e of entradas) {
        const tipo = String(e.tipo_item || '').trim().toUpperCase();
        const nomeItem = String(e.nome_item || '').trim();
        const categoria = String(e.categoria || '').trim();
        const unidade = String(e.unidade || '').trim();
        const qtd = parseNumeroInput(e.qtd_pecas);
        const comp = parseNumeroInput(e.comprimento_cm);
        const larg = parseNumeroInput(e.largura_cm);
        const esp = parseNumeroInput(e.espessura_cm);

        if (!tipo) return 'Informe o tipo da entrada';
        if (!nomeItem) return 'Informe o nome da entrada';
        if (!isTipoValidacao(tipo)) {
          return 'Tipo de entrada invalido';
        }
        if (!categoria || !isCategoriaValidaParaTipo(tipo, categoria)) {
          return 'Categoria da entrada invalida';
        }
        if (!unidade || !isUnidadeValidacao(unidade)) {
          return 'Unidade da entrada invalida';
        }
        if (tipo === 'MADEIRA') {
          if (!comp || !larg || !esp) return 'Dimensoes invalidas';
          const volumeM3 = (comp * larg * esp) / 1000000;
          if (!volumeM3 || volumeM3 <= 0) return 'Volume de madeira invalido';
        } else if (!qtd || qtd <= 0) {
          return 'Quantidade de entrada invalida';
        }
      }

      if (!Array.isArray(saidas) || saidas.length === 0) {
        return 'Adicione ao menos uma saida';
      }

      for (const s of saidas) {
        const nomeSaida = String(s.nome_saida || '').trim();
        const tipo = String(s.tipo_item || '').trim().toUpperCase();
        const categoria = String(s.categoria || '').trim();
        const unidade = String(s.unidade || '').trim();
        const qtd = parseNumeroInput(s.quantidade);
        if (!nomeSaida) return 'Informe o nome da saida';
        if (!tipo) return 'Informe o tipo da saida';
        if (!isTipoValidacao(tipo)) {
          return 'Tipo da saida invalido';
        }
        if (!categoria || !isCategoriaValidaParaTipo(tipo, categoria)) {
          return 'Categoria da saida invalida';
        }
        if (!unidade || !isUnidadeValidacao(unidade)) {
          return 'Unidade da saida invalida';
        }
        if (!qtd || qtd <= 0) return 'Quantidade de saida invalida';
      }

      return '';
    }

    function salvarReceita(produtoId, receitaId, dados, entradas, saidas, buttonEl) {
      if (!podeAlterarDados('Salvamento bloqueado em modo somente leitura')) return;
      const item = ProdutosStore.getById(produtoId);
      if (!item) return;
      if (getProdutoUiState(item).blockActions) {
        mostrarToast('Este produto possui uma sincronizacao pendente.', 'erro');
        return;
      }

      const erro = validarReceita(dados, entradas, saidas);
      if (erro) {
        mostrarToast(erro, 'erro');
        return;
      }

      const snapshot = JSON.parse(JSON.stringify(item));
      const receitas = (item.receitas || []).map(r => {
        if (r.receita_id !== receitaId) return r;
        return {
          ...r,
          ...dados,
          entradas: entradas || [],
          saidas: saidas || [],
          _editing: false
        };
      });

      const acaoBotao = iniciarAcaoBotao(buttonEl, 'Salvar', 'Salvando');
      window.AppModalUI?.closeAll?.();
      ProdutosStore.update(produtoId, { receitas });
      renderListaAtual();
      mostrarToast('Salvando modelo...');

      window.AppRequest.runner()
        .withFailureHandler(() => {
          finalizarAcaoBotao(acaoBotao);
          ProdutosStore.update(produtoId, snapshot);
          renderListaAtual();
          mostrarToast('Erro ao salvar modelo', 'erro');
        })
        .withSuccessHandler(() => {
          finalizarAcaoBotao(acaoBotao, { sucesso: true, closeModals: true });
          carregarReceitas(produtoId, true);
          mostrarToast('Modelo salvo');
        })
        .salvarReceitaCompleta(receitaId, dados || {}, entradas || [], saidas || []);
    }

    function duplicarReceita(produtoId, receitaId) {
      const _ = receitaId;
      if (!produtoId) return;
      mostrarToast('Duplicacao desativada: cada produto tem apenas um modelo', 'erro');
    }

    function excluirReceita(produtoId, receitaId) {
      const _ = receitaId;
      if (!produtoId) return;
      mostrarToast('Exclusao desativada: o modelo do produto deve ser editado', 'erro');
    }

    function salvar() {
      if (!podeAlterarDados('Salvamento bloqueado em modo somente leitura')) return;
      if (salvando) return;
      const get = id => document.getElementById(id)?.value || '';
      const nomeProduto = String(get('produtoNome') || '').trim();
      const precoVendaInput = parseNumeroInput(get('produtoPrecoVenda'));
      if (!nomeProduto) {
        mostrarToast('Informe o nome do produto', 'erro');
        return;
      }
      if (precoVendaInput !== '' && (!isFinite(precoVendaInput) || precoVendaInput <= 0)) {
        mostrarToast('Preco de venda deve ser maior que zero', 'erro');
        return;
      }
      const precoVenda = precoVendaInput === '' ? '' : Number(precoVendaInput.toFixed(2));

      const modelo = window.ProdutosUI?.obterModeloFormularioPayload
        ? ProdutosUI.obterModeloFormularioPayload()
        : {
          dados: { nome_receita: 'Modelo principal', descricao: '' },
          entradas: [],
          saidas: [],
          etapas: []
        };

      const erroModelo = validarReceita(modelo?.dados, modelo?.entradas, modelo?.saidas);
      if (erroModelo) {
        mostrarToast(erroModelo, 'erro');
        return;
      }

      const dadosProduto = {
        nome_produto: nomeProduto,
        unidade_produto: 'UN',
        preco_venda: precoVenda
      };

      const produtoId = editandoId || '';
      const eraEdicao = !!editandoId;
      const idEdicaoAtual = editandoId;
      const payloadReabertura = {
        dadosProduto: { ...dadosProduto },
        modelo: JSON.parse(JSON.stringify(modelo || {}))
      };
      const payloadMutacao = {
        dadosProduto: { ...dadosProduto },
        modelo: JSON.parse(JSON.stringify(modelo || {}))
      };
      const optimisticId = eraEdicao
        ? String(produtoId || '').trim()
        : (window.AppEntityMutations?.tempId?.('PRD_TMP') || `PRD_TMP_${Date.now()}`);
      const snapshot = eraEdicao ? ProdutosStore.getById(produtoId) : null;
      const optimisticItem = buildProdutoOptimistic(payloadMutacao, {
        baseItem: snapshot,
        id: optimisticId
      });

      setSalvando(true);
      finalizarUX();
      mostrarToast('Salvando produto e modelo...');
      try {
        if (!window.AppOptimistic?.enqueue) {
          throw new Error('Fila de sincronizacao indisponivel');
        }
        window.AppOptimistic.enqueue({
          scope: 'produto',
          handler: 'produto.save',
          entityKey: `produto:${optimisticId}`,
          payload: payloadMutacao,
          meta: {
            domain: 'produto',
            action: eraEdicao ? 'update' : 'create',
            source: 'produtos',
            target_id: eraEdicao ? String(produtoId || '').trim() : '',
            temp_id: eraEdicao ? '' : optimisticId,
            before_item: snapshot ? limparProdutoMeta(snapshot) : null,
            optimistic_item: limparProdutoMeta(optimisticItem)
          }
        });
        editandoId = null;
        setSalvando(false);
        window.AppModalUI?.closeAll?.();
        mostrarToast(eraEdicao
          ? 'Alteracao aplicada localmente. Sincronizando...'
          : 'Produto criado localmente. Sincronizando...');
      } catch (error) {
        setSalvando(false);
        mostrarToast(error?.message || 'Erro ao enfileirar produto/modelo', 'erro');
        reabrirFormularioAposErro(payloadReabertura, {
          editando: eraEdicao,
          id: idEdicaoAtual
        });
      }
    }

    function finalizarUX() {
      ProdutosUI.fecharFormulario();
    }

    function editar(id) {
      if (!podeAlterarDados('Edicao bloqueada em modo somente leitura')) return;
      const item = ProdutosStore.getById(id);

      if (!item) {
        mostrarToast('Produto nao encontrado', 'erro');
        return;
      }
      if (getProdutoUiState(item).blockActions) {
        mostrarToast('Este produto possui uma sincronizacao pendente.', 'erro');
        return;
      }

      editandoId = id;
      ProdutosUI.preencherFormulario(item);
      if (window.ProdutosUI?.resetModeloFormulario) {
        ProdutosUI.resetModeloFormulario();
      }
      ProdutosUI.mostrarFormulario();

      window.AppRequest.runner()
        .withSuccessHandler(modelo => {
          if (window.ProdutosUI?.preencherModeloFormulario) {
            ProdutosUI.preencherModeloFormulario(modelo || {});
          }
        })
        .withFailureHandler(() => {
          mostrarToast('Erro ao carregar modelo do produto', 'erro');
        })
        .obterModeloProduto(id);
    }

    function excluir(id) {
      if (!podeAlterarDados('Exclusao bloqueada em modo somente leitura')) return;
      if (!confirm('Deseja remover este produto?')) return;

      const snapshot = ProdutosStore.getById(id);
      if (!snapshot) {
        mostrarToast('Produto nao encontrado', 'erro');
        return;
      }
      if (getProdutoUiState(snapshot).blockActions) {
        mostrarToast('Este produto ja possui uma sincronizacao pendente.', 'erro');
        return;
      }

      try {
        if (!window.AppOptimistic?.enqueue) {
          throw new Error('Fila de sincronizacao indisponivel');
        }
        window.AppOptimistic.enqueue({
          scope: 'produto',
          handler: 'produto.delete',
          entityKey: `produto:${String(id || '').trim()}`,
          payload: {
            id: String(id || '').trim()
          },
          meta: {
            domain: 'produto',
            action: 'delete',
            source: 'produtos',
            target_id: String(id || '').trim(),
            before_item: limparProdutoMeta(snapshot),
            optimistic_item: limparProdutoMeta(snapshot)
          }
        });
        mostrarToast('Exclusao aplicada localmente. Sincronizando...');
      } catch (error) {
        mostrarToast(error?.message || 'Erro ao enfileirar exclusao do produto', 'erro');
      }
    }

    function limparEdicao() {
      editandoId = null;
    }

    return {
      init,
      syncFromBackend,
      salvar,
      editar,
      excluir,
      carregarReceitas,
      criarReceita,
      iniciarEdicaoReceita,
      cancelarEdicaoReceita,
      salvarReceita,
      duplicarReceita,
      excluirReceita,
      retryProdutoMutation,

      limparEdicao
    };

  })();
</script>
