<script>
  window.ProdutosController = (() => {

    let editandoId = null;
    let iniciado = false;
    let salvando = false;
    let mutationLockToken = null;

    let receitasCache = {};
    let tiposValidacao = [];
    let unidadesValidacao = [];
    let categoriasValidacao = [];
    let categoriasPorTipoValidacao = {};

    function parseNumeroInput(valor) {
      const s = String(valor ?? '').trim();
      if (s === '') return '';
      const n = Number(s.replace(',', '.'));
      return isNaN(n) ? '' : n;
    }

    function formatPrecoVendaInput(valor) {
      const n = Number(String(valor ?? '').replace(',', '.'));
      if (!isFinite(n) || n <= 0) return '';
      return String(Number(n.toFixed(2)));
    }

    function setSalvando(ativo) {
      salvando = !!ativo;
      if (window.AppMutationUI?.lock && window.AppMutationUI?.unlock) {
        if (salvando) {
          if (!mutationLockToken) {
            mutationLockToken = window.AppMutationUI.lock();
          }
        } else if (mutationLockToken) {
          window.AppMutationUI.unlock(mutationLockToken);
          mutationLockToken = null;
        }
      }
      const btn = document.getElementById('btnSalvarProduto');
      if (!btn) return;
      btn.disabled = salvando;
      if (window.AppLoading?.setButtonLoading) {
        window.AppLoading.setButtonLoading(btn, salvando, 'Salvar', 'Salvando');
      } else {
        btn.textContent = salvando ? 'Salvando...' : 'Salvar';
      }
    }

    function reabrirFormularioAposErro(payload, opcoes = {}) {
      const editando = !!opcoes.editando;
      editandoId = editando ? String(opcoes.id || '') : null;

      if (window.ProdutosUI?.resetFormulario) {
        ProdutosUI.resetFormulario();
      }

      const dadosProduto = payload?.dadosProduto || {};
      const modelo = payload?.modelo || {
        dados: { nome_receita: 'Modelo principal', descricao: '' },
        entradas: [],
        saidas: [],
        etapas: []
      };

      const nomeInput = document.getElementById('produtoNome');
      if (nomeInput) nomeInput.value = String(dadosProduto.nome_produto || '').trim();
      const precoInput = document.getElementById('produtoPrecoVenda');
      if (precoInput) precoInput.value = formatPrecoVendaInput(dadosProduto.preco_venda);
      if (window.ProdutosUI?.preencherModeloFormulario) {
        ProdutosUI.preencherModeloFormulario(modelo);
      }
      const titulo = document.getElementById('produtoFormTitulo');
      if (titulo) {
        titulo.innerText = editando ? 'Editar Produto' : 'Novo Produto';
      }
      ProdutosUI.mostrarFormulario();
    }

    function podeAlterarDados(contexto = 'Operacao') {
      if (window.AppRuntime?.ensureWritable) {
        return window.AppRuntime.ensureWritable(contexto);
      }
      return true;
    }

    function isTipoValidacao(tipo) {
      const t = String(tipo || '').toUpperCase();
      return (tiposValidacao || []).some(v => String(v || '').toUpperCase() === t);
    }

    function isValorValidacao(lista, valor) {
      const alvo = String(valor || '').trim().toUpperCase();
      if (!alvo) return false;
      return (lista || []).some(v => String(v || '').trim().toUpperCase() === alvo);
    }

    function isUnidadeValidacao(unidade) {
      return isValorValidacao(unidadesValidacao, unidade);
    }

    function isCategoriaValidacao(categoria) {
      return isValorValidacao(categoriasValidacao, categoria);
    }

    function getCategoriasPorTipo(tipo) {
      const t = String(tipo || '').trim().toUpperCase();
      if (!t) return [];
      return Array.isArray(categoriasPorTipoValidacao[t])
        ? categoriasPorTipoValidacao[t]
        : [];
    }

    function isCategoriaValidaParaTipo(tipo, categoria) {
      const categoriasTipo = getCategoriasPorTipo(tipo);
      if (categoriasTipo.length > 0) {
        return isValorValidacao(categoriasTipo, categoria);
      }
      return isCategoriaValidacao(categoria);
    }

    function init() {
      if (iniciado) return;

      carregarValidacoes();
      carregarProdutos();

      iniciado = true;
    }

    function atualizarOpcoesReceitas() {
      if (!window.ProdutosUI || !window.ProdutosStore) return;
      ProdutosUI.setOpcoesReceitas({
        tipos: tiposValidacao,
        unidades: unidadesValidacao,
        categorias: categoriasValidacao,
        categoriasPorTipo: categoriasPorTipoValidacao
      });
    }

    function carregarValidacoes() {
      const loader = window.AppValidacoes?.get
        ? window.AppValidacoes.get({ maxAgeMs: 1000 * 60 * 60 * 12 })
        : Promise.reject(new Error('cache de validacoes indisponivel'));

      loader
        .then(({ data }) => {
          const validacoes = data || {};
          tiposValidacao = Array.isArray(validacoes.tipos) ? validacoes.tipos : [];
          unidadesValidacao = Array.isArray(validacoes.unidades) ? validacoes.unidades : [];
          categoriasValidacao = Array.isArray(validacoes.categorias) ? validacoes.categorias : [];
          categoriasPorTipoValidacao = validacoes.categoriasPorTipo && typeof validacoes.categoriasPorTipo === 'object'
            ? validacoes.categoriasPorTipo
            : {};
          atualizarOpcoesReceitas();
        })
        .catch(() => {
          tiposValidacao = [];
          unidadesValidacao = [];
          categoriasValidacao = [];
          categoriasPorTipoValidacao = {};
          atualizarOpcoesReceitas();
        });
    }

    function renderListaAtual() {
      if (window.aplicarBuscaProdutos) {
        aplicarBuscaProdutos();
        return;
      }
      ProdutosUI.renderLista(ProdutosStore.get());
    }

    function hidratarProdutosDoCache() {
      const listaCache = window.AppTabCache?.ler?.('produtos');
      if (!Array.isArray(listaCache)) return false;
      ProdutosStore.set(listaCache);
      atualizarOpcoesReceitas();
      renderListaAtual();
      return true;
    }

    function carregarProdutos(forcarRecarregar = false) {
      const exibindoCache = !forcarRecarregar && hidratarProdutosDoCache();
      google.script.run
        .withSuccessHandler(lista => {
          if (window.AppRuntime?.setReadOnly) {
            window.AppRuntime.setReadOnly(false);
          }
          const atual = ProdutosStore.get();
          const map = {};
          atual.forEach(p => {
            if (p && p.produto_id) {
              map[p.produto_id] = p;
            }
          });

          const normalizada = (Array.isArray(lista) ? lista : []).map(p => {
            const existente = map[p.produto_id] || {};
            return {
              ...p,
              receitas: Array.isArray(existente.receitas) ? existente.receitas : [],
              receitasCarregadas: !!existente.receitasCarregadas
            };
          });

          ProdutosStore.set(normalizada);
          atualizarOpcoesReceitas();
          renderListaAtual();
        })
        .withFailureHandler(() => {
          if (exibindoCache) {
            if (window.AppRuntime?.setReadOnly) {
              window.AppRuntime.setReadOnly(true, 'Sem conexao com backend - exibindo cache local');
            }
            mostrarToast('Exibindo ultimo snapshot em cache', 'erro');
            return;
          }
          mostrarToast('Erro ao carregar produtos', 'erro');
        })
        .listarProdutos();
    }

    function syncFromBackend() {
      carregarProdutos(true);
    }

    function carregarReceitas(produtoId, forcar = false) {
      const item = ProdutosStore.getById(produtoId);
      if (!item) return;

      if (item.receitasCarregadas && !forcar) return;

      google.script.run
        .withSuccessHandler(receitas => {
          const lista = Array.isArray(receitas) ? receitas : [];
          if (lista.length === 0) {
            google.script.run
              .withSuccessHandler(receita => {
                const receitaBase = receita && receita.receita_id
                  ? [{
                    ...receita,
                    entradas: Array.isArray(receita.entradas) ? receita.entradas : [],
                    saidas: Array.isArray(receita.saidas) ? receita.saidas : [],
                    _editing: true
                  }]
                  : [];

                receitasCache[produtoId] = receitaBase;
                ProdutosStore.update(produtoId, {
                  receitas: receitaBase,
                  receitasCarregadas: true
                });
                renderListaAtual();
              })
              .withFailureHandler(() => {
                mostrarToast('Erro ao criar modelo inicial', 'erro');
              })
              .criarReceitaProduto(produtoId, {
                nome_receita: 'Modelo principal'
              });
            return;
          }

          if (lista.length > 1) {
            mostrarToast('Apenas um modelo por produto. Usando o modelo principal.');
          }

          const receitaUnica = [lista[0]];
          receitasCache[produtoId] = receitaUnica;
          ProdutosStore.update(produtoId, {
            receitas: receitaUnica,
            receitasCarregadas: true
          });
          renderListaAtual();
        })
        .withFailureHandler(() => {
          mostrarToast('Erro ao carregar receitas', 'erro');
        })
        .listarReceitasProduto(produtoId);
    }

    function criarReceita(produtoId) {
      if (!podeAlterarDados('Edicao bloqueada em modo somente leitura')) return;
      const item = ProdutosStore.getById(produtoId);
      if (!item) return;

      mostrarToast('Carregando modelo...');

      google.script.run
        .withSuccessHandler(receita => {
          const receitaUnica = receita && receita.receita_id
            ? [{
            ...receita,
            entradas: [],
            saidas: [],
            _editing: true
          }]
            : [];

          ProdutosStore.update(produtoId, {
            receitas: receitaUnica,
            receitasCarregadas: true
          });
          renderListaAtual();
        })
        .withFailureHandler(() => {
          mostrarToast('Erro ao carregar modelo', 'erro');
        })
        .criarReceitaProduto(produtoId, {
          nome_receita: 'Modelo principal'
        });
    }

    function iniciarEdicaoReceita(produtoId, receitaId) {
      if (!podeAlterarDados('Edicao bloqueada em modo somente leitura')) return;
      const item = ProdutosStore.getById(produtoId);
      if (!item) return;

      if (!item.receitasCarregadas) {
        carregarReceitas(produtoId, true);
        return;
      }

      const receitas = (item.receitas || []).map(r => {
        if (r.receita_id !== receitaId) return r;
        return { ...r, _editing: true };
      });

      ProdutosStore.update(produtoId, { receitas });
      renderListaAtual();
    }

    function cancelarEdicaoReceita(produtoId, receitaId) {
      const item = ProdutosStore.getById(produtoId);
      if (!item) return;

      if (!item.receitasCarregadas) return;

      carregarReceitas(produtoId, true);
    }

    function validarReceita(dados, entradas, saidas) {
      const nome = String(dados?.nome_receita || '').trim();
      if (!nome) return 'Informe o nome da receita';

      if (!Array.isArray(entradas) || entradas.length === 0) {
        return 'Adicione ao menos uma entrada';
      }

      for (const e of entradas) {
        const tipo = String(e.tipo_item || '').trim().toUpperCase();
        const nomeItem = String(e.nome_item || '').trim();
        const categoria = String(e.categoria || '').trim();
        const unidade = String(e.unidade || '').trim();
        const qtd = parseNumeroInput(e.qtd_pecas);
        const comp = parseNumeroInput(e.comprimento_cm);
        const larg = parseNumeroInput(e.largura_cm);
        const esp = parseNumeroInput(e.espessura_cm);

        if (!tipo) return 'Informe o tipo da entrada';
        if (!nomeItem) return 'Informe o nome da entrada';
        if (!isTipoValidacao(tipo)) {
          return 'Tipo de entrada invalido';
        }
        if (!categoria || !isCategoriaValidaParaTipo(tipo, categoria)) {
          return 'Categoria da entrada invalida';
        }
        if (!unidade || !isUnidadeValidacao(unidade)) {
          return 'Unidade da entrada invalida';
        }
        if (tipo === 'MADEIRA') {
          if (!comp || !larg || !esp) return 'Dimensoes invalidas';
          const volumeM3 = (comp * larg * esp) / 1000000;
          if (!volumeM3 || volumeM3 <= 0) return 'Volume de madeira invalido';
        } else if (!qtd || qtd <= 0) {
          return 'Quantidade de entrada invalida';
        }
      }

      if (!Array.isArray(saidas) || saidas.length === 0) {
        return 'Adicione ao menos uma saida';
      }

      for (const s of saidas) {
        const nomeSaida = String(s.nome_saida || '').trim();
        const tipo = String(s.tipo_item || '').trim().toUpperCase();
        const categoria = String(s.categoria || '').trim();
        const unidade = String(s.unidade || '').trim();
        const qtd = parseNumeroInput(s.quantidade);
        if (!nomeSaida) return 'Informe o nome da saida';
        if (!tipo) return 'Informe o tipo da saida';
        if (!isTipoValidacao(tipo)) {
          return 'Tipo da saida invalido';
        }
        if (!categoria || !isCategoriaValidaParaTipo(tipo, categoria)) {
          return 'Categoria da saida invalida';
        }
        if (!unidade || !isUnidadeValidacao(unidade)) {
          return 'Unidade da saida invalida';
        }
        if (!qtd || qtd <= 0) return 'Quantidade de saida invalida';
      }

      return '';
    }

    function salvarReceita(produtoId, receitaId, dados, entradas, saidas) {
      if (!podeAlterarDados('Salvamento bloqueado em modo somente leitura')) return;
      const item = ProdutosStore.getById(produtoId);
      if (!item) return;

      const erro = validarReceita(dados, entradas, saidas);
      if (erro) {
        mostrarToast(erro, 'erro');
        return;
      }

      const snapshot = JSON.parse(JSON.stringify(item));
      const receitas = (item.receitas || []).map(r => {
        if (r.receita_id !== receitaId) return r;
        return {
          ...r,
          ...dados,
          entradas: entradas || [],
          saidas: saidas || [],
          _editing: false
        };
      });

      ProdutosStore.update(produtoId, { receitas });
      renderListaAtual();
      mostrarToast('Salvando receita...');

      google.script.run
        .withFailureHandler(() => {
          ProdutosStore.update(produtoId, snapshot);
          renderListaAtual();
          mostrarToast('Erro ao salvar receita', 'erro');
        })
        .withSuccessHandler(() => {
          carregarReceitas(produtoId, true);
          mostrarToast('Receita salva');
        })
        .salvarReceitaCompleta(receitaId, dados || {}, entradas || [], saidas || []);
    }

    function duplicarReceita(produtoId, receitaId) {
      const _ = receitaId;
      if (!produtoId) return;
      mostrarToast('Duplicacao desativada: cada produto tem apenas um modelo', 'erro');
    }

    function excluirReceita(produtoId, receitaId) {
      const _ = receitaId;
      if (!produtoId) return;
      mostrarToast('Exclusao desativada: o modelo do produto deve ser editado', 'erro');
    }

    function salvar() {
      if (!podeAlterarDados('Salvamento bloqueado em modo somente leitura')) return;
      if (salvando) return;
      const get = id => document.getElementById(id)?.value || '';
      const nomeProduto = String(get('produtoNome') || '').trim();
      const precoVendaInput = parseNumeroInput(get('produtoPrecoVenda'));
      if (!nomeProduto) {
        mostrarToast('Informe o nome do produto', 'erro');
        return;
      }
      if (precoVendaInput !== '' && (!isFinite(precoVendaInput) || precoVendaInput <= 0)) {
        mostrarToast('Preco de venda deve ser maior que zero', 'erro');
        return;
      }
      const precoVenda = precoVendaInput === '' ? '' : Number(precoVendaInput.toFixed(2));

      const modelo = window.ProdutosUI?.obterModeloFormularioPayload
        ? ProdutosUI.obterModeloFormularioPayload()
        : {
          dados: { nome_receita: 'Modelo principal', descricao: '' },
          entradas: [],
          saidas: [],
          etapas: []
        };

      const erroModelo = validarReceita(modelo?.dados, modelo?.entradas, modelo?.saidas);
      if (erroModelo) {
        mostrarToast(erroModelo, 'erro');
        return;
      }

      const dadosProduto = {
        nome_produto: nomeProduto,
        unidade_produto: 'UN',
        preco_venda: precoVenda
      };

      const produtoId = editandoId || '';
      const eraEdicao = !!editandoId;
      const idEdicaoAtual = editandoId;
      const payloadReabertura = {
        dadosProduto: { ...dadosProduto },
        modelo: JSON.parse(JSON.stringify(modelo || {}))
      };

      setSalvando(true);
      finalizarUX();
      mostrarToast('Salvando produto e modelo...');

      google.script.run
        .withFailureHandler(() => {
          setSalvando(false);
          mostrarToast('Erro ao salvar produto/modelo', 'erro');
          reabrirFormularioAposErro(payloadReabertura, {
            editando: eraEdicao,
            id: idEdicaoAtual
          });
        })
        .withSuccessHandler(() => {
          editandoId = null;
          carregarProdutos();
          atualizarOpcoesReceitas();
          mostrarToast('Salvo com sucesso');
          setSalvando(false);
        })
        .salvarProdutoComModelo(
          produtoId,
          dadosProduto,
          modelo?.dados || {},
          modelo?.entradas || [],
          modelo?.saidas || [],
          modelo?.etapas || []
        );
    }

    function finalizarUX() {
      ProdutosUI.fecharFormulario();
    }

    function editar(id) {
      if (!podeAlterarDados('Edicao bloqueada em modo somente leitura')) return;
      const item = ProdutosStore.getById(id);

      if (!item) {
        mostrarToast('Produto nao encontrado', 'erro');
        return;
      }

      editandoId = id;
      ProdutosUI.preencherFormulario(item);
      if (window.ProdutosUI?.resetModeloFormulario) {
        ProdutosUI.resetModeloFormulario();
      }
      ProdutosUI.mostrarFormulario();

      google.script.run
        .withSuccessHandler(modelo => {
          if (window.ProdutosUI?.preencherModeloFormulario) {
            ProdutosUI.preencherModeloFormulario(modelo || {});
          }
        })
        .withFailureHandler(() => {
          mostrarToast('Erro ao carregar modelo do produto', 'erro');
        })
        .obterModeloProduto(id);
    }

    function enviarParaProducao(produtoId) {
      const prodId = String(produtoId || '').trim();
      if (!prodId) {
        mostrarToast('Produto invalido', 'erro');
        return;
      }

      if (typeof trocarAba === 'function') {
        trocarAba('producao');
      }

      setTimeout(() => {
        if (window.ProducaoController?.abrirFormularioComModelo) {
          ProducaoController.abrirFormularioComModelo(prodId);
          return;
        }
        mostrarToast('Modulo de producao indisponivel', 'erro');
      }, 80);
    }

    function excluir(id) {
      if (!podeAlterarDados('Exclusao bloqueada em modo somente leitura')) return;
      if (!confirm('Deseja remover este produto?')) return;

      const snapshot = ProdutosStore.getById(id);

      ProdutosStore.remove(id);
      renderListaAtual();
      mostrarToast('Produto removido');

      google.script.run
        .withFailureHandler(() => {
          ProdutosStore.add(snapshot);
          renderListaAtual();
          mostrarToast('Erro ao remover', 'erro');
        })
        .withSuccessHandler(() => {
          atualizarOpcoesReceitas();
        })
        .deletarProduto(id);
    }

    function limparEdicao() {
      editandoId = null;
    }

    return {
      init,
      syncFromBackend,
      salvar,
      editar,
      enviarParaProducao,
      excluir,
      carregarReceitas,
      criarReceita,
      iniciarEdicaoReceita,
      cancelarEdicaoReceita,
      salvarReceita,
      duplicarReceita,
      excluirReceita,

      limparEdicao
    };

  })();
</script>
