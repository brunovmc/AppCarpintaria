<script>
  window.ProdutosController = (() => {

    let editandoId = null;
    let iniciado = false;

    let estoqueOpcoes = [];
    let receitasCache = {};

    function parseNumeroInput(valor) {
      const s = String(valor ?? '').trim();
      if (s === '') return '';
      const n = Number(s.replace(',', '.'));
      return isNaN(n) ? '' : n;
    }

    function getTiposEstoque() {
      const tipos = new Set();
      (estoqueOpcoes || []).forEach(item => {
        if (item && item.tipo) {
          tipos.add(String(item.tipo || '').toUpperCase());
        }
      });
      return tipos;
    }

    function isTipoEstoque(tipo) {
      return getTiposEstoque().has(String(tipo || '').toUpperCase());
    }

    function init() {
      if (iniciado) return;

      carregarEstoqueOpcoes();
      carregarProdutos();

      iniciado = true;
    }

    function atualizarOpcoesReceitas() {
      if (!window.ProdutosUI || !window.ProdutosStore) return;
      const produtos = ProdutosStore.get();
      ProdutosUI.setOpcoesReceitas({
        estoque: estoqueOpcoes,
        produtos
      });
    }

    function renderListaAtual() {
      if (window.aplicarBuscaProdutos) {
        aplicarBuscaProdutos();
        return;
      }
      ProdutosUI.renderLista(ProdutosStore.get());
    }

    function carregarEstoqueOpcoes() {
      google.script.run
        .withSuccessHandler(lista => {
          estoqueOpcoes = Array.isArray(lista) ? lista : [];
          atualizarOpcoesReceitas();
        })
        .listarEstoque();
    }

    function carregarProdutos() {
      google.script.run
        .withSuccessHandler(lista => {
          const atual = ProdutosStore.get();
          const map = {};
          atual.forEach(p => {
            if (p && p.produto_id) {
              map[p.produto_id] = p;
            }
          });

          const normalizada = (Array.isArray(lista) ? lista : []).map(p => {
            const existente = map[p.produto_id] || {};
            return {
              ...p,
              receitas: Array.isArray(existente.receitas) ? existente.receitas : [],
              receitasCarregadas: !!existente.receitasCarregadas
            };
          });

          ProdutosStore.set(normalizada);
          atualizarOpcoesReceitas();
          renderListaAtual();
        })
        .listarProdutos();
    }

    function carregarReceitas(produtoId, forcar = false) {
      const item = ProdutosStore.getById(produtoId);
      if (!item) return;

      if (item.receitasCarregadas && !forcar) return;

      google.script.run
        .withSuccessHandler(receitas => {
          receitasCache[produtoId] = Array.isArray(receitas) ? receitas : [];
          ProdutosStore.update(produtoId, {
            receitas: Array.isArray(receitas) ? receitas : [],
            receitasCarregadas: true
          });
          renderListaAtual();
        })
        .withFailureHandler(() => {
          mostrarToast('Erro ao carregar receitas', 'erro');
        })
        .listarReceitasProduto(produtoId);
    }

    function carregarReceitasProdutoEntrada(produtoId, forcar = false) {
      if (!produtoId || !window.ProdutosUI) return;

      if (receitasCache[produtoId] && !forcar) {
        ProdutosUI.setReceitasProduto(produtoId, receitasCache[produtoId]);
        return;
      }

      google.script.run
        .withSuccessHandler(receitas => {
          const lista = Array.isArray(receitas) ? receitas : [];
          receitasCache[produtoId] = lista;
          ProdutosUI.setReceitasProduto(produtoId, lista);
        })
        .withFailureHandler(() => {
          mostrarToast('Erro ao carregar receitas do produto', 'erro');
        })
        .listarReceitasProduto(produtoId);
    }

    function criarReceita(produtoId) {
      const item = ProdutosStore.getById(produtoId);
      if (!item) return;

      mostrarToast('Criando receita...');

      google.script.run
        .withSuccessHandler(receita => {
          const receitas = Array.isArray(item.receitas) ? [...item.receitas] : [];
          receitas.unshift({
            ...receita,
            entradas: [],
            saidas: [],
            _editing: true
          });

          ProdutosStore.update(produtoId, {
            receitas,
            receitasCarregadas: true
          });
          renderListaAtual();
        })
        .withFailureHandler(() => {
          mostrarToast('Erro ao criar receita', 'erro');
        })
        .criarReceitaProduto(produtoId, {
          nome_receita: 'Nova receita'
        });
    }

    function iniciarEdicaoReceita(produtoId, receitaId) {
      const item = ProdutosStore.getById(produtoId);
      if (!item) return;

      if (!item.receitasCarregadas) {
        carregarReceitas(produtoId, true);
        return;
      }

      const receitas = (item.receitas || []).map(r => {
        if (r.receita_id !== receitaId) return r;
        return { ...r, _editing: true };
      });

      ProdutosStore.update(produtoId, { receitas });
      renderListaAtual();
    }

    function cancelarEdicaoReceita(produtoId, receitaId) {
      const item = ProdutosStore.getById(produtoId);
      if (!item) return;

      if (!item.receitasCarregadas) return;

      carregarReceitas(produtoId, true);
    }

    function validarReceita(dados, entradas, saidas) {
      const nome = String(dados?.nome_receita || '').trim();
      if (!nome) return 'Informe o nome da receita';

      if (!Array.isArray(entradas) || entradas.length === 0) {
        return 'Adicione ao menos uma entrada';
      }

      for (const e of entradas) {
        const tipo = String(e.tipo_item || '').trim().toUpperCase();
        const nomeItem = String(e.nome_item || '').trim();
        const qtd = parseNumeroInput(e.qtd_pecas);
        const comp = parseNumeroInput(e.comprimento_cm);
        const larg = parseNumeroInput(e.largura_cm);
        const esp = parseNumeroInput(e.espessura_cm);

        if (!tipo) return 'Informe o tipo da entrada';
        if (!nomeItem) return 'Informe o nome da entrada';
        if (tipo !== 'LIVRE' && tipo !== 'PRODUTO' && !isTipoEstoque(tipo)) {
          return 'Tipo de entrada invalido';
        }
        if (tipo === 'PRODUTO') {
          const prodId = String(e.produto_ref_id || '').trim();
          const recId = String(e.receita_ref_id || '').trim();
          if (!prodId) return 'Selecione o produto da entrada';
          if (!recId) return 'Selecione a receita da entrada';
        }
        if (isTipoEstoque(tipo) && !String(e.estoque_ref_id || '').trim()) {
          return 'Selecione o item do estoque';
        }
        if (!qtd || qtd <= 0) return 'Qtd de pecas invalida';
        if (tipo === 'MADEIRA' && (!comp || !larg || !esp)) {
          return 'Dimensoes invalidas';
        }
      }

      if (!Array.isArray(saidas) || saidas.length === 0) {
        return 'Adicione ao menos uma saida';
      }

      for (const s of saidas) {
        const nomeSaida = String(s.nome_saida || '').trim();
        const qtd = parseNumeroInput(s.quantidade);
        if (!nomeSaida) return 'Informe o nome da saida';
        if (!qtd || qtd <= 0) return 'Quantidade de saida invalida';
      }

      return '';
    }

    function salvarReceita(produtoId, receitaId, dados, entradas, saidas) {
      const item = ProdutosStore.getById(produtoId);
      if (!item) return;

      const erro = validarReceita(dados, entradas, saidas);
      if (erro) {
        mostrarToast(erro, 'erro');
        return;
      }

      const snapshot = JSON.parse(JSON.stringify(item));
      const receitas = (item.receitas || []).map(r => {
        if (r.receita_id !== receitaId) return r;
        return {
          ...r,
          ...dados,
          entradas: entradas || [],
          saidas: saidas || [],
          _editing: false
        };
      });

      ProdutosStore.update(produtoId, { receitas });
      renderListaAtual();
      mostrarToast('Salvando receita...');

      google.script.run
        .withFailureHandler(() => {
          ProdutosStore.update(produtoId, snapshot);
          renderListaAtual();
          mostrarToast('Erro ao salvar receita', 'erro');
        })
        .withSuccessHandler(() => {
          carregarReceitas(produtoId, true);
          mostrarToast('Receita salva');
        })
        .salvarReceitaCompleta(receitaId, dados || {}, entradas || [], saidas || []);
    }

    function duplicarReceita(produtoId, receitaId) {
      const item = ProdutosStore.getById(produtoId);
      if (!item) return;

      mostrarToast('Duplicando receita...');

      google.script.run
        .withFailureHandler(() => {
          mostrarToast('Erro ao duplicar receita', 'erro');
        })
        .withSuccessHandler(() => {
          carregarReceitas(produtoId, true);
          mostrarToast('Receita duplicada');
        })
        .duplicarReceitaProduto(receitaId);
    }

    function excluirReceita(produtoId, receitaId) {
      if (!confirm('Deseja remover esta receita?')) return;

      const item = ProdutosStore.getById(produtoId);
      if (!item) return;

      const snapshot = JSON.parse(JSON.stringify(item));
      const receitas = (item.receitas || []).filter(r => r.receita_id !== receitaId);

      ProdutosStore.update(produtoId, { receitas });
      renderListaAtual();

      google.script.run
        .withFailureHandler(() => {
          ProdutosStore.update(produtoId, snapshot);
          renderListaAtual();
          mostrarToast('Erro ao remover receita', 'erro');
        })
        .withSuccessHandler(() => {
          mostrarToast('Receita removida');
        })
        .deletarReceitaProduto(receitaId);
    }

    function salvar() {
      const get = id => document.getElementById(id)?.value || '';

      const dados = {
        nome_produto: get('produtoNome'),
        unidade_produto: 'UN',
        estoque_id: get('produtoEstoque'),
        categoria: get('produtoCategoria'),
        descricao: get('produtoDescricao'),
        observacao: get('produtoObservacao')
      };

      if (editandoId) {
        const idAtual = editandoId;
        const snapshot = { ...ProdutosStore.getById(idAtual) };

        ProdutosStore.update(idAtual, dados);
        renderListaAtual();
        finalizarUX();

        google.script.run
          .withFailureHandler(() => {
            ProdutosStore.update(idAtual, snapshot);
            renderListaAtual();
            mostrarToast('Erro ao salvar edicao', 'erro');
          })
          .withSuccessHandler(() => {
            atualizarOpcoesReceitas();
            mostrarToast('Salvo com sucesso');
          })
          .atualizarProduto(idAtual, dados);

        editandoId = null;
        return;
      }

      const tempId = `tmp_${Date.now()}`;

      const itemTemp = {
        produto_id: tempId,
        custo_previsto: 0,
        ...dados
      };

      ProdutosStore.add(itemTemp);
      renderListaAtual();
      finalizarUX();
      mostrarToast('Salvando...');

      google.script.run
        .withFailureHandler(() => {
          ProdutosStore.remove(tempId);
          renderListaAtual();
          mostrarToast('Erro ao salvar produto', 'erro');
        })
        .withSuccessHandler(itemSalvo => {
          ProdutosStore.remove(tempId);

          if (!itemSalvo || !itemSalvo.produto_id) {
            mostrarToast('Salvo. Atualizando lista...');
            carregarProdutos();
            return;
          }

          ProdutosStore.add({
            ...itemSalvo,
            custo_previsto: itemSalvo.custo_previsto || 0
          });
          atualizarOpcoesReceitas();
          renderListaAtual();
          mostrarToast('Salvo com sucesso');
        })
        .criarProduto(dados);
    }

    function finalizarUX() {
      ProdutosUI.fecharFormulario();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function editar(id) {
      const item = ProdutosStore.getById(id);

      if (!item) {
        mostrarToast('Produto nao encontrado', 'erro');
        return;
      }

      editandoId = id;
      ProdutosUI.preencherFormulario(item);
      ProdutosUI.mostrarFormulario();
    }

    function excluir(id) {
      if (!confirm('Deseja remover este produto?')) return;

      const snapshot = ProdutosStore.getById(id);

      ProdutosStore.remove(id);
      renderListaAtual();
      mostrarToast('Produto removido');

      google.script.run
        .withFailureHandler(() => {
          ProdutosStore.add(snapshot);
          renderListaAtual();
          mostrarToast('Erro ao remover', 'erro');
        })
        .withSuccessHandler(() => {
          atualizarOpcoesReceitas();
        })
        .deletarProduto(id);
    }

    function limparEdicao() {
      editandoId = null;
    }

    return {
      init,
      salvar,
      editar,
      excluir,
      carregarReceitas,
      carregarReceitasProdutoEntrada,
      criarReceita,
      iniciarEdicaoReceita,
      cancelarEdicaoReceita,
      salvarReceita,
      duplicarReceita,
      excluirReceita,

      limparEdicao
    };

  })();
</script>
