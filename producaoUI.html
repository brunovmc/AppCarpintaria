<script>
  window.ProducaoUI = (() => {
    let detalhesModalAbertoId = '';
    let delegationInit = false;
    let estoqueOpcoes = [];
    let tiposValidacao = [];
    let listaFiltradaAtual = [];
    let qtdRenderizada = 0;
    let renderJobSeq = 0;

    const RENDER_CHUNK_SIZE = 8;

    /* =========================
       HELPERS
    ========================== */
    function el() {
      return {
        formulario: document.getElementById('formularioProducao'),
        miniDashboard: document.getElementById('miniDashboardProducao'),
        lista: document.getElementById('listaProducao'),
        modalDetalhes: document.getElementById('modalDetalhesProducao'),
        modalDetalhesConteudo: document.getElementById('modalDetalhesProducaoConteudo'),
        modalDetalhesTitulo: document.getElementById('modalDetalhesProducaoTitulo'),

        // Form
        produto: document.getElementById('producaoProduto'),
        receita: document.getElementById('producaoReceita'),
        nome: document.getElementById('producaoNome'),
        qtd: document.getElementById('producaoQtd'),
        status: document.getElementById('producaoStatus'),
        dataInicio: document.getElementById('producaoDataInicio'),
        dataPrevista: document.getElementById('producaoDataPrevista'),
        observacao: document.getElementById('producaoObservacao'),
        formTitulo: document.getElementById('producaoFormTitulo'),

        // Modal consumo
        modalConsumo: document.getElementById('modalConsumoProducao'),
        consumoTitulo: document.getElementById('consumoTitulo'),
        consumoResumoLote: document.getElementById('consumoResumoLote'),
        consumoQtdProduzida: document.getElementById('consumoQtdProduzida'),
        consumoBypassEntradas: document.getElementById('consumoBypassEntradas'),
        consumoLista: document.getElementById('consumoLista'),

        // Modal pendencias de vinculo
        modalPendencias: document.getElementById('modalPendenciasVinculoProducao'),
        pendenciasTitulo: document.getElementById('pendenciasVinculoTitulo'),
        pendenciasLista: document.getElementById('pendenciasVinculoLista')
      };
    }

    function limparVazios(lista) {
      return (Array.isArray(lista) ? lista : [])
        .map(v => (v ?? '').toString().trim())
        .filter(v => v !== '');
    }

    function formatMoeda(valor) {
      const n = Number(valor || 0);
      return n.toFixed(2);
    }

    function formatQuantidadeResumo(valor) {
      const n = Number(valor || 0);
      if (!isFinite(n)) return '0';
      if (Math.abs(n - Math.round(n)) < 0.000001) {
        return String(Math.round(n));
      }
      return n.toFixed(2);
    }

    function parseNumeroInput(valor) {
      const s = String(valor ?? '').trim();
      if (s === '') return 0;
      const n = Number(s.replace(',', '.'));
      return isNaN(n) ? 0 : n;
    }

    function escapeHtml(valor) {
      return String(valor ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function escapeAttr(valor) {
      return escapeHtml(valor);
    }

    function proximoFrame(fn) {
      let executado = false;
      const run = () => {
        if (executado) return;
        executado = true;
        fn();
      };
      if (typeof window !== 'undefined' && typeof window.requestAnimationFrame === 'function') {
        window.requestAnimationFrame(run);
      }
      setTimeout(run, 80);
    }

    function setEstoqueOpcoes(lista) {
      estoqueOpcoes = Array.isArray(lista) ? lista : [];
    }

    function setTiposValidacao(lista) {
      tiposValidacao = [...new Set((Array.isArray(lista) ? lista : [])
        .map(v => String(v || '').trim().toUpperCase())
        .filter(v => v !== ''))];
    }

    function getTiposEstoque() {
      const tipos = new Set();
      (estoqueOpcoes || []).forEach(i => {
        const t = String(i?.tipo || '').toUpperCase().trim();
        if (t) tipos.add(t);
      });
      return [...tipos].sort((a, b) => a.localeCompare(b));
    }

    function renderOpcoesEstoque(candidatos, selecionadoId, incluirVazio = true) {
      const itens = Array.isArray(candidatos) ? candidatos : [];
      const opts = itens.map(i => {
        const id = String(i.ID || '');
        const nome = i.item || id;
        const tipo = String(i.tipo || '').toUpperCase();
        const saldo = Number(i.quantidade || 0).toFixed(2);
        const selected = id === String(selecionadoId || '') ? 'selected' : '';
        return `<option value="${escapeAttr(id)}" ${selected}>${escapeHtml(nome)} (${escapeHtml(tipo)}) - Saldo ${saldo}</option>`;
      }).join('');
      return (incluirVazio ? '<option value="">Selecione no estoque</option>' : '') + opts;
    }

    function getCandidatosVinculo(vinculo) {
      const tipo = String(vinculo?.tipo_item || '').toUpperCase().trim();
      const todos = Array.isArray(estoqueOpcoes) ? estoqueOpcoes : [];
      if (!tipo) {
        return todos;
      }
      return todos.filter(i => String(i.tipo || '').toUpperCase() === tipo);
    }

    /* =========================
       FORMULARIO
    ========================== */
    function abrirFormularioNovo() {
      resetFormulario();
      mostrarFormulario();
    }

    function mostrarFormulario() {
      const { formulario } = el();
      if (!formulario) return;
      formulario.classList.remove('hidden');
    }

    function fecharFormulario() {
      const { formulario } = el();
      if (!formulario) return;
      formulario.classList.add('hidden');
      resetFormulario();

      if (window.ProducaoController) {
        ProducaoController.limparEdicao();
      }
    }

    function preencherFormulario(data) {
      const f = el();

      if (f.produto) f.produto.value = data.produto_id || '';
      if (f.receita) f.receita.value = data.receita_id || '';
      if (f.nome) f.nome.value = data.nome_ordem || '';
      if (f.qtd) f.qtd.value = data.qtd_planejada || '';
      if (f.status) f.status.value = data.status || 'Em planejamento';
      if (f.dataInicio) f.dataInicio.value = data.data_inicio || '';
      if (f.dataPrevista) f.dataPrevista.value = data.data_prevista_termino || '';
      if (f.observacao) f.observacao.value = data.observacao || '';

      if (f.formTitulo) f.formTitulo.innerText = 'Editar Producao';
    }

    function resetFormulario() {
      const f = el();

      [
        f.produto,
        f.receita,
        f.nome,
        f.qtd,
        f.status,
        f.dataInicio,
        f.dataPrevista,
        f.observacao
      ].forEach(i => i && (i.value = ''));

      if (f.formTitulo) f.formTitulo.innerText = 'Nova Producao';
      renderReceitas([]);
    }

    /* =========================
       SELECTS (RENDER ONLY)
    ========================== */
    function renderProdutos(lista) {
      const { produto } = el();
      if (!produto) return;

      const clean = (Array.isArray(lista) ? lista : [])
        .filter(v => v && v.produto_id);

      produto.innerHTML = '<option value="">Selecione o produto</option>';
      clean.forEach(p => {
        const o = document.createElement('option');
        o.value = p.produto_id;
        o.textContent = p.nome_produto || p.produto_id;
        produto.appendChild(o);
      });
    }

    function renderReceitas(lista, selecionadoId = '') {
      const { receita } = el();
      if (!receita) return;

      const clean = (Array.isArray(lista) ? lista : [])
        .filter(v => v && v.receita_id);

      receita.innerHTML = '<option value="">Modelo do produto</option>';
      clean.forEach(r => {
        const o = document.createElement('option');
        o.value = r.receita_id;
        o.textContent = r.nome_receita || r.receita_id;
        receita.appendChild(o);
      });

      if (selecionadoId) {
        receita.value = selecionadoId;
      }
    }

    /* =========================
       LISTA + CARDS
    ========================== */
    function renderMateriais(itens) {
      if (!Array.isArray(itens) || itens.length === 0) {
        return '<p>Nenhum material previsto.</p>';
      }

      const linhas = itens.map(i => `
        <div class="linha-material">
          <span>${escapeHtml(i.item || i.estoque_id)}</span>
          <span>${Number(i.quantidade || 0).toFixed(2)} ${escapeHtml(i.unidade || '')}</span>
        </div>
      `);

      return linhas.join('');
    }

    function renderFormNovoItemManual(producaoId) {
      const tipos = (Array.isArray(tiposValidacao) ? tiposValidacao : []);
      const optsTipo = tipos
        .map(t => `<option value="${escapeAttr(t)}">${escapeHtml(t)}</option>`)
        .join('');

      const optsEstoque = renderOpcoesEstoque(estoqueOpcoes, '', true);

      return `
        <div class="receita-card">
          <div class="comp-meta"><b>Adicionar item manual na OP</b></div>
          <div class="linha-add-destino">
            <select id="manualTipo_${escapeAttr(producaoId)}">
              <option value="">Tipo</option>
              ${optsTipo}
            </select>
            <input id="manualNome_${escapeAttr(producaoId)}" placeholder="Nome do item">
            <input id="manualQtd_${escapeAttr(producaoId)}" type="number" step="0.01" min="0" placeholder="Qtd prevista">
            <select id="manualEstoque_${escapeAttr(producaoId)}">
              ${optsEstoque}
            </select>
            <button class="btn-add-item-manual" data-producao-id="${escapeAttr(producaoId)}">Adicionar</button>
          </div>
        </div>
      `;
    }

    function renderVinculos(vinculos, producaoId) {
      const lista = Array.isArray(vinculos) ? vinculos : [];
      if (lista.length === 0) {
        return `<p>Nenhum item da OP.</p>${renderFormNovoItemManual(producaoId)}`;
      }

      const linhas = lista.map(v => {
        const prevista = Number(v.quantidade_prevista || 0).toFixed(2);
        const consumida = Number(v.quantidade_consumida || 0).toFixed(2);
        const pendente = Number(v.quantidade_pendente || 0).toFixed(2);
        const saldo = Number(v.saldo_estoque || 0).toFixed(2);
        const ok = !!v.saldo_suficiente;
        const vinculado = !!v.vinculado;
        const statusSaldo = vinculado ? (ok ? 'OK' : 'FALTA') : '-';
        const origem = v.origem_item ? `Origem: ${escapeHtml(v.origem_item)}` : 'Origem: -';

        let candidatos = getCandidatosVinculo(v);
        if (v.estoque_id && !candidatos.some(i => String(i.ID) === String(v.estoque_id))) {
          const atual = (estoqueOpcoes || []).find(i => String(i.ID) === String(v.estoque_id));
          if (atual) {
            candidatos = [atual, ...candidatos];
          }
        }
        const opcoes = renderOpcoesEstoque(candidatos, v.estoque_id, true);

        return `
          <div class="receita-card linha-vinculo" data-producao-id="${escapeAttr(producaoId)}" data-vinculo-id="${escapeAttr(v.id)}">
            <div><strong>${escapeHtml(v.item || v.origem_item || v.id)}</strong></div>
            <div class="comp-meta">Tipo: ${escapeHtml(v.tipo_item || '-')} | Status: ${escapeHtml(v.status || '-')}</div>
            <div class="comp-meta">
              Prev: ${prevista} ${escapeHtml(v.unidade || '')} | Cons: ${consumida} | Pend: ${pendente} | Saldo: ${saldo} (${escapeHtml(statusSaldo)})
            </div>
            <div class="comp-meta">${origem}</div>
            <div class="linha-add-destino">
              <select class="vinculo-estoque-select">
                ${opcoes}
              </select>
              <button class="btn-vincular-estoque" data-producao-id="${escapeAttr(producaoId)}" data-vinculo-id="${escapeAttr(v.id)}">Salvar vinculo</button>
            </div>
          </div>
        `;
      });

      return linhas.join('') + renderFormNovoItemManual(producaoId);
    }

    function renderSaidasLotes(lotes, producaoId, permiteEdicao) {
      const lista = Array.isArray(lotes) ? lotes : [];
      if (lista.length === 0) {
        return '<p>Nenhuma saida gerada para esta OP.</p>';
      }

      const montarContextoSaida = lote => {
        const estoqueId = String(lote?.estoque_id || '').trim();
        if (!estoqueId) return 'Destino no estoque: -';

        const itemEstoque = (estoqueOpcoes || []).find(i => String(i?.ID || '').trim() === estoqueId);
        if (!itemEstoque) {
          return `Destino no estoque: ID ${estoqueId}`;
        }

        const partes = [`Destino no estoque: ${String(itemEstoque.item || estoqueId).trim()}`];
        const tipo = String(itemEstoque.tipo || '').trim();
        const categoria = String(itemEstoque.categoria || '').trim();
        if (tipo) partes.push(`Tipo: ${tipo}`);
        if (categoria) partes.push(`Categoria: ${categoria}`);
        return partes.join(' | ');
      };

      return lista.map(l => {
        const quantidade = Number(l.quantidade || 0).toFixed(2);
        const custoUnit = Number(l.custo_unitario || 0).toFixed(4);
        const custoTotal = Number(l.custo_total || 0).toFixed(2);
        const inputId = `custoLote_${String(l.id || '').replace(/[^a-zA-Z0-9_-]/g, '')}`;
        const precoInputId = `precoVendaLote_${String(l.id || '').replace(/[^a-zA-Z0-9_-]/g, '')}`;
        const contextoSaida = montarContextoSaida(l);
        const precoVenda = Number(l.preco_venda_produto || 0);
        const precoVendaFormatado = isFinite(precoVenda) && precoVenda > 0
          ? Number(precoVenda.toFixed(2))
          : '';
        const precoVendaTexto = precoVendaFormatado === ''
          ? '-'
          : `R$ ${precoVendaFormatado.toFixed(2)}`;
        const nomeSaida = String(l.nome_saida || '').trim();
        const produtoRefId = String(l.produto_id_vinculado || l.produto_ref_id || '').trim();
        const vinculoPorId = l.vinculo_produto_por_id === true || !!String(l.produto_id_vinculado || '').trim();
        const podeEditarPreco = !!permiteEdicao && !!l.permite_editar_preco_venda && vinculoPorId && !!produtoRefId;
        const avisoVinculo = vinculoPorId
          ? ''
          : 'Saida sem vinculo de produto no modelo. Edite na aba Produtos.';

        return `
          <div class="receita-card">
            <div><strong>${escapeHtml(l.nome_saida || l.estoque_id || l.id)}</strong></div>
            <div class="comp-meta">${escapeHtml(contextoSaida)}</div>
            <div class="comp-meta">
              Qtd: ${quantidade} ${escapeHtml(l.unidade || '')} | Custo total lote: R$ ${custoTotal}
            </div>
            <div class="comp-meta">Preco de venda do produto: ${escapeHtml(precoVendaTexto)}</div>
            ${avisoVinculo ? `<div class="comp-meta">${escapeHtml(avisoVinculo)}</div>` : ''}
            <div class="comp-meta">Criado em: ${escapeHtml(l.criado_em || '-')}</div>
            ${permiteEdicao ? `
              <div class="linha-add-destino">
                <input id="${escapeAttr(inputId)}" type="number" step="0.01" min="0" value="${escapeAttr(custoUnit)}">
                <button class="btn-salvar-custo-lote" data-producao-id="${escapeAttr(producaoId)}" data-lote-id="${escapeAttr(l.id)}">
                  Salvar custo
                </button>
              </div>
              <div class="linha-add-destino">
                <input
                  id="${escapeAttr(precoInputId)}"
                  type="number"
                  step="0.01"
                  min="0"
                  placeholder="Preco venda"
                  value="${escapeAttr(precoVendaFormatado)}"
                  ${podeEditarPreco ? '' : 'disabled'}
                >
                <button
                  class="btn-salvar-preco-venda-saida"
                  data-producao-id="${escapeAttr(producaoId)}"
                  data-nome-saida="${escapeAttr(nomeSaida)}"
                  data-preco-input-id="${escapeAttr(precoInputId)}"
                  data-produto-id="${escapeAttr(produtoRefId)}"
                  ${podeEditarPreco ? '' : 'disabled'}
                >
                  Salvar preco venda
                </button>
              </div>
            ` : `
              <div class="comp-meta">Custo unitario: R$ ${custoUnit}</div>
            `}
          </div>
        `;
      }).join('');
    }

    function normalizarCategoriaDashboard(valor) {
      const categoria = String(valor || '').trim();
      return categoria || 'Sem categoria';
    }

    function agregarSaidasPorCategoria(itens) {
      const mapaCategorias = {};
      let totalSaidas = 0;

      (Array.isArray(itens) ? itens : []).forEach(op => {
        const saidasPrevistas = Array.isArray(op?.saidas_previstas) ? op.saidas_previstas : [];
        saidasPrevistas.forEach(saida => {
          const quantidade = Number(saida?.quantidade || 0);
          if (!isFinite(quantidade) || quantidade <= 0) return;

          const categoria = normalizarCategoriaDashboard(saida?.categoria);
          mapaCategorias[categoria] = (mapaCategorias[categoria] || 0) + quantidade;
          totalSaidas += quantidade;
        });
      });

      const categorias = Object.keys(mapaCategorias)
        .map(categoria => ({
          categoria,
          quantidade: Number(mapaCategorias[categoria] || 0)
        }))
        .sort((a, b) => {
          if (b.quantidade !== a.quantidade) return b.quantidade - a.quantidade;
          return a.categoria.localeCompare(b.categoria);
        });

      return {
        categorias,
        totalSaidas
      };
    }

    function calcularValorPrevistoVendaPecas(itens) {
      return (Array.isArray(itens) ? itens : [])
        .reduce((acc, op) => {
          const saidas = Array.isArray(op?.saidas_previstas) ? op.saidas_previstas : [];
          if (saidas.length > 0) {
            const subtotal = saidas.reduce((acSaida, s) => {
              const preco = Number(s?.preco_venda_produto || 0);
              const qtd = Number(s?.quantidade || 0);
              if (!isFinite(preco) || preco <= 0) return acSaida;
              if (!isFinite(qtd) || qtd <= 0) return acSaida;
              return acSaida + (qtd * preco);
            }, 0);
            if (subtotal > 0) return acc + subtotal;
          }

          const valor = Number(op?.valor_previsto_venda_pecas || 0);
          if (!isFinite(valor) || valor <= 0) return acc;
          return acc + valor;
        }, 0);
    }

    function renderMiniDashboardProducao(itens) {
      const { miniDashboard } = el();
      if (!miniDashboard) return;

      const lista = Array.isArray(itens) ? itens : [];
      const resumoCategorias = agregarSaidasPorCategoria(lista);
      const totalOps = lista.length;
      const valorPrevistoPecas = calcularValorPrevistoVendaPecas(lista);

      const cardCategoriasHtml = resumoCategorias.categorias.length === 0
        ? '<p class="producao-mini-dashboard-empty">Sem saidas previstas no filtro atual.</p>'
        : resumoCategorias.categorias.map(item => `
          <div class="producao-mini-dashboard-linha">
            <span>${escapeHtml(item.categoria)}</span>
            <strong>${escapeHtml(formatQuantidadeResumo(item.quantidade))} un</strong>
          </div>
        `).join('');

      const valorPrevistoHtml = `R$ ${formatMoeda(valorPrevistoPecas)}`;

      miniDashboard.innerHTML = `
        <div class="producao-mini-dashboard-head">
          <div class="producao-mini-dashboard-card">
            <div class="producao-mini-dashboard-label">OPs no filtro</div>
            <div class="producao-mini-dashboard-valor">${escapeHtml(String(totalOps))}</div>
          </div>

          <div class="producao-mini-dashboard-card">
            <div class="producao-mini-dashboard-label">Saidas previstas</div>
            <div class="producao-mini-dashboard-valor">${escapeHtml(formatQuantidadeResumo(resumoCategorias.totalSaidas))} un</div>
          </div>

          <div class="producao-mini-dashboard-card">
            <div class="producao-mini-dashboard-label">Valor previsto venda pecas</div>
            <div class="producao-mini-dashboard-valor">${escapeHtml(valorPrevistoHtml)}</div>
          </div>
        </div>

        <div class="producao-mini-dashboard-categorias">
          <div class="producao-mini-dashboard-titulo">Saidas por categoria</div>
          ${cardCategoriasHtml}
        </div>
      `;
    }

    function renderSaidasPrevistas(saidasPrevistas, producaoId, permiteEdicao) {
      const lista = Array.isArray(saidasPrevistas) ? saidasPrevistas : [];
      if (lista.length === 0) {
        return '<p>As saidas serao geradas ao atualizar o estoque.</p>';
      }

      const cards = lista.map((s, idx) => {
        const nome = String(s.nome_saida || '').trim() || '-';
        const qtd = Number(s.quantidade || 0).toFixed(2);
        const unidade = String(s.unidade || '').trim();
        const tipo = String(s.tipo_item || '').trim();
        const categoria = String(s.categoria || '').trim();
        const precoVenda = Number(s.preco_venda_produto || 0);
        const precoVendaFormatado = isFinite(precoVenda) && precoVenda > 0
          ? Number(precoVenda.toFixed(2))
          : '';
        const precoVendaTexto = precoVendaFormatado === ''
          ? '-'
          : `R$ ${precoVendaFormatado.toFixed(2)}`;
        const precoInputId = `precoVendaPrevisto_${String(producaoId || '').replace(/[^a-zA-Z0-9_-]/g, '')}_${idx}`;
        const produtoRefId = String(s.produto_id_vinculado || s.produto_ref_id || '').trim();
        const vinculoPorId = s.vinculo_produto_por_id === true || !!String(s.produto_id_vinculado || '').trim();
        const podeEditarPreco = !!permiteEdicao && !!s.permite_editar_preco_venda && vinculoPorId && !!produtoRefId;
        const avisoVinculo = vinculoPorId
          ? ''
          : 'Saida sem vinculo de produto no modelo. Edite na aba Produtos.';
        const meta = [
          `Qtd prevista: ${qtd} ${unidade}`,
          tipo ? `Tipo: ${tipo}` : '',
          categoria ? `Categoria: ${categoria}` : ''
        ].filter(Boolean).join(' | ');

        return `
          <div class="receita-card">
            <div><strong>${escapeHtml(nome)}</strong></div>
            <div class="comp-meta">${escapeHtml(meta)}</div>
            <div class="comp-meta">Preco de venda do produto: ${escapeHtml(precoVendaTexto)}</div>
            ${avisoVinculo ? `<div class="comp-meta">${escapeHtml(avisoVinculo)}</div>` : ''}
            ${permiteEdicao ? `
              <div class="linha-add-destino">
                <input
                  id="${escapeAttr(precoInputId)}"
                  type="number"
                  step="0.01"
                  min="0"
                  placeholder="Preco venda"
                  value="${escapeAttr(precoVendaFormatado)}"
                  ${podeEditarPreco ? '' : 'disabled'}
                >
                <button
                  class="btn-salvar-preco-venda-saida"
                  data-producao-id="${escapeAttr(producaoId)}"
                  data-nome-saida="${escapeAttr(nome)}"
                  data-preco-input-id="${escapeAttr(precoInputId)}"
                  data-produto-id="${escapeAttr(produtoRefId)}"
                  ${podeEditarPreco ? '' : 'disabled'}
                >
                  Salvar preco venda
                </button>
              </div>
            ` : ''}
          </div>
        `;
      }).join('');

      return `<p>As saidas serao geradas ao atualizar o estoque.</p>${cards}`;
    }

    function renderChecklist(etapas, producaoId) {
      if (!Array.isArray(etapas) || etapas.length === 0) {
        return '<p>Nenhuma etapa cadastrada.</p>';
      }

      const etapasOrdenadas = [...etapas].sort((a, b) => {
        const ordemA = Number(a?.ordem || 0);
        const ordemB = Number(b?.ordem || 0);
        if (ordemA === ordemB) return 0;
        return ordemA - ordemB;
      });

      return etapasOrdenadas.map((et, idx) => {
        const checked = String(et.feito).toLowerCase() === 'true';
        const editing = !!et._editing;
        const podeSubir = idx > 0;

        if (editing) {
          return `
            <div class="linha-etapa">
              <input type="checkbox" disabled ${checked ? 'checked' : ''}>
              <input
                id="editEtapa_${escapeAttr(producaoId)}_${escapeAttr(et.id)}"
                class="input-etapa-edit"
                value="${escapeAttr(et.nome_etapa || '')}"
              >
              <div class="etapa-acoes">
                <button class="btn-etapa-salvar" data-producao-id="${escapeAttr(producaoId)}" data-etapa-id="${escapeAttr(et.id)}">Salvar</button>
                <button class="btn-etapa-cancelar" data-producao-id="${escapeAttr(producaoId)}" data-etapa-id="${escapeAttr(et.id)}">Cancelar</button>
              </div>
            </div>
          `;
        }

        return `
          <div class="linha-etapa">
            <input
              type="checkbox"
              class="check-etapa"
              data-producao-id="${escapeAttr(producaoId)}"
              data-etapa-id="${escapeAttr(et.id)}"
              ${checked ? 'checked' : ''}
            >
            <span class="etapa-nome">${escapeHtml(et.nome_etapa || '')}</span>
            <div class="etapa-acoes">
              <button class="btn-etapa-subir" data-producao-id="${escapeAttr(producaoId)}" data-etapa-id="${escapeAttr(et.id)}" aria-label="Mover etapa para cima" ${podeSubir ? '' : 'disabled'}>&#8593;</button>
              <button class="btn-etapa-editar" data-producao-id="${escapeAttr(producaoId)}" data-etapa-id="${escapeAttr(et.id)}">Editar</button>
              <button class="btn-etapa-deletar" data-producao-id="${escapeAttr(producaoId)}" data-etapa-id="${escapeAttr(et.id)}">Excluir</button>
            </div>
          </div>
        `;
      }).join('');
    }

    function montarCardProducao(i) {
      const div = document.createElement('div');
      div.className = 'card';
      div.dataset.id = i.producao_id;

      const nome = i.nome_ordem || i.nome_produto || i.producao_id;
      const unidade = i.unidade_produto || '';
      const custoPrevisto = formatMoeda(i.custo_previsto || 0);
      const status = String(i.status || '');
      const qtdPlanejadaNum = Number(i.qtd_planejada || 0);
      const qtdProduzidaNum = Number(i.qtd_produzida_acumulada || 0);
      const qtdRestanteNum = Math.max(0, Number(i.qtd_restante ?? Math.max(0, qtdPlanejadaNum - qtdProduzidaNum)));
      const podeAtualizarEstoque = qtdRestanteNum > 0.000001;
      const totalSaidasPrevistas = Number(i.saidas_previstas_total || 0);
      const tiposSaida = Number(
        i.saidas_previstas_tipos || (Array.isArray(i.saidas_previstas) ? i.saidas_previstas.length : 0)
      );
      const etapasOrdenadas = Array.isArray(i.etapas)
        ? [...i.etapas].sort((a, b) => {
          const ordemA = Number(a?.ordem || 0);
          const ordemB = Number(b?.ordem || 0);
          if (ordemA === ordemB) return 0;
          return ordemA - ordemB;
        })
        : [];
      const totalEtapas = etapasOrdenadas.length;
      const etapasConcluidas = etapasOrdenadas
        .filter(et => String(et?.feito).toLowerCase() === 'true')
        .length;
      const proximaEtapaPendente = etapasOrdenadas
        .find(et => String(et?.feito).toLowerCase() !== 'true');
      const etapaAtual = proximaEtapaPendente
        ? (String(proximaEtapaPendente.nome_etapa || '').trim() || '-')
        : (totalEtapas > 0 ? 'Concluida' : '-');
      const resumoSaidas = totalSaidasPrevistas > 0
        ? `${formatQuantidadeResumo(totalSaidasPrevistas)} saidas previstas${tiposSaida > 1 ? ` (${tiposSaida} tipos)` : ''}`
        : 'Sem saidas previstas';
      const nomeLabel = escapeHtml(nome);
      const statusLabel = escapeHtml(i.status || '');
      const qtdPlanejada = escapeHtml(i.qtd_planejada || 0);
      const qtdProduzida = escapeHtml(formatQuantidadeResumo(qtdProduzidaNum));
      const qtdRestante = escapeHtml(formatQuantidadeResumo(qtdRestanteNum));
      const unidadeLabel = escapeHtml(unidade);
      const resumoSaidasLabel = escapeHtml(resumoSaidas);
      const etapasConcluidasLabel = escapeHtml(`Etapas concluidas: ${etapasConcluidas}/${totalEtapas}`);
      const etapaAtualLabel = escapeHtml(`Etapa atual: ${etapaAtual}`);

      div.innerHTML = `
        <div class="card-resumo">
          <strong>${nomeLabel}</strong><br>
          ${statusLabel}<br>
          ${qtdPlanejada} ${unidadeLabel}<br>
          Produzido: ${qtdProduzida} | Restante: ${qtdRestante}<br>
          ${etapasConcluidasLabel}<br>
          ${etapaAtualLabel}<br>
          ${resumoSaidasLabel}
        </div>

        <button class="ver-mais">Ver mais</button>
      `;

      return div;
    }

    function montarDetalhesProducao(i) {
      const custoPrevisto = formatMoeda(i.custo_previsto || 0);
      const qtdPlanejadaNum = Number(i.qtd_planejada || 0);
      const qtdProduzidaNum = Number(i.qtd_produzida_acumulada || 0);
      const qtdRestanteNum = Math.max(0, Number(i.qtd_restante ?? Math.max(0, qtdPlanejadaNum - qtdProduzidaNum)));
      const estoqueAtualizado = !!i.estoque_atualizado;
      const podeAtualizarEstoque = qtdRestanteNum > 0.000001;
      const labelEstoque = podeAtualizarEstoque ? 'Registrar lote' : 'Estoque atualizado';
      const idJs = JSON.stringify(String(i.producao_id || ''));
      const saidasHtml = !estoqueAtualizado
        ? renderSaidasPrevistas(i.saidas_previstas, i.producao_id, true)
        : (Array.isArray(i.saidasLotes)
          ? renderSaidasLotes(i.saidasLotes, i.producao_id, true)
          : '<p>Carregando saidas geradas...</p>');
      const produtoLabel = escapeHtml(i.nome_produto || '-');
      const receitaLabel = escapeHtml(i.receita_nome || '-');
      const inicioLabel = escapeHtml(i.data_inicio || '-');
      const previstoLabel = escapeHtml(i.data_prevista_termino || '-');
      const observacaoLabel = escapeHtml(i.observacao || '-');
      const dataEstoqueAtualizadoLabel = escapeHtml(i.data_estoque_atualizado || '-');
      const labelEstoqueSafe = escapeHtml(labelEstoque);

      return `
        <p><b>Produto:</b> ${produtoLabel}</p>
        <p><b>Receita:</b> ${receitaLabel}</p>
        <p><b>Inicio:</b> ${inicioLabel}</p>
        <p><b>Previsto:</b> ${previstoLabel}</p>
        <p><b>Produzido:</b> ${escapeHtml(formatQuantidadeResumo(qtdProduzidaNum))} | <b>Restante:</b> ${escapeHtml(formatQuantidadeResumo(qtdRestanteNum))}</p>
        <p><b>Custo previsto:</b> R$ ${custoPrevisto}</p>
        <p><b>Observacao:</b> ${observacaoLabel}</p>
        ${estoqueAtualizado ? `<p><b>Estoque atualizado:</b> ${dataEstoqueAtualizadoLabel}</p>` : ''}

        <div class="bloco">
          <p><b>Materiais previstos</b></p>
          ${i.materiaisPrevistos ? renderMateriais(i.materiaisPrevistos) : '<p>Carregando materiais...</p>'}
        </div>

        <div class="bloco">
          <p><b>Vinculos com estoque</b></p>
          ${i.vinculosMateriais ? renderVinculos(i.vinculosMateriais, i.producao_id) : '<p>Carregando vinculos...</p>'}
        </div>

        <div class="bloco">
          <p><b>Saidas geradas</b></p>
          ${saidasHtml}
        </div>

        <div class="bloco">
          <p><b>Checklist</b></p>
          ${renderChecklist(i.etapas || [], i.producao_id)}
          <div class="linha-etapa-add">
            <input id="novaEtapa_${escapeAttr(i.producao_id)}" placeholder="Nova etapa">
            <button class="btn-add-etapa" data-producao-id="${escapeAttr(i.producao_id)}">Adicionar etapa</button>
          </div>
        </div>

        <div class="acoes">
          <button
            ${podeAtualizarEstoque ? '' : 'disabled'}
            onclick='ProducaoController.abrirAtualizarEstoque(${idJs})'
          >${labelEstoqueSafe}</button>
          <button onclick='ProducaoController.editar(${idJs})'>Editar</button>
          <button onclick='ProducaoController.excluir(${idJs})'>Excluir</button>
        </div>
      `;
    }

    function renderLista(itens) {
      const { lista } = el();
      if (!lista) return;

      let listaItens = Array.isArray(itens) ? itens : [];

      if (listaItens.length === 0 && window.ProducaoStore && ProducaoStore.isLoaded && ProducaoStore.isLoaded()) {
        const fallback = ProducaoStore.get();
        if (Array.isArray(fallback) && fallback.length > 0) {
          listaItens = fallback;
        }
      }

      renderJobSeq += 1;
      const jobId = renderJobSeq;
      lista.innerHTML = '';
      listaFiltradaAtual = Array.isArray(listaItens) ? listaItens : [];
      renderMiniDashboardProducao(listaFiltradaAtual);
      qtdRenderizada = 0;

      if (listaFiltradaAtual.length === 0) {
        if (detalhesModalAbertoId) {
          fecharModalDetalhes();
        }
        lista.innerHTML = '<p>Nenhuma ordem de producao.</p>';
        return;
      }

      let idx = 0;
      const processarChunk = () => {
        if (jobId !== renderJobSeq) return;
        const limite = Math.min(idx + RENDER_CHUNK_SIZE, listaFiltradaAtual.length);
        const fragment = document.createDocumentFragment();
        for (; idx < limite; idx++) {
          fragment.appendChild(montarCardProducao(listaFiltradaAtual[idx]));
        }
        lista.appendChild(fragment);
        qtdRenderizada = idx;

        if (idx < listaFiltradaAtual.length) {
          proximoFrame(processarChunk);
          return;
        }

        initDelegation();
        atualizarModalDetalhesSeAberto();
      };

      proximoFrame(processarChunk);
    }

    function getProducaoById(id) {
      const alvo = String(id || '').trim();
      if (!alvo) return null;
      return (Array.isArray(listaFiltradaAtual) ? listaFiltradaAtual : [])
        .find(p => String(p?.producao_id || '').trim() === alvo) || null;
    }

    function abrirModalDetalhes(id) {
      const alvoId = String(id || '').trim();
      if (!alvoId) return;
      const f = el();
      if (!f.modalDetalhes || !f.modalDetalhesConteudo) return;

      const item = getProducaoById(alvoId);
      if (!item) {
        f.modalDetalhesConteudo.innerHTML = '<p>Ordem de producao nao encontrada.</p>';
        f.modalDetalhes.classList.remove('hidden');
        return;
      }

      if (f.modalDetalhesTitulo) {
        f.modalDetalhesTitulo.textContent = item.nome_ordem || item.nome_produto || 'Detalhes da producao';
      }
      f.modalDetalhesConteudo.innerHTML = montarDetalhesProducao(item);
      detalhesModalAbertoId = alvoId;
      f.modalDetalhes.classList.remove('hidden');
    }

    function fecharModalDetalhes() {
      const f = el();
      if (!f.modalDetalhes) return;
      f.modalDetalhes.classList.add('hidden');
      if (f.modalDetalhesConteudo) f.modalDetalhesConteudo.innerHTML = '';
      detalhesModalAbertoId = '';
    }

    function atualizarModalDetalhesSeAberto() {
      if (!detalhesModalAbertoId) return;
      const item = getProducaoById(detalhesModalAbertoId);
      if (!item) {
        fecharModalDetalhes();
        return;
      }
      abrirModalDetalhes(detalhesModalAbertoId);
    }

    /* =========================
       MODAL CONSUMO
    ========================== */
    function atualizarSugestaoConsumoLote() {
      const {
        modalConsumo,
        consumoLista,
        consumoQtdProduzida,
        consumoBypassEntradas,
        consumoResumoLote
      } = el();
      if (!modalConsumo || !consumoLista) return;

      const qtdPlanejada = parseNumeroInput(modalConsumo.dataset.qtdPlanejada || 0);
      const qtdProduzidaAcumulada = parseNumeroInput(modalConsumo.dataset.qtdProduzidaAcumulada || 0);
      const qtdRestante = parseNumeroInput(modalConsumo.dataset.qtdRestante || 0);

      let qtdLote = parseNumeroInput(consumoQtdProduzida?.value || 0);
      if (qtdLote <= 0) {
        qtdLote = qtdRestante > 1 ? 1 : qtdRestante;
      }
      if (qtdRestante > 0 && qtdLote > qtdRestante) {
        qtdLote = qtdRestante;
      }
      if (consumoQtdProduzida) {
        consumoQtdProduzida.value = qtdLote > 0 ? Number(qtdLote).toFixed(2) : '';
      }

      if (consumoResumoLote) {
        consumoResumoLote.textContent = `Planejada: ${formatQuantidadeResumo(qtdPlanejada)} | Produzida: ${formatQuantidadeResumo(qtdProduzidaAcumulada)} | Restante: ${formatQuantidadeResumo(qtdRestante)}`;
      }

      const fator = qtdPlanejada > 0 ? (qtdLote / qtdPlanejada) : 0;
      const bypass = !!consumoBypassEntradas?.checked;
      const inputs = consumoLista.querySelectorAll('input[data-estoque-id]');
      inputs.forEach(input => {
        if (!input) return;
        input.disabled = bypass;
        if (bypass) return;
        if (input.dataset.manual === '1') return;
        const quantidadeBase = parseNumeroInput(input.dataset.quantidadeBase || 0);
        const sugerida = Math.max(0, quantidadeBase * fator);
        input.value = sugerida > 0 ? Number(sugerida).toFixed(2) : '';
      });
    }

    function abrirModalConsumo(producaoId, nome, materiais, contexto) {
      const {
        modalConsumo,
        consumoTitulo,
        consumoLista,
        consumoQtdProduzida,
        consumoBypassEntradas
      } = el();
      if (!modalConsumo || !consumoLista) return;

      const ctx = contexto || {};
      const qtdPlanejada = parseNumeroInput(ctx.qtd_planejada || ctx.qtdPlanejada || 0);
      const qtdProduzidaAcumulada = parseNumeroInput(ctx.qtd_produzida_acumulada || ctx.qtdProduzidaAcumulada || 0);
      const qtdRestanteRaw = parseNumeroInput(ctx.qtd_restante || ctx.qtdRestante || 0);
      const qtdRestante = qtdRestanteRaw > 0
        ? qtdRestanteRaw
        : Math.max(0, qtdPlanejada - qtdProduzidaAcumulada);
      const qtdInicialLote = qtdRestante > 1 ? 1 : qtdRestante;

      modalConsumo.dataset.producaoId = producaoId;
      modalConsumo.dataset.qtdPlanejada = String(qtdPlanejada || 0);
      modalConsumo.dataset.qtdProduzidaAcumulada = String(qtdProduzidaAcumulada || 0);
      modalConsumo.dataset.qtdRestante = String(qtdRestante || 0);
      if (consumoTitulo) consumoTitulo.textContent = `Atualizar estoque - ${nome}`;
      if (consumoQtdProduzida) consumoQtdProduzida.value = qtdInicialLote > 0 ? Number(qtdInicialLote).toFixed(2) : '';
      if (consumoBypassEntradas) consumoBypassEntradas.checked = false;

      consumoLista.innerHTML = '';

      (materiais || []).forEach(item => {
        const quantidadeBase = Number(item.quantidade || 0);
        const row = document.createElement('div');
        row.className = 'linha-consumo';
        row.innerHTML = `
          <div>
            <div><strong>${item.item || item.estoque_id}</strong></div>
            <div>${Number(quantidadeBase || 0).toFixed(2)} ${item.unidade || ''} (plano total)</div>
          </div>
          <div class="campo-ajuda-wrap campo-ajuda-consumo">
            <span class="campo-ajuda-tag">Qtd a baixar</span>
            <input
              type="number"
              step="0.01"
              min="0"
              data-estoque-id="${item.estoque_id}"
              data-quantidade-base="${Number(quantidadeBase || 0).toFixed(6)}"
              data-manual="0"
              value=""
            >
          </div>
        `;
        consumoLista.appendChild(row);
      });

      if (consumoQtdProduzida) {
        consumoQtdProduzida.oninput = () => {
          const inputs = consumoLista.querySelectorAll('input[data-estoque-id]');
          inputs.forEach(input => { input.dataset.manual = '0'; });
          atualizarSugestaoConsumoLote();
        };
      }
      if (consumoBypassEntradas) {
        consumoBypassEntradas.onchange = () => {
          atualizarSugestaoConsumoLote();
        };
      }

      const inputs = consumoLista.querySelectorAll('input[data-estoque-id]');
      inputs.forEach(input => {
        input.addEventListener('input', () => {
          input.dataset.manual = '1';
        });
      });

      atualizarSugestaoConsumoLote();
      modalConsumo.classList.remove('hidden');
    }

    function fecharModalConsumo() {
      const {
        modalConsumo,
        consumoLista,
        consumoQtdProduzida,
        consumoBypassEntradas,
        consumoResumoLote
      } = el();
      if (!modalConsumo || !consumoLista) return;

      modalConsumo.classList.add('hidden');
      consumoLista.innerHTML = '';
      if (consumoQtdProduzida) {
        consumoQtdProduzida.value = '';
        consumoQtdProduzida.oninput = null;
      }
      if (consumoBypassEntradas) {
        consumoBypassEntradas.checked = false;
        consumoBypassEntradas.onchange = null;
      }
      if (consumoResumoLote) consumoResumoLote.textContent = '';
      delete modalConsumo.dataset.producaoId;
      delete modalConsumo.dataset.qtdPlanejada;
      delete modalConsumo.dataset.qtdProduzidaAcumulada;
      delete modalConsumo.dataset.qtdRestante;
    }

    function obterConsumoPayload() {
      const { modalConsumo, consumoLista, consumoQtdProduzida, consumoBypassEntradas } = el();
      if (!modalConsumo || !consumoLista) {
        return {
          producaoId: '',
          itens: [],
          qtdProduzida: 0,
          bypassEntradas: false
        };
      }

      const producaoId = modalConsumo.dataset.producaoId || '';
      const bypassEntradas = !!consumoBypassEntradas?.checked;
      const qtdProduzida = parseNumeroInput(consumoQtdProduzida?.value || 0);
      const inputs = consumoLista.querySelectorAll('input[data-estoque-id]');
      const itens = bypassEntradas
        ? []
        : [...inputs].map(input => ({
          estoque_id: input.dataset.estoqueId,
          quantidade: parseNumeroInput(input.value || 0)
        })).filter(i => i.estoque_id && i.quantidade > 0);

      return {
        producaoId,
        itens,
        qtdProduzida,
        bypassEntradas
      };
    }

    function abrirModalPendenciasVinculo(producaoId, pendencias, opcoes) {
      if (Array.isArray(opcoes)) {
        estoqueOpcoes = opcoes;
      }

      const { modalPendencias, pendenciasTitulo, pendenciasLista } = el();
      if (!modalPendencias || !pendenciasLista) return;

      modalPendencias.dataset.producaoId = String(producaoId || '');
      if (pendenciasTitulo) {
        pendenciasTitulo.textContent = 'Vincular entradas pendentes';
      }

      pendenciasLista.innerHTML = '';
      (Array.isArray(pendencias) ? pendencias : []).forEach(p => {
        const tipo = String(p?.tipo_item || '').toUpperCase().trim();
        const todos = Array.isArray(estoqueOpcoes) ? estoqueOpcoes : [];
        const candidatos = (!tipo)
          ? todos
          : todos.filter(i => String(i.tipo || '').toUpperCase() === tipo);
        const opcoesSelect = renderOpcoesEstoque(candidatos, p.estoque_id || '', true);

        const row = document.createElement('div');

            <div><strong>${p.item || p.origem_item || p.id}</strong></div>
            <div>${Number(p.quantidade_prevista || 0).toFixed(2)} ${p.unidade || ''} | Tipo ${tipo || '-'}</div>
          </div>
          <div class="campo-ajuda-wrap campo-ajuda-consumo">
            <span class="campo-ajuda-tag">Item do estoque</span>
            <select data-vinculo-id="${p.id}">
              ${opcoesSelect}
            </select>
          </div>
        `;
        pendenciasLista.appendChild(row);
      });

    function fecharModalPendenciasVinculo() {
      const { modalPendencias, pendenciasLista } = el();
      if (!modalPendencias || !pendenciasLista) return;

      modalPendencias.classList.add('hidden');
      pendenciasLista.innerHTML = '';
      delete modalPendencias.dataset.producaoId;
    }

    function obterPendenciasVinculoPayload() {
      const { modalPendencias, pendenciasLista } = el();
      if (!modalPendencias || !pendenciasLista) {
        return { producaoId: '', vinculacoes: [], faltantes: 0 };
      }

      const producaoId = modalPendencias.dataset.producaoId || '';
      const selects = pendenciasLista.querySelectorAll('select[data-vinculo-id]');
      const vinculacoes = [];
      let faltantes = 0;

      [...selects].forEach(select => {
        const vinculoId = String(select.dataset.vinculoId || '').trim();
        const estoqueId = String(select.value || '').trim();
        if (!vinculoId) return;
        if (!estoqueId) {
          faltantes += 1;
          return;
        }
        vinculacoes.push({
          vinculo_id: vinculoId,
          estoque_id: estoqueId
        });
      });

      return { producaoId, vinculacoes, faltantes };
    }

    /* =========================
       EVENT DELEGATION
    ========================== */
    function initDelegation() {
      if (delegationInit) return;
      delegationInit = true;

      document.addEventListener('click', e => {
        const card = e.target.closest('.card');
        const lista = document.getElementById('listaProducao');

        if (card && lista && !lista.contains(card)) return;

        if (e.target.classList.contains('ver-mais')) {
          e.stopPropagation();
          if (!card) return;
          abrirModalDetalhes(card.dataset.id || '');
          if (card && window.ProducaoController) {
            ProducaoController.carregarMateriaisPrevistos(card.dataset.id, true);
            ProducaoController.carregarVinculosMateriais?.(card.dataset.id, true);
            ProducaoController.carregarSaidasLotes?.(card.dataset.id, true);
          }
          return;
        }

        if (e.target.classList.contains('btn-add-etapa')) {
          const producaoId = e.target.dataset.producaoId;
          const input = document.getElementById(`novaEtapa_${producaoId}`);
          const nome = input ? input.value.trim() : '';
          if (nome && window.ProducaoController) {
            ProducaoController.adicionarEtapa(producaoId, nome);
            if (input) input.value = '';
          }
          return;
        }

        if (e.target.classList.contains('btn-vincular-estoque')) {
          const producaoId = e.target.dataset.producaoId;
          const vinculoId = e.target.dataset.vinculoId;
          const row = e.target.closest('.linha-vinculo');
          const select = row?.querySelector('.vinculo-estoque-select');
          const estoqueId = select ? (select.value || '') : '';
          if (window.ProducaoController) {
            ProducaoController.vincularItemEstoque(producaoId, vinculoId, estoqueId);
          }
          return;
        }

        if (e.target.classList.contains('btn-add-item-manual')) {
          const producaoId = e.target.dataset.producaoId;
          const tipo = document.getElementById(`manualTipo_${producaoId}`)?.value || '';
          const nome = document.getElementById(`manualNome_${producaoId}`)?.value || '';
          const qtd = parseNumeroInput(document.getElementById(`manualQtd_${producaoId}`)?.value || 0);
          const estoqueId = document.getElementById(`manualEstoque_${producaoId}`)?.value || '';

          if (!tipo.trim()) {
            mostrarToast('Selecione o tipo', 'erro');
            return;
          }
          if (!nome.trim()) {
            mostrarToast('Informe o nome do item', 'erro');
            return;
          }
          if (!qtd || qtd <= 0) {
            mostrarToast('Quantidade invalida', 'erro');
            return;
          }

          if (window.ProducaoController) {
            ProducaoController.adicionarItemManual(producaoId, {
              tipo_item: tipo,
              nome_item: nome.trim(),
              quantidade_prevista: qtd,
              estoque_id: estoqueId
            });
          }
          return;
        }

        if (e.target.classList.contains('btn-salvar-custo-lote')) {
          const producaoId = e.target.dataset.producaoId;
          const loteId = e.target.dataset.loteId;
          const input = document.getElementById(`custoLote_${loteId}`);
          const custo = input ? input.value : '';
          if (window.ProducaoController) {
            ProducaoController.atualizarCustoLoteSaida(producaoId, loteId, custo);
          }
          return;
        }

        if (e.target.classList.contains('btn-salvar-preco-venda-saida')) {
          const producaoId = e.target.dataset.producaoId;
          const nomeSaida = e.target.dataset.nomeSaida || '';
          const precoInputId = e.target.dataset.precoInputId || '';
          const produtoId = e.target.dataset.produtoId || '';
          const input = precoInputId ? document.getElementById(precoInputId) : null;
          const preco = input ? input.value : '';
          if (window.ProducaoController) {
            ProducaoController.atualizarPrecoVendaProdutoSaida(producaoId, nomeSaida, preco, produtoId);
          }
          return;
        }

        if (e.target.classList.contains('btn-etapa-editar')) {
          const producaoId = e.target.dataset.producaoId;
          const etapaId = e.target.dataset.etapaId;
          if (window.ProducaoController) {
            ProducaoController.iniciarEdicaoEtapa(producaoId, etapaId);
          }
          return;
        }

        if (e.target.classList.contains('btn-etapa-subir')) {
          const producaoId = e.target.dataset.producaoId;
          const etapaId = e.target.dataset.etapaId;
          if (window.ProducaoController) {
            ProducaoController.moverEtapaParaCima(producaoId, etapaId);
          }
          return;
        }

        if (e.target.classList.contains('btn-etapa-cancelar')) {
          const producaoId = e.target.dataset.producaoId;
          const etapaId = e.target.dataset.etapaId;
          if (window.ProducaoController) {
            ProducaoController.cancelarEdicaoEtapa(producaoId, etapaId);
          }
          return;
        }

        if (e.target.classList.contains('btn-etapa-salvar')) {
          const producaoId = e.target.dataset.producaoId;
          const etapaId = e.target.dataset.etapaId;
          const input = document.getElementById(`editEtapa_${producaoId}_${etapaId}`);
          const nome = input ? input.value.trim() : '';
          if (window.ProducaoController) {
            ProducaoController.salvarEdicaoEtapa(producaoId, etapaId, nome);
          }
          return;
        }

        if (e.target.classList.contains('btn-etapa-deletar')) {
          const producaoId = e.target.dataset.producaoId;
          const etapaId = e.target.dataset.etapaId;
          if (window.ProducaoController) {
            ProducaoController.deletarEtapa(producaoId, etapaId);
          }
          return;
        }

      });

      document.addEventListener('change', e => {
        if (!e.target.classList.contains('check-etapa')) return;
        const producaoId = e.target.dataset.producaoId;
        const etapaId = e.target.dataset.etapaId;
        const feito = e.target.checked;
        if (window.ProducaoController) {
          ProducaoController.marcarEtapa(producaoId, etapaId, feito);
        }
      });
    }

    /* =========================
       API PUBLICA
    ========================== */
    return {
      abrirFormularioNovo,
      mostrarFormulario,
      fecharFormulario,
      preencherFormulario,
      resetFormulario,
      renderLista,
      fecharModalDetalhes,
      renderProdutos,
      renderReceitas,
      setEstoqueOpcoes,
      setTiposValidacao,

      abrirModalConsumo,
      fecharModalConsumo,
      obterConsumoPayload,

      abrirModalPendenciasVinculo,
      fecharModalPendenciasVinculo,
      obterPendenciasVinculoPayload
    };

  })();
</script>
