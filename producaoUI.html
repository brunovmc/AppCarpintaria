<script>
  window.ProducaoUI = (() => {
    let detalhesModalAbertoId = '';
    let delegationInit = false;
    let estoqueOpcoes = [];
    let tiposValidacao = [];
    let listaFiltradaAtual = [];
    let qtdRenderizada = 0;
    let renderJobSeq = 0;

    const RENDER_CHUNK_SIZE = 8;

    /* =========================
       HELPERS
    ========================== */
    function el() {
      return {
        formulario: document.getElementById('formularioProducao'),
        miniDashboard: document.getElementById('miniDashboardProducao'),
        lista: document.getElementById('listaProducao'),
        modalDetalhes: document.getElementById('modalDetalhesProducao'),
        modalDetalhesConteudo: document.getElementById('modalDetalhesProducaoConteudo'),
        modalDetalhesTitulo: document.getElementById('modalDetalhesProducaoTitulo'),

        // Form
        produto: document.getElementById('producaoProduto'),
        receita: document.getElementById('producaoReceita'),
        nome: document.getElementById('producaoNome'),
        qtd: document.getElementById('producaoQtd'),
        status: document.getElementById('producaoStatus'),
        dataInicio: document.getElementById('producaoDataInicio'),
        dataPrevista: document.getElementById('producaoDataPrevista'),
        observacao: document.getElementById('producaoObservacao'),
        formTitulo: document.getElementById('producaoFormTitulo'),

        // Modal consumo
        modalConsumo: document.getElementById('modalConsumoProducao'),
        consumoTitulo: document.getElementById('consumoTitulo'),
        consumoResumoLote: document.getElementById('consumoResumoLote'),
        consumoQtdProduzida: document.getElementById('consumoQtdProduzida'),
        consumoBypassEntradas: document.getElementById('consumoBypassEntradas'),
        consumoLista: document.getElementById('consumoLista'),
        consumoSaidasLista: document.getElementById('consumoSaidasLista'),

        // Modal pendencias de vinculo
        modalPendencias: document.getElementById('modalPendenciasVinculoProducao'),
        pendenciasTitulo: document.getElementById('pendenciasVinculoTitulo'),
        pendenciasLista: document.getElementById('pendenciasVinculoLista')
      };
    }

    function limparVazios(lista) {
      return (Array.isArray(lista) ? lista : [])
        .map(v => (v ?? '').toString().trim())
        .filter(v => v !== '');
    }

    function formatMoeda(valor) {
      const n = Number(valor || 0);
      return n.toFixed(2);
    }

    function formatQuantidadeResumo(valor) {
      const n = Number(valor || 0);
      if (!isFinite(n)) return '0';
      if (Math.abs(n - Math.round(n)) < 0.000001) {
        return String(Math.round(n));
      }
      return n.toFixed(2);
    }

    function normalizarUnidadeQuantidade(unidade) {
      return String(unidade || '')
        .trim()
        .toUpperCase()
        .replace(/³/g, '3')
        .replace(/\s+/g, '');
    }

    function obterCasasQuantidade(unidade) {
      const u = normalizarUnidadeQuantidade(unidade);
      return u === 'M3' || u === 'M^3' ? 5 : 2;
    }

    function obterStepQuantidade(unidade) {
      return obterCasasQuantidade(unidade) > 2 ? '0.00001' : '0.01';
    }

    function formatQuantidadePorUnidade(valor, unidade) {
      const n = Number(valor || 0);
      if (!isFinite(n)) return '0';
      return n.toFixed(obterCasasQuantidade(unidade));
    }

    function formatQuantidadeInputPorUnidade(valor, unidade) {
      const n = Number(valor || 0);
      if (!isFinite(n) || n <= 0) return '';
      return n.toFixed(obterCasasQuantidade(unidade)).replace(/\.?0+$/, '');
    }

    function parseNumeroInput(valor) {
      const s = String(valor ?? '').trim();
      if (s === '') return 0;
      const n = Number(s.replace(',', '.'));
      return isNaN(n) ? 0 : n;
    }

    function normalizarQuantidadeInteiraUI(valor) {
      const n = parseNumeroInput(valor);
      if (!isFinite(n) || n <= 0) return 0;
      return Math.max(0, Math.round(n));
    }

    function parseBoolLike(valor) {
      if (valor === true) return true;
      const s = String(valor ?? '').trim().toLowerCase();
      return s === 'true' || s === '1' || s === 'sim';
    }

    function normalizarStatusProducao(valor) {
      return String(valor || '')
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .trim()
        .toUpperCase();
    }

    function isProducaoConcluidaComEstoque(item) {
      const status = normalizarStatusProducao(item?.status);
      const estoqueAtualizado = parseBoolLike(item?.estoque_atualizado);
      const statusConcluido = status === 'CONCLUIDO' || status === 'CONCLUIDA';
      return estoqueAtualizado && statusConcluido;
    }

    function separarListasProducao(itens) {
      const lista = Array.isArray(itens) ? itens : [];
      const emAndamento = [];
      const concluidas = [];

      lista.forEach(item => {
        if (isProducaoConcluidaComEstoque(item)) {
          concluidas.push(item);
          return;
        }
        emAndamento.push(item);
      });

      return { emAndamento, concluidas };
    }

    function escapeHtml(valor) {
      return String(valor ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function escapeAttr(valor) {
      return escapeHtml(valor);
    }

    function proximoFrame(fn) {
      let executado = false;
      const run = () => {
        if (executado) return;
        executado = true;
        fn();
      };
      if (typeof window !== 'undefined' && typeof window.requestAnimationFrame === 'function') {
        window.requestAnimationFrame(run);
      }
      setTimeout(run, 80);
    }

    function setEstoqueOpcoes(lista) {
      estoqueOpcoes = Array.isArray(lista) ? lista : [];
    }

    function setTiposValidacao(lista) {
      tiposValidacao = [...new Set((Array.isArray(lista) ? lista : [])
        .map(v => String(v || '').trim().toUpperCase())
        .filter(v => v !== ''))];
    }

    function getTiposEstoque() {
      const tipos = new Set();
      (estoqueOpcoes || []).forEach(i => {
        const t = String(i?.tipo || '').toUpperCase().trim();
        if (t) tipos.add(t);
      });
      return [...tipos].sort((a, b) => a.localeCompare(b));
    }

    function renderOpcoesEstoque(candidatos, selecionadoId, incluirVazio = true) {
      const itens = Array.isArray(candidatos) ? candidatos : [];
      const opts = itens.map(i => {
        const id = String(i.ID || '');
        const nome = i.item || id;
        const tipo = String(i.tipo || '').toUpperCase();
        const unidade = String(i.unidade || '').trim();
        const saldoFisico = formatQuantidadePorUnidade(i.quantidade, unidade);
        const saldoDisponivel = formatQuantidadePorUnidade(
          Object.prototype.hasOwnProperty.call(i || {}, 'quantidade_disponivel')
            ? i.quantidade_disponivel
            : i.quantidade,
          unidade
        );
        const selected = id === String(selecionadoId || '') ? 'selected' : '';
        return `<option value="${escapeAttr(id)}" ${selected}>${escapeHtml(nome)} (${escapeHtml(tipo)}) - Disp ${saldoDisponivel}${unidade ? ` ${escapeHtml(unidade)}` : ''} | Fisico ${saldoFisico}${unidade ? ` ${escapeHtml(unidade)}` : ''}</option>`;
      }).join('');
      return (incluirVazio ? '<option value="">Selecione no estoque</option>' : '') + opts;
    }

    function getCandidatosVinculo(vinculo) {
      const tipo = String(vinculo?.tipo_item || '').toUpperCase().trim();
      const categoria = String(vinculo?.categoria || '').toUpperCase().trim();
      const unidade = String(vinculo?.unidade || '').toUpperCase().trim();
      const modo = String(vinculo?.modo_atendimento || '').toUpperCase().trim();
      const comprimentoMin = parseNumeroInput(vinculo?.comprimento_min_cm || 0);
      const larguraMin = parseNumeroInput(vinculo?.largura_min_cm || 0);
      const espessuraMin = parseNumeroInput(vinculo?.espessura_min_cm || 0);
      const todos = Array.isArray(estoqueOpcoes) ? estoqueOpcoes : [];
      return todos.filter(i => {
        if (tipo && String(i?.tipo || '').toUpperCase().trim() !== tipo) return false;
        if (categoria && String(i?.categoria || '').toUpperCase().trim() !== categoria) return false;
        if (unidade && String(i?.unidade || '').toUpperCase().trim() !== unidade) return false;

        const disponivel = parseNumeroInput(
          Object.prototype.hasOwnProperty.call(i || {}, 'quantidade_disponivel')
            ? i.quantidade_disponivel
            : i.quantidade
        );
        if (disponivel <= 0 && String(i?.ID || '').trim() !== String(vinculo?.estoque_id || '').trim()) {
          return false;
        }

        if (modo !== 'PECA_UNICA') return true;

        const comprimento = parseNumeroInput(i?.comprimento_cm || 0);
        const largura = parseNumeroInput(i?.largura_cm || 0);
        const espessura = parseNumeroInput(i?.espessura_cm || 0);
        return (
          comprimento >= comprimentoMin &&
          largura >= larguraMin &&
          espessura >= espessuraMin
        );
      });
    }

    function getEstoqueOpcaoById(estoqueId) {
      const id = String(estoqueId || '').trim();
      if (!id) return null;
      return (Array.isArray(estoqueOpcoes) ? estoqueOpcoes : [])
        .find(i => String(i?.ID || '').trim() === id) || null;
    }

    function getCandidatosConsumo(item) {
      return getCandidatosVinculo(item);
    }

    function atualizarFonteConsumoContexto(fonteEl, row) {
      if (!fonteEl) return;
      const select = fonteEl.querySelector('.consumo-estoque-select');
      const input = fonteEl.querySelector('input[data-campo-qtd-consumo="1"]');
      if (!input) return;

      const estoqueId = String(
        select?.value ||
        input.dataset.estoqueId ||
        row?.dataset?.estoqueIdOrigem ||
        ''
      ).trim();
      const itemEstoque = getEstoqueOpcaoById(estoqueId);
      const unidadeFallback = String(row?.dataset?.unidadeOrigem || '').trim();
      const unidade = String(itemEstoque?.unidade || unidadeFallback).trim();

      input.dataset.estoqueId = estoqueId;
      input.dataset.unidade = unidade;
      input.step = obterStepQuantidade(unidade);
      if (String(row?.dataset?.modoAtendimento || '').toUpperCase() === 'PECA_UNICA') {
        const quantidadePeca = parseNumeroInput(itemEstoque?.quantidade || 0);
        input.readOnly = true;
        input.dataset.quantidadeBase = String(Number(quantidadePeca || 0).toFixed(6));
        if (input.dataset.manual !== '1') {
          input.value = quantidadePeca > 0
            ? formatQuantidadeInputPorUnidade(quantidadePeca, unidade)
            : '';
        }
      } else {
        input.readOnly = false;
      }
    }

    function atualizarRemocaoFontesConsumo(row) {
      if (!row) return;
      const fontes = [...row.querySelectorAll('.consumo-fonte')];
      const bloquear = fontes.length <= 1 || String(row.dataset.modoAtendimento || '').toUpperCase() === 'PECA_UNICA';
      fontes.forEach(fonte => {
        const btn = fonte.querySelector('.btn-consumo-remover-fonte');
        if (btn) btn.disabled = bloquear;
      });
    }

    function garantirFonteAutoSugestao(row) {
      if (!row) return;
      const fontes = [...row.querySelectorAll('.consumo-fonte')];
      if (fontes.length === 0) return;

      let encontrouAuto = false;
      fontes.forEach((fonte, idx) => {
        const input = fonte.querySelector('input[data-campo-qtd-consumo="1"]');
        if (!input) return;
        if (!encontrouAuto && input.dataset.autoSugestao === '1') {
          encontrouAuto = true;
          return;
        }
        if (!encontrouAuto && idx === 0) {
          input.dataset.autoSugestao = '1';
          if (input.dataset.manual !== '1') {
            input.dataset.manual = '0';
          }
        } else {
          input.dataset.autoSugestao = '0';
        }
      });
    }

    function criarFonteConsumo(row, opcoes = {}) {
      const candidatos = getCandidatosConsumo({
        tipo_item: row?.dataset?.tipoItem || '',
        categoria: row?.dataset?.categoria || '',
        unidade: row?.dataset?.unidadeOrigem || '',
        modo_atendimento: row?.dataset?.modoAtendimento || '',
        comprimento_min_cm: row?.dataset?.comprimentoMin || '',
        largura_min_cm: row?.dataset?.larguraMin || '',
        espessura_min_cm: row?.dataset?.espessuraMin || '',
        estoque_id: row?.dataset?.estoqueIdOrigem || ''
      });
      const estoqueIdSelecionado = String(opcoes.estoqueId || row?.dataset?.estoqueIdOrigem || '').trim();
      const unidadeOrigem = String(row?.dataset?.unidadeOrigem || '').trim();
      const estoqueSel = getEstoqueOpcaoById(estoqueIdSelecionado);
      const unidade = String(opcoes.unidade || estoqueSel?.unidade || unidadeOrigem).trim();
      const stepQtd = obterStepQuantidade(unidade);
      const opcoesSelect = renderOpcoesEstoque(candidatos, estoqueIdSelecionado, false);
      const quantidadeBase = parseNumeroInput((opcoes.quantidadeBase ?? row?.dataset?.quantidadeBase ?? 0));
      const quantidade = parseNumeroInput(opcoes.quantidade);
      const autoSugestao = !!opcoes.autoSugestao;
      const modoAtendimento = String(row?.dataset?.modoAtendimento || '').toUpperCase();
      const reservaId = String(opcoes.reservaId || '').trim();

      const fonte = document.createElement('div');
      fonte.className = 'linha-add-destino consumo-fonte';
      fonte.innerHTML = `
        <select class="consumo-estoque-select">
          ${opcoesSelect}
        </select>
        <input
          type="number"
          step="${stepQtd}"
          min="0"
          data-campo-qtd-consumo="1"
          data-estoque-id="${escapeAttr(estoqueIdSelecionado)}"
          data-unidade="${escapeAttr(unidade)}"
          data-quantidade-base="${escapeAttr(Number(quantidadeBase || 0).toFixed(6))}"
          data-reserva-id="${escapeAttr(reservaId)}"
          data-auto-sugestao="${autoSugestao ? '1' : '0'}"
          data-manual="${autoSugestao ? '0' : '1'}"
          value="${autoSugestao ? '' : escapeAttr(formatQuantidadeInputPorUnidade(quantidade, unidade))}"
          ${modoAtendimento === 'PECA_UNICA' ? 'readonly' : ''}
        >
        <button type="button" class="btn-consumo-remover-fonte">Remover item</button>
      `;

      const select = fonte.querySelector('.consumo-estoque-select');
      const input = fonte.querySelector('input[data-campo-qtd-consumo="1"]');
      const btnRemover = fonte.querySelector('.btn-consumo-remover-fonte');

      if (select) {
        select.addEventListener('change', () => {
          atualizarFonteConsumoContexto(fonte, row);
          if (input && input.dataset.manual !== '1') {
            atualizarSugestaoConsumoLote();
          }
        });
      }
      if (input) {
        input.addEventListener('input', () => {
          if (String(row?.dataset?.modoAtendimento || '').toUpperCase() === 'PECA_UNICA') return;
          input.dataset.manual = '1';
        });
      }
      if (btnRemover) {
        btnRemover.addEventListener('click', () => {
          const wrap = row?.querySelector('[data-consumo-fontes="1"]');
          if (!wrap) return;
          fonte.remove();
          garantirFonteAutoSugestao(row);
          atualizarRemocaoFontesConsumo(row);
          atualizarSugestaoConsumoLote();
        });
      }

      atualizarFonteConsumoContexto(fonte, row);
      return fonte;
    }

    function adicionarFonteConsumo(row, opcoes = {}) {
      if (!row) return;
      const wrap = row.querySelector('[data-consumo-fontes="1"]');
      if (!wrap) return;
      if (String(row.dataset.modoAtendimento || '').toUpperCase() === 'PECA_UNICA' && wrap.children.length > 0) {
        return;
      }
      const fonte = criarFonteConsumo(row, opcoes);
      wrap.appendChild(fonte);
      garantirFonteAutoSugestao(row);
      atualizarRemocaoFontesConsumo(row);
    }

    /* =========================
       FORMULARIO
    ========================== */
    function abrirFormularioNovo() {
      resetFormulario();
      mostrarFormulario();
    }

    function mostrarFormulario() {
      const { formulario } = el();
      if (!formulario) return;
      formulario.classList.remove('hidden');
    }

    function fecharFormulario() {
      const { formulario } = el();
      if (!formulario) return;
      formulario.classList.add('hidden');
      resetFormulario();

      if (window.ProducaoController) {
        ProducaoController.limparEdicao();
      }
    }

    function preencherFormulario(data) {
      const f = el();

      if (f.produto) f.produto.value = data.produto_id || '';
      if (f.receita) f.receita.value = data.receita_id || '';
      if (f.nome) f.nome.value = data.nome_ordem || '';
      if (f.qtd) f.qtd.value = data.qtd_planejada || '';
      if (f.status) f.status.value = data.status || 'Em planejamento';
      if (f.dataInicio) f.dataInicio.value = data.data_inicio || '';
      if (f.dataPrevista) f.dataPrevista.value = data.data_prevista_termino || '';
      if (f.observacao) f.observacao.value = data.observacao || '';

      if (f.formTitulo) f.formTitulo.innerText = 'Editar Producao';
    }

    function resetFormulario() {
      const f = el();

      [
        f.produto,
        f.receita,
        f.nome,
        f.qtd,
        f.status,
        f.dataInicio,
        f.dataPrevista,
        f.observacao
      ].forEach(i => i && (i.value = ''));

      if (f.formTitulo) f.formTitulo.innerText = 'Nova Producao';
      renderReceitas([]);
    }

    /* =========================
       SELECTS (RENDER ONLY)
    ========================== */
    function renderProdutos(lista) {
      const { produto } = el();
      if (!produto) return;

      const clean = (Array.isArray(lista) ? lista : [])
        .filter(v => v && v.produto_id);

      produto.innerHTML = '<option value="">Selecione o produto</option>';
      clean.forEach(p => {
        const o = document.createElement('option');
        o.value = p.produto_id;
        o.textContent = p.nome_produto || p.produto_id;
        produto.appendChild(o);
      });
    }

    function renderReceitas(lista, selecionadoId = '') {
      const { receita } = el();
      if (!receita) return;

      const clean = (Array.isArray(lista) ? lista : [])
        .filter(v => v && v.receita_id);

      receita.innerHTML = '<option value="">Modelo do produto</option>';
      clean.forEach(r => {
        const o = document.createElement('option');
        o.value = r.receita_id;
        o.textContent = r.nome_receita || r.receita_id;
        receita.appendChild(o);
      });

      if (selecionadoId) {
        receita.value = selecionadoId;
      }
    }

    /* =========================
       LISTA + CARDS
    ========================== */
    function renderMateriais(itens) {
      if (!Array.isArray(itens) || itens.length === 0) {
        return '<p>Nenhum material reservado.</p>';
      }

      const linhas = itens.map(i => `
        <div class="linha-material">
          <span>${escapeHtml(i.item || i.estoque_id)}</span>
          <span>${formatQuantidadePorUnidade(i.quantidade, i.unidade)} ${escapeHtml(i.unidade || '')}</span>
        </div>
      `);

      return linhas.join('');
    }

    function renderFormNovoItemManual(producaoId) {
      const tipos = (Array.isArray(tiposValidacao) ? tiposValidacao : []);
      const optsTipo = tipos
        .map(t => `<option value="${escapeAttr(t)}">${escapeHtml(t)}</option>`)
        .join('');

      const optsEstoque = renderOpcoesEstoque(estoqueOpcoes, '', true);

      return `
        <div class="receita-card">
          <div class="comp-meta"><b>Adicionar item manual na OP</b></div>
          <div class="linha-add-destino">
            <select id="manualTipo_${escapeAttr(producaoId)}">
              <option value="">Tipo</option>
              ${optsTipo}
            </select>
            <input id="manualNome_${escapeAttr(producaoId)}" placeholder="Nome do item">
            <input id="manualQtd_${escapeAttr(producaoId)}" type="number" step="0.00001" min="0" placeholder="Qtd prevista">
            <select id="manualEstoque_${escapeAttr(producaoId)}">
              ${optsEstoque}
            </select>
            <button class="btn-add-item-manual" data-producao-id="${escapeAttr(producaoId)}">Adicionar</button>
          </div>
        </div>
      `;
    }

    function renderDimensoesNecessidade(vinculo) {
      if (String(vinculo?.modo_atendimento || '').toUpperCase() !== 'PECA_UNICA') return '';
      const comp = formatQuantidadeResumo(vinculo?.comprimento_min_cm || 0);
      const larg = formatQuantidadeResumo(vinculo?.largura_min_cm || 0);
      const esp = formatQuantidadeResumo(vinculo?.espessura_min_cm || 0);
      return `Dimensoes minimas: ${escapeHtml(comp)} x ${escapeHtml(larg)} x ${escapeHtml(esp)} cm`;
    }

    function renderReservaLinha(vinculo, reserva = {}) {
      const reservaId = String(reserva?.id || '').trim();
      const estoqueId = String(reserva?.estoque_id || '').trim();
      const candidatos = getCandidatosVinculo({
        ...vinculo,
        estoque_id: estoqueId
      });
      const opcoes = renderOpcoesEstoque(candidatos, estoqueId, true);
      const unidade = String(reserva?.unidade || vinculo?.unidade || '').trim();
      const quantidade = parseNumeroInput(
        reservaId
          ? (reserva?.quantidade_restante ?? reserva?.quantidade_reservada)
          : ''
      );
      const modoExclusivo = String(vinculo?.modo_atendimento || '').toUpperCase() === 'PECA_UNICA';
      const quantidadeLabel = modoExclusivo
        ? 'Peca reservada'
        : 'Qtd reservada';

      return `
        <div class="linha-add-destino reserva-entrada-row" data-vinculo-id="${escapeAttr(vinculo.id)}" data-reserva-id="${escapeAttr(reservaId)}">
          <select class="reserva-estoque-select">
            ${opcoes}
          </select>
          <input
            class="reserva-qtd-input"
            type="number"
            step="${escapeAttr(obterStepQuantidade(unidade || vinculo?.unidade || ''))}"
            min="0"
            placeholder="${escapeAttr(quantidadeLabel)}"
            value="${escapeAttr(quantidade > 0 ? formatQuantidadeInputPorUnidade(quantidade, unidade || vinculo?.unidade || '') : '')}"
            ${modoExclusivo ? 'readonly' : ''}
          >
          <button class="btn-reserva-salvar" data-vinculo-id="${escapeAttr(vinculo.id)}" data-reserva-id="${escapeAttr(reservaId)}">Salvar</button>
          ${reservaId ? `<button class="btn-reserva-remover" data-vinculo-id="${escapeAttr(vinculo.id)}" data-reserva-id="${escapeAttr(reservaId)}">Remover</button>` : ''}
        </div>
      `;
    }

    function renderVinculos(vinculos, producaoId) {
      const lista = Array.isArray(vinculos) ? vinculos : [];
      if (lista.length === 0) {
        return `<p>Nenhum item da OP.</p>${renderFormNovoItemManual(producaoId)}`;
      }

      const linhas = lista.map(v => {
        const prevista = formatQuantidadePorUnidade(v.quantidade_prevista, v.unidade);
        const reservada = formatQuantidadePorUnidade(v.quantidade_reservada, v.unidade);
        const consumida = formatQuantidadePorUnidade(v.quantidade_baixada, v.unidade);
        const pendente = formatQuantidadePorUnidade(v.quantidade_pendente, v.unidade);
        const dimensoes = renderDimensoesNecessidade(v);
        const origem = v.origem_item ? `Origem: ${escapeHtml(v.origem_item)}` : 'Origem: -';

        const modoExclusivo = String(v.modo_atendimento || '').toUpperCase() === 'PECA_UNICA';

          ? reservas.map(r => renderReservaLinha(v, r)).join('')
          : '<p class="comp-meta">Nenhuma reserva cadastrada.</p>';
        const linhaNovaReserva = podeAdicionarReserva
          ? renderReservaLinha(v, {})
          : '';

        return `

            data-comprimento-min="${escapeAttr(v.comprimento_min_cm || '')}"
            data-largura-min="${escapeAttr(v.largura_min_cm || '')}"
            data-espessura-min="${escapeAttr(v.espessura_min_cm || '')}"
          >
            <div><strong>${escapeHtml(v.item || v.origem_item || v.id)}</strong></div>
            <div class="comp-meta">Tipo: ${escapeHtml(v.tipo_item || '-')} | Categoria: ${escapeHtml(v.categoria || '-')} | Status: ${escapeHtml(v.status || '-')}</div>
            <div class="comp-meta">
              Prev: ${prevista} ${escapeHtml(v.unidade || '')} | Reserv: ${reservada} | Baix: ${consumida} | Falta reservar: ${pendente}
            </div>
            <div class="comp-meta">${origem}</div>
            ${dimensoes ? `<div class="comp-meta">${dimensoes}</div>` : ''}

              <p><b>Reservas</b></p>
              ${reservasHtml}
              ${linhaNovaReserva}
            </div>
          </div>
        `;
      });

      return linhas.join('') + renderFormNovoItemManual(producaoId);

    function renderSaidasLotes(lotes, producaoId, permiteEdicao) {
      const lista = Array.isArray(lotes) ? lotes : [];
      if (lista.length === 0) {
        return '<p>Nenhuma saida gerada para esta OP.</p>';
      }

      const montarContextoSaida = lote => {
        const estoqueId = String(lote?.estoque_id || '').trim();
        if (!estoqueId) return 'Destino no estoque: -';

        const itemEstoque = (estoqueOpcoes || []).find(i => String(i?.ID || '').trim() === estoqueId);
        if (!itemEstoque) {
          return `Destino no estoque: ID ${estoqueId}`;
        }

        const partes = [`Destino no estoque: ${String(itemEstoque.item || estoqueId).trim()}`];
        const tipo = String(itemEstoque.tipo || '').trim();
        const categoria = String(itemEstoque.categoria || '').trim();
        if (tipo) partes.push(`Tipo: ${tipo}`);
        if (categoria) partes.push(`Categoria: ${categoria}`);
        return partes.join(' | ');
      };

      return lista.map(l => {
        const quantidade = formatQuantidadePorUnidade(l.quantidade, l.unidade);
        const custoUnit = Number(l.custo_unitario || 0).toFixed(4);
        const custoTotal = Number(l.custo_total || 0).toFixed(2);
        const inputId = `custoLote_${String(l.id || '').replace(/[^a-zA-Z0-9_-]/g, '')}`;
        const precoInputId = `precoVendaLote_${String(l.id || '').replace(/[^a-zA-Z0-9_-]/g, '')}`;
        const contextoSaida = montarContextoSaida(l);
        const precoVenda = Number(l.preco_venda_produto || 0);
        const precoVendaFormatado = isFinite(precoVenda) && precoVenda > 0
          ? Number(precoVenda.toFixed(2))
          : '';
        const precoVendaTexto = precoVendaFormatado === ''
          ? '-'
          : `R$ ${precoVendaFormatado.toFixed(2)}`;
        const nomeSaida = String(l.nome_saida || '').trim();
        const produtoRefId = String(l.produto_id_vinculado || l.produto_ref_id || '').trim();
        const vinculoPorId = l.vinculo_produto_por_id === true || !!String(l.produto_id_vinculado || '').trim();
        const podeEditarPreco = !!permiteEdicao && !!l.permite_editar_preco_venda && vinculoPorId && !!produtoRefId;
        const avisoVinculo = vinculoPorId
          ? ''
          : 'Saida sem vinculo de produto no modelo. Edite na aba Produtos.';

        return `
          <div class="receita-card">
            <div><strong>${escapeHtml(l.nome_saida || l.estoque_id || l.id)}</strong></div>
            <div class="comp-meta">${escapeHtml(contextoSaida)}</div>
            <div class="comp-meta">
              Qtd: ${quantidade} ${escapeHtml(l.unidade || '')} | Custo total lote: R$ ${custoTotal}
            </div>
            <div class="comp-meta">Preco de venda do produto: ${escapeHtml(precoVendaTexto)}</div>
            ${avisoVinculo ? `<div class="comp-meta">${escapeHtml(avisoVinculo)}</div>` : ''}
            <div class="comp-meta">Criado em: ${escapeHtml(l.criado_em || '-')}</div>
            ${permiteEdicao ? `
              <div class="linha-add-destino">
                <input id="${escapeAttr(inputId)}" type="number" step="0.01" min="0" value="${escapeAttr(custoUnit)}">
                <button class="btn-salvar-custo-lote" data-producao-id="${escapeAttr(producaoId)}" data-lote-id="${escapeAttr(l.id)}">
                  Salvar custo
                </button>
              </div>
              <div class="linha-add-destino">
                <input
                  id="${escapeAttr(precoInputId)}"
                  type="number"
                  step="0.01"
                  min="0"
                  placeholder="Preco venda"
                  value="${escapeAttr(precoVendaFormatado)}"
                  ${podeEditarPreco ? '' : 'disabled'}
                >
                <button
                  class="btn-salvar-preco-venda-saida"
                  data-producao-id="${escapeAttr(producaoId)}"
                  data-nome-saida="${escapeAttr(nomeSaida)}"
                  data-preco-input-id="${escapeAttr(precoInputId)}"
                  data-produto-id="${escapeAttr(produtoRefId)}"
                  ${podeEditarPreco ? '' : 'disabled'}
                >
                  Salvar preco venda
                </button>
              </div>
            ` : `
              <div class="comp-meta">Custo unitario: R$ ${custoUnit}</div>
            `}
          </div>
        `;
      }).join('');
    }

    function normalizarCategoriaDashboard(valor) {
      const categoria = String(valor || '').trim();
      return categoria || 'Sem categoria';
    }

    function agregarSaidasPorCategoria(itens) {
      const mapaCategorias = {};
      let totalSaidas = 0;

      (Array.isArray(itens) ? itens : []).forEach(op => {
        const saidasPrevistas = Array.isArray(op?.saidas_previstas) ? op.saidas_previstas : [];
        saidasPrevistas.forEach(saida => {
          const quantidade = Number(saida?.quantidade || 0);
          if (!isFinite(quantidade) || quantidade <= 0) return;

          const categoria = normalizarCategoriaDashboard(saida?.categoria);
          mapaCategorias[categoria] = (mapaCategorias[categoria] || 0) + quantidade;
          totalSaidas += quantidade;
        });
      });

      const categorias = Object.keys(mapaCategorias)
        .map(categoria => ({
          categoria,
          quantidade: Number(mapaCategorias[categoria] || 0)
        }))
        .sort((a, b) => {
          if (b.quantidade !== a.quantidade) return b.quantidade - a.quantidade;
          return a.categoria.localeCompare(b.categoria);
        });

      return {
        categorias,
        totalSaidas
      };
    }

    function calcularValorPrevistoVendaPecas(itens) {
      return (Array.isArray(itens) ? itens : [])
        .reduce((acc, op) => {
          const saidas = Array.isArray(op?.saidas_previstas) ? op.saidas_previstas : [];
          if (saidas.length > 0) {
            const subtotal = saidas.reduce((acSaida, s) => {
              const preco = Number(s?.preco_venda_produto || 0);
              const qtd = Number(s?.quantidade || 0);
              if (!isFinite(preco) || preco <= 0) return acSaida;
              if (!isFinite(qtd) || qtd <= 0) return acSaida;
              return acSaida + (qtd * preco);
            }, 0);
            if (subtotal > 0) return acc + subtotal;
          }

          const valor = Number(op?.valor_previsto_venda_pecas || 0);
          if (!isFinite(valor) || valor <= 0) return acc;
          return acc + valor;
        }, 0);
    }

    function renderMiniDashboardProducao(itens) {
      const { miniDashboard } = el();

      const lista = Array.isArray(itens) ? itens : [];

      const cardCategoriasHtml = resumoCategorias.categorias.length === 0

            <span>${escapeHtml(item.categoria)}</span>
            <strong>${escapeHtml(formatQuantidadeResumo(item.quantidade))} un</strong>
          </div>

      const valorPrevistoHtml = `R$ ${formatMoeda(valorPrevistoPecas)}`;

      miniDashboard.innerHTML = `
        <div class="producao-mini-dashboard-head">
          <div class="producao-mini-dashboard-card">
            <div class="producao-mini-dashboard-label">OPs em andamento</div>
            <div class="producao-mini-dashboard-valor">${escapeHtml(String(totalOps))}</div>
          </div>

          <div class="producao-mini-dashboard-card">
            <div class="producao-mini-dashboard-label">Saidas previstas</div>
            <div class="producao-mini-dashboard-valor">${escapeHtml(formatQuantidadeResumo(resumoCategorias.totalSaidas))} un</div>
          </div>

          <div class="producao-mini-dashboard-card">
            <div class="producao-mini-dashboard-label">Valor previsto venda pecas</div>
            <div class="producao-mini-dashboard-valor">${escapeHtml(valorPrevistoHtml)}</div>
          </div>
        </div>

        <div class="producao-mini-dashboard-categorias">
          <div class="producao-mini-dashboard-titulo">Saidas por categoria</div>

        const avisoVinculo = vinculoPorId

        const meta = [
          `Qtd prevista: ${qtd} ${unidade}`,

        return `

            ${permiteEdicao ? `

                <button

                >

    function renderChecklist(etapas, producaoId) {
      if (!Array.isArray(etapas) || etapas.length === 0) {
        return '<p>Nenhuma etapa cadastrada.</p>';
      }

      const etapasOrdenadas = [...etapas].sort((a, b) => {
        const ordemA = Number(a?.ordem || 0);
        const ordemB = Number(b?.ordem || 0);
        if (ordemA === ordemB) return 0;
        return ordemA - ordemB;
      });

      return etapasOrdenadas.map((et, idx) => {
        const checked = String(et.feito).toLowerCase() === 'true';
        const editing = !!et._editing;
        const podeSubir = idx > 0;

        if (editing) {
          return `
            <div class="linha-etapa">

      );
      const etapasOrdenadas = Array.isArray(i.etapas)
        ? [...i.etapas].sort((a, b) => {

          if (ordemA === ordemB) return 0;
          return ordemA - ordemB;
        })
        : [];

    function renderLista(itens) {
      const { lista } = el();
      if (!lista) return;

      let listaItens = Array.isArray(itens) ? itens : [];

      if (listaItens.length === 0 && window.ProducaoStore && ProducaoStore.isLoaded && ProducaoStore.isLoaded()) {
        const fallback = ProducaoStore.get();
        if (Array.isArray(fallback) && fallback.length > 0) {
          listaItens = fallback;
        }
      }

      renderJobSeq += 1;
      const jobId = renderJobSeq;
      lista.innerHTML = '';
      listaFiltradaAtual = Array.isArray(listaItens) ? listaItens : [];
      const grupos = separarListasProducao(listaFiltradaAtual);
      renderMiniDashboardProducao(grupos.emAndamento);
      qtdRenderizada = 0;

      if (listaFiltradaAtual.length === 0) {
        if (detalhesModalAbertoId) {
          fecharModalDetalhes();
        }
        lista.innerHTML = '<p>Nenhuma ordem de producao.</p>';
        return;
      }

      const filaCards = [];

      const criarSecao = (titulo, quantidade, itensSecao) => {
        const secao = document.createElement('section');
        secao.className = 'producao-secao';
        secao.innerHTML = `
          <div class="producao-secao-head">
            <h4 class="producao-secao-titulo">${escapeHtml(titulo)}</h4>
            <span class="producao-secao-meta">${escapeHtml(String(quantidade))} OP${quantidade === 1 ? '' : 's'}</span>
          </div>
        `;
        const corpo = document.createElement('div');
        corpo.className = 'producao-secao-lista';
        secao.appendChild(corpo);
        lista.appendChild(secao);

        (Array.isArray(itensSecao) ? itensSecao : []).forEach(item => {
          filaCards.push({ container: corpo, item });
        });
      };

      if (grupos.emAndamento.length > 0) {
        criarSecao('Em andamento', grupos.emAndamento.length, grupos.emAndamento);
      }
      if (grupos.concluidas.length > 0) {
        criarSecao('Producoes concluidas', grupos.concluidas.length, grupos.concluidas);
      }

      let idx = 0;
      const processarChunk = () => {
        if (jobId !== renderJobSeq) return;
        const limite = Math.min(idx + RENDER_CHUNK_SIZE, filaCards.length);
        const fragments = new Map();
        for (; idx < limite; idx++) {
          const alvo = filaCards[idx];
          if (!alvo || !alvo.container) continue;
          let fragment = fragments.get(alvo.container);
          if (!fragment) {
            fragment = document.createDocumentFragment();
            fragments.set(alvo.container, fragment);
          }
          fragment.appendChild(montarCardProducao(alvo.item));
        }
        fragments.forEach((fragment, container) => {
          container.appendChild(fragment);
        });
        qtdRenderizada = idx;

        if (idx < filaCards.length) {
          proximoFrame(processarChunk);
          return;
        }

        initDelegation();
        atualizarModalDetalhesSeAberto();
      };

      proximoFrame(processarChunk);
    }

    function getProducaoById(id) {
      const alvo = String(id || '').trim();
      if (!alvo) return null;
      return (Array.isArray(listaFiltradaAtual) ? listaFiltradaAtual : [])
        .find(p => String(p?.producao_id || '').trim() === alvo) || null;
    }

    function abrirModalDetalhes(id) {
      const alvoId = String(id || '').trim();
      if (!alvoId) return;
      const f = el();
      if (!f.modalDetalhes || !f.modalDetalhesConteudo) return;

      const item = getProducaoById(alvoId);
      if (!item) {
        f.modalDetalhesConteudo.innerHTML = '<p>Ordem de producao nao encontrada.</p>';
        f.modalDetalhes.classList.remove('hidden');
        return;
      }

      if (f.modalDetalhesTitulo) {
        f.modalDetalhesTitulo.textContent = item.nome_ordem || item.nome_produto || 'Detalhes da producao';
      }
      f.modalDetalhesConteudo.innerHTML = montarDetalhesProducao(item);
      detalhesModalAbertoId = alvoId;
      f.modalDetalhes.classList.remove('hidden');
    }

    function fecharModalDetalhes() {
      const f = el();
      if (!f.modalDetalhes) return;
      f.modalDetalhes.classList.add('hidden');
      if (f.modalDetalhesConteudo) f.modalDetalhesConteudo.innerHTML = '';
      detalhesModalAbertoId = '';
    }

    function atualizarModalDetalhesSeAberto() {
      if (!detalhesModalAbertoId) return;
      const item = getProducaoById(detalhesModalAbertoId);
      if (!item) {
        fecharModalDetalhes();
        return;
      }
      abrirModalDetalhes(detalhesModalAbertoId);

    function atualizarSugestaoConsumoLote() {
      const {
        modalConsumo,
        consumoLista,
        consumoQtdProduzida,
        consumoBypassEntradas,
        consumoResumoLote,
        consumoSaidasLista
      } = el();
      if (!modalConsumo || !consumoLista) return;

      const qtdPlanejada = parseNumeroInput(modalConsumo.dataset.qtdPlanejada || 0);
      const qtdProduzidaAcumulada = parseNumeroInput(modalConsumo.dataset.qtdProduzidaAcumulada || 0);
      const qtdRestante = parseNumeroInput(modalConsumo.dataset.qtdRestante || 0);
      const qtdPlanejadaInteira = normalizarQuantidadeInteiraUI(qtdPlanejada);
      const qtdProduzidaInteira = normalizarQuantidadeInteiraUI(qtdProduzidaAcumulada);
      const qtdRestanteInteira = normalizarQuantidadeInteiraUI(qtdRestante);

      let qtdLote = normalizarQuantidadeInteiraUI(consumoQtdProduzida?.value || 0);
      if (qtdLote <= 0) {
        qtdLote = qtdRestanteInteira > 1 ? 1 : qtdRestanteInteira;
      }
      if (qtdRestanteInteira > 0 && qtdLote > qtdRestanteInteira) {
        qtdLote = qtdRestanteInteira;
      }
      if (consumoQtdProduzida) {
        consumoQtdProduzida.value = qtdLote > 0 ? String(qtdLote) : '';
      }

      if (consumoResumoLote) {
        consumoResumoLote.textContent = `Planejada: ${formatQuantidadeResumo(qtdPlanejadaInteira)} | Produzida: ${formatQuantidadeResumo(qtdProduzidaInteira)} | Restante: ${formatQuantidadeResumo(qtdRestanteInteira)}`;
      }

      const fator = qtdPlanejadaInteira > 0 ? (qtdLote / qtdPlanejadaInteira) : 0;
      const bypass = !!consumoBypassEntradas?.checked;
      const selects = consumoLista.querySelectorAll('.consumo-estoque-select');
      selects.forEach(select => { select.disabled = bypass; });
      const botoesAdd = consumoLista.querySelectorAll('.btn-consumo-add-fonte');
      botoesAdd.forEach(btn => { btn.disabled = bypass; });
      const linhasConsumo = [...consumoLista.querySelectorAll('.linha-consumo')];
      linhasConsumo.forEach(row => {
        if (bypass) {
          row.querySelectorAll('.btn-consumo-remover-fonte').forEach(btn => { btn.disabled = true; });
        } else {
          atualizarRemocaoFontesConsumo(row);
        }
      });
      const inputs = consumoLista.querySelectorAll('input[data-campo-qtd-consumo="1"]');
      inputs.forEach(input => {
        if (!input) return;
        input.disabled = bypass;
        if (bypass) return;
        if (input.dataset.autoSugestao !== '1') return;
        if (input.dataset.manual === '1') return;
        const row = input.closest('.linha-consumo');
        const modoAtendimento = String(row?.dataset?.modoAtendimento || '').toUpperCase();
        if (modoAtendimento === 'PECA_UNICA') {
          const serieItem = normalizarQuantidadeInteiraUI(row?.dataset?.serieItem || 0);
          const dentroDoLote = serieItem > qtdProduzidaInteira && serieItem <= (qtdProduzidaInteira + qtdLote);
          if (!dentroDoLote) {
            input.value = '';
            return;
          }
          const quantidadeBase = parseNumeroInput(input.dataset.quantidadeBase || 0);
          input.value = quantidadeBase > 0
            ? formatQuantidadeInputPorUnidade(quantidadeBase, input.dataset.unidade || '')
            : '';
          return;
        }
        const quantidadeBase = parseNumeroInput(input.dataset.quantidadeBase || 0);
        const sugerida = Math.max(0, quantidadeBase * fator);
        input.value = formatQuantidadeInputPorUnidade(sugerida, input.dataset.unidade || '');
      });

      const saidasAtivas = consumoSaidasLista?.querySelectorAll('.saida-revisao-row') || [];
      [...saidasAtivas].forEach(row => {
        const checkbox = row.querySelector('.saida-revisao-ativa');
        const inputQtd = row.querySelector('.saida-revisao-qtd');
        if (!checkbox || !inputQtd) return;
        inputQtd.disabled = !checkbox.checked;
        if (!checkbox.checked) return;
        const quantidadeBase = parseNumeroInput(inputQtd.dataset.quantidadeBase || 0);
        const sugerida = Math.max(0, quantidadeBase * fator);
        if (inputQtd.dataset.manual !== '1') {
          inputQtd.value = formatQuantidadeInputPorUnidade(sugerida, row.querySelector('.saida-revisao-unidade')?.value || '');
        }
      });
    }

    function abrirModalConsumo(producaoId, nome, necessidades, saidasPrevistas, contexto) {
      const {
        modalConsumo,
        consumoTitulo,
        consumoLista,
        consumoQtdProduzida,
        consumoBypassEntradas,
        consumoSaidasLista
      } = el();
      if (!modalConsumo || !consumoLista) return;

      const ctx = contexto || {};
      const qtdPlanejada = normalizarQuantidadeInteiraUI(ctx.qtd_planejada || ctx.qtdPlanejada || 0);
      const qtdProduzidaAcumulada = normalizarQuantidadeInteiraUI(ctx.qtd_produzida_acumulada || ctx.qtdProduzidaAcumulada || 0);
      const qtdRestanteRaw = normalizarQuantidadeInteiraUI(ctx.qtd_restante || ctx.qtdRestante || 0);
      const qtdRestante = qtdRestanteRaw > 0
        ? qtdRestanteRaw
        : Math.max(0, qtdPlanejada - qtdProduzidaAcumulada);
      const qtdInicialLote = qtdRestante > 1 ? 1 : qtdRestante;

      modalConsumo.dataset.producaoId = producaoId;
      modalConsumo.dataset.qtdPlanejada = String(qtdPlanejada || 0);
      modalConsumo.dataset.qtdProduzidaAcumulada = String(qtdProduzidaAcumulada || 0);
      modalConsumo.dataset.qtdRestante = String(qtdRestante || 0);
      if (consumoTitulo) consumoTitulo.textContent = `Atualizar estoque - ${nome}`;
      if (consumoQtdProduzida) consumoQtdProduzida.value = qtdInicialLote > 0 ? String(qtdInicialLote) : '';
      if (consumoBypassEntradas) consumoBypassEntradas.checked = false;

      consumoLista.innerHTML = '';
      if (consumoSaidasLista) consumoSaidasLista.innerHTML = '';

      (necessidades || []).forEach(item => {
        const quantidadeBase = Number(item.quantidade_prevista || 0);
        const unidade = String(item.unidade || '').trim();
        const modoAtendimento = String(item.modo_atendimento || '').toUpperCase();
        const reservas = Array.isArray(item.reservas) ? item.reservas : [];
        const row = document.createElement('div');
        row.className = 'linha-consumo';
        row.dataset.vinculoId = String(item.id || '').trim();
        row.dataset.estoqueIdOrigem = String(reservas[0]?.estoque_id || '').trim();
        row.dataset.unidadeOrigem = unidade;
        row.dataset.tipoItem = String(item.tipo_item || '').trim();
        row.dataset.categoria = String(item.categoria || '').trim();
        row.dataset.modoAtendimento = modoAtendimento;
        row.dataset.comprimentoMin = String(item.comprimento_min_cm || '').trim();
        row.dataset.larguraMin = String(item.largura_min_cm || '').trim();
        row.dataset.espessuraMin = String(item.espessura_min_cm || '').trim();
        row.dataset.serieItem = String(item.serie_item || '').trim();
        row.dataset.quantidadeBase = Number(quantidadeBase || 0).toFixed(6);
        const metaPeca = modoAtendimento === 'PECA_UNICA'
          ? ` | Serie ${escapeHtml(String(item.serie_item || '-'))}`
          : '';
        row.innerHTML = `
          <div>
            <div><strong>${escapeHtml(item.item || item.estoque_id || item.id)}</strong></div>
            <div>
              Prev: ${formatQuantidadePorUnidade(quantidadeBase, unidade)} ${escapeHtml(unidade || '')}
              | Reservado: ${formatQuantidadePorUnidade(item.quantidade_reservada || 0, unidade)}${metaPeca}
            </div>
          </div>
          <div data-consumo-fontes="1"></div>
          <div class="linha-add-destino">
            <button type="button" class="btn-consumo-add-fonte" ${modoAtendimento === 'PECA_UNICA' ? 'disabled' : ''}>Adicionar item do estoque</button>
          </div>
        `;
        consumoLista.appendChild(row);

        if (reservas.length > 0) {
          reservas.forEach(reserva => {
            adicionarFonteConsumo(row, {
              reservaId: reserva.id,
              estoqueId: reserva.estoque_id,
              unidade: reserva.unidade || unidade,
              quantidadeBase: reserva.quantidade_restante || reserva.quantidade_reservada || 0,
              quantidade: reserva.quantidade_restante || reserva.quantidade_reservada || 0,
              autoSugestao: true
            });
          });
        } else {
          adicionarFonteConsumo(row, {
            estoqueId: '',
            unidade,
            quantidadeBase,
            quantidade: 0,
            autoSugestao: false
          });
        }

        const btnAddFonte = row.querySelector('.btn-consumo-add-fonte');
        if (btnAddFonte) {
          btnAddFonte.addEventListener('click', () => {
            adicionarFonteConsumo(row, {
              estoqueId: '',
              unidade,
              quantidadeBase,
              autoSugestao: false
            });
          });
        }
      });

      if (consumoSaidasLista) {
        const linhasSaida = Array.isArray(saidasPrevistas) ? saidasPrevistas : [];
        consumoSaidasLista.innerHTML = linhasSaida.length === 0
          ? '<p>Nenhuma saida configurada.</p>'
          : linhasSaida.map(renderSaidaRevisaoLinha).join('');

        consumoSaidasLista.querySelectorAll('.saida-revisao-ativa').forEach(checkbox => {
          checkbox.addEventListener('change', () => {
            const row = checkbox.closest('.saida-revisao-row');
            const inputQtd = row?.querySelector('.saida-revisao-qtd');
            if (inputQtd) {
              inputQtd.disabled = !checkbox.checked;
            }
          });
        });
        consumoSaidasLista.querySelectorAll('.saida-revisao-qtd').forEach(input => {
          input.addEventListener('input', () => {
            input.dataset.manual = '1';
          });
        });
      }

      if (consumoQtdProduzida) {
        consumoQtdProduzida.oninput = () => {
          const inputs = consumoLista.querySelectorAll('input[data-campo-qtd-consumo="1"]');
          inputs.forEach(input => {
            if (input.dataset.autoSugestao === '1') {
              input.dataset.manual = '0';
            }
          });
          const saidasInputs = consumoSaidasLista?.querySelectorAll('.saida-revisao-qtd') || [];
          [...saidasInputs].forEach(input => {
            input.dataset.manual = '0';
          });
          atualizarSugestaoConsumoLote();
        };
      }
      if (consumoBypassEntradas) {
        consumoBypassEntradas.onchange = () => {
          atualizarSugestaoConsumoLote();
        };
      }

      atualizarSugestaoConsumoLote();
      modalConsumo.classList.remove('hidden');
    }

        return {
          producaoId: '',

        ? []
        : [...consumoLista.querySelectorAll('.linha-consumo')].flatMap(row => {
          const necessidadeId = String(row.dataset.vinculoId || '').trim();
          const modoAtendimento = String(row.dataset.modoAtendimento || '').toUpperCase();

            const ativa = row.querySelector('.saida-revisao-ativa')?.checked;

              receita_saida_id: row.querySelector('.saida-revisao-receita-saida')?.value || '',
              nome_saida: row.querySelector('.saida-revisao-nome')?.value || '',

              tipo_item: row.querySelector('.saida-revisao-tipo')?.value || '',
              categoria: row.querySelector('.saida-revisao-categoria')?.value || '',
              unidade: row.querySelector('.saida-revisao-unidade')?.value || '',

            };
          })

        : [];

      return {
        producaoId,
        itens,
        qtdProduzida,
        bypassEntradas,
        saidas
      };
    }

            <span class="campo-ajuda-tag">Item do estoque</span>
            <select data-vinculo-id="${p.id}">
              ${opcoesSelect}
            </select>
          </div>
        `;
        pendenciasLista.appendChild(row);
      });

      modalPendencias.classList.remove('hidden');
    }

    function fecharModalPendenciasVinculo() {
      const { modalPendencias, pendenciasLista } = el();
      if (!modalPendencias || !pendenciasLista) return;

      modalPendencias.classList.add('hidden');
      pendenciasLista.innerHTML = '';
      delete modalPendencias.dataset.producaoId;
    }

    function obterPendenciasVinculoPayload() {
      const { modalPendencias, pendenciasLista } = el();
      if (!modalPendencias || !pendenciasLista) {
        return { producaoId: '', vinculacoes: [], faltantes: 0 };
      }

      const producaoId = modalPendencias.dataset.producaoId || '';
      const selects = pendenciasLista.querySelectorAll('select[data-vinculo-id]');
      const vinculacoes = [];
      let faltantes = 0;

      [...selects].forEach(select => {
        const vinculoId = String(select.dataset.vinculoId || '').trim();
        const estoqueId = String(select.value || '').trim();
        if (!vinculoId) return;
        if (!estoqueId) {
          faltantes += 1;
          return;
        }
        vinculacoes.push({
          vinculo_id: vinculoId,
          estoque_id: estoqueId
        });
      });

      return { producaoId, vinculacoes, faltantes };
    }

    /* =========================
       EVENT DELEGATION
    ========================== */
    function initDelegation() {
      if (delegationInit) return;
      delegationInit = true;

      document.addEventListener('click', e => {
        const card = e.target.closest('.card');
        const lista = document.getElementById('listaProducao');

        if (card && lista && !lista.contains(card)) return;

        if (e.target.classList.contains('ver-mais')) {
          e.stopPropagation();
          if (!card) return;
          abrirModalDetalhes(card.dataset.id || '');
          if (card && window.ProducaoController) {
            ProducaoController.carregarMateriaisPrevistos(card.dataset.id, true);
            ProducaoController.carregarVinculosMateriais?.(card.dataset.id, true);
            ProducaoController.carregarSaidasLotes?.(card.dataset.id, true);
          }
          return;
        }

        if (e.target.classList.contains('btn-add-etapa')) {
          const producaoId = e.target.dataset.producaoId;
          const input = document.getElementById(`novaEtapa_${producaoId}`);
          const nome = input ? input.value.trim() : '';
          if (nome && window.ProducaoController) {
            ProducaoController.adicionarEtapa(producaoId, nome, e.target);
            if (input) input.value = '';
          }
          return;
        }

        if (e.target.classList.contains('btn-reserva-salvar')) {
          const needId = e.target.dataset.vinculoId || '';
          const reservaId = e.target.dataset.reservaId || '';
          const linha = e.target.closest('.reserva-entrada-row');
          const card = e.target.closest('.linha-vinculo');
          const producaoId = card?.dataset.producaoId || '';
          const estoqueId = linha?.querySelector('.reserva-estoque-select')?.value || '';
          const quantidade = linha?.querySelector('.reserva-qtd-input')?.value || '';
          if (window.ProducaoController) {
            ProducaoController.salvarReservaEntrada(producaoId, needId, {
              reserva_id: reservaId,
              estoque_id: estoqueId,
              quantidade_reservada: quantidade
            }, e.target);
          }
          return;
        }

        if (e.target.classList.contains('btn-reserva-remover')) {
          const needId = e.target.dataset.vinculoId || '';
          const reservaId = e.target.dataset.reservaId || '';
          const card = e.target.closest('.linha-vinculo');
          const producaoId = card?.dataset.producaoId || '';
          if (window.ProducaoController) {
            ProducaoController.removerReservaEntrada(producaoId, needId, reservaId);
          }
          return;
        }

        if (e.target.classList.contains('btn-add-item-manual')) {
          const producaoId = e.target.dataset.producaoId;
          const tipo = document.getElementById(`manualTipo_${producaoId}`)?.value || '';
          const nome = document.getElementById(`manualNome_${producaoId}`)?.value || '';
          const qtd = parseNumeroInput(document.getElementById(`manualQtd_${producaoId}`)?.value || 0);
          const estoqueId = document.getElementById(`manualEstoque_${producaoId}`)?.value || '';

          if (!tipo.trim()) {
            mostrarToast('Selecione o tipo', 'erro');
            return;
          }
          if (!nome.trim()) {
            mostrarToast('Informe o nome do item', 'erro');
            return;
          }
          if (!qtd || qtd <= 0) {
            mostrarToast('Quantidade invalida', 'erro');
            return;
          }

          if (window.ProducaoController) {
            ProducaoController.adicionarItemManual(producaoId, {
              tipo_item: tipo,
              nome_item: nome.trim(),
              quantidade_prevista: qtd,
              estoque_id: estoqueId
            }, e.target);
          }
          return;
        }

        if (e.target.classList.contains('btn-salvar-custo-lote')) {
          const producaoId = e.target.dataset.producaoId;
          const loteId = e.target.dataset.loteId;
          const input = document.getElementById(`custoLote_${loteId}`);
          const custo = input ? input.value : '';
          if (window.ProducaoController) {
            ProducaoController.atualizarCustoLoteSaida(producaoId, loteId, custo, e.target);
          }
          return;
        }

        if (e.target.classList.contains('btn-salvar-preco-venda-saida')) {
          const producaoId = e.target.dataset.producaoId;
          const nomeSaida = e.target.dataset.nomeSaida || '';
          const precoInputId = e.target.dataset.precoInputId || '';
          const produtoId = e.target.dataset.produtoId || '';
          const input = precoInputId ? document.getElementById(precoInputId) : null;
          const preco = input ? input.value : '';
          if (window.ProducaoController) {
            ProducaoController.atualizarPrecoVendaProdutoSaida(producaoId, nomeSaida, preco, produtoId, e.target);
          }
          return;
        }

        if (e.target.classList.contains('btn-etapa-editar')) {
          const producaoId = e.target.dataset.producaoId;
          const etapaId = e.target.dataset.etapaId;
          if (window.ProducaoController) {
            ProducaoController.iniciarEdicaoEtapa(producaoId, etapaId);
          }
          return;
        }

        if (e.target.classList.contains('btn-etapa-subir')) {
          const producaoId = e.target.dataset.producaoId;
          const etapaId = e.target.dataset.etapaId;
          if (window.ProducaoController) {
            ProducaoController.moverEtapaParaCima(producaoId, etapaId);
          }
          return;
        }

        if (e.target.classList.contains('btn-etapa-cancelar')) {
          const producaoId = e.target.dataset.producaoId;
          const etapaId = e.target.dataset.etapaId;
          if (window.ProducaoController) {
            ProducaoController.cancelarEdicaoEtapa(producaoId, etapaId);
          }
          return;
        }

        if (e.target.classList.contains('btn-etapa-salvar')) {
          const producaoId = e.target.dataset.producaoId;
          const etapaId = e.target.dataset.etapaId;
          const input = document.getElementById(`editEtapa_${producaoId}_${etapaId}`);
          const nome = input ? input.value.trim() : '';
          if (window.ProducaoController) {
            ProducaoController.salvarEdicaoEtapa(producaoId, etapaId, nome, e.target);
          }
          return;
        }

        if (e.target.classList.contains('btn-etapa-deletar')) {
          const producaoId = e.target.dataset.producaoId;
          const etapaId = e.target.dataset.etapaId;
          if (window.ProducaoController) {
            ProducaoController.deletarEtapa(producaoId, etapaId);
          }
          return;
        }

      });

      document.addEventListener('change', e => {
        if (!e.target.classList.contains('check-etapa')) return;
        const producaoId = e.target.dataset.producaoId;
        const etapaId = e.target.dataset.etapaId;
        const feito = e.target.checked;
        if (window.ProducaoController) {
          ProducaoController.marcarEtapa(producaoId, etapaId, feito);
        }
      });
    }

    /* =========================
       API PUBLICA
    ========================== */
    return {
      abrirFormularioNovo,
      mostrarFormulario,
      fecharFormulario,
      preencherFormulario,
      resetFormulario,
      renderLista,
      fecharModalDetalhes,
      renderProdutos,
      renderReceitas,
      setEstoqueOpcoes,
      setTiposValidacao,

      abrirModalConsumo,
      fecharModalConsumo,
      obterConsumoPayload,

      abrirModalPendenciasVinculo,
      fecharModalPendenciasVinculo,
      obterPendenciasVinculoPayload
    };

  })();
</script>
