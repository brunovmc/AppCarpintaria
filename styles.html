<style>
  /* RESET BÃSICO */
  * {
    box-sizing: border-box;
  }

  :root {
    --app-body-padding: 16px;
  }

  body {
    font-family: sans-serif;
    margin: 0;
    padding: var(--app-body-padding);
    padding-bottom: 90px; /* espaÃ§o para bottom bar */
    background: #fafafa;
  }

  body.modal-open {
    overflow: hidden;
  }

  /* TIPOGRAFIA */
  h1,
  h2 {
    margin-top: 0;
  }

  /* BOTÃ•ES (GLOBAL) */
  button {
    padding: 12px;
    margin: 8px 0;
    width: 100%;
    border: 1px solid #ccc;
    background: #fff;
    border-radius: 6px;
    cursor: pointer;
  }

  button:active {
    background: #eee;
  }

  .loading-inline {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    line-height: 1;
  }

  .loading-label {
    display: inline-block;
  }

  .loading-dots {
    display: inline-flex;
    align-items: flex-end;
    justify-content: space-between;
    width: 14px;
  }

  .loading-dots > span {
    display: inline-block;
    opacity: 0.25;
    animation: loading-dot-wave 1s infinite ease-in-out;
  }

  .loading-dots > span:nth-child(2) {
    animation-delay: 0.16s;
  }

  .loading-dots > span:nth-child(3) {
    animation-delay: 0.32s;
  }

  @keyframes loading-dot-wave {
    0%,
    80%,
    100% {
      opacity: 0.25;
      transform: translateY(0);
    }
    40% {
      opacity: 1;
      transform: translateY(-1px);
    }
  }

  /* INPUTS */
  input,
  select,
  textarea {
    width: 100%;
    padding: 10px;
    margin-bottom: 8px;
    border-radius: 6px;
    border: 1px solid #ccc;
  }

  /* Rotulo de apoio no canto superior esquerdo do campo */
  .campo-ajuda-wrap {
    position: relative;
    margin-bottom: 8px;
  }

  .campo-ajuda-wrap > input,
  .campo-ajuda-wrap > select,
  .campo-ajuda-wrap > textarea {
    margin-bottom: 0;
    padding-top: 14px;
  }

  .campo-ajuda-tag {
    position: absolute;
    top: -7px;
    left: 10px;
    z-index: 1;
    pointer-events: none;
    font-size: 11.5px;
    line-height: 1;
    color: #666;
    background: var(--campo-ajuda-bg, #fafafa);
    padding: 0 6px;
    border-radius: 4px;
  }

  .sr-only {
    position: absolute !important;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border: 0;
  }

  .modal-content .campo-ajuda-tag,
  .card .campo-ajuda-tag,
  .receita-card .campo-ajuda-tag {
    --campo-ajuda-bg: #fff;
  }

  /* VISIBILIDADE */
  .hidden {
    display: none !important;
  }

  .app-access-denied {
    max-width: 520px;
    margin: 64px auto 20px;
    padding: 20px 18px;
    border: 1px solid #f0c3bf;
    border-radius: 12px;
    background: #fff6f5;
    color: #5b1d17;
    box-shadow: 0 12px 20px -20px rgba(0, 0, 0, 0.35);
  }

  .app-access-denied h1 {
    margin: 0 0 8px;
    font-size: 20.5px;
  }

  .app-access-denied p {
    margin: 8px 0;
    line-height: 1.45;
  }

  .app-access-denied-email {
    font-size: 13.5px;
    color: #7a2a21;
  }

  .app-access-denied-help {
    font-weight: 600;
  }

  /* NAVBAR SUPERIOR */
  .navbar {
    display: flex;
    align-items: stretch;
    justify-content: space-between;
    gap: 10px;
    margin: calc(-1 * var(--app-body-padding))
      calc(-1 * var(--app-body-padding)) 0;
    border-bottom: 1px solid #ddd;
    padding: 4px var(--app-body-padding) 0;
    background: #ffffff;
    box-shadow: 0 10px 10px -12px rgba(0, 0, 0, 0.45);
    position: sticky;
    top: 0;
    z-index: 10;
    margin-bottom: 15px;
  }

  .navbar button {
    width: auto;
    margin: 0;
    border: none;
    border-bottom: 2px solid transparent;
    border-radius: 0;
    background: transparent;
    color: #3c3c3c;
    font-weight: bold;
    padding: 12px 10px;
    transition:
      box-shadow 0.2s ease,
      color 0.2s ease,
      border-color 0.2s ease;
  }

  .navbar-menu-wrap {
    position: relative;
    display: flex;
    align-items: stretch;
  }

  .navbar-hamburger {
    min-width: 68px;
    font-size: 16.5px;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    white-space: nowrap;
  }

  .navbar-hamburger-icon {
    font-size: 18.5px;
    line-height: 1;
  }

  .navbar-hamburger-label {
    font-size: 12.5px;
    line-height: 1;
    letter-spacing: 0.02em;
  }

  .navbar-menu {
    position: absolute;
    top: calc(100% + 6px);
    right: 0;
    min-width: 210px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    padding: 6px;
    border: 1px solid #ddd;
    border-radius: 8px;
    background: #fff;
    box-shadow: 0 10px 18px rgba(0, 0, 0, 0.12);
    z-index: 15;
  }

  .navbar-menu button {
    width: 100%;
    text-align: left;
    border: none;
    border-bottom: none;
    border-radius: 6px;
    padding: 10px 12px;
    box-shadow: none;
  }

  .navbar .navbar-menu button.active {
    background: #111;
    color: #fff;
    border-bottom-color: transparent;
    box-shadow: none;
  }

  .navbar .navbar-menu button:focus-visible {
    outline: 2px solid #4a79ff;
    outline-offset: 1px;
    border-bottom-color: transparent;
    box-shadow: none;
  }

  .db-env-menu {
    margin-top: 6px;
    padding-top: 8px;
    border-top: 1px solid #e4e4e4;
  }

  .db-env-menu-title {
    padding: 0 8px 6px;
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: #666;
  }

  .db-env-menu-actions {
    display: grid;
    gap: 4px;
  }

  .navbar-menu .db-env-btn {
    width: 100%;
    text-align: left;
    border: 1px solid transparent;
    background: #f7f7f7;
    color: #333;
  }

  .navbar-menu .db-env-btn.active {
    border-color: #7f1d1d;
    background: #7f1d1d;
    color: #fff;
  }

  .navbar button.active {
    background: transparent;
    border-bottom-color: #111;
    color: #111;
    box-shadow: 0 10px 10px -12px rgba(0, 0, 0, 0.7);
  }

  .navbar button:focus-visible {
    outline: none;
    border-bottom-color: #4a79ff;
    box-shadow: 0 10px 10px -12px rgba(74, 121, 255, 0.85);
  }

  .app-sync-banner {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: -8px 0 10px;
    padding: 7px 12px;
    border: 1px solid #d7e4ff;
    border-radius: 999px;
    background: #f3f7ff;
    color: #2a4577;
    font-size: 12.5px;
    line-height: 1;
  }

  .app-sync-banner-clickable {
    cursor: pointer;
  }

  .app-sync-banner-clickable:hover {
    border-color: #8fb0f6;
    background: #eaf1ff;
  }

  .app-sync-banner-clickable:focus-visible {
    outline: 2px solid #4a79ff;
    outline-offset: 2px;
  }

  .app-sync-dot {
    width: 8px;
    height: 8px;
    border-radius: 999px;
    background: #4a79ff;
    box-shadow: 0 0 0 0 rgba(74, 121, 255, 0.45);
    animation: app-sync-pulse 1.2s infinite ease-out;
  }

  .app-locate-highlight,
  .card.app-locate-highlight {
    outline: 3px solid #4a79ff;
    outline-offset: 3px;
    box-shadow: 0 0 0 6px rgba(74, 121, 255, 0.16), var(--shadow-card, 0 10px 26px -18px rgba(34, 28, 20, 0.52));
  }

  .app-db-env-banner {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: -8px 0 10px;
    padding: 7px 12px;
    border: 1px solid #f1a8a8;
    border-radius: 999px;
    background: #fff1f1;
    color: #7f1d1d;
    font-size: 12.5px;
    line-height: 1;
    font-weight: 700;
  }

  .app-db-env-dot {
    width: 8px;
    height: 8px;
    border-radius: 999px;
    background: #d22626;
    box-shadow: 0 0 0 0 rgba(210, 38, 38, 0.45);
    animation: app-db-env-pulse 1.2s infinite ease-out;
  }

  @keyframes app-db-env-pulse {
    0% {
      box-shadow: 0 0 0 0 rgba(210, 38, 38, 0.45);
    }
    100% {
      box-shadow: 0 0 0 7px rgba(210, 38, 38, 0);
    }
  }

  @keyframes app-sync-pulse {
    0% {
      box-shadow: 0 0 0 0 rgba(74, 121, 255, 0.45);
    }
    100% {
      box-shadow: 0 0 0 8px rgba(74, 121, 255, 0);
    }
  }

  /* BARRA DE BUSCA */
  .top-bar {
    display: flex;
    gap: 8px;
    margin: 16px 0;
  }

  .top-bar input {
    margin-bottom: 0;
  }

  .top-bar button {
    width: auto;
    margin: 0;
  }

  .dashboard-toolbar {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    margin: 0 0 12px;
  }

  .dashboard-mes-wrap {
    flex: 1;
    margin-bottom: 0;
  }

  .dashboard-btn-inline {
    width: auto;
    margin: 0;
    white-space: nowrap;
  }

  .dashboard-statusbar {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 8px;
    margin: -4px 0 12px;
  }

  .dashboard-status-text {
    font-size: 12.5px;
    color: #666;
  }

  .dashboard-readonly {
    font-size: 12.5px;
    color: #8a1f11;
    background: #fff2ef;
    border: 1px solid #ffd7cf;
    border-radius: 999px;
    padding: 4px 10px;
  }

  .dash-cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 8px;
    margin-bottom: 12px;
  }

  .dash-card {
    border: 1px solid #ddd;
    border-radius: 8px;
    background: #fff;
    padding: 10px;
  }

  .dash-card-click {
    cursor: pointer;
    transition:
      border-color 0.2s ease,
      box-shadow 0.2s ease;
  }

  .dash-card-click:hover {
    border-color: #bbb;
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
  }

  .dash-card-click:focus-visible {
    outline: 2px solid #4a79ff;
    outline-offset: 1px;
  }

  .dash-card-label {
    font-size: 11.5px;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .dash-card-valor {
    font-size: 18.5px;
    font-weight: 700;
    margin-top: 6px;
  }

  .dash-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
    margin-bottom: 12px;
  }

  @media (min-width: 880px) {
    .dash-grid {
      grid-template-columns: 1fr 1fr;
    }

    .dash-card-wide {
      grid-column: 1 / -1;
    }
  }

  .dash-lista {
    margin-top: 10px;
  }

  .dash-lista-linha {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    padding: 6px 0;
    border-bottom: 1px solid #f0f0f0;
    font-size: 13.5px;
  }

  .dash-lista-linha:last-child {
    border-bottom: none;
  }

  .dash-empty {
    margin: 8px 0 0;
    color: #666;
    font-size: 13.5px;
  }

  .producao-mini-dashboard {
    margin: 0 0 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .producao-mini-dashboard-head {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 8px;
  }

  .producao-mini-dashboard-card {
    border: 1px solid #ddd;
    border-radius: 8px;
    background: #fff;
    padding: 10px;
  }

  .producao-mini-dashboard-card-placeholder {
    background: #fbfbfb;
  }

  .producao-mini-dashboard-label {
    font-size: 11.5px;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }

  .producao-mini-dashboard-valor {
    margin-top: 6px;
    font-size: 18.5px;
    font-weight: 700;
  }

  .producao-mini-dashboard-sub {
    margin-top: 4px;
    font-size: 12.5px;
    color: #666;
  }

  .producao-mini-dashboard-categorias {
    border: 1px solid #ddd;
    border-radius: 8px;
    background: #fff;
    padding: 10px;
  }

  .producao-mini-dashboard-titulo {
    font-size: 12.5px;
    font-weight: 600;
    margin: 0 0 6px;
  }

  .producao-mini-dashboard-linha {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    padding: 6px 0;
    border-bottom: 1px solid #f0f0f0;
    font-size: 13.5px;
  }

  .producao-mini-dashboard-linha:last-child {
    border-bottom: none;
  }

  .producao-mini-dashboard-empty {
    margin: 6px 0 0;
    font-size: 13.5px;
    color: #666;
  }

  .producao-secao {
    margin-bottom: 14px;
  }

  .producao-secao:last-child {
    margin-bottom: 0;
  }

  .producao-secao-head {
    margin: 0 0 10px;
    padding-top: 2px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }

  .producao-secao-titulo {
    margin: 0;
    font-size: 12.5px;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: #6b7280;
  }

  .producao-secao-meta {
    font-size: 12.5px;
    font-weight: 600;
    color: #6b7280;
  }

  .producao-secao-lista .card:last-child {
    margin-bottom: 0;
  }

  .dash-modal-observabilidade {
    max-width: 760px;
    max-height: calc(100vh - 32px);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .dash-obs-header {
    display: flex;
    align-items: center;
    justify-content: flex-start;
    gap: 8px;
    padding-right: 44px;
  }

  .dash-obs-fechar-topo {
    padding: 8px 12px;
  }

  .dash-obs-resumo {
    margin-top: 8px;
    padding: 0;
    border: none;
    background: transparent;
    font-size: 13.5px;
  }

  .dash-obs-lista {
    margin-top: 10px;
    overflow-y: auto;
    overflow-x: hidden;
    border-top: none;
    border-bottom: none;
    padding: 0;
    padding-right: 2px;
    flex: 1 1 auto;
    min-height: 0;
    display: block;
  }

  .dash-obs-lista > * + * {
    margin-top: 10px;
  }

  .dash-obs-item {
    display: block;
    width: 100%;
    box-sizing: border-box;
  }

  .dash-obs-item:last-child {
    border-bottom: none;
  }

  .dash-obs-item-main {
    flex: 1;
    min-width: 0;
  }

  .dash-obs-item-corpo {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
  }

  .dash-obs-item-topo {
    font-size: 14.5px;
    letter-spacing: 0.01em;
    text-transform: none;
    line-height: 1.25;
  }

  .dash-obs-item-titulo {
    font-size: 14.5px;
    font-weight: 600;
  }

  .dash-obs-item-detalhe {
    margin-top: 0;
    font-size: 12.5px;
    color: #666;
    line-height: 1.4;
  }

  .dash-obs-item-right {
    min-width: 170px;
    text-align: right;
  }

  .dash-obs-item-valor {
    font-size: 14.5px;
    font-weight: 700;
  }

  .dash-obs-item-acoes {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: flex-end;
    margin-top: 6px;
  }

  .dash-obs-item-acoes button {
    width: auto;
    margin: 0;
    padding: 6px 8px;
    font-size: 12.5px;
  }

  .dash-obs-summary-card {
    margin: 0;
    width: 100%;
    box-sizing: border-box;
  }

  .dash-obs-item.card-ficha {
    margin-bottom: 0;
  }

  .dash-obs-summary-body {
    display: grid;
    gap: 8px;
  }

  .dash-obs-summary-line {
    font-size: 13.5px;
    line-height: 1.35;
    color: var(--color-text);
  }

  @media (max-width: 720px) {
    .dash-obs-item-corpo {
      flex-direction: column;
    }

    .dash-obs-item-right {
      width: 100%;
      min-width: 0;
      text-align: left;
    }

    .dash-obs-item-acoes {
      justify-content: flex-start;
    }
  }

  .dash-despesa-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
  }

  .dash-despesa-acoes {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .dash-despesa-form-titulo {
    display: block;
    margin: 0 0 12px;
    line-height: 1.2;
  }

  .despesas-inbox {
    margin: 0 0 18px;
    border: 1px solid #dbe3ef;
    border-radius: 12px;
    background: #f8fafc;
    overflow: hidden;
  }

  .despesas-filtros-topo {
    margin-bottom: 14px;
  }

  .despesas-inbox-topo {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 12px 14px;
  }

  .despesas-inbox-titulo {
    display: flex;
    flex-direction: column;
    gap: 2px;
    min-width: 0;
  }

  .despesas-inbox-titulo strong {
    font-size: 14.5px;
    line-height: 1.2;
  }

  .despesas-inbox-titulo span {
    font-size: 12px;
    color: #64748b;
  }

  .despesas-inbox-acoes,
  .despesas-inbox-card-acoes {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 8px;
    flex-wrap: wrap;
  }

  .despesas-inbox-acoes button,
  .despesas-inbox-card-acoes button {
    width: auto;
    margin: 0;
    white-space: nowrap;
  }

  .despesas-inbox-toggle {
    background: #fff;
    color: #334155;
    border: 1px solid #cbd5e1;
  }

  .despesas-inbox-conteudo {
    padding: 12px 14px 14px;
    border-top: 1px solid #dbe3ef;
    background: #fff;
  }

  .despesas-inbox-conteudo-topo {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 10px;
    color: #64748b;
    font-size: 12.5px;
  }

  .despesas-inbox-conteudo-topo button {
    width: auto;
    margin: 0;
  }

  .despesas-inbox-conteudo-acoes {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 8px;
    flex-wrap: wrap;
  }

  .despesas-cadastradas {
    padding-top: 14px;
    border-top: 1px solid #e2e8f0;
  }

  .despesas-cadastradas-titulo {
    display: flex;
    flex-direction: column;
    gap: 2px;
    margin-bottom: 10px;
  }

  .despesas-cadastradas-titulo strong {
    color: #172033;
    font-size: 15px;
  }

  .despesas-cadastradas-titulo span {
    color: #64748b;
    font-size: 12px;
  }

  .despesas-inbox-status {
    margin: 8px 0;
    padding: 7px 9px;
    border: 1px solid #dbe3ef;
    border-radius: 8px;
    background: #f8fafc;
    color: #475569;
    font-size: 12.5px;
    line-height: 1.35;
  }

  .despesas-inbox-status-info {
    border-color: #bfdbfe;
    background: #eff6ff;
    color: #1d4ed8;
  }

  .despesas-inbox-status-erro {
    border-color: #fecaca;
    background: #fff1f2;
    color: #9f1239;
  }

  .despesas-inbox-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .despesa-inbox-item {
    border: 1px solid #dfe4ec;
    border-radius: 8px;
    background: #fff;
    padding: 10px;
  }

  .despesa-inbox-item-erro {
    border-color: #f5c2c7;
    background: #fffafb;
  }

  .despesa-inbox-item-topo {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 6px;
  }

  .despesa-inbox-item-topo strong {
    display: block;
    font-size: 14px;
    line-height: 1.25;
    overflow-wrap: anywhere;
  }

  .despesa-inbox-badge {

  .modal {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 16px;
    overscroll-behavior: contain;
    touch-action: manipulation;
  }

  .modal-content {
    background: #fff;
    border-radius: 8px;
    padding: 16px;
    width: 100%;
    max-width: 520px;
    position: relative;
    max-height: calc(100vh - 32px);
    max-height: calc(100dvh - 32px);
    overflow-y: auto;
    overscroll-behavior: contain;
    -webkit-overflow-scrolling: touch;
  }

  #modalDetalhesEstoque .modal-content,
  #modalDetalhesCompras .modal-content,
  #modalDetalhesVendas .modal-content,
  #modalDetalhesProdutos .modal-content,
  #modalDetalhesProducao .modal-content {
    max-width: 920px;
  }

  .modal-close-square {
    position: absolute;
    top: 8px;
    right: 8px;
    width: 32px;
    height: 32px;
    margin: 0;
    padding: 0;
    border: 1px solid #c8c8c8;
    border-radius: 4px;
    background: #fff;
    color: #333;
    font-size: 16.5px;
    font-weight: 700;
    line-height: 1;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 2;
  }

  .modal-close-square:active {
    background: #f3f3f3;
  }

  .modal-content > h2,
  .modal-content > h3,
  .modal-content > strong {
    padding-right: 44px;
  }

  .form-modal-content {
    max-width: 920px;
    max-height: calc(100vh - 32px);
    max-height: calc(100dvh - 32px);
    overflow-y: auto;
    overscroll-behavior: contain;
    -webkit-overflow-scrolling: touch;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%) translateZ(0);
    will-change: opacity;

    background: #333;
    color: #fff;
    padding: 10px 16px;
    border-radius: 8px;
    font-size: 14.5px;

    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
    z-index: 9999;
  }

  .toast.show {
    opacity: 1;
    overflow: visible;
    transform: translateX(-50%) translateY(-8px);
  }

  .toast.erro {
    background: #c0392b;
  }

  /* ========================= */
  /* VISUAL REFRESH V0.5.6     */
  /* ========================= */
  :root {
    --app-body-padding: 18px;

    --font-title: "Manrope", "Segoe UI", sans-serif;
    --font-body: "Source Sans 3", "Trebuchet MS", sans-serif;

    --color-bg: #f3eee3;
    --color-bg-alt: #ece3d3;
    --color-surface: #ffffff;
    --color-surface-soft: #faf7f0;
    --color-line: #d8cfbd;
    --color-line-strong: #bcae95;

    --color-text: #2b2721;
    --color-text-soft: #6c6559;

    --color-brand: #3c5f78;
    --color-brand-strong: #2f4b61;
    --color-brand-soft: #e6eff6;

    --color-danger: #9e433b;
    --color-danger-soft: #fff0ee;

    --radius-xs: 8px;
    --radius-sm: 10px;
    --radius-md: 14px;
    --radius-lg: 18px;

    --shadow-soft: 0 8px 18px -14px rgba(28, 23, 15, 0.45);
    --shadow-card: 0 10px 26px -18px rgba(34, 28, 20, 0.52);
    --shadow-hover: 0 16px 30px -20px rgba(32, 26, 19, 0.62);

    --transition-fast: 0.16s ease;
    --transition-mid: 0.24s ease;
  }

  html,
  body {
    min-height: 100%;
  }

  body {
    font-family: var(--font-body);
    color: var(--color-text);
    background:
      radial-gradient(
        1200px 520px at -6% -8%,
        rgba(60, 95, 120, 0.16) 0%,
        transparent 58%
      ),
      radial-gradient(
        980px 450px at 100% -20%,
        rgba(181, 152, 101, 0.2) 0%,
        transparent 62%
      ),
      linear-gradient(180deg, var(--color-bg) 0%, var(--color-bg-alt) 100%);
    letter-spacing: 0.01em;
  }

  h1,
  h2,
  h3,
  strong {
    font-family: var(--font-title);
    color: var(--color-text);
    letter-spacing: 0.01em;
  }

  button,
  input,
  select,
  textarea {
    font-family: var(--font-body);
  }

  button {
    border: 1px solid var(--color-line);
    border-radius: var(--radius-sm);
    background: var(--color-surface);
    color: var(--color-text);
    font-weight: 600;
    box-shadow: var(--shadow-soft);
    transition:
      transform var(--transition-fast),
      box-shadow var(--transition-mid),
      border-color var(--transition-mid),
      background-color var(--transition-mid),
      color var(--transition-mid);
  }

  button:hover {
    border-color: var(--color-line-strong);
    box-shadow: var(--shadow-card);
    transform: translateY(-1px);
  }

  button:active {
    transform: translateY(0);
    background: var(--color-surface-soft);
    box-shadow: var(--shadow-soft);
  }

  button:disabled {
    opacity: 0.56;
    cursor: not-allowed;
    box-shadow: none;
    transform: none;
  }

  input,
  select,
  textarea {
    border-color: var(--color-line);
    border-radius: var(--radius-sm);
    background: var(--color-surface);
    color: var(--color-text);
    transition:
      border-color var(--transition-mid),
      box-shadow var(--transition-mid),
      background-color var(--transition-mid);
  }

  input::placeholder,
  textarea::placeholder {
    color: var(--color-text-soft);
  }

  input:focus,
  select:focus,
  textarea:focus {
    outline: none;
    border-color: var(--color-brand);
    box-shadow: 0 0 0 3px rgba(60, 95, 120, 0.18);
  }

  .bottom-bar {

    right: auto;
    bottom: 18px;

    border: 1px solid rgba(215, 225, 239, 0.94);
    border-radius: 24px;
    background: rgba(248, 251, 255, 0.78);
    box-shadow: 0 24px 52px -34px rgba(11, 30, 63, 0.52);
    backdrop-filter: blur(16px);
    transform: translateX(-50%);
    text-align: right;

  .bottom-bar button {
    width: auto;
    min-width: 220px;
    padding-inline: 22px;

    box-shadow: 0 20px 34px -26px var(--tab-soft-strong);

    background: rgba(13, 27, 54, 0.96);

  @media (min-width: 981px) {
    .navbar-menu {
      width: min(50vw, 560px);
      min-width: 340px;
    }
  }

  @media (max-width: 980px) {
    .navbar {
      top: 10px;
      flex-wrap: nowrap;
      align-items: center;
    }

    .navbar-brand-block,
    .navbar-actions {
      width: auto;
      justify-content: space-between;
    }

    }

    .navbar-actions {

      flex: 0 0 auto;

    }

      padding-bottom: 112px;

    .navbar {
      padding: 14px;
      gap: 10px;
    }

    .navbar-section-badge {
      display: none;
    }

    .navbar-brand-block {
      flex-wrap: nowrap;
      gap: 10px;
      min-width: 0;
    }

    .navbar-brand-copy {
      min-width: 0;
    }

    .navbar-brand-title {
      font-size: 18px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .navbar-brand-eyebrow {

    }

    .navbar-hamburger {
      width: auto;
      min-width: 96px;
      padding-inline: 12px;
    }

    .navbar-actions {

      flex: 0 0 auto;
    }

    .navbar-menu-wrap {

      border-radius: 24px;

    .dash-card {

    }

    .navbar-menu {

      right: 0;
      bottom: 0;
      width: min(50vw, 280px);
      min-width: 0;
      border-radius: 28px 0 0 28px;
    }

  /* Dashboard executivo v2 */
  .dashx-shell {
    --dashx-ink: #20323d;
    --dashx-muted: #657985;
    --dashx-line: #dce6e9;
    --dashx-soft: #f4f8f8;
    --dashx-receive: #167d68;
    --dashx-pay: #c9564a;
    --dashx-blue: #326f8f;
    --dashx-gold: #c38a2d;
    color: var(--dashx-ink);
    display: grid;
    gap: 22px;
  }

  .dashx-header {
    align-items: flex-end;
    background:
      radial-gradient(circle at 88% 12%, rgba(255, 255, 255, 0.18), transparent 34%),
      linear-gradient(135deg, #243d49 0%, #326678 100%);
    border-radius: 24px;
    color: #fff;
    display: flex;
    gap: 24px;
    justify-content: space-between;
    overflow: hidden;
    padding: 26px 28px;
    position: relative;
  }

  .dashx-header-copy {
    max-width: 650px;
  }

  .dashx-eyebrow,
  .dashx-section-kicker {
    color: #6e8793;
    display: block;
    font-family: 'Manrope', sans-serif;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.11em;
    margin-bottom: 6px;
    text-transform: uppercase;
  }

  .dashx-header .dashx-eyebrow {
    color: #b9d4df;
  }

  .dashx-header h2 {
    color: #fff;
    font-family: 'Manrope', sans-serif;
    font-size: clamp(25px, 3vw, 36px);
    letter-spacing: -0.035em;
    margin: 0 0 6px;
  }

  .dashx-header p {
    color: #d8e8ee;
    font-size: 15px;
    line-height: 1.55;
    margin: 0;
  }

  .dashx-toolbar {
    align-items: flex-end;
    display: flex;
    flex: 0 0 auto;
    gap: 10px;
  }

  .dashx-month-field {
    color: #d8e8ee;
    display: grid;
    font-size: 11px;
    font-weight: 700;
    gap: 5px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .dashx-month-field input {
    background: rgba(255, 255, 255, 0.96);
    border: 0;
    border-radius: 10px;
    color: #223946;
    font: 700 14px 'Source Sans 3', sans-serif;
    height: 44px;
    min-width: 156px;
    padding: 0 12px;
  }

  .dashx-refresh,
  .dashx-shell .dashx-refresh {
    background: #dfaa4f;
    border: 0;
    border-radius: 10px;
    color: #253640;
    font-family: 'Manrope', sans-serif;
    font-size: 13px;
    font-weight: 800;
    height: 44px;
    margin: 0;
    padding: 0 17px;
    width: auto;
  }

  .dashx-refresh:hover {
    background: #ecc16f;
  }

  .dashx-refresh:disabled {
    cursor: wait;
    opacity: 0.72;
  }

  .dashx-statusbar {
    align-items: center;
    color: var(--dashx-muted);
    display: flex;
    font-size: 12px;
    justify-content: space-between;
    margin: -10px 3px -8px;
  }

  .dashx-readonly {
    background: #fff3da;
    border: 1px solid #efd59c;
    border-radius: 999px;
    color: #785917;
    font-weight: 700;
    padding: 5px 10px;
  }

  .dashx-loading {
    align-items: center;
    background: #f6f9fa;
    border: 1px solid var(--dashx-line);
    border-radius: 18px;
    color: var(--dashx-muted);
    display: flex;
    gap: 12px;
    justify-content: center;
    min-height: 190px;
  }

  .dashx-loading-bar {
    animation: dashx-pulse 1.1s ease-in-out infinite;
    background: #6c98aa;
    border-radius: 999px;
    height: 28px;
    width: 5px;
  }

  @keyframes dashx-pulse {
    0%, 100% { opacity: 0.35; transform: scaleY(0.65); }
    50% { opacity: 1; transform: scaleY(1); }
  }

  .dashx-content {
    display: grid;
    gap: 34px;
    transition: opacity 160ms ease;
  }

  .dashx-content-refreshing {
    opacity: 0.62;
    pointer-events: none;
  }

  .dashx-section {
    display: grid;
    gap: 14px;
  }

  .dashx-section-heading {
    align-items: end;
    display: flex;
    gap: 24px;
    justify-content: space-between;
    padding: 0 3px;
  }

  .dashx-section-heading h3 {
    color: var(--dashx-ink);
    font-family: 'Manrope', sans-serif;
    font-size: clamp(19px, 2vw, 24px);
    letter-spacing: -0.025em;
    margin: 0;
  }

  .dashx-section-heading > p,
  .dashx-section-note {
    color: var(--dashx-muted);
    font-size: 13px;
    line-height: 1.45;
    margin: 0;
    max-width: 520px;
    text-align: right;
  }

  .dashx-kpi-grid {
    display: grid;
    gap: 12px;
    grid-template-columns: repeat(4, minmax(0, 1fr));
  }

  .dashx-shell .dashx-kpi-card,
  .dashx-shell .dash-card.dashx-kpi-card {
    align-items: flex-start;
    background: #fff;
    border: 1px solid var(--dashx-line);
    border-radius: 16px;
    box-shadow: 0 9px 25px rgba(32, 50, 61, 0.055);
    color: var(--dashx-ink);
    display: flex;
    flex-direction: column;
    margin: 0;
    min-height: 192px;
    padding: 18px;
    text-align: left;
    transition: border-color 150ms ease, box-shadow 150ms ease, transform 150ms ease;
    width: 100%;
  }

  .dashx-shell button[data-dash-context]:hover {
    border-color: #a9c3cd;
    box-shadow: 0 12px 30px rgba(32, 50, 61, 0.09);
    transform: translateY(-2px);
  }

  .dashx-shell button[data-dash-context]:focus-visible,
  .dashx-refresh:focus-visible,
  .dashx-data-details summary:focus-visible {
    outline: 3px solid rgba(50, 111, 143, 0.3);
    outline-offset: 2px;
  }

  .dashx-kpi-label,
  .dashx-position-label {
    color: var(--dashx-muted);
    font-size: 13px;
    font-weight: 700;
  }

  .dashx-kpi-value {
    color: var(--dashx-ink);
    font: 800 clamp(22px, 2.1vw, 29px) 'Manrope', sans-serif;
    letter-spacing: -0.045em;
    margin: 9px 0 8px;
    white-space: nowrap;
  }

  .dashx-value-negative,
  .dashx-detail-value strong.negative {
    color: #ad453b;
  }

  .dashx-value-positive {
    color: #176e5f;
  }

  .dashx-kpi-comparison {
    align-items: center;
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
  }

  .dashx-trend {
    border-radius: 999px;
    font-size: 11px;
    font-weight: 800;
    padding: 3px 7px;
  }

  .dashx-trend-positive { background: #e8f5f1; color: #146b59; }
  .dashx-trend-negative { background: #fbecea; color: #a64239; }
  .dashx-trend-neutral { background: #eef3f5; color: #61747e; }

  .dashx-previous {
    color: #81929b;
    font-size: 11px;
  }

  .dashx-kpi-help {
    color: var(--dashx-muted);
    font-size: 11px;
    line-height: 1.35;
    margin-top: 9px;
  }

  .dashx-kpi-action {
    color: var(--dashx-blue);
    font-size: 11px;
    font-weight: 800;
    margin-top: auto;
    padding-top: 10px;
  }

  .dashx-panel {
    background: #fff;
    border: 1px solid var(--dashx-line);
    border-radius: 18px;
    box-shadow: 0 9px 25px rgba(32, 50, 61, 0.045);
    min-width: 0;
    padding: 18px;
  }

  .dashx-panel-heading {
    align-items: flex-start;
    display: flex;
    gap: 14px;
    justify-content: space-between;
    margin-bottom: 5px;
  }

  .dashx-panel-heading h4,
  .dashx-production-title h4,
  .dashx-partner-summary h4 {
    color: var(--dashx-ink);
    font: 800 15px 'Manrope', sans-serif;
    margin: 0 0 4px;
  }

  .dashx-panel-heading p {
    color: var(--dashx-muted);
    font-size: 12px;
    margin: 0;
  }

  .dashx-chart {
    min-height: 280px;
    position: relative;
    width: 100%;
  }

  .dashx-chart-tall { min-height: 370px; }
  .dashx-chart-bars { min-height: 320px; }
  .dashx-chart-donut { min-height: 330px; }

  .dashx-chart-message {
    align-items: center;
    background: var(--dashx-soft);
    border: 1px dashed #bdcdd3;
    border-radius: 12px;
    color: var(--dashx-muted);
    display: flex;
    flex-direction: column;
    gap: 4px;
    inset: 12px 0;
    justify-content: center;
    position: absolute;
    text-align: center;

  .dashx-data-details {
    border-top: 1px solid #e6edef;
    color: var(--dashx-muted);
    margin-top: 6px;
    padding-top: 8px;
  }

  .dashx-data-details summary {
    cursor: pointer;
    font-size: 12px;
    font-weight: 700;
    padding: 5px 1px;
  }

  .dashx-table-scroll {
    margin-top: 9px;
    overflow-x: auto;
  }

  .dashx-data-details table {
    border-collapse: collapse;
    color: #3e535e;
    font-size: 12px;
    min-width: 520px;
    width: 100%;
  }

  .dashx-data-details th,
  .dashx-data-details td {
    border-bottom: 1px solid #e8eef0;
    padding: 8px;
    text-align: right;
  }

  .dashx-data-details th:first-child,
  .dashx-data-details td:first-child {
    text-align: left;
  }

  .dashx-table-empty { text-align: center !important; }

  .dashx-position-grid {
    display: grid;
    gap: 12px;
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .dashx-shell .dashx-position-card {
    align-items: flex-start;
    background: #fff;
    border: 1px solid var(--dashx-line);
    border-left: 5px solid var(--dashx-receive);
    border-radius: 15px;
    color: var(--dashx-ink);
    display: flex;
    flex-direction: column;
    margin: 0;
    padding: 17px 19px;
    text-align: left;
    width: 100%;
  }

  .dashx-position-card > strong { font: 800 25px 'Manrope', sans-serif; margin: 5px 0; }
  .dashx-position-overdue { color: #a3483f; font-size: 12px; font-weight: 700; }

  .dashx-two-column {
    display: grid;
    gap: 14px;
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .dashx-reference-chip,
  .dashx-alert-chip,

    font-size: 11px;
    font-weight: 800;
    padding: 5px 9px;
    white-space: nowrap;
  }

  .dashx-reference-chip { background: #edf3f6; color: #4e6b79; }
  .dashx-alert-chip { background: #fbecea; color: #a64239; }
  .dashx-ok-chip { background: #e8f5f1; color: #146b59; }

  .dashx-capital-layout {
    display: grid;
    gap: 14px;
    grid-template-columns: minmax(0, 1.45fr) minmax(280px, 0.75fr);
  }

  .dashx-capital-summary {
    display: grid;
    gap: 12px;
  }

    gap: 9px;
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .dashx-shell .dashx-metric-card {
    align-items: flex-start;
    background: #fff;
    border: 1px solid var(--dashx-line);
    border-radius: 14px;
    color: var(--dashx-ink);

    flex-direction: column;
    margin: 0;
    min-height: 128px;
    padding: 14px;
    text-align: left;
    width: 100%;
  }

  .dashx-metric-card span { color: var(--dashx-muted); font-size: 11px; font-weight: 700; }
  .dashx-metric-card strong { font: 800 17px 'Manrope', sans-serif; margin: 6px 0; }
  .dashx-metric-card small { color: #7b8d96; font-size: 10px; line-height: 1.3; }

  .dashx-production-block {
    background: #fff;
    border: 1px solid var(--dashx-line);
    border-radius: 16px;
    padding: 16px;
  }

  .dashx-production-title {
    align-items: center;
    display: flex;
    justify-content: space-between;
    margin-bottom: 9px;
  }

  .dashx-status-list { display: grid; gap: 6px; }

  .dashx-shell .dashx-status-row {
    align-items: center;
    background: var(--dashx-soft);
    border: 1px solid transparent;
    border-radius: 9px;
    color: var(--dashx-ink);
    display: flex;
    font-size: 12px;
    justify-content: space-between;
    margin: 0;
    padding: 9px 10px;
    width: 100%;

    gap: 14px;
    grid-template-columns: minmax(0, 1.35fr) minmax(270px, 0.65fr);
  }

    align-items: center;
    display: flex;
    flex-direction: column;
    left: 36%;

    position: absolute;
    top: 50%;
    transform: translate(-50%, -50%);
    z-index: 2;
  }

  .dashx-donut-center span { color: var(--dashx-muted); font-size: 10px; }
  .dashx-donut-center strong { color: var(--dashx-ink); font: 800 15px 'Manrope', sans-serif; }

  .dashx-partner-summary {
    align-items: flex-start;
    background: linear-gradient(145deg, #f4f0fa, #fafbfd);
    border: 1px solid #e4dcef;
    border-radius: 18px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 24px;
  }

  .dashx-partner-summary > strong { color: #664f91; font: 800 28px 'Manrope', sans-serif; margin: 6px 0; }
  .dashx-partner-summary p { color: var(--dashx-muted); font-size: 12px; line-height: 1.45; }

  .dashx-shell .dashx-text-action {
    background: transparent;
    border: 0;
    color: #664f91;
    font-size: 12px;
    font-weight: 800;
    margin: 5px 0 0;
    padding: 5px 0;
    text-align: left;
    width: auto;
  }

  .dashx-quality {
    align-items: center;
    background: #fff8e9;
    border: 1px solid #eed8a5;
    border-radius: 13px;
    color: #70551d;
    display: flex;
    font-size: 12px;
    gap: 10px;
    padding: 11px 14px;
  }

  .dashx-quality strong { white-space: nowrap; }

  .dashx-error {
    background: #fff6f5;
    border: 1px solid #efc9c5;
    border-radius: 16px;
    color: #8a3f38;
    padding: 24px;
    text-align: center;
  }

  .dashx-error p { margin: 7px 0 14px; }
  .dashx-error button { margin: 0 auto; width: auto; }

  .dashx-detail-modal {
    max-height: min(82vh, 780px);
    max-width: 880px;
    overflow-y: auto;
    width: min(92vw, 880px);
  }

  .dashx-detail-summary {
    background: var(--dashx-soft, #f4f8f8);
    border: 1px solid #dce6e9;
    border-radius: 13px;
    display: grid;
    gap: 8px;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    margin: 12px 0 14px;
    padding: 13px;
  }

  .dashx-detail-summary > div { display: flex; flex-direction: column; gap: 3px; }
  .dashx-detail-summary span { color: #71858f; font-size: 11px; }
  .dashx-detail-summary strong { color: #20323d; font: 800 15px 'Manrope', sans-serif; }

  .dashx-detail-item {
    align-items: flex-start;
    border-bottom: 1px solid #e4ecee;
    display: flex;
    gap: 16px;
    justify-content: space-between;
