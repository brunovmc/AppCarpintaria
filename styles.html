<style>
  /* RESET BÃSICO */
  * {
    box-sizing: border-box;
  }

  :root {
    --app-body-padding: 16px;
  }

  body {
    font-family: sans-serif;
    margin: 0;
    padding: var(--app-body-padding);
    padding-bottom: 90px; /* espaÃ§o para bottom bar */
    background: #fafafa;
  }

  body.modal-open {
    overflow: hidden;
  }

  /* TIPOGRAFIA */
  h1,
  h2 {
    margin-top: 0;
  }

  /* BOTÃ•ES (GLOBAL) */
  button {
    padding: 12px;
    margin: 8px 0;
    width: 100%;
    border: 1px solid #ccc;
    background: #fff;
    border-radius: 6px;
    cursor: pointer;
  }

  button:active {
    background: #eee;
  }

  .loading-inline {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    line-height: 1;
  }

  .loading-label {
    display: inline-block;
  }

  .loading-dots {
    display: inline-flex;
    align-items: flex-end;
    justify-content: space-between;
    width: 14px;
  }

  .loading-dots > span {
    display: inline-block;
    opacity: 0.25;
    animation: loading-dot-wave 1s infinite ease-in-out;
  }

  .loading-dots > span:nth-child(2) {
    animation-delay: 0.16s;
  }

  .loading-dots > span:nth-child(3) {
    animation-delay: 0.32s;
  }

  @keyframes loading-dot-wave {
    0%,
    80%,
    100% {
      opacity: 0.25;
      transform: translateY(0);
    }
    40% {
      opacity: 1;
      transform: translateY(-1px);
    }
  }

  /* INPUTS */
  input,
  select,
  textarea {
    width: 100%;
    padding: 10px;
    margin-bottom: 8px;
    border-radius: 6px;
    border: 1px solid #ccc;
  }

  /* Rotulo de apoio no canto superior esquerdo do campo */
  .campo-ajuda-wrap {
    position: relative;
    margin-bottom: 8px;
  }

  .campo-ajuda-wrap > input,
  .campo-ajuda-wrap > select,
  .campo-ajuda-wrap > textarea {
    margin-bottom: 0;
    padding-top: 14px;
  }

  .campo-ajuda-tag {
    position: absolute;
    top: -7px;
    left: 10px;
    z-index: 1;
    pointer-events: none;
    font-size: 11.5px;
    line-height: 1;
    color: #666;
    background: var(--campo-ajuda-bg, #fafafa);
    padding: 0 6px;
    border-radius: 4px;
  }

  .sr-only {
    position: absolute !important;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border: 0;
  }

  .modal-content .campo-ajuda-tag,
  .card .campo-ajuda-tag,
  .receita-card .campo-ajuda-tag {
    --campo-ajuda-bg: #fff;
  }

  /* VISIBILIDADE */
  .hidden {
    display: none !important;
  }

  .app-access-denied {
    max-width: 520px;
    margin: 64px auto 20px;
    padding: 20px 18px;
    border: 1px solid #f0c3bf;
    border-radius: 12px;
    background: #fff6f5;
    color: #5b1d17;
    box-shadow: 0 12px 20px -20px rgba(0, 0, 0, 0.35);
  }

  .app-access-denied h1 {
    margin: 0 0 8px;
    font-size: 20.5px;
  }

  .app-access-denied p {
    margin: 8px 0;
    line-height: 1.45;
  }

  .app-access-denied-email {
    font-size: 13.5px;
    color: #7a2a21;
  }

  .app-access-denied-help {
    font-weight: 600;
  }

  /* NAVBAR SUPERIOR */
  .navbar {
    display: flex;
    align-items: stretch;
    justify-content: space-between;
    gap: 10px;
    margin: calc(-1 * var(--app-body-padding))
      calc(-1 * var(--app-body-padding)) 0;
    border-bottom: 1px solid #ddd;
    padding: 4px var(--app-body-padding) 0;
    background: #ffffff;
    box-shadow: 0 10px 10px -12px rgba(0, 0, 0, 0.45);
    position: sticky;
    top: 0;
    z-index: 10;
    margin-bottom: 15px;
  }

  .navbar button {
    width: auto;
    margin: 0;
    border: none;
    border-bottom: 2px solid transparent;
    border-radius: 0;
    background: transparent;
    color: #3c3c3c;
    font-weight: bold;
    padding: 12px 10px;
    transition:
      box-shadow 0.2s ease,
      color 0.2s ease,
      border-color 0.2s ease;
  }

  .navbar-menu-wrap {
    position: relative;
    display: flex;
    align-items: stretch;
  }

  .navbar-hamburger {
    min-width: 68px;
    font-size: 16.5px;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    white-space: nowrap;
  }

  .navbar-hamburger-icon {
    font-size: 18.5px;
    line-height: 1;
  }

  .navbar-hamburger-label {
    font-size: 12.5px;
    line-height: 1;
    letter-spacing: 0.02em;
  }

  .navbar-menu {
    position: absolute;
    top: calc(100% + 6px);
    right: 0;
    min-width: 210px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    padding: 6px;
    border: 1px solid #ddd;
    border-radius: 8px;
    background: #fff;
    box-shadow: 0 10px 18px rgba(0, 0, 0, 0.12);
    z-index: 15;
  }

  .navbar-menu button {
    width: 100%;
    text-align: left;
    border: none;
    border-bottom: none;
    border-radius: 6px;
    padding: 10px 12px;
    box-shadow: none;
  }

  .navbar .navbar-menu button.active {
    background: #111;
    color: #fff;
    border-bottom-color: transparent;
    box-shadow: none;
  }

  .navbar .navbar-menu button:focus-visible {
    outline: 2px solid #4a79ff;
    outline-offset: 1px;
    border-bottom-color: transparent;
    box-shadow: none;
  }

  .navbar button.active {
    background: transparent;
    border-bottom-color: #111;
    color: #111;
    box-shadow: 0 10px 10px -12px rgba(0, 0, 0, 0.7);
  }

  .navbar button:focus-visible {
    outline: none;
    border-bottom-color: #4a79ff;
    box-shadow: 0 10px 10px -12px rgba(74, 121, 255, 0.85);
  }

  .app-sync-banner {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: -8px 0 10px;
    padding: 7px 12px;
    border: 1px solid #d7e4ff;
    border-radius: 999px;
    background: #f3f7ff;
    color: #2a4577;
    font-size: 12.5px;
    line-height: 1;
  }

  .app-sync-dot {
    width: 8px;
    height: 8px;
    border-radius: 999px;
    background: #4a79ff;
    box-shadow: 0 0 0 0 rgba(74, 121, 255, 0.45);
    animation: app-sync-pulse 1.2s infinite ease-out;
  }

  @keyframes app-sync-pulse {
    0% {
      box-shadow: 0 0 0 0 rgba(74, 121, 255, 0.45);
    }
    100% {
      box-shadow: 0 0 0 8px rgba(74, 121, 255, 0);
    }
  }

  /* BARRA DE BUSCA */
  .top-bar {
    display: flex;
    gap: 8px;
    margin: 16px 0;
  }

  .top-bar input {
    margin-bottom: 0;
  }

  .top-bar button {
    width: auto;
    margin: 0;
  }

  .dashboard-toolbar {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    margin: 0 0 12px;
  }

  .dashboard-mes-wrap {
    flex: 1;
    margin-bottom: 0;
  }

  .dashboard-btn-inline {
    width: auto;
    margin: 0;
    white-space: nowrap;
  }

  .dashboard-statusbar {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 8px;
    margin: -4px 0 12px;
  }

  .dashboard-status-text {
    font-size: 12.5px;
    color: #666;
  }

  .dashboard-readonly {
    font-size: 12.5px;
    color: #8a1f11;
    background: #fff2ef;
    border: 1px solid #ffd7cf;
    border-radius: 999px;
    padding: 4px 10px;
  }

  .dash-cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 8px;
    margin-bottom: 12px;
  }

  .dash-card {
    border: 1px solid #ddd;
    border-radius: 8px;
    background: #fff;
    padding: 10px;
  }

  .dash-card-click {
    cursor: pointer;
    transition:
      border-color 0.2s ease,
      box-shadow 0.2s ease;
  }

  .dash-card-click:hover {
    border-color: #bbb;
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
  }

  .dash-card-click:focus-visible {
    outline: 2px solid #4a79ff;
    outline-offset: 1px;
  }

  .dash-card-label {
    font-size: 11.5px;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .dash-card-valor {
    font-size: 18.5px;
    font-weight: 700;
    margin-top: 6px;
  }

  .dash-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
    margin-bottom: 12px;
  }

  @media (min-width: 880px) {
    .dash-grid {
      grid-template-columns: 1fr 1fr;
    }

    .dash-card-wide {
      grid-column: 1 / -1;
    }
  }

  .dash-lista {
    margin-top: 10px;
  }

  .dash-lista-linha {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    padding: 6px 0;
    border-bottom: 1px solid #f0f0f0;
    font-size: 13.5px;
  }

  .dash-lista-linha:last-child {
    border-bottom: none;
  }

  .dash-empty {
    margin: 8px 0 0;
    color: #666;
    font-size: 13.5px;
  }

  .producao-mini-dashboard {
    margin: 0 0 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .producao-mini-dashboard-head {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 8px;
  }

  .producao-mini-dashboard-card {
    border: 1px solid #ddd;
    border-radius: 8px;
    background: #fff;
    padding: 10px;
  }

  .producao-mini-dashboard-card-placeholder {
    background: #fbfbfb;
  }

  .producao-mini-dashboard-label {
    font-size: 11.5px;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }

  .producao-mini-dashboard-valor {
    margin-top: 6px;
    font-size: 18.5px;
    font-weight: 700;
  }

  .producao-mini-dashboard-sub {
    margin-top: 4px;
    font-size: 12.5px;
    color: #666;
  }

  .producao-mini-dashboard-categorias {
    border: 1px solid #ddd;
    border-radius: 8px;
    background: #fff;
    padding: 10px;
  }

  .producao-mini-dashboard-titulo {
    font-size: 12.5px;
    font-weight: 600;
    margin: 0 0 6px;
  }

  .producao-mini-dashboard-linha {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    padding: 6px 0;
    border-bottom: 1px solid #f0f0f0;
    font-size: 13.5px;
  }

  .producao-mini-dashboard-linha:last-child {
    border-bottom: none;
  }

  .producao-mini-dashboard-empty {
    margin: 6px 0 0;
    font-size: 13.5px;
    color: #666;
  }

  .dash-modal-observabilidade {
    max-width: 760px;
    max-height: calc(100vh - 32px);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .dash-obs-header {
    display: flex;
    align-items: center;
    justify-content: flex-start;
    gap: 8px;
    padding-right: 44px;
  }

  .dash-obs-fechar-topo {
    padding: 8px 12px;
  }

  .dash-obs-resumo {
    margin-top: 8px;
    padding: 8px;
    border: 1px solid #efefef;
    border-radius: 6px;
    background: #fafafa;
    font-size: 13.5px;
    display: grid;
    gap: 4px;
  }

  .dash-obs-lista {
    margin-top: 10px;
    overflow: auto;
    border-top: 1px solid #efefef;
    border-bottom: 1px solid #efefef;
    padding: 4px 0;
    flex: 1;
    min-height: 120px;
  }

  .dash-obs-item {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 2px;
    border-bottom: 1px solid #f1f1f1;
  }

  .dash-obs-item:last-child {
    border-bottom: none;
  }

  .dash-obs-item-main {
    flex: 1;
    min-width: 0;
  }

  .dash-obs-item-titulo {
    font-size: 14.5px;
    font-weight: 600;
  }

  .dash-obs-item-detalhe {
    margin-top: 4px;
    font-size: 12.5px;
    color: #666;
    line-height: 1.4;
  }

  .dash-obs-item-right {
    min-width: 170px;
    text-align: right;
  }

  .dash-obs-item-valor {
    font-size: 14.5px;
    font-weight: 700;
  }

  .dash-obs-item-acoes {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: flex-end;
    margin-top: 6px;
  }

  .dash-obs-item-acoes button {
    width: auto;
    margin: 0;
    padding: 6px 8px;
    font-size: 12.5px;
  }

  @media (max-width: 720px) {
    .dash-obs-item {
      flex-direction: column;
    }

    .dash-obs-item-right {
      width: 100%;
      min-width: 0;
      text-align: left;
    }

    .dash-obs-item-acoes {
      justify-content: flex-start;
    }
  }

  .dash-despesa-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
  }

  .dash-despesa-acoes {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .dash-despesa-form-titulo {
    display: block;
    margin: 0 0 12px;
    line-height: 1.2;
  }

  .despesas-resumo-linha {
    margin: 6px 0 10px;
    padding: 8px 10px;
    border: 1px solid #e4e6eb;
    border-radius: 8px;
    background: #f8fafc;
    font-size: 12.5px;
    color: #4b5563;
    line-height: 1.35;
  }

  .despesas-filtros {
    margin: 0 0 12px;
    padding: 10px;
    border: 1px solid #e4e6eb;
    border-radius: 8px;
    background: #fbfcfe;
    box-shadow: 0 8px 16px -20px rgba(0, 0, 0, 0.35);
  }

  .despesas-filtros-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 8px;
    margin-bottom: 8px;
  }

  .despesas-filtros .campo-ajuda-wrap {
    margin-bottom: 0;
  }

  .despesas-filtros button {
    width: auto;
    margin: 0;
    min-width: 140px;
  }

  .top-bar button.active {
    border-color: #3d6ce0;
    background: #edf3ff;
    color: #2d4ca8;
  }

  .despesa-card {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .despesa-card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
  }

  .despesa-card-nome {
    font-size: 15.5px;
    line-height: 1.25;
    word-break: break-word;
  }

  .despesa-status-badge {
    border: 1px solid transparent;
    border-radius: 999px;
    padding: 3px 8px;
    font-size: 11.5px;
    font-weight: 700;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .despesa-status-vencido {
    border-color: #f8c4c4;
    background: #fff2f2;
    color: #9c1c1c;
  }

  .despesa-status-pendente {
    border-color: #f7d59b;
    background: #fff8eb;
    color: #8b5e00;
  }

  .despesa-status-parcial {
    border-color: #b7d6ff;
    background: #edf5ff;
    color: #1e4f96;
  }

  .despesa-status-pago {
    border-color: #bde7c2;
    background: #eefbf1;
    color: #1d6b2a;
  }

  .despesa-card-meta {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 6px 10px;
    font-size: 13.5px;
  }

  .despesa-card-meta-area {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 10px;
  }

  .despesa-card-meta-area .despesa-card-meta {
    flex: 1 1 auto;
    min-width: 0;
  }

  .despesa-acoes-laterais {
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex: 0 0 auto;
  }

  .despesa-acoes-laterais button {
    width: auto;
    margin: 0;
    padding: 6px 10px;
    font-size: 12.5px;
    line-height: 1;
    white-space: nowrap;
  }

  .despesa-meta-item {
    color: #4b5563;
    overflow-wrap: anywhere;
  }

  .despesa-meta-item strong {
    color: #111827;
  }

  .despesa-card-valores {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 8px;
  }

  .despesa-valor-box {
    border: 1px solid #e5e7eb;
    border-radius: 8px;
    padding: 8px;
    background: #fff;
  }

  .despesa-valor-box span {
    display: block;
    font-size: 11.5px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #6b7280;
    margin-bottom: 4px;
  }

  .despesa-valor-topo {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 4px;
  }

  .despesa-valor-topo span {
    margin-bottom: 0;
  }

  .despesa-btn-inline {
    width: auto;
    margin: 0;
    padding: 5px 9px;
    font-size: 11.5px;
    line-height: 1;
    white-space: nowrap;
  }

  .despesa-valor-box strong {
    font-size: 16.5px;
    line-height: 1.1;
  }

  .despesa-valor-pendente strong {
    color: #b45309;
  }

  .despesa-valor-pago strong {
    color: #1d4ed8;
  }

  .despesa-card-extra {
    font-size: 12.5px;
    color: #6b7280;
  }

  .despesa-card .acoes {
    margin-top: 2px;
  }

  #formularioDespesaGeral > .campo-ajuda-wrap:first-of-type {
    margin-top: 2px;
  }

  .dash-fixo-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 6px;
    background: #fff;

  }

  .dash-fixo-toggle input[type="checkbox"] {
    width: 18px;
    height: 18px;
    margin: 0;
  }

  .parcelas-detalhe-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 8px;
  }

  .parcela-detalhe-linha {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .parcela-detalhe-num {
    font-size: 12.5px;
    min-width: 24px;
    color: #666;
  }

  .parcela-detalhe-linha input {
    margin-bottom: 0;
  }

  .tipo-filtro-linha {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    overflow: hidden;
    margin: -6px 0 12px 0;
    padding-bottom: 2px;
  }

  .tipo-filtro-linha button {
    width: auto;
    margin: 0;
    padding: 8px 12px;
    border-radius: 999px;
    font-size: 13.5px;
    line-height: 1;
    white-space: nowrap;
    flex: 0 0 auto;
  }

  .tipo-filtro-linha button.ativo {
    background: #111;
    border-color: #111;
    color: #fff;
  }

  .lista-controles {
    display: flex;
    justify-content: center;
    margin: 8px 0 14px 0;
  }

  .btn-carregar-mais {
    width: auto;
    min-width: 160px;
  }

  @media (max-width: 760px) {
    .despesa-card-meta-area {
      flex-direction: column;
    }

    .despesa-acoes-laterais {
      flex-direction: row;
      flex-wrap: wrap;
    }

    .despesas-filtros-grid {
      grid-template-columns: 1fr;
    }

    .despesa-card-meta {
      grid-template-columns: 1fr;
    }
  }

  @media (max-width: 560px) {
    .despesa-card-header {
      flex-direction: column;
      align-items: flex-start;
    }

    .despesa-card-valores {
      grid-template-columns: 1fr;
    }

    .despesa-valor-topo {
      flex-direction: column;
      align-items: flex-start;
    }

    .despesa-acoes-laterais {
      width: 100%;
      flex-direction: column;
    }

    .despesa-acoes-laterais button {
      width: 100%;
    }
  }

  /* CONTEÃšDO DAS ABAS */
  .aba {
    margin-top: 8px;
  }

  /* BARRA INFERIOR */
  .bottom-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 12px;
    background: #fff;

    overflow: hidden;
    max-height: 0;
    opacity: 0;
    transition: opacity 0.2s ease;
  }

  .card.aberto .card-detalhes {
    max-height: 9999px; /* suficiente para conteÃºdo */

    overflow: visible;

  .modal {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 16px;
    overscroll-behavior: contain;
    touch-action: manipulation;
  }

  .modal-content {
    background: #fff;
    border-radius: 8px;
    padding: 16px;
    width: 100%;
    max-width: 520px;
    position: relative;
    max-height: calc(100vh - 32px);
    max-height: calc(100dvh - 32px);
    overflow-y: auto;
    overscroll-behavior: contain;
    -webkit-overflow-scrolling: touch;
  }

  #modalDetalhesEstoque .modal-content,
  #modalDetalhesCompras .modal-content,
  #modalDetalhesVendas .modal-content,
  #modalDetalhesProdutos .modal-content,
  #modalDetalhesProducao .modal-content {
    max-width: 920px;
  }

  .modal-close-square {
    position: absolute;
    top: 8px;
    right: 8px;
    width: 32px;
    height: 32px;
    margin: 0;
    padding: 0;
    border: 1px solid #c8c8c8;
    border-radius: 4px;
    background: #fff;
    color: #333;
    font-size: 16.5px;
    font-weight: 700;
    line-height: 1;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 2;
  }

  .modal-close-square:active {
    background: #f3f3f3;
  }

  .modal-content > h2,
  .modal-content > h3,
  .modal-content > strong {
    padding-right: 44px;
  }

  .form-modal-content {
    max-width: 920px;
    max-height: calc(100vh - 32px);
    max-height: calc(100dvh - 32px);
    overflow-y: auto;
    overscroll-behavior: contain;
    -webkit-overflow-scrolling: touch;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%) translateZ(0);
    will-change: opacity;

    background: #333;
    color: #fff;
    padding: 10px 16px;
    border-radius: 8px;
    font-size: 14.5px;

    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
    z-index: 9999;
  }

  .toast.show {
    opacity: 1;
    overflow: visible;
    transform: translateX(-50%) translateY(-8px);
  }

  .toast.erro {
    background: #c0392b;
  }

  /* ========================= */
  /* VISUAL REFRESH V0.5.6     */
  /* ========================= */
  :root {
    --app-body-padding: 18px;

    --font-title: "Manrope", "Segoe UI", sans-serif;
    --font-body: "Source Sans 3", "Trebuchet MS", sans-serif;

    --color-bg: #f3eee3;
    --color-bg-alt: #ece3d3;
    --color-surface: #ffffff;
    --color-surface-soft: #faf7f0;
    --color-line: #d8cfbd;
    --color-line-strong: #bcae95;

    --color-text: #2b2721;
    --color-text-soft: #6c6559;

    --color-brand: #3c5f78;
    --color-brand-strong: #2f4b61;
    --color-brand-soft: #e6eff6;

    --color-danger: #9e433b;
    --color-danger-soft: #fff0ee;

    --radius-xs: 8px;
    --radius-sm: 10px;
    --radius-md: 14px;
    --radius-lg: 18px;

    --shadow-soft: 0 8px 18px -14px rgba(28, 23, 15, 0.45);
    --shadow-card: 0 10px 26px -18px rgba(34, 28, 20, 0.52);
    --shadow-hover: 0 16px 30px -20px rgba(32, 26, 19, 0.62);

    --transition-fast: 0.16s ease;
    --transition-mid: 0.24s ease;
  }

  html,
  body {
    min-height: 100%;
  }

  body {
    font-family: var(--font-body);
    color: var(--color-text);
    background:
      radial-gradient(
        1200px 520px at -6% -8%,
        rgba(60, 95, 120, 0.16) 0%,
        transparent 58%
      ),
      radial-gradient(
        980px 450px at 100% -20%,
        rgba(181, 152, 101, 0.2) 0%,
        transparent 62%
      ),
      linear-gradient(180deg, var(--color-bg) 0%, var(--color-bg-alt) 100%);
    letter-spacing: 0.01em;
  }

  h1,
  h2,
  h3,
  strong {
    font-family: var(--font-title);
    color: var(--color-text);
    letter-spacing: 0.01em;
  }

  button,
  input,
  select,
  textarea {
    font-family: var(--font-body);
  }

  button {
    border: 1px solid var(--color-line);
    border-radius: var(--radius-sm);
    background: var(--color-surface);
    color: var(--color-text);
    font-weight: 600;
    box-shadow: var(--shadow-soft);
    transition:
      transform var(--transition-fast),
      box-shadow var(--transition-mid),
      border-color var(--transition-mid),
      background-color var(--transition-mid),
      color var(--transition-mid);
  }

  button:hover {
    border-color: var(--color-line-strong);
    box-shadow: var(--shadow-card);
    transform: translateY(-1px);
  }

  button:active {
    transform: translateY(0);
    background: var(--color-surface-soft);
    box-shadow: var(--shadow-soft);
  }

  button:disabled {
    opacity: 0.56;
    cursor: not-allowed;
    box-shadow: none;
    transform: none;
  }

  input,
  select,
  textarea {
    border-color: var(--color-line);
    border-radius: var(--radius-sm);
    background: var(--color-surface);
    color: var(--color-text);
    transition:
      border-color var(--transition-mid),
      box-shadow var(--transition-mid),
      background-color var(--transition-mid);
  }

  input::placeholder,
  textarea::placeholder {
    color: var(--color-text-soft);
  }

  input:focus,
  select:focus,
  textarea:focus {
    outline: none;
    border-color: var(--color-brand);
    box-shadow: 0 0 0 3px rgba(60, 95, 120, 0.18);
  }

  :focus-visible {
    outline: 2px solid rgba(60, 95, 120, 0.44);
    outline-offset: 1px;
  }

  .campo-ajuda-tag {
    color: var(--color-text-soft);

  .navbar button {
