<script>
  window.VendasController = (() => {
    let iniciado = false;
    let editandoId = null;
    let salvando = false;
    let mutationLockToken = null;
    let mutationLockTokenRecebimento = null;
    let recebimentoVendaId = null;
    let salvandoRecebimento = false;
    let contextoNovaVendaRecebimento = null;
    let listenerMutacoesRegistrado = false;
    let vendasLoadSeq = 0;
    let estoqueVendavelLoadSeq = 0;

    let validacoes = {};

    function parseNumeroInput(valor) {
      if (window.AppDomainUtils?.parseNumeroZero) {
        return window.AppDomainUtils.parseNumeroZero(valor);
      }
      const s = String(valor ?? '').trim();
      if (!s) return 0;
      const n = Number(s.replace(',', '.'));
      return isNaN(n) ? 0 : n;
    }

    function invalidarCacheDashboardPorImpacto() {
      if (window.AppTabRefresh?.markDirty) {
        window.AppTabRefresh.markDirty('dashboard');
        window.AppTabRefresh.markDirty('estoque');
      }
      const dash = window.DashboardController;
      if (!dash?.invalidarCacheMeses) return;
      const refs = dash.coletarMesesImpactados ? dash.coletarMesesImpactados(...arguments) : [];
      dash.invalidarCacheMeses(refs);
      if (window.AppTabRefresh?.requestSync) {
        window.AppTabRefresh.requestSync('dashboard', {
          delayMs: 420,
          prefetch: true
        });
      }
    }

    function podeAlterarDados(contexto = 'Operacao') {
      if (window.AppDomainUtils?.ensureWritable) {
        return window.AppDomainUtils.ensureWritable(contexto);
      }
      return !!window.AppRuntime?.ensureWritable
        ? window.AppRuntime.ensureWritable(contexto)
        : true;
    }

    function setSalvando(ativo) {
      salvando = !!ativo;
      if (window.AppMutationUI?.lock && window.AppMutationUI?.unlock) {
        if (salvando) {
          if (!mutationLockToken) {
            mutationLockToken = window.AppMutationUI.lock();
          }
        } else if (mutationLockToken) {
          window.AppMutationUI.unlock(mutationLockToken);
          mutationLockToken = null;
        }
      }
      const btn = document.getElementById('btnSalvarVenda');
      if (!btn) return;
      btn.disabled = salvando;
      if (window.AppLoading?.setButtonLoading) {
        window.AppLoading.setButtonLoading(btn, salvando, 'Salvar', 'Salvando');
      } else {
        btn.textContent = salvando ? 'Salvando...' : 'Salvar';
      }
    }

    function setBloqueioMutacaoRecebimento(ativo) {
      if (!window.AppMutationUI?.lock || !window.AppMutationUI?.unlock) return;
      if (ativo) {
        if (!mutationLockTokenRecebimento) {
          mutationLockTokenRecebimento = window.AppMutationUI.lock();
        }
        return;
      }
      if (!mutationLockTokenRecebimento) return;
      window.AppMutationUI.unlock(mutationLockTokenRecebimento);
      mutationLockTokenRecebimento = null;
    }

    function reabrirFormularioAposErro(dados, opcoes = {}) {
      const payload = dados ? { ...dados } : {};
      const editando = !!opcoes.editando;
      editandoId = editando ? String(opcoes.id || '') : null;
      VendasUI.preencherFormulario(payload, contextoNovaVendaRecebimento ? {
        nova: true,
        titulo: 'Nova venda a partir do recebimento'
      } : {});
      VendasUI.mostrarFormulario();
    }

    function getVendaUiState(item) {
      if (!window.AppEntityMutations?.getUiState) {
        return {
          status: '',
          action: '',
          label: '',
          message: '',
          canRetry: false,
          blockActions: false
        };
      }
      return window.AppEntityMutations.getUiState(item, {
        pendingLabels: {
          delete: 'Exclusao pendente',
          receive: 'Recebimento pendente'
        },
        errorLabels: {
          delete: 'Falha ao excluir',
          receive: 'Falha no recebimento'
        }
      });
    }

    function limparVendaMeta(item) {
      return window.AppEntityMutations?.limparMeta
        ? window.AppEntityMutations.limparMeta(item)
        : { ...(item || {}) };
    }

    function buildVendaOptimistic(payload, options = {}) {
      const base = limparVendaMeta(options.baseItem);
      const id = String(options.id || base.ID || '').trim() || `tmp_${Date.now()}`;
      const estoqueInfo = window.EstoqueStore?.getById?.(payload?.estoque_id) || {};
      const quantidade = Number((payload?.quantidade ?? base.quantidade) || 0);
      const totalVenda = Number((payload?.valor_total_venda ?? base.valor_total_venda) || 0);

      if (window.AppDespesaMutations?.buildFromPayload) {
        const financeiro = window.AppDespesaMutations.buildFromPayload({
          ...payload,
          ID: id,
          valor_total: totalVenda
        }, {
          baseItem: {
            ...base,
            ID: id,
            valor_total: Number((base?.total_previsto ?? base?.valor_total_venda) || 0)
          },
          id
        });
        return {
          ...base,
          ...payload,
          ID: id,
          item: String(base?.item || estoqueInfo?.item || '').trim(),
          unidade: String(base?.unidade || estoqueInfo?.unidade || '').trim(),
          nome_produto: String(base?.nome_produto || estoqueInfo?.item || '').trim(),
          valor_unit_venda: quantidade > 0 ? Number((totalVenda / quantidade).toFixed(6)) : Number(base?.valor_unit_venda || 0),
          valor_total_venda: totalVenda,
          total_previsto: financeiro.total_previsto,
          total_pago: financeiro.total_pago,
          total_pendente: financeiro.total_pendente,
          status_pagamento: financeiro.status_pagamento,
          parcelas: financeiro.parcelas,
          parcelas_detalhe: financeiro.parcelas_detalhe,
          data_pagamento: financeiro.data_pagamento,
          forma_pagamento: financeiro.forma_pagamento,
          forma_pagamento_padrao: financeiro.forma_pagamento_padrao,
          quantidade_pagamentos: financeiro.quantidade_pagamentos,
          data_ultimo_pagamento: financeiro.data_ultimo_pagamento,
          forma_ultimo_pagamento: financeiro.forma_ultimo_pagamento
        };
      }

      const totalPago = Number(base?.total_pago || 0);
      return {
        ...base,
        ...payload,
        ID: id,
        item: String(base?.item || estoqueInfo?.item || '').trim(),
        unidade: String(base?.unidade || estoqueInfo?.unidade || '').trim(),
        nome_produto: String(base?.nome_produto || estoqueInfo?.item || '').trim(),
        valor_unit_venda: quantidade > 0 ? Number((totalVenda / quantidade).toFixed(6)) : Number(base?.valor_unit_venda || 0),
        valor_total_venda: totalVenda,
        total_previsto: totalVenda,
        total_pago: totalPago,
        total_pendente: Math.max(0, totalVenda - totalPago),
        status_pagamento: totalPago > 0 ? 'PARCIAL' : 'PENDENTE'
      };
    }

    function applyRecebimentoVenda(item, payload) {
      const base = limparVendaMeta(item);
      if (window.AppDespesaMutations?.applyPayment) {
        const atualizado = window.AppDespesaMutations.applyPayment({
          ...base,
          valor_total: Number((base?.total_previsto ?? base?.valor_total_venda) || 0)
        }, payload);
        return {
          ...base,
          data_pagamento: atualizado.data_pagamento,
          forma_pagamento: atualizado.forma_pagamento,
          forma_pagamento_padrao: atualizado.forma_pagamento_padrao,
          total_previsto: atualizado.total_previsto,
          total_pago: atualizado.total_pago,
          total_pendente: atualizado.total_pendente,
          status_pagamento: atualizado.status_pagamento,
          quantidade_pagamentos: atualizado.quantidade_pagamentos,
          data_ultimo_pagamento: atualizado.data_ultimo_pagamento,
          forma_ultimo_pagamento: atualizado.forma_ultimo_pagamento,
          parcelas_detalhe: atualizado.parcelas_detalhe
        };
      }

      const totalPrevisto = Number(base?.total_previsto || 0);
      const totalPago = Math.min(totalPrevisto, Number(base?.total_pago || 0) + Number(payload?.valor_pago || 0));
      return {
        ...base,
        total_pago: totalPago,
        total_pendente: Math.max(0, totalPrevisto - totalPago),
        status_pagamento: totalPago >= totalPrevisto ? 'PAGO' : 'PARCIAL',
        data_pagamento: String(payload?.data_pagamento || '').trim() || base?.data_pagamento || '',
        forma_pagamento: String(payload?.forma_pagamento || '').trim() || base?.forma_pagamento || ''
      };
    }

    function resolveVendaSuccessItem(entry, detail, helpers = {}) {
      const limparMeta = helpers?.limparMeta || (valor => valor);
      const meta = entry?.meta || {};
      const result = detail?.result || {};
      const optimisticItem = limparMeta(meta.optimistic_item);
      const beforeItem = limparMeta(meta.before_item);
      const action = String(meta.action || '').trim().toLowerCase();

      if (action === 'receive' && result?.vendaAtualizada?.ID) {
        return limparMeta(result.vendaAtualizada);
      }
      if (result?.ID) {
        return limparMeta(result);
      }
      return optimisticItem || beforeItem;
    }

    function listarMutacoesVendaAtivas() {
      if (!window.AppOptimistic?.list) return [];
      return window.AppOptimistic.list({
        scope: 'venda',
        domain: 'venda'
      });
    }

    function reconciliarListaVendasComMutacoes(listaBase) {
      if (!window.AppEntityMutations?.mergeFetchedList) {
        return Array.isArray(listaBase) ? [...listaBase] : [];
      }
      return window.AppEntityMutations.mergeFetchedList(listaBase, listarMutacoesVendaAtivas(), {
        domain: 'venda',
        idKey: 'ID',
        resolveSuccessItem: resolveVendaSuccessItem
      });
    }

    function persistirEReRenderizarVendas(lista, onDone) {
      let alterou = false;
      if (Array.isArray(lista)) {
        alterou = VendasStore.set(lista) !== false;
      }
      if (!alterou && VendasStore.isLoaded()) {
        if (typeof onDone === 'function') onDone();
        return false;
      }
      if (window.AppTabRefresh?.shouldRender?.('vendas') === false) {
        window.AppTabRefresh?.markRenderPending?.('vendas');
        if (typeof onDone === 'function') onDone();
        return true;
      }
      renderListaAtual(() => {
        window.AppTabRefresh?.notifyRendered?.('vendas', { changed: true });
        if (typeof onDone === 'function') onDone();
      });
      return true;
    }

    function agendarSyncSilenciosoVendas(detail) {
      const action = String(detail?.entry?.meta?.action || '').trim().toLowerCase();
      if (window.AppTabRefresh?.requestSync) {
        window.AppTabRefresh.requestSync('vendas', {
          delayMs: 900,
          prefetch: true
        });
        if (action === 'receive') {
          window.AppTabRefresh.requestSync('estoque', {
            delayMs: 980,
            prefetch: true
          });
        }
      } else {
        setTimeout(() => carregarVendas(true), 900);
        if (action === 'receive' && window.EstoqueController?.syncFromBackend) {
          setTimeout(() => {
            window.EstoqueController.syncFromBackend();
          }, 980);
        }
      }

      setTimeout(() => {
        carregarEstoqueVendavel();
      }, 640);
    }

    function tratarEventoMutacaoVenda(detail) {
      const entry = detail?.entry;
      if (!entry || String(entry.scope || '').trim() !== 'venda') return;
      if (String(entry?.meta?.domain || '').trim() !== 'venda') return;
      if (!window.AppEntityMutations?.applyEntryToList) return;

      const atualizada = window.AppEntityMutations.applyEntryToList(VendasStore.get(), detail, {
        domain: 'venda',
        idKey: 'ID',
        resolveSuccessItem: resolveVendaSuccessItem
      });
      persistirEReRenderizarVendas(atualizada);

      if (String(detail?.type || '').trim().toLowerCase() === 'success') {
        const result = detail?.result || {};
        if (result?.baixaEstoque?.estoqueAtualizado && window.EstoqueStore) {
          const estoqueAtualizado = result.baixaEstoque.estoqueAtualizado;
          const atual = window.EstoqueStore.getById?.(estoqueAtualizado.ID);
          if (atual) {
            window.EstoqueStore.update(estoqueAtualizado.ID, estoqueAtualizado);
          } else {
            window.EstoqueStore.add(estoqueAtualizado);
          }
          if (typeof window.aplicarBuscaEstoque === 'function') {
            window.aplicarBuscaEstoque();
          } else if (window.EstoqueUI?.renderLista) {
            window.EstoqueUI.renderLista(window.EstoqueStore.get());
          }
        }
        invalidarCacheDashboardPorImpacto(entry?.meta?.before_item, entry?.payload, result?.vendaAtualizada || result);
        agendarSyncSilenciosoVendas(detail);
        return;
      }

      if (String(detail?.type || '').trim().toLowerCase() === 'error'
        && String(entry?.meta?.source || '').trim() === 'vendas') {
        mostrarToast(`${detail?.errorMessage || 'Falha ao sincronizar venda'}. Use "Tentar novamente".`, 'erro');
      }
    }

    function registrarListenerMutacoesSeNecessario() {
      if (listenerMutacoesRegistrado) return;
      if (typeof window === 'undefined' || typeof window.addEventListener !== 'function') return;
      window.addEventListener('app:optimistic-mutation', evento => {
        tratarEventoMutacaoVenda(evento?.detail || {});
      });
      listenerMutacoesRegistrado = true;
    }

    function retryVendaMutation(id) {
      const item = VendasStore.getById(String(id || '').trim());
      const mutationId = String(item?._localMutationId || '').trim();
      if (!mutationId || !window.AppOptimistic?.retry) {
        mostrarToast('Nao ha sincronizacao pendente para reenviar', 'erro');
        return;
      }
      window.AppOptimistic.retry(mutationId);
      mostrarToast('Tentando sincronizar novamente...');
    }

    function initOrdenacao() {
      window.AppListOrderUI?.mount?.({
        containerId: 'ordenacaoVendas',
        domain: 'vendas',
        adapter: VendasStore,
        onChange: renderListaAtual
      });
    }

    function init() {
      if (iniciado) return;
      registrarListenerMutacoesSeNecessario();
      window.AppOptimistic?.process?.();
      initOrdenacao();
      carregarValidacoes();
      carregarEstoqueVendavel();
      carregarVendas();
      window.VendasRecebimentosController?.init?.();
      iniciado = true;
    }

    function carregarValidacoes() {
      const loader = window.AppValidacoes?.get
        ? window.AppValidacoes.get({ maxAgeMs: 1000 * 60 * 60 * 12 })
        : Promise.reject(new Error('cache de validacoes indisponivel'));

      loader
        .then(({ data }) => {
          validacoes = data || {};
          validacoes.pagosPor ||= [];
          validacoes.formasPagamento ||= [];

          VendasUI.renderRecebidosPor?.(validacoes.pagosPor);
          VendasUI.renderFormasPagamento?.(validacoes.formasPagamento);
          window.VendasRecebimentosController?.setValidacoes?.(validacoes);
        })
        .catch(() => {
          validacoes = {};
        });
    }

    function carregarEstoqueVendavel(onDone, ambiente = '') {
      const seq = ++estoqueVendavelLoadSeq;
      const ambienteSolicitado = String(
        ambiente || window.AppClientScope?.get?.()?.environment || 'prod'
      ).trim().toLowerCase();
      window.AppRequest.runner()
        .withSuccessHandler(lista => {
          if (seq !== estoqueVendavelLoadSeq) {
            if (typeof onDone === 'function') onDone('superseded');
            return;
          }
          VendasUI.renderEstoqueVendavel?.(Array.isArray(lista) ? lista : []);
          if (typeof onDone === 'function') onDone(true);
        })
        .withFailureHandler(() => {
          if (seq !== estoqueVendavelLoadSeq) {
            if (typeof onDone === 'function') onDone('superseded');
            return;
          }
          VendasUI.renderEstoqueVendavel?.([]);
          if (typeof onDone === 'function') onDone(false);
        })
        .listarItensEstoqueVendaveis(ambienteSolicitado);
    }

    function renderListaAtual(onDone) {
      if (window.aplicarBuscaVendas) {
        aplicarBuscaVendas(onDone);
        return;
      }
      VendasUI.renderLista(VendasStore.get(), onDone);
    }

    function hidratarVendasDoCache() {
      const listaCache = window.AppTabCache?.ler?.('vendas');
      if (!Array.isArray(listaCache)) return false;
      persistirEReRenderizarVendas(reconciliarListaVendasComMutacoes(listaCache));
      return true;
    }

    function carregarVendas(forcarRecarregar = false, onDone, ambiente = '', options = {}) {
      const seq = ++vendasLoadSeq;
      const ambienteSolicitado = String(
        ambiente || window.AppClientScope?.get?.()?.environment || 'prod'
      ).trim().toLowerCase();
      const dirtyGeneration = window.AppTabRefresh?.getDirtyGeneration?.('vendas') || 0;
      const exibindoCache = !forcarRecarregar && options.hydrate !== false && hidratarVendasDoCache();
      window.AppRequest.runner()
        .withSuccessHandler(lista => {
          if (seq !== vendasLoadSeq) {
            if (typeof onDone === 'function') onDone('superseded');
            return;
          }
          if (window.AppRuntime?.setReadOnly) {
            window.AppRuntime.setReadOnly(false);
          }
          window.AppTabRefresh?.reportResult?.('vendas', true, dirtyGeneration);
          persistirEReRenderizarVendas(reconciliarListaVendasComMutacoes(lista), () => {
            if (typeof onDone === 'function') onDone(true);
          });
        })
        .withFailureHandler(err => {
          if (seq !== vendasLoadSeq) {
            if (typeof onDone === 'function') onDone('superseded');
            return;
          }
          window.AppTabRefresh?.reportResult?.('vendas', false, dirtyGeneration);
          if (exibindoCache) {
            if (window.AppRuntime?.setReadOnly) {
              window.AppRuntime.setReadOnly(true, 'Sem conexao com backend - exibindo cache local');
            }
            mostrarToast('Exibindo ultimo snapshot em cache', 'erro');
            if (typeof onDone === 'function') onDone(false);
            return;
          }
          mostrarToast(err?.message || 'Erro ao carregar vendas', 'erro');
          if (typeof onDone === 'function') onDone(false);
        })
        .listarVendas(!!forcarRecarregar, ambienteSolicitado);
    }

    function salvar() {
      if (!podeAlterarDados('Salvamento bloqueado em modo somente leitura')) return;
      if (salvando) return;
      const get = id => document.getElementById(id)?.value || '';

      const dados = {
        estoque_id: String(get('vendaEstoqueItem') || '').trim(),
        quantidade: parseNumeroInput(get('vendaQuantidade')),
        valor_total_venda: parseNumeroInput(get('vendaValorTotal')),
        cliente: String(get('vendaCliente') || '').trim(),
        referencia_venda: String(get('vendaReferencia') || '').trim(),
        recebido_por: String(get('vendaRecebidoPor') || '').trim(),
        data_venda: String(get('vendaData') || '').trim(),
        forma_pagamento: String(get('vendaFormaPagamento') || '').trim(),
        parcelas: Math.floor(parseNumeroInput(get('vendaParcelas')) || 1),
        observacao: String(get('vendaObservacao') || '').trim()
      };
      const dadosFormulario = { ...dados };

      if (!dados.estoque_id) {
        mostrarToast('Selecione um produto do estoque', 'erro');
        return;
      }
      if (!dados.quantidade || dados.quantidade <= 0) {
        mostrarToast('Quantidade invalida', 'erro');
        return;
      }
      if (!dados.data_venda) {
        mostrarToast('Data de venda e obrigatoria', 'erro');
        return;
      }
      if (!isFinite(dados.parcelas) || dados.parcelas < 1) {
        mostrarToast('Parcelas deve ser maior ou igual a 1', 'erro');
        return;
      }
      const formaExigeParcelas = window.AppDomainUtils?.formaExigeParcelas
        ? window.AppDomainUtils.formaExigeParcelas(dados.forma_pagamento)
        : false;
      const parcelasDetalhe = formaExigeParcelas
        ? (VendasUI.lerParcelasDetalheVenda ? VendasUI.lerParcelasDetalheVenda() : [])
        : [];
      if (formaExigeParcelas) {
        if (!Array.isArray(parcelasDetalhe) || parcelasDetalhe.length !== dados.parcelas) {
          mostrarToast('Revise as parcelas detalhadas', 'erro');
          return;
        }
        if (parcelasDetalhe.some(p => !String(p.data || '').trim())) {
          mostrarToast('Preencha a data de todas as parcelas', 'erro');
          return;
        }
        if (parcelasDetalhe.some(p => Number(p.valor || 0) <= 0)) {
          mostrarToast('Valor de parcela deve ser maior que zero', 'erro');
          return;
        }
      }
      dados.parcelas_detalhe = parcelasDetalhe;
      dadosFormulario.parcelas_detalhe = parcelasDetalhe;

      if (contextoNovaVendaRecebimento && !editandoId) {
        salvarNovaVendaDoComprovante(dados, dadosFormulario);
        return;
      }

      setSalvando(true);
      const eraEdicao = !!editandoId;
      const idAtual = String(editandoId || '').trim();
      const snapshot = eraEdicao ? VendasStore.getById(idAtual) : null;
      const optimisticId = eraEdicao
        ? idAtual
        : (window.AppEntityMutations?.tempId?.('VND_TMP') || `VND_TMP_${Date.now()}`);
      const optimisticItem = buildVendaOptimistic(dados, {
        baseItem: snapshot,
        id: optimisticId
      });

      try {
        if (!window.AppOptimistic?.enqueue) {
          throw new Error('Fila de sincronizacao indisponivel');
        }
        window.AppOptimistic.enqueue({
          scope: 'venda',
          handler: eraEdicao ? 'venda.update' : 'venda.create',
          entityKey: `venda:${optimisticId}`,
          payload: dados,
          meta: {
            domain: 'venda',
            action: eraEdicao ? 'update' : 'create',
            source: 'vendas',
            target_id: eraEdicao ? idAtual : '',
            temp_id: eraEdicao ? '' : optimisticId,
            before_item: snapshot ? limparVendaMeta(snapshot) : null,
            optimistic_item: limparVendaMeta(optimisticItem)
          }
        });
        setSalvando(false);
        editandoId = null;
        finalizarUX();
        window.AppModalUI?.closeAll?.();
        mostrarToast(eraEdicao
          ? 'Alteracao aplicada localmente. Sincronizando...'
          : 'Venda criada localmente. Sincronizando...');
      } catch (error) {
        setSalvando(false);
        mostrarToast(error?.message || 'Erro ao enfileirar venda', 'erro');
        reabrirFormularioAposErro(dadosFormulario, {
          editando: eraEdicao,
          id: idAtual
        });
      }
    }

    function finalizarUX() {
      VendasUI.fecharFormulario();
    }

    function gerarClientRequestIdNovaVendaRecebimento(id) {
      const base = String(id || '').trim().slice(-12);
      const aleatorio = globalThis.crypto?.randomUUID?.() || `${Date.now()}_${Math.random().toString(16).slice(2)}`;
      return `RECVENDA_${base}_${aleatorio}`.replace(/[^a-zA-Z0-9_-]+/g, '').slice(0, 112);
    }

    function criarVendaParaComprovanteRecebimento(comprovante, payloadRevisado) {
      if (!podeAlterarDados('Criacao de venda bloqueada em modo somente leitura')) return;
      const item = { ...(comprovante || {}), ...(payloadRevisado || {}) };
      const comprovanteId = String(item.ID || comprovante?.ID || '').trim();
      if (!comprovanteId) {
        mostrarToast('Comprovante de recebimento invalido', 'erro');
        return;
      }
      contextoNovaVendaRecebimento = {
        comprovante: item,
        client_request_id: gerarClientRequestIdNovaVendaRecebimento(comprovanteId)
      };
      editandoId = null;
      VendasUI.resetFormulario();
      VendasUI.preencherFormulario({
        cliente: item.pagador_nome || '',
        referencia_venda: item.referencia_transacao || '',
        valor_total_venda: Number(item.saldo_nao_alocado || item.valor_total || 0),
        recebido_por: item.recebido_por || '',
        data_venda: item.data_recebimento || '',
        forma_pagamento: item.forma_pagamento || '',
        parcelas: 1,
        observacao: item.descricao || item.observacao || ''
      }, {
        nova: true,
        titulo: 'Nova venda a partir do recebimento'
      });
      VendasUI.mostrarFormulario();
    }

    function salvarNovaVendaDoComprovante(dados, dadosFormulario) {
      const contexto = contextoNovaVendaRecebimento;
      const comprovante = contexto?.comprovante || {};
      const comprovanteId = String(comprovante.ID || '').trim();
      if (!comprovanteId || !window.AppRequest?.call) {
        contextoNovaVendaRecebimento = null;
        mostrarToast('Contexto do comprovante indisponivel', 'erro');
        return;
      }
      setSalvando(true);
      const saldo = Math.max(0,
        Number(comprovante.valor_total || 0) - Number(comprovante.valor_alocado || 0)
      );
      const payloadRecebimento = {
        pagador_nome: comprovante.pagador_nome || '',
        banco_pagador: comprovante.banco_pagador || '',
        recebido_por: dados.recebido_por || comprovante.recebido_por || '',
        valor_total: Number(comprovante.valor_total || saldo),
        data_recebimento: comprovante.data_recebimento || dados.data_venda,
        forma_pagamento: comprovante.forma_pagamento || dados.forma_pagamento,
        referencia_transacao: comprovante.referencia_transacao || '',
        descricao: comprovante.descricao || '',
        observacao: comprovante.observacao || '',
        valor_alocado: Math.min(saldo, Number(dados.valor_total_venda || 0)),
        client_request_id: contexto.client_request_id,
        _db_env: getAmbienteBancoAtivoVendas_()
      };
      window.AppRequest.call('criarVendaEAlocarComprovanteRecebimento', [
        comprovanteId,
        dados,
        payloadRecebimento
      ], {
        context: 'vendas.recebimentos.create-sale',
        errorMessage: 'Erro ao criar venda e vincular recebimento'
      })
        .then(resultado => {
          if (!resultado?.ok || !resultado?.venda?.ID) {
            throw new Error('A venda e o recebimento nao foram confirmados pelo servidor.');
          }
          contextoNovaVendaRecebimento = null;
          setSalvando(false);
          finalizarUX();
          carregarVendas(true);
          window.VendasRecebimentosController?.carregar?.();
          invalidarCacheDashboardPorImpacto(resultado, payloadRecebimento);
          mostrarToast('Venda criada e recebimento vinculado.');
        })
        .catch(error => {
          setSalvando(false);
          mostrarToast(error?.message || 'Erro ao criar venda pelo comprovante', 'erro');
          reabrirFormularioAposErro(dadosFormulario, { editando: false });
        });
    }

    function getAmbienteBancoAtivoVendas_() {
      const contexto = window.AppDbEnv?.getContext?.() || {};
      const env = String(contexto.effective_env || contexto.selected_env || '').trim().toLowerCase();
      return env === 'dev' ? 'dev' : 'prod';
    }

    function editar(id) {
      if (!podeAlterarDados('Edicao bloqueada em modo somente leitura')) return;
      contextoNovaVendaRecebimento = null;
      const item = VendasStore.getById(id);
      if (!item) {
        mostrarToast('Venda nao encontrada', 'erro');
        return;
      }
      if (getVendaUiState(item).blockActions) {
        mostrarToast('Esta venda possui uma sincronizacao pendente.', 'erro');
        return;
      }
      editandoId = id;
      VendasUI.preencherFormulario(item);
      VendasUI.mostrarFormulario();
    }

    function excluir(id) {
      if (!podeAlterarDados('Exclusao bloqueada em modo somente leitura')) return;
      if (!confirm('Deseja remover esta venda?')) return;
      const snapshot = VendasStore.getById(id);
      if (!snapshot) {
        mostrarToast('Venda nao encontrada', 'erro');
        return;
      }
      if (getVendaUiState(snapshot).blockActions) {
        mostrarToast('Esta venda ja possui uma sincronizacao pendente.', 'erro');
        return;
      }

      try {
        if (!window.AppOptimistic?.enqueue) {
          throw new Error('Fila de sincronizacao indisponivel');
        }
        window.AppOptimistic.enqueue({
          scope: 'venda',
          handler: 'venda.delete',
          entityKey: `venda:${String(id || '').trim()}`,
          payload: {
            id: String(id || '').trim()
          },
          meta: {
            domain: 'venda',
            action: 'delete',
            source: 'vendas',
            target_id: String(id || '').trim(),
            before_item: limparVendaMeta(snapshot),
            optimistic_item: limparVendaMeta(snapshot)
          }
        });
        mostrarToast('Exclusao aplicada localmente. Sincronizando...');
      } catch (error) {
        mostrarToast(error?.message || 'Erro ao enfileirar exclusao da venda', 'erro');
      }
    }

    function registrarRecebimento(id) {
      if (!podeAlterarDados('Recebimento bloqueado em modo somente leitura')) return;
      if (salvandoRecebimento) return;
      const item = VendasStore.getById(id);
      if (!item) {
        mostrarToast('Venda nao encontrada', 'erro');
        return;
      }
      if (getVendaUiState(item).blockActions) {
        mostrarToast('Esta venda ja possui uma sincronizacao pendente.', 'erro');
        return;
      }
      const pendente = Number(item.total_pendente || 0);
      if (pendente <= 0.009) {
        mostrarToast('Venda ja recebida');
        return;
      }
      recebimentoVendaId = id;
      const abriu = VendasUI.abrirModalRecebimento(item);
      if (!abriu) {
        recebimentoVendaId = null;
      }
    }

    function baixarEstoque(id) {
      if (!podeAlterarDados('Baixa de estoque bloqueada em modo somente leitura')) return;
      const vendaId = String(id || '').trim();
      const item = VendasStore.getById(vendaId);
      if (!item) {
        mostrarToast('Venda nao encontrada', 'erro');
        return;
      }
      if (item.estoque_baixado) {
        mostrarToast('O estoque desta venda ja foi baixado.');
        return;
      }
      if (!confirm(`Baixar ${Number(item.quantidade || 0).toFixed(2)} ${item.unidade || ''} do estoque?`)) return;
      window.AppRequest.call('baixarEstoqueVenda', [vendaId], {
        context: 'vendas.stock-out',
        errorMessage: 'Erro ao baixar estoque da venda'
      })
        .then(resultado => {
          if (!resultado?.ok) throw new Error('A baixa de estoque nao foi confirmada.');
          mostrarToast('Estoque da venda baixado.');
          VendasUI.fecharModalDetalhes?.();
          syncFromBackend();
          window.EstoqueController?.syncFromBackend?.();
          invalidarCacheDashboardPorImpacto(resultado, item);
        })
        .catch(error => mostrarToast(error?.message || 'Erro ao baixar estoque', 'erro'));
    }

    function reabrirModalRecebimentoAposErro(vendaId, dados) {
      const id = String(vendaId || '').trim();
      if (!id) return;
      const item = VendasStore.getById(id);
      if (!item) return;
      const abriu = VendasUI.abrirModalRecebimento(item);
      if (!abriu) return;
      VendasUI.preencherModalRecebimento?.(dados || {});
      recebimentoVendaId = id;
    }

    function confirmarRecebimento() {
      if (!podeAlterarDados('Recebimento bloqueado em modo somente leitura')) return;
      if (salvandoRecebimento) return;
      if (!recebimentoVendaId) {
        mostrarToast('Venda nao selecionada', 'erro');
        return;
      }

      const dados = VendasUI.lerModalRecebimento();
      const valor = parseNumeroInput(dados.valor_pago);
      if (!dados.data_pagamento) {
        mostrarToast('Data de recebimento e obrigatoria', 'erro');
        return;
      }
      if (!dados.forma_pagamento) {
        mostrarToast('Forma de pagamento e obrigatoria', 'erro');
        return;
      }
      if (dados.parcelado && !dados.parcela_alvo_id) {
        mostrarToast('Selecione a parcela pendente', 'erro');
        return;
      }
      if (!valor || valor <= 0) {
        mostrarToast('Valor de recebimento invalido', 'erro');
        return;
      }
      const vendaId = recebimentoVendaId;
      const dadosFormulario = { ...dados };
      const itemAntes = VendasStore.getById(vendaId);
      if (!itemAntes) {
        mostrarToast('Venda nao encontrada', 'erro');
        return;
      }
      const optimisticItem = applyRecebimentoVenda(itemAntes, {
        data_pagamento: dados.data_pagamento,
        valor_pago: valor,
        parcela_alvo_id: dados.parcela_alvo_id,
        forma_pagamento: dados.forma_pagamento,
        observacao: dados.observacao
      });

      salvandoRecebimento = true;
      setBloqueioMutacaoRecebimento(true);
      VendasUI.fecharModalRecebimento();
      recebimentoVendaId = null;
      try {
        if (!window.AppOptimistic?.enqueue) {
          throw new Error('Fila de sincronizacao indisponivel');
        }
        window.AppOptimistic.enqueue({
          scope: 'venda',
          handler: 'venda.receive',
          entityKey: `venda:${String(vendaId || '').trim()}`,
          payload: {
            data_pagamento: dados.data_pagamento,
            valor_pago: valor,
            parcela_alvo_id: dados.parcela_alvo_id,
            forma_pagamento: dados.forma_pagamento,
            observacao: dados.observacao
          },
          meta: {
            domain: 'venda',
            action: 'receive',
            source: 'vendas',
            target_id: String(vendaId || '').trim(),
            before_item: limparVendaMeta(itemAntes),
            optimistic_item: limparVendaMeta(optimisticItem)
          }
        });
        salvandoRecebimento = false;
        setBloqueioMutacaoRecebimento(false);
        window.AppModalUI?.closeAll?.();
        mostrarToast('Recebimento aplicado localmente. Sincronizando...');
      } catch (error) {
        salvandoRecebimento = false;
        setBloqueioMutacaoRecebimento(false);
        mostrarToast(error?.message || 'Erro ao enfileirar recebimento', 'erro');
        reabrirModalRecebimentoAposErro(vendaId, dadosFormulario);
      }
    }

    function cancelarRecebimento() {
      recebimentoVendaId = null;
      salvandoRecebimento = false;
      setBloqueioMutacaoRecebimento(false);
      VendasUI.fecharModalRecebimento();
    }

    function limparEdicao() {
      editandoId = null;
      contextoNovaVendaRecebimento = null;
    }

    function abrirDetalhes(id) {
      const alvoId = String(id || '').trim();
      if (!alvoId || typeof VendasUI?.abrirDetalhes !== 'function') return false;
      return VendasUI.abrirDetalhes(alvoId) ?? true;
    }

    function syncFromBackend(onDone, ambiente = '', options = {}) {
      let pendencias = options.includeSecondary === true ? 3 : 2;
      let sucesso = true;
      let superseded = false;
      const concluir = resultado => {
        pendencias -= 1;
        superseded = superseded || resultado === 'superseded';
        sucesso = sucesso && resultado !== false;
        if (pendencias > 0) return;
        if (typeof onDone === 'function') onDone(sucesso ? (superseded ? 'superseded' : true) : false);
      };
      carregarVendas(options.force === true, concluir, ambiente, { hydrate: false });
      carregarEstoqueVendavel(concluir, ambiente);
      if (options.includeSecondary === true) {
        Promise.resolve(window.VendasRecebimentosController?.carregar?.(options.force === true)).then(
          () => concluir(true),
          () => concluir(false)
        );
      }
    }

    return {
      init,
      salvar,
      editar,
      excluir,
      abrirDetalhes,
      registrarRecebimento,
      criarVendaParaComprovanteRecebimento,
      confirmarRecebimento,
      cancelarRecebimento,
      baixarEstoque,
      retryVendaMutation,
      limparEdicao,
      syncFromBackend
    };
  })();
</script>
