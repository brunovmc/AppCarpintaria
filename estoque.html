<div id="filtroTipoRapidoEstoque" class="tipo-filtro-linha"></div>

<div id="lista"></div>
<div id="listaControlesEstoque" class="lista-controles"></div>

<div id="modalDetalhesEstoque" class="modal hidden">
  <div class="modal-content">
    <button class="modal-close-square" onclick="EstoqueUI.fecharModalDetalhes()" aria-label="Fechar">X</button>
    <h3 id="modalDetalhesEstoqueTitulo">Detalhes do item</h3>
    <div id="modalDetalhesEstoqueConteudo"></div>
  </div>
</div>

<div id="formulario" class="modal hidden">
  <div class="modal-content form-modal-content">
  <button class="modal-close-square" onclick="EstoqueUI.fecharFormulario()" aria-label="Fechar">X</button>
  <h2 id="formTitulo">Novo Item</h2>

  <div class="campo-ajuda-wrap">
    <span class="campo-ajuda-tag">Tipo</span>
    <select id="tipo" onchange="EstoqueUI.handleTipoChange()"></select>
  </div>

  <div class="campo-ajuda-wrap">
    <span class="campo-ajuda-tag">Item</span>
    <input id="item">
  </div>

  <div class="campo-ajuda-wrap">
    <span class="campo-ajuda-tag">Quantidade</span>
    <input id="quantidade" type="number" oninput="EstoqueUI.handleQuantidadeInput()">
  </div>

  <div class="campo-ajuda-wrap">
    <span class="campo-ajuda-tag">Unidade</span>
    <select id="unidade"></select>
  </div>

  <div id="madeiraFields" class="hidden">
    <div class="campo-ajuda-wrap">
      <span class="campo-ajuda-tag">Comprimento (cm)</span>
      <input id="comprimento_cm" type="number" step="0.01" oninput="EstoqueUI.atualizarQuantidadeMadeira()">
    </div>
    <div class="campo-ajuda-wrap">
      <span class="campo-ajuda-tag">Largura (cm)</span>
      <input id="largura_cm" type="number" step="0.01" oninput="EstoqueUI.atualizarQuantidadeMadeira()">
    </div>
    <div class="campo-ajuda-wrap">
      <span class="campo-ajuda-tag">Espessura (cm)</span>
      <input id="espessura_cm" type="number" step="0.01" oninput="EstoqueUI.atualizarQuantidadeMadeira()">
    </div>
  </div>

  <div class="campo-ajuda-wrap">
    <span class="campo-ajuda-tag">Categoria</span>
    <select id="categoria"></select>
  </div>

  <div class="campo-ajuda-wrap">
    <span class="campo-ajuda-tag">Fornecedor</span>
    <select id="fornecedor"></select>
  </div>

  <div class="campo-ajuda-wrap">
    <span class="campo-ajuda-tag">Pago por</span>
    <select id="pago_por"></select>
  </div>

  <div class="campo-ajuda-wrap">
    <span class="campo-ajuda-tag">Data de pagamento</span>
    <input id="data_pagamento" type="date">
  </div>

  <div class="campo-ajuda-wrap">
    <span class="campo-ajuda-tag">Forma de pagamento</span>
    <select id="forma_pagamento" onchange="EstoqueUI.handleFormaPagamentoChange()"></select>
  </div>

  <div id="parcelas_wrap" class="campo-ajuda-wrap hidden">
    <span class="campo-ajuda-tag">Parcelas</span>
    <input id="parcelas" type="number" min="1" step="1" value="1">
  </div>

  <div class="campo-ajuda-wrap">
    <span class="campo-ajuda-tag">Custo total item (R$)</span>
    <input id="custo_total_item" type="number" step="0.01" min="0" oninput="EstoqueUI.handleCustoTotalInput()">
  </div>

  <div class="campo-ajuda-wrap">
    <span class="campo-ajuda-tag">Custo unitario (R$)</span>
    <input id="custo_unitario" type="number" step="0.01" min="0" oninput="EstoqueUI.handleCustoUnitarioInput()">
  </div>

  <div class="campo-ajuda-wrap">
    <span class="campo-ajuda-tag">Preco de venda (R$)</span>
    <input id="preco_venda" type="number" step="0.01" min="0">
  </div>

  <div class="campo-ajuda-wrap">
    <span class="campo-ajuda-tag">Observacao</span>
    <textarea id="observacao"></textarea>
  </div>

  <div id="equipamentoFields" class="hidden">
    <div class="campo-ajuda-wrap">
      <span class="campo-ajuda-tag">Potencia</span>
      <input id="potencia">
    </div>
    <div class="campo-ajuda-wrap">
      <span class="campo-ajuda-tag">Voltagem</span>
      <input id="voltagem">
    </div>
    <div class="campo-ajuda-wrap">
      <span class="campo-ajuda-tag">Comprado em</span>
      <input id="comprado_em" type="date">
    </div>
    <div class="campo-ajuda-wrap">
      <span class="campo-ajuda-tag">Vida util (meses)</span>
      <input id="vida_util_mes" type="number">
    </div>
  </div>

  <button id="btnSalvarEstoque" onclick="EstoqueController.salvar()">Salvar</button>
  <button onclick="EstoqueUI.fecharFormulario()">Cancelar</button>
  </div>
</div>
